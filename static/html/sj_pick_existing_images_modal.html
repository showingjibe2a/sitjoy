<!-- 全局：选择已有图片（未绑定当前 SKU/面料/规格） -->
<div class="pm-modal nas-main-image-import-modal" id="sjPickExistingModal">
  <div class="pm-modal-content pm-modal-content--wide pm-modal-content--image-picker">
    <div class="pm-modal-scroll">
      <div class="nas-main-image-header">
        <div class="nas-main-image-title">
          <h3 style="margin:0;" id="sjPickExistingTitle">选择已有图片</h3>
          <span class="help-dot" data-tip="仅显示当前目录下、尚未绑定到所选面料/SKU/规格的图片。文件夹请双击进入。"></span>
        </div>
      </div>
      <div class="pm-form">
        <div class="form-group pm-form-full" id="sjPickExistingRootsWrap" style="display:none;">
          <label>浏览位置</label>
          <div class="status-segment status-segment--inline" id="sjPickExistingRootsBar"></div>
        </div>
        <div class="form-group pm-form-full">
          <label>当前位置</label>
          <div class="pm-inline-panel">
            <nav id="sjPickExistingBreadcrumbs" class="nas-main-image-breadcrumb" aria-label="路径"></nav>
          </div>
        </div>
        <div class="form-group pm-form-full">
          <div class="form-group pm-search" style="margin:0;">
            <input type="text" id="sjPickExistingSearch" placeholder="搜索文件名">
            <button type="button" class="btn-primary" id="sjPickExistingSearchBtn">搜索</button>
          </div>
        </div>
        <div class="form-group pm-form-full">
          <div class="nas-main-image-grid-meta">
            <label class="nas-grid-select-all" id="sjPickExistingSelectAllLabel">
              <input type="checkbox" id="sjPickExistingSelectAllBox">
              <span>全选本页</span>
            </label>
            <div class="nas-grid-count" id="sjPickExistingCountText">共 0 张</div>
          </div>
        </div>
        <div class="form-group pm-form-full">
          <div id="sjPickExistingFolders" class="browser-grid nas-main-image-browser-grid" style="margin-bottom:0.5rem;"></div>
          <div id="sjPickExistingGrid" class="browser-grid nas-main-image-browser-grid"></div>
        </div>
      </div>
      <div id="sjPickExistingStatus" class="nas-main-image-status status-message" style="display:none; margin-top:0.75rem;" role="status"></div>
    </div>
    <div class="pm-modal-actions nas-main-image-modal-actions">
      <button type="button" class="btn-small" id="sjPickExistingCloseBtn">关闭</button>
      <button type="button" class="btn-accent" id="sjPickExistingConfirmBtn">确认选择</button>
    </div>
  </div>
</div>
