<!-- 共享：编辑图片信息弹窗（gallery / 销售产品管理共用） -->
<div class="pm-modal" id="pmImageEditModal">
  <div class="pm-modal-content pm-modal-content--wide gallery-rename-modal">
    <div class="pm-modal-scroll">
      <h3 style="margin-top:0;" id="pmImageEditTitle">编辑图片信息</h3>

      <div class="gallery-rename-preview">
        <img id="pmImageEditPreviewImg" src="" alt="预览">
        <button class="btn-secondary gallery-preview-zoom" type="button" id="pmImageEditZoomBtn" title="放大查看" style="font-size:12px; padding:0.22rem 0.5rem; min-height:28px;">🔍</button>
        <button class="btn-secondary gallery-preview-zoom" type="button" id="pmImageEditReplaceBtn" title="选择新文件后立即上传替换：会更新 sha256；旧文件会进入『上架资源』/回收站。" style="right:54px; font-size:12px; padding:0.22rem 0.5rem; min-height:28px;">替换</button>
        <input type="file" id="pmImageEditReplaceInput" accept="image/*" class="optional-field" style="display:none;">
      </div>

      <div class="pm-section" style="margin-top: 1rem;">
        <div class="pm-section-body pm-form" style="grid-template-columns: 1fr;">
          <h4 class="pm-section-title">基础信息</h4>

          <div class="form-group pm-form-full">
            <label>启用状态</label>
            <div class="status-segment status-segment--inline" id="pmImageEditEnabledSegment" data-value="1">
              <button type="button" class="status-pill status-pill--yes is-active" data-value="1">启用</button>
              <button type="button" class="status-pill status-pill--no" data-value="0">弃用</button>
            </div>
          </div>

          <div class="form-group pm-form-full">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:0.6rem;">
              <div style="display:flex; align-items:center; gap:0.35rem;">
                <label>文件名（无需扩展名）</label>
                <span class="help-dot" data-tip="开启“推荐名称”时会自动按规则生成：面料（若所有已选规格面料一致）-图片类型-原名。若文件名已符合该语法则不会重复叠加。"></span>
              </div>
              <div class="nas-header-control">
                <span class="nas-header-control-label">推荐名称</span>
                <div class="status-segment status-segment--inline" id="pmImageEditRecommendNameSegment" data-value="1">
                  <button type="button" class="status-pill status-pill--yes is-active" data-value="1">是</button>
                  <button type="button" class="status-pill status-pill--no" data-value="0">否</button>
                </div>
              </div>
            </div>
            <input type="text" id="pmImageEditNewNameInput" placeholder="输入新文件名">
          </div>

          <div class="form-group pm-form-full">
            <label style="display:flex; align-items:center; gap:0.4rem;">
              <span>图片类型 <span class="required-asterisk">*</span></span>
              <span class="help-dot" data-tip="未选择图片类型将无法提交“一键应用”。若该图片已在数据库关联过，将自动预选其类型。"></span>
            </label>
            <div class="status-segment status-segment--inline" id="pmImageEditTypeSegment" data-value="">
              <button type="button" class="status-pill status-pill--no is-active" data-value="" title="必须选择一个图片类型">未选择</button>
            </div>
          </div>

          <div class="form-group pm-form-full">
            <label for="pmImageEditDescInput">备注<span class="help-dot" data-tip="用于标注卖点/场景等信息；可为空。"></span></label>
            <textarea id="pmImageEditDescInput" class="optional-field" placeholder="请输入备注（可为空）" style="min-height: 120px;"></textarea>
          </div>
        </div>
      </div>

      <div id="pmImageEditStatus" class="status-message" style="display:none; margin-top:0.65rem;"></div>

      <div class="pm-section" style="margin-top: 1rem;">
        <div class="pm-section-body pm-form" style="grid-template-columns: 1fr;">
          <h4 class="pm-section-title">批量关联（面料 / 规格 / 下单产品）</h4>
          <p class="helper-text" style="margin:0 0 0.5rem 0;">请先选择<strong>图片类型</strong>，再勾选面料、规格或下单产品。落盘优先级：『面料』目录 &gt; 货号/主图/规格-面料 &gt; 货号/配件图。</p>
          <div class="form-group pm-form-full" style="margin:0;">
            <label>已选面料</label>
            <div style="margin-top:0.45rem;">
              <table class="pm-table pm-table--compact" style="margin:0;">
                <thead>
                  <tr>
                    <th style="width:160px;">面料代码</th>
                    <th>英文名称</th>
                    <th style="width:90px; text-align:right;">
                      <button class="btn-secondary" type="button" id="pmImageEditFabricClearBtn" style="padding:0.28rem 0.55rem; font-size:0.82rem; min-height:28px;">清空</button>
                    </th>
                  </tr>
                </thead>
                <tbody id="pmImageEditSelectedFabricTbody">
                  <tr><td colspan="3" class="helper-text" style="text-align:center;">未选择</td></tr>
                </tbody>
              </table>
              <div class="pm-actions" style="justify-content:flex-end; margin-top:0.45rem;">
                <button class="btn-add" type="button" id="pmImageEditPickFabricBtn">选择面料</button>
              </div>
            </div>
          </div>
          <div class="form-group pm-form-full" style="margin:0;">
            <label>已选规格</label>
            <div style="margin-top:0.45rem;">
              <table class="pm-table pm-table--compact" style="margin:0;">
                <thead>
                  <tr>
                    <th style="width:180px;">货号</th>
                    <th style="width:180px;">规格</th>
                    <th>面料</th>
                    <th style="width:90px; text-align:right;">
                      <button class="btn-secondary" type="button" id="pmImageEditVariantClearBtn" style="padding:0.28rem 0.55rem; font-size:0.82rem; min-height:28px;">清空</button>
                    </th>
                  </tr>
                </thead>
                <tbody id="pmImageEditSelectedTbody">
                  <tr><td colspan="4" class="helper-text" style="text-align:center;">未选择</td></tr>
                </tbody>
              </table>
              <div class="pm-actions" style="justify-content:flex-end; margin-top:0.45rem;">
                <button class="btn-add" type="button" id="pmImageEditPickVariantBtn">选择规格</button>
              </div>
            </div>
          </div>

          <div class="form-group pm-form-full" style="margin:0;">
            <label>已选下单产品</label>
            <div style="margin-top:0.45rem;">
              <table class="pm-table pm-table--compact" style="margin:0;">
                <thead>
                  <tr>
                    <th style="width:140px;">货号</th>
                    <th style="width:220px;">SKU</th>
                    <th>规格简称</th>
                    <th style="width:90px; text-align:right;">
                      <button class="btn-secondary" type="button" id="pmImageEditOrderProductClearBtn" style="padding:0.28rem 0.55rem; font-size:0.82rem; min-height:28px;">清空</button>
                    </th>
                  </tr>
                </thead>
                <tbody id="pmImageEditSelectedOrderProductTbody">
                  <tr><td colspan="4" class="helper-text" style="text-align:center;">未选择</td></tr>
                </tbody>
              </table>
              <div class="pm-actions" style="justify-content:flex-end; margin-top:0.45rem;">
                <button class="btn-add" type="button" id="pmImageEditPickOrderProductBtn">选择下单产品</button>
              </div>
            </div>
          </div>

          <div class="form-group pm-form-full" style="margin:0;">
            <label>复制/移动</label>
            <div class="pm-actions" style="justify-content:flex-start; gap:1rem;">
              <label style="display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;">
                <input type="radio" name="pmImageEditApplyAction" value="copy">
                <span>复制（源文件保留）</span>
              </label>
              <label style="display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;">
                <input type="radio" name="pmImageEditApplyAction" value="move" checked>
                <span>移动（源文件不在目标目录时将消失）</span>
              </label>
              <label style="display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;">
                <input type="checkbox" id="pmImageEditPromptDuplicate" checked>
                <span>提示已存在关联</span>
              </label>
            </div>
          </div>
        </div>
      </div>

    </div>

    <div class="pm-modal-actions" style="position:relative; flex-wrap:wrap; gap:0.5rem;">
      <div id="pmImageEditApplyHint" style="flex:1 1 100%; order:3; color:#c0392b; font-size:0.86rem; line-height:1.35; min-height:1.2em;"></div>
      <button class="btn-secondary" type="button" id="pmImageEditCancelBtn" style="order:1;">取消</button>
      <button class="btn-primary" type="button" id="pmImageEditSubmitBtn" style="order:2;">保存并关联提交</button>
    </div>
  </div>
</div>
