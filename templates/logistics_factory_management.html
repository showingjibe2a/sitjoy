<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流仓储管理 - 工厂管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="site-header"></div>
    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>工厂管理</h2>
            <p>维护工厂基础信息</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin:0;">
                            <span class="pm-search-title">搜索</span>
                            <input type="text" id="searchInput" placeholder="搜索工厂名称">
                            <button class="btn-primary" onclick="loadList()">搜索</button>
                            <button class="btn-secondary" onclick="resetSearch()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-accent" onclick="openCreateModal()">新增</button>
                        <button class="btn-secondary" type="button" onclick="downloadSkuFactoryTemplate()">下载SKU-工厂关联模板</button>
                        <button class="btn-primary" type="button" onclick="triggerSkuFactoryImport()">上传SKU-工厂关联表</button>
                        <input type="file" id="skuFactoryImportInput" accept=".xlsx,.xls" style="display:none;">
                    </div>
                </div>
            </div>

            <div>
                <table class="pm-table" id="mainTable">
                    <thead>
                        <tr>
                            <th>工厂名称</th>
                            <th style="width:180px;">创建时间</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody><tr><td colspan="3" style="text-align:center;">加载中...</td></tr></tbody>
                </table>
            </div>
        </section>
    </div>

    <div class="pm-modal" id="pm-modal">
        <div class="pm-modal-content">
            <h3 id="pm-modal-title" style="margin-top:0;">新增工厂</h3>
            <div class="pm-form">
                <div class="form-group pm-form-full">
                    <label for="factoryName">工厂名称<span class="required-asterisk">*</span></label>
                    <input type="text" id="factoryName" class="required-field" placeholder="请输入工厂名称">
                </div>
                <div class="form-group pm-form-full">
                    <label>关联下单SKU（可多选）</label>
                    <div class="feature-category-picker is-multi-check" id="factorySkuPicker">
                        <div class="feature-category-chips" id="factorySkuSelected"></div>
                        <div class="feature-category-dropdown" id="factorySkuDropdown">
                            <button type="button" class="feature-category-add" id="factorySkuToggle">
                                <span class="feature-category-add-icon">+</span>
                                <span class="feature-category-add-text">选择SKU</span>
                            </button>
                            <div class="feature-category-menu" id="factorySkuMenu">
                                <input type="text" id="factorySkuSearch" class="pm-select-search" placeholder="搜索下单SKU">
                                <div class="feature-category-list" id="factorySkuList"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="modalStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="saveFromModal()">保存</button>
            </div>
        </div>
    </div>

    <footer><p>&copy; 2026 SITJOY | 内部使用</p></footer>

    <script>
        let editId = null;
        let orderProductOptions = [];
        let selectedOrderProductIds = [];

        function normalizeIds(value){
            if(!value) return [];
            if(Array.isArray(value)) return value.map(v => String(v));
            return String(value).split(',').map(v => v.trim()).filter(Boolean);
        }
        function setOrderProductSelected(value){
            selectedOrderProductIds = normalizeIds(value);
            renderOrderProductPicker();
        }
        function renderOrderProductPicker(){
            const chips = document.getElementById('factorySkuSelected');
            const list = document.getElementById('factorySkuList');
            if(!chips || !list) return;
            const keyword = (document.getElementById('factorySkuSearch')?.value || '').trim().toLowerCase();
            chips.innerHTML = '';
            selectedOrderProductIds.forEach(id => {
                const item = orderProductOptions.find(opt => String(opt.id) === String(id));
                if(!item) return;
                const chip = document.createElement('span');
                chip.className = 'feature-category-chip';
                chip.textContent = item.sku || `SKU${id}`;
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'feature-category-remove';
                removeBtn.innerText = '×';
                removeBtn.addEventListener('click', function(){
                    selectedOrderProductIds = selectedOrderProductIds.filter(itemId => String(itemId) !== String(id));
                    renderOrderProductPicker();
                });
                chip.appendChild(removeBtn);
                chips.appendChild(chip);
            });

            const selectedSet = new Set(selectedOrderProductIds.map(id => String(id)));
            list.innerHTML = '';
            const available = orderProductOptions.filter(item => {
                if(selectedSet.has(String(item.id))) return false;
                if(!keyword) return true;
                return String(item.sku || '').toLowerCase().includes(keyword);
            });
            if(!available.length){
                const empty = document.createElement('div');
                empty.className = 'feature-category-empty';
                empty.textContent = '暂无可选SKU';
                list.appendChild(empty);
                return;
            }
            available.forEach(item => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'feature-category-option';
                btn.textContent = item.sku || `SKU${item.id}`;
                btn.addEventListener('click', function(){
                    selectedOrderProductIds.push(String(item.id));
                    renderOrderProductPicker();
                });
                list.appendChild(btn);
            });
        }
        function openOrderProductDropdown(){
            const dropdown = document.getElementById('factorySkuDropdown');
            if(!dropdown) return;
            dropdown.classList.add('expanded');
            dropdown.classList.add('open');
            ensureOrderProductMenuVisible();
        }
        function closeOrderProductDropdown(){
            const dropdown = document.getElementById('factorySkuDropdown');
            if(!dropdown) return;
            dropdown.classList.remove('open');
            dropdown.classList.remove('expanded');
        }
        function ensureOrderProductMenuVisible(){
            const modal = document.getElementById('pm-modal');
            const toggle = document.getElementById('factorySkuToggle');
            const menu = document.getElementById('factorySkuMenu');
            if(!toggle || !menu) return;

            const desiredSpace = 280;
            const firstRect = toggle.getBoundingClientRect();
            const firstAvailable = window.innerHeight - firstRect.bottom - 12;
            if(modal && firstAvailable < desiredSpace){
                modal.scrollTop += (desiredSpace - firstAvailable);
            }

            window.requestAnimationFrame(function(){
                const rect = toggle.getBoundingClientRect();
                const available = window.innerHeight - rect.bottom - 12;
                const maxHeight = Math.max(120, Math.min(380, available));
                menu.style.maxHeight = `${maxHeight}px`;
                menu.style.overflowY = 'auto';
            });
        }
        function loadOrderProductOptions(){
            fetch('/api/logistics-factory?action=order_product_options', { credentials: 'include' })
                .then(r => r.json())
                .then(data => {
                    orderProductOptions = data.status === 'success' ? (data.items || []) : [];
                    renderOrderProductPicker();
                })
                .catch(() => {
                    orderProductOptions = [];
                    renderOrderProductPicker();
                });
        }
        function showStatus(msg, err){
            const el = document.getElementById('modalStatus');
            el.style.display = 'block';
            el.style.background = err ? '#ffecec' : '#f0fff0';
            el.style.color = err ? '#a33' : '#2f6f2f';
            el.innerText = msg;
        }
        function resetStatus(){ const el = document.getElementById('modalStatus'); el.style.display='none'; el.innerText=''; }
        function resetSearch(){ document.getElementById('searchInput').value=''; loadList(); }
        function openCreateModal(){
            editId = null;
            document.getElementById('pm-modal-title').innerText = '新增工厂';
            document.getElementById('factoryName').value = '';
            setOrderProductSelected([]);
            document.getElementById('factorySkuSearch').value = '';
            resetStatus();
            document.getElementById('pm-modal').classList.add('active');
        }
        function openEditModal(itemOrId){
            const item = (typeof itemOrId === 'object' && itemOrId) ? itemOrId : null;
            const itemId = item ? Number(item.id || 0) : Number(itemOrId || 0);
            if(!itemId) return;
            if(!item){
                fetch(`/api/logistics-factory?id=${encodeURIComponent(String(itemId))}`)
                    .then(r => r.json())
                    .then(resp => {
                        if(resp.status !== 'success' || !resp.item){
                            if(window.showAppToast){ window.showAppToast(resp.message || '未找到工厂详情', true, 3200); }
                            return;
                        }
                        openEditModal(resp.item);
                    })
                    .catch(err => { if(window.showAppToast){ window.showAppToast('加载详情失败: ' + err, true, 3200); } });
                return;
            }
            editId = item.id;
            document.getElementById('pm-modal-title').innerText = '编辑工厂';
            document.getElementById('factoryName').value = item.factory_name || '';
            setOrderProductSelected(item.order_product_ids || []);
            document.getElementById('factorySkuSearch').value = '';
            resetStatus();
            document.getElementById('pm-modal').classList.add('active');
        }
        function closeModal(){ document.getElementById('pm-modal').classList.remove('active'); editId = null; }
        function saveFromModal(){
            const factory_name = document.getElementById('factoryName').value.trim();
            if(!factory_name){ showStatus('请填写工厂名称', true); return; }
            const payload = { factory_name, order_product_ids: selectedOrderProductIds };
            let method = 'POST';
            if(editId){ payload.id = editId; method = 'PUT'; }
            fetch('/api/logistics-factory', { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
                .then(r=>r.json()).then(data=>{
                    if(data.status==='success'){
                        showStatus('保存成功', false);
                        setTimeout(()=>{ closeModal(); loadList(); }, 300);
                    } else { showStatus(data.message || '操作失败', true); }
                }).catch(err=>showStatus('请求失败: '+err, true));
        }
        function downloadSkuFactoryTemplate(){
            window.location.href = '/api/order-product?action=factory_links_template';
        }
        function triggerSkuFactoryImport(){
            const input = document.getElementById('skuFactoryImportInput');
            if(input) input.click();
        }
        function uploadSkuFactoryLinks(file){
            if(!file) return;
            if(window.showAppUploadProgress){
                window.showAppUploadProgress({ title:'正在上传工厂关联模板...', summary:'请稍候', percent: 10 });
            }
            const formData = new FormData();
            formData.append('file', file);
            fetch('/api/order-product?action=factory_links_import', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            })
                .then(r=>r.json())
                .then(data=>{
                    if(window.hideAppUploadProgress){
                        window.hideAppUploadProgress();
                    }
                    if(data.status !== 'success'){
                        if(window.showAppResultPanel){
                            window.showAppResultPanel({ title:'上传失败', summary:data.message || '上传失败', isError:true });
                        }
                        if(window.showAppToast){ window.showAppToast(data.message || '上传失败', true, 3200); }
                        return;
                    }
                    const errCount = Array.isArray(data.errors) ? data.errors.length : 0;
                    const summary = `上传完成：新增 ${data.created || 0} 条，失败 ${errCount} 条`;
                    if(errCount && window.showAppResultPanel){
                        window.showAppResultPanel({
                            title:'工厂关联模板导入完成',
                            summary,
                            details: (data.errors || []).map(item => `${item.row || '-'}: ${item.error || item.message || '校验失败'}`),
                            isError:true
                        });
                    }
                    if(window.showAppToast){ window.showAppToast(summary, false, 2600); }
                    loadList();
                })
                .catch(err=>{
                    if(window.hideAppUploadProgress){
                        window.hideAppUploadProgress();
                    }
                    if(window.showAppResultPanel){
                        window.showAppResultPanel({ title:'上传失败', summary:'上传失败: ' + err, isError:true });
                    }
                    if(window.showAppToast){ window.showAppToast('上传失败: ' + err, true, 3200); }
                });
        }
        async function removeItem(id){
            const ok = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({ title:'删除确认', message:'确认删除该工厂？', confirmText:'确认删除' })
                : false;
            if(!ok) return;
            fetch('/api/logistics-factory', { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id}) })
                .then(r=>r.json()).then(data=>{ if(data.status==='success') loadList(); else if(window.showAppToast){ window.showAppToast(data.message || '删除失败', true, 3200); } })
                .catch(err=>{ if(window.showAppToast){ window.showAppToast('删除失败: '+err, true, 3200); } });
        }
        function loadList(){
            const q = document.getElementById('searchInput').value.trim();
            const url = q ? `/api/logistics-factory?q=${encodeURIComponent(q)}` : '/api/logistics-factory';
            fetch(url).then(r=>r.json()).then(data=>{
                const tbody = document.querySelector('#mainTable tbody');
                if(data.status!=='success'){ tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#a33;">${data.message||'加载失败'}</td></tr>`; return; }
                const items = data.items || [];
                if(!items.length){ tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">暂无数据</td></tr>'; return; }
                tbody.innerHTML = items.map(item => `<tr><td>${item.factory_name||''}</td><td>${item.created_at?new Date(item.created_at).toLocaleString('zh-CN'):''}</td><td><div class="pm-actions"><button class="btn-secondary" onclick='openEditModal(${JSON.stringify(item)})'>编辑</button><button class="btn-danger" onclick='removeItem(${item.id})'>删除</button></div></td></tr>`).join('');
            }).catch(err=>{ document.querySelector('#mainTable tbody').innerHTML = `<tr><td colspan="3" style="text-align:center;color:#a33;">加载失败: ${err}</td></tr>`; });
        }
        document.getElementById('pm-modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
        document.getElementById('searchInput').addEventListener('keydown', function(e){ if(e.key==='Enter') loadList(); });
        document.getElementById('factorySkuToggle').addEventListener('click', function(){
            openOrderProductDropdown();
            document.getElementById('factorySkuSearch').focus();
        });
        document.getElementById('factorySkuSearch').addEventListener('input', function(){
            renderOrderProductPicker();
            ensureOrderProductMenuVisible();
        });
        document.getElementById('factorySkuDropdown').addEventListener('click', function(e){
            e.stopPropagation();
        });
        document.getElementById('pm-modal').addEventListener('scroll', function(){
            const dropdown = document.getElementById('factorySkuDropdown');
            if(dropdown && dropdown.classList.contains('open')){
                ensureOrderProductMenuVisible();
            }
        });
        window.addEventListener('resize', function(){
            const dropdown = document.getElementById('factorySkuDropdown');
            if(dropdown && dropdown.classList.contains('open')){
                ensureOrderProductMenuVisible();
            }
        });
        document.addEventListener('click', function(e){
            const dropdown = document.getElementById('factorySkuDropdown');
            if(dropdown && !dropdown.contains(e.target)){
                closeOrderProductDropdown();
            }
        });
        document.getElementById('skuFactoryImportInput').addEventListener('change', function(){
            const file = this.files && this.files[0];
            if(file){
                uploadSkuFactoryLinks(file);
            }
            this.value = '';
        });
        window.addEventListener('load', loadOrderProductOptions);
        window.addEventListener('load', loadList);
    </script>
</body>
<script src="/static/js/header.js"></script>
</html>
