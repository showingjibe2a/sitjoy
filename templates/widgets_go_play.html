<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋对弈 - SITJOY</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/widgets.css">
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1rem;">
            <h2>围棋对弈</h2>
            <p>19 路在线对弈：未加入房间时可本地摆棋（含独立小窗）；创建房间、分享房间号；支持提子、虚手、打劫与禁着点；己方回合可开「演习模式」；悔棋与认输需对方确认，终局后可双方同意重开。</p>
        </section>

        <section class="pm-layout go-play-layout-root">
            <div class="card pm-card go-play-toolbar-card">
                <div class="pm-toolbar go-play-toolbar">
                    <div class="pm-toolbar-actions go-play-toolbar-actions">
                        <button type="button" class="btn-accent" id="goCreateBtn">创建房间</button>
                        <div class="form-group pm-search go-play-join-group" style="margin:0;">
                            <span class="pm-search-title">加入房间</span>
                            <div class="go-play-join-row">
                                <input type="text" id="goJoinInput" class="inline-input widget-room-join-input" maxlength="8" placeholder="6 位房间号" autocomplete="off">
                                <button type="button" class="btn-secondary" id="goJoinBtn">加入</button>
                            </div>
                        </div>
                        <button type="button" class="btn-secondary" id="goPopoutBtn" title="在新浏览器窗口中打开棋盘（未加入房间时为本地摆棋）">棋盘独立窗口</button>
                    </div>
                </div>
            </div>

            <div class="card pm-card go-play-board-card">
                <div class="go-play-stage go-play-stage--inline">
                    <div class="go-play-board-cluster">
                    <div id="goBoardSlot" class="go-play-board-slot go-play-board-slot--inline">
                        <div class="go-play-board-wrap go-play-board-wrap--inline" id="goInlineBoardWrap">
                            <div class="go-play-board-frame" id="goBoardFrame">
                                <svg class="go-play-grid-svg" viewBox="-0.5 -0.5 19 19" preserveAspectRatio="none" aria-hidden="true">
                                    <g stroke="#3a3020" stroke-width="0.045" vector-effect="non-scaling-stroke" fill="none">
                                        <line x1="0" y1="0" x2="0" y2="18"/><line x1="1" y1="0" x2="1" y2="18"/><line x1="2" y1="0" x2="2" y2="18"/><line x1="3" y1="0" x2="3" y2="18"/><line x1="4" y1="0" x2="4" y2="18"/><line x1="5" y1="0" x2="5" y2="18"/><line x1="6" y1="0" x2="6" y2="18"/><line x1="7" y1="0" x2="7" y2="18"/><line x1="8" y1="0" x2="8" y2="18"/><line x1="9" y1="0" x2="9" y2="18"/><line x1="10" y1="0" x2="10" y2="18"/><line x1="11" y1="0" x2="11" y2="18"/><line x1="12" y1="0" x2="12" y2="18"/><line x1="13" y1="0" x2="13" y2="18"/><line x1="14" y1="0" x2="14" y2="18"/><line x1="15" y1="0" x2="15" y2="18"/><line x1="16" y1="0" x2="16" y2="18"/><line x1="17" y1="0" x2="17" y2="18"/><line x1="18" y1="0" x2="18" y2="18"/>
                                        <line x1="0" y1="0" x2="18" y2="0"/><line x1="0" y1="1" x2="18" y2="1"/><line x1="0" y1="2" x2="18" y2="2"/><line x1="0" y1="3" x2="18" y2="3"/><line x1="0" y1="4" x2="18" y2="4"/><line x1="0" y1="5" x2="18" y2="5"/><line x1="0" y1="6" x2="18" y2="6"/><line x1="0" y1="7" x2="18" y2="7"/><line x1="0" y1="8" x2="18" y2="8"/><line x1="0" y1="9" x2="18" y2="9"/><line x1="0" y1="10" x2="18" y2="10"/><line x1="0" y1="11" x2="18" y2="11"/><line x1="0" y1="12" x2="18" y2="12"/><line x1="0" y1="13" x2="18" y2="13"/><line x1="0" y1="14" x2="18" y2="14"/><line x1="0" y1="15" x2="18" y2="15"/><line x1="0" y1="16" x2="18" y2="16"/><line x1="0" y1="17" x2="18" y2="17"/><line x1="0" y1="18" x2="18" y2="18"/>
                                    </g>
                                    <g fill="#3a3020">
                                        <circle cx="3" cy="3" r="0.14"/><circle cx="9" cy="3" r="0.14"/><circle cx="15" cy="3" r="0.14"/>
                                        <circle cx="3" cy="9" r="0.14"/><circle cx="9" cy="9" r="0.14"/><circle cx="15" cy="9" r="0.14"/>
                                        <circle cx="3" cy="15" r="0.14"/><circle cx="9" cy="15" r="0.14"/><circle cx="15" cy="15" r="0.14"/>
                                    </g>
                                </svg>
                                <div class="go-play-board" id="goBoard" aria-label="19路围棋棋盘"></div>
                                <div class="widget-board-overlay go-play-board-overlay pm-u-hidden" id="goBoardOverlay" hidden aria-live="polite">
                                    <div class="widget-board-dialog go-play-board-dialog" role="dialog" aria-modal="true" aria-labelledby="goOverlayTitle">
                                        <p class="widget-board-dialog-title go-play-board-dialog-title" id="goOverlayTitle"></p>
                                        <p class="widget-board-dialog-msg go-play-board-dialog-msg" id="goOverlayMsg"></p>
                                        <div class="widget-board-dialog-actions go-play-board-dialog-actions" id="goOverlayActions"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <aside class="go-play-side-panel" id="goSidePanel" aria-label="对弈信息与操作">
                        <p class="go-play-side-notice pm-u-hidden" id="goWindowPlaceholder">棋盘已在独立窗口中打开，本页仍负责房间操作与同步；请保持本页不要关闭</p>
                        <div class="go-play-side-notice go-play-side-notice--practice pm-u-hidden" id="goPracticeBanner">
                            <div id="goLocalBannerControls" class="go-local-banner-controls pm-u-hidden">
                                <div class="status-segment status-segment--inline" id="goLocalModeSegment" data-value="match" role="group" aria-label="本地模式">
                                    <button type="button" class="status-pill status-pill--enabled" data-value="setup">本地摆棋</button>
                                    <button type="button" class="status-pill status-pill--enabled is-active" data-value="match">本地对弈</button>
                                </div>
                                <div class="go-local-stone-wrap pm-u-hidden" id="goLocalStoneWrap">
                                    <div class="status-segment status-segment--inline" id="goLocalStoneSegment" data-value="alternate" role="group" aria-label="落子颜色">
                                        <button type="button" class="status-pill status-pill--enabled is-active" data-value="alternate" title="黑白交替（下一手为上一手反色）" aria-label="黑白交替">
                                            <span class="go-local-stone-opt go-local-stone-opt--both" aria-hidden="true"></span>
                                        </button>
                                        <button type="button" class="status-pill status-pill--enabled" data-value="black" title="仅黑子" aria-label="仅黑子">
                                            <span class="go-local-stone-opt go-local-stone-opt--black" aria-hidden="true"></span>
                                        </button>
                                        <button type="button" class="status-pill status-pill--enabled" data-value="white" title="仅白子" aria-label="仅白子">
                                            <span class="go-local-stone-opt go-local-stone-opt--white" aria-hidden="true"></span>
                                        </button>
                                    </div>
                                </div>
                                <p class="go-local-banner-hint" id="goLocalBannerHint"></p>
                            </div>
                            <p class="go-practice-banner-text pm-u-hidden" id="goPracticeBannerText"></p>
                        </div>

                        <div id="goRoomPanel" class="go-play-side-section pm-u-hidden">
                            <div class="go-play-side-meta">
                                <div class="go-play-side-meta-row">
                                    <span class="go-play-side-label">房间</span>
                                    <span class="go-play-room-code-group">
                                        <strong class="go-play-room-code" id="goRoomCode">------</strong>
                                        <button type="button" class="btn-secondary btn-small go-play-room-copy-btn pm-u-hidden" id="goRoomCopyBtn" title="复制加入链接与房间号" aria-label="复制加入链接与房间号">复制</button>
                                    </span>
                                </div>
                                <div class="go-play-players-head" id="goPlayersHead" aria-label="对局双方">
                                    <div class="go-play-player-slot">
                                        <div class="go-play-player-avatar go-play-player-avatar--black" id="goBlackAvatarBtn" role="button" aria-label="黑方" aria-disabled="true" tabindex="-1">
                                            <img class="go-play-player-avatar-img" id="goBlackAvatarImg" alt="" hidden>
                                            <span class="go-play-player-avatar-fallback pm-u-hidden" id="goBlackAvatarFallback" aria-hidden="true"></span>
                                            <span class="go-play-player-avatar-plus pm-u-hidden" id="goBlackAvatarPlus" aria-hidden="true">+</span>
                                        </div>
                                        <span class="go-play-player-color">
                                            <span class="go-play-player-color-stone go-play-player-color-stone--black" aria-hidden="true"></span>
                                            黑
                                        </span>
                                        <span class="go-play-player-name" id="goBlackPlayerName">—</span>
                                    </div>
                                    <div class="go-play-player-slot">
                                        <div class="go-play-player-avatar go-play-player-avatar--white" id="goWhiteAvatarBtn" role="button" aria-label="白方" aria-disabled="true" tabindex="-1">
                                            <img class="go-play-player-avatar-img" id="goWhiteAvatarImg" alt="" hidden>
                                            <span class="go-play-player-avatar-fallback pm-u-hidden" id="goWhiteAvatarFallback" aria-hidden="true"></span>
                                            <span class="go-play-player-avatar-plus pm-u-hidden" id="goWhiteAvatarPlus" aria-hidden="true">+</span>
                                        </div>
                                        <span class="go-play-player-color">
                                            <span class="go-play-player-color-stone go-play-player-color-stone--white" aria-hidden="true"></span>
                                            白
                                        </span>
                                        <span class="go-play-player-name" id="goWhitePlayerName">—</span>
                                    </div>
                                </div>
                                <p class="go-play-side-meta-line" id="goTurnLine">状态：-</p>
                                <p class="go-play-side-meta-line go-play-side-meta-line--muted" id="goUndoLine">悔棋需对方同意</p>
                            </div>
                            <div class="go-play-side-actions">
                                <button type="button" class="go-play-side-btn btn-secondary btn-small" id="goPassBtn">虚手</button>
                                <button type="button" class="go-play-side-btn btn-secondary btn-small" id="goUndoBtn">悔棋</button>
                                <button type="button" class="go-play-side-btn btn-secondary btn-small" id="goResignBtn">认输</button>
                                <button type="button" class="go-play-side-btn btn-secondary btn-small" id="goPracticeBtn" disabled>演习模式</button>
                                <button type="button" class="go-play-side-btn btn-secondary btn-small pm-u-hidden" id="goPracticeRevertBtn">撤回一步</button>
                                <button type="button" class="go-play-side-btn btn-danger btn-small pm-u-hidden" id="goPracticeEndBtn">结束演习</button>
                                <button type="button" class="go-play-side-btn btn-secondary btn-small" id="goLeaveBtn">离开房间</button>
                            </div>
                        </div>

                        <div id="goLocalPanel" class="go-play-side-section pm-u-hidden">
                            <div class="go-play-side-meta">
                                <p class="go-play-side-status" id="goLocalStatus">本地对弈 · 黑方行棋（0 手）</p>
                            </div>
                            <div class="go-play-side-actions">
                                <button type="button" class="go-play-side-btn btn-secondary btn-small" id="goLocalPassBtn">虚手</button>
                                <button type="button" class="go-play-side-btn btn-secondary btn-small" id="goLocalUndoBtn">悔一手</button>
                                <button type="button" class="go-play-side-btn btn-secondary btn-small" id="goLocalClearBtn">清空棋盘</button>
                            </div>
                        </div>

                        <p class="go-play-side-foot" id="goBoardSyncHint">在棋盘上点击落子。在线对局时请保持<strong>主页面</strong>开启以同步；本地摆棋时主页面与小窗均可落子并互相同步。</p>
                    </aside>
                    </div>
                    <div class="widget-room-chat widget-room-chat--below pm-u-hidden" id="goRoomChat" hidden aria-label="房间对话"></div>
                </div>
            </div>
        </section>
    </div>

    <footer><p>&copy; 2026 SITJOY | 内部使用</p></footer>
    <script src="/static/js/header.js"></script>
    <script src="/static/js/widget-popup-window.js"></script>
    <script src="/static/js/widget-board-overlay.js"></script>
    <script src="/static/js/widget-room.js"></script>
    <script src="/static/js/go-play.js"></script>
</body>
</html>
