<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单登记管理</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .required-field, .optional-field {
            padding: 0.65rem 0.8rem !important;
            border-radius: 6px !important;
            border: 2px solid var(--morandi-sand) !important;
            font-size: 0.95rem !important;
            width: 100%;
            box-sizing: border-box;
            background: #fff;
        }
        .optional-field { background: transparent !important; }
        .optional-field.has-value { background: #fff !important; }
        .required-field:focus, .optional-field:focus {
            outline: none !important;
            border-color: var(--morandi-ink) !important;
            box-shadow: 0 0 0 3px rgba(42, 36, 32, 0.1) !important;
        }
        .line-box {
            border: 2px solid var(--morandi-sand);
            border-radius: 8px;
            padding: 0.65rem;
            background: #fff;
            display: grid;
            gap: 0.45rem;
            min-width: 0;
        }
        .section-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
        }
        .section-title-main {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            min-width: 0;
        }
        .section-toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.65rem !important;
            font-size: 0.82rem !important;
            min-width: 0;
        }
        .line-head {
            display: grid;
            gap: 0.45rem;
            font-size: 0.82rem;
            color: var(--morandi-slate);
            padding: 0 0.2rem;
        }
        .platform-line-head { grid-template-columns: minmax(0, 1fr) 100px 64px; }
        .ship-line-head { grid-template-columns: minmax(0, 1fr) 100px 64px; }
        .logistics-line-head { grid-template-columns: minmax(0, 1fr) 64px; }
        .line-list { display: grid; gap: 0.4rem; }
        .line-row {
            display: grid;
            gap: 0.45rem;
            align-items: center;
        }
        .platform-line-row { grid-template-columns: minmax(0, 1fr) 100px 64px; }
        .ship-line-row { grid-template-columns: minmax(0, 1fr) 100px 64px; }
        .logistics-line-row { grid-template-columns: minmax(0, 1fr) 64px; }
        .line-row .btn-danger { padding: 0.35rem 0.45rem; font-size: 0.82rem; line-height: 1.15; }
        .line-row .btn-secondary { padding: 0.35rem 0.45rem; font-size: 0.82rem; line-height: 1.15; }
        .pm-table td { vertical-align: top; }
        .sku-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.9rem;
            min-width: 0;
        }
        .sku-grid.is-collapsed {
            display: none;
        }
        .status-tag {
            display: inline-block;
            padding: 0.2rem 0.45rem;
            border-radius: 999px;
            background: #f3efe9;
            color: var(--morandi-ink);
            font-size: 0.8rem;
            margin: 0.1rem 0.2rem 0.1rem 0;
        }
        .dialog-message { white-space: pre-wrap; color: var(--morandi-ink); line-height: 1.55; font-size: 0.95rem; }
        .pager-bar {
            margin-top: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: var(--morandi-slate);
        }
        .pager-actions {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }
        .pager-actions .btn-secondary { min-width: 72px; }
        #modalOrderDate {
            min-height: 42px;
            background-image: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(246,241,235,0.96));
            border: 2px solid var(--morandi-sand) !important;
            padding-right: 2.2rem !important;
            -webkit-appearance: none;
            appearance: none;
        }
        #modalOrderDate::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.8;
        }
        .ship-auto-note {
            font-size: 0.86rem;
            color: var(--morandi-slate);
            margin-top: 0.2rem;
        }
        .qty-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            height: 26px;
            border-radius: 999px;
            background: var(--morandi-sand);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .shipment-lines-container {
            position: relative;
            display: grid;
            gap: 0.4rem;
        }
        .plan-empty {
            text-align: center;
            padding: 0.8rem 0.4rem;
            color: var(--morandi-slate);
            font-size: 0.85rem;
            font-style: italic;
        }
        .shipment-plan-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 100px 64px;
            gap: 0.45rem;
            align-items: center;
            margin-left: 1.1rem;
            padding: 0.1rem 0 0.1rem 0.5rem;
            border-left: 2px dashed var(--morandi-sand);
            background: rgba(255, 255, 255, 0.58);
            border-radius: 4px;
        }
        .shipment-plan-name {
            font-size: 0.75rem;
            color: var(--morandi-slate);
            line-height: 1.15;
        }
        .plan-qty-control {
            width: 100px;
            display: grid;
            grid-template-columns: 26px minmax(0, 1fr) 26px;
            gap: 0.28rem;
            align-items: center;
        }
        .plan-qty-cell {
            height: 42px;
            border-radius: 6px;
            border: 2px solid var(--morandi-sand);
            background: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--morandi-ink);
            font-size: 0.86rem;
            font-variant-numeric: tabular-nums;
        }
        .plan-step-btn {
            width: 22px !important;
            height: 22px !important;
            padding: 0 !important;
            min-width: 22px !important;
            line-height: 1 !important;
            border-radius: 999px !important;
            font-size: 0.72rem !important;
            font-weight: 700 !important;
            border: 1px solid var(--morandi-sand) !important;
            box-shadow: none !important;
        }
        .plan-step-btn--dec {
            background: #b67f7f !important;
            color: #fff !important;
        }
        .plan-step-btn--dec:hover {
            background: #a97373 !important;
        }
        .plan-step-btn--inc {
            background: #7f9270 !important;
            color: #fff !important;
        }
        .plan-step-btn--inc:hover {
            background: #728464 !important;
        }
        .plan-source-placeholder {
            width: 64px;
        }
        #shipmentPreviewSegment .status-pill {
            background: #f3efe9;
            color: var(--morandi-ink);
            border: 1px solid var(--morandi-sand);
        }
        #shipmentPreviewSegment .status-pill.is-active {
            background: var(--morandi-ink);
            color: #fff;
            border-color: var(--morandi-ink);
            box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.12);
        }
        .summary-lines {
            display: grid;
            gap: 0.16rem;
        }
        .summary-line {
            display: block;
            font-size: 0.82rem;
            color: var(--morandi-ink);
            line-height: 1.25;
            padding: 0.08rem 0;
            border-bottom: 1px dashed rgba(207, 199, 189, 0.5);
        }
        .summary-line:last-child {
            border-bottom: none;
        }
        .list-segment {
            min-width: 150px;
        }
        .list-segment .status-pill {
            padding: 0.2rem 0.45rem;
            font-size: 0.76rem;
        }
        .list-note-wrap {
            display: grid;
            gap: 0.28rem;
            min-width: 220px;
        }
        .list-note-input,
        .list-note-area {
            width: 100%;
            border: 2px solid var(--morandi-sand);
            border-radius: 6px;
            background: #fff;
            color: var(--morandi-ink);
            font-size: 0.82rem;
            padding: 0.35rem 0.5rem;
            line-height: 1.25;
        }
        .list-note-area {
            min-height: 54px;
            resize: vertical;
        }
        .list-note-save {
            justify-self: end;
            padding: 0.2rem 0.55rem !important;
            font-size: 0.78rem !important;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>订单登记管理</h2>
            <p>登记订单基础信息、销售SKU与实际发货SKU</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin: 0;">
                            <span class="pm-search-title">搜索</span>
                            <input type="text" id="searchInput" placeholder="搜索订单号/姓名/电话/物流信息">
                            <button class="btn-primary" onclick="loadList()">搜索</button>
                            <button class="btn-secondary" onclick="resetSearch()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-secondary" onclick="downloadTemplate()">下载模板</button>
                        <button class="btn-secondary" onclick="triggerUpload()">批量上传</button>
                        <input type="file" id="uploadInput" accept=".xlsx" style="display:none;">
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-accent" onclick="openCreateModal()">新增</button>
                    </div>
                </div>
            </div>

            <div>
                <table class="pm-table" id="listTable">
                    <thead>
                        <tr>
                            <th>订单状态</th>
                            <th>是否邀评</th>
                            <th>是否已发物流邮件</th>
                            <th>店铺</th>
                            <th>订单号</th>
                            <th>日期</th>
                            <th>客户</th>
                            <th>销售平台SKU</th>
                            <th>实际发货SKU</th>
                            <th>物流信息</th>
                            <th>补偿措施 / 备注</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="12" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
                <div class="pager-bar" id="pagerBar" style="display:none;">
                    <div id="pagerInfo">第 1 页</div>
                    <div class="pager-actions">
                        <button class="btn-secondary" id="prevPageBtn" type="button">上一页</button>
                        <button class="btn-secondary" id="nextPageBtn" type="button">下一页</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div class="pm-modal" id="pm-modal">
        <div class="pm-modal-content pm-modal-content--wide">
            <h3 id="pm-modal-title" style="margin-top:0;">新增订单登记</h3>
            <div class="pm-form">
                <div class="pm-section">
                    <h4>订单基础信息</h4>
                    <div class="pm-section-body">
                        <div class="form-group">
                            <label for="modalShop">店铺</label>
                            <select id="modalShop" class="required-field"></select>
                        </div>
                        <div class="form-group">
                            <label for="modalOrderNo">订单号<span class="required-asterisk">*</span></label>
                            <input type="text" id="modalOrderNo" class="required-field" required>
                        </div>
                        <div class="form-group">
                            <label for="modalOrderDate">订单日期</label>
                            <input type="date" id="modalOrderDate" class="optional-field optional-date-input" data-optional-date="1">
                        </div>
                        <div class="form-group">
                            <label>订单状态（原运输状态）</label>
                            <div class="status-segment status-segment--inline" id="modalShippingStatusSegment" data-value="pending">
                                <button type="button" class="status-pill status-pill--pending is-active" data-value="pending">Pending</button>
                                <button type="button" class="status-pill status-pill--unshipped" data-value="unshipped">Unshipped</button>
                                <button type="button" class="status-pill status-pill--shipped" data-value="shipped">Shipped</button>
                                <button type="button" class="status-pill status-pill--cancelled" data-value="cancelled">Cancelled</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pm-section">
                    <h4 class="section-title-row">
                        <span class="section-title-main">
                            SKU信息
                            <span class="help-dot" data-tip="选择销售平台SKU 后自动生成发货SKU，可通过替代方案调整具体发货内容"></span>
                        </span>
                        <button type="button" class="btn-secondary section-toggle-btn" id="skuSectionToggleBtn" onclick="toggleSkuSection()" aria-expanded="false">
                            <span id="skuSectionToggleArrow">▾</span>
                            <span id="skuSectionToggleText">展开</span>
                        </button>
                    </h4>
                    <div class="pm-section-body sku-grid is-collapsed" id="skuSectionBody">
                        <div class="line-box">
                            <div style="display:flex; justify-content:space-between; align-items:center; gap:0.45rem;">
                                <h5 style="margin:0; flex:1;">销售平台SKU
                                    <span class="help-dot" data-tip="店铺中的销售商品 SKU，支持多条添加"></span>
                                </h5>
                            </div>
                            <div class="line-head platform-line-head"><span>销售平台SKU</span><span>数量</span><span></span></div>
                            <div id="platformLines" class="line-list"></div>
                            <div style="display:flex; justify-content:flex-start; margin-top:0.35rem;">
                                <button type="button" class="btn-accent" onclick="addPlatformLine()">新增平台SKU</button>
                            </div>
                        </div>
                        <div class="line-box">
                            <div style="display:flex; justify-content:space-between; align-items:center; gap:0.45rem;">
                                <h5 style="margin:0; flex:1;">实际发货SKU
                                    <span class="help-dot" data-tip="选择销售平台SKU后将自动生成发货SKU；有替代方案时可在下方展开并调整替代数量。"></span>
                                </h5>
                                <div style="display:flex; gap:0.6rem; align-items:center;">
                                    <div class="status-segment status-segment--inline" id="shipmentPreviewSegment" data-value="edit">
                                        <button type="button" class="status-pill is-active" data-value="edit">编辑方案</button>
                                        <button type="button" class="status-pill" data-value="preview">预览总数</button>
                                    </div>
                                    <button type="button" class="btn-secondary" onclick="clearShipmentLinesForAuto()">清除并恢复</button>
                                </div>
                            </div>
                            <div class="line-head ship-line-head"><span>实际发货SKU</span><span>数量</span><span></span></div>
                            <div id="shipmentLines" class="line-list shipment-lines-container"></div>
                        </div>
                    </div>
                </div>

                <div class="pm-section">
                    <h4>物流信息</h4>
                    <div class="pm-section-body">
                        <div class="form-group">
                            <label for="modalCustomerName">姓名</label>
                            <input type="text" id="modalCustomerName" class="optional-field">
                        </div>
                        <div class="form-group">
                            <label for="modalPhone">电话(US)</label>
                            <input type="text" id="modalPhone" class="optional-field" placeholder="例如 +1 415-888-9999">
                        </div>
                        <div class="form-group pm-form-span-2">
                            <label for="modalAddress">地址</label>
                            <input type="text" id="modalAddress" class="optional-field">
                        </div>
                        <div class="form-group">
                            <label for="modalCity">城市</label>
                            <input type="text" id="modalCity" class="optional-field">
                        </div>
                        <div class="form-group">
                            <label for="modalState">州</label>
                            <input type="text" id="modalState" class="optional-field">
                        </div>
                        <div class="form-group">
                            <label for="modalZip">邮编(US)</label>
                            <input type="text" id="modalZip" class="optional-field" placeholder="例如 94016 或 94016-1234">
                        </div>
                        <div class="line-box pm-form-full">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <h5 style="margin:0;">跟踪号（可多条）</h5>
                                <button type="button" class="btn-secondary" onclick="addLogisticsLine()">新增跟踪号</button>
                            </div>
                            <div class="line-head logistics-line-head"><span>跟踪号</span><span></span></div>
                            <div id="logisticsLines" class="line-list"></div>
                        </div>
                    </div>
                </div>

                <div class="pm-section">
                    <h4>售后状态</h4>
                    <div class="pm-section-body">
                        <div class="form-group">
                            <label>是否已发物流邮件</label>
                            <div class="status-segment status-segment--inline" id="modalIsLogisticsEmailedSegment" data-value="0">
                                <button type="button" class="status-pill status-pill--yes" data-value="1">是</button>
                                <button type="button" class="status-pill status-pill--no is-active" data-value="0">否</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>是否邀评</label>
                            <div class="status-segment status-segment--inline" id="modalIsReviewInvitedSegment" data-value="0">
                                <button type="button" class="status-pill status-pill--yes" data-value="1">是</button>
                                <button type="button" class="status-pill status-pill--no is-active" data-value="0">否</button>
                            </div>
                        </div>
                        <div class="form-group pm-form-span-2">
                            <label for="modalCompensation">补偿措施</label>
                            <input type="text" id="modalCompensation" class="optional-field">
                        </div>
                        <div class="form-group pm-form-full">
                            <label for="modalRemark">备注</label>
                            <textarea id="modalRemark" class="optional-field" rows="3" style="resize:vertical;"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            <div id="modalStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="saveFromModal()">保存</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="dialogModal">
        <div class="pm-modal-content" style="max-width: 520px;">
            <h3 id="dialogTitle" style="margin-top:0;">提示</h3>
            <div id="dialogMessage" class="dialog-message"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" id="dialogCancelBtn" style="display:none;">取消</button>
                <button class="btn-primary" id="dialogOkBtn">确定</button>
            </div>
        </div>
    </div>

    <script>
        let editId = null;
        let listCache = [];
        let shopOptions = [];
        let salesSkuOptions = [];
        let orderSkuOptions = [];
        let registrationOptionsReady = false;
        let registrationOptionsPromise = null;
        let platformLines = [];
        let shipmentLines = [];
        let baseShipmentLines = [];
        let replacementOptionsByBase = {};
        let replacementSelectionsByBase = {};
        let logisticsLines = [];
        let shipmentAutoMode = true;
        let shipmentPreviewTimer = null;
            let shipmentPreviewMode = 'edit';
        let listRequestToken = 0;
        let listPage = 1;
        const listPageSize = 50;
        let listTotal = 0;

        function showDialog({ title, message, confirmText = '确定', cancelText = '', onConfirm = null, onCancel = null }) {
            const modal = document.getElementById('dialogModal');
            const titleEl = document.getElementById('dialogTitle');
            const msgEl = document.getElementById('dialogMessage');
            const okBtn = document.getElementById('dialogOkBtn');
            const cancelBtn = document.getElementById('dialogCancelBtn');
            titleEl.textContent = title || '提示';
            msgEl.textContent = message || '';
            okBtn.textContent = confirmText || '确定';
            cancelBtn.style.display = cancelText ? '' : 'none';
            if (cancelText) cancelBtn.textContent = cancelText;
            okBtn.onclick = function() {
                modal.classList.remove('active');
                if (typeof onConfirm === 'function') onConfirm();
            };
            cancelBtn.onclick = function() {
                modal.classList.remove('active');
                if (typeof onCancel === 'function') onCancel();
            };
            modal.classList.add('active');
        }

        function showModalStatus(message, isError) {
            const el = document.getElementById('modalStatus');
            el.style.display = 'block';
            el.style.background = isError ? '#ffecec' : '#f0fff0';
            el.style.color = isError ? '#a33' : '#2f6f2f';
            el.textContent = message;
        }

        function resetModalStatus() {
            const el = document.getElementById('modalStatus');
            el.style.display = 'none';
            el.textContent = '';
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            listPage = 1;
            loadList();
        }

        function renderPager() {
            const bar = document.getElementById('pagerBar');
            const info = document.getElementById('pagerInfo');
            const prevBtn = document.getElementById('prevPageBtn');
            const nextBtn = document.getElementById('nextPageBtn');
            if (!bar || !info || !prevBtn || !nextBtn) return;
            const totalPages = Math.max(1, Math.ceil((Number(listTotal) || 0) / listPageSize));
            if ((Number(listTotal) || 0) <= 0) {
                bar.style.display = 'none';
                return;
            }
            bar.style.display = '';
            info.textContent = `第 ${listPage} / ${totalPages} 页，共 ${listTotal} 条`;
            prevBtn.disabled = listPage <= 1;
            nextBtn.disabled = listPage >= totalPages;
        }

        function renderShopSelect(selectedValue) {
            const select = document.getElementById('modalShop');
            select.innerHTML = '<option value="">请选择店铺</option>';
            shopOptions.forEach(item => {
                const op = document.createElement('option');
                op.value = item.id;
                op.textContent = item.display_name || item.shop_name || '';
                if (String(selectedValue || '') === String(item.id)) op.selected = true;
                select.appendChild(op);
            });
            if (window.refreshUniversalSingleSelect) {
                window.refreshUniversalSingleSelect(select);
            }
        }

        function renderPlatformLines() {
            const wrap = document.getElementById('platformLines');
            if (!platformLines.length) {
                wrap.innerHTML = '<div class="plan-empty">请至少添加1条销售平台SKU</div>';
                return;
            }
            wrap.innerHTML = platformLines.map((line, idx) => {
                const skuOps = salesSkuOptions.map(item => `<option value="${item.platform_sku || ''}" ${String(item.platform_sku || '') === String(line.platform_sku || '') ? 'selected' : ''}>${item.platform_sku || ''}</option>`).join('');
                return `
                    <div class="line-row platform-line-row">
                        <select class="required-field" data-platform-field="sku" data-platform-index="${idx}" data-search-placeholder="搜索销售平台SKU">
                            <option value="">请选择销售平台SKU</option>
                            ${skuOps}
                        </select>

            wrap.querySelectorAll('[data-platform-field="sku"]').forEach(el => {
                el.addEventListener('change', function() {
                    const idx = Number(this.getAttribute('data-platform-index'));
                    if (!Number.isFinite(idx) || !platformLines[idx]) return;
                    platformLines[idx].platform_sku = this.value || '';
                    scheduleShipmentPreview();
                });
            });
            wrap.querySelectorAll('[data-platform-field="qty"]').forEach(el => {
                el.addEventListener('input', function() {
                    const idx = Number(this.getAttribute('data-platform-index'));
                    if (!Number.isFinite(idx) || !platformLines[idx]) return;
                    const qty = Number(this.value);
                    platformLines[idx].quantity = Number.isFinite(qty) && qty > 0 ? Math.floor(qty) : 1;
                    scheduleShipmentPreview();
                });

            wrap.querySelectorAll('select').forEach(el => {
                if (window.refreshUniversalSingleSelect) {
                    window.refreshUniversalSingleSelect(el);
                }
            });

        function rebuildShipmentLinesFromBaseAndReplacements() {
            const shipmentQtyMap = {};
            const baseRemainMap = {};
            baseShipmentLines.forEach(base => {
                const bid = Number(base.order_product_id || 0);
                if (!bid) return;
                baseRemainMap[bid] = Math.max(0, Number(base.quantity || 0));
            });

            Object.keys(replacementSelectionsByBase).forEach(baseIdKey => {
                const baseId = Number(baseIdKey);
                const options = replacementOptionsByBase[baseIdKey] || [];
                const selected = replacementSelectionsByBase[baseIdKey] || [];
                if (!baseRemainMap[baseId]) return;

                let requested = 0;
                selected.forEach(sel => { requested += Math.max(0, Number(sel.quantity || 0)); });
                const maxCanReplace = baseRemainMap[baseId];
                if (requested > maxCanReplace) {
                    let overflow = requested - maxCanReplace;
                    for (let i = selected.length - 1; i >= 0 && overflow > 0; i -= 1) {
                        const q = Math.max(0, Number(selected[i].quantity || 0));
                        const cut = Math.min(q, overflow);
                        selected[i].quantity = q - cut;
                        overflow -= cut;
                    }
                    replacementSelectionsByBase[baseIdKey] = selected.filter(x => Number(x.quantity || 0) > 0);
                }

                (replacementSelectionsByBase[baseIdKey] || []).forEach(sel => {
                    const selQty = Math.max(0, Number(sel.quantity || 0));
                    if (!selQty) return;
                    const plan = options.find(op => Number(op.plan_id) === Number(sel.plan_id));
                    if (!plan) return;
                    baseRemainMap[baseId] = Math.max(0, Number(baseRemainMap[baseId] || 0) - selQty);
                    (plan.items || []).forEach(it => {
                        const targetId = Number(it.order_product_id || 0);
                        if (!targetId) return;
                        const unitQty = Math.max(1, Number(it.quantity || 1));
                        const key = String(targetId);
                        if (!shipmentQtyMap[key]) {
                            shipmentQtyMap[key] = {
                                order_product_id: targetId,
                                order_sku: it.order_sku || '',
                                quantity: 0,
                                source_type: 'plan',
                                shipping_plan_id: Number(sel.plan_id || 0) || null
                            };
                        }
                        shipmentQtyMap[key].quantity += selQty * unitQty;
                    });
                });
            });

            baseShipmentLines.forEach(base => {
                const bid = Number(base.order_product_id || 0);
                const remain = Math.max(0, Number(baseRemainMap[bid] || 0));
                if (!bid || remain <= 0) return;
                const key = String(bid);
                if (!shipmentQtyMap[key]) {
                    shipmentQtyMap[key] = {
                        order_product_id: bid,
                        order_sku: base.order_sku || '',
                        quantity: 0,
                        source_type: 'auto',
                        shipping_plan_id: null
                    };
                }
                shipmentQtyMap[key].quantity += remain;
            });

            shipmentLines = Object.values(shipmentQtyMap)
                .filter(x => Number(x.quantity || 0) > 0)
                .sort((a, b) => String(a.order_sku || '').localeCompare(String(b.order_sku || '')));
        }

        function requestShipmentPreviewFromPlatform(applyAutoShipment = true) {
            const cleanPlatform = platformLines
                .map(x => ({
                    platform_sku: String(x.platform_sku || '').trim(),
                    quantity: Math.max(1, Number(x.quantity || 1))
                }))
                .filter(x => x.platform_sku);

            if (!cleanPlatform.length) {
                baseShipmentLines = [];
                replacementOptionsByBase = {};
                replacementSelectionsByBase = {};
                shipmentLines = [];
                renderShipmentLines();
                return;
            }

            fetch('/api/sales-order-registration?action=shipment_preview', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ platform_items: cleanPlatform })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        showModalStatus(data.message || '自动计算发货SKU失败', true);
                        return;
                    }
                    baseShipmentLines = (data.auto_shipments || []).map(x => ({
                        order_product_id: Number(x.order_product_id || 0),
                        order_sku: x.order_sku || '',
                        quantity: Math.max(1, Number(x.quantity || 1))
                    }));
                    replacementOptionsByBase = data.replacement_options || {};

                    const validSelections = {};
                    Object.keys(replacementSelectionsByBase || {}).forEach(baseKey => {
                        const options = replacementOptionsByBase[baseKey] || [];
                        const optionIds = new Set(options.map(op => Number(op.plan_id || 0)));
                        const rows = (replacementSelectionsByBase[baseKey] || []).filter(x => optionIds.has(Number(x.plan_id || 0)));
                        if (rows.length) validSelections[baseKey] = rows;
                    });
                    replacementSelectionsByBase = validSelections;

                    if (applyAutoShipment) {
                        rebuildShipmentLinesFromBaseAndReplacements();
                    }
                    renderShipmentLines();
                })
                .catch(err => {
                    showModalStatus('自动计算发货SKU失败: ' + err, true);
                });
        }

        function scheduleShipmentPreview() {
            if (shipmentPreviewTimer) {
                clearTimeout(shipmentPreviewTimer);

            shipmentPreviewTimer = setTimeout(() => {

                requestShipmentPreviewFromPlatform();

        }

        function renderShipmentLines() {
            const wrap = document.getElementById('shipmentLines');
            const isPreviewMode = shipmentPreviewMode === 'preview';
            if (!shipmentLines.length && !baseShipmentLines.length) {
                wrap.innerHTML = '<div class="plan-empty">当前为空：保存时将按销售SKU自动计算实际发货SKU</div>';
                return;
            }
            const rows = [];
            const currentMap = {};
            shipmentLines.forEach(line => {
                const id = Number(line.order_product_id || 0);
                if (!id) return;
                currentMap[String(id)] = line;
            });

            if (isPreviewMode) {
                const previewRows = shipmentLines.filter(x => Number(x.quantity || 0) > 0);
                if (!previewRows.length) {
                    wrap.innerHTML = '<div class="plan-empty">当前预览为空</div>';
                    return;
                }
                previewRows.forEach((line, idx) => {
                    rows.push(`
                        <div class="line-row ship-line-row" data-ship-idx="${idx}">
                            <input type="text" class="required-field" value="${line.order_sku || ''}" readonly>
                            <input type="number" min="0" step="1" class="required-field" value="${Math.max(0, Number(line.quantity || 0))}" readonly>
                            <button class="btn-secondary" type="button" title="来源：${line.source_type || 'auto'}">${line.source_type === 'plan' ? '方案' : '自动'}</button>
                        </div>
                    `);
                });
            } else {
                const baseIds = new Set();
                baseShipmentLines.forEach((base, idx) => {
                    const baseId = Number(base.order_product_id || 0);
                    if (!baseId) return;
                    baseIds.add(baseId);
                    const current = currentMap[String(baseId)] || null;
                    const qty = current ? Math.max(0, Number(current.quantity || 0)) : 0;
                    rows.push(`
                        <div class="line-row ship-line-row" data-ship-idx="${idx}">
                            <input type="text" class="required-field" value="${base.order_sku || ''}" readonly>
                            <input type="number" min="0" step="1" class="required-field" value="${qty}" readonly>
                            <button class="btn-secondary" type="button" title="来源：${(current && current.source_type) || 'auto'}">${(current && current.source_type) === 'plan' ? '方案' : '自动'}</button>
                        </div>
                    `);

                    const options = replacementOptionsByBase[String(baseId)] || [];
                    const selected = replacementSelectionsByBase[String(baseId)] || [];
                    options.forEach(op => {
                        const cur = selected.find(x => Number(x.plan_id) === Number(op.plan_id));
                        const curQty = Math.max(0, Number((cur && cur.quantity) || 0));
                        const summary = (op.items || []).map(i => (i.order_sku || '') + '*' + Math.max(1, Number(i.quantity || 1))).join(' + ');
                        rows.push(
                            '<div class="shipment-plan-row">' +
                                '<div class="shipment-plan-name">' + (op.plan_name || ('方案#' + op.plan_id)) + '：' + summary + '</div>' +
                                '<div class="plan-qty-control">' +
                                    '<button type="button" class="plan-step-btn plan-step-btn--dec" data-replace-op="dec" data-base-id="' + baseId + '" data-plan-id="' + op.plan_id + '">-</button>' +
                                    '<span class="plan-qty-cell">' + curQty + '</span>' +
                                    '<button type="button" class="plan-step-btn plan-step-btn--inc" data-replace-op="inc" data-base-id="' + baseId + '" data-plan-id="' + op.plan_id + '">+</button>' +
                                '</div>' +
                                '<div class="plan-source-placeholder"></div>' +
                            '</div>'
                        );
                    });
                });

                shipmentLines.forEach((line, idx) => {
                    const id = Number(line.order_product_id || 0);
                    if (!id || baseIds.has(id) || Number(line.quantity || 0) <= 0) return;
                    rows.push(`
                        <div class="line-row ship-line-row" data-ship-idx="extra-${idx}">
                            <input type="text" class="required-field" value="${line.order_sku || ''}" readonly>
                            <input type="number" min="0" step="1" class="required-field" value="${Math.max(0, Number(line.quantity || 0))}" readonly>
                            <button class="btn-secondary" type="button" title="来源：${line.source_type || 'plan'}">方案</button>
                        </div>
                    `);
                });
            }
            
            wrap.innerHTML = rows.join('');

            wrap.querySelectorAll('[data-replace-op="dec"]').forEach(el => {
                el.addEventListener('click', function() {
                    const baseId = Number(this.getAttribute('data-base-id'));
                    const planId = Number(this.getAttribute('data-plan-id'));
                    const key = String(baseId);
                    const list = replacementSelectionsByBase[key] || [];
                    const idx = list.findIndex(x => Number(x.plan_id) === planId);
                    if (idx < 0) return;
                    list[idx].quantity = Math.max(0, Number(list[idx].quantity || 0) - 1);
                    if (Number(list[idx].quantity || 0) <= 0) {
                        list.splice(idx, 1);
                    }
                    replacementSelectionsByBase[key] = list;
                    rebuildShipmentLinesFromBaseAndReplacements();
                    renderShipmentLines();
                });
            });
            
            wrap.querySelectorAll('[data-replace-op="inc"]').forEach(el => {
                el.addEventListener('click', function() {
                    const baseId = Number(this.getAttribute('data-base-id'));
                    const planId = Number(this.getAttribute('data-plan-id'));
                    const key = String(baseId);
                    replacementSelectionsByBase[key] = replacementSelectionsByBase[key] || [];
                    const list = replacementSelectionsByBase[key];
                    const idx = list.findIndex(x => Number(x.plan_id) === planId);
                    if (idx >= 0) {
                        list[idx].quantity = Math.max(1, Number(list[idx].quantity || 1) + 1);
                    } else {
                        list.push({ plan_id: planId, quantity: 1 });
                    }
                    replacementSelectionsByBase[key] = list;
                    rebuildShipmentLinesFromBaseAndReplacements();
                    renderShipmentLines();
                });
            });
        }

        function _formatLogisticsLineText(line) {
            const carrier = String(line && line.shipping_carrier ? line.shipping_carrier : '').trim();
            const tracking = String(line && line.tracking_no ? line.tracking_no : '').trim();
            if (carrier && tracking) return carrier + ':' + tracking;
            return carrier || tracking;
        }

        function _parseLogisticsLineText(value) {
            const text = String(value == null ? '' : value).trim();
            if (!text) {
                return { shipping_carrier: '', tracking_no: '' };
            }
            const colonIndex = text.indexOf(':');
            if (colonIndex > 0) {
                return {
                    shipping_carrier: text.slice(0, colonIndex).trim(),
                    tracking_no: text.slice(colonIndex + 1).trim()
                };
            }
            return { shipping_carrier: '', tracking_no: text };
        }

                    <button class="btn-danger" type="button" onclick="removeLogisticsLine(${idx})">删除</button>
                </div>
            `).join('');
            wrap.querySelectorAll('[data-logi-field="tracking"]').forEach(el => {
                el.addEventListener('input', function() {
                    const idx = Number(this.getAttribute('data-logi-index'));
                    if (!Number.isFinite(idx) || !logisticsLines[idx]) return;

                    logisticsLines[idx].shipping_carrier = parsed.shipping_carrier || '';
                    logisticsLines[idx].tracking_no = parsed.tracking_no || '';
                });
            });

                shipping_status: document.getElementById('modalShippingStatusSegment').dataset.value || 'pending',
                is_review_invited: Number(document.getElementById('modalIsReviewInvitedSegment').dataset.value || '0'),
                is_logistics_emailed: Number(document.getElementById('modalIsLogisticsEmailedSegment').dataset.value || '0'),
                compensation_action: document.getElementById('modalCompensation').value.trim(),
                remark: document.getElementById('modalRemark').value.trim(),
                logistics_items: cleanLogistics,
                platform_items: cleanPlatform,
                shipment_items: cleanShipment
            };
        }

        function saveFromModal() {
            const payload = collectPayload();
            if (!payload.order_no) {
                showModalStatus('订单号必填', true);
                return;
            }
            if (!payload.platform_items.length) {
                showModalStatus('请至少填写1条销售平台SKU', true);
                return;
            }
            const method = editId ? 'PUT' : 'POST';
            fetch('/api/sales-order-registration', {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        showModalStatus(data.message || '保存失败', true);
                        return;
                    }
                    showModalStatus('保存成功', false);
                    closeModal();
                    loadList();
                })
                .catch(err => showModalStatus('请求失败: ' + err, true));
        }

        function deleteItem(id) {
            showDialog({
                title: '删除确认',
                message: '确认删除该订单登记？',
                confirmText: '确认删除',
                cancelText: '取消',
                onConfirm: function() {
                    fetch('/api/sales-order-registration', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id })
                    })
                        .then(r => r.json())
                        .then(data => {
                            if (data.status !== 'success') {
                                showDialog({ title: '删除失败', message: data.message || '删除失败' });
                                return;
                            }
                            loadList();
                        })
                        .catch(err => showDialog({ title: '请求失败', message: '请求失败: ' + err }));
                }
            });
        }

        function _escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function _summaryLines(values, loading) {
            if (loading) return '<span class="status-tag">加载中...</span>';
            const arr = Array.isArray(values) ? values.filter(Boolean) : [];
            if (!arr.length) return '<span class="status-tag">-</span>';
            return '<div class="summary-lines">' + arr.map(x => '<span class="summary-line">' + _escapeHtml(x) + '</span>').join('') + '</div>';
        }

        function notifyToast(message, isError) {
            if (window.showAppToast) {
                window.showAppToast(message, !!isError, isError ? 3200 : 2200);
                return;
            }
            showDialog({ title: isError ? '提示' : '成功', message: String(message || '') });
        }

        function saveRegistrationPatch(id, patch, done) {
            const payload = Object.assign({ id }, patch || {});
            fetch('/api/sales-order-registration?action=quick_update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        throw new Error(data.message || '保存失败');
                    }
                    if (typeof done === 'function') done(null, data);
                })
                .catch(err => {
                    if (typeof done === 'function') done(err);
                });
        }

        function saveListQuickStatus(id, field, value) {
            const patch = {};
            patch[field] = value;
            saveRegistrationPatch(id, patch, function(err) {
                if (err) {
                    notifyToast(String(err && err.message ? err.message : err), true);
                    return;
                }
                listCache = (listCache || []).map(item => {
                    if (Number(item.id || 0) !== Number(id || 0)) return item;
                    const next = { ...item };
                    next[field] = value;
                    return next;
                });
                renderList(listCache);
                notifyToast('保存成功', false);
            });
        }

        function saveListCompRemark(id) {
            const compEl = document.getElementById('listComp-' + id);
            const remarkEl = document.getElementById('listRemark-' + id);
            const compensation_action = compEl ? String(compEl.value || '').trim() : '';
            const remark = remarkEl ? String(remarkEl.value || '').trim() : '';
            showDialog({
                title: '批量保存确认',
                message: '确认保存补偿措施与备注？',
                confirmText: '保存',
                cancelText: '取消',
                onConfirm: function() {
                    saveRegistrationPatch(id, { compensation_action, remark }, function(err) {
                        if (err) {
                            notifyToast(String(err && err.message ? err.message : err), true);
                            return;
                        }
                        listCache = (listCache || []).map(item => {
                            if (Number(item.id || 0) !== Number(id || 0)) return item;
                            return {
                                ...item,
                                compensation_action,
                                remark
                            };
                        });
                        renderList(listCache);
                        notifyToast('保存成功', false);
                    });
                }
            });
        }

        function renderList(items) {
            const tbody = document.querySelector('#listTable tbody');
            if (!Array.isArray(items) || !items.length) {
                tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = items.map(item => {
                const platformText = _summaryLines(item.platform_summary, item.summary_loading);
                const shipmentText = _summaryLines(item.shipment_summary, item.summary_loading);
                const logisticsText = _summaryLines(item.logistics_summary, item.summary_loading);
                const shippingStatus = String(item.shipping_status || 'pending');
                const isReviewInvited = Number(item.is_review_invited || 0);
                const isLogisticsEmailed = Number(item.is_logistics_emailed || 0);
                return `
                    <tr>
                        <td>
                            <div class="status-segment status-segment--inline list-segment" data-value="${shippingStatus}">
                                <button type="button" class="status-pill status-pill--pending ${shippingStatus === 'pending' ? 'is-active' : ''}" onclick="saveListQuickStatus(${item.id}, 'shipping_status', 'pending')">Pending</button>
                                <button type="button" class="status-pill status-pill--unshipped ${shippingStatus === 'unshipped' ? 'is-active' : ''}" onclick="saveListQuickStatus(${item.id}, 'shipping_status', 'unshipped')">Unshipped</button>
                                <button type="button" class="status-pill status-pill--shipped ${shippingStatus === 'shipped' ? 'is-active' : ''}" onclick="saveListQuickStatus(${item.id}, 'shipping_status', 'shipped')">Shipped</button>
                                <button type="button" class="status-pill status-pill--cancelled ${shippingStatus === 'cancelled' ? 'is-active' : ''}" onclick="saveListQuickStatus(${item.id}, 'shipping_status', 'cancelled')">Cancelled</button>
                            </div>
                        </td>
                        <td>
                            <div class="status-segment status-segment--inline list-segment" data-value="${isReviewInvited}">
                                <button type="button" class="status-pill status-pill--yes ${isReviewInvited === 1 ? 'is-active' : ''}" onclick="saveListQuickStatus(${item.id}, 'is_review_invited', 1)">是</button>
                                <button type="button" class="status-pill status-pill--no ${isReviewInvited === 0 ? 'is-active' : ''}" onclick="saveListQuickStatus(${item.id}, 'is_review_invited', 0)">否</button>
                            </div>
                        </td>
                        <td>
                            <div class="status-segment status-segment--inline list-segment" data-value="${isLogisticsEmailed}">
                                <button type="button" class="status-pill status-pill--yes ${isLogisticsEmailed === 1 ? 'is-active' : ''}" onclick="saveListQuickStatus(${item.id}, 'is_logistics_emailed', 1)">是</button>
                                <button type="button" class="status-pill status-pill--no ${isLogisticsEmailed === 0 ? 'is-active' : ''}" onclick="saveListQuickStatus(${item.id}, 'is_logistics_emailed', 0)">否</button>
                            </div>
                        </td>
                        <td>${item.shop_display_name || item.shop_name || ''}</td>
                        <td>${item.order_no || ''}</td>
                        <td>${item.order_date ? String(item.order_date).slice(0, 10) : ''}</td>
                        <td>${item.customer_name || ''}</td>
                        <td>${platformText || ''}</td>
                        <td>${shipmentText || '<span class="status-tag">-</span>'}</td>
                        <td>${logisticsText || ''}</td>
                        <td>
                            <div class="list-note-wrap">
                                <input id="listComp-${item.id}" class="list-note-input" type="text" value="${_escapeHtml(item.compensation_action || '')}" placeholder="补偿措施">
                                <textarea id="listRemark-${item.id}" class="list-note-area" placeholder="备注">${_escapeHtml(item.remark || '')}</textarea>
                                <button type="button" class="btn-secondary list-note-save" onclick="saveListCompRemark(${item.id})">保存</button>
                            </div>
                        </td>
                        <td>
                            <div class="pm-actions">
                                <button class="btn-secondary" onclick='openEditModal(${JSON.stringify(item)})'>编辑</button>
                                <button class="btn-danger" onclick='deleteItem(${item.id})'>删除</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function loadSummariesAsync(items, token) {
            const ids = (items || []).map(item => Number(item.id || 0)).filter(v => v > 0);
            if (!ids.length) return;
            const url = `/api/sales-order-registration?action=summaries&ids=${encodeURIComponent(ids.join(','))}`;
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (token !== listRequestToken) return;
                    if (data.status !== 'success') return;
                    const summaryMap = {};
                    (data.items || []).forEach(item => {
                        if (!item || !item.id) return;
                        summaryMap[String(item.id)] = item;
                    });
                    listCache = listCache.map(item => {
                        const found = summaryMap[String(item.id)] || null;
                        if (!found) {
                            return { ...item, summary_loading: false, platform_summary: [], shipment_summary: [], logistics_summary: [] };
                        }
                        return {
                            ...item,
                            summary_loading: false,
                            platform_summary: Array.isArray(found.platform_summary) ? found.platform_summary : [],
                            shipment_summary: Array.isArray(found.shipment_summary) ? found.shipment_summary : [],
                            logistics_summary: Array.isArray(found.logistics_summary) ? found.logistics_summary : []
                        };
                    });
                    renderList(listCache);
                })
                .catch(() => {});
        }

        function loadList() {
            const currentToken = ++listRequestToken;
            const q = document.getElementById('searchInput').value.trim();
            const query = new URLSearchParams();
            if (q) query.set('q', q);
            query.set('page', String(listPage));
            query.set('page_size', String(listPageSize));
            query.set('include_summaries', '0');
            const url = `/api/sales-order-registration?${query.toString()}`;
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (currentToken !== listRequestToken) return;
                    if (data.status !== 'success') {
                        document.querySelector('#listTable tbody').innerHTML = `<tr><td colspan="12" style="text-align:center; color:#a33;">${data.message || '加载失败'}</td></tr>`;
                        listTotal = 0;
                        renderPager();
                        return;
                    }
                    const pageFromApi = Number(data.page || listPage || 1);
                    if (Number.isFinite(pageFromApi) && pageFromApi > 0) {
                        listPage = pageFromApi;
                    }
                    listTotal = Number(data.total || 0);
                    listCache = (data.items || []).map(item => ({
                        ...item,
                        summary_loading: true,
                        platform_summary: Array.isArray(item.platform_summary) ? item.platform_summary : [],
                        shipment_summary: Array.isArray(item.shipment_summary) ? item.shipment_summary : [],
                        logistics_summary: Array.isArray(item.logistics_summary) ? item.logistics_summary : []
                    }));
                    renderList(listCache);
                    renderPager();
                    loadSummariesAsync(listCache, currentToken);
                })
                .catch(err => {
                    if (currentToken !== listRequestToken) return;
                    document.querySelector('#listTable tbody').innerHTML = `<tr><td colspan="12" style="text-align:center; color:#a33;">加载失败: ${err}</td></tr>`;
                    listTotal = 0;
                    renderPager();
                });
        }

        function downloadTemplate() {
            window.location.href = '/api/sales-order-registration-template';
        }

        function triggerUpload() {
            document.getElementById('uploadInput').click();
        }

        function uploadTemplate(file) {
            const formData = new FormData();
            formData.append('file', file);
            fetch('/api/sales-order-registration-import', {
                method: 'POST',
                body: formData
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        showDialog({ title: '导入失败', message: data.message || '导入失败' });
                        return;
                    }
                    const errorCount = (data.errors || []).length;
                    showDialog({
                        title: '导入完成',
                        message: `导入完成：新增 ${data.created || 0} 条，更新 ${data.updated || 0} 条，失败 ${errorCount} 条`
                    });
                    loadList();
                })
                .catch(err => showDialog({ title: '请求失败', message: '请求失败: ' + err }));
        }

        function updateOptionalFieldStyle(el) {
            if (!el || !el.classList) return;
            if (String(el.value || '').trim()) el.classList.add('has-value');
            else el.classList.remove('has-value');
        }

        function initOptionalFieldListeners() {
            document.querySelectorAll('.optional-field').forEach(field => {
                updateOptionalFieldStyle(field);
                field.addEventListener('input', function() { updateOptionalFieldStyle(this); });
                field.addEventListener('change', function() { updateOptionalFieldStyle(this); });
            });
        }

        window.addEventListener('load', loadList);
        window.addEventListener('load', initOptionalFieldListeners);
        window.addEventListener('load', function() {
            setSkuSectionCollapsed(true);
        });
        window.addEventListener('load', function() {
            bindSegment('modalShippingStatusSegment');
            bindSegment('modalIsReviewInvitedSegment');
            bindSegment('modalIsLogisticsEmailedSegment');
        });

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                listPage = 1;
                loadList();
            }
        });
        document.getElementById('prevPageBtn').addEventListener('click', function() {
            if (listPage <= 1) return;
            listPage -= 1;
            loadList();
        });
        document.getElementById('nextPageBtn').addEventListener('click', function() {
            const totalPages = Math.max(1, Math.ceil((Number(listTotal) || 0) / listPageSize));
            if (listPage >= totalPages) return;
            listPage += 1;
            loadList();
        });
        document.getElementById('pm-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.getElementById('dialogModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });
        document.getElementById('uploadInput').addEventListener('change', function() {
            const file = this.files && this.files[0];
            if (file) uploadTemplate(file);
            this.value = '';
        });
    </script>
</body>
<script src="/static/js/header.js"></script>
</html>
