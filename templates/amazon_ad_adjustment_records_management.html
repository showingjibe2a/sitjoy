<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon广告管理 - 广告调整记录</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .btn-quick-small {
            padding: 0.3rem 0.55rem;
            font-size: 0.78rem;
            line-height: 1;
        }
        .aar-filter-hint {
            font-size: 0.86rem;
            color: var(--morandi-slate);
            margin: 0.35rem 0 0;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.2rem;">
            <h2>Amazon广告管理 - 广告调整记录</h2>
            <p>查看与管理广告调整提交记录，支持按广告筛选与关键字搜索</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar" style="margin-bottom: 0.6rem;">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin:0;">
                            <span class="pm-search-title">搜索</span>
                            <input type="text" id="recordSearchInput" placeholder="广告名/操作/对象/原因等">
                            <button type="button" class="btn-primary" onclick="applyRecordFilter()">搜索</button>
                            <button type="button" class="btn-secondary" onclick="clearRecordFilter()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button type="button" class="btn-secondary" onclick="downloadAdjustmentTemplate()">下载模板</button>
                        <button type="button" class="btn-secondary" onclick="triggerAdjustmentUpload()">批量上传</button>
                        <input type="file" id="adjustmentUploadInput" accept=".xlsx" style="display:none;">
                        <button type="button" class="btn-secondary" onclick="loadRecords()">刷新</button>
                        <a href="/amazon-ad-adjustment-management" class="btn-secondary" style="text-decoration:none;">前往广告调整</a>
                    </div>
                </div>
                <p class="aar-filter-hint" id="recordFilterHint" style="display:none;"></p>
                <div style="overflow:auto;">
                    <table class="pm-table" id="recordTable" style="min-width: 1600px;">
                        <thead>
                            <tr>
                                <th data-manage-col-key="调整日期">调整日期</th>
                                <th data-manage-col-key="关联广告">关联广告</th>
                                <th data-manage-col-key="操作类型">操作类型</th>
                                <th data-manage-col-key="对象">对象</th>
                                <th data-manage-col-key="修改前">修改前</th>
                                <th data-manage-col-key="修改后">修改后</th>
                                <th data-manage-col-key="原因">原因</th>
                                <th data-manage-col-key="开始时间">开始时间</th>
                                <th data-manage-col-key="结束时间">结束时间</th>
                                <th data-manage-col-key="曝光">曝光</th>
                                <th data-manage-col-key="点击">点击</th>
                                <th data-manage-col-key="花费">花费</th>
                                <th data-manage-col-key="订单">订单</th>
                                <th data-manage-col-key="销售额">销售额</th>
                                <th data-manage-col-key="ACOS">ACOS</th>
                                <th data-manage-col-key="CPC">CPC</th>
                                <th data-manage-col-key="CTR">CTR</th>
                                <th data-manage-col-key="CVR">CVR</th>
                                <th data-manage-col-key="首页首位IS">首页首位IS</th>
                                <th data-manage-col-key="归因检查">归因检查</th>
                                <th data-manage-col-key="归因订单">归因订单</th>
                                <th data-manage-col-key="归因销售额">归因销售额</th>
                                <th data-manage-col-key="备注">备注</th>
                                <th data-manage-col-key="提交类型">类型</th>
                                <th data-manage-col-key="行操作" data-disable-sort="1">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="25" style="text-align:center;">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        let recordsRaw = [];
        let recordsFiltered = [];
        let filterAdItemId = '';

        function formatDateTime(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return value;
            return d.toLocaleString('zh-CN');
        }

        function aaSaveResult(options) {
            if (window.showAppSaveResult) window.showAppSaveResult(options);
        }

        function recordSearchText(item) {
            return [
                item.ad_name,
                item.operation_name,
                item.target_object,
                item.before_value,
                item.after_value,
                item.reason_name,
                item.remark,
                item.impressions,
                item.clicks,
                item.cost,
                item.orders,
                item.sales
            ].filter(Boolean).join(' ').toLowerCase();
        }

        function updateFilterHint() {
            const el = document.getElementById('recordFilterHint');
            if (!el) return;
            if (filterAdItemId) {
                el.style.display = 'block';
                el.textContent = `当前仅显示广告 ID=${filterAdItemId} 的记录（来自广告调整页）。`;
            } else {
                el.style.display = 'none';
                el.textContent = '';
            }
        }

        function applyRecordFilter() {
            const keyword = (document.getElementById('recordSearchInput')?.value || '').trim().toLowerCase();
            recordsFiltered = (recordsRaw || []).filter(item => {
                if (!keyword) return true;
                return recordSearchText(item).includes(keyword);
            });
            renderRecordTable();
        }

        function clearRecordFilter() {
            const input = document.getElementById('recordSearchInput');
            if (input) input.value = '';
            applyRecordFilter();
        }

        function sortCell(value) {
            const text = value === null || value === undefined ? '' : String(value).trim();
            return text ? ` data-sort-value="${escapeHtml(text)}"` : '';
        }

        function escapeHtml(text) {
            return String(text ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function recordManagedTableApi() {
            return window.SitjoyManagedPmTable || null;
        }

        function beginRecordTableBodyUpdate() {
            const api = recordManagedTableApi();
            if (api && typeof api.beginBodyUpdate === 'function') {
                api.beginBodyUpdate(document.getElementById('recordTable'));
            }
        }

        function endRecordTableBodyUpdate() {
            const api = recordManagedTableApi();
            if (api && typeof api.endBodyUpdate === 'function') {
                api.endBodyUpdate(document.getElementById('recordTable'));
            }
        }

        function renderRecordTable() {
            const tbody = document.querySelector('#recordTable tbody');
            if (!tbody) return;
            const items = recordsFiltered || [];
            beginRecordTableBodyUpdate();
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="25" style="text-align:center;">暂无调整记录</td></tr>';
                endRecordTableBodyUpdate();
                return;
            }
            tbody.innerHTML = items.map(item => {
                const adName = item.ad_name || '';
                const levelText = item.ad_level === 'group' ? '广告组' : (item.ad_level === 'campaign' ? '广告活动' : item.ad_level || '');
                const attrChecked = String(item.attribution_checked || '0') === '1' ? '是' : '否';
                return `
                    <tr>
                        <td data-manage-col-key="调整日期"${sortCell(item.adjust_date)}>${formatDateTime(item.adjust_date)}</td>
                        <td data-manage-col-key="关联广告"${sortCell(`${adName}（${levelText}）`)}>${escapeHtml(adName)}（${escapeHtml(levelText)}）</td>
                        <td data-manage-col-key="操作类型"${sortCell(item.operation_name)}>${escapeHtml(item.operation_name || '')}</td>
                        <td data-manage-col-key="对象"${sortCell(item.target_object)}>${escapeHtml(item.target_object || '')}</td>
                        <td data-manage-col-key="修改前"${sortCell(item.before_value)}>${escapeHtml(item.before_value || '')}</td>
                        <td data-manage-col-key="修改后"${sortCell(item.after_value)}>${escapeHtml(item.after_value || '')}</td>
                        <td data-manage-col-key="原因"${sortCell(item.reason_name)}>${escapeHtml(item.reason_name || '')}</td>
                        <td data-manage-col-key="开始时间"${sortCell(item.start_time)}>${formatDateTime(item.start_time)}</td>
                        <td data-manage-col-key="结束时间"${sortCell(item.end_time)}>${formatDateTime(item.end_time)}</td>
                        <td data-manage-col-key="曝光"${sortCell(item.impressions)}>${escapeHtml(item.impressions || '')}</td>
                        <td data-manage-col-key="点击"${sortCell(item.clicks)}>${escapeHtml(item.clicks || '')}</td>
                        <td data-manage-col-key="花费"${sortCell(item.cost)}>${escapeHtml(item.cost || '')}</td>
                        <td data-manage-col-key="订单"${sortCell(item.orders)}>${escapeHtml(item.orders || '')}</td>
                        <td data-manage-col-key="销售额"${sortCell(item.sales)}>${escapeHtml(item.sales || '')}</td>
                        <td data-manage-col-key="ACOS"${sortCell(item.acos)}>${escapeHtml(item.acos || '')}</td>
                        <td data-manage-col-key="CPC"${sortCell(item.cpc)}>${escapeHtml(item.cpc || '')}</td>
                        <td data-manage-col-key="CTR"${sortCell(item.ctr)}>${escapeHtml(item.ctr || '')}</td>
                        <td data-manage-col-key="CVR"${sortCell(item.cvr)}>${escapeHtml(item.cvr || '')}</td>
                        <td data-manage-col-key="首页首位IS"${sortCell(item.top_of_search_is)}>${escapeHtml(item.top_of_search_is || '')}</td>
                        <td data-manage-col-key="归因检查"${sortCell(attrChecked === '是' ? '1' : '0')}>${attrChecked}</td>
                        <td data-manage-col-key="归因订单"${sortCell(item.attribution_orders)}>${escapeHtml(item.attribution_orders || '')}</td>
                        <td data-manage-col-key="归因销售额"${sortCell(item.attribution_sales)}>${escapeHtml(item.attribution_sales || '')}</td>
                        <td data-manage-col-key="备注"${sortCell(item.remark)}>${escapeHtml(item.remark || '')}</td>
                        <td data-manage-col-key="提交类型"${sortCell(String(item.is_quick_submit || '0') === '1' ? '快速提交' : '完整提交')}>${String(item.is_quick_submit || '0') === '1' ? '快速提交' : '完整提交'}</td>
                        <td data-manage-col-key="行操作"><button class="btn-danger btn-quick-small" onclick="deleteRecord(${item.id})">删除</button></td>
                    </tr>
                `;
            }).join('');
            endRecordTableBodyUpdate();
        }

        async function deleteRecord(id) {
            const ok = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({ title: '删除确认', message: '确定删除该条调整记录吗？', confirmText: '确认删除' })
                : false;
            if (!ok) return;
            fetch('/api/amazon-ad-adjustment', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    aaSaveResult({ action: 'delete', isError: true, message: data.message || '删除失败' });
                    return;
                }
                loadRecords();
                aaSaveResult({ action: 'delete' });
            })
            .catch(err => aaSaveResult({ action: 'delete', isError: true, message: '删除失败: ' + err }));
        }

        function loadRecords() {
            const base = '/api/amazon-ad-adjustment';
            const url = filterAdItemId ? `${base}?ad_item_id=${encodeURIComponent(filterAdItemId)}` : base;
            const tbody = document.querySelector('#recordTable tbody');
            if (tbody) {
                beginRecordTableBodyUpdate();
                tbody.innerHTML = '<tr><td colspan="25" style="text-align:center;">加载中...</td></tr>';
                endRecordTableBodyUpdate();
            }
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        if (tbody) {
                            beginRecordTableBodyUpdate();
                            tbody.innerHTML = `<tr><td colspan="25" style="text-align:center; color:#a33;">${escapeHtml(data.message || '加载失败')}</td></tr>`;
                            endRecordTableBodyUpdate();
                        }
                        if (window.showAppToast) window.showAppToast(data.message || '加载失败', true, 6500);
                        return;
                    }
                    recordsRaw = data.items || [];
                    applyRecordFilter();
                })
                .catch(err => {
                    if (tbody) {
                        beginRecordTableBodyUpdate();
                        tbody.innerHTML = `<tr><td colspan="25" style="text-align:center; color:#a33;">加载失败: ${escapeHtml(String(err))}</td></tr>`;
                        endRecordTableBodyUpdate();
                    }
                    if (window.showAppToast) window.showAppToast('加载失败: ' + err, true, 6500);
                });
        }

        function parseUrlFilter() {
            try {
                const params = new URLSearchParams(window.location.search || '');
                filterAdItemId = String(params.get('ad_item_id') || '').trim();
            } catch (e) {
                filterAdItemId = '';
            }
            updateFilterHint();
        }

        function downloadAdjustmentTemplate() {
            window.location.href = '/api/amazon-ad-adjustment-template';
        }

        function triggerAdjustmentUpload() {
            document.getElementById('adjustmentUploadInput')?.click();
        }

        function uploadAdjustmentTemplate(file) {
            if (!file) return;
            const runUpload = window.uploadBatchImportFile
                ? window.uploadBatchImportFile({
                    file,
                    url: '/api/amazon-ad-adjustment-import',
                    title: '广告调整记录导入',
                    uploadSummary: '正在上传调整记录文件',
                    processSummary: '正在解析并写入调整记录',
                }).then(data => {
                    if (window.handleBatchImportResponse) {
                        return window.handleBatchImportResponse(data, {
                            title: '广告调整记录导入',
                            onSuccess: () => loadRecords(),
                        });
                    }
                    if (data.status === 'success') loadRecords();
                    return data;
                })
                : fetch('/api/amazon-ad-adjustment-import', { method: 'POST', body: (() => {
                    const fd = new FormData();
                    fd.append('file', file);
                    return fd;
                })() }).then(r => r.json()).then(data => {
                    if (data.status === 'success') {
                        aaSaveResult({ action: 'import', message: `导入完成：新增 ${data.created || 0} 条` });
                        loadRecords();
                    } else {
                        aaSaveResult({ action: 'import', isError: true, message: data.message || '导入失败' });
                    }
                    return data;
                });

            runUpload.catch(err => aaSaveResult({ action: 'import', isError: true, message: '导入失败: ' + err }));
        }

        document.getElementById('recordSearchInput')?.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') applyRecordFilter();
        });
        document.getElementById('adjustmentUploadInput')?.addEventListener('change', function (e) {
            const file = e.target.files && e.target.files[0];
            if (file) uploadAdjustmentTemplate(file);
            e.target.value = '';
        });

        window.addEventListener('DOMContentLoaded', () => {
            parseUrlFilter();
            const table = document.getElementById('recordTable');
            if (table && window.SitjoyManagedPmTable && typeof window.SitjoyManagedPmTable.invalidateLayout === 'function') {
                window.SitjoyManagedPmTable.invalidateLayout(table);
            }
            loadRecords();
        });
    </script>

    <script src="/static/js/header.js"></script>
</body>
</html>
