<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon广告管理 - 广告调整记录</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .btn-quick-small {
            padding: 0.3rem 0.55rem;
            font-size: 0.78rem;
            line-height: 1;
        }
        .aar-filter-hint {
            font-size: 0.86rem;
            color: var(--morandi-slate);
            margin: 0.35rem 0 0;
        }
        #recordTable .preview-edit-cell input[type="datetime-local"] {
            min-width: 11.5rem;
        }
        #recordTable .preview-edit-cell select.record-edit-field {
            min-width: 3.5rem;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.2rem;">
            <h2>Amazon广告管理 - 广告调整记录</h2>
            <p>查看与管理广告调整提交记录，支持多选批量下载/删除、字段批量编辑与关键字搜索</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar" style="margin-bottom: 0.6rem;">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin:0;">
                            <span class="pm-search-title">搜索</span>
                            <input type="text" id="recordSearchInput" placeholder="广告名/操作/对象/原因等">
                            <button type="button" class="btn-primary" onclick="applyRecordFilter()">搜索</button>
                            <button type="button" class="btn-secondary" onclick="clearRecordFilter()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button type="button" class="btn-secondary" onclick="downloadAdjustmentTemplate()">下载模板</button>
                        <button type="button" class="btn-secondary" onclick="triggerAdjustmentUpload()">批量上传</button>
                        <input type="file" id="adjustmentUploadInput" accept=".xlsx" style="display:none;">
                        <button type="button" class="btn-secondary" onclick="loadRecords()">刷新</button>
                        <a href="/amazon-ad-adjustment-management" class="btn-secondary" style="text-decoration:none;">前往广告调整</a>
                    </div>
                </div>
                <p class="aar-filter-hint" id="recordFilterHint" style="display:none;"></p>
                <p class="aar-filter-hint" id="recordCountHint"></p>
                    <table class="pm-table" id="recordTable" style="min-width: 1600px;" data-batch-delete-handler="handleAdjustmentRecordBatchDelete">
                        <thead>
                            <tr>
                                <th style="width:54px; text-align:center;" class="sj-toggle-cb-cell" data-manage-col-key="__record_chk__" data-disable-sort="1"><input type="checkbox" class="pm-table-select-all" data-table-id="recordTable" aria-label="全选"></th>
                                <th data-manage-col-key="调整日期">调整日期</th>
                                <th data-manage-col-key="关联广告">关联广告</th>
                                <th data-manage-col-key="操作类型">操作类型</th>
                                <th data-manage-col-key="对象">对象</th>
                                <th data-manage-col-key="修改前">修改前</th>
                                <th data-manage-col-key="修改后">修改后</th>
                                <th data-manage-col-key="原因">原因</th>
                                <th data-manage-col-key="开始时间">开始时间</th>
                                <th data-manage-col-key="结束时间">结束时间</th>
                                <th data-manage-col-key="曝光">曝光</th>
                                <th data-manage-col-key="点击">点击</th>
                                <th data-manage-col-key="花费">花费</th>
                                <th data-manage-col-key="订单">订单</th>
                                <th data-manage-col-key="销售额">销售额</th>
                                <th data-manage-col-key="ACOS">ACOS</th>
                                <th data-manage-col-key="CPC">CPC</th>
                                <th data-manage-col-key="CTR">CTR</th>
                                <th data-manage-col-key="CVR">CVR</th>
                                <th data-manage-col-key="首页首位IS">首页首位IS</th>
                                <th data-manage-col-key="归因检查">归因检查</th>
                                <th data-manage-col-key="归因订单">归因订单</th>
                                <th data-manage-col-key="归因销售额">归因销售额</th>
                                <th data-manage-col-key="备注">备注</th>
                                <th data-manage-col-key="提交类型">提交类型</th>
                                <th data-manage-col-key="创建时间">创建时间</th>
                                <th data-manage-col-key="行操作" data-disable-sort="1">行操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="27" style="text-align:center;">加载中...</td></tr>
                        </tbody>
                    </table>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <div id="recordSaveBar" class="preview-savebar" aria-live="polite">
        <span id="recordSaveText">已修改 0 条预览数据</span>
        <button type="button" class="btn-secondary" onclick="cancelRecordEdits()">取消修改</button>
        <button type="button" class="btn-primary" onclick="saveRecordEdits()">统一保存</button>
    </div>

    <script src="/static/js/header.js"></script>
    <script>
        let recordsRaw = [];
        let recordsFiltered = [];
        let filterAdItemId = '';
        let recordEditDraft = {};
        let selectedRecordIds = new Set();

        const RECORD_TABLE_COLSPAN = 27;
        const RECORD_EDIT_FIELDS = [
            'adjust_date',
            'target_object',
            'start_time', 'end_time',
            'impressions', 'clicks', 'cost', 'orders', 'sales',
            'acos', 'cpc', 'ctr', 'cvr', 'top_of_search_is',
            'attribution_checked', 'attribution_orders', 'attribution_sales', 'remark',
        ];
        const RECORD_RATIO_FIELDS = new Set(['acos', 'ctr', 'cvr']);

        function formatDateTime(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return value;
            return d.toLocaleString('zh-CN');
        }

        function toDatetimeLocal(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '';
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function formatPercentFromRatio(ratio) {
            if (ratio == null || !Number.isFinite(ratio)) return '';
            return (ratio * 100).toFixed(2) + '%';
        }

        function formatComputedRatioMetricDisplay(raw) {
            const text = String(raw ?? '').trim();
            if (!text) return '-';
            if (text.includes('%')) {
                const parsed = parseFloat(text.replace(/%/g, '').replace(/,/g, '').trim());
                if (!Number.isFinite(parsed)) return text;
                return formatPercentFromRatio(parsed / 100);
            }
            const parsed = parseFloat(text.replace(/,/g, ''));
            if (!Number.isFinite(parsed)) return text;
            if (parsed <= 1) {
                return formatPercentFromRatio(parsed);
            }
            return formatPercentFromRatio(parsed / 100);
        }

        function ratioMetricInputValue(raw) {
            const disp = formatComputedRatioMetricDisplay(raw);
            return disp === '-' ? '' : disp;
        }

        function normalizeRatioMetricCompare(raw) {
            const disp = formatComputedRatioMetricDisplay(raw);
            return disp === '-' ? '' : disp;
        }

        function normalizeRecordDraftValue(field, rawValue) {
            if (field === 'attribution_checked') {
                return String(rawValue || '0') === '1' ? '1' : '0';
            }
            if (field === 'adjust_date' || field === 'start_time' || field === 'end_time') {
                return String(rawValue || '').trim();
            }
            return String(rawValue ?? '').trim();
        }

        function getRecordEditableValue(item, field) {
            if (field === 'adjust_date' || field === 'start_time' || field === 'end_time') {
                return toDatetimeLocal(item[field]);
            }
            if (RECORD_RATIO_FIELDS.has(field)) return ratioMetricInputValue(item[field]);
            if (field === 'attribution_checked') return String(item.attribution_checked || '0') === '1' ? '1' : '0';
            return String(item[field] ?? '').trim();
        }

        function buildRecordDraftFromItem(item) {
            const draft = {};
            RECORD_EDIT_FIELDS.forEach(field => {
                draft[field] = getRecordEditableValue(item, field);
            });
            return draft;
        }

        function getRecordRowDraft(item) {
            const draft = recordEditDraft[String(item.id)];
            return draft ? { ...buildRecordDraftFromItem(item), ...draft } : buildRecordDraftFromItem(item);
        }

        function recordDraftUnchanged(item, draft) {
            return RECORD_EDIT_FIELDS.every(field => {
                const orig = getRecordEditableValue(item, field);
                const next = normalizeRecordDraftValue(field, draft[field]);
                if (RECORD_RATIO_FIELDS.has(field)) {
                    return normalizeRatioMetricCompare(orig) === normalizeRatioMetricCompare(next);
                }
                return orig === next;
            });
        }

        function updateRecordDraft(itemId, field, rawValue) {
            const item = recordsRaw.find(x => String(x.id) === String(itemId));
            if (!item) return;
            const key = String(itemId);
            const draft = recordEditDraft[key] || buildRecordDraftFromItem(item);
            draft[field] = normalizeRecordDraftValue(field, rawValue);
            if (recordDraftUnchanged(item, draft)) {
                delete recordEditDraft[key];
            } else {
                recordEditDraft[key] = draft;
            }
            syncRecordSaveBar();
        }

        function countRecordEditedRows() {
            return Object.keys(recordEditDraft).length;
        }

        function syncRecordSaveBar() {
            const bar = document.getElementById('recordSaveBar');
            const text = document.getElementById('recordSaveText');
            if (!bar || !text) return;
            const count = countRecordEditedRows();
            text.textContent = `已修改 ${count} 条预览数据`;
            bar.classList.toggle('active', count > 0);
        }

        function cancelRecordEdits() {
            recordEditDraft = {};
            renderRecordTable();
            syncRecordSaveBar();
        }

        function collectRecordUpdateItems() {
            return Object.keys(recordEditDraft).map(idKey => {
                const item = recordsRaw.find(x => String(x.id) === idKey);
                if (!item) return null;
                const draft = recordEditDraft[idKey];
                const payload = { id: Number(idKey) };
                let hasChange = false;
                RECORD_EDIT_FIELDS.forEach(field => {
                    const orig = getRecordEditableValue(item, field);
                    const next = normalizeRecordDraftValue(field, draft[field]);
                    const changed = RECORD_RATIO_FIELDS.has(field)
                        ? normalizeRatioMetricCompare(orig) !== normalizeRatioMetricCompare(next)
                        : orig !== next;
                    if (changed) {
                        payload[field] = next;
                        hasChange = true;
                    }
                });
                return hasChange ? payload : null;
            }).filter(Boolean);
        }

        function draftFieldToServerValue(field, draftValue) {
            const text = normalizeRecordDraftValue(field, draftValue);
            if (field === 'attribution_checked') return text === '1' ? 1 : 0;
            if (field === 'adjust_date' || field === 'start_time' || field === 'end_time') {
                if (!text) return null;
                const normalized = text.length === 16 ? `${text}:00` : text;
                return normalized.replace('T', ' ');
            }
            return text || null;
        }

        function mergeRecordEditsLocally(failedIds) {
            const failed = failedIds instanceof Set ? failedIds : new Set();
            Object.keys(recordEditDraft).forEach(idKey => {
                const id = Number(idKey);
                if (failed.has(id)) return;
                const draft = recordEditDraft[idKey];
                const idx = recordsRaw.findIndex(x => Number(x.id) === id);
                if (idx < 0) return;
                const item = { ...recordsRaw[idx] };
                RECORD_EDIT_FIELDS.forEach(field => {
                    if (!(field in draft)) return;
                    item[field] = draftFieldToServerValue(field, draft[field]);
                });
                recordsRaw[idx] = item;
                delete recordEditDraft[idKey];
            });
            applyRecordFilter();
            syncRecordSaveBar();
        }

        function saveRecordEdits() {
            const items = collectRecordUpdateItems();
            if (!items.length) {
                syncRecordSaveBar();
                return;
            }
            const bar = document.getElementById('recordSaveBar');
            const saveBtn = bar ? bar.querySelector('.btn-primary') : null;
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.textContent = '保存中...';
            }
            fetch('/api/amazon-ad-adjustment', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items }),
            })
                .then(r => r.json())
                .then(data => {
                    if (!data || data.status !== 'success') {
                        aaSaveResult({
                            action: 'save',
                            isError: true,
                            message: (data && data.message) || '批量保存失败',
                            errors: data && data.errors,
                        });
                        return;
                    }
                    const errCount = Array.isArray(data.errors) ? data.errors.length : 0;
                    const failedIds = new Set(
                        (Array.isArray(data.errors) ? data.errors : [])
                            .map(e => Number(e && e.id))
                            .filter(id => Number.isFinite(id) && id > 0)
                    );
                    mergeRecordEditsLocally(failedIds);
                    aaSaveResult({
                        action: 'save',
                        isError: errCount > 0,
                        message: `已保存 ${data.updated || 0} 条区间/归因数据${errCount ? `，失败 ${errCount} 条` : ''}`,
                        errors: data.errors,
                    });
                })
                .catch(err => {
                    aaSaveResult({ action: 'save', isError: true, message: '请求失败: ' + err });
                })
                .finally(() => {
                    if (saveBtn) {
                        saveBtn.disabled = false;
                        saveBtn.textContent = '统一保存';
                    }
                });
        }

        function bindRecordEditEvents() {
            const table = document.getElementById('recordTable');
            if (!table || table.dataset.editBound === '1') return;
            table.dataset.editBound = '1';
            const onFieldChange = (e) => {
                const el = e.target;
                if (!el || !el.classList || !el.classList.contains('record-edit-field')) return;
                updateRecordDraft(el.getAttribute('data-id'), el.getAttribute('data-field'), el.value);
            };
            table.addEventListener('input', onFieldChange);
            table.addEventListener('change', onFieldChange);
        }

        function recordEditInput(field, itemId, value) {
            const safe = String(value ?? '').replace(/"/g, '&quot;');
            return `<input type="text" class="inline-input preview-edit-input record-edit-field" data-id="${itemId}" data-field="${field}" value="${safe}">`;
        }

        function recordEditDatetime(field, itemId, value) {
            const safe = String(value ?? '').replace(/"/g, '&quot;');
            return `<input type="datetime-local" class="inline-input preview-edit-input record-edit-field" data-id="${itemId}" data-field="${field}" value="${safe}">`;
        }

        function recordEditAttribChecked(itemId, value) {
            const checked = String(value || '0') === '1';
            return `
                <select class="inline-input preview-edit-input record-edit-field" data-id="${itemId}" data-field="attribution_checked">
                    <option value="0"${checked ? '' : ' selected'}>否</option>
                    <option value="1"${checked ? ' selected' : ''}>是</option>
                </select>
            `;
        }

        function recordSortMetricValue(field, raw) {
            if (RECORD_RATIO_FIELDS.has(field)) return normalizeRatioMetricCompare(raw);
            return raw === null || raw === undefined ? '' : String(raw).trim();
        }

        function aaSaveResult(options) {
            if (window.showAppSaveResult) window.showAppSaveResult(options);
        }

        function recordSearchText(item) {
            return [
                item.ad_name,
                item.operation_name,
                item.target_object,
                item.before_value,
                item.after_value,
                item.reason_name,
                item.remark,
                item.impressions,
                item.clicks,
                item.cost,
                item.orders,
                item.sales
            ].filter(Boolean).join(' ').toLowerCase();
        }

        function updateFilterHint() {
            const el = document.getElementById('recordFilterHint');
            if (!el) return;
            if (filterAdItemId) {
                el.style.display = 'block';
                el.textContent = `当前仅显示广告 ID=${filterAdItemId} 的记录（来自广告调整页）。`;
            } else {
                el.style.display = 'none';
                el.textContent = '';
            }
        }

        function applyRecordFilter() {
            const keyword = (document.getElementById('recordSearchInput')?.value || '').trim().toLowerCase();
            recordsFiltered = (recordsRaw || []).filter(item => {
                if (!keyword) return true;
                return recordSearchText(item).includes(keyword);
            });
            updateRecordCountHint();
            renderRecordTable();
        }

        function clearRecordFilter() {
            const input = document.getElementById('recordSearchInput');
            if (input) input.value = '';
            applyRecordFilter();
        }

        function sortCell(value) {
            const text = value === null || value === undefined ? '' : String(value).trim();
            return text ? ` data-sort-value="${escapeHtml(text)}"` : '';
        }

        function escapeHtml(text) {
            return String(text ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function updateRecordCountHint() {
            const el = document.getElementById('recordCountHint');
            if (!el) return;
            const total = (recordsRaw || []).length;
            const shown = (recordsFiltered || []).length;
            if (!total) {
                el.textContent = '';
                return;
            }
            if (shown === total) {
                el.textContent = `共 ${total} 条记录`;
            } else {
                el.textContent = `当前显示 ${shown} / 共 ${total} 条记录`;
            }
        }

        function syncRecordSelectAll() {
            const table = document.getElementById('recordTable');
            if (table && window.SitjoyManagedPmTable && typeof window.SitjoyManagedPmTable.syncSelectAllMasters === 'function') {
                window.SitjoyManagedPmTable.syncSelectAllMasters(table);
            }
        }

        function syncSelectedRecordIdsFromDom() {
            const api = recordManagedTableApi();
            if (!api || typeof api.getSelectedIds !== 'function') return;
            const ids = api.getSelectedIds('recordTable') || [];
            selectedRecordIds = new Set(ids.map(v => Number(v)).filter(v => Number.isFinite(v) && v > 0));
        }

        function onRecordRowCheckboxChange(el) {
            if (!el || !el.classList) return;
            const id = Number(el.getAttribute('data-id') || 0);
            if (!id) return;
            if (el.checked) selectedRecordIds.add(id);
            else selectedRecordIds.delete(id);
            syncRecordSelectAll();
            syncRecordBatchBar();
        }

        function bindRecordSelectEvents() {
            const table = document.getElementById('recordTable');
            if (!table || table.dataset.selectBound === '1') return;
            table.dataset.selectBound = '1';
            table.addEventListener('change', (e) => {
                const el = e.target;
                if (!el || !el.classList || !el.classList.contains('record-row-checkbox')) return;
                onRecordRowCheckboxChange(el);
            });
            if (document.body.dataset.recordSelectAllBound !== '1') {
                document.body.dataset.recordSelectAllBound = '1';
                document.addEventListener('change', (e) => {
                    const el = e.target;
                    if (!el || !el.classList || !el.classList.contains('pm-table-select-all')) return;
                    if (String(el.getAttribute('data-table-id') || '') !== 'recordTable') return;
                    window.setTimeout(() => {
                        syncSelectedRecordIdsFromDom();
                        syncRecordSelectAll();
                        syncRecordBatchBar();
                    }, 0);
                }, false);
            }
        }

        function syncRecordBatchBar() {
            const table = document.getElementById('recordTable');
            if (table && window.SitjoyManagedPmTable && typeof window.SitjoyManagedPmTable.syncBatchBar === 'function') {
                window.SitjoyManagedPmTable.syncBatchBar(table);
            }
        }

        function handleAdjustmentRecordBatchDelete(ids) {
            const payloadIds = (Array.isArray(ids) ? ids : [])
                .map(v => Number(v))
                .filter(v => Number.isFinite(v) && v > 0);
            if (!payloadIds.length) {
                if (window.showAppToast) window.showAppToast('没有可删除的有效记录', true, 2400);
                return;
            }
            fetch('/api/amazon-ad-adjustment?action=bulk_delete', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids: payloadIds }),
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        aaSaveResult({ action: 'delete', isError: true, message: data.message || '批量删除失败' });
                        return;
                    }
                    payloadIds.forEach(id => selectedRecordIds.delete(id));
                    loadRecords();
                    aaSaveResult({
                        action: 'delete',
                        message: `批量删除成功：${Number(data.deleted || payloadIds.length)} 条`,
                    });
                })
                .catch(err => aaSaveResult({ action: 'delete', isError: true, message: '批量删除失败: ' + err }));
        }

        function recordManagedTableApi() {
            return window.SitjoyManagedPmTable || null;
        }

        function beginRecordTableBodyUpdate() {
            const api = recordManagedTableApi();
            if (api && typeof api.beginBodyUpdate === 'function') {
                api.beginBodyUpdate(document.getElementById('recordTable'));
            }
        }

        function endRecordTableBodyUpdate() {
            const api = recordManagedTableApi();
            if (api && typeof api.endBodyUpdate === 'function') {
                api.endBodyUpdate(document.getElementById('recordTable'));
            }
        }

        function renderRecordTable() {
            const tbody = document.querySelector('#recordTable tbody');
            if (!tbody) return;
            const items = recordsFiltered || [];
            beginRecordTableBodyUpdate();
            if (!items.length) {
                tbody.innerHTML = `<tr><td colspan="${RECORD_TABLE_COLSPAN}" style="text-align:center;">暂无调整记录</td></tr>`;
                endRecordTableBodyUpdate();
                syncRecordSelectAll();
                syncRecordBatchBar();
                return;
            }
            tbody.innerHTML = items.map(item => {
                const adName = item.ad_name || '';
                const levelText = item.ad_level === 'group' ? '广告组' : (item.ad_level === 'campaign' ? '广告活动' : item.ad_level || '');
                const draft = getRecordRowDraft(item);
                const itemId = item.id;
                const checked = selectedRecordIds.has(Number(itemId));
                return `
                    <tr data-record-id="${itemId}">
                        <td class="sj-toggle-cb-cell" style="text-align:center;" data-manage-col-key="__record_chk__">
                            <input type="checkbox" class="record-row-checkbox row-check" data-id="${itemId}"${checked ? ' checked' : ''}>
                        </td>
                        <td class="preview-edit-cell" data-manage-col-key="调整日期"${sortCell(draft.adjust_date || item.adjust_date)}>${recordEditDatetime('adjust_date', itemId, draft.adjust_date)}</td>
                        <td data-manage-col-key="关联广告"${sortCell(`${adName}（${levelText}）`)}>${escapeHtml(adName)}（${escapeHtml(levelText)}）</td>
                        <td data-manage-col-key="操作类型"${sortCell(item.operation_name)}>${escapeHtml(item.operation_name || '')}</td>
                        <td class="preview-edit-cell" data-manage-col-key="对象"${sortCell(draft.target_object || item.target_object)}>${recordEditInput('target_object', itemId, draft.target_object)}</td>
                        <td data-manage-col-key="修改前"${sortCell(item.before_value)}>${escapeHtml(item.before_value || '')}</td>
                        <td data-manage-col-key="修改后"${sortCell(item.after_value)}>${escapeHtml(item.after_value || '')}</td>
                        <td data-manage-col-key="原因"${sortCell(item.reason_name)}>${escapeHtml(item.reason_name || '')}</td>
                        <td class="preview-edit-cell" data-manage-col-key="开始时间"${sortCell(draft.start_time || item.start_time)}>${recordEditDatetime('start_time', itemId, draft.start_time)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="结束时间"${sortCell(draft.end_time || item.end_time)}>${recordEditDatetime('end_time', itemId, draft.end_time)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="曝光"${sortCell(draft.impressions || item.impressions)}>${recordEditInput('impressions', itemId, draft.impressions)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="点击"${sortCell(draft.clicks || item.clicks)}>${recordEditInput('clicks', itemId, draft.clicks)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="花费"${sortCell(draft.cost || item.cost)}>${recordEditInput('cost', itemId, draft.cost)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="订单"${sortCell(draft.orders || item.orders)}>${recordEditInput('orders', itemId, draft.orders)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="销售额"${sortCell(draft.sales || item.sales)}>${recordEditInput('sales', itemId, draft.sales)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="ACOS"${sortCell(recordSortMetricValue('acos', draft.acos || item.acos))}>${recordEditInput('acos', itemId, draft.acos)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="CPC"${sortCell(draft.cpc || item.cpc)}>${recordEditInput('cpc', itemId, draft.cpc)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="CTR"${sortCell(recordSortMetricValue('ctr', draft.ctr || item.ctr))}>${recordEditInput('ctr', itemId, draft.ctr)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="CVR"${sortCell(recordSortMetricValue('cvr', draft.cvr || item.cvr))}>${recordEditInput('cvr', itemId, draft.cvr)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="首页首位IS"${sortCell(draft.top_of_search_is || item.top_of_search_is)}>${recordEditInput('top_of_search_is', itemId, draft.top_of_search_is)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="归因检查"${sortCell(draft.attribution_checked)}>${recordEditAttribChecked(itemId, draft.attribution_checked)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="归因订单"${sortCell(draft.attribution_orders || item.attribution_orders)}>${recordEditInput('attribution_orders', itemId, draft.attribution_orders)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="归因销售额"${sortCell(draft.attribution_sales || item.attribution_sales)}>${recordEditInput('attribution_sales', itemId, draft.attribution_sales)}</td>
                        <td class="preview-edit-cell" data-manage-col-key="备注"${sortCell(draft.remark || item.remark)}>${recordEditInput('remark', itemId, draft.remark)}</td>
                        <td data-manage-col-key="提交类型"${sortCell(String(item.is_quick_submit || '0') === '1' ? '快速提交' : '完整提交')}>${String(item.is_quick_submit || '0') === '1' ? '快速提交' : '完整提交'}</td>
                        <td data-manage-col-key="创建时间"${sortCell(item.created_at)}>${formatDateTime(item.created_at)}</td>
                        <td data-manage-col-key="行操作"><button class="btn-danger btn-quick-small" onclick="deleteRecord(${item.id})">删除</button></td>
                    </tr>
                `;
            }).join('');
            endRecordTableBodyUpdate();
            syncRecordSelectAll();
            syncRecordBatchBar();
            syncRecordSaveBar();
        }

        async function deleteRecord(id) {
            const ok = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({ title: '删除确认', message: '确定删除该条调整记录吗？', confirmText: '确认删除' })
                : false;
            if (!ok) return;
            fetch('/api/amazon-ad-adjustment', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    aaSaveResult({ action: 'delete', isError: true, message: data.message || '删除失败' });
                    return;
                }
                selectedRecordIds.delete(Number(id));
                loadRecords();
                aaSaveResult({ action: 'delete' });
            })
            .catch(err => aaSaveResult({ action: 'delete', isError: true, message: '删除失败: ' + err }));
        }

        function loadRecords() {
            const base = '/api/amazon-ad-adjustment';
            const url = filterAdItemId ? `${base}?ad_item_id=${encodeURIComponent(filterAdItemId)}` : base;
            const tbody = document.querySelector('#recordTable tbody');
            if (tbody) {
                beginRecordTableBodyUpdate();
                tbody.innerHTML = `<tr><td colspan="${RECORD_TABLE_COLSPAN}" style="text-align:center;">加载中...</td></tr>`;
                endRecordTableBodyUpdate();
            }
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        if (tbody) {
                            beginRecordTableBodyUpdate();
                            tbody.innerHTML = `<tr><td colspan="${RECORD_TABLE_COLSPAN}" style="text-align:center; color:#a33;">${escapeHtml(data.message || '加载失败')}</td></tr>`;
                            endRecordTableBodyUpdate();
                        }
                        if (window.showAppToast) window.showAppToast(data.message || '加载失败', true, 6500);
                        return;
                    }
                    recordsRaw = data.items || [];
                    recordEditDraft = {};
                    const availableIds = new Set((recordsRaw || []).map(item => Number(item.id)).filter(id => id > 0));
                    selectedRecordIds = new Set(Array.from(selectedRecordIds).filter(id => availableIds.has(id)));
                    applyRecordFilter();
                })
                .catch(err => {
                    if (tbody) {
                        beginRecordTableBodyUpdate();
                        tbody.innerHTML = `<tr><td colspan="${RECORD_TABLE_COLSPAN}" style="text-align:center; color:#a33;">加载失败: ${escapeHtml(String(err))}</td></tr>`;
                        endRecordTableBodyUpdate();
                    }
                    if (window.showAppToast) window.showAppToast('加载失败: ' + err, true, 6500);
                });
        }

        function parseUrlFilter() {
            try {
                const params = new URLSearchParams(window.location.search || '');
                filterAdItemId = String(params.get('ad_item_id') || '').trim();
            } catch (e) {
                filterAdItemId = '';
            }
            updateFilterHint();
        }

        function downloadAdjustmentTemplate() {
            window.location.href = '/api/amazon-ad-adjustment-template';
        }

        function triggerAdjustmentUpload() {
            document.getElementById('adjustmentUploadInput')?.click();
        }

        function uploadAdjustmentTemplate(file) {
            if (!file) return;
            const runUpload = window.uploadBatchImportFile
                ? window.uploadBatchImportFile({
                    file,
                    url: '/api/amazon-ad-adjustment-import',
                    title: '广告调整记录导入',
                    uploadSummary: '正在上传调整记录文件',
                    processSummary: '正在解析并写入调整记录',
                }).then(data => {
                    if (window.handleBatchImportResponse) {
                        return window.handleBatchImportResponse(data, {
                            title: '广告调整记录导入',
                            onSuccess: () => loadRecords(),
                        });
                    }
                    if (data.status === 'success') loadRecords();
                    return data;
                })
                : fetch('/api/amazon-ad-adjustment-import', { method: 'POST', body: (() => {
                    const fd = new FormData();
                    fd.append('file', file);
                    return fd;
                })() }).then(r => r.json()).then(data => {
                    if (data.status === 'success') {
                        aaSaveResult({ action: 'import', message: `导入完成：新增 ${data.created || 0} 条` });
                        loadRecords();
                    } else {
                        aaSaveResult({ action: 'import', isError: true, message: data.message || '导入失败' });
                    }
                    return data;
                });

            runUpload.catch(err => aaSaveResult({ action: 'import', isError: true, message: '导入失败: ' + err }));
        }

        document.getElementById('recordSearchInput')?.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') applyRecordFilter();
        });
        document.getElementById('adjustmentUploadInput')?.addEventListener('change', function (e) {
            const file = e.target.files && e.target.files[0];
            if (file) uploadAdjustmentTemplate(file);
            e.target.value = '';
        });

        window.addEventListener('DOMContentLoaded', () => {
            parseUrlFilter();
            bindRecordEditEvents();
            bindRecordSelectEvents();
            const table = document.getElementById('recordTable');
            if (table && window.SitjoyManagedPmTable && typeof window.SitjoyManagedPmTable.invalidateLayout === 'function') {
                window.SitjoyManagedPmTable.invalidateLayout(table);
            }
            loadRecords();
        });
    </script>
</body>
</html>
