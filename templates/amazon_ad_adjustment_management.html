    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        let adItems = [];
        let adItemsRaw = [];
        let selectedAd = null;
        let selectedAdId = null;
        let allowedOperations = [];
        let selectedAdDetail = null;
        let targetOptionsCache = [];
        let targetSuggestTimer = 0;
        let hierarchyFilter = null;

        const AA_BID_STRATEGIES = [
            '动态竞价-仅降低',
            '动态竞价-提高和降低',
            '固定竞价',
        ];

        const AA_SEARCH_LS_PAUSED = 'sj.amazonAdAdjustment.showPaused';
        const AA_SEARCH_LS_ARCHIVED = 'sj.amazonAdAdjustment.showArchived';
        const AA_SEARCH_LS_EXACT = 'sj.amazonAdAdjustment.exactMatch';

        function readAdSearchBool(key, defaultValue) {
            try {
                const raw = localStorage.getItem(key);
                if (raw === null || raw === '') return defaultValue;
                return raw === '1' || raw === 'true';
            } catch (e) {
                return defaultValue;
            }
        }

        function writeAdSearchBool(key, value) {
            try {
                localStorage.setItem(key, value ? '1' : '0');
            } catch (e) {}
        }

        function initAdSearchPrefs() {
            const pausedEl = document.getElementById('adSearchShowPaused');
            const archivedEl = document.getElementById('adSearchShowArchived');
            const exactEl = document.getElementById('adSearchExactMatch');
            if (pausedEl) pausedEl.checked = readAdSearchBool(AA_SEARCH_LS_PAUSED, false);
            if (archivedEl) archivedEl.checked = readAdSearchBool(AA_SEARCH_LS_ARCHIVED, false);
            if (exactEl) exactEl.checked = readAdSearchBool(AA_SEARCH_LS_EXACT, false);
            [pausedEl, archivedEl, exactEl].forEach(el => {
                if (!el) return;
                el.addEventListener('change', () => {
                    writeAdSearchBool(AA_SEARCH_LS_PAUSED, !!pausedEl.checked);
                    writeAdSearchBool(AA_SEARCH_LS_ARCHIVED, !!archivedEl.checked);
                    writeAdSearchBool(AA_SEARCH_LS_EXACT, !!exactEl.checked);
                    applyAdListFiltersAndRender();
                });
            });
        }

        function getAdSearchPrefs() {
            return {
                showPaused: !!document.getElementById('adSearchShowPaused')?.checked,
                showArchived: !!document.getElementById('adSearchShowArchived')?.checked,
                exactMatch: !!document.getElementById('adSearchExactMatch')?.checked
            };
        }

        function statusAllowed(status, prefs) {
            const s = String(status || '启动').trim() || '启动';
            if (s === '启动') return true;
            if (s === '暂停') return prefs.showPaused;
            if (s === '存档') return prefs.showArchived;
            return prefs.showPaused || prefs.showArchived;
        }

        function adItemSearchText(item) {
            return [
                item.ad_name,
                item.ad_type_text,
                item.portfolio_name,
                item.campaign_name,
                item.group_name
            ].filter(Boolean).join(' ').toLowerCase();
        }

        function adItemMatchesKeyword(item, keyword, exactMatch) {
            if (!keyword) return true;
            const name = String(item.ad_name || '').trim();
            if (exactMatch) {
                return name.toLowerCase() === keyword.toLowerCase();
            }
            return adItemSearchText(item).includes(keyword.toLowerCase());
        }

        function resolveSelectedAdHierarchy(item) {
            if (!item) return null;
            const level = String(item.ad_level || '').trim();
            const id = Number(item.id || 0);
            if (!id) return null;
            let portfolioId = 0;
            let campaignId = 0;
            let groupId = 0;
            if (level === 'portfolio') {
                portfolioId = id;
            } else if (level === 'campaign') {
                portfolioId = Number(item.portfolio_id || 0);
                campaignId = id;
            } else if (level === 'group') {
                portfolioId = Number(item.portfolio_id || 0);
                campaignId = Number(item.campaign_id || 0);
                groupId = id;
            }
            return { level, id, portfolioId, campaignId, groupId };
        }

        function getItemPortfolioId(item) {
            const level = String(item.ad_level || '').trim();
            if (level === 'portfolio') return Number(item.id || 0);
            return Number(item.portfolio_id || 0);
        }

        function getItemCampaignId(item) {
            const level = String(item.ad_level || '').trim();
            if (level === 'campaign') return Number(item.id || 0);
            if (level === 'group') return Number(item.campaign_id || 0);
            return 0;
        }

        function adItemMatchesHierarchyFilter(item) {
            if (!hierarchyFilter) return true;
            if (hierarchyFilter.type === 'portfolio') {
                return getItemPortfolioId(item) === Number(hierarchyFilter.portfolioId || 0);
            }
            if (hierarchyFilter.type === 'campaign') {
                return getItemCampaignId(item) === Number(hierarchyFilter.campaignId || 0);
            }
            if (hierarchyFilter.type === 'group') {
                return String(item.ad_level || '') === 'group'
                    && Number(item.id || 0) === Number(hierarchyFilter.groupId || 0);
            }
            return true;
        }

        function syncHierarchyFilterButtons() {
            const h = resolveSelectedAdHierarchy(selectedAd);
            const map = {
                portfolio: { btn: 'filterByPortfolioBtn', enabled: !!(h && h.portfolioId) },
                campaign: { btn: 'filterByCampaignBtn', enabled: !!(h && h.campaignId) },
                group: { btn: 'filterByGroupBtn', enabled: !!(h && h.groupId) },
            };
            Object.keys(map).forEach((type) => {
                const btn = document.getElementById(map[type].btn);
                if (!btn) return;
                btn.disabled = !map[type].enabled;
                btn.classList.toggle('is-active', !!(hierarchyFilter && hierarchyFilter.type === type));
            });
        }

        function toggleHierarchyFilter(type) {
            const h = resolveSelectedAdHierarchy(selectedAd);
            if (!h) return;
            if (hierarchyFilter && hierarchyFilter.type === type) {
                hierarchyFilter = null;
            } else if (type === 'portfolio' && h.portfolioId) {
                hierarchyFilter = { type: 'portfolio', portfolioId: h.portfolioId };
            } else if (type === 'campaign' && h.campaignId) {
                hierarchyFilter = { type: 'campaign', campaignId: h.campaignId };
            } else if (type === 'group' && h.groupId) {
                hierarchyFilter = { type: 'group', groupId: h.groupId };
            } else {
                return;
            }
            syncHierarchyFilterButtons();
            applyAdListFiltersAndRender();
        }

        function applyAdListFilters(items) {
            const keyword = (document.getElementById('adSearchInput')?.value || '').trim();
            const prefs = getAdSearchPrefs();
            return (items || []).filter(item => {
                if (!statusAllowed(item.status, prefs)) return false;
                if (!adItemMatchesHierarchyFilter(item)) return false;
                return adItemMatchesKeyword(item, keyword, prefs.exactMatch);
            });
        }

        function applyAdListFiltersAndRender() {
            adItems = applyAdListFilters(adItemsRaw);
            const prev = selectedAdId;
            if (prev && !adItems.some(x => String(x.id) === String(prev))) {
                selectedAdId = null;
                selectedAd = null;
                updateInfoPanel(null);
            }
            renderAdList();
            if (!selectedAdId && adItems.length) {
                selectAd(adItems[0].id);
            }
        }

        function toDatetimeLocal(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '';
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function formatDateTime(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return value;
            return d.toLocaleString('zh-CN');
        }

        function periodDayCount(startTime, endTime) {
            const s = new Date(startTime);
            const e = new Date(endTime);
            if (Number.isNaN(s.getTime()) || Number.isNaN(e.getTime())) return null;
            if (e < s) return null;
            return Math.max(1, (e.getTime() - s.getTime()) / 86400000);
        }

        function formatMetricPlain(value) {
            const text = String(value ?? '').trim();
            return text ? escapeHtml(text) : '<span class="aa-ad-cell-empty">-</span>';
        }

        function isModifyPlacementOperationName(name) {
            const n = normalizeOperationTypeName(name);
            return n.includes('修改') && n.includes('广告位');
        }

        function formatPlacementPercentFromRatio(ratio) {
            if (ratio == null || !Number.isFinite(ratio)) return '';
            const pct = ratio * 100;
            if (Math.abs(pct - Math.round(pct)) < 1e-9) {
                return `${Math.round(pct)}%`;
            }
            return `${parseFloat(pct.toFixed(4))}%`;
        }

        function placementDisplayFromStored(raw) {
            const bid = String(raw || '').trim();
            if (!bid) return '';
            if (bid.includes('%')) {
                const numPart = bid.replace(/%/g, '').replace(/,/g, '').trim();
                const parsed = parseFloat(numPart);
                if (!Number.isFinite(parsed) || parsed < 0) return bid;
                return formatPlacementPercentFromRatio(parsed / 100);
            }
            const parsed = parseFloat(bid.replace(/,/g, ''));
            if (!Number.isFinite(parsed) || parsed < 0) return bid;
            if (parsed <= 1) {
                return formatPlacementPercentFromRatio(parsed);
            }
            return formatPlacementPercentFromRatio(parsed / 100);
        }

        function placementStoredFromDisplay(raw) {
            const text = String(raw || '').trim();
            if (!text) return '';
            if (text.includes('%')) {
                const parsed = parseFloat(text.replace(/%/g, '').replace(/,/g, '').trim());
                if (!Number.isFinite(parsed) || parsed < 0) return text;
                return formatDecimalMetric(parsed / 100, 4);
            }
            const parsed = parseFloat(text.replace(/,/g, ''));
            if (!Number.isFinite(parsed) || parsed < 0) return text;
            if (parsed <= 1) {
                return formatDecimalMetric(parsed, 4);
            }
            return formatDecimalMetric(parsed / 100, 4);
        }

        function formatAdjustmentValueDisplay(value, operationName) {
            if (isModifyPlacementOperationName(operationName)) {
                const shown = placementDisplayFromStored(value);
                return formatMetricPlain(shown || value);
            }
            return formatMetricPlain(value);
        }

        function resolveAdjustmentValueForSubmit(fieldId, raw) {
            const op = getSelectedOperationType();
            if (!isModifyPlacementOp(op)) return String(raw || '').trim();
            if (fieldId !== 'beforeValue' && fieldId !== 'afterValue') return String(raw || '').trim();
            return placementStoredFromDisplay(raw);
        }

        function syncPlacementFieldHints() {
            const op = getSelectedOperationType();
            const beforeInput = document.getElementById('beforeValue');
            const afterInput = document.getElementById('afterValue');
            if (!beforeInput || !afterInput) return;
            if (isModifyPlacementOp(op)) {
                beforeInput.placeholder = '例如：50%';
                afterInput.placeholder = '例如：75%';
            } else {
                beforeInput.placeholder = '例如：0.75';
                afterInput.placeholder = '例如：0.95';
            }
        }

        function formatMetricWithDaily(value, startTime, endTime) {
            const text = String(value ?? '').trim();
            if (!text) return '<span class="aa-ad-cell-empty">-</span>';
            const days = periodDayCount(startTime, endTime);
            const num = parseFloat(text.replace(/,/g, ''));
            if (days == null || !Number.isFinite(num)) return escapeHtml(text);
            const daily = num / days;
            const dailyStr = Math.abs(daily - Math.round(daily)) < 0.005
                ? String(Math.round(daily))
                : daily.toFixed(2);
            return `${escapeHtml(text)}<span class="aa-metric-daily">（日均 ${escapeHtml(dailyStr)}）</span>`;
        }

        function renderPeriodRow(label, html) {
            return `<dt>${escapeHtml(label)}</dt><dd>${html}</dd>`;
        }

        function renderAdjustmentPeriodCard(item, index) {
            const start = item.start_time;
            const end = item.end_time;
            const head = `区间 #${index + 1} · ${formatDateTime(start) || '-'} ~ ${formatDateTime(end) || '-'}`;
            const rows = [
                renderPeriodRow('修改前', formatAdjustmentValueDisplay(item.before_value, item.operation_name)),
                renderPeriodRow('修改后', formatAdjustmentValueDisplay(item.after_value, item.operation_name)),
                renderPeriodRow('原因', formatMetricPlain(item.reason_name)),
                renderPeriodRow('修改日期', formatMetricPlain(formatDateTime(item.adjust_date))),
                renderPeriodRow('开始时间', formatMetricPlain(formatDateTime(start))),
                renderPeriodRow('结束时间', formatMetricPlain(formatDateTime(end))),
                renderPeriodRow('曝光', formatMetricWithDaily(item.impressions, start, end)),
                renderPeriodRow('点击', formatMetricWithDaily(item.clicks, start, end)),
                renderPeriodRow('花费', formatMetricWithDaily(item.cost, start, end)),
                renderPeriodRow('订单', formatMetricWithDaily(item.orders, start, end)),
                renderPeriodRow('销售额', formatMetricWithDaily(item.sales, start, end)),
                renderPeriodRow('ACOS', formatMetricPlain(item.acos)),
                renderPeriodRow('CPC', formatMetricPlain(item.cpc)),
                renderPeriodRow('CTR', formatMetricPlain(item.ctr)),
                renderPeriodRow('CVR', formatMetricPlain(item.cvr)),
                renderPeriodRow('首页首位IS', formatMetricPlain(item.top_of_search_is)),
                renderPeriodRow('是否归因', formatMetricPlain(String(item.attribution_checked || '0') === '1' ? '是' : '否')),
                renderPeriodRow('归因订单', formatMetricPlain(item.attribution_orders)),
                renderPeriodRow('归因销售额', formatMetricPlain(item.attribution_sales)),
                renderPeriodRow('备注', formatMetricPlain(item.remark)),
            ].join('');
            return `<article class="aa-period-card"><div class="aa-period-card-head">${escapeHtml(head)}</div><dl class="aa-period-dl">${rows}</dl></article>`;
        }

        function renderAdjustmentPeriodList(items) {
            const wrap = document.getElementById('aaPeriodList');
            if (!wrap) return;
            if (!selectedAdId) {
                wrap.innerHTML = '<div class="aa-period-empty">请先在左侧选择广告</div>';
                return;
            }
            const list = Array.isArray(items) ? items : [];
            if (!list.length) {
                wrap.innerHTML = '<div class="aa-period-empty">该广告暂无调整记录</div>';
                return;
            }
            wrap.innerHTML = list.map((item, idx) => renderAdjustmentPeriodCard(item, idx)).join('');
        }

        function loadAdjustmentPeriodList() {
            const wrap = document.getElementById('aaPeriodList');
            if (!wrap) return;
            if (!selectedAdId) {
                renderAdjustmentPeriodList([]);
                return;
            }
            wrap.innerHTML = '<div class="aa-period-empty">加载中…</div>';
            fetch(`/api/amazon-ad-adjustment?ad_item_id=${encodeURIComponent(selectedAdId)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        wrap.innerHTML = `<div class="aa-period-empty" style="color:#a33;">${escapeHtml(data.message || '加载失败')}</div>`;
                        return;
                    }
                    renderAdjustmentPeriodList(data.items || []);
                })
                .catch(err => {
                    wrap.innerHTML = `<div class="aa-period-empty" style="color:#a33;">加载失败: ${escapeHtml(String(err))}</div>`;
                });
        }

        function aaSaveResult(options) {
            if (window.showAppSaveResult) window.showAppSaveResult(options);
        }

        function aaValidationToast(message) {
            const text = String(message || '').trim();
            if (!text) return;
            if (window.showAppToast) {
                window.showAppToast(text, true, 6500);
            }
        }

        function validatePhase1() {
            const errors = [];
            if (!selectedAdId) errors.push('请先在左侧选择广告');
            if (!document.getElementById('operationType').value) errors.push('请选择操作类型');
            if (!document.getElementById('targetObject').value.trim()) errors.push('请填写操作对象');
            if (!document.getElementById('beforeValue').value.trim()) errors.push('请填写修改前');
            if (!document.getElementById('afterValue').value.trim()) errors.push('请填写修改后');
            if (!document.getElementById('operationReason').value) errors.push('请选择修改原因');
            return errors;
        }

        function validatePhase2() {
            const errors = [];
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            if (!start) errors.push('请填写效果区间开始时间');
            if (!end) errors.push('请填写效果区间结束时间');
            if (start && end) {
                const s = new Date(start).getTime();
                const e = new Date(end).getTime();
                if (!Number.isNaN(s) && !Number.isNaN(e) && e < s) {
                    errors.push('结束时间不能早于开始时间');
                }
            }
            return errors;
        }

        const AA_METRIC_SOURCE_IDS = ['impressions', 'clicks', 'cost', 'orders', 'sales'];

        function parseMetricNumber(raw) {
            const text = String(raw ?? '').trim().replace(/,/g, '').replace(/%/g, '');
            if (!text) return null;
            const n = parseFloat(text);
            return Number.isFinite(n) ? n : null;
        }

        function formatPercentFromRatio(ratio) {
            if (ratio == null || !Number.isFinite(ratio)) return '';
            return (ratio * 100).toFixed(2) + '%';
        }

        function formatDecimalMetric(n, digits) {
            if (n == null || !Number.isFinite(n)) return '';
            const d = typeof digits === 'number' ? digits : 2;
            const fixed = Number(n.toFixed(d));
            return String(fixed);
        }

        function recalcAdjustmentDerivedMetrics() {
            const impressions = parseMetricNumber(document.getElementById('impressions')?.value);
            const clicks = parseMetricNumber(document.getElementById('clicks')?.value);
            const cost = parseMetricNumber(document.getElementById('cost')?.value);
            const orders = parseMetricNumber(document.getElementById('orders')?.value);
            const sales = parseMetricNumber(document.getElementById('sales')?.value);

            if (cost != null && sales != null && sales > 0) {
                setFieldValue('acos', formatPercentFromRatio(cost / sales));
            }
            if (cost != null && clicks != null && clicks > 0) {
                setFieldValue('cpc', formatDecimalMetric(cost / clicks));
            }
            if (clicks != null && impressions != null && impressions > 0) {
                setFieldValue('ctr', formatPercentFromRatio(clicks / impressions));
            }
            if (orders != null && clicks != null && clicks > 0) {
                setFieldValue('cvr', formatPercentFromRatio(orders / clicks));
            }
        }

        function syncAttributionCheckedButtons() {
            const input = document.getElementById('attributionChecked');
            if (!input) return;
            const value = String(input.value || '0');
            document.querySelectorAll('[data-target="attributionChecked"]').forEach(btn => {
                btn.classList.toggle('is-active', String(btn.getAttribute('data-value') || '') === value);
            });
            const seg = document.getElementById('attributionCheckedSegment');
            if (seg) seg.dataset.value = value;
        }

        function setAttributionChecked(on) {
            const input = document.getElementById('attributionChecked');
            if (!input) return;
            input.value = on ? '1' : '0';
            syncAttributionCheckedButtons();
        }

        function getAttributionCheckedValue() {
            const input = document.getElementById('attributionChecked');
            return input ? String(input.value || '0') : '0';
        }

        function initAttributionCheckedSegment() {
            const modal = document.getElementById('aaFullSubmitModal');
            if (!modal || modal.dataset.attrSegBound === '1') return;
            modal.dataset.attrSegBound = '1';
            document.querySelectorAll('[data-target="attributionChecked"]').forEach(btn => {
                btn.addEventListener('click', function() {
                    setAttributionChecked(String(this.getAttribute('data-value') || '0') === '1');
                });
            });
        }

        function initAdjustmentMetricAutoCalc() {
            const modal = document.getElementById('aaFullSubmitModal');
            if (!modal || modal.dataset.metricCalcBound === '1') return;
            modal.dataset.metricCalcBound = '1';
            AA_METRIC_SOURCE_IDS.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('input', recalcAdjustmentDerivedMetrics);
                el.addEventListener('change', recalcAdjustmentDerivedMetrics);
            });
        }

        function openFullSubmitModal() {
            const modal = document.getElementById('aaFullSubmitModal');
            if (!modal) return;
            modal.classList.add('active');
            initAdjustmentMetricAutoCalc();
            initAttributionCheckedSegment();
            recalcAdjustmentDerivedMetrics();
            syncAttributionCheckedButtons();
            if (window.initUniversalSingleSelects) {
                window.initUniversalSingleSelects(modal);
            }
        }

        function closeFullSubmitModal() {
            document.getElementById('aaFullSubmitModal')?.classList.remove('active');
        }

        function openAdCreateFromAdjustment() {
            if (window.AmazonAdFormModal) {
                window.AmazonAdFormModal.openCreateModal();
                return;
            }
            if (window.openCreateModal) {
                window.openCreateModal();
            }
        }

        function downloadAdTemplateFromAdjustment() {
            window.location.href = '/api/amazon-ad-template';
        }

        function triggerAdUploadFromAdjustment() {
            const input = document.getElementById('adUploadInput');
            if (!input) return;
            input.value = '';
            input.click();
        }

        function uploadAdTemplateFromAdjustment(file) {
            if (!file) return;
            const doUpload = window.uploadBatchImportFile
                ? window.uploadBatchImportFile({
                    file,
                    url: '/api/amazon-ad-import',
                    title: '广告信息批量上传',
                    uploadSummary: '正在上传模板文件...',
                    processSummary: '正在解析并写入广告数据...',
                })
                : (() => {
                    const formData = new FormData();
                    formData.append('file', file);
                    return fetch('/api/amazon-ad-import', { method: 'POST', body: formData }).then(r => r.json());
                })();
            doUpload
                .then(data => {
                    const handled = window.handleBatchImportResponse
                        ? window.handleBatchImportResponse(data, {
                            title: '广告信息导入',
                            onSuccess: () => loadAdList(),
                        })
                        : false;
                    if (!handled && data.status === 'success') {
                        loadAdList();
                    }
                })
                .catch(err => aaSaveResult({ action: 'import', isError: true, message: '导入失败: ' + err }));
        }

        function escapeHtml(text) {
            return String(text == null ? '' : text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function adListCellText(value) {
            const text = String(value || '').trim();
            if (!text) return '<span class="aa-ad-cell-empty">-</span>';
            return escapeHtml(text);
        }

        function formatAdListLevelText(item) {
            const level = String(item.ad_level || 'campaign');
            if (level === 'portfolio') return '广告组合';
            if (level === 'group') return '广告组';
            return '广告活动';
        }

        function adListStatusCell(item) {
            return renderTargetStatusPill(item && item.status);
        }

        function renderTargetStatusPill(status) {
            const text = String(status || '启动').trim() || '启动';
            let pillClass = 'status-pill--enabled';
            if (text === '暂停') pillClass = 'status-pill--paused';
            else if (text === '存档') pillClass = 'status-pill--archived';
            return `<span class="status-segment status-segment--inline readonly" aria-label="状态：${escapeHtml(text)}"><span class="status-pill ${pillClass} is-active">${escapeHtml(text)}</span></span>`;
        }

        function normalizeOperationTypeName(name) {
            return String(name || '').replace(/[『』【】「」]/g, '').trim();
        }

        function getSelectedOperationType() {
            const opId = String(document.getElementById('operationType')?.value || '');
            if (!opId) return null;
            return allowedOperations.find(item => String(item.id) === opId) || null;
        }

        function isModifyDeliveryTargetOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('投放') && !n.includes('广告位');
        }

        function isModifyPlacementOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('广告位');
        }

        function isModifyBudgetOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('预算');
        }

        function isModifyBidStrategyOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('竞价策略');
        }

        function isModifyNameOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('名称');
        }

        function isFixedTargetObjectDashOp(op) {
            return isModifyBudgetOp(op) || isModifyBidStrategyOp(op) || isModifyNameOp(op);
        }

        function needsTargetObjectSuggest(op) {
            return isModifyDeliveryTargetOp(op) || isModifyPlacementOp(op);
        }

        function formatBudgetDisplay(raw) {
            if (raw == null || raw === '') return '';
            const n = parseFloat(raw);
            if (!Number.isFinite(n)) return String(raw).trim();
            return formatDecimalMetric(n, 2);
        }

        function syncOperationTypeFields() {
            const op = getSelectedOperationType();
            const targetInput = document.getElementById('targetObject');
            const beforeInput = document.getElementById('beforeValue');
            const afterInput = document.getElementById('afterValue');
            if (!targetInput) return;

            if (op && isFixedTargetObjectDashOp(op)) {
                targetInput.value = '-';
                targetInput.readOnly = true;
                hideTargetObjectSuggest();
            } else {
                targetInput.readOnly = false;
                if (targetInput.value === '-') targetInput.value = '';
            }

            if (!op || !selectedAdDetail) {
                syncValueQuickMenus();
                syncPlacementFieldHints();
                return;
            }

            if (isModifyBudgetOp(op)) {
                if (beforeInput) beforeInput.value = formatBudgetDisplay(selectedAdDetail.budget);
                if (afterInput) afterInput.value = '';
            } else if (isModifyBidStrategyOp(op)) {
                if (beforeInput) beforeInput.value = String(selectedAdDetail.bid_strategy || '').trim();
                if (afterInput) afterInput.value = '';
            } else if (isModifyNameOp(op)) {
                const name = String(selectedAdDetail.ad_name || '').trim();
                if (beforeInput) beforeInput.value = name;
                if (afterInput) afterInput.value = name;
            }
            syncValueQuickMenus();
            syncPlacementFieldHints();
        }

        function placementDisplayFromBid(bidRaw) {
            return placementDisplayFromStored(bidRaw);
        }

        function beforeValueFromTargetOption(target, op) {
            const bid = String((target && target.bid_value) || '').trim();
            if (!bid) return '';
            if (isModifyPlacementOp(op)) {
                return placementDisplayFromBid(bid);
            }
            if (isModifyDeliveryTargetOp(op)) {
                return bid;
            }
            return '';
        }

        function refreshBeforeValueForTargetObject() {
            const op = getSelectedOperationType();
            if (isFixedTargetObjectDashOp(op)) return;
            if (!needsTargetObjectSuggest(op)) return;
            const target = getMatchedTargetFromObject();
            const beforeInput = document.getElementById('beforeValue');
            if (!beforeInput) return;
            if (!target) return;
            const next = beforeValueFromTargetOption(target, op);
            if (isModifyPlacementOp(op)) {
                beforeInput.value = next;
            } else if (!String(beforeInput.value || '').trim()) {
                beforeInput.value = next;
            }
            syncValueQuickMenus();
            updateSubmitButtonState();
        }

        function oppositeDeliveryStatus(status) {
            const s = String(status || '').trim();
            if (s === '启动') return '暂停';
            if (s === '暂停') return '启动';
            return '';
        }

        function getMatchedTargetFromObject() {
            const desc = String(document.getElementById('targetObject')?.value || '').trim();
            if (!desc) return null;
            return targetOptionsCache.find(x => String(x.target_desc || '').trim() === desc) || null;
        }

        function buildQuickFillOptions(fieldId) {
            const op = getSelectedOperationType();
            const options = [];
            if (isModifyBidStrategyOp(op)) {
                if (fieldId === 'afterValue') {
                    const current = String(selectedAdDetail?.bid_strategy || '').trim();
                    AA_BID_STRATEGIES.filter(s => s !== current).forEach((strategy) => {
                        options.push({
                            value: strategy,
                            html: escapeHtml(strategy),
                            fillOppositeAfter: false,
                        });
                    });
                }
                return options;
            }
            if (!isModifyDeliveryTargetOp(op)) return options;
            const target = getMatchedTargetFromObject();
            if (!target) return options;
            const status = String(target.status || '启动').trim() || '启动';
            if (fieldId === 'beforeValue') {
                options.push({
                    value: status,
                    html: renderTargetStatusPill(status),
                    fillOppositeAfter: true,
                });
            } else if (fieldId === 'afterValue') {
                const opposite = oppositeDeliveryStatus(status);
                if (opposite) {
                    options.push({
                        value: opposite,
                        html: renderTargetStatusPill(opposite),
                        fillOppositeAfter: false,
                    });
                }
            }
            return options;
        }

        function applyQuickFillOption(fieldId, opt) {
            const input = document.getElementById(fieldId);
            if (!input || !opt) return;
            input.value = String(opt.value || '').trim();
            if (opt.fillOppositeAfter && fieldId === 'beforeValue') {
                const afterInput = document.getElementById('afterValue');
                if (afterInput) {
                    const opposite = oppositeDeliveryStatus(opt.value);
                    afterInput.value = opposite || '';
                }
            }
            updateSubmitButtonState();
        }

        function dismissInputCapsuleMenu(fromEl) {
            const host = fromEl && fromEl.closest ? fromEl.closest('.input-capsule-menu') : null;
            if (!host) return;
            host.classList.add('input-capsule-menu--closed');
            const reopen = () => {
                host.classList.remove('input-capsule-menu--closed');
                host.removeEventListener('mouseleave', reopen);
            };
            host.addEventListener('mouseleave', reopen);
        }

        function syncValueQuickMenus() {
            ['beforeValue', 'afterValue'].forEach((fieldId) => {
                const wrap = document.querySelector(`.aa-value-input-wrap[data-quick-field="${fieldId}"]`);
                const menu = document.getElementById(`${fieldId}QuickMenu`);
                if (!wrap || !menu) return;
                const options = buildQuickFillOptions(fieldId);
                wrap.classList.toggle('input-capsule-menu--empty', !options.length);
                if (!options.length) {
                    menu.innerHTML = '';
                    return;
                }
                menu.innerHTML = options.map((opt, idx) => (
                    `<button type="button" class="input-capsule-menu-item" role="menuitem" data-opt-idx="${idx}">${opt.html}</button>`
                )).join('');
                menu.querySelectorAll('.input-capsule-menu-item').forEach((btn) => {
                    btn.addEventListener('mousedown', (ev) => ev.preventDefault());
                    btn.addEventListener('click', (ev) => {
                        ev.preventDefault();
                        const idx = Number(btn.getAttribute('data-opt-idx'));
                        applyQuickFillOption(fieldId, options[idx]);
                    });
                });
            });
        }

        function syncTargetObjectPickMenu() {
            const wrap = document.getElementById('targetObjectWrap');
            const menu = document.getElementById('targetObjectPickMenu');
            if (!wrap || !menu) return;
            const op = getSelectedOperationType();
            const enabled = needsTargetObjectSuggest(op) && !isFixedTargetObjectDashOp(op);
            const list = enabled ? (Array.isArray(targetOptionsCache) ? targetOptionsCache : []) : [];
            wrap.classList.toggle('input-capsule-menu--empty', !list.length);
            if (!list.length) {
                menu.innerHTML = '';
                return;
            }
            menu.innerHTML = list.map((item, idx) => {
                const desc = String(item.target_desc || '').trim();
                return `<button type="button" class="input-capsule-menu-item" role="menuitem" data-opt-idx="${idx}">${renderTargetStatusPill(item.status)}<span class="aa-target-pick-name">${escapeHtml(desc)}</span></button>`;
            }).join('');
            menu.querySelectorAll('.input-capsule-menu-item').forEach((btn) => {
                btn.addEventListener('mousedown', (ev) => ev.preventDefault());
                btn.addEventListener('click', (ev) => {
                    ev.preventDefault();
                    const idx = Number(btn.getAttribute('data-opt-idx'));
                    const target = list[idx];
                    if (target) {
                        applyTargetObjectSelection(target, op);
                        dismissInputCapsuleMenu(btn);
                    }
                });
            });
        }

        function hideTargetObjectSuggest() {
            const panel = document.getElementById('targetObjectSuggest');
            if (!panel) return;
            panel.classList.remove('open');
            panel.innerHTML = '';
        }

        function applyTargetObjectSelection(target, op) {
            const input = document.getElementById('targetObject');
            const beforeInput = document.getElementById('beforeValue');
            if (!input || !target) return;
            input.value = String(target.target_desc || '').trim();
            if (beforeInput) {
                beforeInput.value = beforeValueFromTargetOption(target, op);
            }
            hideTargetObjectSuggest();
            refreshBeforeValueForTargetObject();
        }

        function filterTargetOptionsForSuggest(query) {
            const q = String(query || '').trim().toLowerCase();
            const list = Array.isArray(targetOptionsCache) ? targetOptionsCache : [];
            if (!q) return list.slice(0, 80);
            return list.filter(item => String(item.target_desc || '').toLowerCase().includes(q)).slice(0, 80);
        }

        function renderTargetObjectSuggest(query) {
            const panel = document.getElementById('targetObjectSuggest');
            const op = getSelectedOperationType();
            if (!panel || !needsTargetObjectSuggest(op)) {
                hideTargetObjectSuggest();
                return;
            }
            const matches = filterTargetOptionsForSuggest(query);
            if (!matches.length) {
                panel.innerHTML = '<div class="aa-target-suggest-empty">无匹配投放</div>';
                panel.classList.add('open');
                return;
            }
            panel.innerHTML = matches.map(item => {
                const desc = String(item.target_desc || '').trim();
                const enc = encodeURIComponent(desc);
                return `<button type="button" class="input-capsule-menu-item" role="option" data-target-desc-enc="${enc}">${renderTargetStatusPill(item.status)}<span class="aa-target-suggest-name">${escapeHtml(desc)}</span></button>`;
            }).join('');
            panel.querySelectorAll('.input-capsule-menu-item').forEach(btn => {
                btn.addEventListener('mousedown', (ev) => {
                    ev.preventDefault();
                });
                btn.addEventListener('click', (ev) => {
                    ev.preventDefault();
                    let desc = '';
                    try {
                        desc = decodeURIComponent(String(btn.getAttribute('data-target-desc-enc') || ''));
                    } catch (_err) {
                        desc = '';
                    }
                    const target = targetOptionsCache.find(x => String(x.target_desc || '').trim() === desc);
                    if (target) applyTargetObjectSelection(target, op);
                });
            });
            panel.classList.add('open');
        }

        function scheduleTargetObjectSuggest() {
            window.clearTimeout(targetSuggestTimer);
            targetSuggestTimer = window.setTimeout(() => {
                const op = getSelectedOperationType();
                if (!needsTargetObjectSuggest(op)) {
                    hideTargetObjectSuggest();
                    return;
                }
                const query = document.getElementById('targetObject')?.value || '';
                renderTargetObjectSuggest(query);
            }, 180);
        }

        function loadTargetOptionsForSelectedAd() {
            targetOptionsCache = [];
            hideTargetObjectSuggest();
            syncTargetObjectPickMenu();
            if (!selectedAdId) return Promise.resolve();
            return fetch(`/api/amazon-ad-adjustment?action=target-options&ad_item_id=${encodeURIComponent(selectedAdId)}`)
                .then(r => r.json())
                .then(data => {
                    if (!data || data.status !== 'success') {
                        targetOptionsCache = [];
                        syncTargetObjectPickMenu();
                        return;
                    }
                    targetOptionsCache = Array.isArray(data.items) ? data.items : [];
                    syncTargetObjectPickMenu();
                })
                .catch(() => {
                    targetOptionsCache = [];
                    syncTargetObjectPickMenu();
                });
        }

        function syncTargetObjectFieldMode() {
            const input = document.getElementById('targetObject');
            const op = getSelectedOperationType();
            const enabled = needsTargetObjectSuggest(op) && !isFixedTargetObjectDashOp(op);
            if (!input) return;
            if (enabled) {
                input.placeholder = '输入投放名称联想选择';
                if (!targetOptionsCache.length && selectedAdId) {
                    loadTargetOptionsForSelectedAd().then(() => scheduleTargetObjectSuggest());
                }
            } else if (op && isFixedTargetObjectDashOp(op)) {
                input.placeholder = '-';
            } else {
                input.placeholder = '关键词 / 竞价 / 投放位置';
                hideTargetObjectSuggest();
            }
            syncOperationTypeFields();
            syncTargetObjectPickMenu();
            syncPlacementFieldHints();
            refreshBeforeValueForTargetObject();
        }

        function tryAutofillBeforeValueFromTargetObject() {
            refreshBeforeValueForTargetObject();
        }

        const AA_AD_COL_LS = 'sj.amazonAdAdjustment.adTableCols.v4';
        const AA_AD_COL_KEYS = ['ad_level', 'ad_name', 'status'];
        const AA_AD_COL_DEFAULTS = { ad_level: 88, ad_name: 168, status: 80 };

        function loadAdTableColWidths() {
            try {
                const raw = localStorage.getItem(AA_AD_COL_LS);
                const parsed = raw ? JSON.parse(raw) : null;
                if (!parsed || typeof parsed !== 'object') return { ...AA_AD_COL_DEFAULTS };
                const out = { ...AA_AD_COL_DEFAULTS };
                AA_AD_COL_KEYS.forEach(key => {
                    const n = Number(parsed[key]);
                    out[key] = (Number.isFinite(n) && n >= 48) ? n : AA_AD_COL_DEFAULTS[key];
                });
                return out;
            } catch (e) {
                return { ...AA_AD_COL_DEFAULTS };
            }
        }

        function saveAdTableColWidths(widths) {
            try { localStorage.setItem(AA_AD_COL_LS, JSON.stringify(widths)); } catch (e) {}
        }

        function adListTableColWidthsSum(table) {
            const w = loadAdTableColWidths();
            if (!table) {
                return AA_AD_COL_KEYS.reduce((sum, key) => sum + Math.max(48, Number(w[key]) || 0), 0);
            }
            let sum = 0;
            AA_AD_COL_KEYS.forEach((key) => {
                const col = table.querySelector(`colgroup col[data-col="${key}"]`);
                if (col && col.style.width) {
                    const n = parseFloat(col.style.width);
                    if (Number.isFinite(n) && n > 0) {
                        sum += Math.ceil(n);
                        return;
                    }
                }
                sum += Math.max(48, Number(w[key]) || AA_AD_COL_DEFAULTS[key] || 48);
            });
            return sum;
        }

        function adListTableContentWidth() {
            const table = document.getElementById('adListTable');
            const fromCols = adListTableColWidthsSum(table);
            if (!table) return fromCols;
            let measured = 0;
            const headerRow = table.tHead && table.tHead.rows[0];
            if (headerRow) {
                measured = Array.from(headerRow.cells).reduce(
                    (sum, th) => sum + Math.ceil(th.getBoundingClientRect().width || 0),
                    0
                );
            }
            const scrollW = Math.ceil(table.scrollWidth || 0);
            return Math.max(fromCols, measured, scrollW, fromCols);
        }

        function syncAaLeftColumnWidth() {
            const leftCol = document.querySelector('.aa-left-col');
            if (!leftCol) return;
            const refCard = document.querySelector('.aa-ad-info-card') || document.querySelector('.aa-search-card');
            const cs = refCard ? getComputedStyle(refCard) : null;
            const padX = cs
                ? (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0)
                : 24;
            const listWrap = document.getElementById('adList');
            const listBorderX = listWrap
                ? (parseFloat(getComputedStyle(listWrap).borderLeftWidth) || 0)
                    + (parseFloat(getComputedStyle(listWrap).borderRightWidth) || 0)
                : 2;
            const table = document.getElementById('adListTable');
            const contentW = adListTableContentWidth();
            let innerW = Math.ceil(contentW + listBorderX + 2);
            const searchCard = document.querySelector('.aa-search-card');
            if (searchCard) {
                const searchInner = searchCard.querySelector('.aa-search-card-inner');
                const searchNeed = Math.ceil((searchInner || searchCard).scrollWidth || 0);
                if (searchNeed > innerW) innerW = searchNeed;
            }
            const outerW = Math.ceil(innerW + padX);
            leftCol.style.width = `${outerW}px`;
            leftCol.style.minWidth = `${outerW}px`;
            leftCol.style.maxWidth = 'none';
            if (listWrap) {
                listWrap.style.width = `${innerW}px`;
                listWrap.style.minWidth = `${innerW}px`;
                listWrap.style.maxWidth = 'none';
            }
            const infoCard = document.querySelector('.aa-ad-info-card');
            [infoCard, searchCard].forEach((card) => {
                if (!card) return;
                card.style.width = `${outerW}px`;
                card.style.minWidth = `${outerW}px`;
                card.style.maxWidth = 'none';
            });
            if (table) {
                table.style.width = `${contentW}px`;
            }
        }

        let _aaLeftColWidthTimer = null;
        function scheduleSyncAaLeftColumnWidth() {
            if (_aaLeftColWidthTimer) clearTimeout(_aaLeftColWidthTimer);
            _aaLeftColWidthTimer = setTimeout(() => {
                _aaLeftColWidthTimer = null;
                syncAaLeftColumnWidth();
                requestAnimationFrame(syncAaLeftColumnWidth);
            }, 0);
        }

        function applyAdTableColWidths() {
            const table = document.getElementById('adListTable');
            if (!table) return;
            const w = loadAdTableColWidths();
            AA_AD_COL_KEYS.forEach(key => {
                const col = table.querySelector(`colgroup col[data-col="${key}"]`);
                if (col) col.style.width = `${Math.max(48, w[key])}px`;
            });
            scheduleSyncAaLeftColumnWidth();
        }

        function initAdTableColResize() {
            const table = document.getElementById('adListTable');
            if (!table) return;
            table.querySelectorAll('thead th[data-col-key]').forEach(th => {
                const key = th.getAttribute('data-col-key');
                const handle = th.querySelector('.aa-col-resizer');
                if (!key || !handle || handle.dataset.bound === '1') return;
                handle.dataset.bound = '1';
                handle.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const startX = e.clientX;
                    const col = table.querySelector(`colgroup col[data-col="${key}"]`);
                    const startW = col ? (col.getBoundingClientRect().width || loadAdTableColWidths()[key]) : loadAdTableColWidths()[key];
                    handle.classList.add('is-active');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    function onMove(ev) {
                        const next = Math.max(56, Math.round(startW + (ev.clientX - startX)));
                        if (col) col.style.width = `${next}px`;
                        scheduleSyncAaLeftColumnWidth();
                    }
                    function onUp(ev) {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        handle.classList.remove('is-active');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        const widths = loadAdTableColWidths();
                        const colEl = table.querySelector(`colgroup col[data-col="${key}"]`);
                        widths[key] = colEl ? Math.max(56, Math.round(colEl.getBoundingClientRect().width)) : widths[key];
                        saveAdTableColWidths(widths);
                        scheduleSyncAaLeftColumnWidth();
                    }
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        }

        function bindAdListRowEvents() {
            const wrap = document.getElementById('adList');
            if (!wrap || wrap.dataset.rowBound === '1') return;
            wrap.dataset.rowBound = '1';
            wrap.addEventListener('click', function (e) {
                if (e.target.closest('.aa-col-resizer')) return;
                const tr = e.target.closest('tbody tr[data-ad-id]');
                if (!tr) return;
                selectAd(tr.getAttribute('data-ad-id'));
            });
            wrap.addEventListener('keydown', function (e) {
                const tr = e.target.closest('tbody tr[data-ad-id]');
                if (!tr) return;
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    selectAd(tr.getAttribute('data-ad-id'));
                }
            });
        }

        function highlightSelectedAdRow() {
            const table = document.getElementById('adListTable');
            if (!table) return;
            table.querySelectorAll('tbody tr[data-ad-id]').forEach(tr => {
                const on = String(tr.getAttribute('data-ad-id')) === String(selectedAdId);
                tr.classList.toggle('is-active', on);
                tr.setAttribute('aria-selected', on ? 'true' : 'false');
            });
        }

        function renderAdList() {
            const wrap = document.getElementById('adList');
            if (!adItems.length) {
                wrap.innerHTML = '<div class="aa-list-empty">暂无广告信息</div>';
                scheduleSyncAaLeftColumnWidth();
                return;
            }
            const widths = loadAdTableColWidths();
            const rows = adItems.map(item => {
                const active = String(item.id) === String(selectedAdId);
                const adLevelText = formatAdListLevelText(item);
                const adName = item.ad_name || '';
                const rowTitle = `${adLevelText} · ${adName || '-'}`;
                return `
                    <tr data-ad-id="${item.id}" class="${active ? 'is-active' : ''}" tabindex="0" role="row" aria-selected="${active ? 'true' : 'false'}" title="${escapeHtml(rowTitle)}">
                        <td>${adListCellText(adLevelText)}</td>
                        <td>${adListCellText(adName)}</td>
                        <td>${adListStatusCell(item)}</td>
                    </tr>
                `;
            }).join('');
            wrap.innerHTML = `
                <table class="aa-ad-table" id="adListTable">
                    <colgroup>
                        <col data-col="ad_level" style="width:${widths.ad_level}px">
                        <col data-col="ad_name" style="width:${widths.ad_name}px">
                        <col data-col="status" style="width:${widths.status}px">
                    </colgroup>
                    <thead>
                        <tr>
                            <th data-col-key="ad_level">广告层级<span class="aa-col-resizer" aria-hidden="true"></span></th>
                            <th data-col-key="ad_name">广告名称<span class="aa-col-resizer" aria-hidden="true"></span></th>
                            <th data-col-key="status">状态<span class="aa-col-resizer" aria-hidden="true"></span></th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
            initAdTableColResize();
            applyAdTableColWidths();
            scheduleSyncAaLeftColumnWidth();
        }

        function loadAdList() {
            return fetch('/api/amazon-ad-adjustment?action=ad-search')
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        adItemsRaw = [];
                        adItems = [];
                        renderAdList();
                        return;
                    }
                    adItemsRaw = data.items || [];
                    applyAdListFiltersAndRender();
                })
                .catch(() => {
                    adItemsRaw = [];
                    adItems = [];
                    renderAdList();
                });
        }

        function renderOperationOptions(selectedId) {
            const opSelect = document.getElementById('operationType');
            const current = String(selectedId || '');
            opSelect.innerHTML = '<option value="">请选择操作类型</option>';
            allowedOperations.forEach(op => {
                if (String(op.name || '').trim() === '【新建】') return;
                const option = document.createElement('option');
                option.value = op.id;
                option.textContent = op.name || `操作${op.id}`;
                if (current && String(op.id) === current) option.selected = true;
                opSelect.appendChild(option);
            });
            if (window.refreshUniversalSingleSelect) window.refreshUniversalSingleSelect(opSelect);
            syncReasonOptions();
        }

        function syncReasonOptions() {
            const opId = String(document.getElementById('operationType').value || '');
            const reasonSelect = document.getElementById('operationReason');
            reasonSelect.innerHTML = '<option value="">请选择修改原因</option>';
            const op = allowedOperations.find(item => String(item.id) === opId);
            const reasons = op ? (op.reasons || []) : [];
            reasons.forEach(reason => {
                const name = String(reason.reason_name || '').trim();
                if (!name) return;
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                reasonSelect.appendChild(option);
            });
            const firstReason = reasons
                .map(reason => String(reason.reason_name || '').trim())
                .find(Boolean);
            reasonSelect.value = firstReason || '';
            if (window.refreshUniversalSingleSelect) window.refreshUniversalSingleSelect(reasonSelect);
            syncTargetObjectFieldMode();
            refreshBeforeValueForTargetObject();
            updateSubmitButtonState();
        }

        function listItemToAdInfo(item) {
            if (!item) {
                return { ad_type_text: '-', portfolio_name: '-', campaign_name: '-', group_name: '-' };
            }
            const level = String(item.ad_level || 'campaign');
            if (level === 'portfolio') {
                return {
                    ad_type_text: item.ad_type_text || '-',
                    portfolio_name: item.ad_name || item.portfolio_name || '-',
                    campaign_name: '-',
                    group_name: '-',
                };
            }
            if (level === 'group') {
                return {
                    ad_type_text: item.ad_type_text || '-',
                    portfolio_name: item.portfolio_name || '-',
                    campaign_name: item.campaign_name || '-',
                    group_name: item.ad_name || '-',
                };
            }
            return {
                ad_type_text: item.ad_type_text || '-',
                portfolio_name: item.portfolio_name || '-',
                campaign_name: item.ad_name || '-',
                group_name: '-',
            };
        }

        function updateInfoPanel(adInfo) {
            const info = adInfo || {};
            document.getElementById('infoAdType').innerText = info.ad_type_text || '-';
            document.getElementById('infoPortfolio').innerText = info.portfolio_name || '-';
            const campaignText = info.campaign_name || '-';
            const groupText = info.group_name || '-';
            const campaignEl = document.getElementById('infoCampaign');
            const groupEl = document.getElementById('infoGroup');
            if (campaignEl) {
                campaignEl.innerText = campaignText;
                campaignEl.title = campaignText !== '-' ? campaignText : '';
            }
            if (groupEl) {
                groupEl.innerText = groupText;
                groupEl.title = groupText !== '-' ? groupText : '';
            }
            syncHierarchyFilterButtons();
        }

        function setFieldValue(id, value) {
            const input = document.getElementById(id);
            if (!input) return;
            input.value = value || '';
        }

        function selectAd(adId) {
            selectedAdId = String(adId || '');
            selectedAd = adItems.find(item => String(item.id) === selectedAdId) || null;
            highlightSelectedAdRow();
            updateInfoPanel(selectedAd ? listItemToAdInfo(selectedAd) : null);
            updateRecordsLink();
            loadAdjustmentPeriodList();
            fetch(`/api/amazon-ad-adjustment?action=defaults&ad_item_id=${encodeURIComponent(selectedAdId)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        if (window.showAppToast) window.showAppToast(data.message || '加载默认信息失败', true, 6500);
                        return;
                    }
                    const adInfo = data.ad_info || {};
                    selectedAdDetail = {
                        ad_name: adInfo.ad_name || '',
                        budget: adInfo.budget,
                        bid_strategy: adInfo.bid_strategy || '',
                    };
                    updateInfoPanel(adInfo);
                    allowedOperations = data.allowed_operations || [];
                    renderOperationOptions('');
                    const defaults = data.defaults || {};
                    setFieldValue('adjustDate', toDatetimeLocal(defaults.adjust_date));
                    setFieldValue('startTime', toDatetimeLocal(defaults.start_time));
                    setFieldValue('endTime', toDatetimeLocal(defaults.end_time));
                    setFieldValue('targetObject', '');
                    setFieldValue('beforeValue', '');
                    setFieldValue('afterValue', '');
                    setFieldValue('impressions', '');
                    setFieldValue('clicks', '');
                    setFieldValue('cost', '');
                    setFieldValue('orders', '');
                    setFieldValue('sales', '');
                    setFieldValue('acos', '');
                    setFieldValue('cpc', '');
                    setFieldValue('ctr', '');
                    setFieldValue('cvr', '');
                    setFieldValue('topOfSearchIs', '');
                    setFieldValue('attributionOrders', '');
                    setFieldValue('attributionSales', '');
                    setFieldValue('remark', '');
                    setAttributionChecked(false);
                    hideTargetObjectSuggest();
                    updateSubmitButtonState();
                    loadTargetOptionsForSelectedAd().then(() => syncTargetObjectFieldMode());
                })
                .catch(err => {
                    if (window.showAppToast) window.showAppToast('加载默认信息失败: ' + err, true, 6500);
                });
        }

        function buildPayload(isQuickSubmit) {
            return {
                is_quick_submit: isQuickSubmit ? 1 : 0,
                ad_item_id: selectedAdId,
                operation_type_id: document.getElementById('operationType').value,
                reason_name: document.getElementById('operationReason').value,
                target_object: document.getElementById('targetObject').value.trim(),
                before_value: resolveAdjustmentValueForSubmit('beforeValue', document.getElementById('beforeValue').value),
                after_value: resolveAdjustmentValueForSubmit('afterValue', document.getElementById('afterValue').value),
                adjust_date: document.getElementById('adjustDate').value,
                start_time: document.getElementById('startTime').value,
                end_time: document.getElementById('endTime').value,
                impressions: document.getElementById('impressions').value.trim(),
                clicks: document.getElementById('clicks').value.trim(),
                cost: document.getElementById('cost').value.trim(),
                orders: document.getElementById('orders').value.trim(),
                sales: document.getElementById('sales').value.trim(),
                acos: document.getElementById('acos').value.trim(),
                cpc: document.getElementById('cpc').value.trim(),
                ctr: document.getElementById('ctr').value.trim(),
                cvr: document.getElementById('cvr').value.trim(),
                top_of_search_is: document.getElementById('topOfSearchIs').value.trim(),
                attribution_checked: getAttributionCheckedValue(),
                attribution_orders: document.getElementById('attributionOrders').value.trim(),
                attribution_sales: document.getElementById('attributionSales').value.trim(),
                remark: document.getElementById('remark').value.trim()
            };
        }

        function canSubmitPhase1() {
            return validatePhase1().length === 0;
        }

        function updateSubmitButtonState() {
            const ok = canSubmitPhase1();
            document.getElementById('submitBtn').disabled = !ok;
            document.getElementById('quickSubmitBtn').disabled = !ok;
        }

        function postRecord(isQuickSubmit, onSuccess) {
            const payload = buildPayload(isQuickSubmit);
            const btn = isQuickSubmit ? document.getElementById('quickSubmitBtn') : document.getElementById('submitBtn');
            if (btn) btn.disabled = true;
            fetch('/api/amazon-ad-adjustment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    aaSaveResult({ action: 'create', isError: true, message: data.message || '提交失败' });
                    return;
                }
                aaSaveResult({
                    action: 'create',
                    message: isQuickSubmit ? '快速提交成功' : '提交并记录成功',
                });
                if (typeof onSuccess === 'function') onSuccess();
                updateRecordsLink();
                loadAdjustmentPeriodList();
                if (selectedAdId) {
                    fetch(`/api/amazon-ad-adjustment?action=defaults&ad_item_id=${encodeURIComponent(selectedAdId)}`)
                        .then(r => r.json())
                        .then(d => {
                            if (d.status === 'success' && d.defaults) {
                                setFieldValue('startTime', toDatetimeLocal(d.defaults.start_time));
                                setFieldValue('endTime', toDatetimeLocal(d.defaults.end_time));
                                setFieldValue('adjustDate', toDatetimeLocal(d.defaults.adjust_date));
                            }
                        });
                }
            })
            .catch(err => aaSaveResult({ action: 'create', isError: true, message: '提交失败: ' + err }))
            .finally(() => updateSubmitButtonState());
        }

        function submitRecord() {
            const errs = validatePhase1();
            if (errs.length) {
                aaValidationToast(errs[0]);
                return;
            }
            openFullSubmitModal();
        }

        function confirmFullSubmit() {
            const phase1 = validatePhase1();
            if (phase1.length) {
                aaValidationToast(phase1[0]);
                closeFullSubmitModal();
                return;
            }
            const phase2 = validatePhase2();
            if (phase2.length) {
                aaValidationToast(phase2[0]);
                return;
            }
            postRecord(false, closeFullSubmitModal);
        }

        function quickSubmit() {
            const errs = validatePhase1();
            if (errs.length) {
                aaValidationToast(errs[0]);
                return;
            }
            postRecord(true);
        }

        function updateRecordsLink() {
            const link = document.getElementById('aaRecordsLink');
            if (!link) return;
            if (selectedAdId) {
                link.href = `/amazon-ad-adjustment-records-management?ad_item_id=${encodeURIComponent(selectedAdId)}`;
                link.style.display = '';
            } else {
                link.href = '/amazon-ad-adjustment-records-management';
                link.style.display = 'none';
            }
        }

        document.getElementById('operationType').addEventListener('change', syncReasonOptions);
        ['filterByPortfolioBtn', 'filterByCampaignBtn', 'filterByGroupBtn'].forEach((btnId) => {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            btn.addEventListener('click', () => {
                const type = String(btn.getAttribute('data-filter-type') || '').trim();
                if (type) toggleHierarchyFilter(type);
            });
        });
        (function initTargetObjectSuggest() {
            const input = document.getElementById('targetObject');
            if (!input) return;
            input.addEventListener('input', () => {
                if (input.readOnly) return;
                scheduleTargetObjectSuggest();
                syncValueQuickMenus();
                if (isModifyPlacementOp(getSelectedOperationType())) {
                    refreshBeforeValueForTargetObject();
                }
                updateSubmitButtonState();
            });
            input.addEventListener('focus', () => {
                if (input.readOnly) return;
                scheduleTargetObjectSuggest();
            });
            input.addEventListener('blur', () => {
                window.setTimeout(() => {
                    hideTargetObjectSuggest();
                    tryAutofillBeforeValueFromTargetObject();
                    syncValueQuickMenus();
                }, 160);
            });
            document.addEventListener('click', (ev) => {
                const wrap = document.getElementById('targetObjectWrap');
                if (wrap && !wrap.contains(ev.target)) hideTargetObjectSuggest();
            });
        })();
        document.getElementById('adUploadInput').addEventListener('change', function(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            uploadAdTemplateFromAdjustment(file);
        });
        ['targetObject', 'beforeValue', 'afterValue', 'operationReason'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('input', updateSubmitButtonState);
            el.addEventListener('change', updateSubmitButtonState);
        });

        document.getElementById('adSearchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadAdList();
        });

        window.addEventListener('resize', () => scheduleSyncAaLeftColumnWidth());
        window.addEventListener('DOMContentLoaded', () => {
            if (window.initUniversalSingleSelects) window.initUniversalSingleSelects(document);
            bindAdListRowEvents();
            initAdSearchPrefs();
            initAdjustmentMetricAutoCalc();
            initAttributionCheckedSegment();
            syncValueQuickMenus();
            syncTargetObjectPickMenu();
            syncPlacementFieldHints();
            if (window.AmazonAdFormModal) {
                window.AmazonAdFormModal.init({
                    onSaveSuccess: (data) => {
                        const newId = data && (data.item?.id || data.id);
                        return loadAdList().then(() => {
                            if (newId) selectAd(newId);
                        });
                    },
                    showSuccessToast: (msg) => aaSaveResult({ action: 'save', message: msg || undefined }),
                });
            }
            loadAdList();
            updateRecordsLink();
            const fullModal = document.getElementById('aaFullSubmitModal');
            if (fullModal && typeof window.bindPmModalBackdropClose === 'function') {
                window.bindPmModalBackdropClose(fullModal, closeFullSubmitModal);
            }
        });
    </script>

    <script src="/static/js/header.js"></script>
    <script src="/static/js/amazon_ad_form_modal.js"></script>
</body>
</html>
