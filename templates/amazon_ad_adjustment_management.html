<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon广告管理 - 广告调整</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .aa-grid {
            display: grid;
            grid-template-columns: auto minmax(250px, 280px) minmax(320px, 1fr);
            gap: 1rem;
            align-items: stretch;
        }
        /* 覆盖 style.css 中 .pm-layout > * { min-width:0 }，避免左侧栏被压窄导致表格横向滚动 */
        .pm-layout.pm-layout--aa-adjust > .aa-grid {
            min-width: 0;
            width: 100%;
            max-width: 100%;
        }
        .pm-layout.pm-layout--aa-adjust .aa-left-col {
            min-width: min-content;
            width: auto;
            max-width: none;
        }
        .aa-left-col {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex: 0 0 auto;
            width: auto;
            max-width: none;
            min-width: min-content;
            min-height: 100%;
            align-self: start;
        }
        .aa-search-card,
        .aa-ad-info-card {
            width: 100%;
            box-sizing: border-box;
        }
        .aa-right-col {
            display: flex;
            flex-direction: column;
            min-width: 0;
            max-width: 300px;
            min-height: 100%;
            padding: 0.75rem 0.85rem;
            overflow: visible;
        }
        .aa-form-stack {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1 1 auto;
            min-height: 0;
            overflow: visible;
        }
        .aa-form-block-title {
            margin: 0.35rem 0 0.15rem;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--morandi-ink);
        }
        .aa-form-block-title:first-child {
            margin-top: 0;
        }
        .aa-field-row {
            display: flex;
            flex-direction: column;
            gap: 0.22rem;
            overflow: visible;
        }
        .aa-field-row label {
            font-size: 0.8rem;
            color: var(--morandi-slate);
            font-weight: 600;
        }
        .aa-field-row .aa-readonly {
            font-size: 0.86rem;
            color: var(--morandi-ink);
            padding: 0.42rem 0.5rem;
            border-radius: 6px;
            border: 1px solid rgba(207, 199, 189, 0.55);
            background: rgba(255, 255, 255, 0.7);
            word-break: break-word;
            min-height: 1.35rem;
        }
        .aa-info-value-wrap {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .aa-info-value-wrap .aa-readonly {
            flex: 1 1 auto;
            min-width: 0;
        }
        #infoCampaign,
        #infoGroup {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            word-break: normal;
        }
        .aa-field-row select,
        .aa-field-row input[type="text"],
        .aa-field-row input[type="datetime-local"] {
            width: 100%;
            box-sizing: border-box;
            font-size: 0.86rem;
            padding: 0.42rem 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--morandi-sand);
        }
        .aa-target-input-area {
            position: relative;
            flex: 1 1 auto;
            min-width: 0;
        }
        .aa-adjust-value-input {
            font-size: 0.86rem;
            padding: 0.42rem 0.5rem;
        }
        .aa-target-object-wrap #targetObject:read-only {
            background: rgba(255, 255, 255, 0.7);
            color: var(--morandi-slate);
            cursor: default;
        }
        .aa-target-object-wrap .input-capsule-menu-panel {
            width: max-content;
            min-width: 100%;
            max-width: min(520px, calc(100vw - 24px));
            max-height: 220px;
            overflow-x: auto;
            overflow-y: auto;
            padding: 0.25rem;
        }
        .aa-target-object-wrap .input-capsule-menu-item {
            gap: 0.35rem;
            font-size: 0.76rem;
            padding: 0.28rem 0.38rem;
            white-space: nowrap;
        }
        .aa-target-object-wrap .input-capsule-menu-item .status-pill {
            font-size: 0.68rem;
            padding: 0.08rem 0.32rem;
        }
        .aa-target-object-wrap .input-capsule-menu-item .status-segment {
            flex: 0 0 auto;
        }
        .aa-target-suggest-list {
            display: none;
            position: absolute;
            left: 0;
            top: calc(100% + 4px);
            z-index: 40;
            width: max-content;
            min-width: 100%;
            max-width: min(520px, calc(100vw - 24px));
            max-height: 180px;
            overflow: auto;
            padding: 0.25rem;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
        }
        .aa-target-suggest-list.open {
            display: block;
        }
        .aa-target-pick-name,
        .aa-target-suggest-name {
            flex: 0 1 auto;
            min-width: 0;
            white-space: nowrap;
        }
        .aa-target-suggest-list .input-capsule-menu-item {
            white-space: nowrap;
        }
        .aa-target-suggest-empty {
            padding: 0.38rem 0.45rem;
            font-size: 0.76rem;
            color: var(--morandi-slate);
        }
        .aa-value-input-wrap {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            overflow: visible;
        }
        .aa-target-object-wrap {
            overflow: visible;
        }
        .aa-value-input-wrap > input[type="text"],
        .aa-target-input-area > input[type="text"] {
            flex: 1 1 auto;
            min-width: 0;
            width: auto !important;
        }
        .aa-target-input-area > input[type="text"] {
            width: 100% !important;
            box-sizing: border-box;
        }
        .aa-value-input-wrap.input-capsule-menu--empty .btn-capsule-sm,
        .aa-target-object-wrap.input-capsule-menu--empty .btn-capsule-sm {
            opacity: 0.35;
            pointer-events: none;
        }
        .aa-info-value-wrap .btn-capsule-sm,
        .aa-value-input-wrap .btn-capsule-sm,
        .aa-target-object-wrap .btn-capsule-sm {
            font-size: 0.58rem;
        }
        .aa-target-object-wrap .btn-capsule-sm.aa-sku-indicator {
            font-weight: 700;
        }
        .aa-target-object-wrap .btn-capsule-sm.aa-sku-indicator--valid {
            color: #fff;
            background: #16a34a;
            border-color: #15803d;
            opacity: 1;
            pointer-events: auto;
        }
        .aa-target-object-wrap .btn-capsule-sm.aa-sku-indicator--invalid {
            color: #fff;
            background: #dc2626;
            border-color: #b91c1c;
            opacity: 1;
            pointer-events: auto;
        }
        .aa-search-card {
            padding: 0.75rem;
            flex: 0 0 auto;
        }
        .aa-ad-info-card {
            padding: 0.75rem;
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .aa-ad-info-card h3 {
            margin: 0 0 0.55rem 0;
            flex: 0 0 auto;
        }
        .aa-list-wrap {
            border: 1px solid var(--morandi-sand);
            border-radius: 10px;
            background: #fff;
            flex: 1 1 auto;
            min-height: 0;
            width: fit-content;
            min-width: min-content;
            max-width: none;
            overflow-x: visible;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .aa-ad-table {
            width: max-content;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 0.82rem;
        }
        .aa-ad-table thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: rgba(236, 231, 223, 0.92);
            border-bottom: 1px solid rgba(207, 199, 189, 0.65);
            padding: 0.42rem 0.5rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--morandi-slate);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .aa-ad-table thead th {
            position: relative;
        }
        .aa-col-resizer {
            position: absolute;
            top: 0;
            right: 0;
            width: 8px;
            height: 100%;
            cursor: col-resize;
            user-select: none;
        }
        .aa-col-resizer::after {
            content: '';
            position: absolute;
            top: 18%;
            bottom: 18%;
            right: 2px;
            width: 2px;
            border-radius: 1px;
            background: rgba(123, 128, 136, 0.45);
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .aa-ad-table thead th:hover .aa-col-resizer::after,
        .aa-col-resizer.is-active::after {
            opacity: 1;
        }
        .aa-ad-table tbody tr {
            cursor: pointer;
            transition: background-color 0.12s ease;
        }
        .aa-ad-table tbody tr:hover {
            background: rgba(207, 199, 189, 0.22);
        }
        .aa-ad-table tbody tr.is-active {
            background: rgba(207, 199, 189, 0.45);
        }
        .aa-ad-table tbody tr.is-active:hover {
            background: rgba(207, 199, 189, 0.52);
        }
        .aa-ad-table tbody tr:focus-visible {
            outline: 2px solid rgba(91, 143, 199, 0.55);
            outline-offset: -2px;
        }
        .aa-ad-table td {
            padding: 0.42rem 0.5rem;
            border-bottom: 1px solid rgba(207, 199, 189, 0.38);
            vertical-align: top;
            line-height: 1.35;
            word-break: break-word;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .aa-ad-table tbody tr:last-child td {
            border-bottom: none;
        }
        .aa-ad-cell-empty { color: var(--morandi-slate); opacity: 0.45; font-weight: 400; }
        .aa-list-empty {
            padding: 0.7rem;
            text-align: center;
            color: var(--morandi-slate);
        }

        .aa-actions {
            margin-top: 0.65rem;
            padding-top: 0.55rem;
            border-top: 1px solid rgba(207, 199, 189, 0.45);
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
            flex: 0 0 auto;
        }
        .aa-actions .btn-primary,
        .aa-actions .btn-secondary {
            width: 100%;
        }
        .aa-extra-modal .pm-form {
            gap: 0.55rem;
        }
        .aa-extra-modal .aa-form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.55rem 0.75rem;
        }
        .aa-extra-modal .aa-computed-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.55rem 0.75rem;
        }
        .aa-extra-modal .aa-computed-hint {
            margin: 0 0 0.5rem;
            font-size: 0.82rem;
            color: var(--morandi-slate);
        }
        .aa-extra-modal .yes-no-field {
            display: inline-flex;
            align-items: center;
        }
        .aa-extra-modal .yes-no-input {
            display: none;
        }
        .aa-extra-modal input.aa-computed-input {
            background: rgba(236, 231, 223, 0.35);
        }
        .aa-period-col {
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            padding: 0.75rem 0.85rem;
            max-height: calc(100vh - 140px);
        }
        .aa-period-col h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1rem;
            flex: 0 0 auto;
        }
        .aa-period-list-wrap {
            flex: 1 1 auto;
            min-height: 0;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 0.55rem;
            border: 1px solid var(--morandi-sand);
            border-radius: 10px;
            background: #fff;
            padding: 0.45rem;
            scroll-behavior: smooth;
        }
        .aa-period-empty {
            flex: 1 1 auto;
            min-width: 100%;
            padding: 0.75rem;
            text-align: center;
            color: var(--morandi-slate);
            font-size: 0.86rem;
        }
        .aa-period-card {
            flex: 0 0 auto;
            width: min(300px, 78vw);
            border: 1px solid rgba(207, 199, 189, 0.55);
            border-radius: 10px;
            padding: 0.5rem 0.55rem;
            background: rgba(255, 255, 255, 0.96);
            font-size: 0.76rem;
            line-height: 1.32;
            display: flex;
            flex-direction: column;
            gap: 0.38rem;
        }
        .aa-period-card-head {
            font-weight: 700;
            color: var(--morandi-ink);
            padding-bottom: 0.32rem;
            border-bottom: 1px dashed rgba(207, 199, 189, 0.5);
            font-size: 0.8rem;
        }
        .aa-period-block {
            border: 1px solid rgba(207, 199, 189, 0.42);
            border-radius: 8px;
            padding: 0.38rem 0.42rem;
            background: rgba(255, 255, 255, 0.88);
        }
        .aa-period-block-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--morandi-slate);
            margin-bottom: 0.3rem;
            letter-spacing: 0.02em;
        }
        .aa-period-field-list {
            display: flex;
            flex-direction: column;
            gap: 0.24rem;
        }
        .aa-period-field-row {
            display: grid;
            grid-template-columns: 4.4rem minmax(0, 1fr);
            gap: 0.28rem 0.35rem;
            align-items: start;
        }
        .aa-period-field-k {
            font-size: 0.66rem;
            font-weight: 600;
            color: var(--morandi-slate);
            padding-top: 0.12rem;
        }
        .aa-period-field-v {
            font-size: 0.75rem;
            color: var(--morandi-ink);
            word-break: break-word;
            padding: 0.12rem 0.2rem;
            border-radius: 4px;
            background: rgba(248, 246, 242, 0.65);
        }
        .aa-period-data-grid {
            display: grid;
            grid-template-columns: 4.4rem minmax(0, 1fr) 4.2rem;
            gap: 0.2rem 0.32rem;
            align-items: stretch;
        }
        .aa-period-data-grid--2col {
            grid-template-columns: 4.4rem minmax(0, 1fr);
        }
        .aa-period-daily-badge {
            grid-row: 1 / span 2;
            grid-column: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.25;
            border-radius: 6px;
            background: rgba(236, 231, 223, 0.45);
            border: 1px solid rgba(188, 180, 170, 0.45);
            padding: 0.22rem 0.16rem;
            font-size: 0.68rem;
            color: var(--morandi-slate);
        }
        .aa-period-daily-badge .aa-period-daily-sub {
            display: block;
            margin-top: 0.12rem;
            font-weight: 700;
            color: var(--morandi-ink);
        }
        .aa-period-grid-label {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--morandi-slate);
            padding: 0.14rem 0;
        }
        .aa-period-grid-val {
            font-size: 0.76rem;
            color: var(--morandi-ink);
            padding: 0.14rem 0.2rem;
            word-break: break-word;
            border-radius: 4px;
            background: rgba(248, 246, 242, 0.65);
        }
        .aa-period-grid-daily {
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--morandi-ink);
            padding: 0.14rem 0.1rem;
            text-align: center;
            word-break: break-word;
        }
        .aa-period-grid-val--span-daily {
            grid-column: 2 / -1;
        }
        .aa-period-attrib-stack {
            display: flex;
            flex-direction: column;
            gap: 0.28rem;
        }
        .aa-period-attrib-field label {
            display: block;
            font-size: 0.66rem;
            font-weight: 600;
            color: var(--morandi-slate);
            margin-bottom: 0.1rem;
        }
        /* 归因输入使用全站 .inline-input，卡片内规格见 static/css/style.css → .aa-period-card .inline-input */
        .aa-period-attrib-checked {
            font-size: 0.7rem;
            color: var(--morandi-slate);
            padding-bottom: 0.08rem;
        }
        .aa-period-attrib-checked strong {
            color: var(--morandi-ink);
        }
        .btn-quick-small {
            padding: 0.3rem 0.55rem;
            font-size: 0.78rem;
            line-height: 1;
        }
        .aa-search-card-inner {
            display: grid;
            gap: 0.65rem;
            min-width: 0;
        }
        .aa-search-row {
            margin: 0;
            max-width: none;
            width: 100%;
            flex-wrap: wrap;
        }
        .aa-search-row .pm-search-title {
            flex: 0 0 auto;
        }
        .aa-search-row input[type="text"] {
            flex: 1 1 8rem;
            min-width: 0;
        }
        .aa-search-options {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.85rem 1.1rem;
            font-size: 0.9rem;
            color: var(--morandi-ink);
        }
        .aa-search-options label {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            user-select: none;
        }
        .aa-search-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.2rem;">
            <h2>Amazon广告管理 - 广告调整</h2>
            <p>按广告信息执行调整并记录效果区间数据，支持提交并记录与快速提交</p>
        </section>

        <section class="pm-layout pm-layout--aa-adjust">
            <div class="aa-grid">
                <div class="aa-left-col">
                    <div class="card pm-card aa-search-card">
                        <div class="aa-search-card-inner">
                            <div class="form-group pm-search aa-search-row">
                                <span class="pm-search-title">搜索</span>
                                <input type="text" id="adSearchInput" placeholder="搜索广告类型/组合/活动/组">
                                <button type="button" class="btn-primary" onclick="loadAdList()">搜索</button>
                            </div>
                            <div class="aa-search-options">
                                <label><input type="checkbox" id="adSearchShowPaused"> 显示暂停</label>
                                <label><input type="checkbox" id="adSearchShowArchived"> 显示存档</label>
                                <label><input type="checkbox" id="adSearchExactMatch"> 精准匹配</label>
                            </div>
                            <div class="aa-search-actions">
                                <button type="button" class="btn-accent" onclick="openAdCreateFromAdjustment()">新增广告信息</button>
                                <button type="button" class="btn-secondary" onclick="downloadAdTemplateFromAdjustment()">下载模板</button>
                                <button type="button" class="btn-secondary" onclick="triggerAdUploadFromAdjustment()">批量上传</button>
                                <input type="file" id="adUploadInput" accept=".xlsx" style="display:none;">
                            </div>
                        </div>
                    </div>

                    <div class="card pm-card aa-ad-info-card">
                        <h3>广告信息</h3>
                        <div class="aa-list-wrap" id="adList">
                            <div class="aa-list-empty">加载中...</div>
                        </div>
                    </div>
                </div>

                <div class="card pm-card aa-right-col">
                    <h3 style="margin:0 0 0.55rem 0; flex:0 0 auto; font-size:1rem;">调整内容</h3>
                    <div class="aa-form-stack" id="adInfoBox">
                        <div class="aa-field-row">
                            <label>广告类型</label>
                            <div class="aa-readonly" id="infoAdType">-</div>
                        </div>
                        <div class="aa-field-row">
                            <label>广告组合</label>
                            <div class="aa-info-value-wrap">
                                <div class="aa-readonly" id="infoPortfolio">-</div>
                                <button type="button" class="btn-capsule-sm" id="filterByPortfolioBtn" data-filter-type="portfolio" title="筛选该组合及下属活动/广告组" disabled>筛</button>
                            </div>
                        </div>
                        <div class="aa-field-row">
                            <label>广告活动</label>
                            <div class="aa-info-value-wrap">
                                <div class="aa-readonly" id="infoCampaign">-</div>
                                <button type="button" class="btn-capsule-sm" id="filterByCampaignBtn" data-filter-type="campaign" title="筛选该活动及下属广告组" disabled>筛</button>
                            </div>
                        </div>
                        <div class="aa-field-row">
                            <label>广告组</label>
                            <div class="aa-info-value-wrap">
                                <div class="aa-readonly" id="infoGroup">-</div>
                                <button type="button" class="btn-capsule-sm" id="filterByGroupBtn" data-filter-type="group" title="筛选该广告组" disabled>筛</button>
                            </div>
                        </div>

                        <h4 class="aa-form-block-title">基础调整信息</h4>
                        <div class="aa-field-row">
                            <label for="operationType">操作类型<span class="required-asterisk">*</span></label>
                            <select id="operationType" data-search-placeholder="搜索操作类型">
                                <option value="">请选择操作类型</option>
                            </select>
                        </div>
                        <div class="aa-field-row">
                            <label for="targetObject">操作对象<span class="required-asterisk">*</span></label>
                            <div class="aa-value-input-wrap aa-target-object-wrap input-capsule-menu--empty" id="targetObjectWrap">
                                <div class="aa-target-input-area">
                                    <input type="text" id="targetObject" class="aa-adjust-value-input" placeholder="关键词 / 竞价 / 投放位置" autocomplete="off">
                                    <div id="targetObjectSuggest" class="aa-target-suggest-list" role="listbox" aria-label="投放联想"></div>
                                </div>
                                <div class="input-capsule-menu">
                                    <button type="button" class="btn-capsule-sm" id="targetObjectPickBtn" aria-label="选择操作对象" title="全部可选项">⋯</button>
                                    <div class="input-capsule-menu-panel" id="targetObjectPickMenu" role="menu" aria-label="操作对象可选项"></div>
                                </div>
                            </div>
                        </div>
                        <div class="aa-field-row">
                            <label for="beforeValue">修改前<span class="required-asterisk">*</span></label>
                            <div class="aa-value-input-wrap input-capsule-menu--empty" data-quick-field="beforeValue">

    <script>
        let adItems = [];
        let adItemsRaw = [];
        let selectedAd = null;
        let selectedAdId = null;
        let allowedOperations = [];
        let selectedAdDetail = null;
        let targetOptionsCache = [];
        let objectOptionsContext = { platformSkus: new Set(), defaultBid: '' };
        let objectOptionsLoadedAction = '';
        let targetSuggestTimer = 0;
        let hierarchyFilter = null;
        let adjustmentPeriodFilterActive = true;
        let supplementaryTargetObjectKey = '';
        let restoringPageState = false;
        let pageStateSaveTimer = 0;
        let adjustmentPeriodAllCache = [];
        let adjustmentPeriodCache = [];
        let adjustmentAttribDraft = {};

        const AA_BID_STRATEGIES = [
            '动态竞价-仅降低',
            '动态竞价-提高和降低',
            '固定竞价',
        ];
        const AA_TARGET_STATUSES = ['启动', '暂停', '存档'];

        const AA_SEARCH_LS_PAUSED = 'sj.amazonAdAdjustment.showPaused';
        const AA_SEARCH_LS_ARCHIVED = 'sj.amazonAdAdjustment.showArchived';
        const AA_SEARCH_LS_EXACT = 'sj.amazonAdAdjustment.exactMatch';
        const AA_PAGE_STATE_LS = 'sj.amazonAdAdjustment.pageState.v1';

        function readPageState() {
            try {
                const raw = localStorage.getItem(AA_PAGE_STATE_LS);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                return parsed && typeof parsed === 'object' ? parsed : null;
            } catch (e) {
                return null;
            }
        }

        function collectPageState() {
            return {
                keyword: String(document.getElementById('adSearchInput')?.value || '').trim(),
                hierarchyFilter: hierarchyFilter ? { ...hierarchyFilter } : null,
                selectedAdId: String(selectedAdId || ''),
                operationTypeId: String(document.getElementById('operationType')?.value || '').trim(),
                targetObject: String(document.getElementById('targetObject')?.value || '').trim(),
                adjustmentPeriodFilterActive: !!adjustmentPeriodFilterActive,
            };
        }

        function savePageState() {
            if (restoringPageState) return;
            try {
                localStorage.setItem(AA_PAGE_STATE_LS, JSON.stringify(collectPageState()));
            } catch (e) {}
        }

        function scheduleSavePageState() {
            window.clearTimeout(pageStateSaveTimer);
            pageStateSaveTimer = window.setTimeout(savePageState, 220);
        }

        function buildAdjustmentDefaultsUrl(targetObject) {
            if (!selectedAdId) return '';
            const target = String(targetObject || '').trim();
            let url = `/api/amazon-ad-adjustment?action=defaults&ad_item_id=${encodeURIComponent(selectedAdId)}`;
            if (target && target !== '-') {
                url += `&target_object=${encodeURIComponent(target)}`;
            }
            const opId = String(document.getElementById('operationType')?.value || '').trim();
            if (opId) {
                url += `&operation_type_id=${encodeURIComponent(opId)}`;
            }
            return url;
        }

        function isTargetObjectObserveOp(op) {
            return isModifyProductOp(op) || isModifyDeliveryTargetOp(op) || isModifyPlacementOp(op);
        }

        function shouldShowObserveFields() {
            return isTargetObjectObserveOp(getSelectedOperationType());
        }

        function syncObserveFieldsVisibility() {
            const row = document.getElementById('aaObserveFieldsRow');
            if (!row) return;
            row.hidden = !shouldShowObserveFields();
        }

        function parseObserveDaysFromText(value) {
            const text = String(value || '').trim();
            const m = text.match(/\d+/);
            if (!m) return 1;
            const n = Number(m[0]);
            if (!Number.isFinite(n) || n < 0) return 1;
            return Math.floor(n);
        }

        function recalcAdjustmentNextObserve() {
            if (!shouldShowObserveFields()) return;
            const adjustDate = document.getElementById('adjustDate')?.value;
            const dayRaw = document.getElementById('observeIntervalDays')?.value;
            const days = Math.max(0, parseInt(dayRaw || '1', 10) || 1);
            if (!adjustDate) return;
            const base = new Date(adjustDate);
            if (Number.isNaN(base.getTime())) return;
            base.setDate(base.getDate() + days);
            setFieldValue('nextObserveAt', toDatetimeLocal(base));
        }

        function applyObserveDefaults(defaults) {
            if (!defaults || typeof defaults !== 'object') return;
            const days = defaults.observe_days != null
                ? parseObserveDaysFromText(defaults.observe_days)
                : parseObserveDaysFromText(defaults.observe_interval);
            setFieldValue('observeIntervalDays', String(days));
            recalcAdjustmentNextObserve();
            syncObserveFieldsVisibility();
        }

        function initAdjustmentObserveFields() {
            const modal = document.getElementById('aaFullSubmitModal');
            if (!modal || modal.dataset.observeBound === '1') return;
            modal.dataset.observeBound = '1';
            ['adjustDate', 'observeIntervalDays'].forEach((id) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('input', recalcAdjustmentNextObserve);
                el.addEventListener('change', recalcAdjustmentNextObserve);
            });
        }

        function applySavedFormState(saved) {
            if (!saved) return;
            const opId = String(saved.operationTypeId || '').trim();
            const target = String(saved.targetObject || '').trim();
            if (opId) {
                renderOperationOptions(opId, { skipSyncReason: true });
                syncReasonOptions({ keepTargetObject: !!target });
                if (target) {
                    setFieldValue('targetObject', target);
                    supplementaryTargetObjectKey = target;
                }
            } else {
                renderOperationOptions('');
                supplementaryTargetObjectKey = '';
            }
        }

        function initPageFromSavedState() {
            const saved = readPageState() || {};
            restoringPageState = true;

            if (saved.keyword) {
                const searchInput = document.getElementById('adSearchInput');
                if (searchInput) searchInput.value = saved.keyword;
            }
            if (saved.hierarchyFilter && saved.hierarchyFilter.type) {
                hierarchyFilter = { ...saved.hierarchyFilter };
            }
            if (typeof saved.adjustmentPeriodFilterActive === 'boolean') {
                adjustmentPeriodFilterActive = saved.adjustmentPeriodFilterActive;
            }
            if (saved.selectedAdId) {
                selectedAdId = String(saved.selectedAdId);
            }

            return loadAdList({ clearFilters: false }).then(() => {
                syncHierarchyFilterButtons();
                const savedAdId = String(saved.selectedAdId || '').trim();
                if (savedAdId && adItems.some(x => String(x.id) === String(savedAdId))) {
                    return selectAd(savedAdId, { restoreForm: saved });
                }
                if (!selectedAdId && adItems.length) {
                    selectAd(adItems[0].id);
                }
            }).finally(() => {
                restoringPageState = false;
                savePageState();
            });
        }

        function readAdSearchBool(key, defaultValue) {
            try {
                const raw = localStorage.getItem(key);
                if (raw === null || raw === '') return defaultValue;
                return raw === '1' || raw === 'true';
            } catch (e) {
                return defaultValue;
            }
        }

        function writeAdSearchBool(key, value) {
            try {
                localStorage.setItem(key, value ? '1' : '0');
            } catch (e) {}
        }

        function initAdSearchPrefs() {
            const pausedEl = document.getElementById('adSearchShowPaused');
            const archivedEl = document.getElementById('adSearchShowArchived');
            const exactEl = document.getElementById('adSearchExactMatch');
            if (pausedEl) pausedEl.checked = readAdSearchBool(AA_SEARCH_LS_PAUSED, false);
            if (archivedEl) archivedEl.checked = readAdSearchBool(AA_SEARCH_LS_ARCHIVED, false);
            if (exactEl) exactEl.checked = readAdSearchBool(AA_SEARCH_LS_EXACT, false);
            [pausedEl, archivedEl, exactEl].forEach(el => {
                if (!el) return;
                el.addEventListener('change', () => {
                    writeAdSearchBool(AA_SEARCH_LS_PAUSED, !!pausedEl.checked);
                    writeAdSearchBool(AA_SEARCH_LS_ARCHIVED, !!archivedEl.checked);
                    writeAdSearchBool(AA_SEARCH_LS_EXACT, !!exactEl.checked);
                    applyAdListFiltersAndRender();
                    savePageState();
                });
            });
        }

        function getAdSearchPrefs() {
            return {
                showPaused: !!document.getElementById('adSearchShowPaused')?.checked,
                showArchived: !!document.getElementById('adSearchShowArchived')?.checked,
                exactMatch: !!document.getElementById('adSearchExactMatch')?.checked
            };
        }

        function statusAllowed(status, prefs) {
            const s = String(status || '启动').trim() || '启动';
            if (s === '启动') return true;
            if (s === '暂停') return prefs.showPaused;
            if (s === '存档') return prefs.showArchived;
            return prefs.showPaused || prefs.showArchived;
        }

        function adItemSearchText(item) {
            return [
                item.ad_name,
                item.ad_type_text,
                item.portfolio_name,
                item.campaign_name,
                item.group_name
            ].filter(Boolean).join(' ').toLowerCase();
        }

        function adItemMatchesKeyword(item, keyword, exactMatch) {
            if (!keyword) return true;
            const name = String(item.ad_name || '').trim();
            if (exactMatch) {
                return name.toLowerCase() === keyword.toLowerCase();
            }
            return adItemSearchText(item).includes(keyword.toLowerCase());
        }

        function resolveSelectedAdHierarchy(item) {
            if (!item) return null;
            const level = String(item.ad_level || '').trim();
            const id = Number(item.id || 0);
            if (!id) return null;
            let portfolioId = 0;
            let campaignId = 0;
            let groupId = 0;
            if (level === 'portfolio') {
                portfolioId = id;
            } else if (level === 'campaign') {
                portfolioId = Number(item.portfolio_id || 0);
                campaignId = id;
            } else if (level === 'group') {
                portfolioId = Number(item.portfolio_id || 0);
                campaignId = Number(item.campaign_id || 0);
                groupId = id;
            }
            return { level, id, portfolioId, campaignId, groupId };
        }

        function getItemPortfolioId(item) {
            const level = String(item.ad_level || '').trim();
            if (level === 'portfolio') return Number(item.id || 0);
            return Number(item.portfolio_id || 0);
        }

        function getItemCampaignId(item) {
            const level = String(item.ad_level || '').trim();
            if (level === 'campaign') return Number(item.id || 0);
            if (level === 'group') return Number(item.campaign_id || 0);
            return 0;
        }

        function adItemMatchesHierarchyFilter(item) {
            if (!hierarchyFilter) return true;
            if (hierarchyFilter.type === 'portfolio') {
                return getItemPortfolioId(item) === Number(hierarchyFilter.portfolioId || 0);
            }
            if (hierarchyFilter.type === 'campaign') {
                return getItemCampaignId(item) === Number(hierarchyFilter.campaignId || 0);
            }
            if (hierarchyFilter.type === 'group') {
                return String(item.ad_level || '') === 'group'
                    && Number(item.id || 0) === Number(hierarchyFilter.groupId || 0);
            }
            return true;
        }

        function syncHierarchyFilterButtons() {
            const h = resolveSelectedAdHierarchy(selectedAd);
            const map = {
                portfolio: { btn: 'filterByPortfolioBtn', enabled: !!(h && h.portfolioId) },
                campaign: { btn: 'filterByCampaignBtn', enabled: !!(h && h.campaignId) },
                group: { btn: 'filterByGroupBtn', enabled: !!(h && h.groupId) },
            };
            Object.keys(map).forEach((type) => {
                const btn = document.getElementById(map[type].btn);
                if (!btn) return;
                btn.disabled = !map[type].enabled;
                btn.classList.toggle('is-active', !!(hierarchyFilter && hierarchyFilter.type === type));
            });
        }

        function toggleHierarchyFilter(type) {
            const h = resolveSelectedAdHierarchy(selectedAd);
            if (!h) return;
            if (hierarchyFilter && hierarchyFilter.type === type) {
                hierarchyFilter = null;
            } else if (type === 'portfolio' && h.portfolioId) {
                hierarchyFilter = { type: 'portfolio', portfolioId: h.portfolioId };
            } else if (type === 'campaign' && h.campaignId) {
                hierarchyFilter = { type: 'campaign', campaignId: h.campaignId };
            } else if (type === 'group' && h.groupId) {
                hierarchyFilter = { type: 'group', groupId: h.groupId };
            } else {
                return;
            }
            syncHierarchyFilterButtons();
            applyAdListFiltersAndRender();
            savePageState();
        }

        function applyAdListFilters(items) {
            const keyword = (document.getElementById('adSearchInput')?.value || '').trim();
            const prefs = getAdSearchPrefs();
            return (items || []).filter(item => {
                if (!statusAllowed(item.status, prefs)) return false;
                if (!adItemMatchesHierarchyFilter(item)) return false;
                return adItemMatchesKeyword(item, keyword, prefs.exactMatch);
            });
        }

        function applyAdListFiltersAndRender() {
            adItems = applyAdListFilters(adItemsRaw);
            const prev = selectedAdId;
            if (prev && !adItems.some(x => String(x.id) === String(prev))) {
                selectedAdId = null;
                selectedAd = null;
                updateInfoPanel(null);
            }
            renderAdList();
            if (!selectedAdId && adItems.length) {
                selectAd(adItems[0].id);
            }
        }

        function toDatetimeLocal(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '';
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function formatDateTime(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return value;
            return d.toLocaleString('zh-CN');
        }

        function periodDayCount(startTime, endTime) {
            const s = new Date(startTime);
            const e = new Date(endTime);
            if (Number.isNaN(s.getTime()) || Number.isNaN(e.getTime())) return null;
            if (e < s) return null;
            return Math.max(1, (e.getTime() - s.getTime()) / 86400000);
        }

        function formatMetricPlain(value) {
            const text = String(value ?? '').trim();
            return text ? escapeHtml(text) : '<span class="aa-ad-cell-empty">-</span>';
        }

        function isModifyPlacementOperationName(name) {
            const n = normalizeOperationTypeName(name);
            return n.includes('修改') && n.includes('广告位');
        }

        function formatPlacementPercentFromRatio(ratio) {
            if (ratio == null || !Number.isFinite(ratio)) return '';
            const pct = ratio * 100;
            if (Math.abs(pct - Math.round(pct)) < 1e-9) {
                return `${Math.round(pct)}%`;
            }
            return `${parseFloat(pct.toFixed(4))}%`;
        }

        function placementDisplayFromStored(raw) {
            const bid = String(raw || '').trim();
            if (!bid) return '';
            if (bid.includes('%')) {
                const numPart = bid.replace(/%/g, '').replace(/,/g, '').trim();
                const parsed = parseFloat(numPart);
                if (!Number.isFinite(parsed) || parsed < 0) return bid;
                return formatPlacementPercentFromRatio(parsed / 100);
            }
            const parsed = parseFloat(bid.replace(/,/g, ''));
            if (!Number.isFinite(parsed) || parsed < 0) return bid;
            if (parsed <= 1) {
                return formatPlacementPercentFromRatio(parsed);
            }
            return formatPlacementPercentFromRatio(parsed / 100);
        }

        function placementStoredFromDisplay(raw) {
            const text = String(raw || '').trim();
            if (!text) return '';
            if (text.includes('%')) {
                const parsed = parseFloat(text.replace(/%/g, '').replace(/,/g, '').trim());
                if (!Number.isFinite(parsed) || parsed < 0) return text;
                return formatDecimalMetric(parsed / 100, 4);
            }
            const parsed = parseFloat(text.replace(/,/g, ''));
            if (!Number.isFinite(parsed) || parsed < 0) return text;
            if (parsed <= 1) {
                return formatDecimalMetric(parsed, 4);
            }
            return formatDecimalMetric(parsed / 100, 4);
        }

        function formatAdjustmentValueDisplay(value, operationName) {
            if (isModifyPlacementOperationName(operationName)) {
                const shown = placementDisplayFromStored(value);
                return formatMetricPlain(shown || value);
            }
            return formatMetricPlain(value);
        }

        function resolveAdjustmentValueForSubmit(fieldId, raw) {
            const op = getSelectedOperationType();
            if (!isModifyPlacementOp(op)) return String(raw || '').trim();
            if (fieldId !== 'beforeValue' && fieldId !== 'afterValue') return String(raw || '').trim();
            return placementStoredFromDisplay(raw);
        }

        function syncPlacementFieldHints() {
            const op = getSelectedOperationType();
            const beforeInput = document.getElementById('beforeValue');
            const afterInput = document.getElementById('afterValue');
            if (!beforeInput || !afterInput) return;
            if (isModifyPlacementOp(op)) {
                beforeInput.placeholder = '例如：50%';
                afterInput.placeholder = '例如：75%';
            } else {
                beforeInput.placeholder = '例如：0.75';
                afterInput.placeholder = '例如：0.95';
            }
        }

        function formatMetricPlainText(value) {
            const text = String(value ?? '').trim();
            return text || '-';
        }

        function formatDailyMetricText(value, startTime, endTime) {
            const text = String(value ?? '').trim();
            if (!text) return '-';
            const days = periodDayCount(startTime, endTime);
            const num = parseFloat(text.replace(/,/g, ''));
            if (days == null || !Number.isFinite(num)) return '-';
            const daily = num / days;
            if (Math.abs(daily - Math.round(daily)) < 0.005) return String(Math.round(daily));
            return daily.toFixed(2);
        }

        function formatPeriodDayCountText(startTime, endTime) {
            const days = periodDayCount(startTime, endTime);
            if (days == null) return '-';
            return String(Math.max(1, Math.ceil(days - 1e-9)));
        }

        function normalizeAdjustmentAttribState(item) {
            return {
                attribution_checked: String(item?.attribution_checked || '0') === '1' ? '1' : '0',
                attribution_orders: String(item?.attribution_orders || '').trim(),
                attribution_sales: String(item?.attribution_sales || '').trim(),
                remark: String(item?.remark || '').trim(),
            };
        }

        function getAdjustmentAttribEffective(item) {
            const id = String(item?.id || '');
            if (id && adjustmentAttribDraft[id]) return { ...adjustmentAttribDraft[id] };
            return normalizeAdjustmentAttribState(item);
        }

        function attribStatesEqual(a, b) {
            const left = normalizeAdjustmentAttribState(a || {});
            const right = normalizeAdjustmentAttribState(b || {});
            return left.attribution_checked === right.attribution_checked
                && left.attribution_orders === right.attribution_orders
                && left.attribution_sales === right.attribution_sales
                && left.remark === right.remark;
        }

        function countAdjustmentAttribEditedRows() {
            return Object.keys(adjustmentAttribDraft).length;

            const count = countAdjustmentAttribEditedRows();
            text.textContent = `已修改 ${count} 条归因/备注`;
            bar.classList.toggle('active', count > 0);

            return (Array.isArray(items) ? items : []).filter(item => {

        function updateAdjustmentAttribDraft(recordId, field, rawValue) {
            const item = findAdjustmentPeriodItem(recordId);
            if (!item) return;
            const id = String(recordId);
            const next = { ...getAdjustmentAttribEffective(item) };
            const f = String(field || '').trim();
            if (f === 'attribution_orders' || f === 'attribution_sales' || f === 'remark') {
                next[f] = String(rawValue ?? '').trim();
            }
            if (f === 'attribution_orders' || f === 'attribution_sales') {
                if (next.attribution_orders || next.attribution_sales) {
                    next.attribution_checked = '1';
                }
            }
            if (attribStatesEqual(next, item)) {
                delete adjustmentAttribDraft[id];
            } else {
                adjustmentAttribDraft[id] = next;
            }
            const card = document.querySelector(`.aa-period-card[data-record-id="${id}"]`);
            const checkedEl = card?.querySelector('[data-role="attrib-checked-text"]');
            if (checkedEl) {
                checkedEl.textContent = next.attribution_checked === '1' ? '是' : '否';
            }
            syncAdjustmentAttribSaveBar();
        }

        function cancelAdjustmentAttribEdits() {
            adjustmentAttribDraft = {};
            applyAdjustmentPeriodFilter();
            syncAdjustmentAttribSaveBar();
        }

        function saveAdjustmentAttribEdits() {
            const ids = Object.keys(adjustmentAttribDraft);
            if (!ids.length) {
                syncAdjustmentAttribSaveBar();
                return;
            }
            const items = ids.map((id) => ({
                id: Number(id),
                ...adjustmentAttribDraft[id],
            }));
            fetch('/api/amazon-ad-adjustment', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items }),
            })
                .then(r => r.json())
                .then(data => {
                    if (!data || data.status !== 'success') {
                        aaSaveResult({
                            action: 'save',
                            isError: true,
                            message: (data && data.message) || '批量保存失败',
                            errors: data && data.errors,
                        });
                        return;
                    }
                    const errCount = Array.isArray(data.errors) ? data.errors.length : 0;
                    items.forEach((up) => {
                        const row = findAdjustmentPeriodItem(up.id);
                        if (!row) return;
                        row.attribution_checked = up.attribution_checked === '1' ? 1 : 0;
                        row.attribution_orders = up.attribution_orders || '';
                        row.attribution_sales = up.attribution_sales || '';
                        row.remark = up.remark || '';
                        delete adjustmentAttribDraft[String(up.id)];
                    });
                    applyAdjustmentPeriodFilter();
                    syncAdjustmentAttribSaveBar();
                    aaSaveResult({
                        action: 'save',
                        isError: errCount > 0,
                        message: `已保存 ${data.updated || 0} 条归因/备注${errCount ? `，失败 ${errCount} 条` : ''}`,
                        errors: data.errors,
                    });
                })
                .catch(err => {
                    aaSaveResult({ action: 'save', isError: true, message: '请求失败: ' + err });
                });
        }

        function validatePhase1() {
            const errors = [];
            const op = getSelectedOperationType();
            if (!selectedAdId) errors.push('请先在左侧选择广告');
            if (!document.getElementById('operationType').value) errors.push('请选择操作类型');
            if (!document.getElementById('targetObject').value.trim()) errors.push('请填写操作对象');
            if (!document.getElementById('beforeValue').value.trim()) errors.push('请填写修改前');
            if (!document.getElementById('afterValue').value.trim()) errors.push('请填写修改后');
            if (!document.getElementById('operationReason').value) errors.push('请选择修改原因');
            if (op && (isModifyProductOp(op) || isModifyDeliveryTargetOp(op) || isModifyPlacementOp(op))) {
                const beforeErr = validateTargetObjectValueField('beforeValue', op);
                const afterErr = validateTargetObjectValueField('afterValue', op);
                if (beforeErr) errors.push(beforeErr);
                if (afterErr) errors.push(afterErr);
            }
            const opForSku = getSelectedOperationType();
            if (isModifyProductOp(opForSku)) {
                const sku = document.getElementById('targetObject')?.value.trim() || '';
                if (sku && !isProductSkuInShop(sku)) {
                    errors.push('操作对象须为当前广告归属店铺的销售平台SKU');
                }
            }
            return errors;
        }

        function validatePhase2() {
            const errors = [];
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            if (start && end) {
                const s = new Date(start).getTime();
                const e = new Date(end).getTime();
                if (!Number.isNaN(s) && !Number.isNaN(e) && e < s) {
                    errors.push('结束时间不能早于开始时间');
                }
            }
            return errors;
        }

        const AA_METRIC_SOURCE_IDS = ['impressions', 'clicks', 'cost', 'orders', 'sales'];

        function parseMetricNumber(raw) {
            const text = String(raw ?? '').trim().replace(/,/g, '').replace(/%/g, '');
            if (!text) return null;
            const n = parseFloat(text);
            return Number.isFinite(n) ? n : null;
        }

        function formatPercentFromRatio(ratio) {
            if (ratio == null || !Number.isFinite(ratio)) return '';
            return (ratio * 100).toFixed(2) + '%';
        }

        function formatComputedRatioMetricDisplay(raw) {
            const text = String(raw ?? '').trim();
            if (!text) return '-';
            if (text.includes('%')) {
                const parsed = parseFloat(text.replace(/%/g, '').replace(/,/g, '').trim());
                if (!Number.isFinite(parsed)) return text;
                return formatPercentFromRatio(parsed / 100);
            }
            const parsed = parseFloat(text.replace(/,/g, ''));
            if (!Number.isFinite(parsed)) return text;
            if (parsed <= 1) {
                return formatPercentFromRatio(parsed);
            }
            return formatPercentFromRatio(parsed / 100);
        }

        function formatDecimalMetric(n, digits) {
            if (n == null || !Number.isFinite(n)) return '';
            const d = typeof digits === 'number' ? digits : 2;
            const fixed = Number(n.toFixed(d));
            return String(fixed);
        }

        function recalcAdjustmentDerivedMetrics() {
            const impressions = parseMetricNumber(document.getElementById('impressions')?.value);
            const clicks = parseMetricNumber(document.getElementById('clicks')?.value);
            const cost = parseMetricNumber(document.getElementById('cost')?.value);
            const orders = parseMetricNumber(document.getElementById('orders')?.value);
            const sales = parseMetricNumber(document.getElementById('sales')?.value);

            if (cost != null && sales != null && sales > 0) {
                setFieldValue('acos', formatPercentFromRatio(cost / sales));
            }
            if (cost != null && clicks != null && clicks > 0) {
                setFieldValue('cpc', formatDecimalMetric(cost / clicks));
            }
            if (clicks != null && impressions != null && impressions > 0) {
                setFieldValue('ctr', formatPercentFromRatio(clicks / impressions));
            }
            if (orders != null && clicks != null && clicks > 0) {
                setFieldValue('cvr', formatPercentFromRatio(orders / clicks));
            }
        }
