            const opId = String(document.getElementById('operationType')?.value || '');
            if (!opId) return null;
            return allowedOperations.find(item => String(item.id) === opId) || null;
        }

        function isModifyDeliveryTargetOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('投放') && !n.includes('广告位');
        }

        function isModifyPlacementOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('广告位');
        }

        function isModifyProductOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('商品');
        }

        function isProductSkuInShop(sku) {
            const s = String(sku || '').trim();
            if (!s) return false;
            return objectOptionsContext.platformSkus && objectOptionsContext.platformSkus.has(s);
        }

        function isArchivedTargetStatus(status) {
            return String(status || '').trim() === '存档';
        }

        function filterActiveTargetOptions(list) {
            return (Array.isArray(list) ? list : []).filter(item => !isArchivedTargetStatus(item.status));
        }

        function isTargetDescLinkedToAd(desc) {
            const s = String(desc || '').trim();
            if (!s) return false;
            return targetOptionsAllCache.some(x => String(x.target_desc || '').trim() === s);
        }

        function isNewTargetDescToAd(desc) {
            const s = String(desc || '').trim();
            if (!s) return false;
            return !isTargetDescLinkedToAd(s);
        }

        function isNewProductSkuToAd(sku) {
            return isProductSkuInShop(sku) && isNewTargetDescToAd(sku);
        }

        function getTargetDefaultBid() {
            return String(objectOptionsContext.defaultBid || '').trim();
        }

        function isDashPlaceholderValue(text) {
            return String(text || '').trim() === '-';
        }

        function isAllowedProductModifyValue(text) {
            return isDashPlaceholderValue(text) || isValidTargetStatus(text);
        }

        function isAllowedDeliveryModifyValue(text) {
            return isDashPlaceholderValue(text) || isValidTargetStatus(text) || isNumericBidValue(text);
        }

        function isAllowedPlacementModifyValue(text) {
            if (isAllowedDeliveryModifyValue(text)) return true;
            const t = String(text || '').trim();
            if (!t.includes('%')) return false;
            const n = parseFloat(t.replace(/%/g, '').replace(/,/g, '').trim());
            return Number.isFinite(n) && n >= 0;
        }

        function getDefaultAfterForNewTarget(op) {
            if (isModifyProductOp(op)) return '启动';
            const bid = getTargetDefaultBid();
            if (isModifyDeliveryTargetOp(op)) return bid;
            if (isModifyPlacementOp(op)) return bid ? placementDisplayFromBid(bid) : '';
            return '';
        }

        function syncTargetObjectSkuIndicator(mode) {
            const btn = document.getElementById('targetObjectPickBtn');
            if (!btn) return;
            btn.classList.remove('aa-sku-indicator', 'aa-sku-indicator--valid', 'aa-sku-indicator--invalid');
            if (mode === 'valid') {
                btn.classList.add('aa-sku-indicator', 'aa-sku-indicator--valid');
                btn.textContent = '✓';
                btn.title = 'SKU 存在于当前店铺销售平台';
                btn.setAttribute('aria-label', 'SKU 校验通过');
            } else if (mode === 'invalid') {
                btn.classList.add('aa-sku-indicator', 'aa-sku-indicator--invalid');
                btn.textContent = '✕';
                btn.title = 'SKU 不存在于当前店铺销售平台';
                btn.setAttribute('aria-label', 'SKU 校验失败');
            } else {
                btn.textContent = '⋯';
                btn.title = '全部可选项';
                btn.setAttribute('aria-label', '选择操作对象');
            }
        }

        function syncTargetObjectState() {
            const op = getSelectedOperationType();
            const desc = String(document.getElementById('targetObject')?.value || '').trim();
            const beforeInput = document.getElementById('beforeValue');
            const afterInput = document.getElementById('afterValue');

            if (isModifyProductOp(op)) {
                if (!desc) {
                    syncTargetObjectSkuIndicator(null);
                    return;
                }
                const inShop = isProductSkuInShop(desc);
                syncTargetObjectSkuIndicator(inShop ? 'valid' : 'invalid');
                if (!inShop || isNewProductSkuToAd(desc)) {
                    if (beforeInput) beforeInput.value = '-';
                    if (afterInput) afterInput.value = getDefaultAfterForNewTarget(op);
                    syncValueQuickMenus();
                    updateSubmitButtonState();
                    return;
                }
                refreshBeforeValueForTargetObject();
                return;
            }

            syncTargetObjectSkuIndicator(null);

            if (isModifyDeliveryTargetOp(op) || isModifyPlacementOp(op)) {
                if (!desc) return;
                if (isNewTargetDescToAd(desc)) {
                    if (beforeInput) beforeInput.value = '-';
                    if (afterInput) afterInput.value = getDefaultAfterForNewTarget(op);
                    syncValueQuickMenus();
                    updateSubmitButtonState();
                    return;
                }
                refreshBeforeValueForTargetObject();
            }
        }

        function isModifyBudgetOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('预算');
        }

        function isModifyBidStrategyOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('竞价策略');
        }

        function isModifyNameOp(op) {
            const n = normalizeOperationTypeName(op && op.name);
            return n.includes('修改') && n.includes('名称');
        }

        function isArchiveOp(op) {
            const raw = String(op && op.name || '').trim();
            if (raw === '【存档】') return true;
            return normalizeOperationTypeName(op && op.name) === '存档';
        }

        function isStartPauseToggleOp(op) {
            const raw = String(op && op.name || '').trim();
            if (raw === '【启动·暂停】' || raw === '启动·暂停') return true;
            const n = normalizeOperationTypeName(op && op.name);
            if (n === '启动·暂停' || n === '启动暂停') return true;
            return n.includes('启动') && n.includes('暂停') && !n.includes('修改');
        }

        function isValidStartPauseStatus(text) {
            const s = String(text || '').trim();
            return AA_START_PAUSE_STATUSES.includes(s);
        }

        function oppositeStartPauseStatus(status) {
            const s = String(status || '').trim();
            if (s === '启动') return '暂停';
            if (s === '暂停') return '启动';
            return '启动';
        }

        function selectedAdCurrentStatus() {
            const fromDetail = String(selectedAdDetail?.status || '').trim();
            if (fromDetail) return fromDetail;
            const fromSelected = String(selectedAd?.status || '').trim();
            if (fromSelected) return fromSelected;
            return '启动';
        }

        function isFixedTargetObjectDashOp(op) {
            return isModifyBudgetOp(op) || isModifyBidStrategyOp(op) || isModifyNameOp(op)
                || isArchiveOp(op) || isStartPauseToggleOp(op);
        }

        function needsTargetObjectSuggest(op) {
            return isModifyDeliveryTargetOp(op) || isModifyPlacementOp(op) || isModifyProductOp(op);
        }

        function objectOptionsAction(op) {
            if (isModifyProductOp(op)) return 'product-options';
            return 'target-options';
        }

        function objectSuggestEmptyText(op) {
            if (isModifyProductOp(op)) return '无匹配商品';
            return '无匹配投放';
        }

        function objectSuggestPlaceholder(op) {
            if (isModifyProductOp(op)) return '输入商品SKU联想选择';
            if (isModifyDeliveryTargetOp(op) || isModifyPlacementOp(op)) return '输入投放名称联想选择';
            return '关键词 / 竞价 / 投放位置';
        }

        function formatBudgetDisplay(raw) {
            if (raw == null || raw === '') return '';
            const n = parseFloat(raw);
            if (!Number.isFinite(n)) return String(raw).trim();
            return formatDecimalMetric(n, 2);
        }

        function syncOperationTypeFields() {
            const op = getSelectedOperationType();
            const targetInput = document.getElementById('targetObject');
            const beforeInput = document.getElementById('beforeValue');
            const afterInput = document.getElementById('afterValue');
            if (!targetInput) return;

            if (op && isFixedTargetObjectDashOp(op)) {
                targetInput.value = '-';
                targetInput.readOnly = true;
                hideTargetObjectSuggest();
            } else {
                targetInput.readOnly = false;
                if (targetInput.value === '-') targetInput.value = '';
            }

            if (!op || !selectedAdDetail) {
                syncValueQuickMenus();
                syncPlacementFieldHints();
                return;
            }

            if (isModifyBudgetOp(op)) {
                if (beforeInput) beforeInput.value = formatBudgetDisplay(selectedAdDetail.budget);
                if (afterInput) afterInput.value = '';
            } else if (isModifyBidStrategyOp(op)) {
                if (beforeInput) beforeInput.value = String(selectedAdDetail.bid_strategy || '').trim();
                if (afterInput) afterInput.value = '';
            } else if (isModifyNameOp(op)) {
                const name = String(selectedAdDetail.ad_name || '').trim();
                if (beforeInput) beforeInput.value = name;
                if (afterInput) afterInput.value = name;
            } else if (isArchiveOp(op)) {
                if (beforeInput) beforeInput.value = selectedAdCurrentStatus();
                if (afterInput) afterInput.value = '存档';
            } else if (isStartPauseToggleOp(op)) {
                const status = selectedAdCurrentStatus();
                if (beforeInput) beforeInput.value = status;
                if (afterInput) {
                    afterInput.value = isValidStartPauseStatus(status)
                        ? oppositeStartPauseStatus(status)
                        : '启动';
                }
            }
            syncValueQuickMenus();
            syncPlacementFieldHints();
        }

        function placementDisplayFromBid(bidRaw) {
            return placementDisplayFromStored(bidRaw);
        }

        function statusFromObjectOption(item) {
            return String(item?.status || '启动').trim() || '启动';
        }

        function beforeValueFromTargetOption(target, op) {
            if (isModifyProductOp(op)) {
                return statusFromObjectOption(target);
            }
            const bid = String((target && target.bid_value) || '').trim();
            if (isModifyPlacementOp(op)) {
                return bid ? placementDisplayFromBid(bid) : '';
            }
            if (isModifyDeliveryTargetOp(op)) {
                return bid;
            }
            return '';
        }

        function fillAfterValueFromObjectSelection(target, op) {
            const beforeInput = document.getElementById('beforeValue');
            const afterInput = document.getElementById('afterValue');
            if (!afterInput || !target) return;
            if (isModifyProductOp(op)) {
                const status = targetObjectCurrentStatus(target);
                if (beforeInput) beforeInput.value = status;
                afterInput.value = firstAlternateTargetStatus(status) || status;
                return;
            }
            syncAfterValueWhenBeforeIsCurrentStatus();
        }

        function refreshBeforeValueForTargetObject() {
            const op = getSelectedOperationType();
            if (isFixedTargetObjectDashOp(op)) return;
            if (!needsTargetObjectSuggest(op)) return;
            const desc = String(document.getElementById('targetObject')?.value || '').trim();
            if (isModifyProductOp(op) && desc && isNewProductSkuToAd(desc)) {
                syncTargetObjectState();
                return;
            }
            if ((isModifyDeliveryTargetOp(op) || isModifyPlacementOp(op)) && desc && isNewTargetDescToAd(desc)) {
                syncTargetObjectState();
                return;
            }
            const target = getMatchedTargetFromObject();
            const beforeInput = document.getElementById('beforeValue');
            if (!beforeInput) return;
            if (!target) return;
            const next = beforeValueFromTargetOption(target, op);
            if (isModifyPlacementOp(op) || isModifyDeliveryTargetOp(op) || isModifyProductOp(op)) {
                beforeInput.value = next;
                fillAfterValueFromObjectSelection(target, op);
            } else if (!String(beforeInput.value || '').trim()) {
                beforeInput.value = next;
            }
            syncValueQuickMenus();
            updateSubmitButtonState();
        }

        function otherTargetStatusesExcluding(excludeStatus) {
            const s = String(excludeStatus || '').trim();
            return AA_TARGET_STATUSES.filter(st => st !== s);
        }

        function firstAlternateTargetStatus(fromStatus) {
            const others = otherTargetStatusesExcluding(fromStatus);
            return others.length ? others[0] : '';
        }

        function targetObjectCurrentStatus(target) {
            return statusFromObjectOption(target);
        }

        function isBeforeValueTargetStatus(target, op, raw) {
            const val = String(raw || '').trim();
            if (!isValidTargetStatus(val) || !target) return false;
            return val === targetObjectCurrentStatus(target);
        }

        function syncAfterValueForStartPauseToggle() {
            const op = getSelectedOperationType();
            if (!isStartPauseToggleOp(op)) return;
            const beforeInput = document.getElementById('beforeValue');
            const afterInput = document.getElementById('afterValue');
            if (!beforeInput || !afterInput) return;
            const beforeVal = String(beforeInput.value || '').trim();
            if (!isValidStartPauseStatus(beforeVal)) return;
            afterInput.value = oppositeStartPauseStatus(beforeVal);
        }

        function syncAfterValueWhenBeforeIsCurrentStatus() {
            const op = getSelectedOperationType();
            if (isStartPauseToggleOp(op)) {
                syncAfterValueForStartPauseToggle();
                return;
            }
            if (!isModifyProductOp(op) && !isModifyDeliveryTargetOp(op) && !isModifyPlacementOp(op)) return;
            const target = getMatchedTargetFromObject();
            if (!target) return;
            const beforeInput = document.getElementById('beforeValue');
            const afterInput = document.getElementById('afterValue');
            if (!beforeInput || !afterInput) return;
            const beforeVal = String(beforeInput.value || '').trim();
            if (!isBeforeValueTargetStatus(target, op, beforeVal)) return;
            const nextAfter = firstAlternateTargetStatus(beforeVal);
            if (nextAfter) afterInput.value = nextAfter;
        }

        function isValidTargetStatus(text) {
            const s = String(text || '').trim();
            return AA_TARGET_STATUSES.includes(s);
        }

        function isNumericBidValue(text) {
            const t = String(text || '').trim().replace(/,/g, '');
            if (!t) return false;
            if (!/^-?\d+(\.\d+)?$/.test(t)) return false;
            return Number.isFinite(parseFloat(t));
        }

        function isPlacementPercentValue(text) {
            const t = String(text || '').trim();
            if (!t) return false;
            if (isValidTargetStatus(t)) return false;
            if (t.includes('%')) {
                const n = parseFloat(t.replace(/%/g, '').replace(/,/g, '').trim());
                return Number.isFinite(n) && n >= 0;
            }
            const plain = t.replace(/,/g, '');
            if (!/^-?\d+(\.\d+)?$/.test(plain)) return false;
            const n = parseFloat(plain);
            return Number.isFinite(n) && n >= 0;
        }

        function placementValuesEquivalent(a, b) {
            const left = String(a || '').trim();
            const right = String(b || '').trim();
            if (!left || !right) return false;
            if (left === right) return true;
            const leftStored = placementStoredFromDisplay(left);
            const rightStored = placementStoredFromDisplay(right);
            if (leftStored && rightStored && leftStored === rightStored) return true;
            const leftDisplay = placementDisplayFromStored(left);
            const rightDisplay = placementDisplayFromStored(right);
            return !!(leftDisplay && rightDisplay && leftDisplay === rightDisplay);
        }

        function targetObjectValueMatchesCurrent(candidate, current, op) {
            const value = String(candidate || '').trim();
            const cur = String(current || '').trim();
            if (!value || !cur) return false;
            if (value === cur) return true;
            if (isModifyPlacementOp(op)) return placementValuesEquivalent(value, cur);
            if (isModifyDeliveryTargetOp(op) && isNumericBidValue(value) && isNumericBidValue(cur)) {
                return parseFloat(value.replace(/,/g, '')) === parseFloat(cur.replace(/,/g, ''));
            }
            return false;
        }

        function buildTargetObjectValueAlternates(target, op, fieldId, currentRaw) {
            const current = String(currentRaw || '').trim();
            const alternates = [];
            if (!target) return alternates;

            const objectStatus = targetObjectCurrentStatus(target);
            const bid = String(target.bid_value || '').trim();
            const pctDisplay = bid ? placementDisplayFromBid(bid) : '';

            if (fieldId === 'beforeValue') {
                if (isModifyProductOp(op)) {
                    if (!targetObjectValueMatchesCurrent(objectStatus, current, op)) {
                        alternates.push({
                            value: objectStatus,
                            html: renderTargetStatusPill(objectStatus),
                            fillOppositeAfter: false,
                        });
                    }
                    return alternates;
                }

                if (isModifyPlacementOp(op)) {
                    if (pctDisplay && !targetObjectValueMatchesCurrent(pctDisplay, current, op)) {
                        alternates.push({
                            value: pctDisplay,
                            html: escapeHtml(pctDisplay),
                            fillOppositeAfter: false,
                        });
                    }
                    if (!targetObjectValueMatchesCurrent(objectStatus, current, op)) {
                        alternates.push({
                            value: objectStatus,
                            html: renderTargetStatusPill(objectStatus),
                            fillOppositeAfter: false,
                        });
                    }
                    return alternates;
                }

                if (isModifyDeliveryTargetOp(op)) {
                    if (bid && !targetObjectValueMatchesCurrent(bid, current, op)) {
                        alternates.push({
                            value: bid,
                            html: escapeHtml(bid),
                            fillOppositeAfter: false,
                        });
                    }
                    if (!targetObjectValueMatchesCurrent(objectStatus, current, op)) {
                        alternates.push({
                            value: objectStatus,
                            html: renderTargetStatusPill(objectStatus),
                            fillOppositeAfter: false,
                        });
                    }
                }
                return alternates;
            }

            if (fieldId === 'afterValue') {
                AA_TARGET_STATUSES.forEach((st) => {
                    if (targetObjectValueMatchesCurrent(st, current, op)) return;
                    alternates.push({
                        value: st,
                        html: renderTargetStatusPill(st),
                        fillOppositeAfter: false,
                    });
                });
            }
            return alternates;
        }

        function validateTargetObjectValueField(fieldId, op) {
            const label = fieldId === 'beforeValue' ? '修改前' : '修改后';
            const val = String(document.getElementById(fieldId)?.value || '').trim();
            if (!val) return null;

            if (isModifyProductOp(op)) {
                if (!isAllowedProductModifyValue(val)) {
                    return `${label}须为合法状态（启动/暂停/存档）或 -`;
                }
                return null;
            }

            if (isModifyDeliveryTargetOp(op)) {
                if (!isAllowedDeliveryModifyValue(val)) {
                    return `${label}须为合法竞价数值、状态（启动/暂停/存档）或 -`;
                }
                return null;
            }

            if (isModifyPlacementOp(op)) {
                if (!isAllowedPlacementModifyValue(val)) {
                    return `${label}须为合法数值、状态（启动/暂停/存档）或 -`;
                }
                return null;
            }

            if (isStartPauseToggleOp(op)) {
                if (!isValidStartPauseStatus(val) && val !== '存档') {
                    return `${label}须为广告当前状态（启动/暂停/存档）`;
                }
                if (fieldId === 'afterValue') {
                    if (!isValidStartPauseStatus(val)) {
                        return `${label}须为启动或暂停`;
                    }
                    const beforeVal = String(document.getElementById('beforeValue')?.value || '').trim();
                    if (isValidStartPauseStatus(beforeVal) && val === beforeVal) {
                        return '修改后须与修改前不同（启动↔暂停）';
                    }
                }
                return null;
            }

            if (isArchiveOp(op)) {
                if (fieldId === 'beforeValue') {
                    if (!isValidTargetStatus(val)) {
                        return `${label}须为广告当前状态（启动/暂停/存档）`;
                    }
                    return null;
                }
                if (val !== '存档') {
                    return '存档操作的修改后须为「存档」';
                }
                return null;
            }
            return null;
        }

        function getMatchedTargetFromObject() {
            const desc = String(document.getElementById('targetObject')?.value || '').trim();
            if (!desc) return null;
            return targetOptionsAllCache.find(x => String(x.target_desc || '').trim() === desc) || null;
        }

        function buildQuickFillOptions(fieldId) {
            const op = getSelectedOperationType();
            const input = document.getElementById(fieldId);
            const currentValue = String(input?.value || '').trim();
            const options = [];
            if (isModifyBidStrategyOp(op)) {
                if (fieldId === 'afterValue') {
                    AA_BID_STRATEGIES.filter(s => s !== currentValue).forEach((strategy) => {
                        options.push({
                            value: strategy,
                            html: escapeHtml(strategy),
                            fillOppositeAfter: false,
                        });
                    });
                }
                return options;
            }
            if (isStartPauseToggleOp(op)) {
                if (fieldId === 'beforeValue') {
                    const status = selectedAdCurrentStatus();
                    if (status && status !== currentValue && (isValidStartPauseStatus(status) || status === '存档')) {
                        options.push({
                            value: status,
                            html: renderTargetStatusPill(status),
                            fillOppositeAfter: false,
                        });
                    }
                } else if (fieldId === 'afterValue') {
                    const beforeVal = String(document.getElementById('beforeValue')?.value || '').trim();
                    const opposite = isValidStartPauseStatus(beforeVal)
                        ? oppositeStartPauseStatus(beforeVal)
                        : '启动';
                    if (opposite && opposite !== currentValue) {
                        options.push({
                            value: opposite,
                            html: renderTargetStatusPill(opposite),
                            fillOppositeAfter: false,
                        });
                    }
                }
                return options;
            }
            if (isModifyProductOp(op) || isModifyDeliveryTargetOp(op) || isModifyPlacementOp(op)) {
                const target = getMatchedTargetFromObject();
                if (!target) return options;
                return buildTargetObjectValueAlternates(target, op, fieldId, currentValue);
            }
            return options;
        }

        function applyQuickFillOption(fieldId, opt) {
            const input = document.getElementById(fieldId);
            if (!input || !opt) return;
            input.value = String(opt.value || '').trim();
            if (fieldId === 'beforeValue') {
                syncAfterValueWhenBeforeIsCurrentStatus();
            }
            syncValueQuickMenus();
            updateSubmitButtonState();
        }

        function dismissInputCapsuleMenu(fromEl) {
            const host = fromEl && fromEl.closest ? fromEl.closest('.input-capsule-menu') : null;
            if (!host) return;
            host.classList.add('input-capsule-menu--closed');
            const reopen = () => {
                host.classList.remove('input-capsule-menu--closed');
                host.removeEventListener('mouseleave', reopen);
            };
            host.addEventListener('mouseleave', reopen);
        }

        function syncValueQuickMenus() {
            ['beforeValue', 'afterValue'].forEach((fieldId) => {
                const wrap = document.querySelector(`.aa-value-input-wrap[data-quick-field="${fieldId}"]`);
                const menu = document.getElementById(`${fieldId}QuickMenu`);
                if (!wrap || !menu) return;
                const options = buildQuickFillOptions(fieldId);
                wrap.classList.toggle('input-capsule-menu--empty', !options.length);
                if (!options.length) {
                    menu.innerHTML = '';
                    return;
                }
                menu.innerHTML = options.map((opt, idx) => (
                    `<button type="button" class="input-capsule-menu-item" role="menuitem" data-opt-idx="${idx}">${opt.html}</button>`
                )).join('');
                menu.querySelectorAll('.input-capsule-menu-item').forEach((btn) => {
                    btn.addEventListener('mousedown', (ev) => ev.preventDefault());
                    btn.addEventListener('click', (ev) => {
                        ev.preventDefault();
                        const idx = Number(btn.getAttribute('data-opt-idx'));
                        applyQuickFillOption(fieldId, options[idx]);
                        dismissInputCapsuleMenu(btn);
                    });
                });
            });
        }

        function syncTargetObjectPickMenu() {
            const wrap = document.getElementById('targetObjectWrap');
            const menu = document.getElementById('targetObjectPickMenu');
            if (!wrap || !menu) return;
            const op = getSelectedOperationType();
            const enabled = needsTargetObjectSuggest(op) && !isFixedTargetObjectDashOp(op);
            const list = enabled ? (Array.isArray(targetOptionsCache) ? targetOptionsCache : []) : [];
            wrap.classList.toggle('input-capsule-menu--empty', !list.length);
            if (!list.length) {
                menu.innerHTML = '';
                return;
            }
            menu.innerHTML = list.map((item, idx) => {
                const desc = String(item.target_desc || '').trim();
                return `<button type="button" class="input-capsule-menu-item" role="menuitem" data-opt-idx="${idx}">${renderTargetStatusPill(item.status)}<span class="aa-target-pick-name">${escapeHtml(desc)}</span></button>`;
            }).join('');
            menu.querySelectorAll('.input-capsule-menu-item').forEach((btn) => {
                btn.addEventListener('mousedown', (ev) => ev.preventDefault());
                btn.addEventListener('click', (ev) => {
                    ev.preventDefault();
                    const idx = Number(btn.getAttribute('data-opt-idx'));
                    const target = list[idx];
                    if (target) {
                        applyTargetObjectSelection(target, op);

        const AA_AD_COL_LS = 'sj.amazonAdAdjustment.adTableCols.v4';
        const AA_AD_COL_KEYS = ['ad_level', 'ad_name', 'status'];
        const AA_AD_COL_DEFAULTS = { ad_level: 88, ad_name: 168, status: 80 };

        function loadAdTableColWidths() {
            try {
                const raw = localStorage.getItem(AA_AD_COL_LS);
                const parsed = raw ? JSON.parse(raw) : null;
                if (!parsed || typeof parsed !== 'object') return { ...AA_AD_COL_DEFAULTS };
                const out = { ...AA_AD_COL_DEFAULTS };
                AA_AD_COL_KEYS.forEach(key => {
                    const n = Number(parsed[key]);
                    out[key] = (Number.isFinite(n) && n >= 48) ? n : AA_AD_COL_DEFAULTS[key];
                });
                return out;
            } catch (e) {
                return { ...AA_AD_COL_DEFAULTS };
            }
        }

        function saveAdTableColWidths(widths) {
            try { localStorage.setItem(AA_AD_COL_LS, JSON.stringify(widths)); } catch (e) {}
        }

        function adListTableContentWidth() {
            const table = document.getElementById('adListTable');
            const w = loadAdTableColWidths();
            if (!table) {
                return AA_AD_COL_KEYS.reduce((sum, key) => sum + Math.max(48, Number(w[key]) || 0), 0);
            }
            let sum = 0;
            AA_AD_COL_KEYS.forEach((key) => {
                const col = table.querySelector(`colgroup col[data-col="${key}"]`);
                if (col && col.style.width) {
                    const n = parseFloat(col.style.width);
                    if (Number.isFinite(n) && n > 0) {
                        sum += Math.ceil(n);
                        return;
                    }
                }
                sum += Math.max(48, Number(w[key]) || AA_AD_COL_DEFAULTS[key] || 48);
            });
            return sum;
        }

        function syncAaLeftStackWidth() {
            const stack = document.querySelector('.aa-left-stack');
            const leftCol = document.querySelector('.aa-left-col');
            const infoCard = document.querySelector('.aa-ad-info-card');
            if (!stack) return;
            const table = document.getElementById('adListTable');
            if (!table) {
                stack.style.width = '';
                if (leftCol) {
                    leftCol.style.width = '';
                    leftCol.style.maxWidth = '';
                }
                return;
            }
            const cs = getComputedStyle(infoCard || stack);
            const padX = (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0);
            const listWrap = document.getElementById('adList');
            const listBorderX = listWrap
                ? (parseFloat(getComputedStyle(listWrap).borderLeftWidth) || 0)
                    + (parseFloat(getComputedStyle(listWrap).borderRightWidth) || 0)
                : 2;
            const contentW = adListTableContentWidth();
            const innerW = Math.ceil(contentW + listBorderX);
            const outerW = Math.ceil(innerW + padX);
            const outerPx = `${outerW}px`;
            const innerPx = `${innerW}px`;
            const contentPx = `${contentW}px`;
            stack.style.width = outerPx;
            if (leftCol) {
                leftCol.style.width = outerPx;
                leftCol.style.maxWidth = outerPx;
            }
            if (listWrap) listWrap.style.width = innerPx;
            table.style.width = contentPx;
        }

        let _aaStackWidthRaf = null;
        function scheduleSyncAaLeftStackWidth() {

        function applyAdTableColWidths() {
            const table = document.getElementById('adListTable');
            if (!table) return;
            const w = loadAdTableColWidths();
            AA_AD_COL_KEYS.forEach(key => {
                const col = table.querySelector(`colgroup col[data-col="${key}"]`);
                if (col) col.style.width = `${Math.max(48, w[key])}px`;

        function initAdTableColResize() {
            const table = document.getElementById('adListTable');
            if (!table) return;
            table.querySelectorAll('thead th[data-col-key]').forEach(th => {
                const key = th.getAttribute('data-col-key');
                const handle = th.querySelector('.aa-col-resizer');
                if (!key || !handle || handle.dataset.bound === '1') return;
                handle.dataset.bound = '1';
                handle.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const startX = e.clientX;
                    const col = table.querySelector(`colgroup col[data-col="${key}"]`);
                    const startW = col ? (col.getBoundingClientRect().width || loadAdTableColWidths()[key]) : loadAdTableColWidths()[key];
                    handle.classList.add('is-active');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    function onMove(ev) {
                        const next = Math.max(56, Math.round(startW + (ev.clientX - startX)));
                        if (col) col.style.width = `${next}px`;
                        syncAaLeftStackWidth();
                    }
                    function onUp(ev) {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        handle.classList.remove('is-active');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        const widths = loadAdTableColWidths();
                        const colEl = table.querySelector(`colgroup col[data-col="${key}"]`);
                        widths[key] = colEl ? Math.max(56, Math.round(colEl.getBoundingClientRect().width)) : widths[key];
                        saveAdTableColWidths(widths);
                        scheduleSyncAaLeftStackWidth();
                    }
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        }

            const dot = wrap.querySelector('.help-dot');
            if (dot) {
                dot.setAttribute(
                    'data-tip',
                    amazonId
                        ? '亚马逊后台对应层级的实体 ID；修改后点击保存'
                        : '该广告尚未填写亚马逊 ID，建议补充完善'
                );
            }
            syncAmazonIdSaveButton();
        }

        function saveAmazonIdFromAdjustment() {
            if (!selectedAdId) return;
            const input = document.getElementById('aaAmazonIdInput');
            const btn = document.getElementById('aaAmazonIdSaveBtn');
            const amazonId = String(input?.value || '').trim();
            if (!amazonId) {
                aaValidationToast('请填写亚马逊 ID');
                return;
            }
            if (btn) btn.disabled = true;
            fetch('/api/amazon-ad', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: selectedAdId, amazon_id: amazonId }),
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        aaSaveResult({ action: 'save', isError: true, message: data.message || '保存失败' });
                        return;
                    }
                    const savedId = String(data.item?.amazon_id || amazonId).trim();
                    if (selectedAdDetail) selectedAdDetail.amazon_id = savedId;
                    if (selectedAd) selectedAd.amazon_id = savedId;
                    const raw = adItemsRaw.find(x => String(x.id) === String(selectedAdId));
                    if (raw) raw.amazon_id = savedId;
                    syncAmazonIdPrompt({ amazon_id: savedId });
                    aaSaveResult({ action: 'save', message: '亚马逊 ID 已保存' });
                })
                .catch(err => aaSaveResult({ action: 'save', isError: true, message: '保存失败: ' + err }))
                .finally(() => {
                    syncAmazonIdSaveButton();
                });
        }

        function updateInfoPanel(adInfo) {
            const info = adInfo || {};
            document.getElementById('infoAdType').innerText = info.ad_type_text || '-';
            document.getElementById('infoPortfolio').innerText = info.portfolio_name || '-';
            const campaignText = info.campaign_name || '-';
            const groupText = info.group_name || '-';
            const campaignEl = document.getElementById('infoCampaign');
            const groupEl = document.getElementById('infoGroup');
            if (campaignEl) {
                campaignEl.innerText = campaignText;
                campaignEl.title = campaignText !== '-' ? campaignText : '';
            }
            if (groupEl) {
                groupEl.innerText = groupText;
                groupEl.title = groupText !== '-' ? groupText : '';
            }
            syncHierarchyFilterButtons();
            syncAmazonIdPrompt(adInfo);
        }

        const AA_PHASE1_FIELD_IDS = new Set([
            'targetObject', 'beforeValue', 'afterValue', 'operationType', 'operationReason',
        ]);
        const AA_METRIC_SOURCE_FIELD_IDS = new Set(AA_METRIC_SOURCE_IDS);

        function notifyAdjustmentFieldProgrammaticChange(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.dispatchEvent(new Event('input', { bubbles: true }));
            el.dispatchEvent(new Event('change', { bubbles: true }));
            if (AA_METRIC_SOURCE_FIELD_IDS.has(id)) {
                recalcAdjustmentDerivedMetrics();
                return;
            }
            if (id === 'targetObject') {
                syncTargetObjectState();
                applyAdjustmentPeriodFilter();
            } else if (id === 'beforeValue') {
                syncAfterValueWhenBeforeIsCurrentStatus();
                syncValueQuickMenus();
            } else if (id === 'afterValue') {
                syncValueQuickMenus();
            } else if (id === 'operationType') {
                syncReasonOptions();
                return;
            }
            updateSubmitButtonState();
        }

        function setFieldValue(id, value, options = {}) {
            const input = document.getElementById(id);
            if (!input) return;
            input.value = value || '';
            if (options.silent) return;
            if (AA_PHASE1_FIELD_IDS.has(id) || AA_METRIC_SOURCE_FIELD_IDS.has(id)) {
                notifyAdjustmentFieldProgrammaticChange(id);
            }
            if (id === 'operationType' && window.refreshUniversalSingleSelect) {
                window.refreshUniversalSingleSelect(input);
            }
            if (id === 'operationReason' && window.refreshUniversalSingleSelect) {
                window.refreshUniversalSingleSelect(input);
            }
        }

        function selectAd(adId, options = {}) {
            const restore = options.restoreForm || null;
            selectedAdId = String(adId || '');
            adjustmentPeriodDraft = {};
            if (!restore) supplementaryTargetObjectKey = '';
            syncAdjustmentPeriodSaveBar();
            selectedAd = adItems.find(item => String(item.id) === selectedAdId) || null;
            highlightSelectedAdRow();
            updateInfoPanel(selectedAd ? listItemToAdInfo(selectedAd) : null);
            updateRecordsLink();
            loadAdjustmentPeriodList();
            const defaultsTarget = restore?.targetObject || '';
            const defaultsUrl = buildAdjustmentDefaultsUrl(defaultsTarget);
            if (!defaultsUrl) return Promise.resolve();
            return fetch(defaultsUrl)
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        if (window.showAppToast) window.showAppToast(data.message || '加载默认信息失败', true, 6500);
                        return;
                    }
                    const adInfo = data.ad_info || {};
                    applySelectedAdDetailFromInfo(adInfo);
                    allowedOperations = data.allowed_operations || [];
                    if (restore) {
                        applySavedFormState(restore);
                    } else {
                        renderOperationOptions('');
                    }
                    const defaults = data.defaults || {};
                    setFieldValue('adjustDate', toDatetimeLocal(defaults.adjust_date));
                    setFieldValue('startTime', toDatetimeLocal(defaults.start_time));
                    setFieldValue('endTime', toDatetimeLocal(defaults.end_time));
                    applyObserveDefaults();
                    if (!restore) {
                        setFieldValue('targetObject', '', { silent: true });
                        supplementaryTargetObjectKey = '';
                        setFieldValue('beforeValue', '', { silent: true });
                        setFieldValue('afterValue', '', { silent: true });
                        clearSupplementaryAdjustmentFields();
                    }
                    hideTargetObjectSuggest();
                    updateSubmitButtonState();
                    return loadTargetOptionsForSelectedAd().then(() => {
                        syncTargetObjectFieldMode();
                        if (restore?.targetObject) {
                            syncTargetObjectState();
                        }
                        applyAdjustmentPeriodFilter();
                    });
                })
                .catch(err => {
                    if (window.showAppToast) window.showAppToast('加载默认信息失败: ' + err, true, 6500);
                })
                .finally(() => {
                    savePageState();
                });
        }

        function appendObserveFieldsToPayload(payload) {
            if (!shouldShowObserveFields()) return payload;
            if (!payload.adjust_date) {
                payload.adjust_date = toDatetimeLocal(new Date());
            }
            const mins = getCurrentObserveMinutes();
            if (mins != null) payload.observe_minutes = mins;
            const nextVal = document.getElementById('nextObserveAt')?.value;
            if (nextVal) {
                payload.next_observe_at = nextVal;
            } else {
                const op = getSelectedOperationType();
                const OI = window.AaObserveInterval;
                if (OI && op) {
                    const next = OI.computeNextObserveFromBase(new Date(payload.adjust_date), op.name || '');
                    if (next && !Number.isNaN(next.getTime())) {
                        payload.next_observe_at = toDatetimeLocal(next);
                    }
                }
            }
            return payload;
        }

        function buildPayload(isQuickSubmit) {
            const payload = {
                is_quick_submit: isQuickSubmit ? 1 : 0,
                ad_item_id: selectedAdId,
                operation_type_id: document.getElementById('operationType').value,
                reason_name: document.getElementById('operationReason').value,
                target_object: document.getElementById('targetObject').value.trim(),
                before_value: resolveAdjustmentValueForSubmit('beforeValue', document.getElementById('beforeValue').value),
                after_value: resolveAdjustmentValueForSubmit('afterValue', document.getElementById('afterValue').value),
                adjust_date: document.getElementById('adjustDate').value,
                start_time: isQuickSubmit ? '' : document.getElementById('startTime').value,
                end_time: isQuickSubmit ? '' : document.getElementById('endTime').value,
                impressions: document.getElementById('impressions').value.trim(),
                clicks: document.getElementById('clicks').value.trim(),
                cost: document.getElementById('cost').value.trim(),
                orders: document.getElementById('orders').value.trim(),
                sales: document.getElementById('sales').value.trim(),
                acos: document.getElementById('acos').value.trim(),
                cpc: document.getElementById('cpc').value.trim(),
                ctr: document.getElementById('ctr').value.trim(),
                cvr: document.getElementById('cvr').value.trim(),
                top_of_search_is: document.getElementById('topOfSearchIs').value.trim(),
                attribution_checked: getAttributionCheckedValue(),
                attribution_orders: document.getElementById('attributionOrders').value.trim(),
                attribution_sales: document.getElementById('attributionSales').value.trim(),
                remark: document.getElementById('remark').value.trim()
            };
            appendObserveFieldsToPayload(payload);
            return payload;
        }

        function updateSubmitButtonState() {
            syncTargetObjectNextBtn();
        }

        function applySelectedAdDetailFromInfo(adInfo) {
            if (!selectedAdId) return;
            const info = adInfo || {};
            selectedAdDetail = {
                ad_name: info.ad_name || selectedAdDetail?.ad_name || '',
                status: info.status || selectedAd?.status || selectedAdDetail?.status || '启动',
                budget: info.budget,
                bid_strategy: info.bid_strategy || '',
                amazon_id: info.amazon_id || selectedAdDetail?.amazon_id || '',
            };
            const patch = {};
            if (info.ad_name) patch.ad_name = info.ad_name;
            if (info.status) patch.status = info.status;
            if (info.amazon_id) patch.amazon_id = info.amazon_id;
            if (Object.keys(patch).length) {
                adItemsRaw = (adItemsRaw || []).map(item => (
                    String(item.id) === String(selectedAdId) ? Object.assign({}, item, patch) : item
                ));
                selectedAd = adItemsRaw.find(item => String(item.id) === String(selectedAdId)) || selectedAd;
                applyAdListFiltersAndRender();
                highlightSelectedAdRow();
            }
            updateInfoPanel(info);
            syncOperationTypeFields();
        }

        function reloadSelectedAdDetailFromServer(targetObject) {
            const defaultsUrl = buildAdjustmentDefaultsUrl(targetObject || '');
            if (!defaultsUrl) return Promise.resolve(null);
            return fetch(defaultsUrl)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success' && data.ad_info) {
                        applySelectedAdDetailFromInfo(data.ad_info);
                    }
                    return data;
                });
        }

        function applyLocalAdStatusAfterSubmit(newStatus) {
            const status = String(newStatus || '').trim();
            if (!status || !selectedAdId) return;
            applySelectedAdDetailFromInfo({
                ad_name: selectedAdDetail?.ad_name || selectedAd?.ad_name || '',
                status,
                budget: selectedAdDetail?.budget,
                bid_strategy: selectedAdDetail?.bid_strategy || '',
                amazon_id: selectedAdDetail?.amazon_id || selectedAd?.amazon_id || '',
            });
            const op = getSelectedOperationType();
            if (isArchiveOp(op) || isStartPauseToggleOp(op)) {
                syncOperationTypeFields();
            }
        }

        function postRecord(isQuickSubmit, onSuccess) {
            const payload = buildPayload(isQuickSubmit);
            const btn = isQuickSubmit ? document.getElementById('quickSubmitBtn') : document.getElementById('submitBtn');
            if (btn) btn.disabled = true;
            fetch('/api/amazon-ad-adjustment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    aaSaveResult({ action: 'create', isError: true, message: data.message || '提交失败' });
                    return;
                }
                aaSaveResult({
                    action: 'create',
                    message: isQuickSubmit ? '快速提交成功' : '提交并记录成功',
                });
                const opAfterSubmit = getSelectedOperationType();
                if (isArchiveOp(opAfterSubmit) || isStartPauseToggleOp(opAfterSubmit)) {
                    applyLocalAdStatusAfterSubmit(document.getElementById('afterValue')?.value || '');
                }
                if (typeof onSuccess === 'function') onSuccess();
                updateRecordsLink();
                loadAdjustmentPeriodList();
                if (selectedAdId) {
                    const targetObject = document.getElementById('targetObject')?.value || '';
                    loadTargetOptionsForSelectedAd().then(() => syncTargetObjectFieldMode());
                    reloadSelectedAdDetailFromServer(targetObject)
                        .then(d => {
                            if (d && d.status === 'success' && d.defaults) {
                                setFieldValue('startTime', toDatetimeLocal(d.defaults.start_time));
                                setFieldValue('endTime', toDatetimeLocal(d.defaults.end_time));
                                setFieldValue('adjustDate', toDatetimeLocal(d.defaults.adjust_date));
                                applyObserveDefaults();
                            }
                        });
                }
            })
            .catch(err => aaSaveResult({ action: 'create', isError: true, message: '提交失败: ' + err }))
            .finally(() => {
                if (btn) btn.disabled = false;
                updateSubmitButtonState();
            });
        }

        function submitRecord() {
            const errs = validatePhase1();
            if (errs.length) {
                aaValidationToast(errs[0]);
                return;
            }
            openFullSubmitModal();
        }

        function confirmFullSubmit() {
            const phase1 = validatePhase1();
            if (phase1.length) {
                aaValidationToast(phase1[0]);
                closeFullSubmitModal();
                return;
            }
            const phase2 = validatePhase2();
            if (phase2.length) {
                aaValidationToast(phase2[0]);
                return;
            }
            postRecord(false, closeFullSubmitModal);
        }

        function quickSubmit() {
            const errs = validatePhase1();
            if (errs.length) {
                aaValidationToast(errs[0]);
                return;
            }
            if (shouldShowObserveFields()) {
                refreshSupplementaryAdjustmentDefaults().finally(() => postRecord(true));
                return;
            }
            postRecord(true);
        }

        function updateRecordsLink() {
            const link = document.getElementById('aaRecordsLink');
            if (!link) return;
            if (selectedAdId) {
                link.href = `/amazon-ad-adjustment-records-management?ad_item_id=${encodeURIComponent(selectedAdId)}`;
                link.style.display = '';
            } else {
                link.href = '/amazon-ad-adjustment-records-management';
                link.style.display = 'none';
            }
        }

        document.getElementById('operationType').addEventListener('change', syncReasonOptions);
        document.getElementById('targetObjectNextBtn')?.addEventListener('click', jumpToNextObserveTarget);
        document.getElementById('targetObjectSkipBtn')?.addEventListener('click', skipCurrentObserveTarget);
        document.getElementById('observeIntervalSettingsBtn')?.addEventListener('click', openObserveIntervalSettingsModal);
        document.getElementById('aaObserveIntervalCancelBtn')?.addEventListener('click', closeObserveIntervalSettingsModal);
        document.getElementById('aaObserveIntervalSaveBtn')?.addEventListener('click', saveObserveIntervalSettings);
        document.getElementById('aaRecalcComputedBtn')?.addEventListener('click', refreshComputedFieldsFromMetrics);
        document.getElementById('aaAmazonIdSaveBtn')?.addEventListener('click', saveAmazonIdFromAdjustment);
        document.getElementById('aaAmazonIdInput')?.addEventListener('input', syncAmazonIdSaveButton);
        ['filterByPortfolioBtn', 'filterByCampaignBtn', 'filterByGroupBtn'].forEach((btnId) => {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            btn.addEventListener('click', () => {
                const type = String(btn.getAttribute('data-filter-type') || '').trim();
                if (type) toggleHierarchyFilter(type);
            });
        });
        (function initTargetObjectSuggest() {
            const input = document.getElementById('targetObject');
            if (!input) return;
            input.addEventListener('input', () => {
                if (input.readOnly) return;
                enableAdjustmentPeriodFilter();
                scheduleTargetObjectSuggest();
                syncValueQuickMenus();
                syncTargetObjectState();
                updateSubmitButtonState();
                applyAdjustmentPeriodFilter();
            });
            input.addEventListener('focus', () => {
                if (input.readOnly) return;
                scheduleTargetObjectSuggest();
            });
            input.addEventListener('blur', () => {
                window.setTimeout(() => {
                    hideTargetObjectSuggest();
                    tryAutofillBeforeValueFromTargetObject();
                    syncValueQuickMenus();
                    syncTargetObjectState();
                    enableAdjustmentPeriodFilter();
                    applyAdjustmentPeriodFilter();
                    maybeResetSupplementaryOnTargetObjectChange();
                    savePageState();
                }, 160);
            });
            document.addEventListener('click', (ev) => {
                const wrap = document.getElementById('targetObjectWrap');
                if (wrap && !wrap.contains(ev.target)) hideTargetObjectSuggest();
            });
        })();
        document.getElementById('adUploadInput').addEventListener('change', function(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            uploadAdTemplateFromAdjustment(file);
        });
        ['targetObject', 'beforeValue', 'afterValue', 'operationReason'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('input', () => {
                if (id === 'beforeValue') {
                    syncAfterValueWhenBeforeIsCurrentStatus();
                    syncValueQuickMenus();
                } else if (id === 'afterValue') {
                    syncValueQuickMenus();
                }
                updateSubmitButtonState();
            });
            el.addEventListener('change', () => {
                if (id === 'beforeValue') {
                    syncAfterValueWhenBeforeIsCurrentStatus();
                    syncValueQuickMenus();
                } else if (id === 'afterValue') {
                    syncValueQuickMenus();
                }
                updateSubmitButtonState();
            });
        });

        document.getElementById('adSearchInput').addEventListener('input', scheduleSavePageState);
        document.getElementById('adSearchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadAdList();
        });

        window.addEventListener('resize', () => scheduleSyncAaLeftStackWidth());
        window.addEventListener('DOMContentLoaded', () => {
            if (window.initUniversalSingleSelects) window.initUniversalSingleSelects(document);
            bindAdListRowEvents();
            bindAdListTableResizeObserver();
            initAdSearchPrefs();
            initAdjustmentMetricAutoCalc();
            initAttributionCheckedSegment();
            syncValueQuickMenus();
            syncTargetObjectPickMenu();
            syncTargetObjectNextBtn();
            syncPlacementFieldHints();
            if (window.AmazonAdFormModal) {
                window.AmazonAdFormModal.init({
                    onSaveSuccess: (data) => {
                        const newId = data && (data.item?.id || data.id);
                        return loadAdList().then(() => {
                            if (newId) selectAd(newId);
                        });
                    },
                    showSuccessToast: (msg) => aaSaveResult({ action: 'save', message: msg || undefined }),
                });
            }
            initAdjustmentMetricAutoCalc();
            initPageFromSavedState();
            updateRecordsLink();
            const fullModal = document.getElementById('aaFullSubmitModal');
            if (fullModal && typeof window.bindPmModalBackdropClose === 'function') {
                window.bindPmModalBackdropClose(fullModal, closeFullSubmitModal);
            }
            window.AmazonAdAdjustmentPage = {
                setFieldValue,
                notifyAdjustmentFieldProgrammaticChange,
                updateSubmitButtonState,
                validatePhase1,
                recalcAdjustmentDerivedMetrics,
                refreshComputedFieldsFromMetrics,
            };
        });
    </script>

    <script src="/static/js/aa_observe_interval.js"></script>
    <script src="/static/js/header.js"></script>
    <script src="/static/js/amazon_ad_form_modal.js"></script>
</body>
</html>
