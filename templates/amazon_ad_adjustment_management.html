<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon广告管理 - 广告调整</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .aa-grid {
            display: grid;
            grid-template-columns: auto minmax(250px, 280px) minmax(320px, 1fr);
            gap: 1rem;
            align-items: stretch;
        }
        /* 覆盖 style.css 中 .pm-layout > * { min-width:0 }，避免左侧栏被压窄导致表格横向滚动 */
        .pm-layout.pm-layout--aa-adjust > .aa-grid {
            min-width: 0;
            width: 100%;
            max-width: 100%;
        }
        .pm-layout.pm-layout--aa-adjust .aa-left-col {
            min-width: min-content;
            width: auto;
            max-width: none;
        }
        .aa-left-col {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex: 0 0 auto;
            width: auto;
            max-width: none;
            min-width: min-content;
            min-height: 100%;
            align-self: start;
        }
        .aa-search-card,
        .aa-ad-info-card {
            width: 100%;
            box-sizing: border-box;
        }
        .aa-right-col {
            display: flex;
            flex-direction: column;
            min-width: 0;
            max-width: 300px;
            min-height: 100%;
            padding: 0.75rem 0.85rem;
            overflow: visible;
        }
        .aa-form-stack {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1 1 auto;
            min-height: 0;
            overflow: visible;
        }
        .aa-form-block-title {
            margin: 0.35rem 0 0.15rem;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--morandi-ink);
        }
        .aa-form-block-title:first-child {
            margin-top: 0;
        }
        .aa-field-row {
            display: flex;
            flex-direction: column;
            gap: 0.22rem;
            overflow: visible;
        }
        .aa-field-row label {
            font-size: 0.8rem;
            color: var(--morandi-slate);
            font-weight: 600;
        }
        .aa-field-row .aa-readonly {
            font-size: 0.86rem;
            color: var(--morandi-ink);
            padding: 0.42rem 0.5rem;
            border-radius: 6px;
            border: 1px solid rgba(207, 199, 189, 0.55);
            background: rgba(255, 255, 255, 0.7);
            word-break: break-word;
            min-height: 1.35rem;
        }
        .aa-info-value-wrap {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .aa-info-value-wrap .aa-readonly {
            flex: 1 1 auto;
            min-width: 0;
        }
        #infoCampaign,
        #infoGroup {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            word-break: normal;
        }
        .aa-field-row select,
        .aa-field-row input[type="text"],
        .aa-field-row input[type="datetime-local"] {
            width: 100%;
            box-sizing: border-box;
            font-size: 0.86rem;
            padding: 0.42rem 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--morandi-sand);
        }
        .aa-target-input-area {
            position: relative;
            flex: 1 1 auto;
            min-width: 0;
        }
        .aa-adjust-value-input {
            font-size: 0.86rem;
            padding: 0.42rem 0.5rem;
        }
        .aa-target-object-wrap #targetObject:read-only {
            background: rgba(255, 255, 255, 0.7);
            color: var(--morandi-slate);
            cursor: default;
        }
        .aa-target-object-wrap .input-capsule-menu-panel {
            width: max-content;
            min-width: 100%;
            max-width: min(520px, calc(100vw - 24px));
            max-height: 220px;
            overflow-x: auto;
            overflow-y: auto;
            padding: 0.25rem;
        }
        .aa-target-object-wrap .input-capsule-menu-item {
            gap: 0.35rem;
            font-size: 0.76rem;
            padding: 0.28rem 0.38rem;
            white-space: nowrap;
        }
        .aa-target-object-wrap .input-capsule-menu-item .status-pill {
            font-size: 0.68rem;
            padding: 0.08rem 0.32rem;
        }
        .aa-target-object-wrap .input-capsule-menu-item .status-segment {
            flex: 0 0 auto;
        }
        .aa-target-suggest-list {
            display: none;
            position: absolute;
            left: 0;
            top: calc(100% + 4px);
            z-index: 40;
            width: max-content;
            min-width: 100%;
            max-width: min(520px, calc(100vw - 24px));
            max-height: 180px;
            overflow: auto;
            padding: 0.25rem;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
        }
        .aa-target-suggest-list.open {
            display: block;
        }
        .aa-target-pick-name,
        .aa-target-suggest-name {
            flex: 0 1 auto;
            min-width: 0;
            white-space: nowrap;
        }
        .aa-target-suggest-list .input-capsule-menu-item {
            white-space: nowrap;
        }
        .aa-target-suggest-empty {
            padding: 0.38rem 0.45rem;
            font-size: 0.76rem;
            color: var(--morandi-slate);
        }
        .aa-value-input-wrap {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            overflow: visible;
        }
        .aa-target-object-wrap {
            overflow: visible;
        }
        .aa-value-input-wrap > input[type="text"],
        .aa-target-input-area > input[type="text"] {
            flex: 1 1 auto;
            min-width: 0;
            width: auto !important;
        }
        .aa-target-input-area > input[type="text"] {
            width: 100% !important;
            box-sizing: border-box;
        }
        .aa-value-input-wrap.input-capsule-menu--empty .btn-capsule-sm,
        .aa-target-object-wrap.input-capsule-menu--empty .btn-capsule-sm {
            opacity: 0.35;
            pointer-events: none;
        }
        .aa-search-card {
            padding: 0.75rem;
            flex: 0 0 auto;
        }
        .aa-ad-info-card {
            padding: 0.75rem;
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .aa-ad-info-card h3 {
            margin: 0 0 0.55rem 0;
            flex: 0 0 auto;
        }
        .aa-list-wrap {
            border: 1px solid var(--morandi-sand);
            border-radius: 10px;
            background: #fff;
            flex: 1 1 auto;
            min-height: 0;
            width: fit-content;
            min-width: min-content;
            max-width: none;
            overflow-x: visible;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .aa-ad-table {
            width: max-content;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 0.82rem;
        }
        .aa-ad-table thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: rgba(236, 231, 223, 0.92);
            border-bottom: 1px solid rgba(207, 199, 189, 0.65);
            padding: 0.42rem 0.5rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--morandi-slate);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .aa-ad-table thead th {
            position: relative;
        }
        .aa-col-resizer {
            position: absolute;
            top: 0;
            right: 0;
            width: 8px;
            height: 100%;
            cursor: col-resize;
            user-select: none;
        }
        .aa-col-resizer::after {
            content: '';
            position: absolute;
            top: 18%;
            bottom: 18%;
            right: 2px;
            width: 2px;
            border-radius: 1px;
            background: rgba(123, 128, 136, 0.45);
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .aa-ad-table thead th:hover .aa-col-resizer::after,
        .aa-col-resizer.is-active::after {
            opacity: 1;
        }
        .aa-ad-table tbody tr {
            cursor: pointer;
            transition: background-color 0.12s ease;
        }
        .aa-ad-table tbody tr:hover {
            background: rgba(207, 199, 189, 0.22);
        }
        .aa-ad-table tbody tr.is-active {
            background: rgba(207, 199, 189, 0.45);
        }
        .aa-ad-table tbody tr.is-active:hover {
            background: rgba(207, 199, 189, 0.52);
        }
        .aa-ad-table tbody tr:focus-visible {
            outline: 2px solid rgba(91, 143, 199, 0.55);
            outline-offset: -2px;
        }
        .aa-ad-table td {
            padding: 0.42rem 0.5rem;
            border-bottom: 1px solid rgba(207, 199, 189, 0.38);
            vertical-align: top;
            line-height: 1.35;
            word-break: break-word;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .aa-ad-table tbody tr:last-child td {
            border-bottom: none;
        }
        .aa-ad-cell-empty { color: var(--morandi-slate); opacity: 0.45; font-weight: 400; }
        .aa-list-empty {
            padding: 0.7rem;
            text-align: center;
            color: var(--morandi-slate);
        }

        .aa-actions {
            margin-top: 0.65rem;
            padding-top: 0.55rem;
            border-top: 1px solid rgba(207, 199, 189, 0.45);
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
            flex: 0 0 auto;
        }
        .aa-actions .btn-primary,
        .aa-actions .btn-secondary {
            width: 100%;
        }
        .aa-extra-modal .pm-form {
            gap: 0.55rem;
        }
        .aa-extra-modal .aa-form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.55rem 0.75rem;
        }
        .aa-extra-modal .aa-computed-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.55rem 0.75rem;
        }
        .aa-extra-modal .aa-computed-hint {
            margin: 0 0 0.5rem;
            font-size: 0.82rem;
            color: var(--morandi-slate);
        }
        .aa-extra-modal .yes-no-field {
            display: inline-flex;
            align-items: center;
        }
        .aa-extra-modal .yes-no-input {
            display: none;
        }
        .aa-extra-modal input.aa-computed-input {
            background: rgba(236, 231, 223, 0.35);
        }
        .aa-period-col {
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            padding: 0.75rem 0.85rem;
            max-height: calc(100vh - 140px);
        }
        .aa-period-col h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1rem;
            flex: 0 0 auto;
        }
        .aa-period-list-wrap {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid var(--morandi-sand);
            border-radius: 10px;
            background: #fff;
            padding: 0.45rem;
        }
        .aa-period-empty {
            padding: 0.75rem;
            text-align: center;
            color: var(--morandi-slate);
            font-size: 0.86rem;
        }
        .aa-period-card {
            border: 1px solid rgba(207, 199, 189, 0.55);
            border-radius: 8px;
            padding: 0.5rem 0.55rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.92);
            font-size: 0.78rem;
            line-height: 1.35;
        }
        .aa-period-card:last-child { margin-bottom: 0; }
        .aa-period-card-head {
            font-weight: 700;
            color: var(--morandi-ink);
            margin-bottom: 0.35rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px dashed rgba(207, 199, 189, 0.5);
            font-size: 0.8rem;
        }
        .aa-period-dl {
            display: grid;
            grid-template-columns: 5.2rem 1fr;
            gap: 0.2rem 0.45rem;
            margin: 0;
        }
        .aa-period-dl dt {
            margin: 0;
            color: var(--morandi-slate);
            font-weight: 600;
        }
        .aa-period-dl dd {
            margin: 0;
            color: var(--morandi-ink);
            word-break: break-word;
        }
        .aa-metric-daily {
            color: var(--morandi-slate);
            font-size: 0.74rem;
        }
        .btn-quick-small {
            padding: 0.3rem 0.55rem;
            font-size: 0.78rem;
            line-height: 1;
        }
        .aa-search-card-inner {
            display: grid;
            gap: 0.65rem;
            min-width: 0;
        }
        .aa-search-row {
            margin: 0;
            max-width: none;
            width: 100%;
            flex-wrap: wrap;
        }
        .aa-search-row .pm-search-title {
            flex: 0 0 auto;
        }
        .aa-search-row input[type="text"] {
            flex: 1 1 8rem;
            min-width: 0;
        }
        .aa-search-options {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.85rem 1.1rem;
            font-size: 0.9rem;
            color: var(--morandi-ink);
        }
        .aa-search-options label {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            user-select: none;
        }
        .aa-search-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.2rem;">
            <h2>Amazon广告管理 - 广告调整</h2>
            <p>按广告信息执行调整并记录效果区间数据，支持提交并记录与快速提交</p>
        </section>

        <section class="pm-layout pm-layout--aa-adjust">
            <div class="aa-grid">
                <div class="aa-left-col">
                    <div class="card pm-card aa-search-card">
                        <div class="aa-search-card-inner">
                            <div class="form-group pm-search aa-search-row">
                                <span class="pm-search-title">搜索</span>
                                <input type="text" id="adSearchInput" placeholder="搜索广告类型/组合/活动/组">
                                <button type="button" class="btn-primary" onclick="loadAdList()">搜索</button>
                            </div>
                            <div class="aa-search-options">
                                <label><input type="checkbox" id="adSearchShowPaused"> 显示暂停</label>
                                <label><input type="checkbox" id="adSearchShowArchived"> 显示存档</label>
                                <label><input type="checkbox" id="adSearchExactMatch"> 精准匹配</label>
                            </div>
                            <div class="aa-search-actions">
                                <button type="button" class="btn-accent" onclick="openAdCreateFromAdjustment()">新增广告信息</button>
                                <button type="button" class="btn-secondary" onclick="downloadAdTemplateFromAdjustment()">下载模板</button>
                                <button type="button" class="btn-secondary" onclick="triggerAdUploadFromAdjustment()">批量上传</button>
                                <input type="file" id="adUploadInput" accept=".xlsx" style="display:none;">
                            </div>
                        </div>
                    </div>

                    <div class="card pm-card aa-ad-info-card">
                        <h3>广告信息</h3>
                        <div class="aa-list-wrap" id="adList">
                            <div class="aa-list-empty">加载中...</div>
                        </div>
                    </div>
                </div>

                <div class="card pm-card aa-right-col">
                    <h3 style="margin:0 0 0.55rem 0; flex:0 0 auto; font-size:1rem;">调整内容</h3>
                    <div class="aa-form-stack" id="adInfoBox">
                        <div class="aa-field-row">
                            <label>广告类型</label>
                            <div class="aa-readonly" id="infoAdType">-</div>
                        </div>
                        <div class="aa-field-row">
                            <label>广告组合</label>
                            <div class="aa-info-value-wrap">
                                <div class="aa-readonly" id="infoPortfolio">-</div>
                                <button type="button" class="btn-capsule-sm" id="filterByPortfolioBtn" data-filter-type="portfolio" title="筛选该组合及下属活动/广告组" disabled>筛</button>
                            </div>
                        </div>
                        <div class="aa-field-row">
                            <label>广告活动</label>
                            <div class="aa-info-value-wrap">
                                <div class="aa-readonly" id="infoCampaign">-</div>
                                <button type="button" class="btn-capsule-sm" id="filterByCampaignBtn" data-filter-type="campaign" title="筛选该活动及下属广告组" disabled>筛</button>
                            </div>
                        </div>
                        <div class="aa-field-row">
                            <label>广告组</label>
                            <div class="aa-info-value-wrap">
                                <div class="aa-readonly" id="infoGroup">-</div>
                                <button type="button" class="btn-capsule-sm" id="filterByGroupBtn" data-filter-type="group" title="筛选该广告组" disabled>筛</button>
                            </div>
                        </div>

                        <h4 class="aa-form-block-title">基础调整信息</h4>
                        <div class="aa-field-row">
                            <label for="operationType">操作类型<span class="required-asterisk">*</span></label>
                            <select id="operationType" data-search-placeholder="搜索操作类型">
                                <option value="">请选择操作类型</option>
                            </select>
                        </div>
                        <div class="aa-field-row">
                            <label for="targetObject">操作对象<span class="required-asterisk">*</span></label>
                            <div class="aa-value-input-wrap aa-target-object-wrap input-capsule-menu--empty" id="targetObjectWrap">
                                <div class="aa-target-input-area">
                                    <input type="text" id="targetObject" class="aa-adjust-value-input" placeholder="关键词 / 竞价 / 投放位置" autocomplete="off">
                                    <div id="targetObjectSuggest" class="aa-target-suggest-list" role="listbox" aria-label="投放联想"></div>
                                </div>
                                <div class="input-capsule-menu">
                                    <button type="button" class="btn-capsule-sm" aria-label="选择操作对象" title="全部可选项">⋯</button>
                                    <div class="input-capsule-menu-panel" id="targetObjectPickMenu" role="menu" aria-label="操作对象可选项"></div>
                                </div>
                            </div>
                        </div>
                        <div class="aa-field-row">
                            <label for="beforeValue">修改前<span class="required-asterisk">*</span></label>
                            <div class="aa-value-input-wrap input-capsule-menu--empty" data-quick-field="beforeValue">
                                <input type="text" id="beforeValue" class="aa-adjust-value-input" placeholder="例如：0.75">
                                <div class="input-capsule-menu">
                                    <button type="button" class="btn-capsule-sm" aria-label="快速填充修改前" title="快速填充">⋯</button>
                                    <div class="input-capsule-menu-panel" id="beforeValueQuickMenu" role="menu" aria-label="修改前快速填充"></div>
                                </div>
                            </div>
                        </div>
                        <div class="aa-field-row">
                            <label for="afterValue">修改后<span class="required-asterisk">*</span></label>
                            <div class="aa-value-input-wrap input-capsule-menu--empty" data-quick-field="afterValue">
                                <input type="text" id="afterValue" class="aa-adjust-value-input" placeholder="例如：0.95">
                                <div class="input-capsule-menu">
                                    <button type="button" class="btn-capsule-sm" aria-label="快速填充修改后" title="快速填充">⋯</button>
                                    <div class="input-capsule-menu-panel" id="afterValueQuickMenu" role="menu" aria-label="修改后快速填充"></div>
                                </div>
                            </div>
                        </div>
                        <div class="aa-field-row">
                            <label for="operationReason">修改原因<span class="required-asterisk">*</span></label>
                            <select id="operationReason" data-search-placeholder="搜索修改原因">
                                <option value="">请先选择操作类型</option>
                            </select>
                        </div>
                    </div>

                    <div class="aa-actions">
                        <button type="button" class="btn-primary" onclick="submitRecord()" id="submitBtn" disabled>提交并记录</button>
                        <button type="button" class="btn-secondary" onclick="quickSubmit()" id="quickSubmitBtn" disabled>快速提交</button>
                        <a href="/amazon-ad-adjustment-records-management" id="aaRecordsLink" class="btn-secondary" style="text-align:center; text-decoration:none; display:none;">查看全部记录</a>
                    </div>
                </div>

                <div class="card pm-card aa-period-col">
                    <h3>修改前后列表</h3>
                    <div class="aa-period-list-wrap" id="aaPeriodList">
                        <div class="aa-period-empty">请先在左侧选择广告</div>
                    </div>
                </div>
            </div>

            <div class="pm-modal aa-extra-modal" id="aaFullSubmitModal">
                <div class="pm-modal-content" style="max-width: 640px;">
                    <h3 style="margin-top:0;">补充调整记录信息</h3>
                    <p class="helper-text" style="margin:0.35rem 0 0.65rem;">请填写效果区间、计算字段、归因与备注后确认提交。</p>
                    <div class="pm-form">
                        <div class="form-group">
                            <label for="adjustDate">调整日期</label>
                            <input type="datetime-local" id="adjustDate">
                        </div>
                        <div class="pm-section">
                            <h4>效果区间数据</h4>
                            <div class="pm-section-body">
                                <div class="form-group">
                                    <label for="startTime">开始时间<span class="required-asterisk">*</span></label>
                                    <input type="datetime-local" id="startTime">
                                </div>
                                <div class="form-group">
                                    <label for="endTime">结束时间<span class="required-asterisk">*</span></label>
                                    <input type="datetime-local" id="endTime">
                                </div>
                                <div class="form-group">
                                    <label for="impressions">曝光</label>
                                    <input type="text" id="impressions" class="aa-metric-source" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="clicks">点击</label>
                                    <input type="text" id="clicks" class="aa-metric-source" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="cost">花费</label>
                                    <input type="text" id="cost" class="aa-metric-source" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="orders">订单</label>
                                    <input type="text" id="orders" class="aa-metric-source" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="sales">销售额</label>

                            <div class="pm-section-body">

                                        <input type="hidden" id="attributionChecked" class="yes-no-input" value="0">
                                        <div class="status-segment status-segment--inline" id="attributionCheckedSegment" data-value="0">
                                            <button type="button" class="status-pill status-pill--enabled" data-target="attributionChecked" data-value="1">是</button>
                                            <button type="button" class="status-pill status-pill--paused is-active" data-target="attributionChecked" data-value="0">否</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="attributionOrders">归因订单数</label>
                                    <input type="text" id="attributionOrders" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="attributionSales">归因销售额</label>

                                    <label for="remark">备注</label>
                                    <textarea id="remark" placeholder="补充说明（选填）" style="min-height:88px; width:100%; box-sizing:border-box; padding:0.55rem 0.65rem; border-radius:8px; border:1px solid var(--morandi-sand); font-size:0.9rem; resize:vertical;"></textarea>

                        <button type="button" class="btn-secondary" onclick="closeFullSubmitModal()">取消</button>

        </section>
