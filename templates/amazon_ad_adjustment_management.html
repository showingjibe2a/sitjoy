<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon广告管理 - 广告调整</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .aa-grid {
            display: grid;
            grid-template-columns: auto minmax(250px, 280px) minmax(320px, 1fr);
            gap: 1rem;
            align-items: stretch;
        }
        /* 覆盖 style.css 中 .pm-layout > * { min-width:0 }，避免左侧栏被压窄导致表格横向滚动 */
        .pm-layout.pm-layout--aa-adjust > .aa-grid {
            min-width: 0;
            width: 100%;
            max-width: 100%;
        }
        .pm-layout.pm-layout--aa-adjust .aa-left-col {
            min-width: min-content;
            width: auto;
            max-width: none;
        }
        .aa-left-col {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex: 0 0 auto;
            width: auto;
            max-width: none;
            min-width: min-content;
            min-height: 100%;
            align-self: start;
        }
        .aa-search-card,
        .aa-ad-info-card {
            width: 100%;
            box-sizing: border-box;
        }
        .aa-right-col {
            display: flex;
            flex-direction: column;
            min-width: 0;
            max-width: 300px;
            min-height: 100%;
            padding: 0.75rem 0.85rem;
        }
        .aa-form-stack {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1 1 auto;
            min-height: 0;
        }
        .aa-form-block-title {
            margin: 0.35rem 0 0.15rem;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--morandi-ink);
        }
        .aa-form-block-title:first-child {
            margin-top: 0;
        }
        .aa-field-row {
            display: flex;
            flex-direction: column;
            gap: 0.22rem;
        }
        .aa-field-row label {
            font-size: 0.8rem;
            color: var(--morandi-slate);
            font-weight: 600;
        }
        .aa-field-row .aa-readonly {
            font-size: 0.86rem;
            color: var(--morandi-ink);
            padding: 0.42rem 0.5rem;
            border-radius: 6px;
            border: 1px solid rgba(207, 199, 189, 0.55);
            background: rgba(255, 255, 255, 0.7);
            word-break: break-word;
            min-height: 1.35rem;
        }
        .aa-field-row select,
        .aa-field-row input[type="text"],
        .aa-field-row input[type="datetime-local"] {
            width: 100%;
            box-sizing: border-box;
            font-size: 0.86rem;
            padding: 0.42rem 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--morandi-sand);
        }
        .aa-search-card {
            padding: 0.75rem;
            flex: 0 0 auto;
        }
        .aa-ad-info-card {
            padding: 0.75rem;
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .aa-ad-info-card h3 {
            margin: 0 0 0.55rem 0;
            flex: 0 0 auto;
        }
        .aa-list-wrap {
            border: 1px solid var(--morandi-sand);
            border-radius: 10px;
            background: #fff;
            flex: 1 1 auto;
            min-height: 0;
            width: fit-content;
            min-width: min-content;
            max-width: none;
            overflow-x: visible;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .aa-ad-table {
            width: max-content;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 0.82rem;
        }
        .aa-ad-table thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: rgba(236, 231, 223, 0.92);
            border-bottom: 1px solid rgba(207, 199, 189, 0.65);
            padding: 0.42rem 0.5rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--morandi-slate);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .aa-ad-table thead th.aa-th--portfolio { color: #3d5f82; }
        .aa-ad-table thead th.aa-th--campaign { color: #7a5528; }
        .aa-ad-table thead th.aa-th--group { color: #3d6a52; }
        .aa-ad-table thead th.aa-th--status { color: #5a5f66; }
        .aa-ad-table thead th.aa-th--ad-type { color: #4a5568; }
        .aa-ad-table thead th {
            position: relative;
        }
        .aa-col-resizer {
            position: absolute;
            top: 0;
            right: 0;
            width: 8px;
            height: 100%;
            cursor: col-resize;
            user-select: none;
        }
        .aa-col-resizer::after {
            content: '';
            position: absolute;
            top: 18%;
            bottom: 18%;
            right: 2px;
            width: 2px;
            border-radius: 1px;
            background: rgba(123, 128, 136, 0.45);
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .aa-ad-table thead th:hover .aa-col-resizer::after,
        .aa-col-resizer.is-active::after {
            opacity: 1;
        }
        .aa-ad-table tbody tr {
            cursor: pointer;
            transition: background-color 0.12s ease;
        }
        .aa-ad-table tbody tr:hover {
            background: rgba(207, 199, 189, 0.22);
        }
        .aa-ad-table tbody tr.is-active {
            background: rgba(207, 199, 189, 0.45);
        }
        .aa-ad-table tbody tr.is-active:hover {
            background: rgba(207, 199, 189, 0.52);
        }
        .aa-ad-table tbody tr:focus-visible {
            outline: 2px solid rgba(91, 143, 199, 0.55);
            outline-offset: -2px;
        }
        .aa-ad-table td {
            padding: 0.42rem 0.5rem;
            border-bottom: 1px solid rgba(207, 199, 189, 0.38);
            vertical-align: top;
            line-height: 1.35;
            word-break: break-word;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .aa-ad-table tbody tr:last-child td {
            border-bottom: none;
        }
        .aa-ad-table td.aa-td--portfolio {
            color: #3d5f82;
            border-left: 3px solid #5b8fc7;
        }
        .aa-ad-table td.aa-td--campaign {
            color: #7a5528;
            font-weight: 600;
            border-left: 3px solid #c98a4b;
        }
        .aa-ad-table td.aa-td--group {
            color: #3d6a52;
            border-left: 3px solid #6a9b6e;
        }
        .aa-ad-table td.aa-td--status {
            border-left: 3px solid #9aa3ad;
        }
        .aa-ad-table td.aa-td--ad-type {
            border-left: 3px solid #7c8a9a;
            color: var(--morandi-ink);
        }
        .aa-ad-table .aa-item-status {
            font-size: 0.8rem;
            font-weight: 600;
        }
        .aa-ad-cell-empty { color: var(--morandi-slate); opacity: 0.45; font-weight: 400; }
        .aa-list-empty {
            padding: 0.7rem;
            text-align: center;
            color: var(--morandi-slate);
        }

        .aa-actions {
            margin-top: 0.65rem;
            padding-top: 0.55rem;
            border-top: 1px solid rgba(207, 199, 189, 0.45);
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
            flex: 0 0 auto;
        }
        .aa-actions .btn-primary,
        .aa-actions .btn-secondary {
            width: 100%;
        }
        .aa-extra-modal .pm-form {
            gap: 0.55rem;
        }
        .aa-extra-modal .aa-form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.55rem 0.75rem;
        }
        .aa-extra-modal .aa-computed-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.55rem 0.75rem;
        }
        .aa-extra-modal .aa-computed-hint {
            margin: 0 0 0.5rem;
            font-size: 0.82rem;
            color: var(--morandi-slate);
        }
        .aa-extra-modal .yes-no-field {
            display: inline-flex;
            align-items: center;
        }
        .aa-extra-modal .yes-no-input {
            display: none;
        }
        .aa-extra-modal input.aa-computed-input {
            background: rgba(236, 231, 223, 0.35);
        }
        .aa-period-col {
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            padding: 0.75rem 0.85rem;
            max-height: calc(100vh - 140px);
        }
        .aa-period-col h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1rem;
            flex: 0 0 auto;
        }
        .aa-period-list-wrap {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid var(--morandi-sand);
            border-radius: 10px;
            background: #fff;
            padding: 0.45rem;
        }
        .aa-period-empty {
            padding: 0.75rem;
            text-align: center;
            color: var(--morandi-slate);
            font-size: 0.86rem;
        }
        .aa-period-card {
            border: 1px solid rgba(207, 199, 189, 0.55);
            border-radius: 8px;
            padding: 0.5rem 0.55rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.92);
            font-size: 0.78rem;
            line-height: 1.35;
        }
        .aa-period-card:last-child { margin-bottom: 0; }
        .aa-period-card-head {
            font-weight: 700;
            color: var(--morandi-ink);
            margin-bottom: 0.35rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px dashed rgba(207, 199, 189, 0.5);
            font-size: 0.8rem;
        }
        .aa-period-dl {
            display: grid;
            grid-template-columns: 5.2rem 1fr;
            gap: 0.2rem 0.45rem;
            margin: 0;
        }
        .aa-period-dl dt {
            margin: 0;
            color: var(--morandi-slate);
            font-weight: 600;
        }
        .aa-period-dl dd {
            margin: 0;
            color: var(--morandi-ink);
            word-break: break-word;
        }
        .aa-metric-daily {
            color: var(--morandi-slate);
            font-size: 0.74rem;
        }
        .btn-quick-small {
            padding: 0.3rem 0.55rem;
            font-size: 0.78rem;
            line-height: 1;
        }
        .aa-search-card-inner {
            display: grid;
            gap: 0.65rem;
            min-width: 0;
        }
        .aa-search-row {
            margin: 0;
            max-width: none;
            width: 100%;
            flex-wrap: wrap;
        }
        .aa-search-row .pm-search-title {
            flex: 0 0 auto;
        }
        .aa-search-row input[type="text"] {
            flex: 1 1 8rem;
            min-width: 0;
        }
        .aa-search-options {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.85rem 1.1rem;
            font-size: 0.9rem;
            color: var(--morandi-ink);
        }
        .aa-search-options label {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            user-select: none;
        }
        .aa-search-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        .aa-item-status {
            font-size: 0.78rem;
            margin-left: 0.35rem;
            color: var(--morandi-slate);
        }
        .aa-item-status.is-paused { color: #8c6a2f; }
        .aa-item-status.is-archived { color: #6b7280; }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.2rem;">
            <h2>Amazon广告管理 - 广告调整</h2>
            <p>按广告信息执行调整并记录效果区间数据，支持提交并记录与快速提交</p>
        </section>

        <section class="pm-layout pm-layout--aa-adjust">
            <div class="aa-grid">
                <div class="aa-left-col">
                    <div class="card pm-card aa-search-card">
                        <div class="aa-search-card-inner">
                            <div class="form-group pm-search aa-search-row">
                                <span class="pm-search-title">搜索</span>
                                <input type="text" id="adSearchInput" placeholder="搜索广告类型/组合/活动/组">
                                <button type="button" class="btn-primary" onclick="loadAdList()">搜索</button>
                            </div>
                            <div class="aa-search-options">
                                <label><input type="checkbox" id="adSearchShowPaused"> 显示暂停</label>
                                <label><input type="checkbox" id="adSearchShowArchived"> 显示存档</label>
                                <label><input type="checkbox" id="adSearchExactMatch"> 精准匹配</label>
                            </div>
                            <div class="aa-search-actions">
                                <button type="button" class="btn-accent" onclick="openAdCreateFromAdjustment()">新增广告信息</button>
                                <button type="button" class="btn-secondary" onclick="downloadAdTemplateFromAdjustment()">下载模板</button>
                                <button type="button" class="btn-secondary" onclick="triggerAdUploadFromAdjustment()">批量上传</button>
                                <input type="file" id="adUploadInput" accept=".xlsx" style="display:none;">
                            </div>
                        </div>
                    </div>

                    <div class="card pm-card aa-ad-info-card">
                        <h3>广告信息</h3>
                        <div class="aa-list-wrap" id="adList">
                            <div class="aa-list-empty">加载中...</div>
                        </div>
                    </div>
                </div>

                <div class="card pm-card aa-right-col">
                    <h3 style="margin:0 0 0.55rem 0; flex:0 0 auto; font-size:1rem;">调整内容</h3>
                    <div class="aa-form-stack" id="adInfoBox">
                        <div class="aa-field-row">
                            <label>广告类型</label>
                            <div class="aa-readonly" id="infoAdType">-</div>
                        </div>
                        <div class="aa-field-row">
                            <label>广告组合</label>
                            <div class="aa-readonly" id="infoPortfolio">-</div>
                        </div>
                        <div class="aa-field-row">
                            <label>广告活动</label>
                            <div class="aa-readonly" id="infoCampaign">-</div>
                        </div>
                        <div class="aa-field-row">
                            <label>广告组</label>
                            <div class="aa-readonly" id="infoGroup">-</div>
                        </div>

                        <h4 class="aa-form-block-title">基础调整信息</h4>
                        <div class="aa-field-row">
                            <label for="operationType">操作类型<span class="required-asterisk">*</span></label>
                            <select id="operationType" data-search-placeholder="搜索操作类型">
                                <option value="">请选择操作类型</option>
                            </select>
                        </div>
                        <div class="aa-field-row">
                            <label for="targetObject">操作对象<span class="required-asterisk">*</span></label>
                            <input type="text" id="targetObject" placeholder="关键词 / 竞价 / 投放位置">
                        </div>
                        <div class="aa-field-row">
                            <label for="beforeValue">修改前<span class="required-asterisk">*</span></label>
                            <input type="text" id="beforeValue" placeholder="例如：0.75">
                        </div>
                        <div class="aa-field-row">
                            <label for="afterValue">修改后<span class="required-asterisk">*</span></label>
                            <input type="text" id="afterValue" placeholder="例如：0.95">
                        </div>
                        <div class="aa-field-row">
                            <label for="operationReason">修改原因<span class="required-asterisk">*</span></label>
                            <select id="operationReason" data-search-placeholder="搜索修改原因">
                                <option value="">请先选择操作类型</option>
                            </select>
                        </div>
                    </div>

                    <div class="aa-actions">
                        <button type="button" class="btn-primary" onclick="submitRecord()" id="submitBtn" disabled>提交并记录</button>
                        <button type="button" class="btn-secondary" onclick="quickSubmit()" id="quickSubmitBtn" disabled>快速提交</button>
                        <a href="/amazon-ad-adjustment-records-management" id="aaRecordsLink" class="btn-secondary" style="text-align:center; text-decoration:none; display:none;">查看全部记录</a>
                    </div>
                </div>

                <div class="card pm-card aa-period-col">
                    <h3>修改前后列表</h3>
                    <div class="aa-period-list-wrap" id="aaPeriodList">
                        <div class="aa-period-empty">请先在左侧选择广告</div>
                    </div>
                </div>
            </div>

            <div class="pm-modal aa-extra-modal" id="aaFullSubmitModal">
                <div class="pm-modal-content" style="max-width: 640px;">
                    <h3 style="margin-top:0;">补充调整记录信息</h3>
                    <p class="helper-text" style="margin:0.35rem 0 0.65rem;">请填写效果区间、计算字段、归因与备注后确认提交。</p>
                    <div class="pm-form">
                        <div class="form-group">
                            <label for="adjustDate">调整日期</label>
                            <input type="datetime-local" id="adjustDate">
                        </div>
                        <div class="pm-section">
                            <h4>效果区间数据</h4>
                            <div class="pm-section-body">
                                <div class="form-group">
                                    <label for="startTime">开始时间<span class="required-asterisk">*</span></label>
                                    <input type="datetime-local" id="startTime">
                                </div>
                                <div class="form-group">
                                    <label for="endTime">结束时间<span class="required-asterisk">*</span></label>
                                    <input type="datetime-local" id="endTime">
                                </div>
                                <div class="form-group">
                                    <label for="impressions">曝光</label>
                                    <input type="text" id="impressions" class="aa-metric-source" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="clicks">点击</label>
                                    <input type="text" id="clicks" class="aa-metric-source" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="cost">花费</label>
                                    <input type="text" id="cost" class="aa-metric-source" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="orders">订单</label>
                                    <input type="text" id="orders" class="aa-metric-source" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="sales">销售额</label>
                                    <input type="text" id="sales" class="aa-metric-source" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="topOfSearchIs">首页首位IS</label>
                                    <input type="text" id="topOfSearchIs" placeholder="如 35.20%">
                                </div>
                            </div>
                        </div>
                        <div class="pm-section">
                            <h4>计算字段</h4>
                            <p class="aa-computed-hint">根据曝光、点击、花费、订单、销售额自动计算（可手动修改）</p>
                            <div class="aa-computed-grid pm-section-body">
                                <div class="form-group">
                                    <label for="acos">ACOS</label>
                                    <input type="text" id="acos" class="aa-computed-input" placeholder="花费÷销售额">
                                </div>
                                <div class="form-group">
                                    <label for="cpc">CPC</label>
                                    <input type="text" id="cpc" class="aa-computed-input" placeholder="花费÷点击">
                                </div>
                                <div class="form-group">
                                    <label for="ctr">CTR</label>
                                    <input type="text" id="ctr" class="aa-computed-input" placeholder="点击÷曝光">
                                </div>
                                <div class="form-group">
                                    <label for="cvr">CVR</label>
                                    <input type="text" id="cvr" class="aa-computed-input" placeholder="订单÷点击">
                                </div>
                            </div>
                        </div>
                        <div class="pm-section">
                            <h4>归因</h4>
                            <div class="pm-section-body">
                                <div class="form-group">
                                    <label>归因是否检查</label>
                                    <div class="yes-no-field">
                                        <input type="hidden" id="attributionChecked" class="yes-no-input" value="0">
                                        <div class="status-segment status-segment--inline" id="attributionCheckedSegment" data-value="0">
                                            <button type="button" class="status-pill status-pill--enabled" data-target="attributionChecked" data-value="1">是</button>
                                            <button type="button" class="status-pill status-pill--paused is-active" data-target="attributionChecked" data-value="0">否</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="attributionOrders">归因订单数</label>
                                    <input type="text" id="attributionOrders" placeholder="选填">
                                </div>
                                <div class="form-group">
                                    <label for="attributionSales">归因销售额</label>
                                    <input type="text" id="attributionSales" placeholder="选填">
                                </div>
                            </div>
                        </div>
                        <div class="pm-section">
                            <h4>备注</h4>
                            <div class="pm-section-body">
                                <div class="form-group pm-form-full">
                                    <label for="remark">备注</label>
                                    <textarea id="remark" placeholder="补充说明（选填）" style="min-height:88px; width:100%; box-sizing:border-box; padding:0.55rem 0.65rem; border-radius:8px; border:1px solid var(--morandi-sand); font-size:0.9rem; resize:vertical;"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="pm-modal-actions">
                        <button type="button" class="btn-secondary" onclick="closeFullSubmitModal()">取消</button>
                        <button type="button" class="btn-primary" onclick="confirmFullSubmit()">确认提交</button>
                    </div>
                </div>
            </div>

        </section>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        let adItems = [];
        let adItemsRaw = [];
        let selectedAd = null;
        let selectedAdId = null;
        let allowedOperations = [];

        const AA_SEARCH_LS_PAUSED = 'sj.amazonAdAdjustment.showPaused';
        const AA_SEARCH_LS_ARCHIVED = 'sj.amazonAdAdjustment.showArchived';
        const AA_SEARCH_LS_EXACT = 'sj.amazonAdAdjustment.exactMatch';

        function readAdSearchBool(key, defaultValue) {
            try {
                const raw = localStorage.getItem(key);
                if (raw === null || raw === '') return defaultValue;
                return raw === '1' || raw === 'true';
            } catch (e) {
                return defaultValue;
            }
        }

        function writeAdSearchBool(key, value) {
            try {
                localStorage.setItem(key, value ? '1' : '0');
            } catch (e) {}
        }

        function initAdSearchPrefs() {
            const pausedEl = document.getElementById('adSearchShowPaused');
            const archivedEl = document.getElementById('adSearchShowArchived');
            const exactEl = document.getElementById('adSearchExactMatch');
            if (pausedEl) pausedEl.checked = readAdSearchBool(AA_SEARCH_LS_PAUSED, false);
            if (archivedEl) archivedEl.checked = readAdSearchBool(AA_SEARCH_LS_ARCHIVED, false);
            if (exactEl) exactEl.checked = readAdSearchBool(AA_SEARCH_LS_EXACT, false);
            [pausedEl, archivedEl, exactEl].forEach(el => {
                if (!el) return;
                el.addEventListener('change', () => {
                    writeAdSearchBool(AA_SEARCH_LS_PAUSED, !!pausedEl.checked);
                    writeAdSearchBool(AA_SEARCH_LS_ARCHIVED, !!archivedEl.checked);
                    writeAdSearchBool(AA_SEARCH_LS_EXACT, !!exactEl.checked);
                    applyAdListFiltersAndRender();
                });
            });
        }

        function getAdSearchPrefs() {
            return {
                showPaused: !!document.getElementById('adSearchShowPaused')?.checked,
                showArchived: !!document.getElementById('adSearchShowArchived')?.checked,
                exactMatch: !!document.getElementById('adSearchExactMatch')?.checked
            };
        }

        function statusAllowed(status, prefs) {
            const s = String(status || '启动').trim() || '启动';
            if (s === '启动') return true;
            if (s === '暂停') return prefs.showPaused;
            if (s === '存档') return prefs.showArchived;
            return prefs.showPaused || prefs.showArchived;
        }

        function adItemSearchText(item) {
            return [
                item.ad_name,
                item.ad_type_text,
                item.portfolio_name,
                item.campaign_name,
                item.group_name
            ].filter(Boolean).join(' ').toLowerCase();
        }

        function adItemMatchesKeyword(item, keyword, exactMatch) {
            if (!keyword) return true;
            const name = String(item.ad_name || '').trim();
            if (exactMatch) {
                return name.toLowerCase() === keyword.toLowerCase();
            }
            return adItemSearchText(item).includes(keyword.toLowerCase());
        }

        function applyAdListFilters(items) {
            const keyword = (document.getElementById('adSearchInput')?.value || '').trim();
            const prefs = getAdSearchPrefs();
            return (items || []).filter(item => {
                if (!statusAllowed(item.status, prefs)) return false;
                return adItemMatchesKeyword(item, keyword, prefs.exactMatch);
            });
        }

        function applyAdListFiltersAndRender() {
            adItems = applyAdListFilters(adItemsRaw);
            const prev = selectedAdId;
            if (prev && !adItems.some(x => String(x.id) === String(prev))) {
                selectedAdId = null;
                selectedAd = null;
                updateInfoPanel(null);

            renderAdList();
            if (!selectedAdId && adItems.length) {

        function toDatetimeLocal(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '';
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function formatDateTime(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return value;
            return d.toLocaleString('zh-CN');
        }

        function periodDayCount(startTime, endTime) {
            const s = new Date(startTime);
            const e = new Date(endTime);
            if (Number.isNaN(s.getTime()) || Number.isNaN(e.getTime())) return null;
            if (e < s) return null;
            return Math.max(1, (e.getTime() - s.getTime()) / 86400000);
        }

        function formatMetricPlain(value) {
            const text = String(value ?? '').trim();
            return text ? escapeHtml(text) : '<span class="aa-ad-cell-empty">-</span>';
        }

        function formatMetricWithDaily(value, startTime, endTime) {
            const text = String(value ?? '').trim();
            if (!text) return '<span class="aa-ad-cell-empty">-</span>';
            const days = periodDayCount(startTime, endTime);
            const num = parseFloat(text.replace(/,/g, ''));
            if (days == null || !Number.isFinite(num)) return escapeHtml(text);
            const daily = num / days;
            const dailyStr = Math.abs(daily - Math.round(daily)) < 0.005
                ? String(Math.round(daily))
                : daily.toFixed(2);
            return `${escapeHtml(text)}<span class="aa-metric-daily">（日均 ${escapeHtml(dailyStr)}）</span>`;
        }

        function renderPeriodRow(label, html) {
            return `<dt>${escapeHtml(label)}</dt><dd>${html}</dd>`;
        }

        function renderAdjustmentPeriodCard(item, index) {
            const start = item.start_time;
            const end = item.end_time;
            const head = `区间 #${index + 1} · ${formatDateTime(start) || '-'} ~ ${formatDateTime(end) || '-'}`;
            const rows = [
                renderPeriodRow('修改前', formatMetricPlain(item.before_value)),
                renderPeriodRow('修改后', formatMetricPlain(item.after_value)),
                renderPeriodRow('原因', formatMetricPlain(item.reason_name)),
                renderPeriodRow('修改日期', formatMetricPlain(formatDateTime(item.adjust_date))),
                renderPeriodRow('开始时间', formatMetricPlain(formatDateTime(start))),
                renderPeriodRow('结束时间', formatMetricPlain(formatDateTime(end))),
                renderPeriodRow('曝光', formatMetricWithDaily(item.impressions, start, end)),
                renderPeriodRow('点击', formatMetricWithDaily(item.clicks, start, end)),
                renderPeriodRow('花费', formatMetricWithDaily(item.cost, start, end)),
                renderPeriodRow('订单', formatMetricWithDaily(item.orders, start, end)),
                renderPeriodRow('销售额', formatMetricWithDaily(item.sales, start, end)),
                renderPeriodRow('ACOS', formatMetricPlain(item.acos)),
                renderPeriodRow('CPC', formatMetricPlain(item.cpc)),
                renderPeriodRow('CTR', formatMetricPlain(item.ctr)),
                renderPeriodRow('CVR', formatMetricPlain(item.cvr)),
                renderPeriodRow('首页首位IS', formatMetricPlain(item.top_of_search_is)),
                renderPeriodRow('是否归因', formatMetricPlain(String(item.attribution_checked || '0') === '1' ? '是' : '否')),
                renderPeriodRow('归因订单', formatMetricPlain(item.attribution_orders)),
                renderPeriodRow('归因销售额', formatMetricPlain(item.attribution_sales)),
                renderPeriodRow('备注', formatMetricPlain(item.remark)),
            ].join('');
            return `<article class="aa-period-card"><div class="aa-period-card-head">${escapeHtml(head)}</div><dl class="aa-period-dl">${rows}</dl></article>`;
        }

        function renderAdjustmentPeriodList(items) {
            const wrap = document.getElementById('aaPeriodList');
            if (!wrap) return;
            if (!selectedAdId) {
                wrap.innerHTML = '<div class="aa-period-empty">请先在左侧选择广告</div>';

            if (!text) return;

            if (!selectedAdId) errors.push('请先在左侧选择广告');

            if (!document.getElementById('beforeValue').value.trim()) errors.push('请填写修改前');
            if (!document.getElementById('afterValue').value.trim()) errors.push('请填写修改后');

        function validatePhase2() {
            const errors = [];

        const AA_METRIC_SOURCE_IDS = ['impressions', 'clicks', 'cost', 'orders', 'sales'];

        function parseMetricNumber(raw) {
            const text = String(raw ?? '').trim().replace(/,/g, '').replace(/%/g, '');
            if (!text) return null;
            const n = parseFloat(text);
            return Number.isFinite(n) ? n : null;
        }

        function formatPercentFromRatio(ratio) {
            if (ratio == null || !Number.isFinite(ratio)) return '';
            return (ratio * 100).toFixed(2) + '%';
        }

        function formatDecimalMetric(n, digits) {
            if (n == null || !Number.isFinite(n)) return '';
            const d = typeof digits === 'number' ? digits : 2;
            const fixed = Number(n.toFixed(d));
            return String(fixed);
        }

        function recalcAdjustmentDerivedMetrics() {
            const impressions = parseMetricNumber(document.getElementById('impressions')?.value);
            const clicks = parseMetricNumber(document.getElementById('clicks')?.value);
            const cost = parseMetricNumber(document.getElementById('cost')?.value);
            const orders = parseMetricNumber(document.getElementById('orders')?.value);
            const sales = parseMetricNumber(document.getElementById('sales')?.value);

            if (cost != null && sales != null && sales > 0) {
                setFieldValue('acos', formatPercentFromRatio(cost / sales));
            }
            if (cost != null && clicks != null && clicks > 0) {
                setFieldValue('cpc', formatDecimalMetric(cost / clicks));
            }
            if (clicks != null && impressions != null && impressions > 0) {
                setFieldValue('ctr', formatPercentFromRatio(clicks / impressions));
            }
            if (orders != null && clicks != null && clicks > 0) {
                setFieldValue('cvr', formatPercentFromRatio(orders / clicks));
            }
        }

        function uploadAdTemplateFromAdjustment(file) {

        function escapeHtml(text) {
            return String(text == null ? '' : text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function adListCellText(value) {

            if (!text) return '<span class="aa-ad-cell-empty">-</span>';
            return escapeHtml(text);
        }

        function adListStatusCell(item) {
            const status = String(item.status || '启动').trim() || '启动';
            const cls = status === '暂停' ? 'is-paused' : (status === '存档' ? 'is-archived' : '');
            return `<span class="aa-item-status ${cls}">${escapeHtml(status)}</span>`;
        }

        const AA_AD_COL_LS = 'sj.amazonAdAdjustment.adTableCols.v2';
        const AA_AD_COL_KEYS = ['portfolio', 'campaign', 'group', 'status', 'ad_type'];
        const AA_AD_COL_DEFAULTS = { portfolio: 88, campaign: 88, group: 88, status: 62, ad_type: 76 };

        function loadAdTableColWidths() {
            try {
                const raw = localStorage.getItem(AA_AD_COL_LS);
                const parsed = raw ? JSON.parse(raw) : null;
                if (!parsed || typeof parsed !== 'object') return { ...AA_AD_COL_DEFAULTS };
                const out = { ...AA_AD_COL_DEFAULTS };
                AA_AD_COL_KEYS.forEach(key => {
                    const n = Number(parsed[key]);
                    out[key] = (Number.isFinite(n) && n >= 48) ? n : AA_AD_COL_DEFAULTS[key];
                });
                return out;
            } catch (e) {
                return { ...AA_AD_COL_DEFAULTS };
            }
        }

        function saveAdTableColWidths(widths) {
            try { localStorage.setItem(AA_AD_COL_LS, JSON.stringify(widths)); } catch (e) {}
        }

        function adListTableColWidthsSum(table) {
            const w = loadAdTableColWidths();
            if (!table) {
                return AA_AD_COL_KEYS.reduce((sum, key) => sum + Math.max(48, Number(w[key]) || 0), 0);
            }
            let sum = 0;
            AA_AD_COL_KEYS.forEach((key) => {
                const col = table.querySelector(`colgroup col[data-col="${key}"]`);
                if (col && col.style.width) {
                    const n = parseFloat(col.style.width);
                    if (Number.isFinite(n) && n > 0) {
                        sum += Math.ceil(n);
                        return;
                    }
                }
                sum += Math.max(48, Number(w[key]) || AA_AD_COL_DEFAULTS[key] || 48);
            });
            return sum;
        }

        function adListTableContentWidth() {
            const table = document.getElementById('adListTable');
            const fromCols = adListTableColWidthsSum(table);
            if (!table) return fromCols;
            let measured = 0;
            const headerRow = table.tHead && table.tHead.rows[0];
            if (headerRow) {
                measured = Array.from(headerRow.cells).reduce(
                    (sum, th) => sum + Math.ceil(th.getBoundingClientRect().width || 0),
                    0
                );
            }
            const scrollW = Math.ceil(table.scrollWidth || 0);
            return Math.max(fromCols, measured, scrollW, fromCols);
        }

        function syncAaLeftColumnWidth() {
            const leftCol = document.querySelector('.aa-left-col');
            if (!leftCol) return;
            const refCard = document.querySelector('.aa-ad-info-card') || document.querySelector('.aa-search-card');
            const cs = refCard ? getComputedStyle(refCard) : null;
            const padX = cs
                ? (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0)
                : 24;
            const listWrap = document.getElementById('adList');
            const listBorderX = listWrap
                ? (parseFloat(getComputedStyle(listWrap).borderLeftWidth) || 0)
                    + (parseFloat(getComputedStyle(listWrap).borderRightWidth) || 0)
                : 2;
            const table = document.getElementById('adListTable');
            const contentW = adListTableContentWidth();
            let innerW = Math.ceil(contentW + listBorderX + 2);
            const searchCard = document.querySelector('.aa-search-card');
            if (searchCard) {
                const searchInner = searchCard.querySelector('.aa-search-card-inner');
                const searchNeed = Math.ceil((searchInner || searchCard).scrollWidth || 0);
                if (searchNeed > innerW) innerW = searchNeed;
            }
            const outerW = Math.ceil(innerW + padX);
            leftCol.style.width = `${outerW}px`;
            leftCol.style.minWidth = `${outerW}px`;
            leftCol.style.maxWidth = 'none';
            if (listWrap) {
                listWrap.style.width = `${innerW}px`;
                listWrap.style.minWidth = `${innerW}px`;
                listWrap.style.maxWidth = 'none';
            }
            const infoCard = document.querySelector('.aa-ad-info-card');
            [infoCard, searchCard].forEach((card) => {
                if (!card) return;
                card.style.width = `${outerW}px`;
                card.style.minWidth = `${outerW}px`;
                card.style.maxWidth = 'none';
            });
            if (table) {
                table.style.width = `${contentW}px`;
            }
        }

        let _aaLeftColWidthTimer = null;
        function scheduleSyncAaLeftColumnWidth() {
            if (_aaLeftColWidthTimer) clearTimeout(_aaLeftColWidthTimer);
            _aaLeftColWidthTimer = setTimeout(() => {
                _aaLeftColWidthTimer = null;
                syncAaLeftColumnWidth();
                requestAnimationFrame(syncAaLeftColumnWidth);
            }, 0);
        }

        function applyAdTableColWidths() {
            const table = document.getElementById('adListTable');
            if (!table) return;
            const w = loadAdTableColWidths();
            AA_AD_COL_KEYS.forEach(key => {
                const col = table.querySelector(`colgroup col[data-col="${key}"]`);
                if (col) col.style.width = `${Math.max(48, w[key])}px`;
            });
            scheduleSyncAaLeftColumnWidth();
        }

        function initAdTableColResize() {
            const table = document.getElementById('adListTable');
            if (!table) return;
            table.querySelectorAll('thead th[data-col-key]').forEach(th => {
                const key = th.getAttribute('data-col-key');
                const handle = th.querySelector('.aa-col-resizer');
                if (!key || !handle || handle.dataset.bound === '1') return;
                handle.dataset.bound = '1';
                handle.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const startX = e.clientX;
                    const col = table.querySelector(`colgroup col[data-col="${key}"]`);
                    const startW = col ? (col.getBoundingClientRect().width || loadAdTableColWidths()[key]) : loadAdTableColWidths()[key];
                    handle.classList.add('is-active');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    function onMove(ev) {
                        const next = Math.max(56, Math.round(startW + (ev.clientX - startX)));
                        if (col) col.style.width = `${next}px`;
                        scheduleSyncAaLeftColumnWidth();
                    }
                    function onUp(ev) {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        handle.classList.remove('is-active');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        const widths = loadAdTableColWidths();
                        const colEl = table.querySelector(`colgroup col[data-col="${key}"]`);
                        widths[key] = colEl ? Math.max(56, Math.round(colEl.getBoundingClientRect().width)) : widths[key];
                        saveAdTableColWidths(widths);
                        scheduleSyncAaLeftColumnWidth();
                    }
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        }

        function bindAdListRowEvents() {
            const wrap = document.getElementById('adList');
            if (!wrap || wrap.dataset.rowBound === '1') return;
            wrap.dataset.rowBound = '1';
            wrap.addEventListener('click', function (e) {

                const tr = e.target.closest('tbody tr[data-ad-id]');
                if (!tr) return;
                selectAd(tr.getAttribute('data-ad-id'));

            wrap.addEventListener('keydown', function (e) {
                const tr = e.target.closest('tbody tr[data-ad-id]');
                if (!tr) return;
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();

                }
            });
        }

        function highlightSelectedAdRow() {

        function renderAdList() {
            const wrap = document.getElementById('adList');
            if (!adItems.length) {
                wrap.innerHTML = '<div class="aa-list-empty">暂无广告信息</div>';
                scheduleSyncAaLeftColumnWidth();
                return;
            }
            const widths = loadAdTableColWidths();
            const rows = adItems.map(item => {
                const active = String(item.id) === String(selectedAdId);
                const level = String(item.ad_level || 'campaign');
                let portfolioText = '';
                let campaignText = '';
                let groupText = '';
                if (level === 'portfolio') {
                    portfolioText = item.ad_name || item.portfolio_name || '';
                } else if (level === 'group') {
                    portfolioText = item.portfolio_name || '';
                    campaignText = item.campaign_name || '';
                    groupText = item.ad_name || '';
                } else {
                    portfolioText = item.portfolio_name || '';
                    campaignText = item.ad_name || '';
                }
                const levelLabel = level === 'portfolio' ? '广告组合' : (level === 'group' ? '广告组' : '广告活动');
                const rowTitle = `${levelLabel} · ${item.ad_type_text || '-'}`;
                return `
                    <tr data-ad-id="${item.id}" class="${active ? 'is-active' : ''}" tabindex="0" role="row" aria-selected="${active ? 'true' : 'false'}" title="${escapeHtml(rowTitle)}">
                        <td class="aa-td--portfolio">${adListCellText(portfolioText)}</td>
                        <td class="aa-td--campaign">${adListCellText(campaignText)}</td>
                        <td class="aa-td--group">${adListCellText(groupText)}</td>
                        <td class="aa-td--status">${adListStatusCell(item)}</td>
                        <td class="aa-td--ad-type">${adListCellText(item.ad_type_text)}</td>
                    </tr>
                `;
            }).join('');
            wrap.innerHTML = `
                <table class="aa-ad-table" id="adListTable">
                    <colgroup>
                        <col data-col="portfolio" style="width:${widths.portfolio}px">
                        <col data-col="campaign" style="width:${widths.campaign}px">
                        <col data-col="group" style="width:${widths.group}px">
                        <col data-col="status" style="width:${widths.status}px">
                        <col data-col="ad_type" style="width:${widths.ad_type}px">
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="aa-th--portfolio" data-col-key="portfolio">广告组合<span class="aa-col-resizer" aria-hidden="true"></span></th>
                            <th class="aa-th--campaign" data-col-key="campaign">活动<span class="aa-col-resizer" aria-hidden="true"></span></th>
                            <th class="aa-th--group" data-col-key="group">组<span class="aa-col-resizer" aria-hidden="true"></span></th>
                            <th class="aa-th--status" data-col-key="status">状态<span class="aa-col-resizer" aria-hidden="true"></span></th>
                            <th class="aa-th--ad-type" data-col-key="ad_type">广告类型<span class="aa-col-resizer" aria-hidden="true"></span></th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
            initAdTableColResize();
            applyAdTableColWidths();
            scheduleSyncAaLeftColumnWidth();
        }

        function loadAdList() {
            return fetch('/api/amazon-ad-adjustment?action=ad-search')
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        adItemsRaw = [];
                        adItems = [];
                        renderAdList();
                        return;
                    }
                    adItemsRaw = data.items || [];
                    applyAdListFiltersAndRender();
                })
                .catch(() => {
                    adItemsRaw = [];
                    adItems = [];
                    renderAdList();
                });
        }

        function renderOperationOptions(selectedId) {
            const opSelect = document.getElementById('operationType');
            const current = String(selectedId || '');
            opSelect.innerHTML = '<option value="">请选择操作类型</option>';
            allowedOperations.forEach(op => {
                if (String(op.name || '').trim() === '【新建】') return;
                const option = document.createElement('option');
                option.value = op.id;
                option.textContent = op.name || `操作${op.id}`;
                if (current && String(op.id) === current) option.selected = true;
                opSelect.appendChild(option);
            });
            if (window.refreshUniversalSingleSelect) window.refreshUniversalSingleSelect(opSelect);
            syncReasonOptions();
        }

        function syncReasonOptions() {
            const opId = String(document.getElementById('operationType').value || '');
            const reasonSelect = document.getElementById('operationReason');
            reasonSelect.innerHTML = '<option value="">请选择修改原因</option>';
            const op = allowedOperations.find(item => String(item.id) === opId);
            const reasons = op ? (op.reasons || []) : [];
            reasons.forEach(reason => {
                const option = document.createElement('option');
                option.value = reason.id;
                option.textContent = reason.reason_name || `原因${reason.id}`;
                reasonSelect.appendChild(option);
            });
            if (window.refreshUniversalSingleSelect) window.refreshUniversalSingleSelect(reasonSelect);
            updateSubmitButtonState();
        }

        function listItemToAdInfo(item) {
            if (!item) {
                return { ad_type_text: '-', portfolio_name: '-', campaign_name: '-', group_name: '-' };
            }
            const level = String(item.ad_level || 'campaign');
            if (level === 'portfolio') {
                return {
                    ad_type_text: item.ad_type_text || '-',
                    portfolio_name: item.ad_name || item.portfolio_name || '-',
                    campaign_name: '-',
                    group_name: '-',
                };
            }
            if (level === 'group') {
                return {
                    ad_type_text: item.ad_type_text || '-',
                    portfolio_name: item.portfolio_name || '-',
                    campaign_name: item.campaign_name || '-',
                    group_name: item.ad_name || '-',
                };
            }
            return {
                ad_type_text: item.ad_type_text || '-',
                portfolio_name: item.portfolio_name || '-',
                campaign_name: item.ad_name || '-',
                group_name: '-',
            };
        }

        function updateInfoPanel(adInfo) {
            const info = adInfo || {};
            document.getElementById('infoAdType').innerText = info.ad_type_text || '-';
            document.getElementById('infoPortfolio').innerText = info.portfolio_name || '-';
            document.getElementById('infoCampaign').innerText = info.campaign_name || '-';
            document.getElementById('infoGroup').innerText = info.group_name || '-';
        }

        function setFieldValue(id, value) {
            const input = document.getElementById(id);
            if (!input) return;
            input.value = value || '';
        }

        function selectAd(adId) {
            selectedAdId = String(adId || '');
            selectedAd = adItems.find(item => String(item.id) === selectedAdId) || null;
            highlightSelectedAdRow();
            updateInfoPanel(selectedAd ? listItemToAdInfo(selectedAd) : null);
            updateRecordsLink();
            loadAdjustmentPeriodList();
            fetch(`/api/amazon-ad-adjustment?action=defaults&ad_item_id=${encodeURIComponent(selectedAdId)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        aaToast(data.message || '加载默认信息失败', true);
                        return;
                    }
                    const adInfo = data.ad_info || {};
                    updateInfoPanel(adInfo);
                    allowedOperations = data.allowed_operations || [];
                    renderOperationOptions('');
                    const defaults = data.defaults || {};
                    setFieldValue('adjustDate', toDatetimeLocal(defaults.adjust_date));
                    setFieldValue('startTime', toDatetimeLocal(defaults.start_time));
                    setFieldValue('endTime', toDatetimeLocal(defaults.end_time));
                    setFieldValue('targetObject', '');
                    setFieldValue('beforeValue', '');
                    setFieldValue('afterValue', '');
                    setFieldValue('impressions', '');
                    setFieldValue('clicks', '');
                    setFieldValue('cost', '');
                    setFieldValue('orders', '');
                    setFieldValue('sales', '');
                    setFieldValue('acos', '');
                    setFieldValue('cpc', '');
                    setFieldValue('ctr', '');
                    setFieldValue('cvr', '');
                    setFieldValue('topOfSearchIs', '');
                    setFieldValue('attributionOrders', '');
                    setFieldValue('attributionSales', '');
                    setFieldValue('remark', '');
                    setAttributionChecked(false);
                    updateSubmitButtonState();
                })
                .catch(err => aaToast('加载默认信息失败: ' + err, true));
        }

        function buildPayload(isQuickSubmit) {
            return {
                is_quick_submit: isQuickSubmit ? 1 : 0,
                ad_item_id: selectedAdId,
                operation_type_id: document.getElementById('operationType').value,
                reason_id: document.getElementById('operationReason').value,
                target_object: document.getElementById('targetObject').value.trim(),
                before_value: document.getElementById('beforeValue').value.trim(),
                after_value: document.getElementById('afterValue').value.trim(),
                adjust_date: document.getElementById('adjustDate').value,
                start_time: document.getElementById('startTime').value,
                end_time: document.getElementById('endTime').value,
                impressions: document.getElementById('impressions').value.trim(),
                clicks: document.getElementById('clicks').value.trim(),
                cost: document.getElementById('cost').value.trim(),
                orders: document.getElementById('orders').value.trim(),
                sales: document.getElementById('sales').value.trim(),
                acos: document.getElementById('acos').value.trim(),
                cpc: document.getElementById('cpc').value.trim(),
                ctr: document.getElementById('ctr').value.trim(),
                cvr: document.getElementById('cvr').value.trim(),
                top_of_search_is: document.getElementById('topOfSearchIs').value.trim(),
                attribution_checked: getAttributionCheckedValue(),
                attribution_orders: document.getElementById('attributionOrders').value.trim(),
                attribution_sales: document.getElementById('attributionSales').value.trim(),
                remark: document.getElementById('remark').value.trim()
            };
        }

        function canSubmitPhase1() {
            return validatePhase1().length === 0;
        }

        function updateSubmitButtonState() {
            const ok = canSubmitPhase1();
            document.getElementById('submitBtn').disabled = !ok;
            document.getElementById('quickSubmitBtn').disabled = !ok;
        }

        function postRecord(isQuickSubmit, onSuccess) {
            const payload = buildPayload(isQuickSubmit);
            const btn = isQuickSubmit ? document.getElementById('quickSubmitBtn') : document.getElementById('submitBtn');
            if (btn) btn.disabled = true;
            fetch('/api/amazon-ad-adjustment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    aaToast(data.message || '提交失败', true);
                    return;
                }
                aaToast(isQuickSubmit ? '快速提交成功' : '提交并记录成功', false);
                if (typeof onSuccess === 'function') onSuccess();
                updateRecordsLink();
                loadAdjustmentPeriodList();
                if (selectedAdId) {
                    fetch(`/api/amazon-ad-adjustment?action=defaults&ad_item_id=${encodeURIComponent(selectedAdId)}`)
                        .then(r => r.json())
                        .then(d => {
                            if (d.status === 'success' && d.defaults) {
                                setFieldValue('startTime', toDatetimeLocal(d.defaults.start_time));
                                setFieldValue('endTime', toDatetimeLocal(d.defaults.end_time));
                                setFieldValue('adjustDate', toDatetimeLocal(d.defaults.adjust_date));
                            }
                        });
                }
            })
            .catch(err => aaToast('提交失败: ' + err, true))
            .finally(() => updateSubmitButtonState());
        }

        function submitRecord() {
            const errs = validatePhase1();
            if (errs.length) {
                aaToast(errs[0], true);
                return;
            }
            openFullSubmitModal();
        }

        function confirmFullSubmit() {
            const phase1 = validatePhase1();
            if (phase1.length) {
                aaToast(phase1[0], true);
                closeFullSubmitModal();
                return;
            }
            const phase2 = validatePhase2();
            if (phase2.length) {
                aaToast(phase2[0], true);
                return;
            }
            postRecord(false, closeFullSubmitModal);
        }

        function quickSubmit() {
            const errs = validatePhase1();
            if (errs.length) {
                aaToast(errs[0], true);
                return;
            }
            postRecord(true);
        }

        function updateRecordsLink() {
            const link = document.getElementById('aaRecordsLink');
            if (!link) return;
            if (selectedAdId) {
                link.href = `/amazon-ad-adjustment-records-management?ad_item_id=${encodeURIComponent(selectedAdId)}`;
                link.style.display = '';
            } else {
                link.href = '/amazon-ad-adjustment-records-management';
                link.style.display = 'none';
            }
        }

        document.getElementById('operationType').addEventListener('change', syncReasonOptions);
        document.getElementById('adUploadInput').addEventListener('change', function(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            uploadAdTemplateFromAdjustment(file);
        });
        ['targetObject', 'beforeValue', 'afterValue', 'operationReason'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('input', updateSubmitButtonState);
            el.addEventListener('change', updateSubmitButtonState);
        });

        document.getElementById('adSearchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadAdList();
        });

        window.addEventListener('resize', () => scheduleSyncAaLeftColumnWidth());
        window.addEventListener('DOMContentLoaded', () => {
            if (window.initUniversalSingleSelects) window.initUniversalSingleSelects(document);
            bindAdListRowEvents();
            initAdSearchPrefs();
            initAdjustmentMetricAutoCalc();
            initAttributionCheckedSegment();
            if (window.AmazonAdFormModal) {
                window.AmazonAdFormModal.init({
                    onSaveSuccess: (data) => {
                        const newId = data && (data.item?.id || data.id);
                        return loadAdList().then(() => {
                            if (newId) selectAd(newId);
                        });
                    },
                    showSuccessToast: (msg) => aaToast(msg || '保存成功', false),
                });
            }
            loadAdList();
            updateRecordsLink();
            const fullModal = document.getElementById('aaFullSubmitModal');
            if (fullModal && typeof window.bindPmModalBackdropClose === 'function') {
                window.bindPmModalBackdropClose(fullModal, closeFullSubmitModal);
            }
        });
    </script>

    <script src="/static/js/header.js"></script>
    <script src="/static/js/amazon_ad_form_modal.js"></script>
</body>
</html>
