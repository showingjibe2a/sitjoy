<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品类/货号管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>品类/货号管理</h2>
            <p>维护品类字典与货号（父体）信息</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin: 0;">
                            <span class="pm-search-title">货号搜索</span>
                            <input type="text" id="searchInput" placeholder="搜索货号/品类">
                            <button class="btn-primary" onclick="loadSkuList()">搜索</button>
                            <button class="btn-secondary" onclick="resetSearch()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-accent" onclick="openCreateModal()">新增货号</button>
                    </div>
                </div>

                <div class="pm-card-rail" aria-label="品类筛选">
                    <div class="pm-card-sub">
                        <span class="pm-card-sub__title" title="品类管理">品类</span>
                        <div class="sj-option-bar material-type-bar" id="categoryTypeBar"></div>
                    </div>
                </div>
            </div>

            <div>
                <table class="pm-table" id="skuTable">
                    <thead>
                        <tr>
                            <th>货号（父体）</th>
                            <th>品类</th>
                            <th>佣金大类</th>
                            <th style="width:90px;">在市状态</th>
                            <th>关联面料</th>
                            <th style="width:160px;">创建时间</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="7" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <div class="pm-modal" id="pm-modal">
        <div class="pm-modal-content">
            <h3 id="pm-modal-title" style="margin-top:0;">新增货号</h3>
            <div class="pm-form">
                <div class="form-group">
                    <label for="modalSkuInput">货号（父体）<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalSkuInput" class="required-field" placeholder="不加品类前缀，如：MS01">
                </div>
                <div class="form-group">
                    <label for="modalCategorySelect">品类<span class="required-asterisk">*</span></label>
                    <select id="modalCategorySelect" class="required-field"></select>
                </div>
                <div class="form-group">
                    <label for="modalCommissionGroupSelect">佣金大类<span class="required-asterisk">*</span></label>
                    <select id="modalCommissionGroupSelect" class="required-field"></select>
                </div>
                <div class="form-group">
                    <label>在市状态</label>
                    <div class="status-segment status-segment--inline market-status-segment" id="modalSkuMarketSegment" data-sj-status-segment data-value="1">
                        <button type="button" class="status-pill status-pill--yes is-active" data-value="1">在市</button>
                        <button type="button" class="status-pill status-pill--no" data-value="0">下市</button>
                    </div>
                </div>
                <div class="form-group sj-form-grid-full pm-form-full">
                    <label>关联面料（可多选）</label>
                    <div class="feature-category-picker" id="fabricPicker">
                        <div class="feature-category-chips" id="fabricChips"></div>
                        <div class="feature-category-dropdown" id="fabricDropdown">
                            <button type="button" class="sj-chip-picker-create feature-category-create" id="fabricCreate" title="完全新增面料">新增</button>
                            <button type="button" class="feature-category-add" id="fabricAdd">
                                <span class="feature-category-add-icon">+</span>
                                <span class="feature-category-add-text">添加面料</span>
                            </button>
                            <div class="feature-category-menu" id="fabricMenu">
                                <input type="text" id="modalFabricFilter" placeholder="搜索面料编号/英文名" style="width:100%;padding:0.4rem;border:1px solid #ccc;border-radius:4px;margin-bottom:0.4rem;">
                                <div class="feature-category-list" id="fabricList"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="modalStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-primary" id="modalSaveBtn" onclick="saveSkuFromModal()">保存</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="category-modal">
        <div class="pm-modal-content">
            <h3 id="category-modal-title" style="margin-top:0;">新增品类</h3>
            <div class="pm-form">
                <div class="form-group">
                    <label for="modalCategoryCn">品类中文名<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalCategoryCn" class="required-field" placeholder="例如：餐椅">
                </div>
                <div class="form-group">
                    <label for="modalCategoryEn">品类英文缩写<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalCategoryEn" class="required-field" placeholder="例如：DC">
                </div>
                <div class="form-group">
                    <label for="modalCategoryEnName">品类英文名称<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalCategoryEnName" class="required-field" placeholder="例如：Dining Chair">
                </div>
            </div>
            <div id="categoryModalStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" onclick="closeCategoryModal()">取消</button>
                <button class="btn-primary" onclick="saveCategoryFromModal()">保存</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        // -------------------------------------------------------------------------
        // 品类/货号管理：品类字典、货号 CRUD、面料关联、佣金大类
        // -------------------------------------------------------------------------
        let editId = null;
        let categoryEditId = null;
        let categoryOptions = [];
        let fabricOptions = [];
        let commissionGroupOptions = [];
        const COMMISSION_GROUP_DEFAULT = '家具';
        let selectedFabricIds = [];

        // -------------------------------------------------------------------------
        // 状态提示与搜索
        // -------------------------------------------------------------------------

        function showModalStatus(message, isError) {
            const text = String(message || '').trim();
            if (!text) return;
            if (window.showPageStatus) window.showPageStatus(text, isError);
        }

        function resetModalStatus() {
            const el = document.getElementById('modalStatus');
            el.style.display = 'none';
            el.innerText = '';
        }

        function showCategoryStatus(message, isError) {
            const text = String(message || '').trim();
            if (!text) return;
            if (window.showPageStatus) window.showPageStatus(text, isError);
        }

        function resetCategoryStatus() {
            const el = document.getElementById('categoryModalStatus');
            el.style.display = 'none';
            el.innerText = '';
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            loadSkuList();
        }

        function getModalSkuMarketValue() {
            return Number(SitjoyPageUI.getStatusSegmentValue('#modalSkuMarketSegment')) ? 1 : 0;
        }

        function setModalSkuMarketValue(value) {
            SitjoyPageUI.setStatusSegmentValue('#modalSkuMarketSegment', Number(value) ? '1' : '0');
        }

        function bindModalSkuMarketSegment() {
            SitjoyPageUI.bindStatusSegment('#modalSkuMarketSegment');
        }

        // -------------------------------------------------------------------------
        // 货号模态框 CRUD
        // -------------------------------------------------------------------------

        function openCreateModal() {
            editId = null;
            document.getElementById('pm-modal-title').innerText = '新增货号';
            document.getElementById('modalSkuInput').value = '';
            setCategorySelect('');
            setCommissionGroupSelect(COMMISSION_GROUP_DEFAULT);
            setFabricSelect([]);
            setModalSkuMarketValue(1);
            document.getElementById('modalSaveBtn').innerText = '保存';
            resetModalStatus();
            document.getElementById('pm-modal').classList.add('active');
            document.getElementById('modalSkuInput').focus();
        }

        function openEditModal(item) {
            editId = item.id;
            document.getElementById('pm-modal-title').innerText = '编辑货号';
            document.getElementById('modalSkuInput').value = item.sku_family;
            setCategorySelect(item.category);
            setCommissionGroupSelect(item.commission_group || COMMISSION_GROUP_DEFAULT);
            setFabricSelect(item.fabric_ids || []);
            setModalSkuMarketValue(item.is_on_market);
            document.getElementById('modalSaveBtn').innerText = '保存';
            resetModalStatus();
            document.getElementById('pm-modal').classList.add('active');
            document.getElementById('modalSkuInput').focus();
        }

        function closeModal() {
            document.getElementById('pm-modal').classList.remove('active');
            editId = null;
        }

        async function saveSkuFromModal() {
            const skuFamily = document.getElementById('modalSkuInput').value.trim();
            const category = document.getElementById('modalCategorySelect').value.trim();
            const commissionGroup = document.getElementById('modalCommissionGroupSelect').value.trim();
            if (!skuFamily || !category || !commissionGroup) {
                showModalStatus('请填写货号、品类与佣金大类', true);
                return;
            }

            const payload = {
                sku_family: skuFamily,
                category: category,
                commission_group: commissionGroup,
                fabric_ids: selectedFabricIds.slice(),
                is_on_market: getModalSkuMarketValue(),
            };
            let method = 'POST';
            if (editId) {
                payload.id = editId;
                method = 'PUT';
            }

            if (typeof window.showAppUploadProgress === 'function') {
                window.showAppUploadProgress({
                    title: method === 'POST' ? '正在创建货号…' : '正在保存…',
                    summary: '创建 Listing 目录并写入数据库',
                    percent: 15,
                });
            }
            try {
                const r = await fetch('/api/sku', {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await r.json();
                if (typeof window.showAppUploadProgress === 'function') {
                    window.showAppUploadProgress({
                        title: '即将完成…',
                        summary: '',
                        percent: 88,
                    });
                }
                if (data.status === 'success') {
                    showModalStatus(editId ? '更新成功' : '新增成功', false);
                    setTimeout(() => {
                        closeModal();
                        loadSkuList();
                    }, 400);
                } else {
                    showModalStatus(data.message || '操作失败', true);
                }
            } catch (err) {
                showModalStatus('请求失败: ' + err, true);
            } finally {
                if (typeof window.hideAppUploadProgress === 'function') {
                    window.hideAppUploadProgress();
                }
            }
        }

        async function deleteSku(id) {
            const ok = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({ title: '删除确认', message: '确认删除该货号？', confirmText: '确认删除' })
                : false;
            if (!ok) return;
            fetch('/api/sku', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    loadSkuList();
                    window.showAppSaveResult({ action: 'delete' });
                } else {
                    window.showAppSaveResult({ action: 'delete', isError: true, message: data.message || '删除失败' });
                }
            })
            .catch(err => {
                window.showAppSaveResult({ action: 'delete', isError: true, message: '请求失败: ' + err });
            });
        }

        // -------------------------------------------------------------------------
        // 货号列表与面料选择器
        // -------------------------------------------------------------------------

        function loadSkuList() {
            const q = document.getElementById('searchInput').value.trim();
            const base = q ? `/api/sku?q=${encodeURIComponent(q)}` : '/api/sku';
            const url = base + (base.includes('?') ? '&' : '?') + 'include_off_market=1';
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.querySelector('#skuTable tbody');
                    if (data.status !== 'success') {
                        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#a33;">${data.message || '加载失败'}</td></tr>`;
                        return;
                    }
                    const items = data.items || [];
                    if (items.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">暂无数据</td></tr>';
                        return;
                    }
                    tbody.innerHTML = items.map(item => {
                        const dateText = item.created_at ? new Date(item.created_at).toLocaleString('zh-CN') : '';
                        const onMarket = Number(item.is_on_market) ? 1 : 0;
                        const marketText = onMarket ? '在市' : '<span class="sj-text-negative sku-market-off">下市</span>';
                        return `
                            <tr>
                                <td>${item.sku_family}</td>
                                <td>${item.category}</td>
                                <td>${item.commission_group || COMMISSION_GROUP_DEFAULT}</td>
                                <td>${marketText}</td>
                                <td>${item.fabric_codes || '-'}</td>
                                <td>${dateText}</td>
                                <td>
                                    <div class="pm-actions">
                                        <button class="btn-secondary" onclick='openEditModal(${JSON.stringify(item)})'>编辑</button>
                                        <button class="btn-danger" onclick='deleteSku(${item.id})'>删除</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('');
                })
                .catch(err => {
                    const tbody = document.querySelector('#skuTable tbody');
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#a33;">加载失败: ${err}</td></tr>`;
                });
        }

        function loadFabrics() {
            return fetch('/api/fabric')
                .then(r => r.json())
                .then(data => {
                    fabricOptions = data.status === 'success' ? (data.items || []) : [];
                    renderFabricPicker();
                })
                .catch(() => {
                    fabricOptions = [];
                    renderFabricPicker();
                });
        }

        function renderFabricPicker() {
            const chips = document.getElementById('fabricChips');
            const list = document.getElementById('fabricList');
            if (!chips || !list) return;
            const keyword = (document.getElementById('modalFabricFilter')?.value || '').trim().toLowerCase();

            chips.innerHTML = '';
            selectedFabricIds.forEach(id => {
                const item = fabricOptions.find(opt => String(opt.id) === String(id));
                if (!item) return;
                const chip = document.createElement('span');
                chip.className = 'feature-category-chip';
                chip.textContent = `${item.fabric_code || ''}${item.fabric_name_en ? ` - ${item.fabric_name_en}` : ''}`;
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'feature-category-remove';
                removeBtn.innerText = '×';
                removeBtn.addEventListener('click', () => {
                    selectedFabricIds = selectedFabricIds.filter(v => String(v) !== String(id));
                    renderFabricPicker();
                });
                chip.appendChild(removeBtn);
                chips.appendChild(chip);
            });

            list.innerHTML = '';
            const filtered = (fabricOptions || []).filter(item => {
                if (selectedFabricIds.includes(String(item.id))) return false;
                const text = `${item.fabric_code || ''} ${item.fabric_name_en || ''}`.toLowerCase();
                return !keyword || text.includes(keyword);
            });

            if (!filtered.length) {
                const empty = document.createElement('div');
                empty.className = 'feature-category-empty';
                empty.textContent = '无更多可选面料';
                list.appendChild(empty);
                return;
            }

            filtered.forEach(item => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'feature-category-option';
                btn.textContent = `${item.fabric_code || ''}${item.fabric_name_en ? ` - ${item.fabric_name_en}` : ''}`;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!selectedFabricIds.includes(String(item.id))) {
                        selectedFabricIds.push(String(item.id));
                    }
                    renderFabricPicker();
                });
                list.appendChild(btn);
            });
        }

        function setFabricSelect(value) {
            selectedFabricIds = Array.isArray(value) ? value.map(v => String(v)) : [];
            renderFabricPicker();
        }

        function toggleFabricMenu() {
            const dropdown = document.getElementById('fabricDropdown');
            if (!dropdown) return;
            const isOpen = dropdown.classList.contains('open');
            if (isOpen) {
                closeFabricMenu();
                return;
            }
            dropdown.classList.add('expanded');
            window.setTimeout(() => {
                dropdown.classList.add('open');
            }, 180);
        }

        function closeFabricMenu() {
            const dropdown = document.getElementById('fabricDropdown');
            if (!dropdown) return;
            dropdown.classList.remove('open');
            dropdown.classList.remove('expanded');
        }

        function openFabricCreatePopup() {
            window.open('/fabric-management?openCreate=1&source=product-management', '_blank', 'width=1280,height=900');
        }

        function handleFabricCreatedMessage(payload) {
            const item = payload && payload.fabric ? payload.fabric : payload;
            const newId = item && item.id ? String(item.id) : '';
            const fallbackCode = (item && item.fabric_code ? String(item.fabric_code) : '').trim();
            loadFabrics().then(() => {
                let resolvedId = newId;
                if (!resolvedId && fallbackCode) {
                    const found = (fabricOptions || []).find(x => String(x.fabric_code || '').trim() === fallbackCode);
                    resolvedId = found ? String(found.id) : '';
                }
                if (resolvedId && !selectedFabricIds.includes(resolvedId)) {
                    selectedFabricIds.push(resolvedId);
                    renderFabricPicker();
                    showModalStatus('已自动加入新建面料', false);
                }
            });
        }

        // -------------------------------------------------------------------------
        // 品类与佣金大类选项
        // -------------------------------------------------------------------------

        function renderCommissionGroupSelect(selectedValue) {
            const select = document.getElementById('modalCommissionGroupSelect');
            if (!select) return;
            const options = (commissionGroupOptions || []).slice();
            select.innerHTML = '';
            if (!options.length) {
                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.textContent = '暂无佣金大类，请先维护佣金规则';
                select.appendChild(placeholder);
                return;
            }
            options.forEach((grp) => {
                const option = document.createElement('option');
                option.value = grp;
                option.textContent = grp;
                if (selectedValue && selectedValue === grp) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
            if (!selectedValue && options.includes(COMMISSION_GROUP_DEFAULT)) {
                select.value = COMMISSION_GROUP_DEFAULT;
            } else if (!selectedValue && options.length) {
                select.value = options[0];
            }
        }

        function setCommissionGroupSelect(value) {
            renderCommissionGroupSelect(value || COMMISSION_GROUP_DEFAULT);
        }

        function loadCommissionGroups() {
            return fetch('/api/commission-rules')
                .then(r => r.json())
                .then(data => {
                    const groups = (data && data.commission_groups) || [];
                    commissionGroupOptions = Array.isArray(groups)
                        ? groups.map(g => String(g || '').trim()).filter(Boolean)
                        : [];
                    if (!commissionGroupOptions.length) {
                        commissionGroupOptions = [COMMISSION_GROUP_DEFAULT];
                    }
                    renderCommissionGroupSelect(document.getElementById('modalCommissionGroupSelect')?.value || '');
                })
                .catch(() => {
                    commissionGroupOptions = [COMMISSION_GROUP_DEFAULT];
                    renderCommissionGroupSelect('');
                });
        }

        function loadCategories() {
            return fetch('/api/category')
                .then(r => r.json())
                .then(data => {
                    categoryOptions = data.status === 'success' ? (data.items || []) : [];
                    renderCategorySelect('');
                    renderCategoryTypeBar();
                })
                .catch(() => {
                    categoryOptions = [];
                    renderCategorySelect('');
                    renderCategoryTypeBar();
                });
        }

        function renderCategorySelect(selectedValue) {
            const select = document.getElementById('modalCategorySelect');
            const options = categoryOptions.map(item => {
                const value = item.category_cn;
                const label = `${item.category_cn} / ${item.category_en}`;
                return { value, label };
            });
            select.innerHTML = '';

            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = options.length ? '请选择品类' : '暂无品类，请先创建';
            select.appendChild(placeholder);

            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt.value;
                option.textContent = opt.label;
                if (selectedValue && selectedValue === opt.value) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
        }

        function setCategorySelect(value) {
            if (!categoryOptions.length) {
                loadCategories();
            }
            renderCategorySelect(value || '');
        }

        // -------------------------------------------------------------------------
        // 品类 CRUD 与页面启动
        // -------------------------------------------------------------------------

        function renderCategoryTypeBar() {
            const UI = window.SitjoyPageUI;
            if (!UI) return;
            UI.renderOptionBar('#categoryTypeBar', {
                mode: 'pill',
                showAdd: true,
                addAriaLabel: '新增品类',
                onAdd: openCategoryCreateModal,
                items: (categoryOptions || []).map(item => ({
                    id: item.id,
                    label: `${item.category_cn} / ${item.category_en}`,
                    raw: item,
                })),
                onItemClick: (item) => openCategoryEditModalById(item.id),
            });
        }

        function openCategoryCreateModal() {
            categoryEditId = null;
            document.getElementById('category-modal-title').innerText = '新增品类';
            document.getElementById('modalCategoryCn').value = '';
            document.getElementById('modalCategoryEn').value = '';
            document.getElementById('modalCategoryEnName').value = '';
            resetCategoryStatus();
            document.getElementById('category-modal').classList.add('active');
            document.getElementById('modalCategoryCn').focus();
        }

        function openCategoryEditModalById(id) {
            const item = (categoryOptions || []).find(x => String(x.id) === String(id));
            if (!item) return;
            categoryEditId = item.id;
            document.getElementById('category-modal-title').innerText = '编辑品类';
            document.getElementById('modalCategoryCn').value = item.category_cn || '';
            document.getElementById('modalCategoryEn').value = item.category_en || '';
            document.getElementById('modalCategoryEnName').value = item.category_en_name || '';
            resetCategoryStatus();
            document.getElementById('category-modal').classList.add('active');
            document.getElementById('modalCategoryCn').focus();
        }

        function closeCategoryModal() {
            document.getElementById('category-modal').classList.remove('active');
            categoryEditId = null;
        }

        function saveCategoryFromModal() {
            const categoryCn = document.getElementById('modalCategoryCn').value.trim();
            const categoryEn = document.getElementById('modalCategoryEn').value.trim();
            const categoryEnName = document.getElementById('modalCategoryEnName').value.trim();
            if (!categoryCn || !categoryEn || !categoryEnName) {
                showCategoryStatus('请填写中文名、英文缩写与英文名称', true);
                return;
            }

            const payload = { category_cn: categoryCn, category_en: categoryEn, category_en_name: categoryEnName };
            let method = 'POST';
            if (categoryEditId) {
                payload.id = categoryEditId;
                method = 'PUT';
            }

            fetch('/api/category', {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    showCategoryStatus(categoryEditId ? '更新成功' : '新增成功', false);
                    setTimeout(() => {
                        closeCategoryModal();
                        Promise.all([loadCategories(), loadSkuList()]);
                    }, 350);
                } else {
                    showCategoryStatus(data.message || '操作失败', true);
                }
            })
            .catch(err => showCategoryStatus('请求失败: ' + err, true));
        }

        function bootProductManagementPage() {
            const run = () => {
                SitjoyPageUI.init({
                    selects: true,
                    tables: '#skuTable',
                    statusSegments: true,
                    modals: [
                        { el: '#pm-modal', onClose: closeModal },
                        { el: '#category-modal', onClose: closeCategoryModal },
                    ],
                    onReady: () => {
                        loadSkuList();
                        loadCategories();
                        loadCommissionGroups();
                        loadFabrics();
                        bindModalSkuMarketSegment();
                    },
                });
            };
            if (window.SitjoyPageUI) run();
            else document.addEventListener('sitjoy:page-ui-ready', run, { once: true });
        }

        window.addEventListener('load', bootProductManagementPage);
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loadSkuList();
            }
        });
        document.getElementById('modalFabricFilter').addEventListener('input', renderFabricPicker);
        document.getElementById('fabricAdd').addEventListener('click', toggleFabricMenu);
        document.getElementById('fabricCreate').addEventListener('click', function(e) {
            e.stopPropagation();
            openFabricCreatePopup();
        });
        document.addEventListener('click', function(e) {
            const picker = document.getElementById('fabricPicker');
            if (picker && !picker.contains(e.target)) {
                closeFabricMenu();
            }
        });
        window.addEventListener('message', function(e) {
            if (!e || !e.data || e.data.type !== 'fabric-created') return;
            handleFabricCreatedMessage(e.data);
        });
    </script>
</body>
<script src="/static/js/header.js"></script>
</html>
