<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品管理 - 品类/货号管理</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .pm-form-full { grid-column: 1 / -1; }
        .material-type-bar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            padding: 0.5rem 0.7rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.18);
        }
        .material-type-add {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid rgba(155, 74, 74, 0.2);
            background: #9b4a4a;
            color: #fff;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .material-type-item {
            border: 1px solid var(--morandi-sand);
            background: var(--morandi-mist);
            color: var(--morandi-ink);
            border-radius: 8px;
            padding: 0.45rem 0.8rem;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .material-type-item:hover { background: rgba(207, 199, 189, 0.55); }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>品类/货号管理</h2>
            <p>维护品类字典与货号（父体）信息</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin: 0;">
                            <span class="pm-search-title">货号搜索</span>
                            <input type="text" id="searchInput" placeholder="搜索货号/品类">
                            <button class="btn-primary" onclick="loadSkuList()">搜索</button>
                            <button class="btn-secondary" onclick="resetSearch()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-accent" onclick="openCreateModal()">新增货号</button>
                    </div>
                </div>

                <div class="pm-toolbar" style="margin-top: 0.85rem;">
                    <div class="pm-toolbar-actions">
                        <span class="pm-search-title">品类管理</span>
                    </div>
                </div>
                <div class="material-type-bar" id="categoryTypeBar" style="margin-top: 0.6rem;">
                    <button class="material-type-add" type="button" aria-label="新增品类" onclick="openCategoryCreateModal()">+</button>
                </div>
            </div>

            <div>
                <table class="pm-table" id="skuTable">
                    <thead>
                        <tr>
                            <th>货号（父体）</th>
                            <th>品类</th>
                            <th style="width:160px;">创建时间</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <div class="pm-modal" id="pm-modal">
        <div class="pm-modal-content">
            <h3 id="pm-modal-title" style="margin-top:0;">新增货号</h3>
            <div class="pm-form">
                <div class="form-group">
                    <label for="modalSkuInput">货号（父体）<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalSkuInput" class="required-field" placeholder="不加品类前缀，如：MS01">
                </div>
                <div class="form-group">
                    <label for="modalCategorySelect">品类<span class="required-asterisk">*</span></label>
                    <select id="modalCategorySelect" class="required-field"></select>
                </div>
            </div>
            <div id="modalStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-primary" id="modalSaveBtn" onclick="saveSkuFromModal()">保存</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="category-modal">
        <div class="pm-modal-content">
            <h3 id="category-modal-title" style="margin-top:0;">新增品类</h3>
            <div class="pm-form">
                <div class="form-group">
                    <label for="modalCategoryCn">品类中文名<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalCategoryCn" class="required-field" placeholder="例如：餐椅">
                </div>
                <div class="form-group">
                    <label for="modalCategoryEn">品类英文缩写<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalCategoryEn" class="required-field" placeholder="例如：DC">
                </div>
                <div class="form-group">
                    <label for="modalCategoryEnName">品类英文名称<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalCategoryEnName" class="required-field" placeholder="例如：Dining Chair">
                </div>
            </div>
            <div id="categoryModalStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" onclick="closeCategoryModal()">取消</button>
                <button class="btn-primary" onclick="saveCategoryFromModal()">保存</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        let editId = null;
        let categoryEditId = null;
        let categoryOptions = [];

        function showModalStatus(message, isError) {
            const el = document.getElementById('modalStatus');
            el.style.display = 'block';
            el.style.background = isError ? '#ffecec' : '#f0fff0';
            el.style.color = isError ? '#a33' : '#2f6f2f';
            el.innerText = message;
        }

        function resetModalStatus() {
            const el = document.getElementById('modalStatus');
            el.style.display = 'none';
            el.innerText = '';
        }

        function showCategoryStatus(message, isError) {
            const el = document.getElementById('categoryModalStatus');
            el.style.display = 'block';
            el.style.background = isError ? '#ffecec' : '#f0fff0';
            el.style.color = isError ? '#a33' : '#2f6f2f';
            el.innerText = message;
        }

        function resetCategoryStatus() {
            const el = document.getElementById('categoryModalStatus');
            el.style.display = 'none';
            el.innerText = '';
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            loadSkuList();
        }

        function openCreateModal() {
            editId = null;
            document.getElementById('pm-modal-title').innerText = '新增货号';
            document.getElementById('modalSkuInput').value = '';
            setCategorySelect('');
            document.getElementById('modalSaveBtn').innerText = '保存';
            resetModalStatus();
            document.getElementById('pm-modal').classList.add('active');
            document.getElementById('modalSkuInput').focus();
        }

        function openEditModal(item) {
            editId = item.id;
            document.getElementById('pm-modal-title').innerText = '编辑货号';
            document.getElementById('modalSkuInput').value = item.sku_family;
            setCategorySelect(item.category);
            document.getElementById('modalSaveBtn').innerText = '保存';
            resetModalStatus();
            document.getElementById('pm-modal').classList.add('active');
            document.getElementById('modalSkuInput').focus();
        }

        function closeModal() {
            document.getElementById('pm-modal').classList.remove('active');
            editId = null;
        }

        function saveSkuFromModal() {
            const skuFamily = document.getElementById('modalSkuInput').value.trim();
            const category = document.getElementById('modalCategorySelect').value.trim();
            if (!skuFamily || !category) {
                showModalStatus('请填写货号与品类', true);
                return;
            }

            const payload = { sku_family: skuFamily, category: category, fabric_ids: [] };
            let method = 'POST';
            if (editId) {
                payload.id = editId;
                method = 'PUT';
            }

            fetch('/api/sku', {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    showModalStatus(editId ? '更新成功' : '新增成功', false);
                    setTimeout(() => {
                        closeModal();
                        loadSkuList();
                    }, 400);
                } else {
                    showModalStatus(data.message || '操作失败', true);
                }
            })
            .catch(err => showModalStatus('请求失败: ' + err, true));
        }

        function deleteSku(id) {
            if (!confirm('确认删除该货号？')) return;
            fetch('/api/sku', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    loadSkuList();
                } else {
                    alert(data.message || '删除失败');
                }
            })
            .catch(err => alert('请求失败: ' + err));
        }

        function loadSkuList() {
            const q = document.getElementById('searchInput').value.trim();
            const url = q ? `/api/sku?q=${encodeURIComponent(q)}` : '/api/sku';
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.querySelector('#skuTable tbody');
                    if (data.status !== 'success') {
                        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#a33;">${data.message || '加载失败'}</td></tr>`;
                        return;
                    }
                    const items = data.items || [];
                    if (items.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">暂无数据</td></tr>';
                        return;
                    }
                    tbody.innerHTML = items.map(item => {
                        const dateText = item.created_at ? new Date(item.created_at).toLocaleString('zh-CN') : '';
                        return `
                            <tr>
                                <td>${item.sku_family}</td>
                                <td>${item.category}</td>
                                <td>${dateText}</td>
                                <td>
                                    <div class="pm-actions">
                                        <button class="btn-secondary" onclick='openEditModal(${JSON.stringify(item)})'>编辑</button>
                                        <button class="btn-danger" onclick='deleteSku(${item.id})'>删除</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('');
                })
                .catch(err => {
                    const tbody = document.querySelector('#skuTable tbody');
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#a33;">加载失败: ${err}</td></tr>`;
                });
        }

        function loadCategories() {
            return fetch('/api/category')
                .then(r => r.json())
                .then(data => {
                    categoryOptions = data.status === 'success' ? (data.items || []) : [];
                    renderCategorySelect('');
                    renderCategoryTypeBar();
                })
                .catch(() => {
                    categoryOptions = [];
                    renderCategorySelect('');
                    renderCategoryTypeBar();
                });
        }

        function renderCategorySelect(selectedValue) {
            const select = document.getElementById('modalCategorySelect');
            const options = categoryOptions.map(item => {
                const value = item.category_cn;
                const label = `${item.category_cn} / ${item.category_en}`;
                return { value, label };
            });
            select.innerHTML = '';

            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = options.length ? '请选择品类' : '暂无品类，请先创建';
            select.appendChild(placeholder);

            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt.value;
                option.textContent = opt.label;
                if (selectedValue && selectedValue === opt.value) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
        }

        function setCategorySelect(value) {
            if (!categoryOptions.length) {
                loadCategories();
            }
            renderCategorySelect(value || '');
        }

        function renderCategoryTypeBar() {
            const bar = document.getElementById('categoryTypeBar');
            if (!bar) return;
            bar.innerHTML = '';

            const addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'material-type-add';
            addBtn.setAttribute('aria-label', '新增品类');
            addBtn.textContent = '+';
            addBtn.addEventListener('click', openCategoryCreateModal);
            bar.appendChild(addBtn);

            categoryOptions.forEach(item => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'material-type-item';
                btn.textContent = `${item.category_cn} / ${item.category_en}`;
                btn.addEventListener('click', () => openCategoryEditModalById(item.id));
                bar.appendChild(btn);
            });
        }

        function openCategoryCreateModal() {
            categoryEditId = null;
            document.getElementById('category-modal-title').innerText = '新增品类';
            document.getElementById('modalCategoryCn').value = '';
            document.getElementById('modalCategoryEn').value = '';
            document.getElementById('modalCategoryEnName').value = '';
            resetCategoryStatus();
            document.getElementById('category-modal').classList.add('active');
            document.getElementById('modalCategoryCn').focus();
        }

        function openCategoryEditModalById(id) {
            const item = (categoryOptions || []).find(x => String(x.id) === String(id));
            if (!item) return;
            categoryEditId = item.id;
            document.getElementById('category-modal-title').innerText = '编辑品类';
            document.getElementById('modalCategoryCn').value = item.category_cn || '';
            document.getElementById('modalCategoryEn').value = item.category_en || '';
            document.getElementById('modalCategoryEnName').value = item.category_en_name || '';
            resetCategoryStatus();
            document.getElementById('category-modal').classList.add('active');
            document.getElementById('modalCategoryCn').focus();
        }

        function closeCategoryModal() {
            document.getElementById('category-modal').classList.remove('active');
            categoryEditId = null;
        }

        function saveCategoryFromModal() {
            const categoryCn = document.getElementById('modalCategoryCn').value.trim();
            const categoryEn = document.getElementById('modalCategoryEn').value.trim();
            const categoryEnName = document.getElementById('modalCategoryEnName').value.trim();
            if (!categoryCn || !categoryEn || !categoryEnName) {
                showCategoryStatus('请填写中文名、英文缩写与英文名称', true);
                return;
            }

            const payload = { category_cn: categoryCn, category_en: categoryEn, category_en_name: categoryEnName };
            let method = 'POST';
            if (categoryEditId) {
                payload.id = categoryEditId;
                method = 'PUT';
            }

            fetch('/api/category', {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    showCategoryStatus(categoryEditId ? '更新成功' : '新增成功', false);
                    setTimeout(() => {
                        closeCategoryModal();
                        Promise.all([loadCategories(), loadSkuList()]);
                    }, 350);
                } else {
                    showCategoryStatus(data.message || '操作失败', true);
                }
            })
            .catch(err => showCategoryStatus('请求失败: ' + err, true));
        }

        window.addEventListener('load', loadSkuList);
        window.addEventListener('load', loadCategories);

        document.getElementById('pm-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        document.getElementById('category-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeCategoryModal();
            }
        });
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loadSkuList();
            }
        });
    </script>
</body>
<script src="/static/js/header.js"></script>
</html>
