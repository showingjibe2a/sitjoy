<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工账号管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>员工账号管理</h2>
            <p>管理员可调整姓名、生日、入职时间、岗位与直属上级；账号密码由管理员创建与管理。</p>
        </section>

        <!-- ------------------------------------------------------------------------- -->
        <!-- 注册审核 -->
        <!-- ------------------------------------------------------------------------- -->
        <section class="card pm-card" id="pendingUsersSection" style="display:none;">
            <div class="pm-toolbar" style="align-items:flex-start;">
                <div>
                    <h3 style="margin:0;color:#2f2f33;">注册审核</h3>
                    <p style="margin:6px 0 0;color:#6b5e4d;font-size:12px;">以下用户已提交注册申请，等待管理员批准后方可登录。</p>
                </div>
            </div>
            <div>
                <table class="pm-table" id="pendingUsersTable">
                    <thead>
                        <tr>
                            <th>账号</th>
                            <th>姓名</th>
                            <th>电话</th>
                            <th>注册时间</th>
                            <th style="width:120px;">管理员</th>
                            <th style="width:120px;">管理员授权</th>
                            <th style="min-width:460px;">页面访问权限</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- ------------------------------------------------------------------------- -->
        <!-- 员工账号列表 -->
        <!-- ------------------------------------------------------------------------- -->
        <section class="card pm-card">
            <div class="pm-toolbar" style="align-items:flex-start;">
                <div>
                    <h3 style="margin:0;color:#2f2f33;">账号列表</h3>
                </div>
                <div class="pm-toolbar-actions">
                    <button class="btn-accent" type="button" id="employeeCreateBtn">新增账号</button>
                </div>
            </div>
            <div>
                <table class="pm-table" id="employeeTable">
                    <thead>
                        <tr>
                            <th>账号</th>
                            <th>姓名</th>
                            <th>电话</th>
                            <th>生日</th>
                            <th>入职时间</th>
                            <th>岗位</th>
                            <th style="width:120px;">管理员</th>
                            <th style="width:120px;">管理员授权</th>
                            <th style="min-width:460px;">页面访问权限</th>
                            <th style="width:240px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="10" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- ------------------------------------------------------------------------- -->
    <!-- 新增 / 编辑账号弹窗 -->
    <!-- ------------------------------------------------------------------------- -->
    <div id="employeeCreateModal" class="pm-modal">
        <div class="pm-modal-content pm-modal-content--wide">
            <button class="modal-close" type="button" aria-label="关闭" onclick="document.getElementById('employeeCreateModal').classList.remove('active')">×</button>
            <div class="pm-modal-scroll">
                <div class="modal-header">
                    <h2>新增账号</h2>
                </div>
                <form id="employeeCreateForm" class="pm-form">
                    <div class="form-group">
                        <label>用户名<span class="required-asterisk">*</span></label>
                        <input type="text" id="employeeUsername" placeholder="例如：lisa" required>
                    </div>
                    <div class="form-group">
                        <label>密码<span class="required-asterisk">*</span></label>
                        <input type="password" id="employeePassword" placeholder="至少6位" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>姓名（可选）</label>
                        <input type="text" id="employeeName" placeholder="例如：李华">
                    </div>
                    <div class="form-group">
                        <label>电话（可选）</label>
                        <input type="text" id="employeePhone" placeholder="可选">
                    </div>
                    <div class="form-group">
                        <label>生日（可选）</label>
                        <input type="date" id="employeeBirthday">
                    </div>
                    <div class="form-group">
                        <label>入职时间（可选）</label>
                        <input type="date" id="employeeHireDate">
                    </div>
                    <div class="form-group">
                        <label>岗位（可选）</label>
                        <input type="text" id="employeeJobTitle" placeholder="例如：运营专员">
                    </div>
                    <div class="form-group">
                        <label>直属上级（可选）</label>
                        <select id="employeeCreateDirectSupervisor" data-universal-no-search="1">
                            <option value="">无</option>
                        </select>
                    </div>
                    <div class="form-group pm-form-full">
                        <div class="permission-panel">
                            <h4 class="permission-panel-title">权限设置</h4>
                            <div id="employeeCreatePermissionEditor"></div>
                        </div>
                    </div>
                </form>
                <div id="employeeCreateHint" class="response" style="display:none; margin-top:0.75rem;"></div>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="document.getElementById('employeeCreateModal').classList.remove('active')">取消</button>
                <button class="btn-primary" type="submit" form="employeeCreateForm">保存</button>
            </div>
        </div>
    </div>

    <div id="employeeEditModal" class="pm-modal">
        <div class="pm-modal-content pm-modal-content--wide">
            <button class="modal-close" type="button" aria-label="关闭" onclick="document.getElementById('employeeEditModal').classList.remove('active')">×</button>
            <div class="pm-modal-scroll">
                <div class="modal-header">
                    <h2>编辑账号资料</h2>
                </div>
                <form id="employeeEditForm" class="pm-form">
                    <input type="hidden" id="employeeEditId">
                    <div class="form-group">
                        <label>账号</label>
                        <input type="text" id="employeeEditUsername" required>
                    </div>
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="employeeEditName">
                    </div>
                    <div class="form-group">
                        <label>生日</label>
                        <input type="date" id="employeeEditBirthday">
                    </div>
                    <div class="form-group">
                        <label>入职时间</label>
                        <input type="date" id="employeeEditHireDate">
                    </div>
                    <div class="form-group">
                        <label>岗位</label>
                        <input type="text" id="employeeEditJobTitle">
                    </div>
                    <div class="form-group">
                        <label>直属上级</label>
                        <select id="employeeEditDirectSupervisor" data-universal-no-search="1">
                            <option value="">无</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>电话</label>
                        <input type="text" id="employeeEditPhone">
                    </div>
                    <div class="form-group pm-form-full">
                        <div class="permission-panel">
                            <h4 class="permission-panel-title">权限设置</h4>
                            <div id="employeeEditPermissionEditor"></div>
                        </div>
                    </div>
                    <div class="form-group pm-form-full">
                        <div class="permission-panel">
                            <h4 class="permission-panel-title">工厂数据范围</h4>
                            <div class="form-group" style="margin:0;">
                                <label>范围模式</label>
                                <select id="employeeEditFactoryScopeMode" data-universal-no-search="1">
                                    <option value="all">全部工厂（默认）</option>
                                    <option value="custom">仅选定工厂</option>
                                </select>
                            </div>
                            <div id="employeeEditFactoryScopeCustomWrap" class="feature-category-picker is-multi-check" style="display:none;">
                                <div class="feature-category-chips" id="employeeEditFactoryScopeSelected"></div>
                                <div class="feature-category-dropdown" id="employeeEditFactoryScopeDropdown">
                                    <button type="button" class="feature-category-add" id="employeeEditFactoryScopeToggle">
                                        <span class="feature-category-add-icon">+</span>
                                        <span class="feature-category-add-text">选择工厂</span>
                                    </button>
                                    <div class="feature-category-menu" id="employeeEditFactoryScopeMenu">
                                        <input type="text" id="employeeEditFactoryScopeSearch" class="universal-select-search" placeholder="搜索工厂">
                                        <div class="feature-category-list" id="employeeEditFactoryScopeList"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
                <div id="employeeEditHint" class="response" style="display:none; margin-top:0.75rem;"></div>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="document.getElementById('employeeEditModal').classList.remove('active')">取消</button>
                <button class="btn-primary" type="submit" form="employeeEditForm">保存</button>
            </div>
        </div>
    </div>

    <!-- 逻辑见 /static/js/system_employee_management.js -->
    <script src="/static/js/permission_editor.js"></script>
    <script src="/static/js/system_employee_management.js"></script>
    <script src="/static/js/header.js"></script>
</body>
</html>
