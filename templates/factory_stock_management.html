<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工厂在库库存管理</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .preview-savebar {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 5300;
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid rgba(207, 199, 189, 0.9);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
      min-width: min(520px, calc(100vw - 24px));
    }
    .preview-savebar.active { display: flex; }
    .preview-savebar span { flex: 1; color: var(--morandi-ink); font-weight: 700; }
    .preview-savebar .btn-primary,
    .preview-savebar .btn-secondary { padding: 0.65rem 1rem; }
    .preview-edit-input { width: 100%; }
    .preview-edit-cell { padding-left: 0.35rem !important; padding-right: 0.35rem !important; }
  </style>
</head>
<body>
<div id="site-header"></div>
<div class="container">
  <section class="hero" style="margin-bottom:1.5rem;">
    <h2>工厂在库库存管理</h2>
    <p>按下单SKU + 工厂维护在库数量</p>
  </section>

  <section class="pm-layout">
    <div class="card pm-card">
      <div class="pm-toolbar">
        <div class="pm-toolbar-actions">
          <div class="form-group pm-search" style="margin:0;">
            <span class="pm-search-title">搜索</span>
            <input id="searchInput" type="text" placeholder="搜索SKU/工厂名称">
            <button class="btn-primary" onclick="loadList()">搜索</button>
            <button class="btn-secondary" onclick="resetSearch()">清空</button>
          </div>
          <span class="pm-divider"></span>
          <button class="btn-accent" onclick="openCreateModal()">新增</button>
          <button class="btn-secondary" onclick="downloadTemplate()">下载模板</button>
          <button class="btn-secondary" onclick="triggerImport()">上传模板</button>
          <input id="importFileInput" type="file" accept=".xlsx,.xlsm" style="display:none;">
        </div>
      </div>
    </div>

    <div>
      <table class="pm-table" id="mainTable">
        <thead>
          <tr>
            <th style="width:54px; text-align:center;"><input type="checkbox" id="stockSelectAll"></th>
            <th>SKU</th>
            <th>工厂</th>
            <th style="width:120px;">数量</th>
            <th>备注</th>
            <th style="width:180px;">更新时间</th>
            <th style="width:160px;">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="7" style="text-align:center;">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</div>

<div class="pm-modal" id="pm-modal">
  <div class="pm-modal-content">
    <h3 id="pm-modal-title" style="margin-top:0;">新增工厂在库库存</h3>
    <div class="pm-form">
      <div class="form-group">
        <label for="modalOrderProduct">下单SKU<span class="required-asterisk">*</span></label>
        <select id="modalOrderProduct"></select>
      </div>
      <div class="form-group">
        <label for="modalFactory">工厂<span class="required-asterisk">*</span></label>
        <select id="modalFactory"></select>
      </div>
      <div class="form-group">
        <label for="modalQuantity">数量<span class="required-asterisk">*</span></label>
        <input id="modalQuantity" type="number" min="0" step="1" value="0">
      </div>
      <div class="form-group pm-form-full">
        <label for="modalNotes">备注</label>
        <textarea id="modalNotes" rows="3" placeholder="可选"></textarea>
      </div>
    </div>
    <div id="modalStatus" class="response" style="display:none;margin-top:.75rem;"></div>
    <div class="pm-modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveFromModal()">保存</button>
    </div>
  </div>
</div>

<footer><p>&copy; 2026 SITJOY | 内部使用</p></footer>

<div id="factoryStockSaveBar" class="preview-savebar" aria-live="polite">
  <span id="factoryStockSaveText">已修改 0 条预览数据</span>
  <button type="button" class="btn-secondary" onclick="cancelFactoryStockEdits()">取消修改</button>
  <button type="button" class="btn-primary" onclick="saveFactoryStockEdits()">统一保存</button>
</div>

<script>
let editId = null;
let optionsLoaded = false;
let optionFactories = [];
let optionOrderProducts = [];
let optionLinks = [];
let skuFactoryMap = new Map();
let factorySkuMap = new Map();
let listCache = [];
let selectedStockIds = new Set();
let factoryStockEditDraft = {};

const $ = (s) => document.querySelector(s);

function showModalStatus(message, isError){
  const el = $('#modalStatus');
  el.style.display = 'block';
  el.style.background = isError ? '#ffecec' : '#f0fff0';
  el.style.color = isError ? '#a33' : '#2f6f2f';
  el.textContent = message;
}

function fillSelect(id, items, valueKey, textKey, placeholder){
  const el = document.getElementById(id);
  if(!el) return;
  el.innerHTML = `<option value="">${placeholder || '请选择'}</option>` + (items || []).map(item => `
    <option value="${item[valueKey]}">${item[textKey] || ''}</option>
  `).join('');
  if(window.refreshUniversalSingleSelect) window.refreshUniversalSingleSelect(el);
}

function rebuildOptionLinkMaps(){
  skuFactoryMap = new Map();
  factorySkuMap = new Map();
  (optionLinks || []).forEach(link => {
    const opId = Number(link.order_product_id || 0);
    const factoryId = Number(link.factory_id || 0);
    if(!opId || !factoryId) return;
    if(!skuFactoryMap.has(opId)) skuFactoryMap.set(opId, new Set());
    if(!factorySkuMap.has(factoryId)) factorySkuMap.set(factoryId, new Set());
    skuFactoryMap.get(opId).add(factoryId);
    factorySkuMap.get(factoryId).add(opId);
  });
}

function syncStockModalLinkedOptions(){
  const skuSelect = document.getElementById('modalOrderProduct');
  const factorySelect = document.getElementById('modalFactory');
  if(!skuSelect || !factorySelect) return;

  const selectedSkuId = Number(skuSelect.value || 0);
  const selectedFactoryId = Number(factorySelect.value || 0);

  let factories = optionFactories.slice();
  if(selectedSkuId){
    const allowedFactoryIds = skuFactoryMap.get(selectedSkuId) || new Set();
    factories = optionFactories.filter(item => allowedFactoryIds.has(Number(item.id || 0)));
  }

  let skus = optionOrderProducts.slice();
  if(selectedFactoryId){
    const allowedSkuIds = factorySkuMap.get(selectedFactoryId) || new Set();
    skus = optionOrderProducts.filter(item => allowedSkuIds.has(Number(item.id || 0)));
  }

  fillSelect('modalFactory', factories, 'id', 'factory_name', '请选择工厂');
  fillSelect('modalOrderProduct', skus, 'id', 'sku', '请选择下单SKU');

  if(selectedFactoryId && factories.some(item => Number(item.id || 0) === selectedFactoryId)){
    factorySelect.value = String(selectedFactoryId);
  } else {
    factorySelect.value = '';
  }

  if(selectedSkuId && skus.some(item => Number(item.id || 0) === selectedSkuId)){
    skuSelect.value = String(selectedSkuId);
  } else {
    skuSelect.value = '';
  }

  if(window.refreshUniversalSingleSelect){
    window.refreshUniversalSingleSelect(factorySelect);
    window.refreshUniversalSingleSelect(skuSelect);
  }
}

function formatDateTime(value){
  if(!value) return '';
  const text = String(value);
  return text.includes('T') ? text.replace('T', ' ').slice(0, 19) : text.slice(0, 19);
}

function loadOptions(){
  return fetch('/api/factory-stock?action=options')
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success') throw new Error(d.message || '加载选项失败');
      optionFactories = d.factories || [];
      optionOrderProducts = d.order_products || [];
      optionLinks = d.links || [];
      rebuildOptionLinkMaps();
      fillSelect('modalFactory', optionFactories, 'id', 'factory_name', '请选择工厂');
      fillSelect('modalOrderProduct', optionOrderProducts, 'id', 'sku', '请选择下单SKU');
      optionsLoaded = true;
    });
}

function downloadTemplate(){
  const ids = Array.from(selectedStockIds).map(v => Number(v)).filter(v => v > 0);
  const query = ids.length ? `?ids=${encodeURIComponent(ids.join(','))}` : '';
  window.location.href = `/api/factory-stock-template${query}`;
}

function bindRowSelectionEvents(){
  document.querySelectorAll('.stock-row-checkbox').forEach(el => {
    el.addEventListener('change', function(){
      const id = Number(this.getAttribute('data-id') || 0);
      if(!id) return;
      if(this.checked) selectedStockIds.add(id);
      else selectedStockIds.delete(id);
      syncStockSelectAll();
    });
  });
}

function getStockSelectAllCheckboxes(){
  return Array.from(document.querySelectorAll('input#stockSelectAll'));
}

function syncStockSelectAll(){
  const masters = getStockSelectAllCheckboxes();
  const rows = Array.from(document.querySelectorAll('.stock-row-checkbox'));
  if(!masters.length) return;
  if(!rows.length){
    masters.forEach(master => {
      master.checked = false;
      master.indeterminate = false;
    });
    return;
  }
  const checkedCount = rows.filter(r => r.checked).length;
  const allChecked = checkedCount === rows.length;
  const partial = checkedCount > 0 && checkedCount < rows.length;
  masters.forEach(master => {
    master.checked = allChecked;
    master.indeterminate = partial;
  });
}

function toggleStockSelectAll(checked){
  document.querySelectorAll('.stock-row-checkbox').forEach(el => {
    const id = Number(el.getAttribute('data-id') || 0);
    el.checked = !!checked;
    if(!id) return;
    if(checked) selectedStockIds.add(id);
    else selectedStockIds.delete(id);
  });
  syncStockSelectAll();
}

function normalizeStockDraftValue(field, rawValue){
  if(field === 'quantity'){
    const num = parseInt(String(rawValue || '').trim(), 10);
    return Number.isFinite(num) ? Math.max(0, num) : 0;
  }
  return String(rawValue || '').trim();
}

function getStockDraft(itemId){
  return factoryStockEditDraft[String(itemId)] || null;
}

function updateStockDraft(itemId, field, rawValue){
  const item = listCache.find(x => String(x.id) === String(itemId));
  if(!item) return;
  const key = String(itemId);
  const draft = factoryStockEditDraft[key] || {
    quantity: Number(item.quantity || 0),
    notes: item.notes || ''
  };
  draft[field] = normalizeStockDraftValue(field, rawValue);
  const unchanged = normalizeStockDraftValue('quantity', draft.quantity) === normalizeStockDraftValue('quantity', item.quantity)
    && normalizeStockDraftValue('notes', draft.notes) === normalizeStockDraftValue('notes', item.notes);
  if(unchanged){
    delete factoryStockEditDraft[key];
  } else {
    factoryStockEditDraft[key] = draft;
  }
  syncFactoryStockSaveBar();
}

function bindFactoryStockEditEvents(){
  document.querySelectorAll('.stock-edit-field').forEach(el => {
    el.addEventListener('change', function(){
      updateStockDraft(this.getAttribute('data-id'), this.getAttribute('data-field'), this.value);
    });
  });
}

function countFactoryStockEditedRows(){
  return Object.keys(factoryStockEditDraft).length;
}

function syncFactoryStockSaveBar(){
  const bar = document.getElementById('factoryStockSaveBar');
  const text = document.getElementById('factoryStockSaveText');
  if(!bar || !text) return;
  const count = countFactoryStockEditedRows();
  text.textContent = `已修改 ${count} 条预览数据`;
  bar.classList.toggle('active', count > 0);
}

function cancelFactoryStockEdits(){
  factoryStockEditDraft = {};
  renderFactoryStockTable(listCache);
  syncFactoryStockSaveBar();
}

function collectFactoryStockUpdateItems(){
  return Object.keys(factoryStockEditDraft).map(id => ({
    id: Number(id),
    quantity: normalizeStockDraftValue('quantity', factoryStockEditDraft[id].quantity),
    notes: normalizeStockDraftValue('notes', factoryStockEditDraft[id].notes)
  }));
}

function saveFactoryStockEdits(){
  const items = collectFactoryStockUpdateItems();
  if(!items.length){
    syncFactoryStockSaveBar();
    return;
  }
  const bar = document.getElementById('factoryStockSaveBar');
  const saveBtn = bar ? bar.querySelector('.btn-primary') : null;
  if(saveBtn){
    saveBtn.disabled = true;
    saveBtn.textContent = '保存中...';
  }
  fetch('/api/factory-stock?action=bulk_update', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ items })
  })
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success'){
        if(window.showAppToast){ window.showAppToast(d.message || '批量更新失败', true, 3200); }
        if(saveBtn){
          saveBtn.disabled = false;
          saveBtn.textContent = '统一保存';
        }
        return;
      }
      factoryStockEditDraft = {};
      if(window.showAppToast){ window.showAppToast(`批量更新成功：${Number(d.updated || items.length)} 条`, false, 2200); }
      loadList();
      syncFactoryStockSaveBar();
      if(saveBtn){
        saveBtn.disabled = false;
        saveBtn.textContent = '统一保存';
      }
    })
    .catch(err => {
      if(window.showAppToast){ window.showAppToast(err.message || '批量更新失败', true, 3200); }
      if(saveBtn){
        saveBtn.disabled = false;
        saveBtn.textContent = '统一保存';
      }
    });
}

function renderFactoryStockTable(items){
  const tbody = document.querySelector('#mainTable tbody');
  const rows = Array.isArray(items) ? items : [];
  if(!tbody) return;
  if(!rows.length){
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">暂无数据</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(item => {
    const draft = getStockDraft(item.id) || { quantity: Number(item.quantity || 0), notes: item.notes || '' };
    return `
      <tr>
        <td style="text-align:center;"><input type="checkbox" class="stock-row-checkbox" data-id="${item.id}" ${selectedStockIds.has(Number(item.id)) ? 'checked' : ''}></td>
        <td>${item.sku || ''}</td>
        <td>${item.factory_name || ''}</td>
        <td class="preview-edit-cell"><input type="number" min="0" step="1" class="inline-input preview-edit-input stock-edit-field" data-id="${item.id}" data-field="quantity" value="${Number(draft.quantity || 0)}"></td>
        <td class="preview-edit-cell"><input type="text" class="inline-input preview-edit-input stock-edit-field" data-id="${item.id}" data-field="notes" value="${String(draft.notes || '').replace(/"/g, '&quot;')}"></td>
        <td>${formatDateTime(item.updated_at)}</td>
        <td>
          <div class="pm-actions">
            <button class="btn-secondary" onclick="openEditModal(${item.id})">编辑</button>
            <button class="btn-danger" onclick="removeItem(${item.id})">删除</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
  bindRowSelectionEvents();
  bindFactoryStockEditEvents();
  syncStockSelectAll();
}

function triggerImport(){
  const input = document.getElementById('importFileInput');
  if(!input) return;
  input.value = '';
  input.click();
}

function importTemplate(file){
  const form = new FormData();
  form.append('file', file);
  if(window.showAppUploadProgress){
    window.showAppUploadProgress({ title: '正在导入工厂库存模板...', summary: '请稍候', percent: 12 });
  }
  fetch('/api/factory-stock-import', {
    method: 'POST',
    body: form
  })
    .then(r => r.json())
    .then(d => {
      if(window.hideAppUploadProgress){
        window.hideAppUploadProgress();
      }
      if(d.status !== 'success'){
        if(window.showAppResultPanel){
          window.showAppResultPanel({ title: '导入失败', summary: d.message || '导入失败', isError: true });
        }
        if(window.showAppToast){ window.showAppToast(d.message || '导入失败', true, 3200); }
        return;
      }
      const errorCount = Array.isArray(d.errors) ? d.errors.length : 0;
      const summary = `导入完成：新增 ${Number(d.created || 0)}，更新 ${Number(d.updated || 0)}，未变化 ${Number(d.unchanged || 0)}，错误 ${errorCount}`;
      if(errorCount && window.showAppResultPanel){
        window.showAppResultPanel({
          title: '工厂库存导入完成',
          summary,
          details: (d.errors || []).map(item => `${item.row || '-'}: ${item.error || item.message || '校验失败'}`),
          isError: true
        });
      }
      if(window.showAppToast){ window.showAppToast(summary, false, 2600); }
      if(errorCount){
        console.error('导入错误明细:', d.errors);
      }
      loadList();
    })
    .catch(err => {
      if(window.hideAppUploadProgress){
        window.hideAppUploadProgress();
      }
      if(window.showAppResultPanel){
        window.showAppResultPanel({ title: '导入失败', summary: err.message || '导入失败', isError: true });
      }
      if(window.showAppToast){ window.showAppToast(err.message || '导入失败', true, 3200); }
    });
}

function openCreateModal(){
  const open = () => {
    editId = null;
    $('#pm-modal-title').textContent = '新增工厂在库库存';
    $('#modalStatus').style.display = 'none';
    $('#modalOrderProduct').value = '';
    $('#modalFactory').value = '';
    $('#modalQuantity').value = '0';
    $('#modalNotes').value = '';
    $('#modalOrderProduct').disabled = false;
    $('#modalFactory').disabled = false;
    syncStockModalLinkedOptions();
    $('#pm-modal').classList.add('active');
    if(window.refreshUniversalSingleSelect){
      window.refreshUniversalSingleSelect('modalOrderProduct');
      window.refreshUniversalSingleSelect('modalFactory');
    }
  };

  if(optionsLoaded) open();
  else loadOptions().then(open).catch(err => { if(window.showAppToast){ window.showAppToast(err.message || '加载选项失败', true, 3200); } });
}

function openEditModal(id){
  const row = listCache.find(item => Number(item.id) === Number(id));
  if(!row) return;

  const open = () => {
    editId = Number(row.id);
    $('#pm-modal-title').textContent = '编辑工厂在库库存';
    $('#modalStatus').style.display = 'none';
    $('#modalOrderProduct').value = String(row.order_product_id || '');
    $('#modalFactory').value = String(row.factory_id || '');
    $('#modalQuantity').value = String(Number(row.quantity || 0));
    $('#modalNotes').value = row.notes || '';
    $('#modalOrderProduct').disabled = true;
    $('#modalFactory').disabled = true;
    syncStockModalLinkedOptions();
    $('#pm-modal').classList.add('active');
    if(window.refreshUniversalSingleSelect){
      window.refreshUniversalSingleSelect('modalOrderProduct');
      window.refreshUniversalSingleSelect('modalFactory');
    }
  };

  if(optionsLoaded) open();
  else loadOptions().then(open).catch(err => { if(window.showAppToast){ window.showAppToast(err.message || '加载选项失败', true, 3200); } });
}

function closeModal(){
  $('#pm-modal').classList.remove('active');
  editId = null;
}

function saveFromModal(){
  const order_product_id = Number($('#modalOrderProduct').value || 0);
  const factory_id = Number($('#modalFactory').value || 0);
  const quantity = Math.max(0, parseInt($('#modalQuantity').value || '0', 10) || 0);
  const notes = ($('#modalNotes').value || '').trim();

  if(!editId && (!order_product_id || !factory_id)){
    showModalStatus('下单SKU和工厂为必填', true);
    return;
  }

  const payload = editId
    ? { id: editId, quantity, notes }
    : { order_product_id, factory_id, quantity, notes };

  fetch('/api/factory-stock', {
    method: editId ? 'PUT' : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success'){
        showModalStatus(d.message || '保存失败', true);
        return;
      }
      showModalStatus('保存成功', false);
      setTimeout(() => {
        closeModal();
        loadList();
      }, 260);
    })
    .catch(err => showModalStatus(err.message || '保存失败', true));
}

function removeItem(id){
  if(!confirm('确认删除该记录？')) return;
  fetch('/api/factory-stock', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  })
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success'){
        if(window.showAppToast){ window.showAppToast(d.message || '删除失败', true, 3200); }
        return;
      }
      loadList();
    })
    .catch(err => { if(window.showAppToast){ window.showAppToast(err.message || '删除失败', true, 3200); } });
}

function loadList(){
  const q = ($('#searchInput').value || '').trim();
  const url = q ? `/api/factory-stock?q=${encodeURIComponent(q)}` : '/api/factory-stock';
  fetch(url)
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success'){
        const tbody = document.querySelector('#mainTable tbody');
        if(tbody){ tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#a33;">${d.message || '加载失败'}</td></tr>`; }
        selectedStockIds = new Set();
        syncStockSelectAll();
        syncFactoryStockSaveBar();
        return;
      }
      listCache = d.items || [];
      factoryStockEditDraft = Object.fromEntries(Object.entries(factoryStockEditDraft).filter(([id]) => listCache.some(item => String(item.id) === String(id))));
      const availableIds = new Set(listCache.map(item => Number(item.id || 0)).filter(v => v > 0));
      selectedStockIds = new Set(Array.from(selectedStockIds).filter(id => availableIds.has(id)));
      if(!listCache.length){
        const tbody = document.querySelector('#mainTable tbody');
        if(tbody){ tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">暂无数据</td></tr>'; }
        syncStockSelectAll();
        syncFactoryStockSaveBar();
        return;
      }
      renderFactoryStockTable(listCache);
      syncFactoryStockSaveBar();
    })
    .catch(err => {
      const tbody = document.querySelector('#mainTable tbody');
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#a33;">${err.message || '加载失败'}</td></tr>`;
      selectedStockIds = new Set();
      syncStockSelectAll();
      syncFactoryStockSaveBar();
    });
}

function resetSearch(){
  $('#searchInput').value = '';
  loadList();
}

$('#searchInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') loadList();
});
document.addEventListener('change', function(e){
  const target = e.target;
  if(target && target.id === 'stockSelectAll'){
    toggleStockSelectAll(!!target.checked);
  }
});
$('#pm-modal').addEventListener('click', (e) => {
  if(e.target === e.currentTarget) closeModal();
});

document.addEventListener('change', function(e){
  const target = e.target;
  if(target && (target.id === 'modalOrderProduct' || target.id === 'modalFactory')){
    syncStockModalLinkedOptions();
  }
});

window.addEventListener('load', () => {
  const importInput = document.getElementById('importFileInput');
  if(importInput){
    importInput.addEventListener('change', function(){
      const file = this.files && this.files[0];
      if(!file) return;
      importTemplate(file);
    });
  }
  loadOptions().finally(loadList);
});

</script>
</body>
<script src="/static/js/header.js"></script>
</html>
