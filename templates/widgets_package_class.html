<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>包裹归类计算器 - SITJOY</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/widgets.css">
</head>
<body class="widgets-pkg-class-page">
    <div id="site-header"></div>
    <div class="container">
        <section class="card pm-card widgets-pkg-class-card">
            <header class="widgets-pkg-class-head">
                <h2 class="label-help widgets-pkg-class-title">
                    包裹归类计算器
                    <span class="help-dot" data-tip="S≤M≤L 向上取整；G=(M+S)×2。FedEx/UPS 同档：LTL、Oversize、AHS-D、AHS、小件；UPS AHS-D 为 V>8640。Wayfair 体积>10368/17280 升档。"></span>
                </h2>
                <p class="widgets-pkg-class-lead">输入三边与毛重，分别试算 FedEx、UPS、Wayfair CG 归类（下单产品写入 FedEx / UPS / CG 三列）。</p>
            </header>
            <div id="packageClassCalcForm">
                <div class="widgets-pkg-class-form-grid">
                    <div class="form-group">
                        <label for="pkgClassCalcLength">长 (inch)</label>
                        <input type="number" step="0.01" min="0" id="pkgClassCalcLength" class="inline-input">
                    </div>
                    <div class="form-group">
                        <label for="pkgClassCalcWidth">宽 (inch)</label>
                        <input type="number" step="0.01" min="0" id="pkgClassCalcWidth" class="inline-input">
                    </div>
                    <div class="form-group">
                        <label for="pkgClassCalcHeight">高 (inch)</label>
                        <input type="number" step="0.01" min="0" id="pkgClassCalcHeight" class="inline-input">
                    </div>
                    <div class="form-group">
                        <label for="pkgClassCalcGross">毛重 (lbs)</label>
                        <input type="number" step="0.01" min="0" id="pkgClassCalcGross" class="inline-input">
                    </div>
                </div>
                <div class="widgets-pkg-class-actions">
                    <button type="button" class="btn-primary btn-small" id="pkgClassCalcSubmitBtn">计算</button>
                </div>
            </div>
            <div id="packageClassCalcResult"></div>
        </section>
    </div>

    <script src="/static/js/package_class_calculator.js"></script>
    <script src="/static/js/header.js"></script>
    <script>
        window.addEventListener('load', () => {
            if (window.SitjoyPackageClass && typeof window.SitjoyPackageClass.initCalculatorPage === 'function') {
                window.SitjoyPackageClass.initCalculatorPage();
            }
            if (window.bindFloatingHelpDots) bindFloatingHelpDots(document);
        });
    </script>
</body>
</html>
