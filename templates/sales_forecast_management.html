            const trs = keys.map((fieldKey) => {
                const lab = escapeHtml(labelByKey.get(fieldKey) || fieldKey);
                const tds = displayMonths.map((mk) => {
                    const histCell = (row.history && row.history[mk]) || null;
                    const v = computePerfValue(histCell, fieldKey, mk, row) || '—';
                    const ck = escapeHtml(sfPerfMonthManageKey(mk));
                    return '<td data-manage-col-key="' + ck + '">' + escapeHtml(String(v)) + '</td>';
                }).join('');
                return '<tr><th scope="row" data-manage-col-key="' + SF_METRIC_COL_KEY + '" data-disable-sort="1">' + lab + '</th>' + tds + '</tr>';
            }).join('');
            tbody.innerHTML = trs;
            try {
                const monthSig = displayMonths.map((mk) => sfPerfMonthManageKey(mk)).join(',');
                table.dataset.sjManageLayoutSig = monthSig + '||' + keys.join(',');

        function getFirstSelectedHistoryTd() {
            const tbody = document.getElementById('forecastTbody');
            if (!tbody || !state.sfGridSelected || !state.sfGridSelected.size) return null;
            const layout = state.sfColLayout || [];
            for (const k of state.sfGridSelected) {
                const parsed = parseSfGridCellKey(k);
                const rowKey = parsed.rowKey;
                const colIdx = parsed.colIdx;
                const seg = layout[colIdx];
                if (!seg || seg.kind !== 'H' || !seg.month) continue;
                const tr = Array.from(tbody.querySelectorAll('tr[data-row-key]')).find((r) => String(r.dataset.rowKey || '') === String(rowKey));
                if (!tr) continue;
                const td = tr.querySelector('td.sf-grid-selectable[data-sf-ci="' + String(Number(colIdx)) + '"]');
                if (td) return td;

        function getSfPerfPanelPayloadRaw() {
            if (!isSalesForecastHistoryPerfMode()) {
                state.sfPerfHoverCtx = null;
                return null;
            }
            const ui = state.perfUi || {};
            if (ui.none) return null;
            if (!ui.hover && state.sfPerfHoverCtx) state.sfPerfHoverCtx = null;
            const sel = getSelectedHistoryCellsForSingleRow();
            if (ui.rect && sel && sel.months && sel.months.length) {
                const row = resolveRowByKey(sel.rowKey);
                if (row) return { tier: 1, row, months: sel.months.slice() };
            }
            if (ui.click && sel && sel.months && sel.months.length) {
                const row = resolveRowByKey(sel.rowKey);
                if (row) return { tier: 2, row, months: sel.months.slice() };
            }
            if (ui.hover && state.sfPerfHoverCtx && state.sfPerfHoverCtx.rowKey && state.sfPerfHoverCtx.monthKey) {
                const row = resolveRowByKey(state.sfPerfHoverCtx.rowKey);
                const mk = String(state.sfPerfHoverCtx.monthKey || '').trim();
                if (row && mk) return { tier: 3, row, months: [mk], hoverEl: state.sfPerfHoverCtx.el || null };
            }
            return null;
        }

        function sfPerfPanelPayloadSig(payload) {
            if (!payload || !payload.row) return '';
            const ms = (payload.months || []).map((m) => String(m || '').trim()).sort((a, b) => String(a).localeCompare(String(b)));
            return String(payload.tier) + '|' + String(payload.row.row_key || '') + '|' + ms.join(',');
        }

        /** 不含 tier：同一行+月份区间在悬浮/框选/点击间切换时仍视为同一内容，用于 × 关闭后的手动隐藏判断 */
        function sfPerfPanelPayloadIdentity(payload) {
            if (!payload || !payload.row) return '';
            const ms = (payload.months || []).map((m) => String(m || '').trim()).sort((a, b) => String(a).localeCompare(String(b)));
            return String(payload.row.row_key || '') + '|' + ms.join(',');
        }

        function clampSfPerfFloatingPanelToViewport() {
            const panel = document.getElementById('sfPerfFloatingPanel');
            if (!panel || panel.hidden) return;
            const pad = 8;
            const vw = window.innerWidth || document.documentElement.clientWidth || 0;
            const vh = window.innerHeight || document.documentElement.clientHeight || 0;
            const r = panel.getBoundingClientRect();
            let left = r.left;
            let top = r.top;
            const w = r.width;
            const h = r.height;
            if (left + w > vw - pad) left = Math.max(pad, vw - pad - w);
            if (left < pad) left = pad;
            if (top + h > vh - pad) top = Math.max(pad, vh - pad - h);
            if (top < pad) top = pad;
            panel.style.left = Math.round(left) + 'px';
            panel.style.top = Math.round(top) + 'px';
        }

        function positionSfPerfFloatingPanel(payload) {
            const panel = document.getElementById('sfPerfFloatingPanel');
            if (!panel || panel.hidden) return;
            const mode = state.sfPerfPanelAttachMode || 'follow';
            if (mode === 'follow') {
                let anchor = null;
                if (payload && payload.tier < 3) anchor = getFirstSelectedHistoryTd();
                else if (payload && payload.tier === 3) anchor = payload.hoverEl || null;
                if (anchor && typeof anchor.getBoundingClientRect === 'function') {
                    const a = anchor.getBoundingClientRect();
                    const pad = 10;
                    const gap = 6;
                    const vw = window.innerWidth || document.documentElement.clientWidth || 0;
                    const vh = window.innerHeight || document.documentElement.clientHeight || 0;
                    const pr = panel.getBoundingClientRect();
                    const pw = pr.width || panel.offsetWidth || 320;
                    const ph = pr.height || panel.offsetHeight || 240;
                    /* 跟随选中：贴在单元格下方（优先）或上方，避免左右遮挡整行 */
                    let left = a.left + (a.width - pw) / 2;
                    left = Math.max(pad, Math.min(left, vw - pad - pw));
                    const belowTop = a.bottom + gap;
                    const aboveTop = a.top - ph - gap;
                    let top;
                    if (belowTop + ph <= vh - pad) {
                        top = belowTop;
                    } else if (aboveTop >= pad) {
                        top = aboveTop;
                    } else {
                        top = belowTop;
                    }
                    if (top + ph > vh - pad) top = Math.max(pad, vh - pad - ph);
                    if (top < pad) top = pad;
                    panel.style.left = Math.round(left) + 'px';
                    panel.style.top = Math.round(top) + 'px';
                    clampSfPerfFloatingPanelToViewport();
                    return;
                }
            }
            clampSfPerfFloatingPanelToViewport();
        }

        function readSfPerfPanelPrefs() {
            try {
                const raw = localStorage.getItem(SF_PREF_PERF_PANEL_KEY);
                if (!raw) return null;
                const o = JSON.parse(raw);
                return o && typeof o === 'object' ? o : null;
            } catch (_) {
                return null;
            }
        }

        function writeSfPerfPanelPrefs() {
            try {
                const panel = document.getElementById('sfPerfFloatingPanel');
                let rec = readSfPerfPanelPrefs() || {};
                rec.attach = state.sfPerfPanelAttachMode || 'follow';
                if (panel && !panel.hidden) {
                    const r = panel.getBoundingClientRect();
                    rec.left = Math.round(r.left);
                    rec.top = Math.round(r.top);
                    rec.width = Math.round(r.width);
                    rec.height = Math.round(r.height);
                }
                localStorage.setItem(SF_PREF_PERF_PANEL_KEY, JSON.stringify(rec));
            } catch (_) {}
        }

        function applySfPerfPanelPrefsToDom() {
            const panel = document.getElementById('sfPerfFloatingPanel');
            const pref = readSfPerfPanelPrefs();
            if (!panel) return;
            if (!pref) {
                if ((state.sfPerfPanelAttachMode || 'follow') === 'follow') state.sfPerfPanelFollowBlurDismissed = true;
                return;
            }
            const attach = pref.attach === 'free' ? 'free' : 'follow';
            state.sfPerfPanelAttachMode = attach;
            setSfPerfPanelAttachModeUI(attach);
            state.sfPerfPanelFollowBlurDismissed = (attach === 'follow');
            if (attach === 'free' && Number.isFinite(Number(pref.left)) && Number.isFinite(Number(pref.top))) {
                panel.style.left = Math.round(Number(pref.left)) + 'px';
                panel.style.top = Math.round(Number(pref.top)) + 'px';
                if (Number.isFinite(Number(pref.width)) && Number(pref.width) >= 200) {
                    panel.style.width = Math.round(Number(pref.width)) + 'px';
                }
                if (Number.isFinite(Number(pref.height)) && Number(pref.height) >= 120) {
                    panel.style.height = Math.round(Number(pref.height)) + 'px';
                }
                clampSfPerfFloatingPanelToViewport();
            }
        }

        function setSfPerfPanelAttachModeUI(mode) {
            const m = mode === 'free' ? 'free' : 'follow';
            state.sfPerfPanelAttachMode = m;
            const seg = document.getElementById('sfPerfPanelAttachSeg');
            const hidden = document.getElementById('sfPerfPanelAttachVal');
            if (hidden) hidden.value = m;
            if (seg) {
                seg.dataset.value = m;
                seg.querySelectorAll('.status-pill').forEach((b) => b.classList.toggle('is-active', String(b.dataset.value || '') === m));
            }
        }

        let _sfPerfPanelGeomWriteTimer = null;
        function scheduleWriteSfPerfPanelPrefs() {
            clearTimeout(_sfPerfPanelGeomWriteTimer);
            _sfPerfPanelGeomWriteTimer = setTimeout(() => writeSfPerfPanelPrefs(), 280);
        }

        function bindSfPerfPanelOnce() {
            if (document.body.dataset.sfPerfPanelBound === '1') return;
            document.body.dataset.sfPerfPanelBound = '1';
            const panel = document.getElementById('sfPerfFloatingPanel');
            const header = document.getElementById('sfPerfPanelHeader');
            const seg = document.getElementById('sfPerfPanelAttachSeg');
            const closeBtn = document.getElementById('sfPerfPanelClose');
            if (seg) {
                seg.addEventListener('click', (e) => {
                    const btn = e.target && e.target.closest ? e.target.closest('.status-pill[data-value]') : null;
                    if (!btn) return;
                    e.stopPropagation();
                    const next = String(btn.dataset.value || '');
                    if (next !== 'free' && next !== 'follow') return;
                    state.sfPerfPanelFollowBlurDismissed = (next === 'follow');
                    setSfPerfPanelAttachModeUI(next);
                    writeSfPerfPanelPrefs();
                    updateSfPerfPanel();
                });
            }
            const closeSfPerfFloatingPanel = (e) => {
                if (!panel) return;
                if (e && typeof e.stopPropagation === 'function') e.stopPropagation();
                closeSfPerfFieldsPanel();
                state.sfPerfPanelFollowBlurDismissed = false;
                panel.hidden = true;
                state.sfPerfPanelManuallyHidden = true;
                const raw = getSfPerfPanelPayloadRaw();
                state.sfPerfPanelHiddenSig = state.sfPerfPanelLastShownIdentity
                    || sfPerfPanelPayloadIdentity(raw)
                    || '';
                writeSfPerfPanelPrefs();
            };
            if (closeBtn && panel) {
                closeBtn.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    e.stopPropagation();
                    closeSfPerfFloatingPanel(e);
                }, true);
                closeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    closeSfPerfFloatingPanel(e);
                }, true);
            }
            document.addEventListener('keydown', (e) => {
                if (e.key !== 'Escape') return;
                const p = document.getElementById('sfPerfFloatingPanel');
                if (!p || p.hidden) return;
                closeSfPerfFloatingPanel(e);
            }, true);
            let drag = null;
            const startDrag = (clientX, clientY) => {
                if (!panel) return;
                const r = panel.getBoundingClientRect();
                drag = { sx: clientX, sy: clientY, sl: r.left, st: r.top };
            };
            const moveDrag = (clientX, clientY) => {
                if (!drag || !panel) return;
                panel.style.left = Math.round(drag.sl + clientX - drag.sx) + 'px';
                panel.style.top = Math.round(drag.st + clientY - drag.sy) + 'px';
                setSfPerfPanelAttachModeUI('free');
                clampSfPerfFloatingPanelToViewport();
            };
            const endDrag = () => {
                if (drag) {
                    drag = null;
                    scheduleWriteSfPerfPanelPrefs();
                }
            };
            if (header && panel) {
                header.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    if (e.target.closest('.status-segment') || e.target.closest('#sfPerfPanelClose') || e.target.closest('#sfPerfFieldsDropdown')) return;
                    startDrag(e.clientX, e.clientY);
                    e.preventDefault();
                });
            }
            document.addEventListener('mousemove', (e) => {
                if (!drag) return;
                moveDrag(e.clientX, e.clientY);
            });
            document.addEventListener('mouseup', () => endDrag());
            if (typeof ResizeObserver === 'function' && panel) {
                const ro = new ResizeObserver(() => scheduleWriteSfPerfPanelPrefs());
                ro.observe(panel);
            }
            window.addEventListener('resize', () => {
                if (panel && !panel.hidden) clampSfPerfFloatingPanelToViewport();
                repositionSfPerfFieldsPanel();
            });
            const wrap = document.getElementById('forecastTableWrap');
            if (wrap) {
                wrap.addEventListener('mouseover', (e) => {
                    if (!isSalesForecastHistoryPerfMode()) return;
                    const td = e.target && e.target.closest ? e.target.closest('td.sf-cell-history[data-month]') : null;
                    if (!td || (state.perfUi && state.perfUi.none)) return;
                    if (!(state.perfUi || {}).hover) return;
                    const tr = td.closest('tr[data-row-key]');
                    const rk = tr && String(tr.dataset.rowKey || '').trim();
                    const mk = String(td.dataset.month || '').trim();
                    if (!rk || !mk) return;
                    state.sfPerfHoverCtx = { rowKey: rk, monthKey: mk, el: td };
                    requestAnimationFrame(() => updateSfPerfPanel());
                });
                wrap.addEventListener('mouseleave', (e) => {
                    if (!isSalesForecastHistoryPerfMode()) {
                        state.sfPerfHoverCtx = null;
                        return;
                    }
                    const rel = e.relatedTarget;
                    if (rel && rel.closest && (rel.closest('#sfPerfFloatingPanel') || rel.closest('#forecastTableWrap'))) return;
                    state.sfPerfHoverCtx = null;
                    requestAnimationFrame(() => updateSfPerfPanel());
                });
                /* 跟随选中：焦点离开预测表区域且不在产品表现弹窗内时，同步隐藏（不视为用户“永久关闭”） */
                wrap.addEventListener('focusout', () => {
                    if (state.sfPerfPanelAttachMode !== 'follow') return;
                    if (!isSalesForecastHistoryPerfMode()) return;
                    const p = document.getElementById('sfPerfFloatingPanel');
                    if (!p || p.hidden) return;
                    requestAnimationFrame(() => {
                        if (state.sfPerfPanelAttachMode !== 'follow') return;
                        const ae = document.activeElement;
                        if (ae && wrap.contains(ae)) return;
                        if (ae && p.contains(ae)) return;
                        p.hidden = true;
                        state.sfPerfPanelFollowBlurDismissed = true;
                        closeSfPerfFieldsPanel();
                    });
                });
                wrap.addEventListener('focusin', (e) => {
                    if (state.sfPerfPanelAttachMode !== 'follow') return;
                    if (!isSalesForecastHistoryPerfMode()) return;
                    state.sfPerfPanelFollowBlurDismissed = false;
                    const t = e.target;
                    if (!t || !t.closest) return;
                    if (!t.closest('input.sf-num-input')) return;
                    requestAnimationFrame(() => updateSfPerfPanel());
                });
            }
            applySfPerfPanelPrefsToDom();
            bindSfPerfFieldsDropdownOnce();
            if (panel && window.SitjoyManagedPmTable && typeof window.SitjoyManagedPmTable.enhance === 'function') {
                window.SitjoyManagedPmTable.enhance(panel);
            }
        }

        function updateSfPerfPanel() {
            const panel = document.getElementById('sfPerfFloatingPanel');
            const title = document.getElementById('sfPerfPanelTitle');
            if (!panel) return;
            const payloadRaw = getSfPerfPanelPayloadRaw();
            const sig = sfPerfPanelPayloadSig(payloadRaw);
            const id = sfPerfPanelPayloadIdentity(payloadRaw);
            if (state.sfPerfPanelManuallyHidden && id && id === state.sfPerfPanelHiddenSig) {
                panel.hidden = true;
                closeSfPerfFieldsPanel();
                return;
            }
            /* 无 payload 时只隐藏面板，勿重置手动关闭状态；否则用户点 × 后若随即触发无 payload 的更新（如 mouseleave 清空 hover），会清掉 sfPerfPanelManuallyHidden，弹窗会立刻再次出现 */
            if (!payloadRaw) {
                panel.hidden = true;
                closeSfPerfFieldsPanel();
                return;
            }
            /* 跟随选中：仅框选/点击（有选中数据）时展示，不因悬浮历史格单独弹出 */
            if (state.sfPerfPanelAttachMode === 'follow' && Number(payloadRaw.tier) === 3) {
                panel.hidden = true;
                closeSfPerfFieldsPanel();
                return;
            }
            if (id !== state.sfPerfPanelLastShownIdentity) {
                state.sfPerfPanelManuallyHidden = false;
            }
            state.sfPerfPanelLastShownSig = sig;
            state.sfPerfPanelLastShownIdentity = id;

            const distinctMonths = Array.from(new Set(payloadRaw.months || [])).sort((a, b) => String(a).localeCompare(String(b)));
            const displayMonths = expandMonthsAlongHistoryTimeline(distinctMonths);
            if (!displayMonths.length) {
                panel.hidden = true;
                closeSfPerfFieldsPanel();
                return;
            }
            const row = payloadRaw.row;
            if (title) {
                if (displayMonths.length === distinctMonths.length) {
                    title.textContent = '产品表现 · ' + distinctMonths.map((m) => monthShortLabel(m)).join('、');
                } else {
                    const a = monthShortLabel(displayMonths[0]);
                    const b = monthShortLabel(displayMonths[displayMonths.length - 1]);
                    title.textContent = '产品表现 · ' + a + ' — ' + b + '（' + displayMonths.length + ' 个月连续区间）';
                }
            }
            renderSfPerfMatrixIntoTable(row, displayMonths);
            panel.hidden = false;
            requestAnimationFrame(() => {
                positionSfPerfFloatingPanel(payloadRaw);
                if (state.sfPerfPanelAttachMode === 'free') clampSfPerfFloatingPanelToViewport();
            });
        }

        function updateSfPerfToolbarGroupMode() {
            const grp = document.getElementById('sfPerfUiToolbarGroup');
            const interact = document.getElementById('sfPerfUiToolbarInteractWrap');
            const trig = document.getElementById('sfPerfFieldsTrigger');
            if (!grp) return;
            const ok = isSalesForecastHistoryPerfMode();
            grp.style.opacity = '';
            grp.style.pointerEvents = '';
            grp.title = '';
            if (interact) {
                interact.style.opacity = ok ? '' : '0.45';
                interact.style.pointerEvents = ok ? '' : 'none';
                interact.title = ok ? '' : '下单 SKU 维度不支持产品表现（悬浮 / 点击 / 框选）';
                if (ok) interact.removeAttribute('inert');
                else interact.setAttribute('inert', '');
            }
            if (trig) {
                trig.disabled = !ok;
                trig.title = ok ? '' : '下单 SKU 维度不可用';
            }
            if (!ok) closeSfPerfFieldsPanel();
        }

        function bindPerfUiToolbarOnce() {
            if (document.body.dataset.sfPerfUiBound === '1') return;
            document.body.dataset.sfPerfUiBound = '1';
            ['sfPerfUiNone', 'sfPerfUiHover', 'sfPerfUiClick', 'sfPerfUiRect'].forEach((id) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('change', () => {
                    if (id === 'sfPerfUiNone' && el.checked) {
                        state.perfUi = { none: true, hover: false, click: false, rect: false };
                    } else if (id === 'sfPerfUiNone' && !el.checked) {
                        state.perfUi = normalizePerfUiPatch({ none: false, hover: true, click: false, rect: false });
                    } else {
                        state.perfUi = normalizePerfUiPatch({
                            none: !!(document.getElementById('sfPerfUiNone') || {}).checked,
                            hover: !!(document.getElementById('sfPerfUiHover') || {}).checked,
                            click: !!(document.getElementById('sfPerfUiClick') || {}).checked,
                            rect: !!(document.getElementById('sfPerfUiRect') || {}).checked,
                        });
                    }
                    writePerfUiPrefs();
                    syncPerfUiCheckboxesFromState();
                    renderForecastTable();
                    updateSfPerfPanel();
                });
            });
        }

        /** 产品表现矩阵中的指标行（不含「月份」：月份仅作表头列，始终显示） */
        function getSfPerfMatrixRowFieldCatalog() {
            return getPerfFieldCatalog().filter((f) => f.key !== 'month');
        }

        function repositionSfPerfFieldsPanel() {
            const trigger = document.getElementById('sfPerfFieldsTrigger');
            const fldPanel = document.getElementById('sfPerfFieldsPanel');
            if (!trigger || !fldPanel || !fldPanel.classList.contains('open')) return;
            const triggerRect = trigger.getBoundingClientRect();
            fldPanel.style.visibility = 'hidden';
            fldPanel.style.display = 'grid';
            const panelRect = fldPanel.getBoundingClientRect();
            const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
            const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
            let left = triggerRect.right - panelRect.width;
            left = Math.max(8, Math.min(left, viewportWidth - panelRect.width - 8));
            let top = triggerRect.bottom + 6;
            if (top + panelRect.height > viewportHeight - 8) {
                top = Math.max(8, triggerRect.top - panelRect.height - 6);
            }
            top = Math.max(8, Math.min(top, viewportHeight - panelRect.height - 8));
            fldPanel.style.left = `${left}px`;
            fldPanel.style.top = `${top}px`;
            fldPanel.style.visibility = 'visible';
        }

        function renderSfPerfFieldsPanelContent() {
            const fldPanel = document.getElementById('sfPerfFieldsPanel');
            if (!fldPanel) return;
            const prefs = readSfPerfMetricFieldsPrefs();
            const visible = prefs.visible || new Set();
            const catalogRows = getSfPerfMatrixRowFieldCatalog();
            const labelByKey = new Map(catalogRows.map((f) => [f.key, f.label]));
            const catalogKeys = catalogRows.map((f) => f.key);
            let order = (prefs.order || []).filter((k) => catalogKeys.includes(k));
            catalogKeys.forEach((k) => {
                if (!order.includes(k)) order.push(k);
            });
            const hint = '<p class="sf-perf-fields-panel-hint">月份列标题始终显示。以下为产品表现矩阵中的<strong>指标行</strong>；勾选与顺序保存在本机浏览器（↑/↓ 调整行序）。</p>';
            const items = order.map((fkey) => {
                const k = escapeHtml(fkey);
                const lab = escapeHtml(labelByKey.get(fkey) || fkey);
                const ch = visible.has(fkey) ? ' checked' : '';
                return '<div class="pm-table-columns-item pm-table-columns-item--with-reorder" data-field-key="' + k + '">'
                    + '<div class="sf-perf-field-reorder">'
                    + '<button type="button" class="btn-ghost sf-perf-field-move" data-dir="up" title="上移">↑</button>'
                    + '<button type="button" class="btn-ghost sf-perf-field-move" data-dir="down" title="下移">↓</button>'
                    + '</div>'
                    + '<div class="pm-table-columns-item-main">'
                    + `<label><input type="checkbox" data-field-key="${k}"${ch}><span>${lab}</span></label></div></div>`;
            }).join('');
            fldPanel.innerHTML = hint + items;
            fldPanel.querySelectorAll('input[type="checkbox"][data-field-key]').forEach((inp) => {
                inp.addEventListener('change', onSfPerfMatrixRowVisibilityChange);
            });
            updateSfPerfFieldReorderButtonStates(fldPanel);
        }

        function onSfPerfMatrixRowVisibilityChange() {
            const fldPanel = document.getElementById('sfPerfFieldsPanel');
            if (!fldPanel) return;
            persistSfPerfFieldsPanelFromDom(fldPanel);
            renderForecastTable();
            updateSfPerfPanel();
        }

        function onSfPerfFieldReorderClick(e) {
            const btn = e.target && e.target.closest ? e.target.closest('.sf-perf-field-move') : null;
            if (!btn || btn.disabled) return;
            const dir = String(btn.dataset.dir || '');
            if (dir !== 'up' && dir !== 'down') return;
            e.preventDefault();
            e.stopPropagation();
            const row = btn.closest('.pm-table-columns-item[data-field-key]');
            const fldPanel = document.getElementById('sfPerfFieldsPanel');
            if (!row || !fldPanel || !fldPanel.contains(row)) return;
            const sib = dir === 'up' ? row.previousElementSibling : row.nextElementSibling;
            if (!sib || !sib.dataset || !sib.dataset.fieldKey) return;
            if (dir === 'up') fldPanel.insertBefore(row, sib);
            else fldPanel.insertBefore(sib, row);
            persistSfPerfFieldsPanelFromDom(fldPanel);
            renderForecastTable();
            updateSfPerfPanel();
        }

        function closeSfPerfFieldsPanel() {
            const fldPanel = document.getElementById('sfPerfFieldsPanel');
            const trig = document.getElementById('sfPerfFieldsTrigger');
            if (!fldPanel) return;
            fldPanel.classList.remove('open');
            fldPanel.style.display = 'none';
            fldPanel.style.visibility = 'hidden';
            fldPanel.style.pointerEvents = 'none';
            fldPanel.style.left = '';
            fldPanel.style.top = '';
            if (trig) trig.setAttribute('aria-expanded', 'false');
            state.sfPerfFieldsPanelOpen = false;
        }

        function openSfPerfFieldsPanel() {
            if (!isSalesForecastHistoryPerfMode()) return;
            const fldPanel = document.getElementById('sfPerfFieldsPanel');
            const trig = document.getElementById('sfPerfFieldsTrigger');
            if (!fldPanel || !trig) return;
            renderSfPerfFieldsPanelContent();
            fldPanel.classList.add('open');
            fldPanel.style.pointerEvents = 'auto';
            trig.setAttribute('aria-expanded', 'true');
            state.sfPerfFieldsPanelOpen = true;
            requestAnimationFrame(() => repositionSfPerfFieldsPanel());
        }

        function toggleSfPerfFieldsPanel(e) {
            if (e && typeof e.stopPropagation === 'function') e.stopPropagation();
            const fldPanel = document.getElementById('sfPerfFieldsPanel');
            if (fldPanel && fldPanel.classList.contains('open')) closeSfPerfFieldsPanel();
            else openSfPerfFieldsPanel();
        }

        function bindSfPerfFieldsDropdownOnce() {
            if (document.body.dataset.sfPerfFieldsDdBound === '1') return;
            document.body.dataset.sfPerfFieldsDdBound = '1';
            const trig = document.getElementById('sfPerfFieldsTrigger');
            if (trig) {
                trig.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    toggleSfPerfFieldsPanel(e);
                });
            }
            const fldPanel = document.getElementById('sfPerfFieldsPanel');
            if (fldPanel) {
                fldPanel.addEventListener('click', onSfPerfFieldReorderClick);
            }
            document.addEventListener('mousedown', (e) => {
                if (!state.sfPerfFieldsPanelOpen) return;
                const t = e.target;
                if (t && t.closest && (t.closest('#sfPerfFieldsDropdown') || t.closest('#sfPerfPanelClose'))) return;
                closeSfPerfFieldsPanel();
            }, true);
            document.addEventListener('keydown', (e) => {
                if (e.key !== 'Escape') return;
                if (!state.sfPerfFieldsPanelOpen) return;
                closeSfPerfFieldsPanel();
            }, true);
        }

        // ===== 单元格 =====
        function forecastDigitsOnly(s) {
            return String(s || '').replace(/[^0-9]/g, '');
        }
        /** 多位时去掉前导 0；单字符保留（含 "0"）；空串保留 */
        function normalizeForecastDigitString(s) {
            let d = forecastDigitsOnly(s);
            if (!d) return '';
            if (d.length > 1) d = d.replace(/^0+/, '') || '0';
            return d;
        }

        function buildForecastCell(row, monthKey) {
            const wrap = document.createElement('span');
            wrap.className = 'sf-cell-wrap';

            const forecast = (row.forecasts && row.forecasts[monthKey]) || null;
            const dirtyKey = row.row_key + '|' + monthKey;
            const dirtyVal = state.dirty.has(dirtyKey) ? Number(state.dirty.get(dirtyKey).latest_qty) : null;

            const baseValue = forecast ? Number(forecast.value_qty || 0) : 0;
            const value = dirtyVal !== null ? dirtyVal : baseValue;

            const input = document.createElement('input');
            // Use text+numeric inputmode to avoid number spinners wasting width.
            input.type = 'text';
            input.inputMode = 'numeric';
            input.autocomplete = 'off';
            input.spellcheck = false;
            input.className = 'inline-input preview-edit-input sf-num-input';
            if (forecast && forecast.is_inherited) input.classList.add('is-inherited');
            if (dirtyVal !== null) input.classList.add('is-dirty');
            input.value = String(value || 0);
            input.dataset.rowKey = row.row_key;
            input.dataset.month = monthKey;
            input.dataset.original = String(baseValue || 0);
            input.addEventListener('input', onForecastInputChange);
            input.addEventListener('blur', onForecastInputBlur);
            input.addEventListener('beforeinput', (ev) => {
                if (!ev || ev.isComposing) return;
                const it = ev.inputType ? String(ev.inputType) : '';
                /* 粘贴内容常含逗号、制表符、多字符等，勿在此拦截，交给 input 里 normalizeForecastDigitString */
                if (it === 'insertFromPaste' || it === 'insertFromPasteAsQuotation' || it === 'insertReplacementText') return;
                if (!ev.data) return;
                if (/^\d+$/.test(ev.data)) return;
                if (it.startsWith('delete')) return;
                try { ev.preventDefault(); } catch (_) {}
            });

            wrap.appendChild(input);

            const deltaBadge = document.createElement('span');
            deltaBadge.className = 'sf-forecast-delta-badge';
            deltaBadge.setAttribute('aria-hidden', 'true');
            wrap.appendChild(deltaBadge);
            updateSfForecastDeltaBadgeForInput(input, deltaBadge);

            // 角标：来自来源（继承）或来自数据库（已存储）
            if (forecast && forecast.is_inherited && forecast.source && forecast.source.items && forecast.source.items.length) {
                const badge = document.createElement('span');
                badge.className = 'sf-source-badge is-inherited';
                badge.textContent = forecast.source.type === 'platform_sku' ? '继' : '承';
                badge.title = '继承自' + (forecast.source.type === 'platform_sku' ? '销售平台SKU' : '规格+面料') + '：' + formatNumber(forecast.source.total_qty);
                const tipped = makeTooltipWrap(buildSourceTooltip(forecast, monthKey), badge);
                wrap.appendChild(tipped);
            } else if (forecast && forecast.source && forecast.source.items && forecast.source.items.length) {
                const badge = document.createElement('span');
                badge.className = 'sf-source-badge';
                badge.textContent = formatNumber(forecast.source.total_qty);
                const tipped = makeTooltipWrap(buildSourceTooltip(forecast, monthKey, true), badge);
                wrap.appendChild(tipped);
            }

            // 让 cell-meta 时间戳也可悬浮查看
            if (forecast && forecast.cell_meta) {
                const stored = Number(forecast.cell_meta.latest_qty != null ? forecast.cell_meta.latest_qty : baseValue);
                input.title = '初始：' + formatNumber(forecast.cell_meta.initial_qty || 0)
                    + '\n上次：' + formatNumber(forecast.cell_meta.prev_qty || 0)
                    + '\n最新：' + formatNumber(forecast.cell_meta.latest_qty || 0)
                    + '\n创建：' + formatDateTime(forecast.cell_meta.created_at)
                    + '\n上次更新：' + formatDateTime(forecast.cell_meta.prev_updated_at)
                    + '\n最新更新：' + formatDateTime(forecast.cell_meta.latest_updated_at)
                    + '\n对比基线（已存储）：' + formatNumber(stored);
            }

            return wrap;
        }

        /** 相对 data-original（加载时的已存储数量）的变动：数值% + 箭头；基线为 0 时仅展示绝对差 */
        function formatSfForecastDeltaPercent(current, baseline) {
            const c = Math.max(0, Math.round(Number(current) || 0));
            const b = Math.max(0, Math.round(Number(baseline) || 0));
            if (c === b) return null;
            const diff = c - b;
            const up = diff > 0;
            const arrow = up ? '▲' : '▼';
            if (b === 0) {
                return {
                    dir: up ? 'up' : 'down',
                    label: (up ? '+' : '−') + formatNumber(Math.abs(diff)) + ' ' + arrow,
                    title: '已存储为 0，展示绝对变化',
                };
            }
            const rawPct = (diff / b) * 100;
            let rounded = Math.round(rawPct * 10) / 10;
            if (Math.abs(rounded) >= 100) rounded = Math.round(rawPct);
            const sign = rounded > 0 ? '+' : (rounded < 0 ? '−' : '');
            const body = String(Math.abs(rounded)).replace(/\.0$/, '');
            return {
                dir: up ? 'up' : 'down',
                label: `${sign}${body}% ${arrow}`,
                title: '已存储数量 ' + formatNumber(b),
            };
        }

        function updateSfForecastDeltaBadgeForInput(input, badgeEl) {
            const badge = badgeEl || (input && input.closest && input.closest('.sf-cell-wrap') ? input.closest('.sf-cell-wrap').querySelector('.sf-forecast-delta-badge') : null);
            if (!input || !badge) return;
            const original = Number(input.dataset.original || 0);
            const d = normalizeForecastDigitString(input.value);
            const cur = d === '' ? 0 : Math.max(0, parseInt(d, 10) || 0);
            const info = formatSfForecastDeltaPercent(cur, original);
            badge.classList.remove('is-visible', 'is-up', 'is-down');
            badge.textContent = '';
            badge.removeAttribute('title');
            if (!info) return;
            badge.textContent = info.label;
            badge.classList.add('is-visible', info.dir === 'up' ? 'is-up' : 'is-down');
            if (info.title) badge.title = info.title;
        }

        function onForecastInputChange(e) {
            const input = e.target;
            let d = normalizeForecastDigitString(input.value);
            if (d !== input.value) input.value = d;
            const rowKey = input.dataset.rowKey;
            const month = input.dataset.month;
            const original = Number(input.dataset.original || 0);
            const newVal = d === '' ? 0 : Math.max(0, parseInt(d, 10) || 0);
            const k = rowKey + '|' + month;
            if (newVal === original) {
                state.dirty.delete(k);
                input.classList.remove('is-dirty');
            } else {
                state.dirty.set(k, { row_key: rowKey, forecast_month: month, latest_qty: newVal });
                input.classList.add('is-dirty');
            }
            updateSfForecastDeltaBadgeForInput(input);
            refreshBatchPopup();
            if (!state.forecastExpanded) renderForecastTableBodyOnly();
            const curM = state.mtdContext && state.mtdContext.current_month_key;
            if (curM && String(month) === String(curM) && state.mtdContext.in_history_range) {
                refreshMtdCellForRowKey(rowKey);
            }
        }

        function onForecastInputBlur(e) {
            const input = e.target;
            if (!input || !input.classList || !input.classList.contains('sf-num-input')) return;
            let d = normalizeForecastDigitString(input.value);
            if (!d) d = '0';
            if (input.value !== d) input.value = d;
            onForecastInputChange({ target: input });
        }

        function makeTooltipWrap(html, contentNode, bubbleExtraClass, cellWide) {
            const wrap = document.createElement('span');
            wrap.className = 'sf-tooltip-wrap';
            if (cellWide) wrap.classList.add('sf-tooltip-wrap--cell-wide');
            wrap.tabIndex = 0;
            const extra = String(bubbleExtraClass || '').trim();
            const content = document.createElement('span');
            content.className = 'sf-tooltip-content';
            content.appendChild(contentNode);
            wrap.appendChild(content);
            const bubble = document.createElement('span');
            bubble.className = 'sf-tooltip-bubble' + (extra ? ' ' + extra : '');
            bubble.innerHTML = html;
            wrap.appendChild(bubble);
            wrap.addEventListener('click', (e) => {
                e.stopPropagation();
            });
            return wrap;
        }

        /** 与 header.js makeStorageKey 中 pathKey 规则一致 */
        function sfPerfTablePathKeyForStorage() {
            return String(location.pathname || '/').replace(/[^a-zA-Z0-9/_-]+/g, '_');
        }

        function buildSourceTooltip(forecast, monthKey, hasStored) {
            const src = forecast.source || {};
            const items = src.items || [];
            const title = src.type === 'platform_sku' ? '继承自销售平台SKU 预测' : '继承自 规格+面料 预测';
            const liHtml = items.map(it => {
                if (src.type === 'platform_sku') {
                    return '<li>' + escapeHtml(it.label) + ' = ' + formatNumber(it.qty) + '</li>';
                }
                return '<li>' + escapeHtml(it.label) + ' × ' + (it.ratio || 1) + ' = ' + formatNumber(it.qty) + '</li>';
            }).join('');
            const totalLine = '<dl><dt>合计</dt><dd>' + formatNumber(src.total_qty || 0) + '</dd>'
                + (hasStored ? '<dt>已存储</dt><dd>' + formatNumber(forecast.stored_qty || 0) + '</dd>' : '')
                + '<dt>月份</dt><dd>' + monthShortLabel(monthKey) + '</dd></dl>';
            return '<div class="sf-tip-title">' + title + '</div>'
                + (items.length ? '<ul class="sf-tip-list">' + liHtml + '</ul>' : '')
                + totalLine;
        }

        // ===== 批量保存弹窗 =====
        function refreshBatchPopup() {
            const popup = document.getElementById('sfBatchPopup');
            const summary = document.getElementById('sfBatchPopupSummary');
            if (!popup || !summary) return;
            const total = state.dirty.size;
            summary.textContent = '未保存修改：' + total + ' 条（' + modeLabel(state.forecastMode) + ' 模式）';
            popup.classList.toggle('is-active', total > 0);
            document.body.classList.toggle('sf-dirty-batch-open', total > 0);
        }

        function modeLabel(mode) {
            if (mode === 'platform') return '销售平台SKU';
            if (mode === 'order') return '下单SKU';
            return '规格+面料';
        }

        async function saveAllChanges() {
            if (state.dirty.size <= 0) {
                showToast('没有可保存的修改');
                return;
            }
            const payloadCells = [];
            state.dirty.forEach(item => payloadCells.push(item));
            setLoading(true);
            try {
                const resp = await fetch('/api/sales-forecast-bulk-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ forecast_mode: state.forecastMode, cells: payloadCells }),
                });
                const data = await resp.json();
                if (!data || data.status !== 'success') throw new Error((data && data.message) || '保存失败');
                state.dirty.clear();
                refreshBatchPopup();
                showToast('保存成功，已刷新');
                await loadForecastData();
            } catch (err) {
                showToast(err && err.message ? err.message : '保存失败', true);
            } finally {
                setLoading(false);
            }
        }

        function discardAllChanges() {
            if (state.dirty.size <= 0) return;
            state.dirty.clear();
            refreshBatchPopup();
            renderForecastTableBodyOnly();
        }

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            state.historyExpanded = readBoolPref(SF_PREF_HISTORY_EXPANDED_KEY, true);
            state.forecastExpanded = readBoolPref(SF_PREF_FORECAST_EXPANDED_KEY, true);
            // 历史范围默认：上个月起回溯 12 个月
            const today = new Date();
            const endY = today.getFullYear();
            const endM = today.getMonth() + 1;
            const endKey = `${String(endY).padStart(4, '0')}-${pad2(endM)}-01`;
            const startKey = shiftMonth(endKey, -11);
            const startEl = document.getElementById('historyStart');
            const endEl = document.getElementById('historyEnd');
            if (startEl) startEl.value = startKey.slice(0, 7);
            if (endEl) endEl.value = endKey.slice(0, 7);

            const savedMode = readSavedForecastMode();
            setForecastMode(savedMode);
            state.perfUi = readPerfUiPrefs();
            syncPerfUiCheckboxesFromState();
            bindPerfUiToolbarOnce();
            bindSfPerfPanelOnce();
            updateSfPerfToolbarGroupMode();

            bindModeSegment();
            setForecastMonthsFuture(6);

            // 月份选择器
            ensureGlobalMonthPickerDialog();
            const bindHistoryMonthPicker = (id) => {
                const input = document.getElementById(id);
                if (!input) return;
                const openPicker = (e) => {
                    if (e) {
                        e.preventDefault();
                        e.stopPropagation();
                    }
                    if (typeof window.showGlobalMonthPickerDialog !== 'function') return;
                    const currentVal = String(input.value || '').trim();
                    window.showGlobalMonthPickerDialog({
                        anchor: input,
                        value: /^\d{4}-\d{2}$/.test(currentVal) ? currentVal : '',
                        onPick: (pickedMonth) => {
                            input.value = pickedMonth;
                        }
                    });
                };
                input.addEventListener('click', openPicker);
                input.addEventListener('focus', openPicker);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') openPicker(e);
                });
            };
            bindHistoryMonthPicker('historyStart');
            bindHistoryMonthPicker('historyEnd');
            const bindForecastMonthPicker = (id) => {
                const input = document.getElementById(id);
                if (!input) return;
                const openPicker = (e) => {
                    if (e) {
                        e.preventDefault();
                        e.stopPropagation();
                    }
                    if (typeof window.showGlobalMonthPickerDialog !== 'function') return;
                    const currentVal = String(input.value || '').trim();
                    window.showGlobalMonthPickerDialog({
                        anchor: input,
                        value: /^\d{4}-\d{2}$/.test(currentVal) ? currentVal : '',
                        onPick: (pickedMonth) => {
                            input.value = pickedMonth;
                            applyForecastRangeFromDomInputs();
                        }
                    });
                };
                input.addEventListener('click', openPicker);
                input.addEventListener('focus', openPicker);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') openPicker(e);
                });
            };
            bindForecastMonthPicker('forecastStart');
            bindForecastMonthPicker('forecastEnd');
            document.addEventListener('click', (e) => {
                if (e.target && e.target.closest && e.target.closest('.sf-tooltip-wrap')) return;
                document.querySelectorAll('.sf-tooltip-wrap.is-pinned').forEach(node => {
                    node.classList.remove('is-pinned');
                });
            });

            // 工具栏按钮
            document.getElementById('btnLoadForecast').addEventListener('click', loadForecastData);
            document.querySelectorAll('button[data-future]').forEach(btn => {
                btn.addEventListener('click', () => setForecastMonthsFuture(parseInt(btn.dataset.future, 10) || 6));
            });
            const bindTopFilter = (id, key) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('input', () => {
                    const v = String(el.value || '').trim();
                    if (v) state.colFilters[key] = v;
                    else delete state.colFilters[key];
                    renderForecastTable();
                });
            };
            bindTopFilter('filterShop', 'shop_name');
            bindTopFilter('filterSku', 'sku_family');
            bindTopFilter('filterSpec', 'spec_name');
            bindTopFilter('filterFabric', 'fabric_code');

            // 弹窗
            document.getElementById('sfBatchSaveBtn').addEventListener('click', saveAllChanges);
            document.getElementById('sfBatchDiscardBtn').addEventListener('click', discardAllChanges);

            loadForecastData();
            initSfForecastSelectionGlobalOnce();
        });
    </script>
</body>
<script src="/static/js/header.js"></script>
