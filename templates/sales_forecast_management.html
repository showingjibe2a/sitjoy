<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销量预测</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .sf-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem 1rem;
            padding: 0.6rem 0.75rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(207, 199, 189, 0.55);
            border-radius: 8px;
            margin-bottom: 0.85rem;
        }
        .sf-toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
        }
        .sf-toolbar label {
            font-size: 0.85rem;
            color: var(--morandi-slate);
        }
        .sf-toolbar input[type="text"],
        .sf-toolbar input[type="month"],
        .sf-toolbar input[type="number"],
        .sf-toolbar select {
            padding: 0.35rem 0.55rem;
            border: 1px solid rgba(207, 199, 189, 0.72);
            border-radius: 6px;
            background: #fff;
            font-size: 0.88rem;
            min-width: 0;
        }
        .sf-toolbar input[type="text"] { min-width: 120px; }
        .sf-toolbar .btn-secondary,
        .sf-toolbar .btn-primary,
        .sf-toolbar .btn-accent { padding: 0.4rem 0.85rem; font-size: 0.88rem; }
        .sf-month-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            align-items: center;
        }
        .sf-month-chip.feature-category-chip {
            padding: 0.2rem 0.55rem;
            font-size: 0.78rem;
        }
        .sf-month-chip-add {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .sf-month-picker {
            position: relative;
            display: inline-block;
        }
        .sf-month-picker-btn {
            min-width: 120px;
            justify-content: space-between;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }
        .sf-month-picker-btn::after {
            content: '\25BC';
            font-size: 0.65rem;
            color: #6f6456;
        }
        .sf-month-picker-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            z-index: 20;
            width: 260px;
            background: #fff;
            border: 1px solid rgba(207, 199, 189, 0.8);
            border-radius: 10px;
            box-shadow: 0 10px 24px rgba(35, 28, 20, 0.15);
            padding: 0.6rem;
            display: none;
        }
        .sf-month-picker-panel.open { display: block; }
        .sf-month-picker-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.45rem;
        }
        .sf-month-picker-year {
            font-weight: 600;
            color: #4f463b;
            font-size: 0.9rem;
        }
        .sf-month-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.35rem;
        }
        .sf-month-picker-opt {
            border: 1px solid rgba(207, 199, 189, 0.75);
            background: #f8f3e9;
            border-radius: 8px;
            height: 34px;
            font-size: 0.84rem;
            color: #4f463b;
            cursor: pointer;
        }
        .sf-month-picker-opt:hover {
            background: #f0e7d7;
            border-color: #cabda9;
        }
        .sf-divider {
            width: 1px;
            height: 22px;
            background: rgba(207, 199, 189, 0.72);
        }

        .sf-table-wrap {
            border: 1px solid rgba(207, 199, 189, 0.55);
            border-radius: 8px;
            background: #fff;
            overflow: auto;
            max-height: calc(100vh - 230px);
            position: relative;
        }
        table.sf-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            font-size: 0.85rem;
        }
        table.sf-table thead th {
            position: sticky;
            background: #f5efe5;
            color: var(--morandi-ink);
            border-bottom: 1px solid rgba(207, 199, 189, 0.85);
            padding: 0.45rem 0.55rem;
            font-weight: 600;
            text-align: left;
            white-space: nowrap;
            z-index: 4;
        }
        table.sf-table thead tr.sf-thead-row-1 th { top: 0; background: #ece2cf; }
        table.sf-table thead tr.sf-thead-row-2 th { top: 36px; background: #f5efe5; }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-spec { background: #f3ecdf; }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-history { background: #f0ece1; }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-month { background: #ede2cb; }
        table.sf-table thead th.sf-th-section {
            text-align: center;
            font-weight: 700;
            color: #4f463b;
        }
        table.sf-table tbody td {
            padding: 0.4rem 0.55rem;
            border-bottom: 1px solid rgba(207, 199, 189, 0.42);
            vertical-align: middle;
            white-space: nowrap;
        }
        table.sf-table tbody tr:nth-child(odd) td { background: #fdfbf6; }
        table.sf-table tbody tr:nth-child(even) td { background: #fbf6ec; }
        td.sf-cell-spec {
            min-width: 200px;
            white-space: normal;
            line-height: 1.25;
        }
        td.sf-cell-spec .sf-spec-sub {
            color: var(--morandi-slate);
            font-size: 0.78rem;
        }
        td.sf-cell-fabric { min-width: 150px; white-space: normal; line-height: 1.2; }
        td.sf-cell-history {
            text-align: right;
            font-variant-numeric: tabular-nums;
            color: #5b5346;
        }
        td.sf-cell-forecast {
            text-align: right;
            position: relative;
        }

        .sf-num-input {
            width: 96px;
            padding: 0.25rem 0.4rem;
            border: 1px solid rgba(207, 199, 189, 0.72);
            border-radius: 5px;
            font-size: 0.88rem;
            background: #fff;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .sf-num-input.is-dirty {
            border-color: #b67f7f;
            background: #fff6ee;
        }
        .sf-num-input.is-inherited {
            background: #f0f4ec;
            color: #4f5e44;
            border-style: dashed;
        }

        .sf-cell-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
        }
        .sf-source-badge {
            position: absolute;
            top: -7px;
            right: -7px;
            min-width: 20px;
            height: 16px;
            padding: 0 4px;
            border-radius: 8px;
            background: #7b9ab0;
            color: #fff;
            font-size: 10px;
            line-height: 16px;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 1px 4px rgba(35,28,20,0.2);
            cursor: help;
        }
        .sf-source-badge.is-inherited { background: #b67f7f; }

        .sf-tooltip-wrap {
            position: relative;
            display: inline-block;
        }
        .sf-tooltip-bubble {
            position: absolute;
            z-index: 30;
            top: 100%;
            right: 0;
            min-width: 240px;
            max-width: 360px;
            background: rgba(47, 47, 51, 0.95);
            color: #ece7df;
            padding: 6px 8px;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.45;
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
            display: none;
            white-space: normal;
        }
        .sf-tooltip-wrap:hover .sf-tooltip-bubble,
        .sf-tooltip-wrap:focus-within .sf-tooltip-bubble,
        .sf-tooltip-wrap.is-pinned .sf-tooltip-bubble {
            display: block;
        }
        .sf-tooltip-bubble dl {
            margin: 0;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.18rem 0.5rem;
        }
        .sf-tooltip-bubble dt { color: #d6cfbf; font-weight: 500; }
        .sf-tooltip-bubble dd { margin: 0; color: #fff; word-break: break-all; }
        .sf-tooltip-bubble .sf-tip-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #fff;
        }
        .sf-tooltip-bubble ul.sf-tip-list { padding-left: 1rem; margin: 0.25rem 0 0; }
        .sf-tooltip-bubble ul.sf-tip-list li { margin-bottom: 0.15rem; }

        .sf-empty {
            text-align: center;
            color: var(--morandi-slate);
            padding: 1.6rem 0;
        }
        .sf-loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            color: var(--morandi-slate);
            z-index: 10;
        }
        .sf-loading-overlay.is-active { display: flex; }

        /* 表头筛选/排序行（可点击） */
        .sf-th-cell {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sf-th-title-row {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            user-select: none;
        }
        .sf-th-title-row .sf-sort-arrow {
            font-size: 10px;
            color: #8b7c63;
        }
        .sf-th-filter {
            width: 100%;
            padding: 0.18rem 0.35rem;
            border: 1px solid rgba(207, 199, 189, 0.85);
            border-radius: 5px;
            font-size: 0.78rem;
            background: #fff;
        }

        /* 右下角批量处理弹窗 */
        .sf-batch-popup {
            position: fixed;
            right: 24px;
            bottom: 24px;
            min-width: 280px;
            max-width: 360px;
            background: #fff;
            border: 1px solid rgba(207, 199, 189, 0.85);
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(35, 28, 20, 0.2);
            padding: 0.85rem 1rem;
            z-index: 50;
            display: none;
        }
        .sf-batch-popup.is-active { display: block; }
        .sf-batch-popup-title {
            font-weight: 700;
            color: #4f463b;
            margin-bottom: 0.35rem;
            font-size: 0.95rem;
        }
        .sf-batch-popup-summary {
            color: var(--morandi-slate);
            font-size: 0.82rem;
            margin-bottom: 0.6rem;
        }
        .sf-batch-popup-actions {
            display: flex;
            gap: 0.45rem;
            justify-content: flex-end;
        }

        .sf-mode-bar {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.2rem;">
            <h2>销量预测</h2>
            <p>支持按销售平台SKU、规格+面料、下单SKU 三种维度预测；规格/下单SKU 可继承上层预测自动估算。</p>
        </section>

        <div class="card pm-card" style="padding: 0.9rem 1rem;">
            <div class="sf-toolbar">
                <div class="sf-toolbar-group">
                    <label>预测维度：</label>
                    <div class="sf-mode-bar">
                        <input type="hidden" id="forecastModeVal" value="spec">
                        <div class="status-segment status-segment--inline" id="forecastModeSegment" data-value="spec">
                            <button type="button" class="status-pill status-pill--enabled" data-value="platform">销售平台SKU</button>
                            <button type="button" class="status-pill status-pill--enabled is-active" data-value="spec">规格+面料</button>
                            <button type="button" class="status-pill status-pill--enabled" data-value="order">下单SKU</button>
                        </div>
                    </div>
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <label>预测月份：</label>
                    <div id="forecastMonthChips" class="sf-month-chip-row"></div>
                    <div class="sf-month-chip-add">
                        <input type="hidden" id="addMonthInput">
                        <div class="sf-month-picker" id="addMonthPicker">
                            <button type="button" class="btn-secondary sf-month-picker-btn" id="addMonthPickerBtn">选择月份</button>
                            <div class="sf-month-picker-panel" id="addMonthPickerPanel">
                                <div class="sf-month-picker-head">
                                    <button type="button" class="btn-ghost" id="addMonthPickerPrevYear">&#9664;</button>
                                    <span class="sf-month-picker-year" id="addMonthPickerYearLabel"></span>
                                    <button type="button" class="btn-ghost" id="addMonthPickerNextYear">&#9654;</button>
                                </div>
                                <div class="sf-month-picker-grid" id="addMonthPickerMonths"></div>
                            </div>
                        </div>
                        <button class="btn-secondary" id="addMonthAddBtn" type="button">添加</button>
                    </div>
                    <button class="btn-secondary" type="button" data-future="3">未来3月</button>
                    <button class="btn-secondary" type="button" data-future="6">未来6月</button>
                    <button class="btn-secondary" type="button" data-future="12">未来12月</button>
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <label>历史销量范围：</label>
                    <input type="month" id="historyStart">
                    <span>至</span>
                    <input type="month" id="historyEnd">
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <label>筛选：</label>
                    <input type="text" id="filterSku" placeholder="货号/平台SKU">
                    <input type="text" id="filterSpec" placeholder="规格">
                    <input type="text" id="filterFabric" placeholder="面料">
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <button class="btn-primary" id="btnLoadForecast" type="button">加载/刷新</button>
                </div>
            </div>
        </div>

        <div class="sf-table-wrap" id="forecastTableWrap">
            <table class="sf-table" id="forecastTable">
                <thead id="forecastThead"></thead>
                <tbody id="forecastTbody"></tbody>
            </table>
            <div class="sf-loading-overlay" id="forecastLoading">数据加载中…</div>
        </div>
    </div>

    <div class="sf-batch-popup" id="sfBatchPopup">
        <div class="sf-batch-popup-title">待保存修改</div>
        <div class="sf-batch-popup-summary" id="sfBatchPopupSummary">未保存修改：0 条</div>
        <div class="sf-batch-popup-actions">
            <button class="btn-secondary" type="button" id="sfBatchDiscardBtn">放弃</button>
            <button class="btn-accent" type="button" id="sfBatchSaveBtn">批量保存</button>
        </div>
    </div>

    <script>
        const FORECAST_MODES = ['platform', 'spec', 'order'];

        const state = {
            forecastMode: 'spec',
            months: [],
            historyMonths: [],
            historyRange: { start: '', end: '' },
            rows: [],                       // 当前模式的行
            dirty: new Map(),               // key: row_key|month -> { row_key, forecast_month, latest_qty }
            sortKey: '',
            sortDir: 'asc',
            colFilters: {},                 // colKey -> string
            monthPickerYear: new Date().getFullYear(),
        };

        function pad2(n) { n = Number(n) || 0; return n < 10 ? ('0' + n) : ('' + n); }

        function monthKeyFromValue(value) {
            if (!value) return '';
            const text = String(value).trim();
            const m = text.match(/^(\d{4})\D*(\d{1,2})/);
            if (!m) return '';
            const year = parseInt(m[1], 10);
            const month = parseInt(m[2], 10);
            if (!year || !month || month < 1 || month > 12) return '';
            return year.toString().padStart(4, '0') + '-' + pad2(month) + '-01';
        }

        function monthShortLabel(monthKey) {
            return monthKey ? monthKey.slice(0, 7) : '';
        }

        function todayMonthKey() {
            const d = new Date();
            return d.getFullYear().toString().padStart(4, '0') + '-' + pad2(d.getMonth() + 1) + '-01';
        }

        function shiftMonth(monthKey, delta) {
            if (!monthKey) return '';
            const [y, m] = monthKey.split('-').map(s => parseInt(s, 10));
            let year = y;
            let month = m + delta;
            while (month < 1) { month += 12; year -= 1; }
            while (month > 12) { month -= 12; year += 1; }
            return year.toString().padStart(4, '0') + '-' + pad2(month) + '-01';
        }

        function setForecastMonthsFuture(count) {
            const list = [];
            const start = todayMonthKey();
            for (let i = 0; i < count; i++) list.push(shiftMonth(start, i));
            state.months = list;
            renderMonthChips();
        }

        function addForecastMonth() {
            const el = document.getElementById('addMonthInput');
            const val = monthKeyFromValue(el && el.value);
            if (!val) return;
            if (state.months.indexOf(val) === -1) {
                state.months.push(val);
                state.months.sort();
                renderMonthChips();
            }
            if (el) el.value = '';
            const pickerBtn = document.getElementById('addMonthPickerBtn');
            if (pickerBtn) pickerBtn.textContent = '选择月份';
        }

        function removeForecastMonth(monthKey) {
            state.months = state.months.filter(m => m !== monthKey);
            renderMonthChips();
        }

        function renderMonthChips() {
            const host = document.getElementById('forecastMonthChips');
            if (!host) return;
            host.innerHTML = '';
            state.months.forEach(m => {
                const chip = document.createElement('span');
                chip.className = 'sf-month-chip feature-category-chip';
                chip.innerHTML = '<span>' + monthShortLabel(m) + '</span>';
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.title = '移除';
                btn.textContent = '×';
                btn.className = 'feature-category-remove';
                btn.addEventListener('click', () => removeForecastMonth(m));
                chip.appendChild(btn);
                host.appendChild(chip);
            });
        }

        function renderAddMonthPicker() {
            const yearLabel = document.getElementById('addMonthPickerYearLabel');
            const monthsWrap = document.getElementById('addMonthPickerMonths');
            if (!yearLabel || !monthsWrap) return;
            const year = Number(state.monthPickerYear || new Date().getFullYear());
            state.monthPickerYear = year;
            yearLabel.textContent = String(year);
            const monthNames = ['01月','02月','03月','04月','05月','06月','07月','08月','09月','10月','11月','12月'];
            monthsWrap.innerHTML = monthNames.map((label, idx) => (
                `<button type="button" class="sf-month-picker-opt" data-month="${idx + 1}">${label}</button>`
            )).join('');
            monthsWrap.querySelectorAll('.sf-month-picker-opt').forEach(btn => {
                btn.addEventListener('click', () => {
                    const month = Math.max(1, Math.min(12, parseInt(btn.dataset.month || '1', 10) || 1));
                    const ymd = String(year).padStart(4, '0') + '-' + pad2(month) + '-01';
                    const hidden = document.getElementById('addMonthInput');
                    if (hidden) hidden.value = ymd.slice(0, 7);
                    const pickerBtn = document.getElementById('addMonthPickerBtn');
                    if (pickerBtn) pickerBtn.textContent = ymd.slice(0, 7);
                    toggleAddMonthPicker(false);
                });
            });
        }

        function toggleAddMonthPicker(forceOpen) {
            const panel = document.getElementById('addMonthPickerPanel');
            if (!panel) return;
            const nextOpen = typeof forceOpen === 'boolean' ? forceOpen : !panel.classList.contains('open');
            panel.classList.toggle('open', nextOpen);
            if (nextOpen) renderAddMonthPicker();
        }

        function setLoading(active) {
            const overlay = document.getElementById('forecastLoading');
            if (overlay) overlay.classList.toggle('is-active', !!active);
        }

        function showToast(message, isError) {
            if (window.showAppToast) window.showAppToast(message, !!isError, isError ? 0 : 2200);
            else console.log(message);
        }

        function escapeHtml(text) {
            const s = String(text == null ? '' : text);
            return s
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatNumber(value) {
            if (value === null || value === undefined || value === '') return '';
            const num = Number(value);
            if (!isFinite(num)) return '';
            return num.toLocaleString('en-US', { maximumFractionDigits: 0 });
        }

        function formatDateTime(value) {
            if (!value) return '—';
            return String(value);
        }

        // ===== 模式切换 =====
        function bindModeSegment() {
            const seg = document.getElementById('forecastModeSegment');
            if (!seg) return;
            seg.addEventListener('click', (e) => {
                const btn = e.target && e.target.closest ? e.target.closest('.status-pill[data-value]') : null;
                if (!btn) return;
                const next = String(btn.dataset.value || '');
                if (!FORECAST_MODES.includes(next)) return;
                if (next === state.forecastMode) return;
                if (state.dirty.size > 0) {
                    const ok = window.confirm('当前有未保存的修改，切换模式会丢弃修改，是否继续？');
                    if (!ok) return;
                    state.dirty.clear();
                    refreshBatchPopup();
                }
                setForecastMode(next);
                loadForecastData();
            });
        }

        function setForecastMode(mode) {
            state.forecastMode = mode;
            const seg = document.getElementById('forecastModeSegment');
            const hidden = document.getElementById('forecastModeVal');
            if (hidden) hidden.value = mode;
            if (seg) {
                seg.dataset.value = mode;
                seg.querySelectorAll('.status-pill').forEach(b => b.classList.toggle('is-active', String(b.dataset.value || '') === mode));
            }
            // 切模式时清空筛选/排序，避免列不存在
            state.sortKey = '';
            state.sortDir = 'asc';
            state.colFilters = {};
        }

        // ===== 数据加载 =====
        async function loadForecastData() {
            const monthsParam = (state.months || []).map(m => m.slice(0, 7)).join(',');
            const histStartEl = document.getElementById('historyStart');
            const histEndEl = document.getElementById('historyEnd');
            const skuEl = document.getElementById('filterSku');
            const specEl = document.getElementById('filterSpec');
            const fabricEl = document.getElementById('filterFabric');

            const params = new URLSearchParams();
            params.set('forecast_mode', state.forecastMode);
            if (monthsParam) params.set('months', monthsParam);
            if (histStartEl && histStartEl.value) params.set('history_start', histStartEl.value);
            if (histEndEl && histEndEl.value) params.set('history_end', histEndEl.value);
            if (skuEl && skuEl.value.trim()) params.set('sku', skuEl.value.trim());
            if (specEl && specEl.value.trim()) params.set('spec', specEl.value.trim());
            if (fabricEl && fabricEl.value.trim()) params.set('fabric', fabricEl.value.trim());

            setLoading(true);
            try {
                const resp = await fetch('/api/sales-forecast?' + params.toString());
                const data = await resp.json();
                if (!data || data.status !== 'success') throw new Error((data && data.message) || '加载失败');
                applyDashboardPayload(data);
                renderForecastTable();
            } catch (err) {
                showToast(err && err.message ? err.message : '加载失败', true);
            } finally {
                setLoading(false);
            }
        }

        function applyDashboardPayload(data) {
            state.months = Array.isArray(data.months) ? data.months.slice() : state.months;
            state.historyMonths = Array.isArray(data.history_months) ? data.history_months.slice() : [];
            state.historyRange = data.history_range || { start: '', end: '' };
            state.rows = Array.isArray(data.rows) ? data.rows : [];
            state.dirty.clear();
            refreshBatchPopup();
            renderMonthChips();
            const histStartEl = document.getElementById('historyStart');
            const histEndEl = document.getElementById('historyEnd');
            if (histStartEl && state.historyRange.start) histStartEl.value = state.historyRange.start.slice(0, 7);
            if (histEndEl && state.historyRange.end) histEndEl.value = state.historyRange.end.slice(0, 7);
        }

        // ===== 列定义 =====
        function getColumnsForMode(mode) {
            if (mode === 'platform') {
                return [
                    { key: 'platform_sku', label: '销售平台SKU', filter: true, sort: true, get: r => r.labels.platform_sku || '' },
                    { key: 'sku_family',    label: '货号',        filter: true, sort: true, get: r => r.labels.sku_family || '' },
                    { key: 'spec_name',     label: '规格',        filter: true, sort: true, get: r => r.labels.spec_name || '' },
                    { key: 'fabric_code',   label: '面料',        filter: true, sort: true, get: r => r.labels.fabric_code || r.labels.fabric_name_en || '' },
                    { key: 'shop_name',     label: '店铺',        filter: true, sort: true, get: r => r.labels.shop_name || '' },
                ];
            }
            if (mode === 'order') {
                return [
                    { key: 'sku',           label: '下单SKU', filter: true, sort: true, get: r => r.labels.sku || '' },
                    { key: 'sku_family',    label: '货号',    filter: true, sort: true, get: r => r.labels.sku_family || '' },
                    { key: 'spec_qty_short',label: '规格描述', filter: true, sort: true, get: r => r.labels.spec_qty_short || '' },
                    { key: 'fabric_code',   label: '面料',    filter: true, sort: true, get: r => r.labels.fabric_code || r.labels.fabric_name_en || '' },
                ];
            }
            // spec
            return [
                { key: 'sku_family',    label: '货号',     filter: true, sort: true, get: r => r.labels.sku_family || '' },
                { key: 'spec_name',     label: '规格',     filter: true, sort: true, get: r => r.labels.spec_name || '' },
                { key: 'fabric_code',   label: '面料',     filter: true, sort: true, get: r => r.labels.fabric_code || r.labels.fabric_name_en || '' },
            ];
        }

        // ===== 表格渲染 =====
        function renderForecastTable() {
            const thead = document.getElementById('forecastThead');
            const tbody = document.getElementById('forecastTbody');
            if (!thead || !tbody) return;

            const cols = getColumnsForMode(state.forecastMode);
            const monthCount = state.months.length;
            const histCount = state.historyMonths.length;

            // 上层（区块）表头
            const trTop = document.createElement('tr');
            trTop.className = 'sf-thead-row-1';
            trTop.innerHTML =
                `<th class="sf-th-section" colspan="${cols.length}">规格信息</th>` +
                (histCount > 0 ? `<th class="sf-th-section" colspan="${histCount}">历史月销量 <span class="help-dot" data-tip="数据来自“产品表现”看板按月聚合"></span></th>` : '') +
                (monthCount > 0 ? `<th class="sf-th-section" colspan="${monthCount}">预测月份</th>` : '');

            // 下层表头（可筛选/排序）
            const trBottom = document.createElement('tr');
            trBottom.className = 'sf-thead-row-2';
            trBottom.innerHTML = cols.map(col => buildBottomHeaderHtml(col, 'spec')).join('') +
                state.historyMonths.map(m => `<th class="sf-th-history">${monthShortLabel(m)}</th>`).join('') +
                state.months.map(m => `<th class="sf-th-month">${monthShortLabel(m)}</th>`).join('');

            thead.innerHTML = '';
            thead.appendChild(trTop);
            thead.appendChild(trBottom);
            bindHeaderEvents(thead, cols);

            tbody.innerHTML = '';

            const filteredRows = applyFiltersAndSort(state.rows.slice(), cols);
            if (!filteredRows.length) {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.colSpan = cols.length + monthCount + histCount;
                td.className = 'sf-empty';
                td.textContent = '没有匹配的数据';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            filteredRows.forEach(row => {
                const tr = document.createElement('tr');
                tr.dataset.rowKey = row.row_key;

                cols.forEach(col => {
                    const td = document.createElement('td');
                    td.className = 'sf-cell-spec';
                    if (col.key === 'fabric_code') td.className = 'sf-cell-fabric';
                    const text = String(col.get(row) || '');
                    td.innerHTML = `<div>${escapeHtml(text || '—')}</div>`;
                    tr.appendChild(td);
                });

                state.historyMonths.forEach(monthKey => {
                    const td = document.createElement('td');
                    td.className = 'sf-cell-history';
                    const cell = (row.history && row.history[monthKey]) || null;
                    const text = cell ? formatNumber(cell.sales_qty) : '0';
                    if (cell) {
                        const wrap = makeTooltipWrap(buildHistoryTooltip(cell, monthKey), document.createTextNode(text));
                        td.appendChild(wrap);
                    } else {
                        td.textContent = text;
                    }
                    tr.appendChild(td);
                });

                state.months.forEach(monthKey => {
                    const td = document.createElement('td');
                    td.className = 'sf-cell-forecast';
                    td.appendChild(buildForecastCell(row, monthKey));
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        function buildBottomHeaderHtml(col, kind) {
            const sortMark = state.sortKey === col.key
                ? (state.sortDir === 'asc' ? '▲' : '▼')
                : '';
            const filterValue = state.colFilters[col.key] || '';
            const filterInput = col.filter
                ? `<input type="text" class="sf-th-filter" data-filter-key="${col.key}" placeholder="筛选" value="${escapeHtml(filterValue)}">`
                : '';
            return `
                <th class="sf-th-spec" data-col-key="${col.key}">
                    <div class="sf-th-cell">
                        <span class="sf-th-title-row" data-sort-key="${col.key}">
                            <span>${escapeHtml(col.label)}</span>
                            <span class="sf-sort-arrow">${sortMark}</span>
                        </span>
                        ${filterInput}
                    </div>
                </th>
            `;
        }

        function bindHeaderEvents(thead, cols) {
            thead.querySelectorAll('.sf-th-title-row[data-sort-key]').forEach(el => {
                el.addEventListener('click', () => {
                    const key = el.dataset.sortKey;
                    if (state.sortKey === key) {
                        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
                    } else {
                        state.sortKey = key;
                        state.sortDir = 'asc';
                    }
                    renderForecastTable();
                });
            });
            thead.querySelectorAll('input.sf-th-filter[data-filter-key]').forEach(el => {
                el.addEventListener('input', () => {
                    const key = el.dataset.filterKey;
                    const v = String(el.value || '').trim();
                    if (v) state.colFilters[key] = v;
                    else delete state.colFilters[key];
                    renderForecastTableBodyOnly();
                });
            });
        }

        function renderForecastTableBodyOnly() {
            const tbody = document.getElementById('forecastTbody');
            if (!tbody) return;
            const cols = getColumnsForMode(state.forecastMode);
            const filteredRows = applyFiltersAndSort(state.rows.slice(), cols);
            const monthCount = state.months.length;
            const histCount = state.historyMonths.length;
            tbody.innerHTML = '';
            if (!filteredRows.length) {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.colSpan = cols.length + monthCount + histCount;
                td.className = 'sf-empty';
                td.textContent = '没有匹配的数据';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }
            filteredRows.forEach(row => {
                const tr = document.createElement('tr');
                tr.dataset.rowKey = row.row_key;
                cols.forEach(col => {
                    const td = document.createElement('td');
                    td.className = col.key === 'fabric_code' ? 'sf-cell-fabric' : 'sf-cell-spec';
                    const text = String(col.get(row) || '');
                    td.innerHTML = `<div>${escapeHtml(text || '—')}</div>`;
                    tr.appendChild(td);
                });
                state.historyMonths.forEach(monthKey => {
                    const td = document.createElement('td');
                    td.className = 'sf-cell-history';
                    const cell = (row.history && row.history[monthKey]) || null;
                    const text = cell ? formatNumber(cell.sales_qty) : '0';
                    if (cell) {
                        const wrap = makeTooltipWrap(buildHistoryTooltip(cell, monthKey), document.createTextNode(text));
                        td.appendChild(wrap);
                    } else {
                        td.textContent = text;
                    }
                    tr.appendChild(td);
                });
                state.months.forEach(monthKey => {
                    const td = document.createElement('td');
                    td.className = 'sf-cell-forecast';
                    td.appendChild(buildForecastCell(row, monthKey));
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        function applyFiltersAndSort(rows, cols) {
            const colByKey = Object.fromEntries(cols.map(c => [c.key, c]));

            let result = rows.filter(row => {
                for (const key in state.colFilters) {
                    const value = state.colFilters[key];
                    if (!value) continue;
                    const col = colByKey[key];
                    if (!col) continue;
                    const cellText = String(col.get(row) || '').toLowerCase();
                    if (cellText.indexOf(String(value).toLowerCase()) === -1) return false;
                }
                return true;
            });

            if (state.sortKey && colByKey[state.sortKey]) {
                const col = colByKey[state.sortKey];
                const dir = state.sortDir === 'desc' ? -1 : 1;
                result.sort((a, b) => {
                    const av = String(col.get(a) || '');
                    const bv = String(col.get(b) || '');
                    if (av === bv) return 0;
                    return av.localeCompare(bv, 'zh-Hans-CN', { sensitivity: 'base' }) * dir;
                });
            }
            return result;
        }

        // ===== 单元格 =====
        function buildForecastCell(row, monthKey) {
            const wrap = document.createElement('span');
            wrap.className = 'sf-cell-wrap';

            const forecast = (row.forecasts && row.forecasts[monthKey]) || null;
            const dirtyKey = row.row_key + '|' + monthKey;
            const dirtyVal = state.dirty.has(dirtyKey) ? Number(state.dirty.get(dirtyKey).latest_qty) : null;

            const baseValue = forecast ? Number(forecast.value_qty || 0) : 0;
            const value = dirtyVal !== null ? dirtyVal : baseValue;

            const input = document.createElement('input');
            input.type = 'number';
            input.min = '0';
            input.step = '1';
            input.className = 'sf-num-input';
            if (forecast && forecast.is_inherited) input.classList.add('is-inherited');
            if (dirtyVal !== null) input.classList.add('is-dirty');
            input.value = String(value || 0);
            input.dataset.rowKey = row.row_key;
            input.dataset.month = monthKey;
            input.dataset.original = String(baseValue || 0);
            input.addEventListener('input', onForecastInputChange);

            wrap.appendChild(input);

            // 角标：来自来源（继承）或来自数据库（已存储）
            if (forecast && forecast.is_inherited && forecast.source && forecast.source.items && forecast.source.items.length) {
                const badge = document.createElement('span');
                badge.className = 'sf-source-badge is-inherited';
                badge.textContent = forecast.source.type === 'platform_sku' ? '继' : '承';
                badge.title = '继承自' + (forecast.source.type === 'platform_sku' ? '销售平台SKU' : '规格+面料') + '：' + formatNumber(forecast.source.total_qty);
                const tipped = makeTooltipWrap(buildSourceTooltip(forecast, monthKey), badge);
                wrap.appendChild(tipped);
            } else if (forecast && forecast.source && forecast.source.items && forecast.source.items.length) {
                const badge = document.createElement('span');
                badge.className = 'sf-source-badge';
                badge.textContent = formatNumber(forecast.source.total_qty);
                const tipped = makeTooltipWrap(buildSourceTooltip(forecast, monthKey, true), badge);
                wrap.appendChild(tipped);
            }

            // 让 cell-meta 时间戳也可悬浮查看
            if (forecast && forecast.cell_meta) {
                input.title = '初始：' + formatNumber(forecast.cell_meta.initial_qty || 0)
                    + '\n上次：' + formatNumber(forecast.cell_meta.prev_qty || 0)
                    + '\n最新：' + formatNumber(forecast.cell_meta.latest_qty || 0)
                    + '\n创建：' + formatDateTime(forecast.cell_meta.created_at)
                    + '\n上次更新：' + formatDateTime(forecast.cell_meta.prev_updated_at)
                    + '\n最新更新：' + formatDateTime(forecast.cell_meta.latest_updated_at);
            }

            return wrap;
        }

        function onForecastInputChange(e) {
            const input = e.target;
            const rowKey = input.dataset.rowKey;
            const month = input.dataset.month;
            const original = Number(input.dataset.original || 0);
            const newVal = Math.max(0, parseInt(input.value, 10) || 0);
            const k = rowKey + '|' + month;
            if (newVal === original) {
                state.dirty.delete(k);
                input.classList.remove('is-dirty');
            } else {
                state.dirty.set(k, { row_key: rowKey, forecast_month: month, latest_qty: newVal });
                input.classList.add('is-dirty');
            }
            refreshBatchPopup();
        }

        function makeTooltipWrap(html, contentNode) {
            const wrap = document.createElement('span');
            wrap.className = 'sf-tooltip-wrap';
            wrap.tabIndex = 0;
            wrap.appendChild(contentNode);
            const bubble = document.createElement('span');
            bubble.className = 'sf-tooltip-bubble';
            bubble.innerHTML = html;
            wrap.appendChild(bubble);
            wrap.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const isPinned = wrap.classList.contains('is-pinned');
                document.querySelectorAll('.sf-tooltip-wrap.is-pinned').forEach(node => {
                    node.classList.remove('is-pinned');
                });
                if (!isPinned) wrap.classList.add('is-pinned');
            });
            return wrap;
        }

        function buildHistoryTooltip(cell, monthKey) {
            const fields = [
                ['月份', monthShortLabel(monthKey)],
                ['销量', formatNumber(cell.sales_qty || 0)],
                ['销售额(净)', formatNumber(cell.net_sales_amount || 0)],
                ['订单数', formatNumber(cell.order_qty || 0)],
                ['会话数', formatNumber(cell.session_total || 0)],
                ['退款金额', formatNumber(cell.refund_amount || 0)],
            ];
            return '<div class="sf-tip-title">来自“产品表现”月聚合</div>'
                + '<dl>' + fields.map(([k, v]) => '<dt>' + k + '</dt><dd>' + (v || '0') + '</dd>').join('') + '</dl>';
        }

        function buildSourceTooltip(forecast, monthKey, hasStored) {
            const src = forecast.source || {};
            const items = src.items || [];
            const title = src.type === 'platform_sku' ? '继承自销售平台SKU 预测' : '继承自 规格+面料 预测';
            const liHtml = items.map(it => {
                if (src.type === 'platform_sku') {
                    return '<li>' + escapeHtml(it.label) + ' = ' + formatNumber(it.qty) + '</li>';
                }
                return '<li>' + escapeHtml(it.label) + ' × ' + (it.ratio || 1) + ' = ' + formatNumber(it.qty) + '</li>';
            }).join('');
            const totalLine = '<dl><dt>合计</dt><dd>' + formatNumber(src.total_qty || 0) + '</dd>'
                + (hasStored ? '<dt>已存储</dt><dd>' + formatNumber(forecast.stored_qty || 0) + '</dd>' : '')
                + '<dt>月份</dt><dd>' + monthShortLabel(monthKey) + '</dd></dl>';
            return '<div class="sf-tip-title">' + title + '</div>'
                + (items.length ? '<ul class="sf-tip-list">' + liHtml + '</ul>' : '')
                + totalLine;
        }

        // ===== 批量保存弹窗 =====
        function refreshBatchPopup() {
            const popup = document.getElementById('sfBatchPopup');
            const summary = document.getElementById('sfBatchPopupSummary');
            if (!popup || !summary) return;
            const total = state.dirty.size;
            summary.textContent = '未保存修改：' + total + ' 条（' + modeLabel(state.forecastMode) + ' 模式）';
            popup.classList.toggle('is-active', total > 0);
        }

        function modeLabel(mode) {
            if (mode === 'platform') return '销售平台SKU';
            if (mode === 'order') return '下单SKU';
            return '规格+面料';
        }

        async function saveAllChanges() {
            if (state.dirty.size <= 0) {
                showToast('没有可保存的修改');
                return;
            }
            const payloadCells = [];
            state.dirty.forEach(item => payloadCells.push(item));
            setLoading(true);
            try {
                const resp = await fetch('/api/sales-forecast-bulk-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ forecast_mode: state.forecastMode, cells: payloadCells }),
                });
                const data = await resp.json();
                if (!data || data.status !== 'success') throw new Error((data && data.message) || '保存失败');
                state.dirty.clear();
                refreshBatchPopup();
                showToast('保存成功，已刷新');
                await loadForecastData();
            } catch (err) {
                showToast(err && err.message ? err.message : '保存失败', true);
            } finally {
                setLoading(false);
            }
        }

        function discardAllChanges() {
            if (state.dirty.size <= 0) return;
            state.dirty.clear();
            refreshBatchPopup();
            renderForecastTableBodyOnly();
        }

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            // 历史范围默认：上个月起回溯 12 个月
            const today = new Date();
            let endY = today.getFullYear();
            let endM = today.getMonth(); // 当前月-1（getMonth=0..11，需先取 month-1）
            if (endM < 1) { endM = 12; endY -= 1; }
            const endKey = endY.toString().padStart(4, '0') + '-' + pad2(endM) + '-01';
            const startKey = shiftMonth(endKey, -11);
            const startEl = document.getElementById('historyStart');
            const endEl = document.getElementById('historyEnd');
            if (startEl) startEl.value = startKey.slice(0, 7);
            if (endEl) endEl.value = endKey.slice(0, 7);

            bindModeSegment();
            setForecastMonthsFuture(6);

            // 月份选择器
            const pickerBtn = document.getElementById('addMonthPickerBtn');
            const pickerPanel = document.getElementById('addMonthPickerPanel');
            const prevYearBtn = document.getElementById('addMonthPickerPrevYear');
            const nextYearBtn = document.getElementById('addMonthPickerNextYear');
            if (pickerBtn) {
                pickerBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleAddMonthPicker(); });
            }
            if (prevYearBtn) {
                prevYearBtn.addEventListener('click', () => { state.monthPickerYear = Number(state.monthPickerYear || new Date().getFullYear()) - 1; renderAddMonthPicker(); });
            }
            if (nextYearBtn) {
                nextYearBtn.addEventListener('click', () => { state.monthPickerYear = Number(state.monthPickerYear || new Date().getFullYear()) + 1; renderAddMonthPicker(); });
            }
            document.addEventListener('click', (e) => {
                if (!pickerPanel) return;
                const pickerRoot = document.getElementById('addMonthPicker');
                if (!pickerRoot) return;
                if (pickerRoot.contains(e.target)) return;
                toggleAddMonthPicker(false);
            });
            document.addEventListener('click', (e) => {
                if (e.target && e.target.closest && e.target.closest('.sf-tooltip-wrap')) return;
                document.querySelectorAll('.sf-tooltip-wrap.is-pinned').forEach(node => {
                    node.classList.remove('is-pinned');
                });
            });

            // 工具栏按钮
            document.getElementById('addMonthAddBtn').addEventListener('click', addForecastMonth);
            document.getElementById('btnLoadForecast').addEventListener('click', loadForecastData);
            document.querySelectorAll('button[data-future]').forEach(btn => {
                btn.addEventListener('click', () => setForecastMonthsFuture(parseInt(btn.dataset.future, 10) || 6));
            });

            // 弹窗
            document.getElementById('sfBatchSaveBtn').addEventListener('click', saveAllChanges);
            document.getElementById('sfBatchDiscardBtn').addEventListener('click', discardAllChanges);

            loadForecastData();
        });
    </script>
</body>
<script src="/static/js/header.js"></script>
