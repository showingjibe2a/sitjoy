<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销量预测</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .sf-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem 1rem;
            padding: 0.6rem 0.75rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(207, 199, 189, 0.55);
            border-radius: 8px;
            margin-bottom: 0.85rem;
        }
        .sf-toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
        }
        .sf-toolbar label {
            font-size: 0.85rem;
            color: var(--morandi-slate);
        }
        .sf-toolbar input[type="text"],
        .sf-toolbar input[type="month"],
        .sf-toolbar input[type="number"],
        .sf-toolbar select {
            padding: 0.35rem 0.55rem;
            border: 1px solid rgba(207, 199, 189, 0.72);
            border-radius: 6px;
            background: #fff;
            font-size: 0.88rem;
            min-width: 0;
        }
        /* Compact month input (smaller height) */
        .sf-toolbar input.sf-compact-month[type="month"]{
            min-height: 28px;
            height: 28px;
            padding: 0.2rem 0.45rem !important;
            border-radius: 10px;
            font-size: 0.82rem;
            border-width: 1px;
            padding-right: 1.6rem !important;
            background-position: right 0.4rem center, 0 0;
            background-size: 14px 14px, auto;
        }
        .sf-toolbar input[type="text"] { min-width: 120px; }
        .sf-toolbar .btn-secondary,
        .sf-toolbar .btn-primary,
        .sf-toolbar .btn-accent { padding: 0.4rem 0.85rem; font-size: 0.88rem; }
        .sf-month-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            align-items: center;
        }
        .sf-month-chip.feature-category-chip {
            padding: 0.2rem 0.55rem;
            font-size: 0.78rem;
        }
        .sf-month-chip-add {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .sf-month-picker-btn {
            min-width: 120px;
            justify-content: space-between;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }
        .sf-month-picker-btn::after {
            content: '\25BC';
            font-size: 0.65rem;
            color: #6f6456;
        }
        .sf-month-picker-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.45rem;
        }
        .sf-month-picker-year {
            font-weight: 600;
            color: #4f463b;
            font-size: 0.9rem;
        }
        .sf-month-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.6rem 0.7rem;
        }
        .sf-month-picker-opt {
            border: 1px solid rgba(207, 199, 189, 0.75);
            background: #f8f3e9;
            border-radius: 8px;
            height: 34px;
            min-width: 56px;
            width: 100%;
            font-size: 0.84rem;
            color: #4f463b;
            cursor: pointer;
            text-align: center;
        }
        .sf-month-picker-opt:hover {
            background: #f0e7d7;
            border-color: #cabda9;
        }
        .sf-month-picker-popover {
            position: fixed;
            z-index: 5900;
            width: 268px;
            padding: 0.62rem;
            background: rgba(243, 240, 236, 0.98);
            border: 1px solid rgba(207, 199, 189, 0.9);
            border-radius: 12px;
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.2);
            display: none;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.16s ease, transform 0.16s ease;
            pointer-events: none;
            box-sizing: border-box;
        }
        .sf-month-picker-popover.is-open {
            display: block;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .sf-month-picker-popover .sf-month-picker-head {
            margin-bottom: 0.45rem;
        }
        .sf-month-picker-opt.is-active {
            background: #ede2cb;
            border-color: #b7a78c;
            font-weight: 700;
        }
        .sf-month-input-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .sf-month-input-wrap input[type="month"] {
            padding-right: 1.6rem;
            cursor: pointer;
        }
        .sf-divider {
            width: 1px;
            height: 22px;
            background: rgba(207, 199, 189, 0.72);
        }

        .sf-table-wrap {
            border: 1px solid rgba(207, 199, 189, 0.55);
            border-radius: 8px;
            background: #fff;
            overflow: auto;
            max-height: calc(100vh - 230px);
            position: relative;
        }
        table.sf-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            font-size: 0.85rem;
            table-layout: fixed;
        }
        table.sf-table thead th {
            position: sticky;
            background: #f5efe5;
            color: var(--morandi-ink);
            border-bottom: 1px solid rgba(207, 199, 189, 0.85);
            padding: 0.45rem 0.55rem;
            font-weight: 600;
            text-align: left;
            white-space: nowrap;
            z-index: 4;
            box-sizing: border-box;
        }
        table.sf-table thead tr.sf-thead-row-1 th {
            top: 0;
            background: #ece2cf;
            white-space: nowrap;
            height: 34px;
            padding-top: 0.3rem;
            padding-bottom: 0.3rem;
        }
        table.sf-table thead tr.sf-thead-row-2 th { top: var(--sf-thead-row1-height, 34px); background: #f5efe5; }
        table.sf-table thead tr.sf-thead-row-1 th { z-index: 6; cursor: default; }
        table.sf-table thead tr.sf-thead-row-2 th { z-index: 5; }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-spec { background: #f3ecdf; }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-history { background: #f0ece1; }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-month { background: #ede2cb; }
        table.sf-table thead th.sf-th-section {
            text-align: center;
            font-weight: 700;
            color: #4f463b;
        }
        /* Column resize handle (like warehouse dashboard) */
        table.sf-table thead th { position: sticky; }
        .sf-col-resize-handle{
            position: absolute;
            top: 0;
            right: -6px;
            width: 12px;
            height: 100%;
            cursor: col-resize;
            z-index: 30;
        }
        .sf-col-resize-handle::after{
            content: '';
            position: absolute;
            left: 50%;
            top: 18%;
            width: 3px;
            height: 64%;
            transform: translateX(-50%);
            border-radius: 2px;
            background: rgba(123, 109, 92, 0.55);
            opacity: 0.25;
            transition: opacity 0.15s ease;
        }
        th:hover .sf-col-resize-handle::after{ opacity: 0.95; }
        table.sf-table tbody td {
            padding: 0.4rem 0.55rem;
            border-bottom: 1px solid rgba(207, 199, 189, 0.42);
            vertical-align: middle;
            white-space: nowrap;
            box-sizing: border-box;
        }
        table.sf-table tbody tr:nth-child(odd) td { background: #fdfbf6; }
        table.sf-table tbody tr:nth-child(even) td { background: #fbf6ec; }
        td.sf-cell-spec {
            min-width: 0;
            white-space: normal;
            line-height: 1.25;
        }
        td.sf-cell-spec .sf-spec-sub {
            color: var(--morandi-slate);
            font-size: 0.78rem;
        }
        td.sf-cell-fabric { min-width: 0; white-space: normal; line-height: 1.2; }
        td.sf-cell-thumb,
        th.sf-th-thumb {
            width: 68px;
            min-width: 68px;
            text-align: center;
        }
        .sf-variant-thumb {
            width: 44px;
            height: 44px;
            object-fit: contain;
            display: inline-block;
            background: #fff;
            border: 1px solid rgba(207, 199, 189, 0.8);
            border-radius: 8px;
        }
        .sf-thumb-empty {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border: 1px dashed rgba(207, 199, 189, 0.8);
            border-radius: 8px;
            color: #9a8f7e;
            font-size: 11px;
        }
        .sf-fabric-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 999px;
            border: 1px solid rgba(42, 36, 32, 0.28);
            vertical-align: middle;
        }
        .sf-group-row td {
            background: #efe7d9 !important;
            color: #4f463b;
            font-weight: 700;
            border-top: 1px solid rgba(207, 199, 189, 0.85);
            cursor: pointer;
        }
        .sf-group-toggle {
            display: inline-flex;
            width: 18px;
            justify-content: center;
            color: #7a7269;
            margin-right: 4px;
        }
        .sf-row-hidden {
            display: none;
        }
        .sf-th-section-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            user-select: none;
        }
        .sf-th-section-toggle .sf-group-toggle {
            margin-right: 0;
        }
        td.sf-cell-history {
            text-align: right;
            font-variant-numeric: tabular-nums;
            color: #5b5346;
        }
        /* Excel-like selection spotlight */
        td.sf-cell-history.sf-cell-selected{
            box-shadow: inset 0 0 0 2px rgba(80, 120, 170, 0.85);
            background: rgba(80, 120, 170, 0.10) !important;
        }
        tr.sf-spotlight-row td{
            background: rgba(80, 120, 170, 0.04);
        }
        td.sf-spotlight-col{
            background: rgba(80, 120, 170, 0.04) !important;
        }
        th.sf-spotlight-col{
            box-shadow: inset 0 -2px 0 rgba(80, 120, 170, 0.75);
        }
        td.sf-cell-forecast {
            text-align: right;
            position: relative;
        }

        .sf-num-input {
            width: 64px;
            padding: 0.12rem 0.28rem;
            border: 1px solid rgba(207, 199, 189, 0.72);
            border-radius: 4px;
            font-size: 0.8rem;
            background: #fff;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .sf-num-input.is-dirty {
            border-color: #b67f7f;
            background: #fff6ee;
        }
        .sf-num-input.is-inherited {
            background: #f0f4ec;
            color: #4f5e44;
            border-style: dashed;
        }

        .sf-cell-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
        }
        .sf-source-badge {
            position: absolute;
            top: -7px;
            right: -7px;
            min-width: 20px;
            height: 16px;
            padding: 0 4px;
            border-radius: 8px;
            background: #7b9ab0;
            color: #fff;
            font-size: 10px;
            line-height: 16px;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 1px 4px rgba(35,28,20,0.2);
            cursor: help;
        }
        .sf-source-badge.is-inherited { background: #b67f7f; }

        .sf-tooltip-wrap {
            position: relative;
            display: block;
            width: 100%;
            z-index: 1;
            isolation: isolate;
        }
        .sf-tooltip-content{
            display: block;
            width: 100%;
            text-align: right;
        }
        .sf-tooltip-wrap:hover,
        .sf-tooltip-wrap:focus-within,
        .sf-tooltip-wrap.is-pinned {
            z-index: 1200;
        }
        .sf-tooltip-bubble {
            position: absolute;
            z-index: 1201;
            top: 100%;
            right: 0;
            min-width: 240px;
            max-width: 360px;
            background: rgba(47, 47, 51, 0.95);
            color: #ece7df;
            padding: 6px 8px;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.45;
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
            display: none;
            white-space: normal;
        }
        .sf-tooltip-wrap:hover .sf-tooltip-bubble,
        .sf-tooltip-wrap:focus-within .sf-tooltip-bubble,
        .sf-tooltip-wrap.is-pinned .sf-tooltip-bubble {
            display: block;
        }
        .sf-tooltip-bubble dl {
            margin: 0;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.18rem 0.5rem;
        }
        .sf-tooltip-bubble dt { color: #d6cfbf; font-weight: 500; }
        .sf-tooltip-bubble dd { margin: 0; color: #fff; word-break: break-all; }
        .sf-tooltip-bubble .sf-tip-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #fff;
        }
        .sf-tooltip-bubble ul.sf-tip-list { padding-left: 1rem; margin: 0.25rem 0 0; }
        .sf-tooltip-bubble ul.sf-tip-list li { margin-bottom: 0.15rem; }

        .sf-empty {
            text-align: center;
            color: var(--morandi-slate);
            padding: 1.6rem 0;
        }
        .sf-loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            color: var(--morandi-slate);
            z-index: 10;
        }
        .sf-loading-overlay.is-active { display: flex; }

        /* 表头筛选/排序行（可点击） */
        .sf-th-cell {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sf-th-title-row {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            user-select: none;
        }
        .sf-th-title-row .sf-sort-arrow {
            font-size: 10px;
            color: #8b7c63;
        }
        .sf-th-title-row.is-disabled {
            cursor: default;
        }
        .sf-th-title-row.is-disabled .sf-sort-arrow {
            visibility: hidden;
        }
        .sf-th-filter {
            width: 100%;
            padding: 0.18rem 0.35rem;
            border: 1px solid rgba(207, 199, 189, 0.85);
            border-radius: 5px;
            font-size: 0.78rem;
            background: #fff;
        }

        /* 右下角批量处理弹窗 */
        .sf-batch-popup {
            position: fixed;
            right: 24px;
            bottom: 24px;
            min-width: 280px;
            max-width: 360px;
            background: #fff;
            border: 1px solid rgba(207, 199, 189, 0.85);
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(35, 28, 20, 0.2);
            padding: 0.85rem 1rem;
            z-index: 50;
            display: none;
        }
        .sf-batch-popup.is-active { display: block; }
        .sf-batch-popup-title {
            font-weight: 700;
            color: #4f463b;
            margin-bottom: 0.35rem;
            font-size: 0.95rem;
        }
        .sf-batch-popup-summary {
            color: var(--morandi-slate);
            font-size: 0.82rem;
            margin-bottom: 0.6rem;
        }
        .sf-batch-popup-actions {
            display: flex;
            gap: 0.45rem;
            justify-content: flex-end;
        }

        .sf-mode-bar {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.2rem;">
            <h2>销量预测</h2>
            <p>支持按销售平台SKU、规格+面料、下单SKU 三种维度预测；规格/下单SKU 可继承上层预测自动估算。</p>
        </section>

        <div class="card pm-card" style="padding: 0.9rem 1rem;">
            <div class="sf-toolbar">
                <div class="sf-toolbar-group">
                    <label>预测维度：</label>
                    <div class="sf-mode-bar">
                        <input type="hidden" id="forecastModeVal" value="spec">
                        <div class="status-segment status-segment--inline" id="forecastModeSegment" data-value="spec">
                            <button type="button" class="status-pill status-pill--enabled" data-value="platform">销售平台SKU</button>
                            <button type="button" class="status-pill status-pill--enabled is-active" data-value="spec">规格+面料</button>
                            <button type="button" class="status-pill status-pill--enabled" data-value="order">下单SKU</button>
                        </div>
                    </div>
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <label>预测月份：</label>
                    <div id="forecastMonthChips" class="sf-month-chip-row"></div>
                    <div class="sf-month-chip-add">
                        <input type="hidden" id="addMonthInput">
                        <button type="button" class="btn-secondary sf-month-picker-btn" id="addMonthPickerBtn">选择月份</button>
                        <button class="btn-secondary" id="addMonthAddBtn" type="button">添加</button>
                    </div>
                    <button class="btn-secondary" type="button" data-future="3">未来3月</button>
                    <button class="btn-secondary" type="button" data-future="6">未来6月</button>
                    <button class="btn-secondary" type="button" data-future="12">未来12月</button>
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <label>历史销量范围：</label>
                    <span class="sf-month-input-wrap"><input type="month" id="historyStart" class="sf-compact-month" readonly></span>
                    <span>至</span>
                    <span class="sf-month-input-wrap"><input type="month" id="historyEnd" class="sf-compact-month" readonly></span>
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <label>筛选：</label>
                    <input type="text" id="filterShop" placeholder="店铺">
                    <input type="text" id="filterSku" placeholder="货号/平台SKU">
                    <input type="text" id="filterSpec" placeholder="规格">
                    <input type="text" id="filterFabric" placeholder="面料">
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <button class="btn-primary" id="btnLoadForecast" type="button">加载/刷新</button>
                </div>
            </div>
        </div>

        <div class="sf-table-wrap" id="forecastTableWrap">
            <table class="sf-table" id="forecastTable" data-disable-table-manage="1">
                <thead id="forecastThead"></thead>
                <tbody id="forecastTbody"></tbody>
            </table>
            <div class="sf-loading-overlay" id="forecastLoading">数据加载中…</div>
            <div class="sf-selection-hint" id="sfSelectionHint" style="display:none;">
                已选 <span id="sfSelectionCount">0</span> 个历史单元格。
                <button type="button" class="btn-secondary btn-small" id="sfSelectionClearBtn" style="margin-left:0.4rem;">清空选择</button>
                <button type="button" class="btn-secondary btn-small" id="sfSelectionShowPerfBtn" style="margin-left:0.35rem;">查看产品表现</button>
            </div>
        </div>
    </div>

    <div class="sf-batch-popup" id="sfBatchPopup">
        <div class="sf-batch-popup-title">待保存修改</div>
        <div class="sf-batch-popup-summary" id="sfBatchPopupSummary">未保存修改：0 条</div>
        <div class="sf-batch-popup-actions">
            <button class="btn-secondary" type="button" id="sfBatchDiscardBtn">放弃</button>
            <button class="btn-accent" type="button" id="sfBatchSaveBtn">批量保存</button>
        </div>
    </div>

    <script>
        const FORECAST_MODES = ['platform', 'spec', 'order'];
        const SF_PREF_HISTORY_EXPANDED_KEY = 'sales_forecast_history_expanded_v1';
        const SF_PREF_FORECAST_EXPANDED_KEY = 'sales_forecast_forecast_expanded_v1';
        const SF_PREF_COL_WIDTHS_PREFIX = 'sales_forecast_col_widths_v1_';

        const state = {
            forecastMode: 'spec',
            months: [],
            historyMonths: [],
            historyRange: { start: '', end: '' },
            rows: [],                       // 当前模式的行
            dirty: new Map(),               // key: row_key|month -> { row_key, forecast_month, latest_qty }
            sortKey: '',
            sortDir: 'asc',
            colFilters: {},                 // colKey -> string
            monthPickerYear: new Date().getFullYear(),
            historyExpanded: true,
            forecastExpanded: true,
            collapsedPlatformGroups: new Set(),
            collapsedSkuGroups: new Set(),
            selectedHistoryCells: new Set(), // key: row_key|monthKey
            selectionAnchor: null,           // { rowKey, monthKey }
        };

        function readBoolPref(key, fallback) {
            try {
                const raw = String(localStorage.getItem(key) || '').trim().toLowerCase();
                if (raw === '1' || raw === 'true') return true;
                if (raw === '0' || raw === 'false') return false;
            } catch (e) {}
            return !!fallback;
        }

        function writeBoolPref(key, value) {
            try { localStorage.setItem(key, value ? '1' : '0'); } catch (e) {}
        }

        function readJsonPref(key, fallback) {
            try {
                const raw = String(localStorage.getItem(key) || '').trim();
                if (!raw) return fallback;
                const obj = JSON.parse(raw);
                return (obj && typeof obj === 'object') ? obj : fallback;
            } catch (e) { return fallback; }
        }

        function writeJsonPref(key, value) {
            try { localStorage.setItem(key, JSON.stringify(value || {})); } catch (e) {}
        }

        function colWidthPrefKey(mode) {
            const m = String(mode || '').trim().toLowerCase();
            return SF_PREF_COL_WIDTHS_PREFIX + (FORECAST_MODES.includes(m) ? m : 'spec');
        }

        function getDefaultColWidthByKey(key) {
            const k = String(key || '').trim();
            if (k === 'thumb') return 68;
            if (k === 'fabric_code') return 136;
            if (k === 'platform_sku' || k === 'sku') return 150;
            if (k === 'shop_name' || k === 'sku_family') return 132;
            return 128;
        }

        function loadColWidthPrefs(mode) {
            const pref = readJsonPref(colWidthPrefKey(mode), {}) || {};
            const spec = (pref && pref.spec && typeof pref.spec === 'object') ? pref.spec : {};
            const history = Number(pref && pref.history);
            const forecast = Number(pref && pref.forecast);
            return {
                spec,
                history: Number.isFinite(history) && history > 30 ? history : 86,
                forecast: Number.isFinite(forecast) && forecast > 30 ? forecast : 86,
            };
        }

        function saveColWidthPrefs(mode, cols, meta, leafColWidths) {
            const pref = loadColWidthPrefs(mode);
            const spec = Object.assign({}, pref.spec || {});
            const specCount = Number(meta && meta.specCount) || 0;
            for (let i = 0; i < Math.min(specCount, cols.length); i++) {
                const key = String(cols[i].key || '').trim();
                if (!key) continue;
                const w = Number(leafColWidths[i] || 0);
                if (Number.isFinite(w) && w > 30) spec[key] = Math.round(w);
            }
            let history = pref.history;
            let forecast = pref.forecast;
            if (meta && meta.historyStart != null && meta.historyStart >= 0 && meta.histCols > 0) {
                history = Math.round(Number(leafColWidths[meta.historyStart] || history));
            }
            if (meta && meta.forecastStart != null && meta.forecastStart >= 0 && meta.fcCols > 0) {
                forecast = Math.round(Number(leafColWidths[meta.forecastStart] || forecast));
            }
            writeJsonPref(colWidthPrefKey(mode), { v: 1, spec, history, forecast, updated_at: Date.now() });
        }

        function pad2(n) { n = Number(n) || 0; return n < 10 ? ('0' + n) : ('' + n); }

        function monthKeyFromValue(value) {
            if (!value) return '';
            const text = String(value).trim();
            const m = text.match(/^(\d{4})\D*(\d{1,2})/);
            if (!m) return '';
            const year = parseInt(m[1], 10);
            const month = parseInt(m[2], 10);
            if (!year || !month || month < 1 || month > 12) return '';
            return year.toString().padStart(4, '0') + '-' + pad2(month) + '-01';
        }

        function monthShortLabel(monthKey) {
            return monthKey ? monthKey.slice(0, 7) : '';
        }

        function todayMonthKey() {
            const d = new Date();
            return d.getFullYear().toString().padStart(4, '0') + '-' + pad2(d.getMonth() + 1) + '-01';
        }

        function shiftMonth(monthKey, delta) {
            if (!monthKey) return '';
            const [y, m] = monthKey.split('-').map(s => parseInt(s, 10));
            let year = y;
            let month = m + delta;
            while (month < 1) { month += 12; year -= 1; }
            while (month > 12) { month -= 12; year += 1; }
            return year.toString().padStart(4, '0') + '-' + pad2(month) + '-01';
        }

        function setForecastMonthsFuture(count) {
            const list = [];
            const start = todayMonthKey();
            for (let i = 0; i < count; i++) list.push(shiftMonth(start, i));
            state.months = list;
            renderMonthChips();
        }

        function addForecastMonth() {
            const el = document.getElementById('addMonthInput');
            const val = monthKeyFromValue(el && el.value);
            if (!val) return;
            if (state.months.indexOf(val) === -1) {
                state.months.push(val);
                state.months.sort();
                renderMonthChips();
            }
            if (el) el.value = '';
            const pickerBtn = document.getElementById('addMonthPickerBtn');
            if (pickerBtn) pickerBtn.textContent = '选择月份';
        }

        function removeForecastMonth(monthKey) {
            state.months = state.months.filter(m => m !== monthKey);
            renderMonthChips();
        }

        function renderMonthChips() {
            const host = document.getElementById('forecastMonthChips');
            if (!host) return;
            host.innerHTML = '';
            state.months.forEach(m => {
                const chip = document.createElement('span');
                chip.className = 'sf-month-chip feature-category-chip';
                chip.innerHTML = '<span>' + monthShortLabel(m) + '</span>';
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.title = '移除';
                btn.textContent = '×';
                btn.className = 'feature-category-remove';
                btn.addEventListener('click', () => removeForecastMonth(m));
                chip.appendChild(btn);
                host.appendChild(chip);
            });
        }

        function renderAddMonthPicker() {
            // compat noop: replaced by global month dialog
        }

        function positionSfMonthPopoverNear(anchor, panel) {
            if (!anchor || !panel) return;
            const rect = anchor.getBoundingClientRect();
            const vw = window.innerWidth || document.documentElement.clientWidth || 0;
            const vh = window.innerHeight || document.documentElement.clientHeight || 0;
            panel.style.visibility = 'hidden';
            panel.style.display = 'block';
            const pr = panel.getBoundingClientRect();
            let left = rect.left;
            if (left + pr.width > vw - 8) left = vw - pr.width - 8;
            left = Math.max(8, left);
            let top = rect.bottom + 8;
            if (top + pr.height > vh - 8) top = rect.top - pr.height - 8;
            top = Math.max(8, top);
            panel.style.left = `${left}px`;
            panel.style.top = `${top}px`;
            panel.style.visibility = 'visible';
        }

        function ensureGlobalMonthPickerDialog() {
            if (window.__sfGlobalMonthPickerReady) return;
            window.__sfGlobalMonthPickerReady = true;
            window.__sfGlobalMonthPickerState = { year: new Date().getFullYear(), selected: '', anchor: null };
            const panel = document.createElement('div');
            panel.id = 'sfGlobalMonthPickerPopover';
            panel.className = 'sf-month-picker-popover';
            panel.innerHTML = `
                <div class="sf-month-picker-head">
                    <button type="button" class="btn-ghost" id="sfGlobalMonthPrevYear">&#9664;</button>
                    <span class="sf-month-picker-year" id="sfGlobalMonthYearLabel"></span>
                    <button type="button" class="btn-ghost" id="sfGlobalMonthNextYear">&#9654;</button>
                </div>
                <div class="sf-month-picker-grid" id="sfGlobalMonthGrid"></div>
            `;
            document.body.appendChild(panel);
            const render = () => {
                const st = window.__sfGlobalMonthPickerState || {};
                const year = Number(st.year || new Date().getFullYear());
                st.year = year;
                window.__sfGlobalMonthPickerState = st;
                const yearLabel = document.getElementById('sfGlobalMonthYearLabel');
                const grid = document.getElementById('sfGlobalMonthGrid');
                if (yearLabel) yearLabel.textContent = String(year);
                if (!grid) return;
                const selected = String(st.selected || '');
                grid.innerHTML = Array.from({ length: 12 }).map((_, idx) => {
                    const monthNo = idx + 1;
                    const ymd = String(year).padStart(4, '0') + '-' + pad2(monthNo);
                    const active = selected === ymd ? ' is-active' : '';
                    return `<button type="button" class="sf-month-picker-opt${active}" data-month="${monthNo}">${pad2(monthNo)}月</button>`;
                }).join('');
                grid.querySelectorAll('.sf-month-picker-opt[data-month]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const monthNo = Math.max(1, Math.min(12, parseInt(btn.dataset.month || '1', 10) || 1));
                        const picked = String(year).padStart(4, '0') + '-' + pad2(monthNo);
                        const cb = window.__sfGlobalMonthPickerState && window.__sfGlobalMonthPickerState.onPick;
                        closeGlobalMonthPickerDialog();
                        if (typeof cb === 'function') cb(picked);
                    });
                });
                if (st.anchor) positionSfMonthPopoverNear(st.anchor, panel);
            };
            const open = (opts) => {
                const conf = opts || {};
                const anchor = conf.anchor;
                if (!anchor || !anchor.getBoundingClientRect) return;
                const st = window.__sfGlobalMonthPickerState || {};
                st.anchor = anchor;
                const initVal = String(conf.value || '').trim();
                st.selected = /^\d{4}-\d{2}$/.test(initVal) ? initVal : '';
                st.year = st.selected ? parseInt(st.selected.slice(0, 4), 10) : (Number(conf.year || new Date().getFullYear()) || new Date().getFullYear());
                st.onPick = typeof conf.onPick === 'function' ? conf.onPick : null;
                window.__sfGlobalMonthPickerState = st;
                render();
                panel.classList.add('is-open');
                if (window.__sfMonthOutsideCloser) {
                    document.removeEventListener('mousedown', window.__sfMonthOutsideCloser, true);
                    window.__sfMonthOutsideCloser = null;
                }
                window.__sfMonthOutsideCloser = (ev) => {
                    if (!panel.classList.contains('is-open')) return;
                    const t = ev.target;
                    if (panel.contains(t)) return;
                    if (anchor === t || (anchor.contains && anchor.contains(t))) return;
                    closeGlobalMonthPickerDialog();
                };
                window.requestAnimationFrame(() => {
                    document.addEventListener('mousedown', window.__sfMonthOutsideCloser, true);
                });
            };
            document.getElementById('sfGlobalMonthPrevYear').addEventListener('click', (e) => {
                e.stopPropagation();
                const st = window.__sfGlobalMonthPickerState || {};
                st.year = Number(st.year || new Date().getFullYear()) - 1;
                window.__sfGlobalMonthPickerState = st;
                render();
            });
            document.getElementById('sfGlobalMonthNextYear').addEventListener('click', (e) => {
                e.stopPropagation();
                const st = window.__sfGlobalMonthPickerState || {};
                st.year = Number(st.year || new Date().getFullYear()) + 1;
                window.__sfGlobalMonthPickerState = st;
                render();
            });
            window.showGlobalMonthPickerDialog = open;
            window.addEventListener('scroll', () => {
                const p = document.getElementById('sfGlobalMonthPickerPopover');
                const st = window.__sfGlobalMonthPickerState;
                if (p && p.classList.contains('is-open') && st && st.anchor) positionSfMonthPopoverNear(st.anchor, p);
            }, true);
            window.addEventListener('resize', () => {
                const p = document.getElementById('sfGlobalMonthPickerPopover');
                const st = window.__sfGlobalMonthPickerState;
                if (p && p.classList.contains('is-open') && st && st.anchor) positionSfMonthPopoverNear(st.anchor, p);
            });
            document.addEventListener('keydown', (e) => {
                if (e.key !== 'Escape') return;
                const p = document.getElementById('sfGlobalMonthPickerPopover');
                if (p && p.classList.contains('is-open')) {
                    e.preventDefault();
                    closeGlobalMonthPickerDialog();
                }
            });
        }

        function closeGlobalMonthPickerDialog() {
            const panel = document.getElementById('sfGlobalMonthPickerPopover');
            if (window.__sfMonthOutsideCloser) {
                document.removeEventListener('mousedown', window.__sfMonthOutsideCloser, true);
                window.__sfMonthOutsideCloser = null;
            }
            if (!panel) return;
            panel.classList.remove('is-open');
            panel.style.display = 'none';
            panel.style.visibility = '';
            const st = window.__sfGlobalMonthPickerState || {};
            st.anchor = null;
            window.__sfGlobalMonthPickerState = st;
        }

        function setLoading(active) {
            const overlay = document.getElementById('forecastLoading');
            if (overlay) overlay.classList.toggle('is-active', !!active);
        }

        function showToast(message, isError) {
            if (window.showAppToast) window.showAppToast(message, !!isError, isError ? 0 : 2200);
            else console.log(message);
        }

        function escapeHtml(text) {
            const s = String(text == null ? '' : text);
            return s
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatNumber(value) {
            if (value === null || value === undefined || value === '') return '';
            const num = Number(value);
            if (!isFinite(num)) return '';
            return num.toLocaleString('en-US', { maximumFractionDigits: 0 });
        }

        function formatDateTime(value) {
            if (!value) return '—';
            return String(value);
        }

        // ===== 模式切换 =====
        function bindModeSegment() {
            const seg = document.getElementById('forecastModeSegment');
            if (!seg) return;
            seg.addEventListener('click', (e) => {
                const btn = e.target && e.target.closest ? e.target.closest('.status-pill[data-value]') : null;
                if (!btn) return;
                const next = String(btn.dataset.value || '');
                if (!FORECAST_MODES.includes(next)) return;
                if (next === state.forecastMode) return;
                if (state.dirty.size > 0) {
                    const ok = window.confirm('当前有未保存的修改，切换模式会丢弃修改，是否继续？');
                    if (!ok) return;
                    state.dirty.clear();
                    refreshBatchPopup();
                }
                setForecastMode(next);
                loadForecastData();
            });
        }

        function setForecastMode(mode) {
            state.forecastMode = mode;
            const seg = document.getElementById('forecastModeSegment');
            const hidden = document.getElementById('forecastModeVal');
            if (hidden) hidden.value = mode;
            if (seg) {
                seg.dataset.value = mode;
                seg.querySelectorAll('.status-pill').forEach(b => b.classList.toggle('is-active', String(b.dataset.value || '') === mode));
            }
            // 切模式时清空筛选/排序，避免列不存在
            state.sortKey = '';
            state.sortDir = 'asc';
            state.colFilters = {};
        }

        // ===== 数据加载 =====
        async function loadForecastData() {
            const monthsParam = (state.months || []).map(m => m.slice(0, 7)).join(',');
            const histStartEl = document.getElementById('historyStart');
            const histEndEl = document.getElementById('historyEnd');
            const shopEl = document.getElementById('filterShop');
            const skuEl = document.getElementById('filterSku');
            const specEl = document.getElementById('filterSpec');
            const fabricEl = document.getElementById('filterFabric');

            const params = new URLSearchParams();
            params.set('forecast_mode', state.forecastMode);
            if (monthsParam) params.set('months', monthsParam);
            if (histStartEl && histStartEl.value) params.set('history_start', histStartEl.value);
            if (histEndEl && histEndEl.value) params.set('history_end', histEndEl.value);
            if (shopEl && shopEl.value.trim()) params.set('shop', shopEl.value.trim());
            if (skuEl && skuEl.value.trim()) params.set('sku', skuEl.value.trim());
            if (specEl && specEl.value.trim()) params.set('spec', specEl.value.trim());
            if (fabricEl && fabricEl.value.trim()) params.set('fabric', fabricEl.value.trim());

            setLoading(true);
            try {
                const resp = await fetch('/api/sales-forecast?' + params.toString());
                const data = await resp.json();
                if (!data || data.status !== 'success') throw new Error((data && data.message) || '加载失败');
                applyDashboardPayload(data);
                renderForecastTable();
            } catch (err) {
                showToast(err && err.message ? err.message : '加载失败', true);
            } finally {
                setLoading(false);
            }
        }

        function applyDashboardPayload(data) {
            state.months = Array.isArray(data.months) ? data.months.slice() : state.months;
            state.historyMonths = Array.isArray(data.history_months) ? data.history_months.slice() : [];
            state.historyRange = data.history_range || { start: '', end: '' };
            state.rows = Array.isArray(data.rows) ? data.rows : [];
            if (state.forecastMode === 'platform') state.collapsedPlatformGroups.clear();
            else state.collapsedSkuGroups.clear();
            state.dirty.clear();
            refreshBatchPopup();
            renderMonthChips();
            const histStartEl = document.getElementById('historyStart');
            const histEndEl = document.getElementById('historyEnd');
            if (histStartEl && state.historyRange.start) histStartEl.value = state.historyRange.start.slice(0, 7);
            if (histEndEl && state.historyRange.end) histEndEl.value = state.historyRange.end.slice(0, 7);
        }

        // ===== 列定义 =====
        function getColumnsForMode(mode) {
            if (mode === 'platform') {
                return [
                    { key: 'shop_name', label: '店铺', filter: true, sort: false, cellClass: 'sf-cell-spec', get: r => r.labels.shop_name || '' },
                    { key: 'sku_family', label: '货号', filter: true, sort: false, cellClass: 'sf-cell-spec', get: r => r.labels.sku_family || '' },
                    { key: 'thumb', label: '缩略图', filter: false, sort: false, thClass: 'sf-th-thumb', cellClass: 'sf-cell-thumb', get: r => r.labels.variant_thumb_b64 || '' },
                    { key: 'platform_sku', label: 'SKU', filter: true, sort: false, cellClass: 'sf-cell-spec', get: r => r.labels.platform_sku || '' },
                    { key: 'spec_name', label: '规格', filter: true, sort: true, cellClass: 'sf-cell-spec', get: r => r.labels.spec_name || '' },
                    { key: 'fabric_code', label: '面料代表色', filter: true, sort: true, cellClass: 'sf-cell-fabric', get: r => r.labels.fabric_code || r.labels.fabric_name_en || '' },
                ];
            }
            if (mode === 'order') {
                return [
                    { key: 'sku_family', label: '货号', filter: true, sort: false, cellClass: 'sf-cell-spec', get: r => r.labels.sku_family || '' },
                    { key: 'sku', label: '下单SKU', filter: true, sort: true, cellClass: 'sf-cell-spec', get: r => r.labels.sku || '' },
                    { key: 'spec_qty_short', label: '规格', filter: true, sort: true, cellClass: 'sf-cell-spec', get: r => r.labels.spec_qty_short || '' },
                    { key: 'fabric_code', label: '面料', filter: true, sort: true, cellClass: 'sf-cell-fabric', get: r => r.labels.fabric_code || r.labels.fabric_name_en || '' },
                ];
            }
            return [
                { key: 'sku_family', label: '货号', filter: true, sort: false, cellClass: 'sf-cell-spec', get: r => r.labels.sku_family || '' },
                { key: 'thumb', label: '缩略图', filter: false, sort: false, thClass: 'sf-th-thumb', cellClass: 'sf-cell-thumb', get: r => r.labels.variant_thumb_b64 || '' },
                { key: 'spec_name', label: '规格', filter: true, sort: true, cellClass: 'sf-cell-spec', get: r => r.labels.spec_name || '' },
                { key: 'fabric_code', label: '面料', filter: true, sort: true, cellClass: 'sf-cell-fabric', get: r => r.labels.fabric_code || r.labels.fabric_name_en || '' },
            ];
        }

        function normalizeColorHex(text) {
            const s = String(text || '').trim();
            if (!s) return '';
            if (/^#[0-9a-fA-F]{6}$/.test(s)) return s;
            if (/^[0-9a-fA-F]{6}$/.test(s)) return `#${s}`;
            return '';
        }

        function applyFilters(rows, cols) {
            const colByKey = Object.fromEntries(cols.map(c => [c.key, c]));
            return rows.filter(row => {
                for (const key in state.colFilters) {
                    const value = state.colFilters[key];
                    if (!value) continue;
                    const col = colByKey[key];
                    if (!col) continue;
                    const cellText = String(col.get(row) || '').toLowerCase();
                    if (cellText.indexOf(String(value).toLowerCase()) === -1) return false;
                }
                return true;
            });
        }

        function buildGroups(rows) {
            if (state.forecastMode === 'platform') {
                const map = new Map();
                rows.forEach(row => {
                    const shop = String(row.labels && row.labels.shop_name || '-').trim() || '-';
                    const family = String(row.labels && row.labels.sku_family || '-').trim() || '-';
                    const key = `${shop}||${family}`;
                    if (!map.has(key)) map.set(key, { key, title: `${shop} / ${family}`, items: [] });
                    map.get(key).items.push(row);
                });
                return Array.from(map.values());
            }
            const map = new Map();
            rows.forEach(row => {
                const family = String(row.labels && row.labels.sku_family || '-').trim() || '-';
                if (!map.has(family)) map.set(family, { key: family, title: family, items: [] });
                map.get(family).items.push(row);
            });
            return Array.from(map.values());
        }

        function sortGroupItems(items, cols) {
            if (!state.sortKey) return items.slice();
            const col = cols.find(c => c.key === state.sortKey);
            if (!col || !col.sort) return items.slice();
            const dir = state.sortDir === 'desc' ? -1 : 1;
            return items.slice().sort((a, b) => {
                const av = String(col.get(a) || '');
                const bv = String(col.get(b) || '');
                if (av === bv) return 0;
                return av.localeCompare(bv, 'zh-Hans-CN', { sensitivity: 'base' }) * dir;
            });
        }

        function getCollapsedSet() {
            return state.forecastMode === 'platform' ? state.collapsedPlatformGroups : state.collapsedSkuGroups;
        }

        function initCollapsedGroups(groups) {
            const target = getCollapsedSet();
            target.clear();
            groups.forEach(g => target.add(g.key));
        }

        function renderSpecCell(td, col, row) {
            if (col.key === 'thumb') {
                const b64 = String(col.get(row) || '').trim();
                if (b64) {
                    td.innerHTML = `<img class="sf-variant-thumb" src="/api/image-preview?id=${encodeURIComponent(b64)}&mode=thumb&w=120&q=60" alt="thumb" loading="lazy">`;
                } else {
                    td.innerHTML = '<span class="sf-thumb-empty">暂无</span>';
                }
                return;
            }
            if (col.key === 'fabric_code') {
                const color = normalizeColorHex(row.labels && row.labels.representative_color);
                const txt = String(col.get(row) || '');
                if (color) td.innerHTML = `<span class="sf-fabric-dot" style="background:${color};" title="${escapeHtml(txt || '面料')}"></span>`;
                else td.innerHTML = `<span>${escapeHtml(txt || '—')}</span>`;
                return;
            }
            td.innerHTML = `<div>${escapeHtml(String(col.get(row) || '—') || '—')}</div>`;
        }

        function renderForecastTable() {
            const thead = document.getElementById('forecastThead');
            const tbody = document.getElementById('forecastTbody');
            const table = document.getElementById('forecastTable');
            if (!thead || !tbody || !table) return;
            const cols = getColumnsForMode(state.forecastMode);
            const visibleHistMonths = state.historyExpanded ? state.historyMonths.slice() : [];
            const visibleFcMonths = state.forecastExpanded ? state.months.slice() : [];
            const histCols = state.historyMonths.length ? (state.historyExpanded ? visibleHistMonths.length : 1) : 0;
            const fcCols = state.months.length ? (state.forecastExpanded ? visibleFcMonths.length : 1) : 0;
            const pref = loadColWidthPrefs(state.forecastMode);
            const leafColWidths = [];
            cols.forEach(col => {
                const key = String(col.key || '').trim();
                const w = Number((pref.spec || {})[key]);
                leafColWidths.push((Number.isFinite(w) && w > 30) ? w : getDefaultColWidthByKey(key));
            });
            // Month columns: ensure each month within the same group has the same width
            const historyWidth = Number(pref.history || 86);
            const forecastWidth = Number(pref.forecast || 86);
            for (let i = 0; i < histCols; i++) leafColWidths.push(historyWidth);
            for (let i = 0; i < fcCols; i++) leafColWidths.push(forecastWidth);
            const meta = {
                specCount: cols.length,
                histCols,
                fcCols,
                historyStart: cols.length,
                historyEnd: cols.length + Math.max(0, histCols - 1),
                forecastStart: cols.length + histCols,
                forecastEnd: cols.length + histCols + Math.max(0, fcCols - 1),
            };
            state._sfColMeta = meta;
            state._sfLeafColWidths = leafColWidths;
            const totalWidth = leafColWidths.reduce((acc, n) => acc + Number(n || 0), 0);
            table.style.minWidth = `${Math.max(960, totalWidth)}px`;
            const oldColgroup = table.querySelector('colgroup#forecastColgroup');
            if (oldColgroup && oldColgroup.parentNode) oldColgroup.parentNode.removeChild(oldColgroup);
            const colgroup = document.createElement('colgroup');
            colgroup.id = 'forecastColgroup';
            leafColWidths.forEach(w => {
                const c = document.createElement('col');
                c.style.width = `${w}px`;
                colgroup.appendChild(c);
            });
            table.insertBefore(colgroup, thead);

            const trTop = document.createElement('tr');
            trTop.className = 'sf-thead-row-1';
            trTop.innerHTML =
                `<th class="sf-th-section" colspan="${cols.length}">规格信息</th>` +
                (histCols ? `<th class="sf-th-section" colspan="${histCols}"><span class="sf-th-section-toggle" data-section="history"><span class="sf-group-toggle">${state.historyExpanded ? '▼' : '▶'}</span><span>历史月销量 <span class="help-dot" data-tip="数据来自“产品表现”看板按月聚合"></span></span></span></th>` : '') +
                (fcCols ? `<th class="sf-th-section" colspan="${fcCols}"><span class="sf-th-section-toggle" data-section="forecast"><span class="sf-group-toggle">${state.forecastExpanded ? '▼' : '▶'}</span><span>预测月份</span></span></th>` : '');

            const trBottom = document.createElement('tr');
            trBottom.className = 'sf-thead-row-2';
            trBottom.innerHTML = cols.map(col => buildBottomHeaderHtml(col)).join('')
                + (state.historyExpanded ? visibleHistMonths.map(m => `<th class="sf-th-history" data-month="${m}">${monthShortLabel(m)}</th>`).join('') : (histCols ? '<th class="sf-th-history">历史合计</th>' : ''))
                + (state.forecastExpanded ? visibleFcMonths.map(m => `<th class="sf-th-month">${monthShortLabel(m)}</th>`).join('') : (fcCols ? '<th class="sf-th-month">预测合计</th>' : ''));
            thead.innerHTML = '';
            thead.appendChild(trTop);
            thead.appendChild(trBottom);
            const applyHeadOffset = () => {
                const row1Height = Math.max(34, trTop.getBoundingClientRect().height || trTop.offsetHeight || 34);
                table.style.setProperty('--sf-thead-row1-height', `${Math.ceil(row1Height)}px`);
            };
            applyHeadOffset();
            if (typeof requestAnimationFrame === 'function') requestAnimationFrame(applyHeadOffset);
            setTimeout(applyHeadOffset, 0);
            bindHeaderEvents(thead, cols);
            annotateForecastHeaderColumns(thead, cols.length + histCols + fcCols);
            attachForecastColumnResizeHandles(thead, cols, meta, leafColWidths);

            const filteredRows = applyFilters(state.rows.slice(), cols);
            const groups = buildGroups(filteredRows);
            const collapsedSet = getCollapsedSet();
            if (collapsedSet.size === 0 && groups.length) initCollapsedGroups(groups);

            const totalCols = cols.length + histCols + fcCols;
            tbody.innerHTML = '';
            if (!groups.length) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="${totalCols}" class="sf-empty">没有匹配的数据</td>`;
                tbody.appendChild(tr);
                return;

            groups.forEach(group => {
                const isCollapsed = collapsedSet.has(group.key);
                const gtr = document.createElement('tr');
                gtr.className = 'sf-group-row';
                gtr.dataset.groupKey = group.key;
                gtr.innerHTML = `<td colspan="${totalCols}"><span class="sf-group-toggle">${isCollapsed ? '▶' : '▼'}</span>${escapeHtml(group.title)}</td>`;
                tbody.appendChild(gtr);

                const sortedItems = sortGroupItems(group.items, cols);
                sortedItems.forEach(row => {
                    const tr = document.createElement('tr');
                    if (isCollapsed) tr.classList.add('sf-row-hidden');
                    tr.dataset.groupKey = group.key;
                    tr.dataset.rowKey = row.row_key;
                    cols.forEach(col => {
                        const td = document.createElement('td');
                        td.className = col.cellClass || 'sf-cell-spec';
                        renderSpecCell(td, col, row);
                        tr.appendChild(td);

                    if (histCols) {
                        if (state.historyExpanded) {
                            visibleHistMonths.forEach(monthKey => {
                                const td = document.createElement('td');
                                td.className = 'sf-cell-history';
                                td.dataset.rowKey = row.row_key;
                                td.dataset.month = monthKey;
                                const cell = (row.history && row.history[monthKey]) || null;
                                const text = cell ? formatNumber(cell.sales_qty) : '0';
                                if (cell) td.appendChild(makeTooltipWrap(buildHistoryTooltip(cell, monthKey), document.createTextNode(text)));
                                else td.textContent = text;
                                tr.appendChild(td);
                            });
                        } else {
                            const sum = state.historyMonths.reduce((acc, m) => acc + Number((((row.history || {})[m] || {}).sales_qty) || 0), 0);
                            const td = document.createElement('td');
                            td.className = 'sf-cell-history';
                            td.textContent = formatNumber(sum || 0);

                    if (fcCols) {

                                const td = document.createElement('td');

                                td.appendChild(buildForecastCell(row, monthKey));
                                tr.appendChild(td);

                            const sum = state.months.reduce((acc, m) => {
                                const forecast = (row.forecasts && row.forecasts[m]) || null;
                                const dirtyKey = row.row_key + '|' + m;
                                const dirtyVal = state.dirty.has(dirtyKey) ? Number(state.dirty.get(dirtyKey).latest_qty) : null;
                                const value = dirtyVal !== null ? dirtyVal : Number(forecast && forecast.value_qty || 0);
                                return acc + value;

                            td.className = 'sf-cell-history';
                            td.textContent = formatNumber(sum || 0);

                    tbody.appendChild(tr);
                });

            bindHistoryCellSelection(tbody);
            applyHistorySelectionStyles();

        function buildBottomHeaderHtml(col) {
            const sortMark = state.sortKey === col.key ? (state.sortDir === 'asc' ? '▲' : '▼') : '';
            const filterValue = state.colFilters[col.key] || '';
            const filterInput = '';
            return `<th class="sf-th-spec ${col.thClass || ''}" data-col-key="${col.key}"><div class="sf-th-cell"><span class="sf-th-title-row ${col.sort ? '' : 'is-disabled'}" data-sort-key="${col.sort ? col.key : ''}"><span>${escapeHtml(col.label)}</span><span class="sf-sort-arrow">${sortMark}</span></span>${filterInput}</div></th>`;
        }

        function bindHeaderEvents(thead, cols) {
            thead.querySelectorAll('.sf-th-section-toggle[data-section]').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (state._sfSuppressHeaderClickUntil && Date.now() < state._sfSuppressHeaderClickUntil) return;
                    e.preventDefault();
                    e.stopPropagation();
                    const sec = el.dataset.section;
                    if (sec === 'history') {
                        state.historyExpanded = !state.historyExpanded;
                        writeBoolPref(SF_PREF_HISTORY_EXPANDED_KEY, state.historyExpanded);
                    }
                    if (sec === 'forecast') {
                        state.forecastExpanded = !state.forecastExpanded;
                        writeBoolPref(SF_PREF_FORECAST_EXPANDED_KEY, state.forecastExpanded);
                    }
                    renderForecastTable();
                });
            });
            thead.querySelectorAll('.sf-th-title-row[data-sort-key]').forEach(el => {
                el.addEventListener('click', () => {
                    if (state._sfSuppressHeaderClickUntil && Date.now() < state._sfSuppressHeaderClickUntil) return;
                    const key = String(el.dataset.sortKey || '').trim();
                    if (!key) return;
                    if (state.sortKey === key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
                    else {

                        state.sortDir = 'asc';

            thead.querySelectorAll('input.sf-th-filter[data-filter-key]').forEach(el => {
                el.addEventListener('input', () => {

                    else delete state.colFilters[key];

            state.selectedHistoryCells.clear();
