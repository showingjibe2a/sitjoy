<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销量预测</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .sf-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem 1rem;
            padding: 0.6rem 0.75rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(207, 199, 189, 0.55);
            border-radius: 8px;
            margin-bottom: 0.85rem;
        }
        .sf-toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            flex-wrap: wrap;
        }
        .sf-toolbar label {
            font-size: 0.85rem;
            color: var(--morandi-slate);
        }
        .sf-toolbar input[type="text"],
        .sf-toolbar input[type="month"],
        .sf-toolbar input[type="number"],
        .sf-toolbar select {
            padding: 0.22rem 0.4rem;
            border: 1px solid rgba(207, 199, 189, 0.72);
            border-radius: 6px;
            background: #fff;
            font-size: 0.82rem;
            min-width: 0;
        }
        /* Compact month input (smaller height) */
        .sf-toolbar input.sf-compact-month[type="month"]{
            min-height: 28px;
            height: 28px;
            padding: 0.2rem 0.45rem !important;
            border-radius: 10px;
            font-size: 0.82rem;
            border-width: 1px;
            padding-right: 1.6rem !important;
            background-position: right 0.4rem center, 0 0;
            background-size: 14px 14px, auto;
        }
        .sf-toolbar input[type="text"] { min-width: 120px; }
        .sf-toolbar .btn-secondary,
        .sf-toolbar .btn-primary,
        .sf-toolbar .btn-accent { padding: 0.4rem 0.85rem; font-size: 0.88rem; }
        .sf-month-picker-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.45rem;
        }
        .sf-month-picker-year {
            font-weight: 600;
            color: #4f463b;
            font-size: 0.9rem;
        }
        .sf-month-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.6rem 0.7rem;
        }
        .sf-month-picker-opt {
            border: 1px solid rgba(207, 199, 189, 0.75);
            background: #f8f3e9;
            border-radius: 8px;
            height: 34px;
            min-width: 56px;
            width: 100%;
            font-size: 0.84rem;
            color: #4f463b;
            cursor: pointer;
            text-align: center;
        }
        .sf-month-picker-opt:hover {
            background: #f0e7d7;
            border-color: #cabda9;
        }
        .sf-month-picker-popover {
            position: fixed;
            z-index: 5900;
            width: 268px;
            padding: 0.62rem;
            background: rgba(243, 240, 236, 0.98);
            border: 1px solid rgba(207, 199, 189, 0.9);
            border-radius: 12px;
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.2);
            display: none;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.16s ease, transform 0.16s ease;
            pointer-events: none;
            box-sizing: border-box;
        }
        .sf-month-picker-popover.is-open {
            display: block;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .sf-month-picker-popover .sf-month-picker-head {
            margin-bottom: 0.45rem;
        }
        .sf-month-picker-opt.is-active {
            background: #ede2cb;
            border-color: #b7a78c;
            font-weight: 700;
        }
        .sf-month-input-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .sf-month-input-wrap input[type="month"] {
            padding-right: 1.6rem;
            cursor: pointer;
        }
        .sf-divider {
            width: 1px;
            height: 22px;
            background: rgba(207, 199, 189, 0.72);
        }

        .sf-table-wrap {
            border: 1px solid rgba(207, 199, 189, 0.55);
            border-radius: 8px;
            background: #fff;
            overflow: auto;
            max-height: calc(100vh - 230px);
            position: relative;
            padding-bottom: 0;
            box-sizing: border-box;
        }
        table.sf-table {
            /* collapse：消除 separate 模式下表头两行之间、表头与首行 tbody 间易出现的一条“假空白”带 */
            border-collapse: collapse;
            border-spacing: 0;
            width: max-content;
            font-size: 0.85rem;
            table-layout: fixed;
        }
        /* 整块 thead 一次 sticky：两行同进同退，根除「行间缝透出 tbody」；勿对两行 tr 分别 sticky+top */
        table.sf-table thead {
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 2;
            background-color: #ece2cf;
        }
        table.sf-table tbody {
            position: relative;
            z-index: 0;
        }
        .sf-month-two-line{
            display: grid;
            grid-template-rows: auto auto;
            gap: 0.05rem;
            line-height: 1.05;
            text-align: center;
        }
        .sf-month-two-line .sf-month-y{
            font-size: 0.76rem;
            color: rgba(79, 70, 59, 0.85);
            font-weight: 700;
        }
        .sf-month-two-line .sf-month-m{
            font-size: 0.82rem;
            color: #4f463b;
            font-weight: 700;
        }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-history,
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-month,
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-inv,
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-turn {
            text-align: center;
        }
        /*
         * 表头两行均非 sticky（由 thead 整体 sticky）；th 用 relative 作为列宽拖拽定位包含块。
         */
        table.sf-table thead tr.sf-thead-row-1 {
            background: #ece2cf;
        }
        table.sf-table thead tr.sf-thead-row-2 {
            background: #f5efe5;
        }
        table.sf-table thead th {
            position: relative;
            background: #f5efe5;
            color: var(--morandi-ink);
            border-bottom: 1px solid rgba(207, 199, 189, 0.85);
            padding: 0.45rem 0.55rem;
            font-weight: 600;
            text-align: left;
            white-space: nowrap;
            box-sizing: border-box;
            vertical-align: middle;
        }
        table.sf-table thead tr.sf-thead-row-1 th {
            background: #ece2cf;
            white-space: nowrap;
            min-height: 34px;
            height: auto;
            padding-top: 0.3rem;
            padding-bottom: 0.3rem;
            /* 与第二行之间只保留一条分割线，避免 border-top+border-bottom 叠出“假空白” */
            border-bottom: 1px solid rgba(207, 199, 189, 0.85);
            cursor: default;
        }
        table.sf-table thead tr.sf-thead-row-2 th {
            background: #f5efe5;
            border-top: none;
        }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-spec { background: #f3ecdf; }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-history { background: #f0ece1; }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-month { background: #ede2cb; }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-turn {
            background: #e3ddd4;
            text-align: center;
            font-size: 0.76rem;
        }
        table.sf-table thead tr.sf-thead-row-2 th.sf-th-inv {
            background: #e6e1d8;
            text-align: center;
            font-size: 0.78rem;
        }
        table.sf-table thead th.sf-th-section {
            text-align: center;
            font-weight: 700;
            color: #4f463b;
        }
        table.sf-table thead th.sf-th-mtd {
            text-align: center;
            vertical-align: middle;
            min-width: 96px;
        }
        .sf-cell-mtd {
            text-align: center;
            vertical-align: middle;
            padding: 0.35rem 0.45rem !important;
            position: relative;
            overflow: hidden;
        }
        .sf-mtd-stack {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.25rem;
            min-width: 0;
        }
        .sf-mtd-track {
            position: relative;
            height: 10px;
            border-radius: 6px;
            background: rgba(207, 199, 189, 0.35);
            overflow: hidden;
        }
        .sf-mtd-timefill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background: rgba(236, 226, 207, 0.95);
            pointer-events: none;
            z-index: 0;
        }
        .sf-mtd-bar {
            position: relative;
            height: 100%;
            border-radius: 6px;
            z-index: 1;
            min-width: 0;
            max-width: 100%;
            transition: width 0.12s ease;
        }
        .sf-mtd-bar--neutral { background: rgba(123, 109, 92, 0.45); }
        .sf-mtd-bar--red { background: linear-gradient(90deg, #c45a5a, #d67878); }
        .sf-mtd-bar--yellow { background: linear-gradient(90deg, #c9a24a, #dfc06a); }
        .sf-mtd-bar--green { background: linear-gradient(90deg, #5a9a62, #7ab882); }
        .sf-mtd-bar--purple { background: linear-gradient(90deg, #7a5cb0, #9a7ad0); }
        .sf-mtd-pct {
            font-size: 0.78rem;
            font-weight: 700;
            color: #4f463b;
            font-variant-numeric: tabular-nums;
        }
        .sf-mtd-na {
            color: var(--morandi-slate);
            font-size: 0.82rem;
        }
        .sf-mtd-subhead {
            font-size: 0.68rem;
            color: rgba(79, 70, 59, 0.72);
            margin-top: 0.12rem;
            line-height: 1.15;
        }
        /* Column resize handle (like warehouse dashboard) */
        .sf-col-resize-handle{
            position: absolute;
            top: 0;
            right: -6px;
            width: 12px;
            height: 100%;
            cursor: col-resize;
            z-index: 30;
        }
        .sf-col-resize-handle::after{
            content: '';
            position: absolute;
            left: 50%;
            top: 18%;
            width: 3px;
            height: 64%;
            transform: translateX(-50%);
            border-radius: 2px;
            background: rgba(123, 109, 92, 0.55);
            opacity: 0.25;
            transition: opacity 0.15s ease;
        }
        th:hover .sf-col-resize-handle::after{ opacity: 0.95; }
        table.sf-table tbody td {
            padding: 0.4rem 0.55rem;
            border-bottom: 1px solid rgba(207, 199, 189, 0.42);
            vertical-align: middle;
            white-space: nowrap;
            box-sizing: border-box;
        }
        table.sf-table tbody tr:nth-child(odd) td { background: #fdfbf6; }
        table.sf-table tbody tr:nth-child(even) td { background: #fbf6ec; }
        td.sf-cell-spec {
            min-width: 0;
            white-space: normal;
            line-height: 1.25;
            color: #5b5346;
        }
        td.sf-cell-spec .sf-spec-sub {
            color: #5b5346;
            font-size: 0.78rem;
        }
        td.sf-cell-fabric {
            min-width: 0;
            white-space: normal;
            line-height: 1.2;
            color: #5b5346;
        }
        .sf-fabric-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 999px;
            border: 1px solid rgba(42, 36, 32, 0.28);
            vertical-align: middle;
        }
        .sf-group-row td {
            background: #efe7d9 !important;
            color: #4f463b;
            font-weight: 700;
            border-top: 1px solid rgba(207, 199, 189, 0.85);
            cursor: pointer;
        }
        table.sf-table tbody tr.sf-group-row:first-of-type td {
            border-top: none;
        }
        .sf-group-toggle {
            display: inline-flex;
            width: 18px;
            justify-content: center;
            color: #7a7269;
            margin-right: 4px;
        }
        .sf-muted {
            font-weight: 500;
            color: #7a7269;
            margin-left: 0.35rem;
        }
        .sf-row-hidden {
            display: none;
        }
        .sf-th-section-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            user-select: none;
        }
        .sf-th-section-toggle .sf-group-toggle {
            margin-right: 0;
        }
        td.sf-cell-history {
            text-align: right;
            font-variant-numeric: tabular-nums;
            color: #5b5346;
        }
        /* Excel-like selection spotlight */
        td.sf-grid-selectable.sf-cell-selected{
            box-shadow: inset 0 0 0 2px rgba(80, 120, 170, 0.85);
            background: rgba(80, 120, 170, 0.10) !important;
        }
        tr.sf-spotlight-row td{
            background: rgba(80, 120, 170, 0.04);
        }
        td.sf-spotlight-col{
            background: rgba(80, 120, 170, 0.04) !important;
        }
        th.sf-spotlight-col{
            box-shadow: inset 0 -2px 0 rgba(80, 120, 170, 0.75);
        }
        td.sf-cell-forecast.preview-edit-cell {
            text-align: right;
            position: relative;
            padding: 0.12rem 0.22rem !important;
            vertical-align: middle;
        }
        td.sf-cell-inv,
        td.sf-cell-turn {
            text-align: right;
            font-variant-numeric: tabular-nums;
            color: #5b5346;
        }

        /* 与全站 .inline-input.preview-edit-input 同系，但更紧凑；覆盖 inline-input 默认 min-width/min-height */
        table.sf-table .sf-cell-wrap input.inline-input.preview-edit-input.sf-num-input {
            display: block;
            flex: 1 1 auto;
            width: 0;
            min-width: 0 !important;
            max-width: none;
            min-height: 24px !important;
            height: 24px !important;
            padding: 0.08rem 0.26rem !important;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            background: #fff;
            background-clip: padding-box;
            color: var(--morandi-ink);
            font-size: 0.72rem !important;
            line-height: 1.15;
            text-align: right;
            font-variant-numeric: tabular-nums;
            box-sizing: border-box;
            appearance: none;
            outline: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        table.sf-table .sf-cell-wrap input.inline-input.preview-edit-input.sf-num-input:focus {
            border-color: var(--morandi-ink);
            box-shadow: 0 0 0 2px rgba(42, 36, 32, 0.1);
            text-overflow: clip;
        }
        table.sf-table .sf-cell-wrap input.inline-input.preview-edit-input.sf-num-input.is-dirty {
            border-color: #b67f7f;
            background: #fff6ee;
        }
        table.sf-table .sf-cell-wrap input.inline-input.preview-edit-input.sf-num-input.is-inherited {
            background: #f0f4ec;
            color: #4f5e44;
            border-style: dashed;
        }

        .sf-cell-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            min-width: 0;
            gap: 0.2rem;
        }
        /* 角标 tooltip 容器勿铺满整格，否则会叠在 input 上拦截点击 */
        .sf-cell-wrap > .sf-tooltip-wrap {
            flex: 0 0 auto;
            width: auto;
            max-width: 38%;
            min-width: 0;
            pointer-events: none;
        }
        .sf-cell-wrap > .sf-tooltip-wrap .sf-tooltip-content {
            pointer-events: auto;
        }
        .sf-cell-wrap > input.inline-input.sf-num-input {
            position: relative;
            z-index: 2;
        }
        /* 相对已存储数量的变化：绿增黄减（莫兰迪），不拦截点击 */
        .sf-forecast-delta-badge {
            position: absolute;
            top: -1px;
            right: 3px;
            z-index: 4;
            font-size: 9px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            white-space: nowrap;
            pointer-events: none;
            display: none;
            align-items: center;
            gap: 0.15em;
            max-width: 58%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sf-forecast-delta-badge.is-visible {
            display: inline-flex;
        }
        .sf-forecast-delta-badge.is-up {
            color: #5d7a64;
        }
        .sf-forecast-delta-badge.is-down {
            color: #a68f4a;
        }
        .sf-source-badge {
            position: absolute;
            top: -7px;
            right: -7px;
            min-width: 20px;
            height: 16px;
            padding: 0 4px;
            border-radius: 8px;
            background: #7b9ab0;
            color: #fff;
            font-size: 10px;
            line-height: 16px;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 1px 4px rgba(35,28,20,0.2);
            cursor: help;
        }
        .sf-source-badge.is-inherited { background: #b67f7f; }

        .sf-tooltip-wrap {
            position: relative;
            display: block;
            width: 100%;
            z-index: 1;
            isolation: isolate;
        }
        .sf-tooltip-content{
            display: block;
            width: 100%;
            text-align: right;
        }
        .sf-tooltip-wrap:hover,
        .sf-tooltip-wrap:focus-within,
        .sf-tooltip-wrap.is-pinned {
            z-index: 1200;
        }
        .sf-tooltip-bubble {
            position: absolute;
            z-index: 1201;
            top: 100%;
            right: 0;
            min-width: 240px;
            max-width: 360px;
            background: rgba(47, 47, 51, 0.95);
            color: #ece7df;
            padding: 6px 8px;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.45;
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
            display: none;
            white-space: normal;
        }
        .sf-tooltip-wrap:hover .sf-tooltip-bubble,
        .sf-tooltip-wrap:focus-within .sf-tooltip-bubble,
        .sf-tooltip-wrap.is-pinned .sf-tooltip-bubble {
            display: block;
        }
        .sf-tooltip-bubble dl {
            margin: 0;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.18rem 0.5rem;
        }
        .sf-tooltip-bubble dt { color: #d6cfbf; font-weight: 500; }
        .sf-tooltip-bubble dd { margin: 0; color: #fff; word-break: break-all; }
        /* 产品表现：悬浮 / 侧栏统一为深色表格（横向月份、纵向指标） */
        .sf-perf-matrix-outer {
            margin-top: 0.2rem;
            overflow: auto;
            max-width: min(880px, 94vw);
            max-height: 64vh;
        }
        .sf-tooltip-bubble.sf-history-perf-tooltip-bubble .sf-perf-matrix-outer {
            max-width: min(880px, 94vw);
        }
        .sf-perf-matrix-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            line-height: 1.35;
        }
        .sf-perf-matrix-table th,
        .sf-perf-matrix-table td {
            border: 1px solid rgba(255, 255, 255, 0.14);
            padding: 0.2rem 0.38rem;
            text-align: right;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .sf-perf-matrix-table thead th {
            color: #d6cfbf;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.18);
        }
        .sf-perf-matrix-table .sf-perf-matrix-corner {
            text-align: left;
            color: #ece7df;
        }
        .sf-perf-matrix-table tbody th.sf-perf-matrix-rowhead {
            text-align: left;
            font-weight: 500;
            color: #d6cfbf;
            background: rgba(0, 0, 0, 0.12);
            white-space: nowrap;
        }
        .sf-perf-matrix-table tbody td {
            color: #fff;
            word-break: break-all;
            white-space: normal;
            max-width: 10rem;
        }
        /* 历史月单元格：气泡略加宽并可滚动 */
        .sf-tooltip-bubble.sf-history-perf-tooltip-bubble {
            max-width: min(900px, 96vw);
            max-height: 72vh;
            overflow: auto;
            overflow-x: auto;
        }
        .sf-tooltip-bubble .sf-tip-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #fff;
        }
        .sf-tooltip-bubble ul.sf-tip-list { padding-left: 1rem; margin: 0.25rem 0 0; }
        .sf-tooltip-bubble ul.sf-tip-list li { margin-bottom: 0.15rem; }

        .sf-empty {
            text-align: center;
            color: var(--morandi-slate);
            padding: 1.6rem 0;
        }
        .sf-loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            color: var(--morandi-slate);
            z-index: 10;
        }
        .sf-loading-overlay.is-active { display: flex; }

        /* 表头筛选/排序行（可点击） */
        .sf-th-cell {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sf-th-title-row {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            user-select: none;
        }
        .sf-th-title-row .sf-sort-arrow {
            font-size: 10px;
            color: #8b7c63;
        }
        .sf-th-title-row.is-disabled {
            cursor: default;
        }
        .sf-th-title-row.is-disabled .sf-sort-arrow {
            visibility: hidden;
        }
        .sf-th-filter {
            width: 100%;
            padding: 0.18rem 0.35rem;
            border: 1px solid rgba(207, 199, 189, 0.85);
            border-radius: 5px;
            font-size: 0.78rem;
            background: #fff;
        }

        /* 右下角批量处理弹窗 */
        .sf-batch-popup {
            position: fixed;
            right: 24px;
            bottom: 24px;
            min-width: 280px;
            max-width: 360px;
            background: #fff;
            border: 1px solid rgba(207, 199, 189, 0.85);
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(35, 28, 20, 0.2);
            padding: 0.85rem 1rem;
            z-index: 5360;
            display: none;
        }
        .sf-batch-popup.is-active { display: block; }
        .sf-batch-popup-title {
            font-weight: 700;

        /* 本页 .sf-perf-float-panel 含 display:flex，会压过 [hidden] 的默认隐藏，导致 hidden=true / 点 × 仍可见 */

</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.2rem;">
            <h2>销量预测</h2>
            <p>支持按销售平台SKU、规格+面料、下单SKU 三种维度预测；规格/下单SKU 可继承上层预测自动估算。</p>
        </section>

        <div class="card pm-card" style="padding: 0.9rem 1rem;">
            <div class="sf-toolbar">
                <div class="sf-toolbar-group">
                    <label>预测维度：</label>
                    <div class="sf-mode-bar">
                        <input type="hidden" id="forecastModeVal" value="spec">
                        <div class="status-segment status-segment--inline" id="forecastModeSegment" data-value="spec">
                            <button type="button" class="status-pill status-pill--enabled" data-value="platform">销售平台SKU</button>
                            <button type="button" class="status-pill status-pill--enabled is-active" data-value="spec">规格+面料</button>
                            <button type="button" class="status-pill status-pill--enabled" data-value="order">下单SKU</button>
                        </div>
                    </div>
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group sf-perf-ui-group" id="sfPerfUiToolbarGroup">
                    <span class="sf-perf-ui-label">显示产品信息：</span>
                    <div id="sfPerfUiToolbarInteractWrap" class="sf-perf-ui-interact-wrap">
                        <label class="sf-perf-ui-toggle"><input type="checkbox" id="sfPerfUiNone"> 不显示</label>
                        <label class="sf-perf-ui-toggle"><input type="checkbox" id="sfPerfUiHover"> 悬浮</label>
                        <label class="sf-perf-ui-toggle"><input type="checkbox" id="sfPerfUiClick"> 点击</label>
                        <label class="sf-perf-ui-toggle"><input type="checkbox" id="sfPerfUiRect"> 框选</label>
                    </div>
                    <span class="sf-perf-attach-seg-label">弹窗位置</span>
                    <input type="hidden" id="sfPerfPanelAttachVal" value="follow">
                    <div class="status-segment status-segment--inline" id="sfPerfPanelAttachSeg" data-value="follow">
                        <button type="button" class="status-pill status-pill--enabled" data-value="free">自由</button>
                        <button type="button" class="status-pill status-pill--enabled is-active" data-value="follow">跟随选中</button>
                    </div>
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group" title="仅可选连续月份（起止均含）；默认为本月起共 6 个月">
                    <label>预测月份：</label>
                    <span class="sf-month-input-wrap"><input type="month" id="forecastStart" class="sf-compact-month" readonly></span>
                    <span>至</span>
                    <span class="sf-month-input-wrap"><input type="month" id="forecastEnd" class="sf-compact-month" readonly></span>
                    <button class="btn-secondary" type="button" data-future="3">未来3月</button>
                    <button class="btn-secondary" type="button" data-future="6">未来6月</button>
                    <button class="btn-secondary" type="button" data-future="12">未来12月</button>
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <label>历史销量范围：</label>
                    <span class="sf-month-input-wrap"><input type="month" id="historyStart" class="sf-compact-month" readonly></span>
                    <span>至</span>
                    <span class="sf-month-input-wrap"><input type="month" id="historyEnd" class="sf-compact-month" readonly></span>
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <label>筛选：</label>
                    <input type="text" id="filterShop" placeholder="店铺">
                    <input type="text" id="filterSku" placeholder="货号/平台SKU">
                    <input type="text" id="filterSpec" placeholder="规格">
                    <input type="text" id="filterFabric" placeholder="面料">
                </div>
                <span class="sf-divider" aria-hidden="true"></span>
                <div class="sf-toolbar-group">
                    <button class="btn-primary" id="btnLoadForecast" type="button">加载/刷新</button>
                </div>
            </div>
        </div>

        <div class="sf-table-wrap" id="forecastTableWrap">
            <table class="sf-table" id="forecastTable" data-disable-table-manage="1">
                <thead id="forecastThead"></thead>
                <tbody id="forecastTbody"></tbody>
            </table>
            <div class="sf-loading-overlay" id="forecastLoading">数据加载中…</div>
        </div>
    </div>

    <div id="sfPerfFloatingPanel" class="sf-perf-float-panel" hidden aria-label="产品表现">
        <div class="sf-perf-float-panel-header" id="sfPerfPanelHeader">
            <div class="sf-perf-float-panel-header-left">
                <span class="sf-perf-float-drag-hint" aria-hidden="true">⠿</span>
                <span class="sf-perf-float-title" id="sfPerfPanelTitle">产品表现</span>
            </div>
            <div class="sf-perf-float-panel-header-right">
                <div class="pm-table-columns" id="sfPerfFieldsDropdown" title="勾选要在表格中展示的指标行；月份列标题始终显示">
                    <button type="button" class="pm-table-columns-trigger btn-secondary" id="sfPerfFieldsTrigger" aria-expanded="false" aria-controls="sfPerfFieldsPanel">字段显示</button>
                    <div class="pm-table-columns-panel sf-perf-fields-panel" id="sfPerfFieldsPanel" role="region" aria-label="指标行显示"></div>
                </div>
                <button type="button" class="modal-close" id="sfPerfPanelClose" aria-label="关闭">×</button>
            </div>
        </div>
        <div class="sf-perf-float-panel-body">
            <div class="sf-perf-float-table-scroll">
                <table id="sfPerfMatrixTable" class="pm-table sf-perf-pm-matrix"
                    data-table-manage-mode="light"
                    data-pm-light-sticky-layout="1"
                    data-pm-default-pinned-first="1"
                    data-pm-light-no-column-filter="1"
                    data-pm-light-allow-col-resize="1"
                    data-pm-month-col-width-sync="1"
                    data-pm-metric-col-key="sf_metric_col"
                    data-manage-key="sfPerfMatrixTable">
                    <thead id="sfPerfMatrixThead"><tr>
                        <th scope="col" data-manage-col-key="sf_metric_col" data-disable-sort="1">指标</th>
                        <th scope="col" data-manage-col-key="m_placeholder" data-disable-sort="1">—</th>
                    </tr></thead>
                    <tbody id="sfPerfMatrixTbody"><tr>
                        <th scope="row" data-manage-col-key="sf_metric_col" data-disable-sort="1">—</th>
                        <td data-manage-col-key="m_placeholder">—</td>
                    </tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sf-batch-popup" id="sfBatchPopup">
        <div class="sf-batch-popup-title">待保存修改</div>
        <div class="sf-batch-popup-summary" id="sfBatchPopupSummary">未保存修改：0 条</div>
        <div class="sf-batch-popup-actions">
            <button class="btn-secondary" type="button" id="sfBatchDiscardBtn">放弃</button>
            <button class="btn-accent" type="button" id="sfBatchSaveBtn">批量保存</button>
        </div>
    </div>

    <script>
        const FORECAST_MODES = ['platform', 'spec', 'order'];
        const SF_PREF_HISTORY_EXPANDED_KEY = 'sales_forecast_history_expanded_v1';
        const SF_PREF_FORECAST_EXPANDED_KEY = 'sales_forecast_forecast_expanded_v1';
        const SF_PREF_FORECAST_MODE_KEY = 'sales_forecast_dimension_v1';
        const SF_PREF_PERF_UI_KEY = 'sales_forecast_perf_ui_v1';
        const SF_PREF_PERF_PANEL_KEY = 'sales_forecast_perf_panel_v1';
        /** 产品表现矩阵「指标行」勾选 + 顺序（与托管表列 visible-columns 分离，避免被 header 覆盖） */
        const SF_PREF_PERF_METRIC_FIELDS_V1 = 'sales_forecast_sf_perf_metric_fields_v1';
        const SF_METRIC_COL_KEY = 'sf_metric_col';
        const SF_PREF_COL_WIDTHS_PREFIX = 'sales_forecast_col_widths_v1_';
        const SF_TURNOVER_COLS = 3;
        const SF_STOCK_COLS = 4;
        const SF_TAIL_COL_COUNT = SF_TURNOVER_COLS + SF_STOCK_COLS;
        const SF_TURNOVER_HEADERS = [
            { label: '海外仓', tip: '动销月 = 仅海外仓可用量 ÷ 历史月销量区间最后三个月月均销量' },
            { label: '海外仓+在途', tip: '动销月 =（海外仓 + 在途）÷ 同上' },
            { label: '全部', tip: '动销月 =（海外仓 + 在途 + 在库 + 在制）÷ 同上' },
        ];
        const SF_STOCK_HEADERS = [
            { label: '海外仓', tip: '海外仓可用量合计' },
            { label: '在途', tip: '在途未上架数量合计（发运量 − 已上架量）' },
            { label: '在库', tip: '工厂在库数量合计' },
            { label: '在制', tip: '工厂在制未完工数量合计' },
        ];

        const state = {
            forecastMode: 'spec',
            months: [],
            historyMonths: [],
            historyRange: { start: '', end: '' },
            rows: [],                       // 当前模式的行（懒加载下为已展开分组合并后的子行）
            lazyForecast: false,           // true：首包仅分组元数据，展开分组再拉取 sf_group 明细
            forecastGroups: [],            // [{ key, title, item_count }] 与后端 lazy 对齐
            loadedGroupKeys: new Set(),    // 已拉取明细的分组 key
            loadingGroupKey: '',         // 正在请求的分组（展示「加载中」）
            dirty: new Map(),               // key: row_key|month -> { row_key, forecast_month, latest_qty }
            sortKey: '',
            sortDir: 'asc',
            colFilters: {},                 // colKey -> string
            historyExpanded: true,
            forecastExpanded: true,
            collapsedPlatformGroups: new Set(),
            collapsedSkuGroups: new Set(),
            sfGridSelected: new Set(),       // JSON.stringify([rowKey, colIdx])，colIdx 为叶子列下标，与 data-sf-ci 一致
            selectionAnchor: null,           // { rowKey, colIdx }
            sfColLayout: [],                // 与叶子列顺序一一对应，用于复制/产品表现等
            perfUi: { none: false, hover: true, click: false, rect: false },
            sfPerfHoverCtx: null,
            sfPerfPanelAttachMode: 'follow',
            sfPerfPanelManuallyHidden: false,
            sfPerfPanelHiddenSig: '',
            sfPerfPanelLastShownSig: '',
            sfPerfPanelLastShownIdentity: '',
            sfPerfPanelFollowBlurDismissed: true,
            mtdContext: {},                  // /api/sales-forecast 返回的 mtd 块（时间进度、聚合更新时间等）
            sfPerfFieldsPanelOpen: false,
        };

        function readBoolPref(key, fallback) {
            try {
                const raw = String(localStorage.getItem(key) || '').trim().toLowerCase();
                if (raw === '1' || raw === 'true') return true;
                if (raw === '0' || raw === 'false') return false;
            } catch (e) {}
            return !!fallback;
        }

        function writeBoolPref(key, value) {
            try { localStorage.setItem(key, value ? '1' : '0'); } catch (e) {}
        }

        function readJsonPref(key, fallback) {
            try {
                const raw = String(localStorage.getItem(key) || '').trim();
                if (!raw) return fallback;
                const obj = JSON.parse(raw);
                return (obj && typeof obj === 'object') ? obj : fallback;
            } catch (e) { return fallback; }
        }

        function writeJsonPref(key, value) {
            try { localStorage.setItem(key, JSON.stringify(value || {})); } catch (e) {}
        }

        function readSavedForecastMode() {
            try {
                const raw = String(localStorage.getItem(SF_PREF_FORECAST_MODE_KEY) || '').trim().toLowerCase();
                if (FORECAST_MODES.includes(raw)) return raw;
            } catch (e) {}
            return 'spec';
        }

        function persistForecastMode(mode) {
            const m = String(mode || '').trim().toLowerCase();
            if (!FORECAST_MODES.includes(m)) return;
            try { localStorage.setItem(SF_PREF_FORECAST_MODE_KEY, m); } catch (e) {}
        }

        function colWidthPrefKey(mode) {
            const m = String(mode || '').trim().toLowerCase();
            return SF_PREF_COL_WIDTHS_PREFIX + (FORECAST_MODES.includes(m) ? m : 'spec');
        }

        function getDefaultColWidthByKey(key) {
            const k = String(key || '').trim();
            if (k === 'thumb') return 68;
            if (k === 'fabric_code') return 136;
            if (k === 'platform_sku' || k === 'sku') return 150;
            if (k === 'shop_name' || k === 'sku_family') return 132;
            return 128;
        }

        function loadColWidthPrefs(mode) {
            const pref = readJsonPref(colWidthPrefKey(mode), {}) || {};
            const spec = (pref && pref.spec && typeof pref.spec === 'object') ? pref.spec : {};
            const history = Number(pref && pref.history);
            const forecast = Number(pref && pref.forecast);
            const mtd = Number(pref && pref.mtd);
            const invDefaults = [86, 86, 86, 92, 92, 92, 92];
            const invRaw = pref && pref.inventory;
            const inventory = invDefaults.slice();
            if (Array.isArray(invRaw)) {
                if (invRaw.length === 5) {
                    inventory[0] = 86;
                    inventory[1] = 86;
                    inventory[2] = 86;
                    for (let i = 0; i < 4; i++) {
                        const w = Number(invRaw[i + 1]);
                        if (Number.isFinite(w) && w > 40) inventory[i + 3] = Math.round(w);
                    }
                } else {
                    for (let i = 0; i < SF_TAIL_COL_COUNT; i++) {
                        const w = Number(invRaw[i]);
                        if (Number.isFinite(w) && w > 40) inventory[i] = Math.round(w);
                    }
                }
            }
            return {
                spec,
                history: Number.isFinite(history) && history > 30 ? history : 86,
                forecast: Number.isFinite(forecast) && forecast > 30 ? forecast : 86,
                mtd: Number.isFinite(mtd) && mtd > 40 ? mtd : 108,
                inventory,
            };
        }

        function saveColWidthPrefs(mode, cols, meta, leafColWidths) {
            const pref = loadColWidthPrefs(mode);
            const spec = Object.assign({}, pref.spec || {});
            const specCount = Number(meta && meta.specCount) || 0;
            for (let i = 0; i < Math.min(specCount, cols.length); i++) {
                const key = String(cols[i].key || '').trim();
                if (!key) continue;
                const w = Number(leafColWidths[i] || 0);
                if (Number.isFinite(w) && w > 30) spec[key] = Math.round(w);
            }
            let history = pref.history;
            let forecast = pref.forecast;
            let mtdW = pref.mtd;
            if (meta && meta.historyStart != null && meta.historyStart >= 0 && meta.histCols > 0) {
                history = Math.round(Number(leafColWidths[meta.historyStart] || history));
            }
            if (meta && meta.forecastStart != null && meta.forecastStart >= 0 && meta.fcCols > 0) {
                forecast = Math.round(Number(leafColWidths[meta.forecastStart] || forecast));
            }
            if (meta && meta.mtdStart != null && meta.mtdStart >= 0 && meta.mtdCols > 0) {
                mtdW = Math.round(Number(leafColWidths[meta.mtdStart] || mtdW));
            }
            let inventory = pref.inventory || [86, 86, 86, 92, 92, 92, 92];
            if (meta && meta.invCols > 0 && meta.invStart != null) {
                inventory = [];
                for (let j = 0; j < meta.invCols; j++) {
                    const w = Math.round(Number(leafColWidths[meta.invStart + j] || 92));
                    inventory.push(Number.isFinite(w) && w > 40 ? w : 92);
                }
            }
            writeJsonPref(colWidthPrefKey(mode), { v: 1, spec, history, forecast, mtd: mtdW, inventory, updated_at: Date.now() });
        }

        function pad2(n) { n = Number(n) || 0; return n < 10 ? ('0' + n) : ('' + n); }

        function monthKeyFromValue(value) {
            if (!value) return '';
            const text = String(value).trim();
            const m = text.match(/^(\d{4})\D*(\d{1,2})/);
            if (!m) return '';
            const year = parseInt(m[1], 10);
            const month = parseInt(m[2], 10);
            if (!year || !month || month < 1 || month > 12) return '';
            return year.toString().padStart(4, '0') + '-' + pad2(month) + '-01';
        }

        function monthShortLabel(monthKey) {
            return monthKey ? monthKey.slice(0, 7) : '';
        }

        function monthHeaderTwoLineHtml(monthKey) {
            const s = monthShortLabel(monthKey);
            if (!s || s.length < 7) return escapeHtml(s || '');
            const y = s.slice(0, 4);
            const m = s.slice(5, 7);
            return `<div class="sf-month-two-line"><div class="sf-month-y">${escapeHtml(y)}</div><div class="sf-month-m">${escapeHtml(m)}月</div></div>`;
        }

        function todayMonthKey() {
            const d = new Date();
            return d.getFullYear().toString().padStart(4, '0') + '-' + pad2(d.getMonth() + 1) + '-01';
        }

        function shiftMonth(monthKey, delta) {
            if (!monthKey) return '';
            const [y, m] = monthKey.split('-').map(s => parseInt(s, 10));
            let year = y;
            let month = m + delta;
            while (month < 1) { month += 12; year -= 1; }
            while (month > 12) { month -= 12; year += 1; }
            return year.toString().padStart(4, '0') + '-' + pad2(month) + '-01';
        }

        function compareForecastMonthKeys(a, b) {
            return String(a || '').localeCompare(String(b || ''));
        }

        /** 闭区间 [start,end] 内所有自然月，键为 YYYY-MM-01；与历史销量范围一致 */
        function monthKeysBetweenInclusive(startKey, endKey) {
            const sk = monthKeyFromValue(String(startKey || '').trim()) || String(startKey || '').trim();
            const ek = monthKeyFromValue(String(endKey || '').trim()) || String(endKey || '').trim();
            if (!sk || !ek) return [];
            let s = sk;
            let e = ek;
            if (compareForecastMonthKeys(s, e) > 0) { const t = s; s = e; e = t; }
            const out = [];
            let cur = s;
            for (let guard = 0; guard < 240; guard++) {
                out.push(cur);
                if (compareForecastMonthKeys(cur, e) >= 0) break;
                cur = shiftMonth(cur, 1);
            }
            return out;
        }

        function syncForecastRangeInputsFromState() {
            const startEl = document.getElementById('forecastStart');
            const endEl = document.getElementById('forecastEnd');
            const months = (state.months || []).filter(Boolean).slice().sort(compareForecastMonthKeys);
            if (!months.length) {
                if (startEl) startEl.value = '';
                if (endEl) endEl.value = '';
                return;
            }
            if (startEl) startEl.value = monthShortLabel(months[0]);
            if (endEl) endEl.value = monthShortLabel(months[months.length - 1]);
        }

        function applyForecastRangeFromDomInputs() {
            const startEl = document.getElementById('forecastStart');
            const endEl = document.getElementById('forecastEnd');
            const sy = startEl && String(startEl.value || '').trim();
            const ey = endEl && String(endEl.value || '').trim();
            if (!/^\d{4}-\d{2}$/.test(sy) || !/^\d{4}-\d{2}$/.test(ey)) return;
            state.months = monthKeysBetweenInclusive(sy, ey);
            syncForecastRangeInputsFromState();
        }

        function setForecastMonthsFuture(count) {
            const start = todayMonthKey();
            const n = Math.max(1, Math.min(120, Number(count) || 6));
            const end = shiftMonth(start, n - 1);
            state.months = monthKeysBetweenInclusive(start, end);
            syncForecastRangeInputsFromState();
        }

        function positionSfMonthPopoverNear(anchor, panel) {
            if (!anchor || !panel) return;
            const rect = anchor.getBoundingClientRect();
            const vw = window.innerWidth || document.documentElement.clientWidth || 0;
            const vh = window.innerHeight || document.documentElement.clientHeight || 0;
            panel.style.visibility = 'hidden';
            panel.style.display = 'block';
            const pr = panel.getBoundingClientRect();
            let left = rect.left;
            if (left + pr.width > vw - 8) left = vw - pr.width - 8;
            left = Math.max(8, left);
            let top = rect.bottom + 8;
            if (top + pr.height > vh - 8) top = rect.top - pr.height - 8;
            top = Math.max(8, top);
            panel.style.left = `${left}px`;
            panel.style.top = `${top}px`;
            panel.style.visibility = 'visible';
        }

        function ensureGlobalMonthPickerDialog() {
            if (window.__sfGlobalMonthPickerReady) return;
            window.__sfGlobalMonthPickerReady = true;
            window.__sfGlobalMonthPickerState = { year: new Date().getFullYear(), selected: '', anchor: null };
            const panel = document.createElement('div');
            panel.id = 'sfGlobalMonthPickerPopover';
            panel.className = 'sf-month-picker-popover';
            panel.innerHTML = `
                <div class="sf-month-picker-head">
                    <button type="button" class="btn-ghost" id="sfGlobalMonthPrevYear">&#9664;</button>
                    <span class="sf-month-picker-year" id="sfGlobalMonthYearLabel"></span>
                    <button type="button" class="btn-ghost" id="sfGlobalMonthNextYear">&#9654;</button>
                </div>
                <div class="sf-month-picker-grid" id="sfGlobalMonthGrid"></div>
            `;
            document.body.appendChild(panel);
            const render = () => {
                const st = window.__sfGlobalMonthPickerState || {};
                const year = Number(st.year || new Date().getFullYear());
                st.year = year;
                window.__sfGlobalMonthPickerState = st;
                const yearLabel = document.getElementById('sfGlobalMonthYearLabel');
                const grid = document.getElementById('sfGlobalMonthGrid');
                if (yearLabel) yearLabel.textContent = String(year);
                if (!grid) return;
                const selected = String(st.selected || '');
                grid.innerHTML = Array.from({ length: 12 }).map((_, idx) => {
                    const monthNo = idx + 1;
                    const ymd = String(year).padStart(4, '0') + '-' + pad2(monthNo);
                    const active = selected === ymd ? ' is-active' : '';
                    return `<button type="button" class="sf-month-picker-opt${active}" data-month="${monthNo}">${pad2(monthNo)}月</button>`;
                }).join('');
                grid.querySelectorAll('.sf-month-picker-opt[data-month]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const monthNo = Math.max(1, Math.min(12, parseInt(btn.dataset.month || '1', 10) || 1));
                        const picked = String(year).padStart(4, '0') + '-' + pad2(monthNo);
                        const cb = window.__sfGlobalMonthPickerState && window.__sfGlobalMonthPickerState.onPick;
                        closeGlobalMonthPickerDialog();
                        if (typeof cb === 'function') cb(picked);
                    });
                });
                if (st.anchor) positionSfMonthPopoverNear(st.anchor, panel);
            };
            const open = (opts) => {
                const conf = opts || {};
                const anchor = conf.anchor;
                if (!anchor || !anchor.getBoundingClientRect) return;
                const st = window.__sfGlobalMonthPickerState || {};
                st.anchor = anchor;
                const initVal = String(conf.value || '').trim();
                st.selected = /^\d{4}-\d{2}$/.test(initVal) ? initVal : '';
                st.year = st.selected ? parseInt(st.selected.slice(0, 4), 10) : (Number(conf.year || new Date().getFullYear()) || new Date().getFullYear());
                st.onPick = typeof conf.onPick === 'function' ? conf.onPick : null;
                window.__sfGlobalMonthPickerState = st;
                render();
                panel.classList.add('is-open');
                if (window.__sfMonthOutsideCloser) {
                    document.removeEventListener('mousedown', window.__sfMonthOutsideCloser, true);
                    window.__sfMonthOutsideCloser = null;
                }
                window.__sfMonthOutsideCloser = (ev) => {
                    if (!panel.classList.contains('is-open')) return;
                    const t = ev.target;
                    if (panel.contains(t)) return;
                    if (anchor === t || (anchor.contains && anchor.contains(t))) return;
                    closeGlobalMonthPickerDialog();
                };
                window.requestAnimationFrame(() => {
                    document.addEventListener('mousedown', window.__sfMonthOutsideCloser, true);
                });
            };
            document.getElementById('sfGlobalMonthPrevYear').addEventListener('click', (e) => {
                e.stopPropagation();
                const st = window.__sfGlobalMonthPickerState || {};
                st.year = Number(st.year || new Date().getFullYear()) - 1;
                window.__sfGlobalMonthPickerState = st;
                render();
            });
            document.getElementById('sfGlobalMonthNextYear').addEventListener('click', (e) => {
                e.stopPropagation();
                const st = window.__sfGlobalMonthPickerState || {};
                st.year = Number(st.year || new Date().getFullYear()) + 1;
                window.__sfGlobalMonthPickerState = st;
                render();
            });
            window.showGlobalMonthPickerDialog = open;
            window.addEventListener('scroll', () => {
                const p = document.getElementById('sfGlobalMonthPickerPopover');
                const st = window.__sfGlobalMonthPickerState;
                if (p && p.classList.contains('is-open') && st && st.anchor) positionSfMonthPopoverNear(st.anchor, p);
            }, true);
            window.addEventListener('resize', () => {
                const p = document.getElementById('sfGlobalMonthPickerPopover');
                const st = window.__sfGlobalMonthPickerState;
                if (p && p.classList.contains('is-open') && st && st.anchor) positionSfMonthPopoverNear(st.anchor, p);
            });
            document.addEventListener('keydown', (e) => {
                if (e.key !== 'Escape') return;
                const p = document.getElementById('sfGlobalMonthPickerPopover');
                if (p && p.classList.contains('is-open')) {
                    e.preventDefault();
                    closeGlobalMonthPickerDialog();
                }
            });
        }

        function closeGlobalMonthPickerDialog() {
            const panel = document.getElementById('sfGlobalMonthPickerPopover');
            if (window.__sfMonthOutsideCloser) {
                document.removeEventListener('mousedown', window.__sfMonthOutsideCloser, true);
                window.__sfMonthOutsideCloser = null;
            }
            if (!panel) return;
            panel.classList.remove('is-open');
            panel.style.display = 'none';
            panel.style.visibility = '';
            const st = window.__sfGlobalMonthPickerState || {};
            st.anchor = null;
            window.__sfGlobalMonthPickerState = st;
        }

        function setLoading(active) {
            const overlay = document.getElementById('forecastLoading');
            if (overlay) overlay.classList.toggle('is-active', !!active);
        }

        function showToast(message, isError) {
            if (window.showAppToast) window.showAppToast(message, !!isError, isError ? 0 : 2200);
            else console.log(message);
        }

        function escapeHtml(text) {
            const s = String(text == null ? '' : text);
            return s
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatNumber(value) {
            if (value === null || value === undefined || value === '') return '';
            const num = Number(value);
            if (!isFinite(num)) return '';
            return num.toLocaleString('en-US', { maximumFractionDigits: 0 });
        }

        function formatDateTime(value) {
            if (!value) return '—';
            return String(value);
        }

        // ===== 模式切换 =====
        function bindModeSegment() {
            const seg = document.getElementById('forecastModeSegment');
            if (!seg) return;
            seg.addEventListener('click', (e) => {
                const btn = e.target && e.target.closest ? e.target.closest('.status-pill[data-value]') : null;
                if (!btn) return;
                const next = String(btn.dataset.value || '');
                if (!FORECAST_MODES.includes(next)) return;
                if (next === state.forecastMode) return;
                if (state.dirty.size > 0) {
                    const ok = window.confirm('当前有未保存的修改，切换模式会丢弃修改，是否继续？');
                    if (!ok) return;
                    state.dirty.clear();
                    refreshBatchPopup();
                }
                setForecastMode(next);
                loadForecastData();
            });
        }

        function setForecastMode(mode) {
            state.forecastMode = mode;
            const seg = document.getElementById('forecastModeSegment');
            const hidden = document.getElementById('forecastModeVal');
            if (hidden) hidden.value = mode;
            if (seg) {
                seg.dataset.value = mode;
                seg.querySelectorAll('.status-pill').forEach(b => b.classList.toggle('is-active', String(b.dataset.value || '') === mode));
            }
            // 切模式时清空筛选/排序，避免列不存在
            state.sortKey = '';
            state.sortDir = 'asc';

            state.sfPerfHoverCtx = null;

        function buildSalesForecastQueryParams(extra) {
            const monthsParam = (state.months || []).map(m => m.slice(0, 7)).join(',');
            const histStartEl = document.getElementById('historyStart');
            const histEndEl = document.getElementById('historyEnd');
            const shopEl = document.getElementById('filterShop');
            const skuEl = document.getElementById('filterSku');
            const specEl = document.getElementById('filterSpec');
            const fabricEl = document.getElementById('filterFabric');
            const params = new URLSearchParams();
            params.set('forecast_mode', state.forecastMode);
            if (monthsParam) params.set('months', monthsParam);
            if (histStartEl && histStartEl.value) params.set('history_start', histStartEl.value);
            if (histEndEl && histEndEl.value) params.set('history_end', histEndEl.value);
            if (shopEl && shopEl.value.trim()) params.set('shop', shopEl.value.trim());
            if (skuEl && skuEl.value.trim()) params.set('sku', skuEl.value.trim());
            if (specEl && specEl.value.trim()) params.set('spec', specEl.value.trim());
            if (fabricEl && fabricEl.value.trim()) params.set('fabric', fabricEl.value.trim());
            const ex = extra || {};
            if (ex.lazy) params.set('lazy', '1');
            if (ex.sf_group) params.set('sf_group', String(ex.sf_group));
            return params;
        }

        // ===== 数据加载 =====
        async function loadForecastData() {
            setLoading(true);
            try {
                const params = buildSalesForecastQueryParams({ lazy: true });
                const resp = await fetch('/api/sales-forecast?' + params.toString());
                const data = await resp.json();
                if (!data || data.status !== 'success') throw new Error((data && data.message) || '加载失败');
                applyDashboardPayload(data);
                renderForecastTable();
            } catch (err) {
                showToast(err && err.message ? err.message : '加载失败', true);
            } finally {
                setLoading(false);
            }
        }

        async function loadForecastGroupRows(groupKey) {
            const gk = String(groupKey || '').trim();
            if (!gk || state.loadedGroupKeys.has(gk)) return;
            state.loadingGroupKey = gk;
            renderForecastTableBodyOnly();
            try {
                const params = buildSalesForecastQueryParams({ sf_group: gk });
                const resp = await fetch('/api/sales-forecast?' + params.toString());
                const data = await resp.json();
                if (!data || data.status !== 'success') throw new Error((data && data.message) || '加载失败');
                mergeForecastGroupPayload(data);
            } catch (err) {
                showToast(err && err.message ? err.message : '分组加载失败', true);
            } finally {
                state.loadingGroupKey = '';
                renderForecastTableBodyOnly();
            }
        }

        function mergeForecastGroupPayload(data) {
            const incoming = Array.isArray(data.rows) ? data.rows : [];
            const gk = String((data && data.sf_group) || '').trim();
            if (!gk) return;
            const byKey = new Map((state.rows || []).map(r => [String(r.row_key || ''), r]));
            incoming.forEach(r => {
                const rk = String(r.row_key || '');
                if (!rk) return;
                byKey.set(rk, r);
            });
            state.rows = Array.from(byKey.values());
            state.loadedGroupKeys.add(gk);
        }

        function applyDashboardPayload(data) {
            if (Array.isArray(data.months)) {
                if (data.months.length) {
                    const sorted = data.months.filter(Boolean).slice().sort(compareForecastMonthKeys);
                    state.months = monthKeysBetweenInclusive(sorted[0], sorted[sorted.length - 1]);
                } else {
                    state.months = [];
                }
            }
            state.historyMonths = Array.isArray(data.history_months) ? data.history_months.slice() : [];
            state.historyRange = data.history_range || { start: '', end: '' };
            state.mtdContext = (data && data.mtd && typeof data.mtd === 'object') ? data.mtd : {};
            const lazyFlag = data && (data.lazy === true || data.lazy === 1);
            const groupsFromServer = Array.isArray(data.groups) ? data.groups : null;
            if (lazyFlag) {
                state.lazyForecast = true;
                state.forecastGroups = groupsFromServer ? groupsFromServer.slice() : [];
                state.rows = [];
                state.loadedGroupKeys = new Set();
                state.loadingGroupKey = '';
            } else {
                state.lazyForecast = false;
                state.forecastGroups = [];
                state.loadedGroupKeys = new Set();
                state.loadingGroupKey = '';
                state.rows = Array.isArray(data.rows) ? data.rows : [];
            }
            if (state.forecastMode === 'platform') state.collapsedPlatformGroups.clear();
            else state.collapsedSkuGroups.clear();
            state.dirty.clear();
            refreshBatchPopup();
            syncForecastRangeInputsFromState();
            const histStartEl = document.getElementById('historyStart');
            const histEndEl = document.getElementById('historyEnd');
            if (histStartEl && state.historyRange.start) histStartEl.value = state.historyRange.start.slice(0, 7);
            if (histEndEl && state.historyRange.end) histEndEl.value = state.historyRange.end.slice(0, 7);
        }
