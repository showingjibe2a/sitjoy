        function applyHistorySelectionStyles() {
            const tbody = document.getElementById('forecastTbody');
            const thead = document.getElementById('forecastThead');
            const hint = document.getElementById('sfSelectionHint');
            const cnt = document.getElementById('sfSelectionCount');
            const showBtn = document.getElementById('sfSelectionShowPerfBtn');
            const n = state.selectedHistoryCells.size || 0;
            if (cnt) cnt.textContent = String(n);
            if (hint) hint.style.display = n > 0 ? '' : 'none';
            if (tbody) {
                tbody.querySelectorAll('td.sf-cell-history').forEach(td => {
                    td.classList.remove('sf-cell-selected', 'sf-spotlight-col');
                });
                tbody.querySelectorAll('tr.sf-spotlight-row').forEach(tr => tr.classList.remove('sf-spotlight-row'));
            }
            if (thead) {
                thead.querySelectorAll('th.sf-spotlight-col').forEach(th => th.classList.remove('sf-spotlight-col'));
            }
            if (!n || !tbody) {
                if (showBtn) showBtn.disabled = true;
                return;
            }

            const selectedRows = new Set();
            const selectedMonths = new Set();
            state.selectedHistoryCells.forEach(k => {
                const parts = String(k).split('|');
                if (parts.length < 2) return;
                selectedRows.add(parts[0]);
                selectedMonths.add(parts.slice(1).join('|'));
            });

            tbody.querySelectorAll('tr[data-row-key]').forEach(tr => {
                const rk = String(tr.dataset.rowKey || '');
                if (rk && selectedRows.has(rk)) tr.classList.add('sf-spotlight-row');
            });
            tbody.querySelectorAll('td.sf-cell-history[data-month][data-row-key]').forEach(td => {
                const rk = String(td.dataset.rowKey || '');
                const mk = String(td.dataset.month || '');
                if (rk && mk && state.selectedHistoryCells.has(`${rk}|${mk}`)) {
                    td.classList.add('sf-cell-selected');
                }
                if (mk && selectedMonths.has(mk)) td.classList.add('sf-spotlight-col');
            });
            if (thead && state.historyExpanded) {
                thead.querySelectorAll('tr.sf-thead-row-2 th.sf-th-history[data-month]').forEach(th => {
                    const mk = String(th.dataset.month || '');
                    if (mk && selectedMonths.has(mk)) th.classList.add('sf-spotlight-col');
                });
            }

            // enable perf dialog only when all selections are in the same row
            let rowOnly = '';
            selectedRows.forEach(r => { if (!rowOnly) rowOnly = r; else rowOnly = '__multi__'; });
            if (showBtn) showBtn.disabled = !(rowOnly && rowOnly !== '__multi__' && selectedMonths.size > 0);
        }

        function bindHistoryCellSelection(tbody) {
            if (!tbody || tbody.dataset.historySelectBound === '1') return;
            tbody.dataset.historySelectBound = '1';

            const getCellKeyFromTd = (td) => {
                if (!td) return '';
                const rk = String(td.dataset.rowKey || '');
                const mk = String(td.dataset.month || '');
                if (!rk || !mk) return '';
                return `${rk}|${mk}`;
            };

            const selectRect = (a, b, replace) => {
                if (!a || !b) return;
                const aRow = String(a.rowKey || '');
                const bRow = String(b.rowKey || '');
                const aMonth = String(a.monthKey || '');
                const bMonth = String(b.monthKey || '');
                if (!aRow || !bRow || !aMonth || !bMonth) return;
                // current implementation focuses on same-row multi-month selection (most common)
                if (aRow !== bRow) return;
                const months = state.historyMonths.slice();
                const i1 = months.indexOf(aMonth);
                const i2 = months.indexOf(bMonth);
                if (i1 < 0 || i2 < 0) return;
                const lo = Math.min(i1, i2);
                const hi = Math.max(i1, i2);
                if (replace) state.selectedHistoryCells.clear();
                for (let i = lo; i <= hi; i++) {
                    state.selectedHistoryCells.add(`${aRow}|${months[i]}`);
                }
            };

            let dragging = false;
            let dragStart = null;

            tbody.addEventListener('mousedown', (e) => {
                const td = e.target && e.target.closest ? e.target.closest('td.sf-cell-history[data-month][data-row-key]') : null;
                if (!td) return;
                if (!state.historyExpanded) return;
                dragging = true;
                dragStart = { rowKey: String(td.dataset.rowKey || ''), monthKey: String(td.dataset.month || '') };
                state.selectionAnchor = dragStart;
                if (!(e.ctrlKey || e.metaKey || e.shiftKey)) {
                    state.selectedHistoryCells.clear();
                }
                const key = getCellKeyFromTd(td);
                if (key) state.selectedHistoryCells.add(key);
                applyHistorySelectionStyles();
                e.preventDefault();
            }, true);

            document.addEventListener('mousemove', (e) => {
                if (!dragging || !dragStart) return;
                const td = e.target && e.target.closest ? e.target.closest('td.sf-cell-history[data-month][data-row-key]') : null;
                if (!td) return;
                const cur = { rowKey: String(td.dataset.rowKey || ''), monthKey: String(td.dataset.month || '') };
                selectRect(dragStart, cur, true);
                applyHistorySelectionStyles();
            }, true);

            document.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                dragStart = null;
            }, true);

            tbody.addEventListener('click', (e) => {
                const td = e.target && e.target.closest ? e.target.closest('td.sf-cell-history[data-month][data-row-key]') : null;
                if (!td || !state.historyExpanded) return;
                if (e.target && e.target.closest && e.target.closest('.sf-tooltip-wrap')) return;
                const key = getCellKeyFromTd(td);
                if (!key) return;
                const rowKey = String(td.dataset.rowKey || '');
                const monthKey = String(td.dataset.month || '');
                const isCtrl = e.ctrlKey || e.metaKey;
                const isShift = e.shiftKey;
                if (isShift && state.selectionAnchor) {
                    selectRect(state.selectionAnchor, { rowKey, monthKey }, !isCtrl);
                } else if (isCtrl) {
                    if (state.selectedHistoryCells.has(key)) state.selectedHistoryCells.delete(key);
                    else state.selectedHistoryCells.add(key);
                    state.selectionAnchor = { rowKey, monthKey };
                } else {
                    state.selectedHistoryCells.clear();
                    state.selectedHistoryCells.add(key);
                    state.selectionAnchor = { rowKey, monthKey };
                }
                applyHistorySelectionStyles();
            });
        }

        function renderForecastTableBodyOnly() {
            renderForecastTable();
        }

        function applyForecastColgroupWidths(table, leafColWidths) {
            const t = table || document.getElementById('forecastTable');
            if (!t) return;
            const cols = Array.from((t.querySelector('colgroup#forecastColgroup') || {}).children || []);
            for (let i = 0; i < cols.length && i < (leafColWidths || []).length; i++) {
                const w = Math.max(46, Number(leafColWidths[i] || 0));
                cols[i].style.width = `${w}px`;
            }
            const totalWidth = (leafColWidths || []).reduce((acc, n) => acc + Number(n || 0), 0);
            t.style.minWidth = `${Math.max(960, totalWidth)}px`;
        }

        function annotateForecastHeaderColumns(thead, totalCols) {
            const rows = Array.from((thead || {}).querySelectorAll ? thead.querySelectorAll('tr') : []);
            const occupied = [];
            rows.forEach((row, rowIndex) => {
                occupied[rowIndex] = occupied[rowIndex] || [];
                let colIndex = 0;
                Array.from(row.children).forEach(cell => {
                    while (occupied[rowIndex][colIndex]) colIndex += 1;
                    const colspan = Number(cell.getAttribute('colspan') || 1) || 1;
                    const rowspan = Number(cell.getAttribute('rowspan') || 1) || 1;
                    const start = colIndex;
                    const end = colIndex + colspan - 1;
                    cell.dataset.colStart = String(start);
                    cell.dataset.colEnd = String(end);
                    for (let r = rowIndex; r < rowIndex + rowspan; r += 1) {
                        occupied[r] = occupied[r] || [];
                        for (let c = start; c <= end; c += 1) occupied[r][c] = true;
                    }
                    colIndex = end + 1;
                });
            });
            // best-effort validate ranges
            rows.forEach(r => {
                Array.from(r.children).forEach(cell => {
                    const s = Number(cell.dataset.colStart);
                    const e = Number(cell.dataset.colEnd);
                    if (!Number.isFinite(s) || !Number.isFinite(e) || s < 0 || e < s || e >= totalCols) {
                        delete cell.dataset.colStart;
                        delete cell.dataset.colEnd;
                    }
                });
            });
        }

        function attachForecastColumnResizeHandles(thead, cols, meta, leafColWidths) {
            if (!thead) return;
            const table = document.getElementById('forecastTable');
            const totalCols = Number(meta && meta.specCount || 0) + Number(meta && meta.histCols || 0) + Number(meta && meta.fcCols || 0);
            thead.querySelectorAll('.sf-col-resize-handle').forEach(el => el.remove());
            thead.querySelectorAll('th').forEach(cell => {
                const colStart = Number(cell.dataset.colStart);
                const colEnd = Number(cell.dataset.colEnd);
                if (!Number.isFinite(colStart) || !Number.isFinite(colEnd) || colStart < 0 || colEnd < colStart || colEnd >= totalCols) return;
                cell.style.position = 'relative';
                const handle = document.createElement('span');
                handle.className = 'sf-col-resize-handle';
                handle.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                });
                handle.addEventListener('mousedown', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    state._sfSuppressHeaderClickUntil = Date.now() + 1200;
                    const startX = event.clientX;
                    const startWidths = leafColWidths.slice();
                    const spanCount = (colEnd - colStart + 1);
                    const minTotal = 46 * spanCount;
                    const startTotal = startWidths.slice(colStart, colEnd + 1).reduce((sum, w) => sum + Math.max(46, Number(w || 60)), 0);
                    let moved = false;

                    const inRange = (idx, start, end) => idx >= start && idx <= end;
                    const isHistorySpan = meta && meta.histCols > 0
                        && inRange(colStart, meta.historyStart, meta.historyEnd)
                        && inRange(colEnd, meta.historyStart, meta.historyEnd);
                    const isForecastSpan = meta && meta.fcCols > 0
                        && inRange(colStart, meta.forecastStart, meta.forecastEnd)
                        && inRange(colEnd, meta.forecastStart, meta.forecastEnd);

                    const applyMonthGroupWidth = (kind, newPerWidth) => {
                        const w = Math.max(46, Math.round(Number(newPerWidth || 0)));
                        if (kind === 'history') {
                            for (let i = meta.historyStart; i <= meta.historyEnd; i++) leafColWidths[i] = w;
                        } else {
                            for (let i = meta.forecastStart; i <= meta.forecastEnd; i++) leafColWidths[i] = w;
                        }
                    };

                    const onMove = (moveEvent) => {
                        const delta = moveEvent.clientX - startX;
                        if (Math.abs(delta) > 2) moved = true;

                        if (isHistorySpan) {
                            const targetTotal = Math.max(minTotal, startTotal + delta);
                            const per = Math.max(46, Math.round(targetTotal / Math.max(1, spanCount)));
                            applyMonthGroupWidth('history', per);
                        } else if (isForecastSpan) {
                            const targetTotal = Math.max(minTotal, startTotal + delta);
                            const per = Math.max(46, Math.round(targetTotal / Math.max(1, spanCount)));
                            applyMonthGroupWidth('forecast', per);
                        } else if (spanCount <= 1) {
                            leafColWidths[colEnd] = Math.max(46, Number(startWidths[colEnd] || 60) + delta);
                        } else {
                            const targetTotal = Math.max(minTotal, startTotal + delta);
                            const factor = targetTotal / Math.max(1, startTotal);
                            let allocated = 0;
                            for (let idx = colStart; idx <= colEnd; idx += 1) {
                                const base = Math.max(46, Number(startWidths[idx] || 60));
                                const scaled = Math.max(46, Math.round(base * factor));
                                leafColWidths[idx] = scaled;
                                allocated += scaled;
                            }
                            const remainder = Math.round(targetTotal - allocated);
                            leafColWidths[colEnd] = Math.max(46, Number(leafColWidths[colEnd] || 60) + remainder);
                        }

                        applyForecastColgroupWidths(table, leafColWidths);
                    };
                    const onUp = () => {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        state._sfSuppressHeaderClickUntil = Date.now() + (moved ? 320 : 160);
                        saveColWidthPrefs(state.forecastMode, cols, meta, leafColWidths);
                    };
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
                cell.appendChild(handle);
            });
        }

        // ===== Multi-month performance dialog (history cells) =====
        const SF_PREF_PERF_FIELDS_KEY = 'sales_forecast_perf_fields_v1';

        function getPerfFieldCatalog() {
            return [
                { key: 'month', label: '月份' },
                { key: 'sales_qty', label: '销量' },
                { key: 'net_sales_amount', label: '销售额(净)' },
                { key: 'order_qty', label: '订单数' },
                { key: 'session_total', label: '会话数' },
                { key: 'refund_amount', label: '退款金额' },
                { key: 'aov', label: '客单价(净)/单' },
                { key: 'conversion_rate', label: '转化率(订单/会话)' },
                { key: 'refund_rate', label: '退款率(退款额/净销售额)' },
            ];
        }

        function readPerfFieldsPref() {
            const fallback = ['month', 'sales_qty', 'net_sales_amount', 'order_qty', 'session_total', 'refund_amount'];
            try {
                const raw = String(localStorage.getItem(SF_PREF_PERF_FIELDS_KEY) || '').trim();
                if (!raw) return fallback;
                const arr = JSON.parse(raw);
                if (!Array.isArray(arr) || !arr.length) return fallback;
                return arr.map(x => String(x || '').trim()).filter(Boolean);
            } catch (e) {
                return fallback;
            }
        }

        function writePerfFieldsPref(keys) {
            try { localStorage.setItem(SF_PREF_PERF_FIELDS_KEY, JSON.stringify(keys || [])); } catch (e) {}
        }

        function computePerfValue(cell, key, monthKey) {
            if (!cell) return '';
            if (key === 'month') return monthShortLabel(monthKey);
            const num = (v) => (v == null ? 0 : Number(v || 0));
            const fmtNum = (v) => formatNumber(num(v));
            if (key === 'sales_qty') return fmtNum(cell.sales_qty);
            if (key === 'net_sales_amount') return fmtNum(cell.net_sales_amount);
            if (key === 'order_qty') return fmtNum(cell.order_qty);
            if (key === 'session_total') return fmtNum(cell.session_total);
            if (key === 'refund_amount') return fmtNum(cell.refund_amount);
            if (key === 'aov') {
                const orders = num(cell.order_qty);
                const net = num(cell.net_sales_amount);
                if (!orders) return '0';
                return (net / orders).toLocaleString('en-US', { maximumFractionDigits: 2 });
            }
            if (key === 'conversion_rate') {
                const orders = num(cell.order_qty);
                const sess = num(cell.session_total);
                if (!sess) return '0%';
                return ((orders / sess) * 100).toFixed(2) + '%';
            }
            if (key === 'refund_rate') {
                const net = num(cell.net_sales_amount);
                const r = num(cell.refund_amount);
                if (!net) return '0%';
                return ((r / net) * 100).toFixed(2) + '%';
            }
            // unknown raw key (fallback)
            const raw = cell[key];
            if (typeof raw === 'number') return fmtNum(raw);
            if (raw == null) return '';
            return String(raw);
        }

        function getSelectedHistoryCellsForSingleRow() {
            const keys = selectedCellsArray();
            const rowSet = new Set();
            const months = [];
            keys.forEach(k => {
                const [rowKey, monthKey] = String(k).split('|');
                if (!rowKey || !monthKey) return;
                rowSet.add(rowKey);
                months.push(monthKey);
            });
            if (rowSet.size !== 1) return null;
            const rowKey = Array.from(rowSet)[0];
            months.sort();
            return { rowKey, months: Array.from(new Set(months)) };
        }

        function resolveRowByKey(rowKey) {
            const rk = String(rowKey || '').trim();
            if (!rk) return null;
            const rows = state.rows || [];
            return rows.find(r => String(r.row_key || '') === rk) || null;
        }

        function ensurePerfModal() {
            let modal = document.getElementById('sfPerfModal');
            if (modal) return modal;
            modal = document.createElement('div');
            modal.id = 'sfPerfModal';
            modal.className = 'pm-modal';
            modal.innerHTML = `
                <div class="pm-modal-content pm-modal-content--wide">
                    <div class="pm-modal-scroll">
                        <h3 style="margin-top:0;">历史月销量 · 产品表现</h3>
                        <div class="helper-text" id="sfPerfModalTitle"></div>
                        <div style="margin-top:0.65rem; display:grid; grid-template-columns: 280px 1fr; gap: 0.8rem; align-items:start;">
                            <div>
                                <div style="font-weight:700; margin-bottom:0.35rem;">显示字段（本地记忆）</div>
                                <div id="sfPerfFieldList" style="display:grid; gap:0.25rem;"></div>
                            </div>
                            <div>
                                <div style="font-weight:700; margin-bottom:0.35rem;">数据</div>
                                <div style="border:1px solid rgba(207, 199, 189, 0.6); border-radius:10px; overflow:auto; max-height:60vh; background:#fff;">
                                    <table class="pm-table" data-disable-table-manage="1" style="margin:0;">
                                        <thead><tr id="sfPerfHeadRow"></tr></thead>
                                        <tbody id="sfPerfBody"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="pm-modal-actions">
                        <button type="button" class="btn-secondary" id="sfPerfCloseBtn">关闭</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => { if (e.target === modal) closePerfModal(); });
            modal.querySelector('#sfPerfCloseBtn')?.addEventListener('click', closePerfModal);
            return modal;
        }

        function closePerfModal() {
            const modal = document.getElementById('sfPerfModal');
            if (modal) modal.classList.remove('active');
        }

        function renderPerfModal() {
            const sel = getSelectedHistoryCellsForSingleRow();
            if (!sel) {
                showToast('请先在同一行选择多个历史月份单元格', true);
                return;
            }
            const row = resolveRowByKey(sel.rowKey);
            if (!row) {
                showToast('未找到对应行数据', true);
                return;
            }
            const modal = ensurePerfModal();
            const title = modal.querySelector('#sfPerfModalTitle');
            if (title) title.textContent = `已选月份：${sel.months.map(m => monthShortLabel(m)).join('、')}`;

            const catalog = getPerfFieldCatalog();
            const saved = new Set(readPerfFieldsPref());
            const fieldList = modal.querySelector('#sfPerfFieldList');
            if (fieldList) {
                fieldList.innerHTML = catalog.map(f => {
                    const ck = saved.has(f.key) ? 'checked' : '';
                    return `<label style="display:flex; gap:0.45rem; align-items:center;"><input type="checkbox" data-field="${escapeHtml(f.key)}" ${ck}> <span>${escapeHtml(f.label)}</span></label>`;
                }).join('');
                fieldList.querySelectorAll('input[type="checkbox"][data-field]').forEach(cb => {
                    cb.addEventListener('change', () => {
                        const picked = Array.from(fieldList.querySelectorAll('input[type="checkbox"][data-field]:checked')).map(x => String(x.dataset.field || '').trim()).filter(Boolean);
                        writePerfFieldsPref(picked);
                        renderPerfModal();
                    });
                });
            }

            const pickedKeys = readPerfFieldsPref();
            const pickedFields = pickedKeys.map(k => catalog.find(x => x.key === k)).filter(Boolean);
            const headRow = modal.querySelector('#sfPerfHeadRow');
            if (headRow) headRow.innerHTML = pickedFields.map(f => `<th>${escapeHtml(f.label)}</th>`).join('');
            const body = modal.querySelector('#sfPerfBody');
            if (body) {
                body.innerHTML = sel.months.map(mk => {
                    const cell = (row.history && row.history[mk]) || null;
                    return `<tr>${pickedFields.map(f => `<td>${escapeHtml(computePerfValue(cell, f.key, mk) || '0')}</td>`).join('')}</tr>`;
                }).join('');
            }

            modal.classList.add('active');
        }

        // ===== 单元格 =====
        function buildForecastCell(row, monthKey) {
            const wrap = document.createElement('span');
            wrap.className = 'sf-cell-wrap';

            const forecast = (row.forecasts && row.forecasts[monthKey]) || null;
            const dirtyKey = row.row_key + '|' + monthKey;
            const dirtyVal = state.dirty.has(dirtyKey) ? Number(state.dirty.get(dirtyKey).latest_qty) : null;

            const baseValue = forecast ? Number(forecast.value_qty || 0) : 0;
            const value = dirtyVal !== null ? dirtyVal : baseValue;

            const input = document.createElement('input');
            input.type = 'number';
            input.min = '0';
            input.step = '1';
            input.className = 'sf-num-input';
            if (forecast && forecast.is_inherited) input.classList.add('is-inherited');
            if (dirtyVal !== null) input.classList.add('is-dirty');
            input.value = String(value || 0);
            input.dataset.rowKey = row.row_key;
            input.dataset.month = monthKey;
            input.dataset.original = String(baseValue || 0);
            input.addEventListener('input', onForecastInputChange);

            wrap.appendChild(input);

            // 角标：来自来源（继承）或来自数据库（已存储）
            if (forecast && forecast.is_inherited && forecast.source && forecast.source.items && forecast.source.items.length) {
                const badge = document.createElement('span');
                badge.className = 'sf-source-badge is-inherited';
                badge.textContent = forecast.source.type === 'platform_sku' ? '继' : '承';
                badge.title = '继承自' + (forecast.source.type === 'platform_sku' ? '销售平台SKU' : '规格+面料') + '：' + formatNumber(forecast.source.total_qty);
                const tipped = makeTooltipWrap(buildSourceTooltip(forecast, monthKey), badge);
                wrap.appendChild(tipped);
            } else if (forecast && forecast.source && forecast.source.items && forecast.source.items.length) {
                const badge = document.createElement('span');
                badge.className = 'sf-source-badge';
                badge.textContent = formatNumber(forecast.source.total_qty);
                const tipped = makeTooltipWrap(buildSourceTooltip(forecast, monthKey, true), badge);
                wrap.appendChild(tipped);
            }

            // 让 cell-meta 时间戳也可悬浮查看
            if (forecast && forecast.cell_meta) {
                input.title = '初始：' + formatNumber(forecast.cell_meta.initial_qty || 0)
                    + '\n上次：' + formatNumber(forecast.cell_meta.prev_qty || 0)
                    + '\n最新：' + formatNumber(forecast.cell_meta.latest_qty || 0)
                    + '\n创建：' + formatDateTime(forecast.cell_meta.created_at)
                    + '\n上次更新：' + formatDateTime(forecast.cell_meta.prev_updated_at)
                    + '\n最新更新：' + formatDateTime(forecast.cell_meta.latest_updated_at);
            }

            return wrap;
        }

        function onForecastInputChange(e) {
            const input = e.target;
            const rowKey = input.dataset.rowKey;
            const month = input.dataset.month;
            const original = Number(input.dataset.original || 0);
            const newVal = Math.max(0, parseInt(input.value, 10) || 0);
            const k = rowKey + '|' + month;
            if (newVal === original) {
                state.dirty.delete(k);
                input.classList.remove('is-dirty');
            } else {
                state.dirty.set(k, { row_key: rowKey, forecast_month: month, latest_qty: newVal });
                input.classList.add('is-dirty');
            }
            refreshBatchPopup();
            if (!state.forecastExpanded) renderForecastTableBodyOnly();
        }

        function makeTooltipWrap(html, contentNode) {
            const wrap = document.createElement('span');
            wrap.className = 'sf-tooltip-wrap';
            wrap.tabIndex = 0;
            const content = document.createElement('span');
            content.className = 'sf-tooltip-content';
            content.appendChild(contentNode);
            wrap.appendChild(content);
            const bubble = document.createElement('span');
            bubble.className = 'sf-tooltip-bubble';
            bubble.innerHTML = html;
            wrap.appendChild(bubble);
            wrap.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const isPinned = wrap.classList.contains('is-pinned');
                document.querySelectorAll('.sf-tooltip-wrap.is-pinned').forEach(node => {
                    node.classList.remove('is-pinned');
                });
                if (!isPinned) wrap.classList.add('is-pinned');
            });
            return wrap;
        }

        function buildHistoryTooltip(cell, monthKey) {
            const fields = [
                ['月份', monthShortLabel(monthKey)],
                ['销量', formatNumber(cell.sales_qty || 0)],
                ['销售额(净)', formatNumber(cell.net_sales_amount || 0)],
                ['订单数', formatNumber(cell.order_qty || 0)],
                ['会话数', formatNumber(cell.session_total || 0)],
                ['退款金额', formatNumber(cell.refund_amount || 0)],
            ];
            return '<div class="sf-tip-title">来自“产品表现”月聚合</div>'
                + '<dl>' + fields.map(([k, v]) => '<dt>' + k + '</dt><dd>' + (v || '0') + '</dd>').join('') + '</dl>';
        }

        function buildSourceTooltip(forecast, monthKey, hasStored) {
            const src = forecast.source || {};
            const items = src.items || [];
            const title = src.type === 'platform_sku' ? '继承自销售平台SKU 预测' : '继承自 规格+面料 预测';
            const liHtml = items.map(it => {
                if (src.type === 'platform_sku') {
                    return '<li>' + escapeHtml(it.label) + ' = ' + formatNumber(it.qty) + '</li>';
                }
                return '<li>' + escapeHtml(it.label) + ' × ' + (it.ratio || 1) + ' = ' + formatNumber(it.qty) + '</li>';
            }).join('');
            const totalLine = '<dl><dt>合计</dt><dd>' + formatNumber(src.total_qty || 0) + '</dd>'
                + (hasStored ? '<dt>已存储</dt><dd>' + formatNumber(forecast.stored_qty || 0) + '</dd>' : '')
                + '<dt>月份</dt><dd>' + monthShortLabel(monthKey) + '</dd></dl>';
            return '<div class="sf-tip-title">' + title + '</div>'
                + (items.length ? '<ul class="sf-tip-list">' + liHtml + '</ul>' : '')
                + totalLine;
        }

        // ===== 批量保存弹窗 =====
        function refreshBatchPopup() {
            const popup = document.getElementById('sfBatchPopup');
            const summary = document.getElementById('sfBatchPopupSummary');
            if (!popup || !summary) return;
            const total = state.dirty.size;
            summary.textContent = '未保存修改：' + total + ' 条（' + modeLabel(state.forecastMode) + ' 模式）';
            popup.classList.toggle('is-active', total > 0);
        }

        function modeLabel(mode) {
            if (mode === 'platform') return '销售平台SKU';
            if (mode === 'order') return '下单SKU';
            return '规格+面料';
        }

        async function saveAllChanges() {
            if (state.dirty.size <= 0) {
                showToast('没有可保存的修改');
                return;
            }
            const payloadCells = [];
            state.dirty.forEach(item => payloadCells.push(item));
            setLoading(true);
            try {
                const resp = await fetch('/api/sales-forecast-bulk-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ forecast_mode: state.forecastMode, cells: payloadCells }),
                });
                const data = await resp.json();
                if (!data || data.status !== 'success') throw new Error((data && data.message) || '保存失败');
                state.dirty.clear();
                refreshBatchPopup();
                showToast('保存成功，已刷新');
                await loadForecastData();
            } catch (err) {
                showToast(err && err.message ? err.message : '保存失败', true);
            } finally {
                setLoading(false);
            }
        }

        function discardAllChanges() {
            if (state.dirty.size <= 0) return;
            state.dirty.clear();
            refreshBatchPopup();
            renderForecastTableBodyOnly();
        }

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            state.historyExpanded = readBoolPref(SF_PREF_HISTORY_EXPANDED_KEY, true);
            state.forecastExpanded = readBoolPref(SF_PREF_FORECAST_EXPANDED_KEY, true);
            // 历史范围默认：上个月起回溯 12 个月
            const today = new Date();
            let endY = today.getFullYear();
            let endM = today.getMonth(); // 当前月-1（getMonth=0..11，需先取 month-1）
            if (endM < 1) { endM = 12; endY -= 1; }
            const endKey = endY.toString().padStart(4, '0') + '-' + pad2(endM) + '-01';
            const startKey = shiftMonth(endKey, -11);
            const startEl = document.getElementById('historyStart');
            const endEl = document.getElementById('historyEnd');
            if (startEl) startEl.value = startKey.slice(0, 7);
            if (endEl) endEl.value = endKey.slice(0, 7);

            bindModeSegment();
            setForecastMonthsFuture(6);

            // 月份选择器
            ensureGlobalMonthPickerDialog();
            const pickerBtn = document.getElementById('addMonthPickerBtn');
            if (pickerBtn) {
                pickerBtn.addEventListener('click', () => {
                    if (typeof window.showGlobalMonthPickerDialog !== 'function') return;
                    const hidden = document.getElementById('addMonthInput');
                    window.showGlobalMonthPickerDialog({
                        anchor: pickerBtn,
                        value: hidden && hidden.value ? String(hidden.value).slice(0, 7) : '',
                        year: state.monthPickerYear,
                        onPick: (pickedMonth) => {
                            if (hidden) hidden.value = pickedMonth;
                            pickerBtn.textContent = pickedMonth;
                            state.monthPickerYear = parseInt(String(pickedMonth).slice(0, 4), 10) || state.monthPickerYear;
                        }
                    });
                });
            }
            const bindHistoryMonthPicker = (id) => {
                const input = document.getElementById(id);
                if (!input) return;
                const openPicker = (e) => {
                    if (e) {
                        e.preventDefault();
                        e.stopPropagation();
                    }
                    if (typeof window.showGlobalMonthPickerDialog !== 'function') return;
                    const currentVal = String(input.value || '').trim();
                    window.showGlobalMonthPickerDialog({
                        anchor: input,
                        value: /^\d{4}-\d{2}$/.test(currentVal) ? currentVal : '',
                        onPick: (pickedMonth) => {
                            input.value = pickedMonth;
                        }
                    });
                };
                input.addEventListener('click', openPicker);
                input.addEventListener('focus', openPicker);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') openPicker(e);
                });
            };
            bindHistoryMonthPicker('historyStart');
            bindHistoryMonthPicker('historyEnd');
            document.addEventListener('click', (e) => {
                if (e.target && e.target.closest && e.target.closest('.sf-tooltip-wrap')) return;
                document.querySelectorAll('.sf-tooltip-wrap.is-pinned').forEach(node => {
                    node.classList.remove('is-pinned');
                });
            });

            // 工具栏按钮
            document.getElementById('addMonthAddBtn').addEventListener('click', addForecastMonth);
            document.getElementById('btnLoadForecast').addEventListener('click', loadForecastData);
            document.querySelectorAll('button[data-future]').forEach(btn => {
                btn.addEventListener('click', () => setForecastMonthsFuture(parseInt(btn.dataset.future, 10) || 6));
            });
            const bindTopFilter = (id, key) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('input', () => {
                    const v = String(el.value || '').trim();
                    if (v) state.colFilters[key] = v;
                    else delete state.colFilters[key];
                    renderForecastTable();
                });
            };
            bindTopFilter('filterShop', 'shop_name');
            bindTopFilter('filterSku', 'sku_family');
            bindTopFilter('filterSpec', 'spec_name');
            bindTopFilter('filterFabric', 'fabric_code');

            // 弹窗
            document.getElementById('sfBatchSaveBtn').addEventListener('click', saveAllChanges);
            document.getElementById('sfBatchDiscardBtn').addEventListener('click', discardAllChanges);

            loadForecastData();
        });

        // Selection hint buttons
        document.addEventListener('DOMContentLoaded', () => {
            const clearBtn = document.getElementById('sfSelectionClearBtn');
            const showBtn = document.getElementById('sfSelectionShowPerfBtn');
            if (clearBtn && clearBtn.dataset.bound !== '1') {
                clearBtn.dataset.bound = '1';
                clearBtn.addEventListener('click', clearHistorySelection);
            }
            if (showBtn && showBtn.dataset.bound !== '1') {
                showBtn.dataset.bound = '1';
                showBtn.addEventListener('click', renderPerfModal);
            }
        });
    </script>
</body>
<script src="/static/js/header.js"></script>
</html>
