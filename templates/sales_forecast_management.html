        function normalizeColorHex(text) {
            const s = String(text || '').trim();
            if (!s) return '';
            if (/^#[0-9a-fA-F]{6}$/.test(s)) return s;
            if (/^[0-9a-fA-F]{6}$/.test(s)) return `#${s}`;
            return '';
        }

        function applyFilters(rows, cols) {
            const colByKey = Object.fromEntries(cols.map(c => [c.key, c]));
            return rows.filter(row => {
                for (const key in state.colFilters) {
                    const value = state.colFilters[key];
                    if (!value) continue;
                    const col = colByKey[key];
                    if (!col) continue;
                    const cellText = String(col.get(row) || '').toLowerCase();
                    if (cellText.indexOf(String(value).toLowerCase()) === -1) return false;
                }
                return true;
            });
        }

        function groupKeyFromRow(row) {
            if (!row || !row.labels) return '-';
            if (state.forecastMode === 'platform') {
                const shop = String(row.labels.shop_name || '-').trim() || '-';
                const family = String(row.labels.sku_family || '-').trim() || '-';
                return `${shop}||${family}`;
            }
            return String(row.labels.sku_family || '-').trim() || '-';
        }

        function buildGroups(rows) {
            if (state.lazyForecast && Array.isArray(state.forecastGroups)) {
                const cols = getColumnsForMode(state.forecastMode);
                const filtered = applyFilters(rows.slice(), cols);
                const byKey = new Map();
                filtered.forEach(row => {
                    const k = groupKeyFromRow(row);
                    if (!byKey.has(k)) byKey.set(k, []);
                    byKey.get(k).push(row);
                });
                return state.forecastGroups.map(g => {
                    const cnt = g.item_count != null ? g.item_count : null;
                    const baseTitle = String(g.title || g.key || '');
                    const title = cnt != null && cnt !== '' ? `${baseTitle}（${cnt}）` : baseTitle;
                    return {
                        key: g.key,
                        title,
                        items: byKey.get(g.key) || [],
                    };
                });
            }
            if (state.forecastMode === 'platform') {
                const map = new Map();
                rows.forEach(row => {
                    const shop = String(row.labels && row.labels.shop_name || '-').trim() || '-';
                    const family = String(row.labels && row.labels.sku_family || '-').trim() || '-';
                    const key = `${shop}||${family}`;
                    if (!map.has(key)) map.set(key, { key, title: `${shop} / ${family}`, items: [] });
                    map.get(key).items.push(row);
                });
                return Array.from(map.values());
            }
            const map = new Map();
            rows.forEach(row => {
                const family = String(row.labels && row.labels.sku_family || '-').trim() || '-';
                if (!map.has(family)) map.set(family, { key: family, title: family, items: [] });
                map.get(family).items.push(row);
            });
            return Array.from(map.values());
        }

        function sortGroupItems(items, cols) {
            if (!state.sortKey) return items.slice();
            const col = cols.find(c => c.key === state.sortKey);
            if (!col || !col.sort) return items.slice();
            const dir = state.sortDir === 'desc' ? -1 : 1;
            return items.slice().sort((a, b) => {
                const av = String(col.get(a) || '');
                const bv = String(col.get(b) || '');
                if (av === bv) return 0;
                return av.localeCompare(bv, 'zh-Hans-CN', { sensitivity: 'base' }) * dir;
            });
        }

        function getCollapsedSet() {
            return state.forecastMode === 'platform' ? state.collapsedPlatformGroups : state.collapsedSkuGroups;
        }

        function initCollapsedGroups(groups) {
            const target = getCollapsedSet();
            target.clear();
            groups.forEach(g => target.add(g.key));
        }

        function renderSpecCell(td, col, row) {
            if (col.key === 'thumb') {
                const b64 = String(col.get(row) || '').trim();
                if (b64) {
                    td.innerHTML = `<img class="sj-table-thumb-img" src="/api/image-preview?id=${encodeURIComponent(b64)}&mode=thumb&w=120&q=60" alt="" loading="lazy">`;
                } else {
                    td.innerHTML = '<span class="sj-table-thumb-empty">暂无</span>';
                }
                return;
            }
            if (col.key === 'fabric_code') {
                const color = normalizeColorHex(row.labels && row.labels.representative_color);
                const txt = String(col.get(row) || '');
                if (color) td.innerHTML = `<span class="sf-fabric-dot" style="background:${color};" title="${escapeHtml(txt || '面料')}"></span>`;
                else td.innerHTML = `<span>${escapeHtml(txt || '—')}</span>`;
                return;
            }
            td.innerHTML = `<div>${escapeHtml(String(col.get(row) || '—') || '—')}</div>`;
        }

        function getEffectiveForecastQty(row, monthKey) {
            if (!row || !monthKey) return 0;
            const dirtyKey = String(row.row_key || '') + '|' + String(monthKey);
            if (state.dirty.has(dirtyKey)) return Math.max(0, Number(state.dirty.get(dirtyKey).latest_qty) || 0);
            const fc = (row.forecasts && row.forecasts[monthKey]) || null;
            return fc ? Math.max(0, Number(fc.value_qty || 0)) : 0;
        }

        function mtdBandClass(ratio, tp) {
            const t = Number(tp) || 0.05;
            const r = Number(ratio);
            if (r < t - 0.10) return 'red';
            if (r > t + 0.30) return 'purple';
            if (r > t) return 'green';
            if (r >= t - 0.10) return 'yellow';
            return 'red';
        }

        function computeMtdDisplay(row) {
            const ctx = state.mtdContext || {};
            const curKey = String(ctx.current_month_key || '');
            const tp = Math.max(0, Math.min(1, Number(ctx.time_progress) || 0));
            if (!curKey || !row) {
                return { ok: false, reason: 'dash' };
            }
            const histCell = (row.history && row.history[curKey]) || {};
            const mtdSales = Math.max(0, Number(histCell.sales_qty || 0));
            const denom = getEffectiveForecastQty(row, curKey);
            if (!(denom > 0)) {
                return { ok: false, reason: 'noref', tp };
            }
            const ratio = mtdSales / denom;
            const barPct = Math.min(100, Math.max(0, ratio * 100));
            const pctText = `${(Math.round(ratio * 1000) / 10).toFixed(1)}%`;
            const bandRaw = mtdBandClass(ratio, tp);
            const bandClass = ({ red: 'red', yellow: 'yellow', green: 'green', purple: 'purple', neutral: 'neutral' })[bandRaw] || 'neutral';
            const recordStr = ctx.perf_max_record_date || String(ctx.perf_latest_updated_at || '').slice(0, 10) || '—';
            const refd = ctx.ref_day != null && ctx.days_in_month ? `${ctx.ref_day}/${ctx.days_in_month}日` : '';
            const title = `本月历史销量 ${formatNumber(mtdSales)}；本月预测整月 ${formatNumber(denom)}；完成率 ${pctText}（左÷右）。日表最新 record_date ${recordStr}，时间进度约 ${Math.round(tp * 100)}%（${refd}）；预测×进度参考约 ${formatNumber(Math.round(denom * tp))}`;
            return { ok: true, tp, barPct, bandClass, pctText, title };
        }

        function fillMtdTd(td, row) {
            td.className = 'sf-cell-mtd sf-grid-selectable';
            const ctx = state.mtdContext || {};
            if (!ctx.in_history_range) {
                td.innerHTML = '<span class="sf-mtd-na">—</span>';
                td.title = '当前历史范围未包含本月，或无法计算';
                return;
            }
            const d = computeMtdDisplay(row);
            if (!d.ok && d.reason === 'noref') {
                td.innerHTML = '<div class="sf-mtd-stack"><span class="sf-mtd-na">无参考</span></div>';
                td.title = '本月预测为 0 或未选本月作为预测列，无法按「历史÷预测」计算';
                return;
            }
            if (!d.ok) {
                td.innerHTML = '<span class="sf-mtd-na">—</span>';
                td.title = '无法计算';
                return;
            }
            td.title = d.title;
            td.innerHTML = `
                <div class="sf-mtd-stack">
                    <div class="sf-mtd-track" aria-hidden="true">
                        <div class="sf-mtd-timefill" style="width:${Math.round(d.tp * 1000) / 10}%"></div>
                        <div class="sf-mtd-bar sf-mtd-bar--${d.bandClass}" style="width:${Math.round(d.barPct * 10) / 10}%"></div>
                    </div>
                    <div class="sf-mtd-pct">${escapeHtml(d.pctText)}</div>
                </div>`;
        }

        function renderMtdCell(row) {
            const td = document.createElement('td');
            fillMtdTd(td, row);
            return td;
        }

        function refreshMtdCellForRowKey(rowKey) {
            const rk = String(rowKey || '');
            if (!rk) return;
            const tbody = document.getElementById('forecastTbody');
            if (!tbody) return;
            const tr = Array.from(tbody.querySelectorAll('tr[data-row-key]')).find(el => String(el.dataset.rowKey) === rk);
            if (!tr) return;
            const td = tr.querySelector('td.sf-cell-mtd');
            if (!td) return;
            const row = (state.rows || []).find(r => String(r.row_key) === rk);
            if (!row) return;
            fillMtdTd(td, row);
            applySfGridSelectionStyles();
        }

        function markSfGridCell(td, rowKey, colIdx) {
            if (!td) return;
            td.dataset.rowKey = String(rowKey || '');
            td.dataset.sfCi = String(colIdx);
            td.classList.add('sf-grid-selectable');
        }

        function buildSfColLayout(cols, histCols, mtdCols, fcCols, visibleHistMonths, visibleFcMonths, historyExpanded, forecastExpanded) {
            const L = [];
            cols.forEach(c => L.push({ kind: 'spec', key: c.key }));
            if (histCols) {
                if (historyExpanded) (visibleHistMonths || []).forEach(m => L.push({ kind: 'H', month: m }));
                else L.push({ kind: 'H', agg: true });
            }
            if (mtdCols) L.push({ kind: 'M' });
            if (fcCols) {
                if (forecastExpanded) (visibleFcMonths || []).forEach(m => L.push({ kind: 'F', month: m }));
                else L.push({ kind: 'F', agg: true });
            }
            for (let i = 0; i < SF_TURNOVER_COLS; i += 1) L.push({ kind: 'T', idx: i });
            for (let i = 0; i < SF_STOCK_COLS; i += 1) L.push({ kind: 'I', idx: i });
            return L;
        }

        function appendForecastInventoryRowCells(tr, row, rowKey, startCi) {
            let ci = Number(startCi) || 0;
            const inv = row.inventory || {};
            const fmtMc = (v) => ((v !== null && v !== undefined && Number.isFinite(Number(v))) ? Number(v).toFixed(2) : '—');
            const turnVals = [
                fmtMc(inv.months_cover_overseas),
                fmtMc(inv.months_cover_overseas_transit),
                fmtMc(inv.months_cover_total),
            ];
            SF_TURNOVER_HEADERS.forEach((h, i) => {
                const td = document.createElement('td');
                td.className = 'sf-cell-history sf-cell-turn';
                if (h.tip) td.title = h.tip;
                td.textContent = turnVals[i];
                markSfGridCell(td, rowKey, ci);
                ci += 1;
                tr.appendChild(td);
            });
            const stockVals = [
                formatNumber(Number(inv.overseas_qty) || 0),
                formatNumber(Number(inv.transit_qty) || 0),
                formatNumber(Number(inv.in_stock_qty) || 0),
                formatNumber(Number(inv.wip_qty) || 0),
            ];
            SF_STOCK_HEADERS.forEach((h, i) => {
                const td = document.createElement('td');
                td.className = 'sf-cell-history sf-cell-inv';
                if (h.tip) td.title = h.tip;
                td.textContent = stockVals[i];
                markSfGridCell(td, rowKey, ci);
                ci += 1;
                tr.appendChild(td);
            });
            return ci;
        }

        function renderForecastTable() {
            const thead = document.getElementById('forecastThead');
            const tbody = document.getElementById('forecastTbody');
            const table = document.getElementById('forecastTable');
            if (!thead || !tbody || !table) return;
            const cols = getColumnsForMode(state.forecastMode);
            const visibleHistMonths = state.historyExpanded ? state.historyMonths.slice() : [];
            const visibleFcMonths = state.forecastExpanded ? state.months.slice() : [];
            const histCols = state.historyMonths.length ? (state.historyExpanded ? visibleHistMonths.length : 1) : 0;
            const fcCols = state.months.length ? (state.forecastExpanded ? visibleFcMonths.length : 1) : 0;
            const mtdCols = histCols > 0 ? 1 : 0;
            const pref = loadColWidthPrefs(state.forecastMode);
            const leafColWidths = [];
            cols.forEach(col => {
                const key = String(col.key || '').trim();
                const w = Number((pref.spec || {})[key]);
                leafColWidths.push((Number.isFinite(w) && w > 30) ? w : getDefaultColWidthByKey(key));
            });
            // Month columns: ensure each month within the same group has the same width
            const historyWidth = Number(pref.history || 86);
            const forecastWidth = Number(pref.forecast || 86);
            for (let i = 0; i < histCols; i++) leafColWidths.push(historyWidth);
            if (mtdCols) {
                const mtdW0 = Number(pref.mtd);
                leafColWidths.push((Number.isFinite(mtdW0) && mtdW0 > 40) ? mtdW0 : 108);
            }
            for (let i = 0; i < fcCols; i++) leafColWidths.push(forecastWidth);
            const turnCols = SF_TURNOVER_COLS;
            const stockCols = SF_STOCK_COLS;
            const tailCols = SF_TAIL_COL_COUNT;
            const invCols = tailCols;
            const invPref = (pref.inventory && pref.inventory.length === invCols) ? pref.inventory : null;
            for (let i = 0; i < invCols; i++) {
                const w = invPref ? invPref[i] : (i < turnCols ? 86 : 92);
                leafColWidths.push((Number.isFinite(Number(w)) && Number(w) > 40) ? Math.round(Number(w)) : (i < turnCols ? 86 : 92));
            }
            const meta = {
                specCount: cols.length,
                histCols,
                mtdCols,
                fcCols,
                turnCols,
                stockCols,
                invCols,
                historyStart: cols.length,
                historyEnd: cols.length + Math.max(0, histCols - 1),
                mtdStart: cols.length + histCols,
                mtdEnd: cols.length + histCols + mtdCols - 1,
                forecastStart: cols.length + histCols + mtdCols,
                forecastEnd: cols.length + histCols + mtdCols + Math.max(0, fcCols - 1),
                turnStart: cols.length + histCols + mtdCols + fcCols,
                turnEnd: cols.length + histCols + mtdCols + fcCols + Math.max(0, turnCols - 1),
                stockStart: cols.length + histCols + mtdCols + fcCols + turnCols,
                stockEnd: cols.length + histCols + mtdCols + fcCols + turnCols + Math.max(0, stockCols - 1),
                invStart: cols.length + histCols + mtdCols + fcCols,
                invEnd: cols.length + histCols + mtdCols + fcCols + Math.max(0, invCols - 1),
            };
            state._sfColMeta = meta;
            state._sfLeafColWidths = leafColWidths;
            const totalWidth = leafColWidths.reduce((acc, n) => acc + Number(n || 0), 0);
            const wpx = Math.max(960, totalWidth);
            table.style.width = `${wpx}px`;
            table.style.minWidth = `${wpx}px`;
            table.style.removeProperty('--sf-thead-row1-height');
            const oldColgroup = table.querySelector('colgroup#forecastColgroup');
            if (oldColgroup && oldColgroup.parentNode) oldColgroup.parentNode.removeChild(oldColgroup);
            const colgroup = document.createElement('colgroup');
            colgroup.id = 'forecastColgroup';
            leafColWidths.forEach(w => {
                const c = document.createElement('col');
                c.style.width = `${w}px`;
                colgroup.appendChild(c);
            });
            table.insertBefore(colgroup, thead);

            const trTop = document.createElement('tr');
            trTop.className = 'sf-thead-row-1';
            const mtdHeadTip = '完成率 = 本月历史销量（左）÷ 本月预测整月量（右，含未保存编辑）。时间进度 = 产品表现日表 sales_product_performances 的全局最新 record_date 所在日号 ÷ 当月天数（仅精确到日）。色带：红明显落后进度、黄接近、绿超前、紫大幅超前。';
            const perfSub = (state.mtdContext && (state.mtdContext.perf_max_record_date || String(state.mtdContext.perf_latest_updated_at || '').slice(0, 10)))
                ? String(state.mtdContext.perf_max_record_date || state.mtdContext.perf_latest_updated_at || '').replace('T', ' ').slice(0, 16)
                : '—';
            const mtdProg = (state.mtdContext && state.mtdContext.in_history_range)
                ? `${Math.round((Number(state.mtdContext.time_progress) || 0) * 100)}%`
                : '—';
            trTop.innerHTML =
                `<th class="sf-th-section" colspan="${cols.length}">规格信息</th>` +
                (histCols ? `<th class="sf-th-section" colspan="${histCols}"><span class="sf-th-section-toggle" data-section="history"><span class="sf-group-toggle">${state.historyExpanded ? '▼' : '▶'}</span><span>历史月销量 <span class="help-dot" data-tip="数据来自“产品表现”看板按月聚合"></span></span></span></th>` : '') +
                (mtdCols ? `<th class="sf-th-section sf-th-mtd" colspan="1"><span class="help-dot" data-tip="${escapeHtml(mtdHeadTip)}"></span>本月完成率</th>` : '') +
                (fcCols ? `<th class="sf-th-section" colspan="${fcCols}"><span class="sf-th-section-toggle" data-section="forecast"><span class="sf-group-toggle">${state.forecastExpanded ? '▼' : '▶'}</span><span>预测月份</span></span></th>` : '') +
                `<th class="sf-th-section" colspan="${turnCols}"><span>动销月</span></th>` +
                `<th class="sf-th-section" colspan="${stockCols}"><span>库存</span></th>`;

            const trBottom = document.createElement('tr');
            trBottom.className = 'sf-thead-row-2';
            trBottom.innerHTML = cols.map(col => buildBottomHeaderHtml(col)).join('')
                + (state.historyExpanded ? visibleHistMonths.map(m => `<th class="sf-th-history" data-month="${m}">${monthHeaderTwoLineHtml(m)}</th>`).join('') : (histCols ? '<th class="sf-th-history">历史合计</th>' : ''))
                + (mtdCols ? `<th class="sf-th-mtd" title="${escapeHtml(mtdHeadTip)}"><div class="sf-month-two-line"><div class="sf-month-y">日表最新</div><div class="sf-month-m">${escapeHtml(perfSub)}</div></div><div class="sf-mtd-subhead">时间进度 ${escapeHtml(mtdProg)}</div></th>` : '')
                + (state.forecastExpanded ? visibleFcMonths.map(m => `<th class="sf-th-month">${monthHeaderTwoLineHtml(m)}</th>`).join('') : (fcCols ? '<th class="sf-th-month">预测合计</th>' : ''))
                + SF_TURNOVER_HEADERS.map(h => `<th class="sf-th-turn" title="${escapeHtml(h.tip || h.label)}">${escapeHtml(h.label)}</th>`).join('')
                + SF_STOCK_HEADERS.map(h => `<th class="sf-th-inv" title="${escapeHtml(h.tip || h.label)}">${escapeHtml(h.label)}</th>`).join('');
            thead.innerHTML = '';
            thead.appendChild(trTop);
            thead.appendChild(trBottom);
            bindHeaderEvents(thead, cols);
            const totalLeafCols = cols.length + histCols + mtdCols + fcCols + invCols;
            annotateForecastHeaderColumns(thead, totalLeafCols);
            attachForecastColumnResizeHandles(thead, cols, meta, leafColWidths);
            const filteredRows = applyFilters(state.rows.slice(), cols);
            const groups = buildGroups(filteredRows);
            const collapsedSet = getCollapsedSet();
            if (collapsedSet.size === 0 && groups.length) initCollapsedGroups(groups);

            state.sfColLayout = buildSfColLayout(cols, histCols, mtdCols, fcCols, visibleHistMonths, visibleFcMonths, state.historyExpanded, state.forecastExpanded);

            const totalCols = cols.length + histCols + mtdCols + fcCols + invCols;
            tbody.innerHTML = '';
            if (!groups.length) {
                state.sfGridSelected.clear();
                state.selectionAnchor = null;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="${totalCols}" class="sf-empty">没有匹配的数据</td>`;
                tbody.appendChild(tr);
                bindForecastGridSelection(tbody);
                applySfGridSelectionStyles();
                return;
            }

            groups.forEach(group => {
                const isCollapsed = collapsedSet.has(group.key);
                const gtr = document.createElement('tr');
                gtr.className = 'sf-group-row';
                gtr.dataset.groupKey = group.key;
                const loadHint = (state.lazyForecast && state.loadingGroupKey === group.key)
                    ? ' <span class="sf-muted">加载中…</span>'
                    : '';
                gtr.innerHTML = `<td colspan="${totalCols}"><span class="sf-group-toggle">${isCollapsed ? '▶' : '▼'}</span>${escapeHtml(group.title)}${loadHint}</td>`;
                tbody.appendChild(gtr);

                const sortedItems = sortGroupItems(group.items, cols);
                sortedItems.forEach(row => {
                    const tr = document.createElement('tr');
                    if (isCollapsed) tr.classList.add('sf-row-hidden');
                    tr.dataset.groupKey = group.key;
                    tr.dataset.rowKey = row.row_key;
                    let ci = 0;
                    cols.forEach(col => {
                        const td = document.createElement('td');
                        td.className = col.cellClass || 'sf-cell-spec';
                        renderSpecCell(td, col, row);
                        markSfGridCell(td, row.row_key, ci);
                        ci += 1;
                        tr.appendChild(td);
                    });
                    if (histCols) {
                        if (state.historyExpanded) {
                            visibleHistMonths.forEach(monthKey => {
                                const td = document.createElement('td');
                                td.className = 'sf-cell-history';
                                td.dataset.month = monthKey;
                                const cell = (row.history && row.history[monthKey]) || null;
                                const text = cell ? formatNumber(cell.sales_qty) : '0';
                                td.textContent = text;
                                markSfGridCell(td, row.row_key, ci);
                                ci += 1;
                                tr.appendChild(td);
                            });
                        } else {
                            const sum = state.historyMonths.reduce((acc, m) => acc + Number((((row.history || {})[m] || {}).sales_qty) || 0), 0);
                            const td = document.createElement('td');
                            td.className = 'sf-cell-history';
                            td.textContent = formatNumber(sum || 0);
                            markSfGridCell(td, row.row_key, ci);
                            ci += 1;
                            tr.appendChild(td);
                        }
                    }
                    if (mtdCols) {
                        const td = renderMtdCell(row);
                        markSfGridCell(td, row.row_key, ci);
                        ci += 1;
                        tr.appendChild(td);
                    }
                    if (fcCols) {
                        if (state.forecastExpanded) {
                            visibleFcMonths.forEach(monthKey => {
                                const td = document.createElement('td');
                                td.className = 'sf-cell-forecast preview-edit-cell';
                                td.appendChild(buildForecastCell(row, monthKey));
                                markSfGridCell(td, row.row_key, ci);
                                ci += 1;
                                tr.appendChild(td);
                            });
                        } else {
                            const sum = state.months.reduce((acc, m) => {
                                const forecast = (row.forecasts && row.forecasts[m]) || null;
                                const dirtyKey = row.row_key + '|' + m;
                                const dirtyVal = state.dirty.has(dirtyKey) ? Number(state.dirty.get(dirtyKey).latest_qty) : null;
                                const value = dirtyVal !== null ? dirtyVal : Number(forecast && forecast.value_qty || 0);
                                return acc + value;
                            }, 0);
                            const td = document.createElement('td');
                            td.className = 'sf-cell-history';
                            td.textContent = formatNumber(sum || 0);
                            markSfGridCell(td, row.row_key, ci);
                            ci += 1;
                            tr.appendChild(td);
                        }
                    }
                    appendForecastInventoryRowCells(tr, row, row.row_key, ci);
                    tbody.appendChild(tr);
                });
            });
            bindForecastGridSelection(tbody);
            applySfGridSelectionStyles();
        }

        function buildBottomHeaderHtml(col) {
            const sortMark = state.sortKey === col.key ? (state.sortDir === 'asc' ? '▲' : '▼') : '';
            const filterValue = state.colFilters[col.key] || '';
            const filterInput = '';
            return `<th class="sf-th-spec ${col.thClass || ''}" data-col-key="${col.key}"><div class="sf-th-cell"><span class="sf-th-title-row ${col.sort ? '' : 'is-disabled'}" data-sort-key="${col.sort ? col.key : ''}"><span>${escapeHtml(col.label)}</span><span class="sf-sort-arrow">${sortMark}</span></span>${filterInput}</div></th>`;
        }

        function bindHeaderEvents(thead, cols) {
            thead.querySelectorAll('.sf-th-section-toggle[data-section]').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (state._sfSuppressHeaderClickUntil && Date.now() < state._sfSuppressHeaderClickUntil) return;
                    e.preventDefault();
                    e.stopPropagation();
                    const sec = el.dataset.section;
                    if (sec === 'history') {
                        state.historyExpanded = !state.historyExpanded;
                        writeBoolPref(SF_PREF_HISTORY_EXPANDED_KEY, state.historyExpanded);
                    }
                    if (sec === 'forecast') {
                        state.forecastExpanded = !state.forecastExpanded;
                        writeBoolPref(SF_PREF_FORECAST_EXPANDED_KEY, state.forecastExpanded);
                    }
                    renderForecastTable();
                });
            });
            thead.querySelectorAll('.sf-th-title-row[data-sort-key]').forEach(el => {
                el.addEventListener('click', () => {
                    if (state._sfSuppressHeaderClickUntil && Date.now() < state._sfSuppressHeaderClickUntil) return;
                    const key = String(el.dataset.sortKey || '').trim();
                    if (!key) return;
                    if (state.sortKey === key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
                    else {
                        state.sortKey = key;
                        state.sortDir = 'asc';
                    }
                    renderForecastTable();
                });
            });
            thead.querySelectorAll('input.sf-th-filter[data-filter-key]').forEach(el => {
                el.addEventListener('input', () => {
                    const key = String(el.dataset.filterKey || '');
                    const v = String(el.value || '').trim();
                    if (v) state.colFilters[key] = v;
                    else delete state.colFilters[key];
                    renderForecastTable();
                });
            });
            const tbody = document.getElementById('forecastTbody');
            if (tbody && tbody.dataset.groupBound !== '1') {
                tbody.dataset.groupBound = '1';
                tbody.addEventListener('click', (e) => {
                    const row = e.target && e.target.closest ? e.target.closest('tr.sf-group-row[data-group-key]') : null;
                    if (!row) return;
                    const key = String(row.dataset.groupKey || '');
                    if (!key) return;
                    const collapsedSet = getCollapsedSet();
                    const wasCollapsed = collapsedSet.has(key);
                    const run = async () => {
                        if (wasCollapsed && state.lazyForecast && !state.loadedGroupKeys.has(key)) {
                            await loadForecastGroupRows(key);
                        }
                        if (collapsedSet.has(key)) collapsedSet.delete(key);
                        else collapsedSet.add(key);
                        renderForecastTable();
                    };
                    run();
                });
            }
        }

        function clearHistorySelection() {
            state.sfGridSelected.clear();
            state.selectionAnchor = null;
            applySfGridSelectionStyles();
        }

        function makeSfGridCellKey(rowKey, colIdx) {
            return JSON.stringify([String(rowKey || ''), Number(colIdx)]);
        }

        function parseSfGridCellKey(k) {
            try {
                const a = JSON.parse(String(k));
                if (Array.isArray(a) && a.length >= 2) {
                    const colIdx = Number(a[1]);
                    return { rowKey: String(a[0] || ''), colIdx: Number.isFinite(colIdx) ? colIdx : -1 };
                }
            } catch (_) {}
            return { rowKey: '', colIdx: -1 };
        }

        function getSfGridTd(tbody, rowKey, colIdx) {
            if (!tbody) return null;
            const rk = String(rowKey || '');
            const esc = (typeof CSS !== 'undefined' && CSS.escape) ? CSS.escape(rk) : rk.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
            const ci = Number(colIdx);
            if (!rk || !Number.isFinite(ci) || ci < 0) return null;
            return tbody.querySelector(`tr[data-row-key="${esc}"] td[data-sf-ci="${ci}"]`);
        }

        function exportSfGridTdPlain(td) {
            if (!td) return '';
            const inp = td.querySelector('input.sf-num-input');
            if (inp) return String(inp.value != null ? inp.value : '').trim();
            let t = String(td.innerText || '').replace(/\u00a0/g, ' ').trim();
            return t.replace(/\s+/g, ' ');
        }

        function getSfOrderedRowKeys() {
            const tbody = document.getElementById('forecastTbody');
            if (!tbody) return [];
            return Array.from(tbody.querySelectorAll('tr[data-row-key]'))
                .map(tr => String(tr.dataset.rowKey || '').trim())
                .filter(Boolean);
        }

        /** 将已选月份扩展为 historyMonths 时间轴上的连续闭区间（与 Excel 框选含义一致，不按离散格筛市场） */
        function expandMonthsAlongHistoryTimeline(monthKeys) {
            const order = (state.historyMonths || []).slice();
            const idxs = [];
            (monthKeys || []).forEach(mk => {
                const i = order.indexOf(String(mk));
                if (i >= 0) idxs.push(i);
            });
            if (!idxs.length) return [];
            const lo = Math.min(...idxs);
            const hi = Math.max(...idxs);
            return order.slice(lo, hi + 1);
        }

        function parseClipboardMatrixSf(text) {
            const raw = String(text || '').replace(/\r/g, '');
            if (!raw) return [];
            return raw.split('\n').filter(line => line.length > 0).map(line => line.split('\t'));
        }

        function copySfGridSelectionTsv() {
            if (!state.sfGridSelected || state.sfGridSelected.size === 0) return false;
            const tbody = document.getElementById('forecastTbody');
            if (!tbody) return false;
            const rows = getSfOrderedRowKeys();
            const keys = new Set(state.sfGridSelected);
            const pairs = [];
            keys.forEach(k => {
                const { rowKey, colIdx } = parseSfGridCellKey(k);
                if (!rowKey || colIdx < 0) return;
                pairs.push({ rowKey, colIdx });
            });
            if (!pairs.length) return false;
            const ri = pairs.map(p => rows.indexOf(p.rowKey)).filter(i => i >= 0);
            const ci = pairs.map(p => p.colIdx).filter(i => Number.isFinite(i) && i >= 0);
            if (!ri.length || !ci.length) return false;
            const rLo = Math.min(...ri);
            const rHi = Math.max(...ri);
            const cLo = Math.min(...ci);
            const cHi = Math.max(...ci);
            const lines = [];
            for (let r = rLo; r <= rHi; r += 1) {
                const rk = rows[r];
                const colsLine = [];
                for (let c = cLo; c <= cHi; c += 1) {
                    if (!keys.has(makeSfGridCellKey(rk, c))) {
                        colsLine.push('');
                        continue;
                    }
                    const td = getSfGridTd(tbody, rk, c);
                    colsLine.push(exportSfGridTdPlain(td));
                }
                lines.push(colsLine.join('\t'));
            }
            const tsv = lines.join('\n');
            if (!tsv) return false;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(tsv).then(() => {
                    if (window.showAppToast) window.showAppToast('已复制选中区域', false, 1200);
                }).catch(() => {});
                return true;
            }
            const area = document.createElement('textarea');
            area.value = tsv;
            area.style.position = 'fixed';
            area.style.left = '-10000px';
            document.body.appendChild(area);
            area.focus();
            area.select();
            try {
                document.execCommand('copy');
                if (window.showAppToast) window.showAppToast('已复制选中区域', false, 1200);
            } catch (_) {}
            document.body.removeChild(area);
            return true;
        }

        function applyForecastMatrixPasteFromInput(startInput, matrix) {
            if (!startInput || !matrix || !matrix.length) return false;
            const tbody = document.getElementById('forecastTbody');
            if (!tbody || !tbody.contains(startInput)) return false;
            const rowKeys = getSfOrderedRowKeys();
            const monthKeys = (state.months || []).slice();
            const startRk = String(startInput.dataset.rowKey || '');
            const startMk = String(startInput.dataset.month || '');
            const r0 = rowKeys.indexOf(startRk);
            const c0 = monthKeys.indexOf(startMk);
            if (r0 < 0 || c0 < 0) return false;
            let applied = 0;
            for (let r = 0; r < matrix.length; r += 1) {
                const rowVals = matrix[r] || [''];
                for (let c = 0; c < rowVals.length; c += 1) {
                    const rk = rowKeys[r0 + r];
                    const mk = monthKeys[c0 + c];
                    if (!rk || !mk) continue;
                    const inp = tbody.querySelector('input.sf-num-input[data-row-key="' + String(rk).replace(/"/g, '') + '"][data-month="' + String(mk).replace(/"/g, '') + '"]');
                    if (!inp) continue;
                    const raw = String(rowVals[c] != null ? rowVals[c] : '').trim();
                    const d = normalizeForecastDigitString(raw.replace(/[^\d]/g, ''));
                    inp.value = d === '' ? '0' : String(Math.max(0, parseInt(d, 10) || 0));
                    inp.dispatchEvent(new Event('input', { bubbles: true }));
                    applied += 1;
                }
            }
            return applied > 0;
        }

        function applySfMatrixPasteFromGridSelection(matrix) {
            if (!matrix || !matrix.length) return false;
            const tbody = document.getElementById('forecastTbody');
            if (!tbody || !state.sfGridSelected || state.sfGridSelected.size === 0) return false;
            const rowOrder = getSfOrderedRowKeys();
            const pairs = [];
            state.sfGridSelected.forEach(k => {
                const { rowKey, colIdx } = parseSfGridCellKey(k);
                if (!rowKey || colIdx < 0) return;
                pairs.push({ rowKey, colIdx });
            });
            if (!pairs.length) return false;
            const ris = pairs.map(p => rowOrder.indexOf(p.rowKey)).filter(i => i >= 0);
            const cis = pairs.map(p => p.colIdx).filter(i => Number.isFinite(i) && i >= 0);
            const rLo = Math.min(...ris);
            const rHi = Math.max(...ris);
            const cLo = Math.min(...cis);
            const cHi = Math.max(...cis);
            let r0 = -1;
            let c0 = -1;
            for (let ri = rLo; ri <= rHi; ri += 1) {
                const rk = rowOrder[ri];
                if (!rk) continue;
                for (let ci = cLo; ci <= cHi; ci += 1) {
                    const td = getSfGridTd(tbody, rk, ci);
                    if (td && td.querySelector('input.sf-num-input')) {
                        r0 = ri;
                        c0 = ci;
                        break;
                    }
                }
                if (r0 >= 0) break;
            }
            if (r0 < 0 || c0 < 0) return false;
            let applied = 0;
            for (let r = 0; r < matrix.length; r += 1) {
                const rowVals = matrix[r] || [''];
                for (let c = 0; c < rowVals.length; c += 1) {
                    const rk = rowOrder[r0 + r];
                    const colIdx = c0 + c;
                    if (!rk || !Number.isFinite(colIdx) || colIdx < 0) continue;
                    const td = getSfGridTd(tbody, rk, colIdx);
                    if (!td) continue;
                    const inp = td.querySelector('input.sf-num-input');
                    if (!inp) continue;
                    const raw = String(rowVals[c] != null ? rowVals[c] : '').trim();
                    const d = normalizeForecastDigitString(raw.replace(/[^\d]/g, ''));
                    inp.value = d === '' ? '0' : String(Math.max(0, parseInt(d, 10) || 0));
                    inp.dispatchEvent(new Event('input', { bubbles: true }));
                    applied += 1;
                }
            }
            return applied > 0;
        }

        /** 矩阵粘贴到预测格：焦点在筛选栏/弹窗等时不抢粘贴 */
        function sfActiveElementBlocksForecastMatrixPaste() {
            const ae = document.activeElement;
            if (!ae || ae === document.body || ae === document.documentElement) return false;
            if (ae.closest && ae.closest('#sfPerfFieldsDropdown')) return true;
            if (ae.closest && ae.closest('#sfPerfFloatingPanel')) return true;
            if (ae.closest && ae.closest('.sf-toolbar')) return true;
            if (ae.closest && ae.closest('#sfBatchPopup')) return true;
            if (ae.closest && ae.closest('#sfGlobalMonthPickerPopover')) return true;
            if (ae.closest && ae.closest('.sf-month-picker-popover')) return true;
            return false;
        }

        function initSfForecastSelectionGlobalOnce() {
            if (document.body.dataset.sfForecastGlobalBound === '1') return;
            document.body.dataset.sfForecastGlobalBound = '1';

            document.addEventListener('mousedown', (e) => {
                if (!document.getElementById('forecastTable')) return;
                const t = e.target;
                if (!t || !t.closest) return;
                if (t.closest('#forecastTableWrap')
                    || t.closest('#sfBatchPopup')
                    || t.closest('#sfPerfFloatingPanel')
                    || t.closest('#sfPerfFieldsDropdown')
                    || t.closest('.sf-month-picker-popover')
                    || t.closest('#sfGlobalMonthPickerPopover')) {
                    return;
                }
                if (state.sfGridSelected && state.sfGridSelected.size) clearHistorySelection();
            }, false);

            document.addEventListener('keydown', (e) => {
                if (!document.getElementById('forecastTable')) return;
                if (e.key === 'Escape') {
                    if (state.sfGridSelected && state.sfGridSelected.size) {
                        clearHistorySelection();
                        try { e.preventDefault(); } catch (_) {}
                    }
                    return;
                }
                if ((e.ctrlKey || e.metaKey) && String(e.key || '').toLowerCase() === 'c') {
                    const ae = document.activeElement;
                    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT') && !state.sfGridSelected.size) return;
                    if (state.sfGridSelected && state.sfGridSelected.size && copySfGridSelectionTsv()) {
                        try { e.preventDefault(); } catch (_) {}
                    }
                }
            }, true);

            document.addEventListener('paste', (e) => {
                if (!document.getElementById('forecastTable')) return;
                const text = (e.clipboardData && e.clipboardData.getData) ? e.clipboardData.getData('text/plain') : '';
                const matrix = parseClipboardMatrixSf(text);
                if (!matrix.length) return;
                const single = matrix.length === 1 && (matrix[0] || []).length <= 1;

                /* 多选后焦点常在 body 或表格外控件，paste 的 target 不在 #forecastTable，原先逻辑永远进不来 */
                if (!single && state.sfGridSelected && state.sfGridSelected.size && !sfActiveElementBlocksForecastMatrixPaste()) {
                    if (applySfMatrixPasteFromGridSelection(matrix)) {
                        e.preventDefault();
                        if (window.showAppToast) window.showAppToast('已粘贴到预测输入区域', false, 1800);
                        return;
                    }
                }

                const el = e.target;
                if (!el || !el.closest || !el.closest('#forecastTable')) return;
                const field = el.closest('input.sf-num-input');
                if (field) {
                    if (single) return;
                    e.preventDefault();
                    if (applyForecastMatrixPasteFromInput(field, matrix) && window.showAppToast) {
                        window.showAppToast('已粘贴到预测输入区域', false, 1800);
                    }
                    return;
                }
            }, true);

            const forecastWrap = document.getElementById('forecastTableWrap');
            if (forecastWrap && forecastWrap.dataset.sfForecastWrapBlurBound !== '1') {
                forecastWrap.dataset.sfForecastWrapBlurBound = '1';
                /* 点击 wrap 内空白（表宽小于容器时右侧留白、或下方留白）：事件不落在 tbody/td 上，原逻辑不会失焦 */
                forecastWrap.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    if (state.sfPerfPanelAttachMode === 'follow' && state.sfPerfPanelFollowBlurDismissed) {
                        state.sfPerfPanelFollowBlurDismissed = false;
                    }
                    const t = e.target;
                    if (!t || !t.closest) return;
                    if (t.closest('input.sf-num-input')) return;
                    const ae = document.activeElement;
                    if (!ae || ae.tagName !== 'INPUT' || !ae.classList || !ae.classList.contains('sf-num-input')) return;
                    if (!ae.closest || !ae.closest('#forecastTable')) return;
                    try { ae.blur(); } catch (_) {}
                }, true);
            }
        }

        function selectedCellsArray() {
            const out = [];
            state.sfGridSelected.forEach(k => out.push(k));
            return out;
        }

        function applySfGridSelectionStyles() {
            const tbody = document.getElementById('forecastTbody');
            const thead = document.getElementById('forecastThead');
            const n = state.sfGridSelected.size || 0;
            if (tbody) {
                tbody.querySelectorAll('td.sf-grid-selectable').forEach(td => {
                    td.classList.remove('sf-cell-selected', 'sf-spotlight-col');
                });
                tbody.querySelectorAll('tr.sf-spotlight-row').forEach(tr => tr.classList.remove('sf-spotlight-row'));
            }
            if (thead) {
                thead.querySelectorAll('th.sf-spotlight-col').forEach(th => th.classList.remove('sf-spotlight-col'));
            }
            if (!n || !tbody) {
                updateSfPerfPanel();
                return;
            }

            const selectedRows = new Set();
            const selectedColIdxs = new Set();
            state.sfGridSelected.forEach(k => {
                const { rowKey, colIdx } = parseSfGridCellKey(k);
                if (!rowKey || colIdx < 0) return;
                selectedRows.add(rowKey);
                selectedColIdxs.add(colIdx);
            });

            tbody.querySelectorAll('tr[data-row-key]').forEach(tr => {
                const rk = String(tr.dataset.rowKey || '');
                if (rk && selectedRows.has(rk)) tr.classList.add('sf-spotlight-row');
            });
            tbody.querySelectorAll('td.sf-grid-selectable').forEach(td => {
                const rk = String(td.dataset.rowKey || '');
                const ci = Number(td.dataset.sfCi);
                if (!rk || !Number.isFinite(ci)) return;
                if (state.sfGridSelected.has(makeSfGridCellKey(rk, ci))) td.classList.add('sf-cell-selected');
                if (selectedColIdxs.has(ci)) td.classList.add('sf-spotlight-col');
            });
            if (thead) {
                thead.querySelectorAll('tr.sf-thead-row-2 th').forEach(th => {
                    const a = Number(th.dataset.colStart);
                    const b = Number(th.dataset.colEnd);
                    if (!Number.isFinite(a) || !Number.isFinite(b)) return;
                    for (let c = a; c <= b; c += 1) {
                        if (selectedColIdxs.has(c)) {
                            th.classList.add('sf-spotlight-col');
                            break;
                        }
                    }
                });
            }
            updateSfPerfPanel();
        }

        /** 在表格内开始框选/点选另一格时，让仍聚焦的预测输入框失焦，避免焦点与选区不一致 */
        function blurSfForecastInputLeavingCell(targetTd) {
            if (!targetTd) return;
            const ae = document.activeElement;
            if (!ae || ae.tagName !== 'INPUT' || !ae.classList || !ae.classList.contains('sf-num-input')) return;
            if (!ae.closest || !ae.closest('#forecastTable')) return;
            const host = ae.closest('td.sf-grid-selectable[data-sf-ci]');
            if (!host) return;
            if (String(host.dataset.rowKey) === String(targetTd.dataset.rowKey)
                && String(host.dataset.sfCi) === String(targetTd.dataset.sfCi)) {
                return;
            }
            try { ae.blur(); } catch (_) {}
        }

        function bindForecastGridSelection(tbody) {
            if (!tbody || tbody.dataset.sfGridSelectBound === '1') return;
            tbody.dataset.sfGridSelectBound = '1';

            let gridDragMoved = false;
            let suppressNextGridClick = false;
            let lastPointerMods = { ctrl: false, shift: false };

            const getCellKeyFromTd = (td) => {
                if (!td) return '';
                const rk = String(td.dataset.rowKey || '');
                const ci = Number(td.dataset.sfCi);
                if (!rk || !Number.isFinite(ci)) return '';
                return makeSfGridCellKey(rk, ci);
            };

            const getOrderedDataRowKeys = () => Array.from(tbody.querySelectorAll('tr[data-row-key]'))
                .map(tr => String(tr.dataset.rowKey || '').trim())
                .filter(Boolean);

            const selectRect = (a, b, replace) => {
                if (!a || !b) return;
                const aRow = String(a.rowKey || '');
                const bRow = String(b.rowKey || '');
                const aCol = Number(a.colIdx);
                const bCol = Number(b.colIdx);
                if (!aRow || !bRow || !Number.isFinite(aCol) || !Number.isFinite(bCol)) return;
                const rowOrder = getOrderedDataRowKeys();
                const colCount = (state.sfColLayout || []).length;
                if (!colCount) return;
                const ri1 = rowOrder.indexOf(aRow);
                const ri2 = rowOrder.indexOf(bRow);
                if (ri1 < 0 || ri2 < 0) return;
                const rLo = Math.min(ri1, ri2);
                const rHi = Math.max(ri1, ri2);
                let cLo = Math.min(aCol, bCol);
                let cHi = Math.max(aCol, bCol);
                cLo = Math.max(0, cLo);
                cHi = Math.min(colCount - 1, cHi);
                if (cLo > cHi) return;
                if (replace) state.sfGridSelected.clear();
                for (let r = rLo; r <= rHi; r += 1) {
                    const rk = rowOrder[r];
                    if (!rk) continue;
                    for (let c = cLo; c <= cHi; c += 1) {
                        state.sfGridSelected.add(makeSfGridCellKey(rk, c));
                    }
                }
            };

            let dragging = false;
            let dragStart = null;

            const pickGridTdFromEvent = (e) => {
                const t = e.target;
                if (t && t.closest && t.closest('input.sf-num-input, select, textarea, button')) {
                    if (!(e.ctrlKey || e.metaKey || e.shiftKey)) return null;
                }
                let td = t && t.closest ? t.closest('tr[data-row-key] td.sf-grid-selectable[data-sf-ci]') : null;
                if (!td && typeof document.elementsFromPoint === 'function') {
                    const stack = document.elementsFromPoint(e.clientX, e.clientY) || [];
                    td = stack.find(n => n && n.nodeType === 1 && n.matches && n.matches('tr[data-row-key] td.sf-grid-selectable[data-sf-ci]')) || null;
                }
                return td;
            };

            tbody.addEventListener('mousedown', (e) => {
                const td = pickGridTdFromEvent(e);
                if (!td) return;
                blurSfForecastInputLeavingCell(td);
                gridDragMoved = false;
                suppressNextGridClick = false;
                lastPointerMods = { ctrl: !!(e.ctrlKey || e.metaKey), shift: !!e.shiftKey };
                dragging = true;
                dragStart = { rowKey: String(td.dataset.rowKey || ''), colIdx: Number(td.dataset.sfCi) };
                state.selectionAnchor = dragStart;
                e.preventDefault();
            }, true);

            document.addEventListener('mousemove', (e) => {
                if (!dragging || !dragStart) return;
                const td = pickGridTdFromEvent(e);
                if (!td) return;
                blurSfForecastInputLeavingCell(td);
                gridDragMoved = true;
                const cur = { rowKey: String(td.dataset.rowKey || ''), colIdx: Number(td.dataset.sfCi) };
                selectRect(dragStart, cur, true);
                applySfGridSelectionStyles();
            }, true);

            document.addEventListener('mouseup', () => {
                if (!dragging || !dragStart) return;
                const hadMove = gridDragMoved;
                const ds = dragStart;
                const ctrl = lastPointerMods.ctrl;
                const shift = lastPointerMods.shift;
                dragging = false;
                dragStart = null;
                if (!ctrl && !shift) {
                    if (hadMove) {
                        suppressNextGridClick = true;
                    } else {
                        const k = makeSfGridCellKey(ds.rowKey, ds.colIdx);
                        if (state.sfGridSelected.size === 1 && state.sfGridSelected.has(k)) {
                            state.sfGridSelected.clear();
                            state.selectionAnchor = null;
                        } else {
                            selectRect(ds, ds, true);
                        }
                        suppressNextGridClick = true;
                    }
                    applySfGridSelectionStyles();
                } else if (hadMove) {
                    applySfGridSelectionStyles();
                }
                gridDragMoved = false;
            }, true);

            tbody.addEventListener('click', (e) => {
                const td = pickGridTdFromEvent(e);
                if (!td) return;
                if (e.target && e.target.closest && e.target.closest('.sf-tooltip-wrap')) return;
                if (suppressNextGridClick) {
                    suppressNextGridClick = false;
                    return;
                }
                if (gridDragMoved) {
                    gridDragMoved = false;
                    return;
                }
                const key = getCellKeyFromTd(td);
                if (!key) return;
                const rowKey = String(td.dataset.rowKey || '');
                const colIdx = Number(td.dataset.sfCi);
                const isCtrl = e.ctrlKey || e.metaKey;
                const isShift = e.shiftKey;
                if (isShift && state.selectionAnchor && Number.isFinite(Number(state.selectionAnchor.colIdx))) {
                    selectRect(state.selectionAnchor, { rowKey, colIdx }, !isCtrl);
                } else if (isCtrl) {
                    if (state.sfGridSelected.has(key)) state.sfGridSelected.delete(key);
                    else state.sfGridSelected.add(key);
                    state.selectionAnchor = { rowKey, colIdx };
                }
                applySfGridSelectionStyles();
            });
        }

        function renderForecastTableBodyOnly() {
            renderForecastTable();
        }

        function applyForecastColgroupWidths(table, leafColWidths) {
            const t = table || document.getElementById('forecastTable');
            if (!t) return;
            const cols = Array.from((t.querySelector('colgroup#forecastColgroup') || {}).children || []);
            for (let i = 0; i < cols.length && i < (leafColWidths || []).length; i++) {
                const w = Math.max(46, Number(leafColWidths[i] || 0));
                cols[i].style.width = `${w}px`;
            }
            const totalWidth = (leafColWidths || []).reduce((acc, n) => acc + Number(n || 0), 0);
            const wpx = Math.max(960, totalWidth);
            t.style.width = `${wpx}px`;
            t.style.minWidth = `${wpx}px`;
        }

        function annotateForecastHeaderColumns(thead, totalCols) {
            const rows = Array.from((thead || {}).querySelectorAll ? thead.querySelectorAll('tr') : []);
            const occupied = [];
            rows.forEach((row, rowIndex) => {
                occupied[rowIndex] = occupied[rowIndex] || [];
                let colIndex = 0;
                Array.from(row.children).forEach(cell => {
                    while (occupied[rowIndex][colIndex]) colIndex += 1;
                    const colspan = Number(cell.getAttribute('colspan') || 1) || 1;
                    const rowspan = Number(cell.getAttribute('rowspan') || 1) || 1;
                    const start = colIndex;
                    const end = colIndex + colspan - 1;
                    cell.dataset.colStart = String(start);
                    cell.dataset.colEnd = String(end);
                    for (let r = rowIndex; r < rowIndex + rowspan; r += 1) {
                        occupied[r] = occupied[r] || [];
                        for (let c = start; c <= end; c += 1) occupied[r][c] = true;
                    }
                    colIndex = end + 1;
                });
            });
            // best-effort validate ranges
            rows.forEach(r => {
                Array.from(r.children).forEach(cell => {
                    const s = Number(cell.dataset.colStart);
                    const e = Number(cell.dataset.colEnd);
                    if (!Number.isFinite(s) || !Number.isFinite(e) || s < 0 || e < s || e >= totalCols) {
                        delete cell.dataset.colStart;
                        delete cell.dataset.colEnd;
                    }
                });
            });
        }

        function attachForecastColumnResizeHandles(thead, cols, meta, leafColWidths) {
            if (!thead) return;
            const table = document.getElementById('forecastTable');
            const totalCols = Number(meta && meta.specCount || 0) + Number(meta && meta.histCols || 0) + Number(meta && meta.mtdCols || 0) + Number(meta && meta.fcCols || 0) + Number(meta && meta.invCols || 0);
            thead.querySelectorAll('.sf-col-resize-handle').forEach(el => el.remove());
            thead.querySelectorAll('th').forEach(cell => {
                const colStart = Number(cell.dataset.colStart);
                const colEnd = Number(cell.dataset.colEnd);
                if (!Number.isFinite(colStart) || !Number.isFinite(colEnd) || colStart < 0 || colEnd < colStart || colEnd >= totalCols) return;
                /* 勿设为 relative：会覆盖 thead th 的 position:sticky，且第二行 th 的 top 会在文档流中产生空白带 */
                const handle = document.createElement('span');
                handle.className = 'sf-col-resize-handle';
                handle.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                });
                handle.addEventListener('mousedown', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    state._sfSuppressHeaderClickUntil = Date.now() + 1200;
                    const startX = event.clientX;
                    const startWidths = leafColWidths.slice();
                    const spanCount = (colEnd - colStart + 1);
                    const minTotal = 46 * spanCount;
                    const startTotal = startWidths.slice(colStart, colEnd + 1).reduce((sum, w) => sum + Math.max(46, Number(w || 60)), 0);
                    let moved = false;

                    const inRange = (idx, start, end) => idx >= start && idx <= end;
                    const isHistorySpan = meta && meta.histCols > 0
                        && inRange(colStart, meta.historyStart, meta.historyEnd)
                        && inRange(colEnd, meta.historyStart, meta.historyEnd);
                    const isForecastSpan = meta && meta.fcCols > 0
                        && inRange(colStart, meta.forecastStart, meta.forecastEnd)
                        && inRange(colEnd, meta.forecastStart, meta.forecastEnd);
                    const isTurnoverSpan = meta && meta.turnCols > 0
                        && inRange(colStart, meta.turnStart, meta.turnEnd)
                        && inRange(colEnd, meta.turnStart, meta.turnEnd);
                    const isStockSpan = meta && meta.stockCols > 0
                        && inRange(colStart, meta.stockStart, meta.stockEnd)
                        && inRange(colEnd, meta.stockStart, meta.stockEnd);

                    const applyMonthGroupWidth = (kind, newPerWidth) => {
                        const w = Math.max(46, Math.round(Number(newPerWidth || 0)));
                        if (kind === 'history') {
                            for (let i = meta.historyStart; i <= meta.historyEnd; i++) leafColWidths[i] = w;
                        } else if (kind === 'forecast') {
                            for (let i = meta.forecastStart; i <= meta.forecastEnd; i++) leafColWidths[i] = w;
                        } else if (kind === 'turnover') {
                            for (let i = meta.turnStart; i <= meta.turnEnd; i++) leafColWidths[i] = w;
                        } else if (kind === 'stock') {
                            for (let i = meta.stockStart; i <= meta.stockEnd; i++) leafColWidths[i] = w;
                        }
                    };

                    const onMove = (moveEvent) => {
                        const delta = moveEvent.clientX - startX;
                        if (Math.abs(delta) > 2) moved = true;

                        if (isHistorySpan) {
                            const targetTotal = Math.max(minTotal, startTotal + delta);
                            const per = Math.max(46, Math.round(targetTotal / Math.max(1, spanCount)));
                            applyMonthGroupWidth('history', per);
                        } else if (isForecastSpan) {
                            const targetTotal = Math.max(minTotal, startTotal + delta);
                            const per = Math.max(46, Math.round(targetTotal / Math.max(1, spanCount)));
                            applyMonthGroupWidth('forecast', per);
                        } else if (isTurnoverSpan) {
                            const targetTotal = Math.max(minTotal, startTotal + delta);
                            const per = Math.max(46, Math.round(targetTotal / Math.max(1, spanCount)));
                            applyMonthGroupWidth('turnover', per);
                        } else if (isStockSpan) {
                            const targetTotal = Math.max(minTotal, startTotal + delta);
                            const per = Math.max(46, Math.round(targetTotal / Math.max(1, spanCount)));
                            applyMonthGroupWidth('stock', per);
                        } else if (spanCount <= 1) {
                            leafColWidths[colEnd] = Math.max(46, Number(startWidths[colEnd] || 60) + delta);
                        } else {
                            const targetTotal = Math.max(minTotal, startTotal + delta);
                            const factor = targetTotal / Math.max(1, startTotal);
                            let allocated = 0;
                            for (let idx = colStart; idx <= colEnd; idx += 1) {
                                const base = Math.max(46, Number(startWidths[idx] || 60));
                                const scaled = Math.max(46, Math.round(base * factor));
                                leafColWidths[idx] = scaled;
                                allocated += scaled;
                            }
                            const remainder = Math.round(targetTotal - allocated);
                            leafColWidths[colEnd] = Math.max(46, Number(leafColWidths[colEnd] || 60) + remainder);
                        }

                        applyForecastColgroupWidths(table, leafColWidths);
                    };
                    const onUp = () => {
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                        state._sfSuppressHeaderClickUntil = Date.now() + (moved ? 320 : 160);
                        saveColWidthPrefs(state.forecastMode, cols, meta, leafColWidths);
                    };
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
                cell.appendChild(handle);
            });
        }

        // ===== Multi-month performance dialog (history cells) =====
        /** 与产品表现看板货号分组明细中数值类列的百分比展示一致（stored 为小数比率） */
        const SF_PERF_PERCENT_KEYS = new Set(['acos', 'acoas', 'ctr', 'cvr', 'discount_rate', 'refund_rate', 'commission_rate', 'net_margin_rate']);

        function sfMonthCalendarBounds(monthKey) {
            const s = String(monthKey || '').trim().slice(0, 10);
            if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) return { min: '', max: '' };
            const y = Number(s.slice(0, 4));
            const m = Number(s.slice(5, 7));
            if (!(y && m >= 1 && m <= 12)) return { min: s, max: s };
            const last = new Date(y, m, 0).getDate();
            const mm = String(m).padStart(2, '0');
            return { min: `${y}-${mm}-01`, max: `${y}-${mm}-${String(last).padStart(2, '0')}` };
        }

        function sfSafeDiv(a, b) {
            const x = Number(a || 0);
            const y = Number(b || 0);
            if (!Number.isFinite(x) || !Number.isFinite(y) || y === 0) return 0;
            return x / y;
        }

        function sfResolvePerfMetric(cell, key) {
            if (!cell) return 0;
            if (key === 'acos') return sfSafeDiv(cell.ad_spend, cell.ad_sales_amount);
            if (key === 'acoas') return sfSafeDiv(cell.ad_spend, cell.net_sales_amount);
            if (key === 'rois') return sfSafeDiv(cell.net_sales_amount, cell.ad_spend);
            if (key === 'ctr') return sfSafeDiv(cell.ad_clicks, cell.ad_impressions);
            if (key === 'cvr') return sfSafeDiv(cell.ad_orders, cell.ad_clicks);
            if (key === 'cpc') return sfSafeDiv(cell.ad_spend, cell.ad_clicks);
            const n = Number(cell[key]);
            return Number.isFinite(n) ? n : 0;
        }

        function sfFormatPerfMetricValue(v, key) {
            const n = Number(v || 0);
            if (!Number.isFinite(n)) return '—';
            if (SF_PERF_PERCENT_KEYS.has(String(key || ''))) {
                return `${(n * 100).toFixed(2).replace(/\.00$/, '')}%`;
            }
            if (key === 'sub_category_rank') {
                if (!n) return '—';
                return String(Math.round(n * 100) / 100);
            }
            return formatNumber(n);
        }

        function computePerfValue(cell, key, monthKey, row) {
            const lab = (row && row.labels) ? row.labels : {};
            if (key === 'month') return monthShortLabel(monthKey);
            if (key === 'min_date') return sfMonthCalendarBounds(monthKey).min || '—';
            if (key === 'max_date') return sfMonthCalendarBounds(monthKey).max || '—';
            if (key === 'dim_sku_family') {
                const t = String(lab.sku_family || '').trim();
                return t || '—';
            }
            if (key === 'dim_spec') {
                const t = String(lab.spec_name || '').trim();
                return t || '—';
            }
            if (key === 'dim_fabric') {
                const a = String(lab.fabric_code || '').trim();
                const b = String(lab.fabric_name_en || '').trim();
                const t = `${a} ${b}`.trim();
                return t || '—';
            }
            if (key === 'dim_platform_sku') {
                if (state.forecastMode === 'platform') {
                    const t = String(lab.platform_sku || '').trim();
                    return t || '—';
                }
                const arr = Array.isArray(lab.platform_skus) ? lab.platform_skus : [];
                const skus = arr.map(x => String(x && x.platform_sku || '').trim()).filter(Boolean);
                if (!skus.length) return '—';
                if (skus.length <= 2) return skus.join('、');
                return `${skus.slice(0, 2).join('、')} 等${skus.length}个`;
            }
            if (!cell) return '—';
            if (key === 'rows') return formatNumber(cell.rows || 0);
            if (key === 'sub_category_rank') {
                if (cell.sub_category_rank == null || cell.sub_category_rank === '') return '—';
                return sfFormatPerfMetricValue(Number(cell.sub_category_rank), key);
            }
            const resolved = sfResolvePerfMetric(cell, key);
            return sfFormatPerfMetricValue(resolved, key);
        }

        /** 仅「规格+面料」「销售平台SKU」有按月历史格，可展示产品表现；下单 SKU 维度不支持 */
        function isSalesForecastHistoryPerfMode() {
            return state.forecastMode === 'spec' || state.forecastMode === 'platform';
        }

        function getSelectedHistoryCellsForSingleRow() {
            if (!isSalesForecastHistoryPerfMode()) return null;
            const keys = selectedCellsArray();
            const rowSet = new Set();
            const months = [];
            const layout = state.sfColLayout || [];
            keys.forEach(k => {
                const { rowKey, colIdx } = parseSfGridCellKey(k);
                if (!rowKey || colIdx < 0) return;
                const seg = layout[colIdx];
                if (!seg || seg.kind !== 'H' || !seg.month) return;
                rowSet.add(rowKey);
                months.push(seg.month);
            });
            if (rowSet.size !== 1) return null;
            const rowKey = Array.from(rowSet)[0];
            months.sort((a, b) => String(a).localeCompare(String(b)));
            return { rowKey, months: Array.from(new Set(months)) };
        }

        function resolveRowByKey(rowKey) {
            const rk = String(rowKey || '').trim();
            if (!rk) return null;
            const rows = state.rows || [];
            return rows.find(r => String(r.row_key || '') === rk) || null;
        }

        function sfPerfMetricFieldsStorageKey() {
            return `sitjoy:${sfPerfTablePathKeyForStorage()}:${SF_PREF_PERF_METRIC_FIELDS_V1}`;
        }

        function writeSfPerfMetricFieldsPrefs(prefs) {
            try {
                const order = Array.isArray(prefs && prefs.order) ? prefs.order.map((k) => String(k || '').trim()).filter(Boolean) : [];
                const vis = prefs && prefs.visible instanceof Set ? Array.from(prefs.visible) : (Array.isArray(prefs && prefs.visible) ? prefs.visible.map((k) => String(k || '').trim()).filter(Boolean) : []);
                localStorage.setItem(sfPerfMetricFieldsStorageKey(), JSON.stringify({ order, visible: vis }));
            } catch (_) {}
        }

        /** 读取指标行顺序 + 勾选；迁移旧键 sfPerfDataTable:visible-columns */
        function readSfPerfMetricFieldsPrefs() {
            const pathKey = sfPerfTablePathKeyForStorage();
            const catalogKeys = getSfPerfMatrixRowFieldCatalog().map((f) => f.key);
            const allowed = new Set(catalogKeys);
            const defaultOrder = catalogKeys.slice();
            const parseNew = () => {
                try {
                    const raw = localStorage.getItem(sfPerfMetricFieldsStorageKey());
                    if (!raw) return null;
                    const o = JSON.parse(raw);
                    if (!o || typeof o !== 'object') return null;
                    let order = Array.isArray(o.order) ? o.order.map((x) => String(x || '').trim()).filter((k) => allowed.has(k)) : [];
                    let visibleArr = Array.isArray(o.visible) ? o.visible.map((x) => String(x || '').trim()).filter((k) => allowed.has(k)) : [];
                    if (!order.length) order = defaultOrder.slice();
                    else {
                        const seen = new Set(order);
                        catalogKeys.forEach((k) => {
                            if (!seen.has(k)) {
                                order.push(k);
                                seen.add(k);
                            }
                        });
                    }
                    if (!visibleArr.length) visibleArr = order.slice();
                    return { order, visible: new Set(visibleArr) };
                } catch (_) {
                    return null;
                }
            };
            let prefs = parseNew();
            if (prefs) return prefs;
            try {
                const legacyRaw = localStorage.getItem(`sitjoy:${pathKey}:sfPerfDataTable:visible-columns`);
                if (!legacyRaw) return { order: defaultOrder.slice(), visible: new Set(defaultOrder) };
                const arr = JSON.parse(legacyRaw);
                if (!Array.isArray(arr) || !arr.length) return { order: defaultOrder.slice(), visible: new Set(defaultOrder) };
                const vis = arr.map((x) => String(x || '').trim()).filter((k) => allowed.has(k));
                const order = [];
                vis.forEach((k) => {
                    if (!order.includes(k)) order.push(k);
                });
                catalogKeys.forEach((k) => {
                    if (!order.includes(k)) order.push(k);
                });
                const visibleSet = new Set(vis.length ? vis : catalogKeys);
                prefs = { order, visible: visibleSet };
                writeSfPerfMetricFieldsPrefs({ order: prefs.order, visible: prefs.visible });
                try {
                    localStorage.removeItem(`sitjoy:${pathKey}:sfPerfDataTable:visible-columns`);
                } catch (_) {}
                return prefs;
            } catch (_) {
                return { order: defaultOrder.slice(), visible: new Set(defaultOrder) };
            }
        }

        /**
         * 与产品表现弹窗「字段显示」及矩阵指标行一致：顺序 + 勾选，存于专用 localStorage 键。
         */
        function readSfPerfVisibleFieldKeysForTooltip() {
            const prefs = readSfPerfMetricFieldsPrefs();
            const order = prefs.order || [];
            const vis = prefs.visible || new Set();
            return order.filter((k) => vis.has(k));
        }

        function updateSfPerfFieldReorderButtonStates(fldPanel) {
            const rows = fldPanel ? fldPanel.querySelectorAll('.pm-table-columns-item[data-field-key]') : [];
            rows.forEach((row, idx) => {
                const up = row.querySelector('.sf-perf-field-move[data-dir="up"]');
                const down = row.querySelector('.sf-perf-field-move[data-dir="down"]');
                if (up) up.disabled = idx === 0;
                if (down) down.disabled = idx === rows.length - 1;
            });
        }

        function persistSfPerfFieldsPanelFromDom(fldPanel) {
            if (!fldPanel) return;
            const catalogKeys = getSfPerfMatrixRowFieldCatalog().map((f) => f.key);
            const allowed = new Set(catalogKeys);
            const order = [];
            fldPanel.querySelectorAll('.pm-table-columns-item[data-field-key]').forEach((row) => {
                const k = String(row.dataset.fieldKey || '').trim();
                if (allowed.has(k)) order.push(k);
            });
            let orderF = order.filter((k) => allowed.has(k));
            catalogKeys.forEach((k) => {
                if (!orderF.includes(k)) orderF.push(k);
            });
            const visible = [];
            fldPanel.querySelectorAll('.pm-table-columns-item[data-field-key]').forEach((row) => {
                const k = String(row.dataset.fieldKey || '').trim();
                if (!allowed.has(k)) return;
                const cb = row.querySelector('input[type="checkbox"][data-field-key]');
                if (cb && cb.checked) visible.push(k);
            });
            let vis = visible.filter((k) => allowed.has(k));
            if (!vis.length) vis = catalogKeys.slice();
            writeSfPerfMetricFieldsPrefs({ order: orderF, visible: new Set(vis) });
            updateSfPerfFieldReorderButtonStates(fldPanel);
        }

        function normalizePerfUiPatch(patch) {
            const cur = Object.assign({}, state.perfUi, patch);
            if (cur.none) return { none: true, hover: false, click: false, rect: false };
            if (!cur.hover && !cur.click && !cur.rect) return { none: true, hover: false, click: false, rect: false };
            return { none: false, hover: !!cur.hover, click: !!cur.click, rect: !!cur.rect };
        }

        function readPerfUiPrefs() {
            try {
                const raw = localStorage.getItem(SF_PREF_PERF_UI_KEY);
                if (!raw) return { none: false, hover: true, click: false, rect: false };
                const o = JSON.parse(raw);
                return normalizePerfUiPatch({
                    none: !!o.none,
                    hover: !!o.hover,
                    click: !!o.click,
                    rect: !!o.rect,
                });
            } catch (_) {
                return { none: false, hover: true, click: false, rect: false };
            }
        }

        function writePerfUiPrefs() {
            try {
                localStorage.setItem(SF_PREF_PERF_UI_KEY, JSON.stringify(state.perfUi));
            } catch (_) {}
        }

        function syncPerfUiCheckboxesFromState() {
            const ok = isSalesForecastHistoryPerfMode();
            const n = document.getElementById('sfPerfUiNone');
            const h = document.getElementById('sfPerfUiHover');
            const c = document.getElementById('sfPerfUiClick');
            const r = document.getElementById('sfPerfUiRect');
            const u = state.perfUi || {};
            if (n) {
                n.checked = !!u.none;
                n.disabled = !ok;
            }
            if (h) {
                h.checked = !!u.hover;
                h.disabled = !ok || !!u.none;
            }
            if (c) {
                c.checked = !!u.click;
                c.disabled = !ok || !!u.none;
            }
            if (r) {
                r.checked = !!u.rect;
                r.disabled = !ok || !!u.none;
            }
        }

        function sfPerfMonthManageKey(monthKey) {
            return 'm_' + String(monthKey || '').replace(/[^0-9a-z]/gi, '');
        }

        function renderSfPerfMatrixIntoTable(row, displayMonths) {
            const thead = document.getElementById('sfPerfMatrixThead');
            const tbody = document.getElementById('sfPerfMatrixTbody');
            const table = document.getElementById('sfPerfMatrixTable');
            if (!thead || !tbody || !table) return;

                thead.innerHTML = '<tr><th scope="col" data-manage-col-key="' + SF_METRIC_COL_KEY + '" data-disable-sort="1">指标</th>'

                tbody.innerHTML = '<tr><th scope="row" data-manage-col-key="' + SF_METRIC_COL_KEY + '" data-disable-sort="1">—</th>'
                    + '<td data-manage-col-key="m_ph">—</td></tr>';
                try {
                    table.dataset.sjManageLayoutSig = 'empty';
                } catch (_) {}
                return;
            }
            const catalog = getPerfFieldCatalog();
            const labelByKey = new Map(catalog.map((f) => [f.key, f.label]));
            let keys = readSfPerfVisibleFieldKeysForTooltip().filter((k) => k !== 'month');
            if (!keys.length) keys = catalog.map((f) => f.key).filter((k) => k !== 'month');
            const thMonths = displayMonths.map((mk) => {
