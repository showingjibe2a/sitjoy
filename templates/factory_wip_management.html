<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工厂在制库存管理</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="site-header"></div>
<div class="container">
  <section class="hero" style="margin-bottom:1.5rem;">
    <h2>工厂在制库存管理</h2>
    <p>按下单SKU + 工厂维护在制数量与预计完工日期</p>
  </section>

  <section class="pm-layout">
    <div class="card pm-card">
      <div class="pm-toolbar">
        <div class="pm-toolbar-actions">
          <div class="form-group pm-search" style="margin:0;">
            <span class="pm-search-title">搜索</span>
            <input id="searchInput" type="text" placeholder="搜索SKU/工厂名称">
            <button class="btn-primary" onclick="loadList()">搜索</button>
            <button class="btn-secondary" onclick="resetSearch()">清空</button>
          </div>
          <span class="pm-divider"></span>
          <button class="btn-accent" onclick="openCreateModal()">新增</button>
          <button class="btn-secondary" onclick="downloadTemplate()">下载模板</button>
          <button class="btn-secondary" onclick="triggerImport()">上传模板</button>
          <input id="importFileInput" type="file" accept=".xlsx,.xlsm" style="display:none;">
        </div>
      </div>
    </div>

    <div>
      <table class="pm-table" id="mainTable">
        <thead>
          <tr>
            <th>SKU</th>
            <th>工厂</th>
            <th style="width:120px;">数量</th>
            <th style="width:140px;">预计完工日期</th>
            <th style="width:160px;">是否完工</th>
            <th style="width:140px;">实际完工时间</th>
            <th>备注</th>
            <th style="width:180px;">创建时间</th>
            <th style="width:160px;">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="7" style="text-align:center;">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</div>

<div class="pm-modal" id="pm-modal">
  <div class="pm-modal-content">
    <h3 id="pm-modal-title" style="margin-top:0;">新增工厂在制库存</h3>
    <div class="pm-form">
      <div class="form-group">
        <label for="modalOrderProduct">下单SKU<span class="required-asterisk">*</span></label>
        <select id="modalOrderProduct"></select>
      </div>
      <div class="form-group">
        <label for="modalFactory">工厂<span class="required-asterisk">*</span></label>
        <select id="modalFactory"></select>
      </div>
      <div class="form-group">
        <label for="modalQuantity">数量<span class="required-asterisk">*</span></label>
        <input id="modalQuantity" type="number" min="0" step="1" value="0">
      </div>
      <div class="form-group">
        <label for="modalExpectedDate">预计完工日期</label>
        <input id="modalExpectedDate" type="date">
      </div>
      <div class="form-group">
        <label>是否完工</label>
        <div class="status-segment status-segment--inline" id="modalCompletedSegment" data-value="0">
          <button type="button" class="status-pill status-pill--yes" data-value="1">是</button>
          <button type="button" class="status-pill status-pill--no is-active" data-value="0">否</button>
        </div>
      </div>
      <div class="form-group" id="modalActualDateGroup" style="display:none;">
        <label for="modalActualCompletionDate">实际完工时间</label>
        <input id="modalActualCompletionDate" type="date">
      </div>
      <div class="form-group pm-form-full">
        <label for="modalNotes">备注</label>
        <textarea id="modalNotes" rows="3" placeholder="可选"></textarea>
      </div>
    </div>
    <div id="modalStatus" class="response" style="display:none;margin-top:.75rem;"></div>
    <div class="pm-modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveFromModal()">保存</button>
    </div>
  </div>
</div>

<div class="pm-modal" id="completionConfirmModal">
  <div class="pm-modal-content" style="max-width:420px;">
    <h3 style="margin-top:0;">确认完工时间</h3>
    <div class="form-group" style="margin-bottom:.85rem;">
      <label for="completionConfirmDate">实际完工时间</label>
      <input id="completionConfirmDate" type="date">
    </div>
    <div id="completionConfirmStatus" class="response" style="display:none;margin-top:.55rem;"></div>
    <div class="pm-modal-actions">
      <button type="button" class="btn-secondary" onclick="closeCompletionConfirmModal()">取消</button>
      <button type="button" class="btn-primary" onclick="confirmCompletionUpdate()">确认</button>
      <button type="button" class="btn-accent" onclick="confirmCompletionAndAddToFactoryStock()">确认并新增到工厂在库</button>
    </div>
  </div>
</div>

<footer><p>&copy; 2026 SITJOY | 内部使用</p></footer>

<script>
let editId = null;
let optionsLoaded = false;
let optionFactories = [];
let optionOrderProducts = [];
let listCache = [];
let pendingCompletionUpdateId = null;

const $ = (s) => document.querySelector(s);

function showModalStatus(message, isError){
  const el = $('#modalStatus');
  el.style.display = 'block';
  el.style.background = isError ? '#ffecec' : '#f0fff0';
  el.style.color = isError ? '#a33' : '#2f6f2f';
  el.textContent = message;
}

function fillSelect(id, items, valueKey, textKey, placeholder){
  const el = document.getElementById(id);
  if(!el) return;
  el.innerHTML = `<option value="">${placeholder || '请选择'}</option>` + (items || []).map(item => `
    <option value="${item[valueKey]}">${item[textKey] || ''}</option>
  `).join('');
  if(window.refreshUniversalSingleSelect) window.refreshUniversalSingleSelect(el);
}

function formatDateTime(value){
  if(!value) return '';
  const text = String(value);
  return text.includes('T') ? text.replace('T', ' ').slice(0, 19) : text.slice(0, 19);
}

function formatDate(value){
  if(!value) return '';
  return String(value).slice(0, 10);
}

function todayStr(){
  const d = new Date();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}-${m}-${day}`;
}

function getRowById(id){
  return listCache.find(item => Number(item.id) === Number(id));
}

function setSegmentValue(segmentEl, value){
  if(!segmentEl) return;
  const finalVal = String(value) === '1' ? '1' : '0';
  segmentEl.setAttribute('data-value', finalVal);
  segmentEl.querySelectorAll('[data-value]').forEach(btn => {
    const active = String(btn.getAttribute('data-value') || '') === finalVal;
    btn.classList.toggle('is-active', active);
  });
}

function toggleActualDateGroup(){
  const isCompleted = String(document.getElementById('modalCompletedSegment')?.getAttribute('data-value') || '0') === '1';
  const group = document.getElementById('modalActualDateGroup');
  const input = document.getElementById('modalActualCompletionDate');
  if(!group || !input) return;
  group.style.display = isCompleted ? '' : 'none';
  if(isCompleted && !input.value) input.value = todayStr();
  if(!isCompleted) input.value = '';
}

function loadOptions(){
  return fetch('/api/factory-wip?action=options')
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success') throw new Error(d.message || '加载选项失败');
      optionFactories = d.factories || [];
      optionOrderProducts = d.order_products || [];
      fillSelect('modalFactory', optionFactories, 'id', 'factory_name', '请选择工厂');
      fillSelect('modalOrderProduct', optionOrderProducts, 'id', 'sku', '请选择下单SKU');
      optionsLoaded = true;
    });
}

function downloadTemplate(){
  window.location.href = '/api/factory-wip-template';
}

function triggerImport(){
  const input = document.getElementById('importFileInput');
  if(!input) return;
  input.value = '';
  input.click();
}

function importTemplate(file){
  const form = new FormData();
  form.append('file', file);
  if(window.showAppUploadProgress){
    window.showAppUploadProgress({ title: '正在导入工厂在制模板...', summary: '请稍候', percent: 12 });
  }
  fetch('/api/factory-wip-import', {
    method: 'POST',
    body: form
  })
    .then(r => r.json())
    .then(d => {
      if(window.hideAppUploadProgress){
        window.hideAppUploadProgress();
      }
      if(d.status !== 'success'){
        if(window.showAppResultPanel){
          window.showAppResultPanel({ title: '导入失败', summary: d.message || '导入失败', isError: true });
        }
        if(window.showAppToast){ window.showAppToast(d.message || '导入失败', true, 3200); }
        return;
      }
      const errorCount = Array.isArray(d.errors) ? d.errors.length : 0;
      const summary = `导入完成：新增 ${Number(d.created || 0)}，更新 ${Number(d.updated || 0)}，未变化 ${Number(d.unchanged || 0)}，错误 ${errorCount}`;
      if(errorCount && window.showAppResultPanel){
        window.showAppResultPanel({
          title: '工厂在制导入完成',
          summary,
          details: (d.errors || []).map(item => `${item.row || '-'}: ${item.error || item.message || '校验失败'}`),
          isError: true
        });
      }
      if(window.showAppToast){ window.showAppToast(summary, false, 2600); }
      if(errorCount){
        console.error('导入错误明细:', d.errors);
      }
      loadList();
    })
    .catch(err => {
      if(window.hideAppUploadProgress){
        window.hideAppUploadProgress();
      }
      if(window.showAppResultPanel){
        window.showAppResultPanel({ title: '导入失败', summary: err.message || '导入失败', isError: true });
      }
      if(window.showAppToast){ window.showAppToast(err.message || '导入失败', true, 3200); }
    });
}

function openCreateModal(){
  const open = () => {
    editId = null;
    $('#pm-modal-title').textContent = '新增工厂在制库存';
    $('#modalStatus').style.display = 'none';
    $('#modalOrderProduct').value = '';
    $('#modalFactory').value = '';
    $('#modalQuantity').value = '0';
    $('#modalExpectedDate').value = '';
    setSegmentValue(document.getElementById('modalCompletedSegment'), '0');
    $('#modalActualCompletionDate').value = todayStr();
    toggleActualDateGroup();
    $('#modalNotes').value = '';
    $('#modalOrderProduct').disabled = false;
    $('#modalFactory').disabled = false;
    $('#pm-modal').classList.add('active');
    if(window.refreshUniversalSingleSelect){
      window.refreshUniversalSingleSelect('modalOrderProduct');
      window.refreshUniversalSingleSelect('modalFactory');
    }
  };

  if(optionsLoaded) open();
  else loadOptions().then(open).catch(err => { if(window.showAppToast){ window.showAppToast(err.message || '加载选项失败', true, 3200); } });
}

function openEditModal(id){
  const row = listCache.find(item => Number(item.id) === Number(id));
  if(!row) return;

  const open = () => {
    editId = Number(row.id);
    $('#pm-modal-title').textContent = '编辑工厂在制库存';
    $('#modalStatus').style.display = 'none';
    $('#modalOrderProduct').value = String(row.order_product_id || '');
    $('#modalFactory').value = String(row.factory_id || '');
    $('#modalQuantity').value = String(Number(row.quantity || 0));
    $('#modalExpectedDate').value = formatDate(row.expected_completion_date);
    setSegmentValue(document.getElementById('modalCompletedSegment'), String(Number(row.is_completed || 0) ? 1 : 0));
    $('#modalActualCompletionDate').value = formatDate(row.actual_completion_date) || todayStr();
    toggleActualDateGroup();
    $('#modalNotes').value = row.notes || '';
    $('#modalOrderProduct').disabled = true;
    $('#modalFactory').disabled = true;
    $('#pm-modal').classList.add('active');
    if(window.refreshUniversalSingleSelect){
      window.refreshUniversalSingleSelect('modalOrderProduct');
      window.refreshUniversalSingleSelect('modalFactory');
    }
  };

  if(optionsLoaded) open();
  else loadOptions().then(open).catch(err => { if(window.showAppToast){ window.showAppToast(err.message || '加载选项失败', true, 3200); } });
}

function closeModal(){
  $('#pm-modal').classList.remove('active');
  editId = null;
}

function openCompletionConfirmModal(itemId, defaultDate){
  pendingCompletionUpdateId = Number(itemId || 0);
  document.getElementById('completionConfirmStatus').style.display = 'none';
  document.getElementById('completionConfirmDate').value = defaultDate || todayStr();
  document.getElementById('completionConfirmModal').classList.add('active');
}

function closeCompletionConfirmModal(){
  document.getElementById('completionConfirmModal').classList.remove('active');
  pendingCompletionUpdateId = null;
}

function quickUpdateCompletion(itemId, isCompleted, actualCompletionDate, addToFactoryStock){
  const row = getRowById(itemId);
  if(!row) return;
  const payload = {
    id: Number(row.id),
    quantity: Math.max(0, Number(row.quantity || 0)),
    expected_completion_date: formatDate(row.expected_completion_date),
    notes: row.notes || '',
    is_completed: isCompleted ? 1 : 0,
    actual_completion_date: isCompleted ? (actualCompletionDate || todayStr()) : '',
    add_to_factory_stock: addToFactoryStock ? 1 : 0
  };
  fetch('/api/factory-wip', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success'){
        window.showAppToast && window.showAppToast(d.message || '更新失败', true);
        loadList();
        return;
      }
      window.showAppToast && window.showAppToast('更新成功', false);
      loadList();
    })
    .catch(err => {
      window.showAppToast && window.showAppToast(err.message || '更新失败', true);
      loadList();
    });
}

function confirmCompletionUpdate(){
  if(!pendingCompletionUpdateId) return;
  const dateVal = (document.getElementById('completionConfirmDate').value || '').trim() || todayStr();
  quickUpdateCompletion(pendingCompletionUpdateId, 1, dateVal, false);
  closeCompletionConfirmModal();
}

function confirmCompletionAndAddToFactoryStock(){
  if(!pendingCompletionUpdateId) return;
  const dateVal = (document.getElementById('completionConfirmDate').value || '').trim() || todayStr();
  quickUpdateCompletion(pendingCompletionUpdateId, 1, dateVal, true);
  closeCompletionConfirmModal();
}

function saveFromModal(){
  const order_product_id = Number($('#modalOrderProduct').value || 0);
  const factory_id = Number($('#modalFactory').value || 0);
  const quantity = Math.max(0, parseInt($('#modalQuantity').value || '0', 10) || 0);
  const expected_completion_date = ($('#modalExpectedDate').value || '').trim();
  const is_completed = String(document.getElementById('modalCompletedSegment')?.getAttribute('data-value') || '0') === '1' ? 1 : 0;
  let actual_completion_date = ($('#modalActualCompletionDate').value || '').trim();
  const notes = ($('#modalNotes').value || '').trim();

  if(is_completed && !actual_completion_date){
    actual_completion_date = todayStr();
  }
  if(!is_completed){
    actual_completion_date = '';
  }

  if(!editId && (!order_product_id || !factory_id)){
    showModalStatus('下单SKU和工厂为必填', true);
    return;
  }

  const payload = editId
    ? { id: editId, quantity, expected_completion_date, is_completed, actual_completion_date, notes }
    : { order_product_id, factory_id, quantity, expected_completion_date, is_completed, actual_completion_date, notes };

  fetch('/api/factory-wip', {
    method: editId ? 'PUT' : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success'){
        showModalStatus(d.message || '保存失败', true);
        return;
      }
      showModalStatus('保存成功', false);
      setTimeout(() => {
        closeModal();
        loadList();
      }, 260);
    })
    .catch(err => showModalStatus(err.message || '保存失败', true));
}

function removeItem(id){
  if(!confirm('确认删除该记录？')) return;
  fetch('/api/factory-wip', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  })
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success'){
        if(window.showAppToast){ window.showAppToast(d.message || '删除失败', true, 3200); }
        return;
      }
      loadList();
    })
    .catch(err => { if(window.showAppToast){ window.showAppToast(err.message || '删除失败', true, 3200); } });
}

function loadList(){
  const q = ($('#searchInput').value || '').trim();
  const url = q ? `/api/factory-wip?q=${encodeURIComponent(q)}` : '/api/factory-wip';
  fetch(url)
    .then(r => r.json())
    .then(d => {
      const tbody = document.querySelector('#mainTable tbody');
      if(d.status !== 'success'){
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;color:#a33;">${d.message || '加载失败'}</td></tr>`;
        return;
      }
      listCache = d.items || [];
      if(!listCache.length){
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;">暂无数据</td></tr>';
        return;
      }
      tbody.innerHTML = listCache.map(item => `
        <tr>
          <td>${item.sku || ''}</td>
          <td>${item.factory_name || ''}</td>
          <td>${Number(item.quantity || 0)}</td>
          <td>${formatDate(item.expected_completion_date)}</td>
          <td>
            <div class="status-segment status-segment--inline preview-completed-status" data-id="${item.id}" data-value="${Number(item.is_completed || 0) ? '1' : '0'}">
              <button type="button" class="status-pill status-pill--yes ${Number(item.is_completed || 0) ? 'is-active' : ''}" data-value="1">是</button>
              <button type="button" class="status-pill status-pill--no ${Number(item.is_completed || 0) ? '' : 'is-active'}" data-value="0">否</button>
            </div>
          </td>
          <td>${formatDate(item.actual_completion_date)}</td>
          <td>${item.notes || ''}</td>
          <td>${formatDateTime(item.created_at)}</td>
          <td>
            <div class="pm-actions">
              <button class="btn-secondary" onclick="openEditModal(${item.id})">编辑</button>
              <button class="btn-danger" onclick="removeItem(${item.id})">删除</button>
            </div>
          </td>
        </tr>
      `).join('');

      document.querySelectorAll('.preview-completed-status').forEach(seg => {
        seg.querySelectorAll('button[data-value]').forEach(btn => {
          btn.addEventListener('click', function(e){
            e.stopPropagation();
            const targetValue = String(this.getAttribute('data-value') || '0');
            const itemId = Number(seg.getAttribute('data-id') || 0);
            const row = getRowById(itemId);
            if(!row) return;
            if(targetValue === '1'){
              openCompletionConfirmModal(itemId, formatDate(row.actual_completion_date) || todayStr());
            } else {
              quickUpdateCompletion(itemId, 0, '', false);
            }
          });
        });
      });
    })
    .catch(err => {
      const tbody = document.querySelector('#mainTable tbody');
      tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;color:#a33;">${err.message || '加载失败'}</td></tr>`;
    });
}

function resetSearch(){
  $('#searchInput').value = '';
  loadList();
}

$('#searchInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') loadList();
});

document.getElementById('modalCompletedSegment').querySelectorAll('button[data-value]').forEach(btn => {
  btn.addEventListener('click', function(){
    setSegmentValue(document.getElementById('modalCompletedSegment'), this.getAttribute('data-value') || '0');
    toggleActualDateGroup();
  });
});

$('#pm-modal').addEventListener('click', (e) => {
  if(e.target === e.currentTarget) closeModal();
});

document.getElementById('completionConfirmModal').addEventListener('click', (e) => {
  if(e.target === e.currentTarget) closeCompletionConfirmModal();
});

window.addEventListener('load', () => {
  const importInput = document.getElementById('importFileInput');
  if(importInput){
    importInput.addEventListener('change', function(){
      const file = this.files && this.files[0];
      if(!file) return;
      importTemplate(file);
    });
  }
  loadOptions().finally(loadList);
});
</script>
</body>
<script src="/static/js/header.js"></script>
</html>
