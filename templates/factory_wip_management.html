<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工厂在制库存管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="site-header"></div>
<div class="container">
  <section class="hero" style="margin-bottom:1.5rem;">
    <h2>工厂在制库存管理</h2>
    <p>按下单SKU + 工厂维护在制数量与预计完工日期</p>
  </section>

  <section class="pm-layout">
    <div class="card pm-card">
      <div class="pm-toolbar">
        <div class="pm-toolbar-actions">
          <div class="form-group pm-search" style="margin:0;">
            <span class="pm-search-title">搜索</span>
            <input id="searchInput" type="text" placeholder="搜索SKU/工厂名称">
            <button class="btn-primary" onclick="loadList()">搜索</button>
            <button class="btn-secondary" onclick="resetSearch()">清空</button>
          </div>
          <span class="pm-divider"></span>
          <button class="btn-accent" onclick="openCreateModal()">新增</button>
          <button class="btn-secondary" onclick="downloadTemplate()">下载模板</button>
          <button class="btn-secondary" onclick="downloadAllUnfinishedWipData()">下载所有未完工数据</button>
          <button class="btn-secondary" onclick="triggerImport()">上传模板</button>
          <input id="importFileInput" type="file" accept=".xlsx,.xlsm" style="display:none;">
        </div>
      </div>
    </div>

    <div>
      <table class="pm-table" id="mainTable" data-batch-delete-handler="handleFactoryWipBatchDelete">
        <thead>
          <tr>
            <th style="width:54px; text-align:center;"><input type="checkbox" id="wipSelectAll"></th>
            <th>工厂</th>
            <th style="width:160px;">订单号</th>
            <th style="width:160px;">合同编号</th>
            <th style="width:120px;">颜色</th>
            <th>SKU</th>
            <th style="width:150px;">在市状态</th>
            <th style="width:120px;">数量</th>
            <th style="width:140px;">预计完工日期</th>
            <th style="width:170px;">最初预计完工日期</th>
            <th style="width:160px;">是否完工</th>
            <th style="width:140px;">实际完工时间</th>
            <th>备注</th>
            <th style="width:180px;">创建时间</th>
            <th style="width:180px;">更新时间</th>
            <th style="width:160px;">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="16" style="text-align:center;">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</div>

<div class="pm-modal" id="pm-modal">
  <div class="pm-modal-content">
    <h3 id="pm-modal-title" style="margin-top:0;">新增工厂在制库存</h3>
    <div class="pm-form">
      <div class="form-group pm-form-full">
        <label for="modalFactory">工厂<span class="required-asterisk">*</span></label>
        <select id="modalFactory"></select>
      </div>
      <div class="form-group">
        <label for="modalOrderNo">订单号</label>
        <input id="modalOrderNo" type="text" list="orderNoList" placeholder="可选">
        <datalist id="orderNoList"></datalist>
      </div>
      <div class="form-group">
        <label for="modalContractNo">合同编号</label>
        <input id="modalContractNo" type="text" list="contractNoList" placeholder="可选，不填则按单条显示">
        <datalist id="contractNoList"></datalist>
      </div>
      <div class="form-group">
        <label for="modalOrderProduct">下单SKU<span class="required-asterisk">*</span></label>
        <select id="modalOrderProduct"></select>
      </div>
      <div class="form-group">
        <label for="modalQuantity">数量<span class="required-asterisk">*</span></label>
        <input id="modalQuantity" type="number" min="0" step="1" value="0">
      </div>
      <div class="form-group">
        <label for="modalExpectedDate">预计完工日期</label>
        <input id="modalExpectedDate" type="date">
      </div>
      <div class="form-group">
        <label>最初预计完工日期</label>
        <div id="modalInitialExpectedText" class="history-text">-</div>
      </div>
      <div class="form-group">
        <label>是否完工</label>
        <div class="status-segment status-segment--inline" id="modalCompletedSegment" data-value="0">
          <button type="button" class="status-pill status-pill--yes" data-value="1">是</button>
          <button type="button" class="status-pill status-pill--no is-active" data-value="0">否</button>
        </div>
      </div>
      <div class="form-group" id="modalActualDateGroup" style="display:none;">
        <label for="modalActualCompletionDate">实际完工时间</label>
        <input id="modalActualCompletionDate" type="date">
      </div>
      <div class="form-group pm-form-full">
        <label for="modalNotes">备注</label>
        <textarea id="modalNotes" rows="3" placeholder="可选"></textarea>
      </div>
    </div>
    <div id="modalStatus" class="response" style="display:none;margin-top:.75rem;"></div>
    <div class="pm-modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveFromModal()">保存</button>
    </div>
  </div>
</div>

<footer><p>&copy; 2026 SITJOY | 内部使用</p></footer>

<div id="factoryWipSaveBar" class="preview-savebar" aria-live="polite">
  <span id="factoryWipSaveText">已修改 0 条预览数据</span>
  <button type="button" class="btn-secondary" onclick="cancelFactoryWipEdits()">取消修改</button>
  <button id="factoryWipSaveNoStockBtn" type="button" class="btn-secondary" onclick="saveFactoryWipEdits(false)">批量保存（不更新在库）</button>
  <button id="factoryWipSaveUpdateStockBtn" type="button" class="btn-primary" onclick="saveFactoryWipEdits(true)">批量保存并更新工厂在库数据</button>
</div>

<style>
  .preview-savebar {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 5300;
    display: none;
    align-items: center;
    gap: 0.6rem;
    padding: 0.75rem 0.9rem;
    border: 1px solid rgba(188,180,170,.82);
    border-radius: 7px;
    background: #fff;
    box-shadow: 0 6px 16px rgba(15,23,42,.09);
    min-width: min(560px, calc(100vw - 24px));
  }
  .preview-savebar.active { display: flex; }
  .preview-savebar span { flex: 1; color: var(--morandi-ink); font-weight: 700; }
  .preview-savebar .btn-primary,
  .preview-savebar .btn-secondary { padding: 0.65rem 1rem; }
  .preview-edit-input { width: 100%; }
  .preview-edit-cell { padding-left: 0.35rem !important; padding-right: 0.35rem !important; }
  .preview-status-segment { min-width: 110px; }
  .market-status-segment { min-width: 108px; }
  .market-status-segment .status-pill--yes.is-active { background: #6f9d7d; color: #fff; }
  .market-status-segment .status-pill--no.is-active { background: #ad6f6f; color: #fff; }
  .sku-color-chip-wrap { display: inline-flex; align-items: center; gap: 0.4rem; }
  .sku-color-chip { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(60, 60, 60, 0.25); display: inline-block; }
  .sku-color-empty { color: var(--morandi-slate); }
  .history-text { min-height: 38px; border: 1px solid rgba(207,199,189,.55); border-radius: 8px; padding: .5rem .65rem; background: transparent; color: var(--morandi-slate); display: flex; align-items: center; }
  .pm-form-full { grid-column: 1 / -1; }
</style>

<script>
let editId = null;
let optionsLoaded = false;
let optionFactories = [];
let optionOrderProducts = [];
let optionLinks = [];
let optionContracts = [];
let skuFactoryMap = new Map();
let factorySkuMap = new Map();
let listCache = [];
let selectedWipIds = new Set();
let factoryWipEditDraft = {};
let modalInitialExpectedLocked = '';
let factoryWipColumnFilters = {};

const WIP_FILTER_COLUMNS = {
  1: { key: 'factory_name', label: '工厂', finite: true },
  2: { key: 'order_no', label: '订单号' },
  3: { key: 'contract_no', label: '合同编号' },
  4: { key: 'representative_color', label: '颜色' },
  5: { key: 'sku', label: 'SKU' },
  6: { key: 'is_on_market', label: '在市状态', finite: true },
  7: { key: 'quantity', label: '数量' },
  8: { key: 'expected_completion_date', label: '预计完工日期' },
  9: { key: 'initial_expected_completion_date', label: '最初预计完工日期' },
  10: { key: 'is_completed', label: '是否完工', finite: true },
  11: { key: 'actual_completion_date', label: '实际完工时间' },
  12: { key: 'notes', label: '备注' },
  13: { key: 'created_at', label: '创建时间' },
  14: { key: 'update_time', label: '更新时间' }
};

const $ = (s) => document.querySelector(s);

function getWipFilterText(item, colIndex){
  if(!item) return '';
  if(colIndex === 6) return Number(item.is_on_market || 0) ? '在市' : '下市';
  if(colIndex === 4) return String(item.representative_color || '').trim() || '-';
  if(colIndex === 10) return Number(item.is_completed || 0) ? '是' : '否';
  if(colIndex === 13) return formatDateTime(item.created_at || '');
  if(colIndex === 14) return formatDateTime(item.update_time || item.updated_at || '');
  const config = WIP_FILTER_COLUMNS[colIndex] || {};
  const key = config.key;
  if(!key) return '';
  return String(item[key] == null ? '' : item[key]).trim();
}

function getWipFilterState(colIndex){
  const key = String(colIndex);
  if(!factoryWipColumnFilters[key]){
    factoryWipColumnFilters[key] = { query: '', exact: false, selected: [] };
  }
  return factoryWipColumnFilters[key];
}

function hasWipFilterActive(colIndex){
  const state = getWipFilterState(colIndex);
  return Boolean((state.query || '').trim()) || (Array.isArray(state.selected) && state.selected.length > 0);
}

function applyWipColumnFilters(rows){
  const list = Array.isArray(rows) ? rows : [];
  const activeCols = Object.keys(WIP_FILTER_COLUMNS).map(v => Number(v)).filter(col => hasWipFilterActive(col));
  if(!activeCols.length) return list.slice();
  return list.filter(item => {
    for(const colIndex of activeCols){
      const state = getWipFilterState(colIndex);
      const value = getWipFilterText(item, colIndex);
      const valueLower = value.toLowerCase();
      const query = String(state.query || '').trim();
      const selected = Array.isArray(state.selected) ? state.selected.map(v => String(v)) : [];
      if(selected.length && !selected.includes(value)) return false;
      if(query){
        if(state.exact){
          if(value !== query) return false;
        } else {
          if(!valueLower.includes(query.toLowerCase())) return false;
        }
      }
    }
    return true;
  });
}

function clearWipFilterOptionCache(){
  // 统一筛选组件由 window.SitjoyColumnFilter 管理，此处保留空实现用于兼容调用点。
}

function refreshWipFilterButtons(){
  document.querySelectorAll('.wip-col-filter-btn[data-col-index]').forEach(btn => {
    const col = Number(btn.dataset.colIndex || 0);
    btn.classList.toggle('has-filter', hasWipFilterActive(col));
  });
}

function installWipColumnFilterButtons(){
  if(!window.SitjoyColumnFilter) return;
  const table = document.getElementById('mainTable');
  if(!table) return;
  const existing = window.__factoryWipColumnFilterHandle || window.SitjoyColumnFilter.get(table);
  if(existing){
    // 表体刷新时不要销毁/重建，否则筛选状态会丢失导致“筛选失效”
    if(typeof existing.setFilters === 'function'){
      existing.setFilters(factoryWipColumnFilters || {});
    }
    if(typeof existing.refreshButtons === 'function') existing.refreshButtons();
    window.__factoryWipColumnFilterHandle = existing;
    return;
  }
  const handle = window.SitjoyColumnFilter.attach(table, {
    columns: Object.keys(WIP_FILTER_COLUMNS).map(key => {
      const index = Number(key);
      const config = WIP_FILTER_COLUMNS[index] || {};
      return { index, label: config.label || `字段${index}` };
    }),
    fetchOptions: ({ column, query, exact, limit }) => {
      const params = new URLSearchParams({
        action: 'filter_options',
        column: String(column.index),
        q: query || '',
        exact: exact ? '1' : '0',
        limit: String(limit || 120)
      });
      return fetch(`/api/factory-wip?${params.toString()}`).then(r => r.json()).then(d => {
        if(d.status !== 'success') throw new Error(d.message || '加载筛选项失败');
        return d.values || [];
      });
    },
    onApply: (filters) => {
      factoryWipColumnFilters = filters || {};
      renderFactoryWipTable(applyWipColumnFilters(listCache));
      syncFactoryWipSaveBar();
    },
    onReset: (filters) => {
      factoryWipColumnFilters = filters || {};
      renderFactoryWipTable(applyWipColumnFilters(listCache));
      syncFactoryWipSaveBar();
    }
  });
  window.__factoryWipColumnFilterHandle = handle;
  if(handle) handle.refreshButtons();
}

function showModalStatus(message, isError){
  const el = $('#modalStatus');
  el.style.display = 'block';
  el.style.background = isError ? '#ffecec' : '#f0fff0';
  el.style.color = isError ? '#a33' : '#2f6f2f';
  el.textContent = message;
}

function fillSelect(id, items, valueKey, textKey, placeholder){
  const el = document.getElementById(id);
  if(!el) return;
  el.innerHTML = `<option value="">${placeholder || '请选择'}</option>` + (items || []).map(item => `
    <option value="${item[valueKey]}">${item[textKey] || ''}</option>
  `).join('');
  if(window.refreshUniversalSingleSelect) window.refreshUniversalSingleSelect(el);
}

function rebuildOptionLinkMaps(){
  skuFactoryMap = new Map();
  factorySkuMap = new Map();
  (optionLinks || []).forEach(link => {
    const opId = Number(link.order_product_id || 0);
    const factoryId = Number(link.factory_id || 0);
    if(!opId || !factoryId) return;
    if(!skuFactoryMap.has(opId)) skuFactoryMap.set(opId, new Set());
    if(!factorySkuMap.has(factoryId)) factorySkuMap.set(factoryId, new Set());
    skuFactoryMap.get(opId).add(factoryId);
    factorySkuMap.get(factoryId).add(opId);
  });
}

function syncWipModalLinkedOptions(){
  const skuSelect = document.getElementById('modalOrderProduct');
  const factorySelect = document.getElementById('modalFactory');
  if(!skuSelect || !factorySelect) return;

  const selectedSkuId = Number(skuSelect.value || 0);
  const selectedFactoryId = Number(factorySelect.value || 0);

  let factories = optionFactories.slice();
  if(selectedSkuId){
    const allowedFactoryIds = skuFactoryMap.get(selectedSkuId) || new Set();
    factories = optionFactories.filter(item => allowedFactoryIds.has(Number(item.id || 0)));
  }

  let skus = optionOrderProducts.slice();
  if(selectedFactoryId){
    const allowedSkuIds = factorySkuMap.get(selectedFactoryId) || new Set();
    skus = optionOrderProducts.filter(item => allowedSkuIds.has(Number(item.id || 0)));
  }

  fillSelect('modalFactory', factories, 'id', 'factory_name', '请选择工厂');
  fillSelect('modalOrderProduct', skus, 'id', 'sku', '请选择下单SKU');

  if(selectedFactoryId && factories.some(item => Number(item.id || 0) === selectedFactoryId)){
    factorySelect.value = String(selectedFactoryId);
  } else {
    factorySelect.value = '';
  }

  if(selectedSkuId && skus.some(item => Number(item.id || 0) === selectedSkuId)){
    skuSelect.value = String(selectedSkuId);
  } else {
    skuSelect.value = '';
  }

  if(window.refreshUniversalSingleSelect){
    window.refreshUniversalSingleSelect(factorySelect);
    window.refreshUniversalSingleSelect(skuSelect);
  }
  const finalFactoryId = Number(factorySelect.value || 0);
  renderContractOptions(finalFactoryId);
  renderOrderOptions(finalFactoryId);
}

function formatDateTime(value){
  if(!value) return '';
  const text = String(value);
  return text.includes('T') ? text.replace('T', ' ').slice(0, 19) : text.slice(0, 19);
}

function formatDate(value){
  if(!value) return '';
  return String(value).slice(0, 10);
}

function normalizePairText(value){
  return String(value || '').trim();
}

function getFactoryContracts(factoryId){
  const fid = Number(factoryId || 0);
  if(!fid) return [];
  return (optionContracts || []).filter(item => Number(item.factory_id || 0) === fid);
}

function renderContractOptions(factoryId){
  const listEl = document.getElementById('contractNoList');
  if(!listEl) return;
  const seen = new Set();
  listEl.innerHTML = getFactoryContracts(factoryId)
    .map(item => normalizePairText(item.contract_no))
    .filter(text => text && !seen.has(text) && seen.add(text))
    .map(text => `<option value="${text.replace(/"/g, '&quot;')}"></option>`)
    .join('');
}

function renderOrderOptions(factoryId){
  const listEl = document.getElementById('orderNoList');
  if(!listEl) return;
  const seen = new Set();
  listEl.innerHTML = getFactoryContracts(factoryId)
    .map(item => normalizePairText(item.order_no))
    .filter(text => text && !seen.has(text) && seen.add(text))
    .map(text => `<option value="${text.replace(/"/g, '&quot;')}"></option>`)
    .join('');
}

function findContractPairByContractNo(factoryId, contractNo){
  const target = normalizePairText(contractNo);
  if(!target) return null;
  return getFactoryContracts(factoryId).find(item => normalizePairText(item.contract_no) === target) || null;
}

function findContractPairByOrderNo(factoryId, orderNo){
  const target = normalizePairText(orderNo);
  if(!target) return null;
  return getFactoryContracts(factoryId).find(item => normalizePairText(item.order_no) === target) || null;
}

function syncModalContractOrderPair(changedField){
  const factoryId = Number(document.getElementById('modalFactory')?.value || 0);
  const contractInput = document.getElementById('modalContractNo');
  const orderInput = document.getElementById('modalOrderNo');
  if(!contractInput || !orderInput) return;
  if(changedField === 'contract_no'){
    const hit = findContractPairByContractNo(factoryId, contractInput.value);
    if(hit) orderInput.value = normalizePairText(hit.order_no);
    return;
  }
  if(changedField === 'order_no'){
    const hit = findContractPairByOrderNo(factoryId, orderInput.value);
    if(hit) contractInput.value = normalizePairText(hit.contract_no);
    return;
  }
}

function syncModalInitialExpectedText(seedValue){
  const target = document.getElementById('modalInitialExpectedText');
  if(!target) return;
  const locked = formatDate(seedValue || modalInitialExpectedLocked || '');
  const fallback = formatDate(document.getElementById('modalExpectedDate')?.value || '');
  const text = locked || fallback || '-';
  target.textContent = text;
}

function safeColorValue(value){
  const text = String(value || '').trim();
  if(/^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(text)) return text;
  if(/^rgba?\(\s*(?:\d{1,3}%?\s*,\s*){2}\d{1,3}%?(?:\s*,\s*(?:0|1|0?\.\d+))?\s*\)$/.test(text)) return text;
  if(/^hsla?\(\s*\d{1,3}(?:deg|rad|turn)?\s*,\s*\d{1,3}%\s*,\s*\d{1,3}%\s*(?:,\s*(?:0|1|0?\.\d+))?\s*\)$/.test(text)) return text;
  return '';
}

function todayStr(){
  const d = new Date();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}-${m}-${day}`;
}

function getRowById(id){
  return listCache.find(item => Number(item.id) === Number(id));
}

function setSegmentValue(segmentEl, value){
  if(!segmentEl) return;
  const finalVal = String(value) === '1' ? '1' : '0';
  segmentEl.setAttribute('data-value', finalVal);
  segmentEl.querySelectorAll('[data-value]').forEach(btn => {
    const active = String(btn.getAttribute('data-value') || '') === finalVal;
    btn.classList.toggle('is-active', active);
  });
}

function toggleActualDateGroup(){
  const isCompleted = String(document.getElementById('modalCompletedSegment')?.getAttribute('data-value') || '0') === '1';
  const group = document.getElementById('modalActualDateGroup');
  const input = document.getElementById('modalActualCompletionDate');
  if(!group || !input) return;
  group.style.display = isCompleted ? '' : 'none';
  if(isCompleted && !input.value) input.value = todayStr();
  if(!isCompleted) input.value = '';
}

function loadOptions(){
  return fetch('/api/factory-wip?action=options')
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success') throw new Error(d.message || '加载选项失败');
      optionFactories = d.factories || [];
      optionOrderProducts = d.order_products || [];
      optionLinks = d.links || [];
      optionContracts = d.contracts || [];
      rebuildOptionLinkMaps();
      fillSelect('modalFactory', optionFactories, 'id', 'factory_name', '请选择工厂');
      fillSelect('modalOrderProduct', optionOrderProducts, 'id', 'sku', '请选择下单SKU');
      const currentFactoryId = Number(document.getElementById('modalFactory')?.value || 0);
      renderContractOptions(currentFactoryId);
      renderOrderOptions(currentFactoryId);
      optionsLoaded = true;
    });
}

function downloadTemplate(){
  const ids = Array.from(selectedWipIds).map(v => Number(v)).filter(v => v > 0);
  if (typeof window.downloadTemplateWithIds === 'function') {
    window.downloadTemplateWithIds('/api/factory-wip-template', ids, 'factory_wip_template.xlsx');
    return;
  }
  const query = ids.length ? `?ids=${ids.join(',')}` : '';
  window.location.href = `/api/factory-wip-template${query}`;
}

function downloadAllUnfinishedWipData(){
  window.location.href = '/api/factory-wip?action=download_unfinished_data';
}

function triggerImport(){
  const input = document.getElementById('importFileInput');
  if(!input) return;
  input.value = '';
  input.click();
}

function importTemplate(file){
  const form = new FormData();
  form.append('file', file);
  if(window.showAppUploadProgress){
    window.showAppUploadProgress({ title: '正在导入工厂在制模板...', summary: '请稍候', percent: 12 });
  }
  fetch('/api/factory-wip-import', {
    method: 'POST',
    body: form
  })
    .then(r => r.json())
    .then(d => {
      if(window.hideAppUploadProgress){
        window.hideAppUploadProgress();
      }
      if(d.status !== 'success'){
        if(window.showAppResultPanel){
          window.showAppResultPanel({ title: '导入失败', summary: d.message || '导入失败', isError: true });
        }
        if(window.showAppToast){ window.showAppToast(d.message || '导入失败', true, 3200); }
        return;
      }
      const errorCount = Array.isArray(d.errors) ? d.errors.length : 0;
      const summary = `导入完成：新增 ${Number(d.created || 0)}，更新 ${Number(d.updated || 0)}，未变化 ${Number(d.unchanged || 0)}，错误 ${errorCount}`;
      if(errorCount && window.showAppResultPanel){
        window.showAppResultPanel({
          title: '工厂在制导入完成',
          summary,
          details: (d.errors || []).map(item => `${item.row || '-'}: ${item.error || item.message || '校验失败'}`),
          isError: true
        });
      }
      if(window.showAppToast){ window.showAppToast(summary, false, 2600); }

}

function getWipSelectAllCheckboxes(){
  return Array.from(document.querySelectorAll('input#wipSelectAll'));
}

function syncWipSelectAll(){
  const masters = getWipSelectAllCheckboxes();
  const rows = Array.from(document.querySelectorAll('.wip-row-checkbox')).filter(cb => {
    const tr = cb.closest('tr');
    if(!tr) return false;
    if(String(tr.dataset.pmFilterHidden || '0') === '1') return false;
    if(tr.style && tr.style.display === 'none') return false;
    return true;
  });
  if(!masters.length) return;
  if(!rows.length){
    masters.forEach(master => {
      master.checked = false;
      master.indeterminate = false;
    });
    return;
  }
  const checkedCount = rows.filter(r => r.checked).length;
  const allChecked = checkedCount === rows.length;
  const partial = checkedCount > 0 && checkedCount < rows.length;
  masters.forEach(master => {
    master.checked = allChecked;
    master.indeterminate = partial;
  });
}

function toggleWipSelectAll(checked){
  const rows = Array.from(document.querySelectorAll('.wip-row-checkbox')).filter(cb => {
    const tr = cb.closest('tr');
    if(!tr) return false;
    if(String(tr.dataset.pmFilterHidden || '0') === '1') return false;
    if(tr.style && tr.style.display === 'none') return false;
    return true;
  });
  const visibleIds = rows
    .map(el => Number(el.getAttribute('data-id') || 0))
    .filter(id => Number.isFinite(id) && id > 0);

  // 经过筛选/搜索后，“全选”应只作用于当前可见行：
  // - 勾选：仅选中可见行（清掉其它历史选择）
  // - 取消：仅取消可见行（保留其它隐藏行的选择，便于跨页/跨筛选操作）
  if(checked){
    selectedWipIds = new Set(visibleIds);
  } else {
    visibleIds.forEach(id => selectedWipIds.delete(id));
  }

  rows.forEach(el => {
    const id = Number(el.getAttribute('data-id') || 0);
    el.checked = checked ? selectedWipIds.has(id) : false;
  });
  syncWipSelectAll();
}

function normalizeWipDraftValue(field, rawValue){
  if(field === 'contract_no'){
    return String(rawValue || '').trim();
  }
  if(field === 'order_no'){
    return String(rawValue || '').trim();
  }
  if(field === 'quantity'){
    const num = parseInt(String(rawValue || '').trim(), 10);
    return Number.isFinite(num) ? Math.max(0, num) : 0;
  }
  if(field === 'is_completed'){
    return String(rawValue || '0') === '1' ? 1 : 0;
  }
  if(field === 'expected_completion_date' || field === 'actual_completion_date'){
    const text = String(rawValue || '').trim();
    return text ? text.slice(0, 10) : '';
  }
  return String(rawValue || '').trim();
}

function getWipDraft(itemId){
  return factoryWipEditDraft[String(itemId)] || null;
}

function getWipMergedValue(item, field){
  const draft = getWipDraft(item.id) || {};
  const value = Object.prototype.hasOwnProperty.call(draft, field) ? draft[field] : item[field];
  return normalizeWipDraftValue(field, value);
}

function updateWipDraft(itemId, field, rawValue){
  const item = listCache.find(x => String(x.id) === String(itemId));
  if(!item) return;
  const key = String(itemId);
  const draft = factoryWipEditDraft[key] || {
    order_no: item.order_no || '',
    contract_no: item.contract_no || '',
    quantity: Number(item.quantity || 0),
    expected_completion_date: formatDate(item.expected_completion_date),
    is_completed: Number(item.is_completed || 0) ? 1 : 0,
    actual_completion_date: formatDate(item.actual_completion_date),
    notes: item.notes || ''
  };
  draft[field] = normalizeWipDraftValue(field, rawValue);
  if(field === 'is_completed'){
    if(draft[field] === 1 && !normalizeWipDraftValue('actual_completion_date', draft.actual_completion_date)){
      draft.actual_completion_date = todayStr();
      const dateInput = document.querySelector(`.wip-edit-field[data-id="${itemId}"][data-field="actual_completion_date"]`);
      if(dateInput) dateInput.value = draft.actual_completion_date;
    }
    if(draft[field] === 0){
      draft.actual_completion_date = '';
      const dateInput = document.querySelector(`.wip-edit-field[data-id="${itemId}"][data-field="actual_completion_date"]`);
      if(dateInput) dateInput.value = '';
    }
  }
  const unchanged = normalizeWipDraftValue('quantity', draft.quantity) === normalizeWipDraftValue('quantity', item.quantity)
    && normalizeWipDraftValue('order_no', draft.order_no) === normalizeWipDraftValue('order_no', item.order_no)
    && normalizeWipDraftValue('contract_no', draft.contract_no) === normalizeWipDraftValue('contract_no', item.contract_no)
    && normalizeWipDraftValue('expected_completion_date', draft.expected_completion_date) === normalizeWipDraftValue('expected_completion_date', item.expected_completion_date)
    && normalizeWipDraftValue('is_completed', draft.is_completed) === normalizeWipDraftValue('is_completed', item.is_completed)
    && normalizeWipDraftValue('actual_completion_date', draft.actual_completion_date) === normalizeWipDraftValue('actual_completion_date', item.actual_completion_date)
    && normalizeWipDraftValue('notes', draft.notes) === normalizeWipDraftValue('notes', item.notes);
  if(unchanged){
    delete factoryWipEditDraft[key];
  } else {
    factoryWipEditDraft[key] = draft;
  }
  syncFactoryWipSaveBar();
}

function setWipStatusSegment(segmentEl, value){
  if(!segmentEl) return;
  const finalVal = String(value) === '1' ? '1' : '0';
  segmentEl.setAttribute('data-value', finalVal);
  segmentEl.querySelectorAll('[data-value]').forEach(btn => {
    const active = String(btn.getAttribute('data-value') || '') === finalVal;
    btn.classList.toggle('is-active', active);
  });
}

function syncDraftContractOrderPair(itemId, changedField){
  const item = listCache.find(x => String(x.id) === String(itemId));
  if(!item) return;
  const factoryId = Number(item.factory_id || 0);
  if(!factoryId) return;
  const key = String(itemId);
  const draft = factoryWipEditDraft[key] || null;
  if(!draft) return;
  if(changedField === 'contract_no'){
    const hit = findContractPairByContractNo(factoryId, draft.contract_no);
    if(hit){
      draft.order_no = normalizePairText(hit.order_no);
      const input = document.querySelector(`.wip-edit-field[data-id="${itemId}"][data-field="order_no"]`);
      if(input) input.value = draft.order_no;
    }
    return;
  }
  if(changedField === 'order_no'){
    const hit = findContractPairByOrderNo(factoryId, draft.order_no);
    if(hit){
      draft.contract_no = normalizePairText(hit.contract_no);
      const input = document.querySelector(`.wip-edit-field[data-id="${itemId}"][data-field="contract_no"]`);
      if(input) input.value = draft.contract_no;
    }
  }
}

function bindFactoryWipEditEvents(){
  document.querySelectorAll('.wip-edit-field').forEach(el => {
    const handler = function(){
      const itemId = this.getAttribute('data-id');
      const field = this.getAttribute('data-field');
      updateWipDraft(itemId, field, this.value);
      if(field === 'contract_no' || field === 'order_no'){
        syncDraftContractOrderPair(itemId, field);
        updateWipDraft(itemId, field, this.value);
      }
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
  document.querySelectorAll('.wip-status-segment button[data-value]').forEach(btn => {
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      const seg = this.closest('.wip-status-segment');
      if(!seg) return;
      const itemId = Number(seg.getAttribute('data-id') || 0);
      const targetValue = String(this.getAttribute('data-value') || '0');
      setWipStatusSegment(seg, targetValue);
      updateWipDraft(itemId, 'is_completed', targetValue);
      const dateInput = document.querySelector(`.wip-edit-field[data-id="${itemId}"][data-field="actual_completion_date"]`);
      if(dateInput){
        if(targetValue === '1' && !dateInput.value){
          dateInput.value = todayStr();
          updateWipDraft(itemId, 'actual_completion_date', dateInput.value);
        }
        if(targetValue === '0'){
          dateInput.value = '';
          updateWipDraft(itemId, 'actual_completion_date', '');
        }
      }
    });
  });
}

function saveFactoryWipEdits(updateFactoryStock){
  const items = collectFactoryWipUpdateItems();
  if(!items.length){
    syncFactoryWipSaveBar();
    return;
  }
  const bar = document.getElementById('factoryWipSaveBar');
  const btnNoStock = document.getElementById('factoryWipSaveNoStockBtn');
  const btnUpdateStock = document.getElementById('factoryWipSaveUpdateStockBtn');
  const runningText = '保存中...';
  if(btnNoStock){ btnNoStock.disabled = true; btnNoStock.textContent = runningText; }
  if(btnUpdateStock){ btnUpdateStock.disabled = true; btnUpdateStock.textContent = runningText; }
  fetch('/api/factory-wip?action=bulk_update', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ items, update_factory_stock: updateFactoryStock ? 1 : 0 })
  })
    .then(r => r.json())
    .then(d => {
      if(d.status !== 'success'){
        if(window.showAppToast){ window.showAppToast(d.message || '批量更新失败', true, 3200); }

        if(btnUpdateStock){ btnUpdateStock.disabled = false; btnUpdateStock.textContent = '批量保存并更新工厂在库数据'; }
        return;
      }
      factoryWipEditDraft = {};
      if(window.showAppToast){ window.showAppToast(`批量更新成功：${Number(d.updated || items.length)} 条`, false, 2200); }
      loadOptions().catch(() => null).finally(loadList);
      syncFactoryWipSaveBar();
      if(btnNoStock){ btnNoStock.disabled = false; btnNoStock.textContent = '批量保存（不更新在库）'; }
      if(btnUpdateStock){ btnUpdateStock.disabled = false; btnUpdateStock.textContent = '批量保存并更新工厂在库数据'; }
    })
    .catch(err => {
      if(window.showAppToast){ window.showAppToast(err.message || '批量更新失败', true, 3200); }
      if(btnNoStock){ btnNoStock.disabled = false; btnNoStock.textContent = '批量保存（不更新在库）'; }
      if(btnUpdateStock){ btnUpdateStock.disabled = false; btnUpdateStock.textContent = '批量保存并更新工厂在库数据'; }
    });
}

function saveFromModal(){
  const order_product_id = Number($('#modalOrderProduct').value || 0);
  const factory_id = Number($('#modalFactory').value || 0);
  const quantity = Math.max(0, parseInt($('#modalQuantity').value || '0', 10) || 0);
  const order_no = ($('#modalOrderNo').value || '').trim();
  const contract_no = ($('#modalContractNo').value || '').trim();
  const expected_completion_date = ($('#modalExpectedDate').value || '').trim();
  const is_completed = String(document.getElementById('modalCompletedSegment')?.getAttribute('data-value') || '0') === '1' ? 1 : 0;
  let actual_completion_date = ($('#modalActualCompletionDate').value || '').trim();
  const notes = ($('#modalNotes').value || '').trim();

  if(is_completed && !actual_completion_date){
    actual_completion_date = todayStr();
  }
  if(!is_completed){
    actual_completion_date = '';
  }

  if(!editId && (!order_product_id || !factory_id)){
    showModalStatus('下单SKU和工厂为必填', true);
    return;
  }

  const payload = editId
    ? { id: editId, quantity, order_no, contract_no, expected_completion_date, is_completed, actual_completion_date, notes }
    : { order_product_id, factory_id, quantity, order_no, contract_no, expected_completion_date, is_completed, actual_completion_date, notes };

  fetch('/api/factory-wip', {
    method: editId ? 'PUT' : 'POST',
    headers: { 'Content-Type': 'application/json' },

  fetch(url)
    .then(r => r.json())
    .then(d => {
      const tbody = document.querySelector('#mainTable tbody');
      if(d.status !== 'success'){
        tbody.innerHTML = `<tr><td colspan="16" style="text-align:center;color:#a33;">${d.message || '加载失败'}</td></tr>`;
        selectedWipIds = new Set();
        syncWipSelectAll();
        syncFactoryWipSaveBar();
        return;
      }
      listCache = d.items || [];
      clearWipFilterOptionCache();
      factoryWipEditDraft = Object.fromEntries(Object.entries(factoryWipEditDraft).filter(([id]) => listCache.some(item => String(item.id) === String(id))));

        syncWipSelectAll();
        syncFactoryWipSaveBar();

      syncFactoryWipSaveBar();
    })
    .catch(err => {
      const tbody = document.querySelector('#mainTable tbody');
      tbody.innerHTML = `<tr><td colspan="16" style="text-align:center;color:#a33;">${err.message || '加载失败'}</td></tr>`;

        </td>
        <td class="preview-edit-cell"><input type="number" min="0" step="1" class="inline-input preview-edit-input wip-edit-field" data-id="${item.id}" data-field="quantity" value="${Number(quantity || 0)}"></td>
        <td class="preview-edit-cell"><input type="date" class="inline-input preview-edit-input wip-edit-field" data-id="${item.id}" data-field="expected_completion_date" value="${expectedCompletionDate || ''}"></td>
        <td><div class="history-text">${initialExpectedCompletionDate || '-'}</div></td>
        <td class="preview-edit-cell">
          <div class="status-segment status-segment--inline preview-status-segment wip-status-segment" data-id="${item.id}" data-value="${Number(isCompleted || 0) ? '1' : '0'}">
            <button type="button" class="status-pill status-pill--yes ${Number(isCompleted || 0) ? 'is-active' : ''}" data-value="1">是</button>
            <button type="button" class="status-pill status-pill--no ${Number(isCompleted || 0) ? '' : 'is-active'}" data-value="0">否</button>
          </div>
        </td>
        <td class="preview-edit-cell"><input type="date" class="inline-input preview-edit-input wip-edit-field" data-id="${item.id}" data-field="actual_completion_date" value="${actualCompletionDate || ''}"></td>
        <td class="preview-edit-cell"><input type="text" class="inline-input preview-edit-input wip-edit-field" data-id="${item.id}" data-field="notes" value="${String(notes || '').replace(/"/g, '&quot;')}"></td>
        <td>${formatDateTime(item.created_at)}</td>
        <td>${formatDateTime(item.update_time || item.updated_at)}</td>
        <td>
          <div class="pm-actions">
            <button class="btn-secondary" onclick="openEditModal(${item.id})">编辑</button>
            <button class="btn-danger" onclick="removeItem(${item.id})">删除</button>
          </div>
        </td>
      </tr>
    `);
  });

  tbody.innerHTML = html.join('');
  installWipColumnFilterButtons();
  refreshWipFilterButtons();
  bindRowSelectionEvents();
  bindFactoryWipEditEvents();
  syncWipSelectAll();
}

function resetSearch(){
  $('#searchInput').value = '';
  loadList();
}

$('#searchInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') loadList();
});

document.getElementById('modalCompletedSegment').querySelectorAll('button[data-value]').forEach(btn => {
  btn.addEventListener('click', function(){
    setSegmentValue(document.getElementById('modalCompletedSegment'), this.getAttribute('data-value') || '0');
    toggleActualDateGroup();
  });
});

document.getElementById('modalExpectedDate').addEventListener('input', () => {
  syncModalInitialExpectedText();
});

document.addEventListener('change', function(e){
  const target = e.target;
  if(target && target.id === 'wipSelectAll'){
    toggleWipSelectAll(!!target.checked);
  }
  if(target && (target.id === 'modalOrderProduct' || target.id === 'modalFactory')){
    syncWipModalLinkedOptions();
    if(target.id === 'modalFactory'){
      syncModalContractOrderPair('contract_no');
    }
  }
  if(target && target.id === 'modalContractNo'){
    syncModalContractOrderPair('contract_no');
  }
  if(target && target.id === 'modalOrderNo'){
    syncModalContractOrderPair('order_no');
  }
});

document.addEventListener('input', function(e){
  const target = e.target;
  if(target && target.id === 'modalContractNo'){
    syncModalContractOrderPair('contract_no');
  }
  if(target && target.id === 'modalOrderNo'){
    syncModalContractOrderPair('order_no');
  }
});

$('#pm-modal').addEventListener('click', (e) => {
  if(e.target === e.currentTarget) closeModal();
});

window.addEventListener('load', () => {
  const importInput = document.getElementById('importFileInput');
  if(importInput){
    importInput.addEventListener('change', function(){
      const file = this.files && this.files[0];
      if(!file) return;
      importTemplate(file);
    });
  }
  installWipColumnFilterButtons();
  loadOptions().finally(loadList);
  setTimeout(installWipColumnFilterButtons, 200);
});
</script>
</body>
<script src="/static/js/header.js"></script>
</html>
