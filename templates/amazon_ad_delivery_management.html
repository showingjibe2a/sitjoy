<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon广告管理 - 广告投放管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .status-pill.is-active { color: #fff; }
        .status-pill--enabled.is-active { background: #7fa88b; }
        .status-pill--paused.is-active { background: #b07b7b; }
        .status-pill--archived.is-active { background: #8f82b5; }
        .preview-savebar {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            z-index: 55;
            display: none;
            align-items: center;
            gap: 0.7rem;
            padding: 0.65rem 0.95rem;
            border: 1px solid var(--morandi-sand);
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.14);
        }
        .preview-savebar.active {
            display: inline-flex;
        }
        .preview-edit-input {
            width: 100%;
            min-width: 0;
            max-width: 100%;
            box-sizing: border-box;
        }
        .preview-edit-cell {
            padding-left: 0.35rem !important;
            padding-right: 0.35rem !important;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <script src="/static/js/aa_observe_interval.js"></script>
    <script src="/static/js/header.js"></script>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>Amazon广告管理 - 广告投放管理</h2>
            <p>维护广告活动/广告组的投放描述、竞价和观察时间</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin: 0;">
                            <span class="pm-search-title">搜索</span>
                            <input type="text" id="searchInput" placeholder="搜索广告关联/投放描述">
                            <button class="btn-primary" onclick="loadList()">搜索</button>
                            <button class="btn-secondary" onclick="resetSearch()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-secondary" onclick="downloadDeliveryTemplate()">下载模板</button>
                        <button class="btn-secondary" onclick="triggerDeliveryUpload()">批量上传</button>
                        <input type="file" id="deliveryUploadInput" accept=".xlsx" style="display:none;">
                        <button class="btn-accent" onclick="openCreateModal()">新增</button>
                    </div>
                </div>
            </div>

            <div>
                <table class="pm-table" id="deliveryTable">
                    <thead>
                        <tr>
                            <th style="width:220px;">状态</th>
                            <th>广告关联</th>
                            <th>投放描述</th>
                            <th data-manage-col-key="竞价" style="width:190px;">竞价</th>
                            <th style="width:170px;">最后修改时间</th>
                            <th style="width:170px;">下次观察时间</th>
                            <th style="width:150px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="7" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <div class="pm-modal" id="delivery-modal">
        <div class="pm-modal-content">
            <h3 id="modal-title" style="margin-top:0;">新增投放</h3>
            <div class="pm-form">
                <div class="form-group pm-form-full">
                    <label>状态<span class="required-asterisk">*</span></label>
                    <input type="hidden" id="modalStatus" value="启动">
                    <div class="status-segment status-segment--inline">
                        <button type="button" class="status-pill status-pill--enabled" data-target="modalStatus" data-value="启动" onclick="setStatus('启动')">启动</button>
                        <button type="button" class="status-pill status-pill--paused" data-target="modalStatus" data-value="暂停" onclick="setStatus('暂停')">暂停</button>
                        <button type="button" class="status-pill status-pill--archived" data-target="modalStatus" data-value="存档" onclick="setStatus('存档')">存档</button>
                    </div>
                </div>
                <div class="form-group pm-form-full">
                    <label for="modalAdItem">广告关联<span class="required-asterisk">*</span></label>
                    <select id="modalAdItem" data-search-placeholder="搜索广告活动/广告组"></select>
                </div>
                <div class="form-group pm-form-full">
                    <label for="modalDesc">投放描述<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalDesc" placeholder="请输入投放描述">
                </div>
                <div class="form-group">
                    <label for="modalBid">竞价<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalBid" placeholder="如 0.35 或 18%">
                </div>
                <div class="form-group">
                    <label for="modalUpdatedAt">最后修改时间<span class="required-asterisk">*</span></label>
                    <input type="datetime-local" id="modalUpdatedAt">
                </div>
                <div class="form-group">
                    <label for="modalNextObserve">下次观察时间</label>
                    <input type="datetime-local" id="modalNextObserve">
                </div>
            </div>
            <div id="modalStatusBar" class="response" style="display:none; margin-top:0.75rem;"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="saveItem()">保存</button>
            </div>
        </div>
    </div>

    <div id="deliveryPreviewSaveBar" class="preview-savebar" aria-live="polite">
        <span id="deliveryPreviewSaveText">已修改 0 条</span>
        <button type="button" class="btn-secondary" onclick="cancelDeliveryPreviewEdits()">取消修改</button>
        <button type="button" class="btn-primary" onclick="saveDeliveryPreviewEdits()">统一保存</button>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        const DELIVERY_API = '/api/amazon-ad-delivery';

        let editId = null;
        let adOptions = [];
        let rowsCache = [];
        let lastSelectedAdItemId = '';
        /** @type {Record<string, {bid_value?: string, target_desc?: string}>} */
        let deliveryPreviewDraft = {};

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeAttr(value) {
            return escapeHtml(value).replace(/`/g, '&#96;');
        }

        function normalizeDeliveryBidValue(rawValue) {
            return String(rawValue == null ? '' : rawValue).trim();
        }

        function normalizeDeliveryDescValue(rawValue) {
            return String(rawValue == null ? '' : rawValue).trim();
        }

        function getDeliveryFieldOriginal(item, field) {
            if (field === 'bid_value') return normalizeDeliveryBidValue(item.bid_value);
            if (field === 'target_desc') {
                return normalizeDeliveryDescValue(item.target_desc || item.delivery_desc || '');
            }
            return '';
        }

        function getDeliveryFieldEffectiveValue(item, field) {
            const id = String(item.id);
            const draft = deliveryPreviewDraft[id];
            if (draft && draft[field] !== undefined) {
                return field === 'bid_value'
                    ? normalizeDeliveryBidValue(draft[field])
                    : normalizeDeliveryDescValue(draft[field]);
            }
            return getDeliveryFieldOriginal(item, field);
        }

        function countDeliveryPreviewEditedRows() {
            return Object.keys(deliveryPreviewDraft).length;
        }

        function syncDeliveryPreviewDraftEntry(itemId) {
            const id = String(itemId);
            const item = rowsCache.find(x => String(x.id) === id);
            if (!item) {
                delete deliveryPreviewDraft[id];
                return;
            }
            const draft = deliveryPreviewDraft[id];
            if (!draft) return;
            if (draft.bid_value !== undefined
                && normalizeDeliveryBidValue(draft.bid_value) === getDeliveryFieldOriginal(item, 'bid_value')) {
                delete draft.bid_value;
            }
            if (draft.target_desc !== undefined
                && normalizeDeliveryDescValue(draft.target_desc) === getDeliveryFieldOriginal(item, 'target_desc')) {
                delete draft.target_desc;
            }
            if (!Object.keys(draft).length) {
                delete deliveryPreviewDraft[id];
            }
        }

        function syncDeliveryPreviewSaveBar() {
            const bar = document.getElementById('deliveryPreviewSaveBar');
            const text = document.getElementById('deliveryPreviewSaveText');
            if (!bar || !text) return;
            const count = countDeliveryPreviewEditedRows();
            text.textContent = `已修改 ${count} 条`;
            bar.classList.toggle('active', count > 0);
            if (window.syncModalScrollLock) window.syncModalScrollLock();
        }

        function updateDeliveryPreviewDraft(itemId, field, rawValue) {
            const item = rowsCache.find(x => String(x.id) === String(itemId));
            if (!item) return;
            const id = String(itemId);
            const normalized = field === 'bid_value'
                ? normalizeDeliveryBidValue(rawValue)
                : normalizeDeliveryDescValue(rawValue);
            const original = getDeliveryFieldOriginal(item, field);
            const draft = deliveryPreviewDraft[id] || {};
            if (normalized === original) {
                delete draft[field];
            } else {
                draft[field] = normalized;
            }
            if (Object.keys(draft).length) {
                deliveryPreviewDraft[id] = draft;
            } else {
                delete deliveryPreviewDraft[id];
            }
            syncDeliveryPreviewSaveBar();
        }

        function bindDeliveryPreviewEvents() {
            document.querySelectorAll('#deliveryTable .delivery-preview-input').forEach(el => {
                if (el.dataset._deliveryPreviewBound === '1') return;
                el.dataset._deliveryPreviewBound = '1';
                const field = el.getAttribute('data-field') || '';
                const handler = function() {
                    updateDeliveryPreviewDraft(this.getAttribute('data-id'), field, this.value);
                };
                el.addEventListener('input', handler);
                el.addEventListener('change', handler);
            });
        }

        function cancelDeliveryPreviewEdits() {
            deliveryPreviewDraft = {};
            renderTable(rowsCache);
            syncDeliveryPreviewSaveBar();
        }

        function saveDeliveryPreviewEdits() {
            const ids = Object.keys(deliveryPreviewDraft);
            if (!ids.length) {
                syncDeliveryPreviewSaveBar();
                return;
            }
            const items = ids.map(id => {
                const patch = deliveryPreviewDraft[id] || {};
                const payload = { id: Number(id) };
                if (patch.bid_value !== undefined) payload.bid_value = patch.bid_value;
                if (patch.target_desc !== undefined) payload.target_desc = patch.target_desc;
                return payload;
            });
            fetch(DELIVERY_API, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items }),
            })
                .then(r => r.json())
                .then(data => {
                    if (!data || data.status !== 'success') {
                        window.showAppSaveResult({
                            action: 'save',
                            isError: true,
                            message: (data && data.message) || '批量保存失败',
                            errors: data && data.errors,
                        });
                        return;
                    }
                    const errCount = Array.isArray(data.errors) ? data.errors.length : 0;
                    items.forEach(up => {
                        const row = rowsCache.find(x => String(x.id) === String(up.id));
                        if (!row) return;
                        if (up.bid_value !== undefined) row.bid_value = up.bid_value;
                        if (up.target_desc !== undefined) {
                            row.target_desc = up.target_desc;
                            row.delivery_desc = up.target_desc;
                        }
                        delete deliveryPreviewDraft[String(up.id)];
                    });
                    Object.keys(deliveryPreviewDraft).forEach(id => syncDeliveryPreviewDraftEntry(id));
                    renderTable(rowsCache);
                    syncDeliveryPreviewSaveBar();
                    window.showAppSaveResult({
                        action: 'save',
                        isError: errCount > 0,
                        message: `已保存 ${data.updated || 0} 条${errCount ? `，失败 ${errCount} 条` : ''}`,
                        errors: data.errors,
                    });
                })
                .catch(err => {
                    window.showAppSaveResult({ action: 'save', isError: true, message: '请求失败: ' + err });
                });
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            loadList();
        }

        function formatDateTime(value) {
            return value ? new Date(value).toLocaleString('zh-CN') : '';
        }

        function toDatetimeLocal(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '';
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function nowLocalInputValue() {
            return toDatetimeLocal(new Date());
        }

        function recalcNextObserveTime() {
            const updatedAt = document.getElementById('modalUpdatedAt').value;
            if (!updatedAt) return;
            const OI = window.AaObserveInterval;
            if (!OI) return;
            const next = OI.computeNextObserveFromBase(new Date(updatedAt), 'delivery');
            if (!next || Number.isNaN(next.getTime())) return;
            document.getElementById('modalNextObserve').value = toDatetimeLocal(next);
        }

        function getDeliveryObserveMinutes() {
            const OI = window.AaObserveInterval;
            return OI ? OI.intervalToMinutes(OI.getObserveIntervalForKind('delivery')) : 1440;
        }

        function showStatus(message, isError) {
            const el = document.getElementById('modalStatusBar');
            el.style.display = 'block';
            el.style.background = isError ? '#ffecec' : '#f0fff0';
            el.style.color = isError ? '#a33' : '#2f6f2f';
            el.innerText = message;
        }

        function resetStatus() {
            const el = document.getElementById('modalStatusBar');
            el.style.display = 'none';
            el.innerText = '';
        }

        function syncStatusButtons() {
            const value = document.getElementById('modalStatus').value;
            document.querySelectorAll('[data-target="modalStatus"]').forEach(btn => {
                btn.classList.toggle('is-active', btn.getAttribute('data-value') === value);
            });
        }

        function setStatus(value) {
            document.getElementById('modalStatus').value = value;
            syncStatusButtons();
        }

        function adRelationText(item) {
            const levelText = item.ad_level === 'group' ? '广告组' : '广告活动';
            const adName = (item && (item.ad_name || item.name)) ? (item.ad_name || item.name) : '';
            return `${adName}（${levelText}）`;
        }

        function renderAdOptions(selectedValue) {
            const select = document.getElementById('modalAdItem');
            const current = String(selectedValue !== undefined ? selectedValue : (select.value || ''));
            select.innerHTML = '<option value="">请选择广告活动或广告组</option>';
            let hasCurrent = false;
            adOptions.forEach(item => {
                const option = document.createElement('option');
                option.value = item.id;
                option.textContent = adRelationText(item);
                if (current && String(item.id) === current) {
                    option.selected = true;
                    hasCurrent = true;
                }
                select.appendChild(option);
            });
            if (current && !hasCurrent) select.value = '';
            if (window.refreshUniversalSingleSelect) window.refreshUniversalSingleSelect(select);
            if (select.value) lastSelectedAdItemId = String(select.value);
        }

        function loadAdOptions() {
            const req1 = fetch('/api/amazon-ad?level=campaign').then(r => r.json());
            const req2 = fetch('/api/amazon-ad?level=group').then(r => r.json());
            return Promise.all([req1, req2]).then(([c, g]) => {
                const campaigns = c.status === 'success' ? (c.items || []) : [];
                const groups = g.status === 'success' ? (g.items || []) : [];
                adOptions = [...campaigns, ...groups];
                renderAdOptions();
            }).catch(() => {
                adOptions = [];
                renderAdOptions();
            });
        }

        function renderTable(items) {
            const tbody = document.querySelector('#deliveryTable tbody');
            const availableIds = new Set((items || []).map(x => String(x.id)));
            Object.keys(deliveryPreviewDraft).forEach(id => {
                if (!availableIds.has(String(id))) delete deliveryPreviewDraft[id];
            });
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">暂无数据</td></tr>';
                syncDeliveryPreviewSaveBar();
                return;
            }
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td>
                        <div class="status-segment status-segment--inline">
                            <button type="button" class="status-pill status-pill--enabled ${item.status === '启动' ? 'is-active' : ''}" onclick="quickStatus(${item.id}, '启动')">启动</button>
                            <button type="button" class="status-pill status-pill--paused ${item.status === '暂停' ? 'is-active' : ''}" onclick="quickStatus(${item.id}, '暂停')">暂停</button>
                            <button type="button" class="status-pill status-pill--archived ${item.status === '存档' ? 'is-active' : ''}" onclick="quickStatus(${item.id}, '存档')">存档</button>
                        </div>
                    </td>
                    <td>${escapeHtml(adRelationText(item))}</td>
                    <td class="preview-edit-cell">
                        <input type="text" class="inline-input preview-edit-input delivery-preview-input" data-id="${item.id}" data-field="target_desc" value="${escapeAttr(getDeliveryFieldEffectiveValue(item, 'target_desc'))}" placeholder="投放描述">
                    </td>
                    <td class="preview-edit-cell" data-manage-col-key="竞价">
                        <input type="text" class="inline-input preview-edit-input delivery-preview-input" data-id="${item.id}" data-field="bid_value" value="${escapeAttr(getDeliveryFieldEffectiveValue(item, 'bid_value'))}" placeholder="0.3 / 15%">
                    </td>
                    <td>${escapeHtml(formatDateTime(item.updated_at))}</td>
                    <td>${escapeHtml(formatDateTime(item.next_observe_at))}</td>
                    <td>
                        <div class="pm-actions">
                            <button class="btn-secondary" onclick="openEditModal(${item.id})">编辑</button>
                            <button class="btn-danger" onclick="deleteItem(${item.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            bindDeliveryPreviewEvents();
            syncDeliveryPreviewSaveBar();
        }

        function quickStatus(id, status) {
            fetch(DELIVERY_API, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status })
            }).then(r => r.json()).then(data => {
                if (data.status !== 'success') {
                    window.showAppSaveResult({ action: 'update', isError: true, message: data.message || '状态更新失败' });
                    return;
                }
                loadList();
                window.showAppSaveResult({ action: 'update', message: '状态已更新' });
            }).catch(err => window.showAppSaveResult({ action: 'update', isError: true, message: '状态更新失败: ' + err }));
        }

        function loadList() {
            const q = document.getElementById('searchInput').value.trim();
            const url = q ? `${DELIVERY_API}?q=${encodeURIComponent(q)}` : DELIVERY_API;
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.querySelector('#deliveryTable tbody');
                    if (data.status !== 'success') {
                        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#a33;">${data.message || '加载失败'}</td></tr>`;
                        return;
                    }
                    rowsCache = data.items || [];
                    renderTable(rowsCache);
                })
                .catch(err => {
                    const tbody = document.querySelector('#deliveryTable tbody');
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#a33;">加载失败: ${err}</td></tr>`;
                });
        }

        function openCreateModal() {
            editId = null;
            document.getElementById('modal-title').innerText = '新增投放';
            document.getElementById('modalStatus').value = '启动';
            document.getElementById('modalAdItem').value = lastSelectedAdItemId || '';
            document.getElementById('modalDesc').value = '';
            document.getElementById('modalBid').value = '';
            document.getElementById('modalUpdatedAt').value = nowLocalInputValue();
            document.getElementById('modalNextObserve').value = '';
            renderAdOptions(lastSelectedAdItemId || '');
            recalcNextObserveTime();
            syncStatusButtons();
            resetStatus();
            document.getElementById('delivery-modal').classList.add('active');
        }

        function openEditModal(id) {
            const item = rowsCache.find(x => String(x.id) === String(id));
            if (!item) return;
            editId = item.id;
            document.getElementById('modal-title').innerText = '编辑投放';
            document.getElementById('modalStatus').value = item.status || '启动';
            document.getElementById('modalAdItem').value = item.ad_item_id || '';
            lastSelectedAdItemId = item.ad_item_id ? String(item.ad_item_id) : lastSelectedAdItemId;
            document.getElementById('modalDesc').value = item.target_desc || item.delivery_desc || '';
            document.getElementById('modalBid').value = item.bid_value || '';
            document.getElementById('modalUpdatedAt').value = toDatetimeLocal(item.updated_at) || nowLocalInputValue();
            document.getElementById('modalNextObserve').value = toDatetimeLocal(item.next_observe_at);
            renderAdOptions(item.ad_item_id || '');
            syncStatusButtons();
            resetStatus();
            document.getElementById('delivery-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('delivery-modal').classList.remove('active');
            editId = null;
        }

        function saveItem() {
            const payload = {
                status: document.getElementById('modalStatus').value,
                ad_item_id: document.getElementById('modalAdItem').value,
                target_desc: document.getElementById('modalDesc').value.trim(),
                bid_value: document.getElementById('modalBid').value.trim(),
                observe_minutes: getDeliveryObserveMinutes(),
                updated_at: document.getElementById('modalUpdatedAt').value,
                next_observe_at: document.getElementById('modalNextObserve').value
            };
            if (!payload.status || !payload.ad_item_id || !payload.target_desc || !payload.bid_value || !payload.updated_at) {
                showStatus('请完整填写必填项', true);
                return;
            }
            lastSelectedAdItemId = String(payload.ad_item_id);

            const method = editId ? 'PUT' : 'POST';
            const wasEdit = !!editId;
            if (editId) payload.id = editId;
            fetch(DELIVERY_API, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(data => {
                if (data.status !== 'success') {
                    window.showAppSaveResult({ action: 'save', isError: true, message: data.message || '保存失败' });
                    return;
                }
                closeModal();
                loadList();
                window.showAppSaveResult({ action: wasEdit ? 'save' : 'create' });
            }).catch(err => window.showAppSaveResult({ action: 'save', isError: true, message: '请求失败: ' + err }));
        }

        async function deleteItem(id) {
            const ok = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({ title: '删除确认', message: '确认删除该投放记录？', confirmText: '确认删除' })
                : false;
            if (!ok) return;
            fetch(DELIVERY_API, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            }).then(r => r.json()).then(data => {
                if (data.status !== 'success') {
                    window.showAppSaveResult({ action: 'delete', isError: true, message: data.message || '删除失败' });
                    return;
                }
                loadList();
                window.showAppSaveResult({ action: 'delete' });
            }).catch(err => window.showAppSaveResult({ action: 'delete', isError: true, message: '删除失败: ' + err }));
        }

        function downloadDeliveryTemplate() {
            window.location.href = '/api/amazon-ad-delivery-template';
        }

        function triggerDeliveryUpload() {
            const input = document.getElementById('deliveryUploadInput');
            if (!input) return;
            input.value = '';
            input.click();
        }

        function uploadDeliveryTemplate(file) {
            if (!file) return;
            if (!window.uploadBatchImportFile) {
                window.showAppSaveResult({ action: 'import', isError: true, message: '批量上传组件未加载，请刷新页面后重试' });
                return;
            }
            window.uploadBatchImportFile({
                file,
                url: '/api/amazon-ad-delivery-import',
                title: '广告投放批量上传',
                uploadSummary: '正在上传模板文件...',
                processSummary: '正在解析并批量写入广告投放...',
            })
                .then(data => {
                    const handled = window.handleBatchImportResponse
                        ? window.handleBatchImportResponse(data, {
                            title: '广告投放导入',
                            onSuccess: () => loadList(),
                        })
                        : false;
                    if (!handled && data.status === 'success') loadList();
                })
                .catch(err => {
                    window.showAppSaveResult({
                        action: 'import',
                        isError: true,
                        message: '导入失败: ' + (err && err.message ? err.message : err),
                    });
                });
        }

        function init() {
            Promise.all([loadAdOptions(), loadList()]).then(() => syncStatusButtons());
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadList();
        });
        window.setTimeout(function() {
            var el = document.getElementById('delivery-modal');
            if (el && typeof window.bindPmModalBackdropClose === 'function') window.bindPmModalBackdropClose(el, closeModal);
        }, 0);
        document.getElementById('modalAdItem').addEventListener('change', function() {
            lastSelectedAdItemId = this.value ? String(this.value) : lastSelectedAdItemId;
        });
        document.getElementById('modalUpdatedAt').addEventListener('input', recalcNextObserveTime);
        document.getElementById('modalUpdatedAt').addEventListener('change', recalcNextObserveTime);
        document.getElementById('deliveryUploadInput').addEventListener('change', function(e) {
            const file = e.target.files && e.target.files[0];
            if (file) uploadDeliveryTemplate(file);
            e.target.value = '';
        });
        window.addEventListener('load', init);
    </script>
</body>
</html>
