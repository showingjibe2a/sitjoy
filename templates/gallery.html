<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片管理 - 文件浏览器</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="site-header"></div>

    <div class="container container--wide">
        <section class="header header-row">
            <div>
                <h2>📁 文件浏览器</h2>
                <p>点击文件夹进入，点击图片重命名</p>
            </div>
        </section>

        <!-- 面包屑导航 -->
        <div class="breadcrumb-row">
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item" onclick="browse('')">🏠 根目录</span>
            </div>
            <div class="header-actions">
                <div class="upload-bar">
                    <div class="bar-body upload-left">
                        <input type="file" id="uploadInput" accept="image/*" multiple>
                        <button class="btn-accent" onclick="uploadImages()">上传</button>
                    </div>
                    <div id="upload-status" class="upload-status"></div>
                </div>

                <div class="download-bar">
                    <div class="bar-body download-left">
                        <button class="btn-primary" onclick="downloadSelected()">下载选中</button>
                    </div>
                    <div id="download-status" class="upload-status"></div>
                </div>
            </div>
        </div>



        <!-- 文件/文件夹网格 -->
        <div class="browser-grid" id="browser-grid">
            <div class="loading">加载中...</div>
        </div>

        <div class="debug-container" id="debug-container"></div>
    </div>

    <!-- 重命名对话框（统一 pm-modal 风格） -->
    <div class="pm-modal" id="rename-dialog">
        <div class="pm-modal-content pm-modal-content--wide gallery-rename-modal">
            <div class="pm-modal-scroll">
            <h3 style="margin-top: 0;">✏️ 编辑图片信息</h3>

            <div class="gallery-rename-preview">
                <img id="rename-preview-img" src="" alt="预览">
                <button class="btn-secondary gallery-preview-zoom" type="button" onclick="openPreviewZoom()" title="放大查看" style="font-size:12px; padding:0.22rem 0.5rem; min-height:28px;">🔍</button>
                <button class="btn-secondary gallery-preview-zoom" type="button" onclick="triggerReplaceImage()" title="替换图片" style="right: 54px; font-size:12px; padding:0.22rem 0.5rem; min-height:28px;">⟳</button>
            </div>

            <div class="pm-form" style="grid-template-columns: 1fr;">
                <div class="form-group pm-form-full">
                    <div style="display:flex; align-items:center; justify-content:space-between; gap:0.6rem;">
                        <div style="display:flex; align-items:center; gap:0.35rem;">
                            <label style="margin:0;">文件名（无需扩展名）</label>
                            <span class="help-dot" data-tip="开启“推荐名称”时会自动按规则生成：面料（若所有已选规格面料一致）-图片类型-原名。若文件名已符合该语法则不会重复叠加。"></span>
                        </div>
                        <div class="nas-header-control" style="margin-top:-2px;">
                            <span class="nas-header-control-label">推荐名称</span>
                            <div class="status-segment status-segment--inline" id="galleryRecommendNameSegment" data-value="1">
                                <button type="button" class="status-pill status-pill--yes is-active" data-value="1">是</button>
                                <button type="button" class="status-pill status-pill--no" data-value="0">否</button>
                            </div>
                        </div>
                    </div>
                    <input type="text" id="new-name" placeholder="输入新文件名">
                </div>
                <div class="form-group pm-form-full">
                    <label style="display:flex; align-items:center; gap:0.4rem;">
                        <span>图片类型 <span class="required-asterisk">*</span></span>
                        <span class="help-dot" data-tip="未选择图片类型将无法提交“一键应用”。若该图片已在数据库关联过，将自动预选其类型。"></span>
                    </label>
                    <div class="status-segment status-segment--inline" id="galleryImageTypeSegment" data-value="">
                        <button type="button" class="status-pill status-pill--no is-active" data-value="" title="必须选择一个图片类型">未选择</button>
                    </div>
                </div>
            </div>

            <div id="rename-status" class="status-message" style="display: none; margin-top: 0.65rem;"></div>

            <div class="pm-section" style="margin-top: 1rem;">
                <h4 class="pm-section-title">批量应用到规格</h4>
                <div class="pm-section-body pm-form" style="grid-template-columns: 1fr;">
                    <div class="form-group pm-form-full" style="margin:0;">
                        <label>已选规格</label>
                        <div id="galleryApplySelectedTableWrap" style="margin-top:0.45rem;">
                            <table class="pm-table" style="margin:0;">
                                <thead>
                                    <tr>
                                        <th style="width:180px;">货号</th>
                                        <th style="width:180px;">规格</th>
                                        <th>面料</th>
                                        <th style="width:90px; text-align:right;">
                                            <button class="btn-secondary" type="button" onclick="clearGalleryVariantSelection()" style="padding:0.28rem 0.55rem; font-size:0.82rem; min-height:28px;">清空</button>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody id="galleryApplySelectedTbody">
                                    <tr><td colspan="4" class="helper-text" style="text-align:center;">未选择</td></tr>
                                </tbody>
                            </table>
                            <div class="pm-actions" style="justify-content:flex-end; margin-top:0.45rem;">
                                <button class="btn-add" type="button" onclick="openGalleryVariantPicker()">选择规格</button>
                            </div>
                        </div>
                    </div>
                    <div class="form-group pm-form-full" style="margin:0;">
                        <label>复制/移动</label>
                        <div class="pm-actions" style="justify-content:flex-start; gap:1rem;">
                            <label style="display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;">
                                <input type="radio" name="galleryApplyAction" value="copy">
                                <span>复制（源文件保留）</span>
                            </label>
                            <label style="display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;">
                                <input type="radio" name="galleryApplyAction" value="move" checked>
                                <span>移动（源文件不在目标目录时将消失）</span>
                            </label>
                            <label style="display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;">
                                <input type="checkbox" id="galleryApplyPromptDuplicate" checked>
                                <span>提示已存在关联</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group pm-form-full" style="margin:0;">
                        <!-- 已融合到“关联规格并提交修改”按钮中 -->
                    </div>
                </div>
            </div>
            </div>

            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeRenameDialog()">取消</button>
                <button class="btn-primary" type="button" onclick="confirmRename()">关联规格并提交修改</button>
            </div>
        </div>
    </div>

    <div class="app-toast-stack" id="galleryToastStack"></div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        let currentPath = '';
        let currentRenameImage = null;
        let lastFolders = [];
        let lastImages = [];
        const DEBUG_MODE = true;
        const selectedItems = new Map();
        let galleryVariantOptions = [];
        let gallerySelectedVariantIds = new Set();
        let gallerySalesImageTypeOptions = [];
        const GALLERY_LAST_PATH_KEY = 'sitjoy_gallery_last_path_v1';
        let galleryRecommendNameTouched = false;

        function saveGalleryLastPath(path) {
            try {
                const normalized = String(path || '').trim();
                localStorage.setItem(GALLERY_LAST_PATH_KEY, normalized);
            } catch (_) {}
        }

        function loadGalleryLastPath() {
            try {
                return String(localStorage.getItem(GALLERY_LAST_PATH_KEY) || '').trim();
            } catch (_) {
                return '';
            }
        }

        function decodeB64Utf8(b64) {
            if (!b64) return '';
            try {
                const binary = atob(b64);
                if (typeof TextDecoder !== 'undefined') {
                    const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
                    return new TextDecoder('utf-8').decode(bytes);
                }
                return decodeURIComponent(escape(binary));
            } catch (e) {
                try {
                    return decodeURIComponent(escape(atob(b64)));
                } catch (err) {
                    console.warn('Base64 decode failed:', b64, e);
                    return '';
                }
            }
        }

        // 页面加载时浏览根目录
        window.addEventListener('load', function() {
            const last = loadGalleryLastPath();
            browse(last || '');
        });

        // 浏览目录
        function browse(path) {
            currentPath = path;
            saveGalleryLastPath(currentPath);
            const grid = document.getElementById('browser-grid');
            grid.innerHTML = '<div class="loading">加载中...</div>';

            const debugParam = DEBUG_MODE ? '&debug=1' : '';
            const url = path ? `/api/browse?path=${encodeURIComponent(path)}${debugParam}` : `/api/browse?debug=1`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        updateBreadcrumb(data.breadcrumbs);
                        lastFolders = data.folders || [];
                        lastImages = data.images || [];
                        displayItems(lastFolders, lastImages);
                        if (DEBUG_MODE && data.debug_items) {
                            renderDebug(data.debug_items, data.total_folders || 0, data.total_images || 0);
                        } else {
                            renderDebug([], data.total_folders || 0, data.total_images || 0);
                        }
                    } else {
                        grid.innerHTML = '<p style="color: red; text-align: center;">加载失败: ' + data.message + '</p>';
                        renderDebug([], 0, 0);
                        // 若上次路径已失效/无权限，自动回退到根目录，避免“永远进不去”
                        if (path) {
                            saveGalleryLastPath('');
                            setTimeout(() => browse(''), 120);
                        }
                    }
                })
                .catch(error => {
                    console.error('错误:', error);
                    grid.innerHTML = '<p style="color: red; text-align: center;">加载错误: ' + error + '</p>';
                    renderDebug([], 0, 0);
                    if (path) {
                        saveGalleryLastPath('');
                        setTimeout(() => browse(''), 120);
                    }
                });
        }

        function uploadImages() {
            const input = document.getElementById('uploadInput');
            const status = document.getElementById('upload-status');
            if (!input.files || input.files.length === 0) {
                showStatus(status, '请选择图片', 'error');
                return;
            }

            const formData = new FormData();
            Array.from(input.files).forEach(file => formData.append('file', file));
            if (currentPath) {
                formData.append('path', currentPath);
            }

            showStatus(status, '上传中...', 'info');

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(async r => {
                const contentType = r.headers.get('content-type') || '';
                if (contentType.includes('application/json')) {
                    return r.json();
                }
                const text = await r.text();
                throw new Error(text || `HTTP ${r.status}`);
            })
            .then(data => {
                if (data.status === 'success') {
                    showStatus(status, `上传完成：${data.count} 张`, 'success');
                    input.value = '';
                    browse(currentPath);
                } else {
                    showStatus(status, '上传失败: ' + (data.message || '未知错误'), 'error');
                }
            })
            .catch(err => {
                showStatus(status, '上传失败: ' + err.message, 'error');
            });
        }

        function renderDebug(items, totalFolders = 0, totalImages = 0) {
            const container = document.getElementById('debug-container');
            const existing = document.getElementById('debug-info');
            if (existing) {
                existing.remove();
            }

            const wrapper = document.createElement('div');
            wrapper.id = 'debug-info';
            wrapper.style.padding = '0.75rem 1rem';
            wrapper.style.background = 'rgba(236, 231, 223, 0.08)';
            wrapper.style.borderRadius = '8px';
            wrapper.style.color = '#cfc7bd';
            wrapper.style.fontSize = '0.85rem';

            const statsLine = `统计：文件夹 ${totalFolders} 个，图片 ${totalImages} 张`;
            const lines = (items || []).slice(0, 50).map(item => {
                const name = item.name || '';
                const reason = item.skipped || 'unknown';
                return `${name}  [${reason}]`;
            });

            wrapper.innerHTML = `
                <div style="font-weight:600; margin-bottom:0.35rem;">${statsLine}</div>
                ${lines.length ? `<div style="margin-top:0.35rem; font-weight:600;">调试：被跳过的条目（最多50条）</div>
                <div style="white-space:pre-wrap; word-break:break-all;">${lines.join('\n')}</div>` : ''}
            `;

            container.appendChild(wrapper);
        }

        // 更新面包屑导航
        function updateBreadcrumb(breadcrumbs) {
            const breadcrumbEl = document.getElementById('breadcrumb');
            let html = '<span class="breadcrumb-item" onclick="browse(\'\')">🏠 根目录</span>';

            breadcrumbs.forEach(crumb => {
                const name = decodeB64Utf8(crumb.name);
                const path = crumb.path;
                html += '<span class="breadcrumb-separator">›</span>';
                html += `<span class="breadcrumb-item" onclick="browse('${path}')">${name}</span>`;
            });

            breadcrumbEl.innerHTML = html;
        }

        function setDownloadStatus(message, type) {
            const status = document.getElementById('download-status');
            showStatus(status, message || '', type || '');
        }

        function showStatus(el, message, type) {
            if (!el) return;
            if (!message) {
                el.textContent = '';
                el.className = 'upload-status';
                el.classList.remove('show');
                return;
            }
            el.textContent = message;
            el.className = 'upload-status ' + (type || '');
            el.classList.add('show');
            clearTimeout(el._hideTimer);
            el._hideTimer = setTimeout(() => {
                el.classList.remove('show');
            }, 2600);
        }

        function toggleSelection(path, type, checked) {
            if (checked) {
                selectedItems.set(path, type);
            } else {
                selectedItems.delete(path);
            }
        }

        async function downloadSelected() {
            if (selectedItems.size === 0) {
                setDownloadStatus('请先勾选要下载的内容', 'error');
                return;
            }

            setDownloadStatus('下载中...', 'info');
            const payload = [];
            selectedItems.forEach((type, path) => {
                payload.push({ type, path });
            });

            fetch('/api/download-zip', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: payload })
            })
            .then(async response => {
                const contentType = response.headers.get('content-type') || '';
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(text || `HTTP ${response.status}`);
                }
                if (!contentType.includes('application/zip')) {
                    const text = await response.text();
                    try {
                        const data = JSON.parse(text);
                        throw new Error(data.message || '下载失败');
                    } catch (e) {
                        throw new Error(text || '下载失败');
                    }
                }
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0];
                link.href = url;
                link.download = `sitjoy_download_${timestamp}.zip`;
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
                setDownloadStatus('下载已开始', 'success');
            })
            .catch(err => {
                setDownloadStatus('下载失败: ' + err.message, 'error');
            });
        }

        // 显示项目（文件夹和图片）
        function displayItems(folders, images) {
            const grid = document.getElementById('browser-grid');

            if (folders.length === 0 && images.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: white;">此文件夹为空</p>';
                return;
            }

            grid.innerHTML = '';

            // 显示文件夹
            folders.forEach(folder => {
                const name = decodeB64Utf8(folder.name);
                const card = document.createElement('div');
                const isSelected = selectedItems.has(folder.path);
                card.className = 'item-card item-card--compact' + (isSelected ? ' item-card--selected' : '');
                card.onclick = () => browse(folder.path);

                card.innerHTML = `
                    <div class="item-select" onclick="event.stopPropagation();">
                        <input type="checkbox" data-path="${folder.path}" data-type="folder" ${isSelected ? 'checked' : ''}>
                    </div>
                    <div class="item-thumbnail folder">
                        <div class="folder-icon">📁</div>
                    </div>
                    <div class="item-info">
                        <div class="item-name">${name}</div>
                        <div class="item-type">文件夹</div>
                    </div>
                `;

                const checkbox = card.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('click', (e) => e.stopPropagation());
                checkbox.addEventListener('change', (e) => {
                    toggleSelection(folder.path, 'folder', e.target.checked);
                    card.classList.toggle('item-card--selected', e.target.checked);
                });

                grid.appendChild(card);
            });

            // 显示图片（带缩略图）
            images.forEach(image => {
                const name = decodeB64Utf8(image.name);
                const card = document.createElement('div');
                const isSelected = selectedItems.has(image.path);
                card.className = 'item-card item-card--compact' + (isSelected ? ' item-card--selected' : '');
                // 交互约定：单击仅选中（用于下载/批量操作），双击进入编辑弹窗
                card.onclick = () => {
                    const nextChecked = !selectedItems.has(image.path);
                    toggleSelection(image.path, 'image', nextChecked);
                    card.classList.toggle('item-card--selected', nextChecked);
                    const checkbox = card.querySelector('input[type="checkbox"][data-path]');
                    if(checkbox) checkbox.checked = nextChecked;
                };
                card.ondblclick = (e) => {
                    if(e && typeof e.preventDefault === 'function') e.preventDefault();
                    // 双击时确保处于选中态
                    if(!selectedItems.has(image.path)){
                        toggleSelection(image.path, 'image', true);
                        card.classList.add('item-card--selected');
                        const checkbox = card.querySelector('input[type="checkbox"][data-path]');
                        if(checkbox) checkbox.checked = true;
                    }
                    openRenameDialog(image.path, name);
                };

                const thumbnailUrl = `/api/image-preview?id=${encodeURIComponent(image.path)}`;

                card.innerHTML = `
                    <div class="item-select" onclick="event.stopPropagation();">
                        <input type="checkbox" data-path="${image.path}" data-type="image" ${isSelected ? 'checked' : ''}>
                    </div>
                    <div class="item-thumbnail">
                        <img src="${thumbnailUrl}" alt="${name}" loading="lazy">
                    </div>
                    <div class="item-info">
                        <div class="item-name">${name}</div>
                        <div class="item-type">图片</div>
                    </div>
                `;

                const checkbox = card.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('click', (e) => e.stopPropagation());
                checkbox.addEventListener('change', (e) => {
                    toggleSelection(image.path, 'image', e.target.checked);
                    card.classList.toggle('item-card--selected', e.target.checked);
                });

                grid.appendChild(card);
            });
        }

        // 打开重命名对话框
        function openRenameDialog(imagePath, imageName) {
            currentRenameImage = {
                path: imagePath,
                name: imageName
            };

            const currentNameInput = document.getElementById('current-name');
            if (currentNameInput) {
                currentNameInput.value = imageName;
            }
            
            // 提取文件名（无扩展名）
            const nameWithoutExt = imageName.substring(0, imageName.lastIndexOf('.')) || imageName;
            const input = document.getElementById('new-name');
            if (input) {
                input.value = nameWithoutExt;
                galleryRecommendNameTouched = false;
            }

            // 加载预览图
            const previewImg = document.getElementById('rename-preview-img');
            previewImg.src = `/api/image-preview?id=${encodeURIComponent(imagePath)}`;

        // 显示对话框
        document.getElementById('rename-dialog').classList.add('active');
            document.getElementById('new-name').focus();
            document.getElementById('rename-status').style.display = 'none';
        }

        function closeRenameDialog() {
            const dialog = document.getElementById('rename-dialog');
            if (dialog) dialog.classList.remove('active');
            const statusDiv = document.getElementById('rename-status');
            if (statusDiv) {
                statusDiv.style.display = 'none';
                statusDiv.textContent = '';
            }
            currentRenameImage = null;
            galleryRecommendNameTouched = false;
        }

        function utf8ToB64(text) {
            try {
                if (typeof TextEncoder !== 'undefined') {
                    const bytes = new TextEncoder().encode(text);
                    let binary = '';
                    bytes.forEach(b => binary += String.fromCharCode(b));
                    return btoa(binary);
                }
                return btoa(unescape(encodeURIComponent(text)));
            } catch (e) {
                return '';
            }
        }

        function openPreviewZoom() {
            if (!currentRenameImage) return;
            window.open(`/api/image-preview?id=${encodeURIComponent(currentRenameImage.path)}`, '_blank');
        }

        function ensureReplaceInput() {
            let input = document.getElementById('replace-image-input');
            if (input) return input;
            input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.id = 'replace-image-input';
            input.style.display = 'none';
            input.addEventListener('change', function() {
                const file = this.files && this.files[0] ? this.files[0] : null;
                if (!file) return;
                replaceCurrentImageFile(file);
            });
            document.body.appendChild(input);
            return input;
        }

        function triggerReplaceImage() {
            if (!currentRenameImage) return;
            const input = ensureReplaceInput();
            input.value = '';
            input.click();
        }

        function replaceCurrentImageFile(file) {
            if (!currentRenameImage || !file) return;
            const statusDiv = document.getElementById('rename-status');
            statusDiv.textContent = '替换中...';
            statusDiv.className = 'status-message info';
            statusDiv.style.display = 'block';

            const fd = new FormData();
            fd.append('id', currentRenameImage.path);
            fd.append('file', file);

            fetch('/api/replace', { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        statusDiv.textContent = '✓ 替换成功！';
                        statusDiv.className = 'status-message success';
                        // refresh preview & current folder list
                        const previewImg = document.getElementById('rename-preview-img');
                        if (previewImg) {
                            const bust = Date.now();
                            previewImg.src = `/api/image-preview?id=${encodeURIComponent(currentRenameImage.path)}&bust=${bust}`;
                        }
                        browse(currentPath);
                    } else {
                        statusDiv.textContent = '✗ 替换失败: ' + (data.message || '未知错误');
                        statusDiv.className = 'status-message error';
                    }
                })
                .catch(err => {
                    statusDiv.textContent = '✗ 替换失败: ' + err;
                    statusDiv.className = 'status-message error';
                });
        }

        function showToast(message, variant) {
            const stack = document.getElementById('galleryToastStack');
            if (!stack) return;
            const toast = document.createElement('div');
            toast.className = `app-toast ${variant || 'success'}`;
            toast.innerHTML = `
                <div class="app-toast-message"></div>

        // 关联规格 + 重命名（如有）
        async function confirmRename() {
            if (!currentRenameImage) return;

            let newName = document.getElementById('new-name').value.trim();
            const statusDiv = document.getElementById('rename-status');

            const oldNameWithoutExt = currentRenameImage.name.substring(0, currentRenameImage.name.lastIndexOf('.')) || currentRenameImage.name;
            if (!newName) newName = oldNameWithoutExt;
            const renameNeeded = newName !== oldNameWithoutExt;

            const vids = Array.from(gallerySelectedVariantIds || []).map(v => Number(v)).filter(v => v > 0);
            const typeName = getSelectedGalleryImageTypeName();
            const actionEl = document.querySelector('input[name=\"galleryApplyAction\"]:checked');
            const action = actionEl ? String(actionEl.value || 'move') : 'move';
            const promptDup = !!(document.getElementById('galleryApplyPromptDuplicate') && document.getElementById('galleryApplyPromptDuplicate').checked);

            if (!renameNeeded && !vids.length) {
                statusDiv.textContent = '未做任何修改';
                statusDiv.className = 'status-message error';
                statusDiv.style.display = 'block';
                return;
            }

            statusDiv.textContent = '处理中...';
            statusDiv.className = 'status-message info';
            statusDiv.style.display = 'block';
            if (window.showAppUploadProgress) {
                window.showAppUploadProgress({ title: '正在提交...', summary: '关联规格/重命名/移动文件', percent: 25 });
            }

            try {
                // 1) 如需关联规格：先校验类型
                if (vids.length && !typeName) {
                    showToast('请选择图片类型后再提交', 'error');
                    statusDiv.textContent = '请选择图片类型后再提交';
                    statusDiv.className = 'status-message error';
                    statusDiv.style.display = 'block';
                    return;
                }

                // 2) 如需重命名：先重命名并更新 currentRenameImage.path
                if (renameNeeded) {
                    const newNameB64 = utf8ToB64(newName);
                    const resp = await fetch('/api/rename', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: currentRenameImage.path, new_name_b64: newNameB64 })
                    });
                    const data = await resp.json();
                    if (!data || data.status !== 'success') {
                        throw new Error((data && data.message) ? data.message : '重命名失败');
                    }
                    // 计算新的 path_b64（替换 basename）
                    const oldRel = decodeB64Utf8(currentRenameImage.path);
                    const folder = oldRel.includes('/') ? oldRel.slice(0, oldRel.lastIndexOf('/')) : '';
                    const ext = (currentRenameImage.name.includes('.') ? currentRenameImage.name.slice(currentRenameImage.name.lastIndexOf('.')) : '');
                    const newFilename = String(newName || '').trim() + (ext || '');
                    const newRel = folder ? `${folder}/${newFilename}` : newFilename;
                    currentRenameImage.path = utf8ToB64(newRel);
                    currentRenameImage.name = newFilename;
                }

                // 3) 如需关联规格：调用 apply 接口
                if (vids.length) {
                    if (window.showAppUploadProgress) {
                        window.showAppUploadProgress({ title: '正在提交...', summary: '写入数据库并处理文件移动/复制', percent: 55 });
                    }
                    const payload = {
                        image_path_b64: currentRenameImage.path,
                        variant_ids: vids,
                        action,
                        image_type_name: typeName,
                        prompt_duplicate: promptDup ? 1 : 0
                    };
                    const resp2 = await fetch('/api/gallery-apply-image', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data2 = await resp2.json();
                    if (!data2 || data2.status !== 'success') {
                        throw new Error((data2 && data2.message) ? data2.message : '关联失败');
                    }
                    const dupCount = Number(data2.already_linked || 0);
                    const rehomeKind = String((data2 && data2.rehome_kind) || '').trim();
                    const needsWarn = (dupCount > 0 && promptDup) || !!rehomeKind || !!data2.recycled_duplicate;
                    if (needsWarn) showToast(data2.message || '已完成', 'error');
                    if (action === 'move' && !data2.file_op_done) {
                        showToast('提示：本次未发生文件移动（源图片已在目标目录或因复用记录未移动）', 'error');
                    }
                }

                statusDiv.textContent = '✓ 已提交';
                statusDiv.className = 'status-message success';
                statusDiv.style.display = 'block';
                setTimeout(() => {
                    closeRenameDialog();
                    browse(currentPath);
                }, 450);
            } catch (e) {
                statusDiv.textContent = '✗ ' + (e && e.message ? e.message : '提交失败');
                statusDiv.className = 'status-message error';
                statusDiv.style.display = 'block';
                showToast(statusDiv.textContent, 'error');
            } finally {
                if (window.hideAppUploadProgress) window.hideAppUploadProgress();
            }
        }

        function getGalleryCommonFabricName() {
            const vids = Array.from(gallerySelectedVariantIds || []).map(v => Number(v)).filter(v => v > 0);

            const map = new Map((galleryVariantOptions || []).map(it => [Number(it.variant_id || 0), it]));

        function getGalleryBaseNameWithoutExt(fullName) {
            const n = String(fullName || '').trim();
            if (!n) return '';
            const idx = n.lastIndexOf('.');
            return idx > 0 ? n.slice(0, idx) : n;
        }

        function computeGalleryRecommendedBaseName() {
            if (!currentRenameImage) return '';
            const fabric = getGalleryCommonFabricName();
            const typeName = getSelectedGalleryImageTypeName();
            const base = getGalleryBaseNameWithoutExt(currentRenameImage.name);
            const wantType = String(typeName || '').trim();
            const wantFabric = String(fabric || '').trim();
            if (!wantType) return '';

            const alreadyOk = (() => {
                if (wantFabric) {
                    const prefix = `${wantFabric}-${wantType}-`;
                    return base.startsWith(prefix) && base.length > prefix.length;
                }
                const prefix = `${wantType}-`;
                return base.startsWith(prefix) && base.length > prefix.length;
            })();
            if (alreadyOk) return base;

            const parts = [];
            if (wantFabric) parts.push(wantFabric);
            parts.push(wantType);
            parts.push(base || '');
            return parts.filter(Boolean).join('-');
        }

            if (!currentRenameImage) return;

            if (!input) return;

                return;
            }
            const rec = computeGalleryRecommendedBaseName();
            if (!rec) {
                return;
            }
            if (force || !galleryRecommendNameTouched) {
                input.value = rec;
            }
        }

                    prompt_duplicate: promptDup ? 1 : 0
                };
                const resp = await fetch('/api/gallery-apply-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                if (window.showAppUploadProgress) {
                    window.showAppUploadProgress({ title: '正在应用图片...', summary: '处理中...', percent: 85 });
                }
                if (!data || data.status !== 'success') {
                    showToast((data && data.message) ? data.message : '操作失败', 'error');
                    return;
                }
                const dupCount = Number(data.already_linked || 0);
                const rehomeKind = String((data && data.rehome_kind) || '').trim();
                const needsWarn = (dupCount > 0 && promptDup) || !!rehomeKind;
                if (needsWarn) {
                    showToast(data.message || '已完成', 'error');
                } else {
                    // 无重复/无归一化，不打扰用户；仅在移动模式下提示并关闭窗口
                }
                if (action === 'move') {
                    if (!data.file_op_done) {
                        showToast('提示：本次未发生文件移动（源图片已在目标目录或因复用记录未移动）', 'error');
                    }
                    if (data.recycled_duplicate) {
                        showToast('已将重复图片移入回收站（原因：重复）', 'error');
                    }
                    closeRenameDialog();
                    browse(currentPath);
                }
            } catch (e) {
                showToast('操作失败: ' + e.message, 'error');
            }
            finally {
                if (window.hideAppUploadProgress) window.hideAppUploadProgress();
            }
        }

        // 打开编辑弹窗时：刷新图片类型，并按 DB 预填（若未关联过则保持空）
        const _origOpenRenameDialog = window.openRenameDialog;
        window.openRenameDialog = function(imagePath, imageName) {
            try { _origOpenRenameDialog(imagePath, imageName); } catch (e) {}
            refreshGalleryImageTypeSelect()
                .then(() => tryPrefillVariantLinksFromDb())
                .then(() => tryPrefillImageTypeFromDb())
                .then(() => applyGalleryRecommendedNameIfNeeded(true))
                .catch(() => {});
        };
    </script>
</body>
    <script src="/static/js/header.js"></script>
</html>
