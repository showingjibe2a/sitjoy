<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片管理 - 文件浏览器</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="site-header"></div>

    <div class="container container--wide">
        <section class="header header-row">
            <div>
                <h2>文件浏览器</h2>
                <p>点击文件夹进入，点击图片重命名</p>
            </div>
        </section>

        <!-- 面包屑导航 -->
        <div class="breadcrumb-row">
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item" onclick="browse('')">🏠 根目录</span>
            </div>
            <div class="header-actions">
                <div class="upload-bar">
                    <div class="bar-body upload-left">
                        <input type="file" id="uploadInput" accept="image/*" multiple>
                        <button class="btn-accent" onclick="uploadImages()">上传</button>
                    </div>
                    <div id="upload-status" class="upload-status"></div>
                </div>
            </div>
        </div>



        <!-- 文件/文件夹网格 -->
        <div class="browser-grid" id="browser-grid">
            <div class="loading">加载中...</div>
        </div>

        <div class="debug-container" id="debug-container"></div>
    </div>

    <!-- 共享弹窗：由 /static/js/pm_image_edit_modal.js 注入 -->

    <div class="app-toast-stack" id="galleryToastStack"></div>

    <div class="pm-batch-float-bar" id="galleryBatchBar" aria-live="polite">
        <span class="pm-batch-float-count" id="galleryBatchCountText">已勾选 0 项</span>
        <button type="button" class="btn-primary" onclick="downloadSelected()">下载选中</button>
        <button type="button" class="btn-danger" onclick="galleryBatchDelete()">批量删除</button>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        // gallery 页面最小版：浏览/上传/勾选/下载/批量删除 + 双击打开共享编辑弹窗（含 sha256 重复提示）。

        let currentPath = '';
        const selectedItems = new Map();
        const GALLERY_LAST_PATH_KEY = 'sitjoy_gallery_last_path_v1';

        function saveGalleryLastPath(path) { try { localStorage.setItem(GALLERY_LAST_PATH_KEY, String(path || '').trim()); } catch (_) {} }
        function loadGalleryLastPath() { try { return String(localStorage.getItem(GALLERY_LAST_PATH_KEY) || '').trim(); } catch (_) { return ''; } }

        function decodeB64Utf8(b64) {
            if (!b64) return '';
            try {
                const binary = atob(b64);
                if (typeof TextDecoder !== 'undefined') {
                    const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
                    return new TextDecoder('utf-8').decode(bytes);
                }
                return decodeURIComponent(escape(binary));
            } catch (_) { return ''; }
        }

        function utf8ToB64(text) {
            try {
                if (typeof TextEncoder !== 'undefined') {
                    const bytes = new TextEncoder().encode(text);
                    let binary = '';
                    bytes.forEach(b => binary += String.fromCharCode(b));
                    return btoa(binary);
                }
                return btoa(unescape(encodeURIComponent(text)));
            } catch (_) { return ''; }
        }

        function showStatus(el, message, type) {
            if (!el) return;
            if (!message) {
                el.textContent = '';
                el.className = 'upload-status';
                el.classList.remove('show');
                return;
            }
            el.textContent = String(message || '');
            el.className = 'upload-status ' + (type || '');
            el.classList.add('show');
            clearTimeout(el._hideTimer);
            el._hideTimer = setTimeout(() => el.classList.remove('show'), 2600);
        }

        function updateBreadcrumb(breadcrumbs) {
            const breadcrumbEl = document.getElementById('breadcrumb');
            let html = '<span class="breadcrumb-item" onclick="browse(\'\')">🏠 根目录</span>';
            (breadcrumbs || []).forEach(crumb => {
                const name = decodeB64Utf8(crumb.name);
                const path = crumb.path;
                html += '<span class="breadcrumb-separator">›</span>';
                html += `<span class="breadcrumb-item" onclick="browse('${path}')">${name}</span>`;
            });
            breadcrumbEl.innerHTML = html;
        }

        window.addEventListener('load', function() {
            browse(loadGalleryLastPath() || '');
            syncGalleryBatchBar();
        });

        function browse(path) {
            currentPath = String(path || '');
            saveGalleryLastPath(currentPath);
            const grid = document.getElementById('browser-grid');
            grid.innerHTML = '<div class="loading">加载中...</div>';
            const url = currentPath ? `/api/browse?path=${encodeURIComponent(currentPath)}` : `/api/browse`;
            fetch(url).then(r => r.json()).then(data => {
                if (!data || data.status !== 'success') throw new Error((data && data.message) ? data.message : '加载失败');
                updateBreadcrumb(data.breadcrumbs || []);
                displayItems(data.folders || [], data.images || []);
            }).catch(err => {
                grid.innerHTML = '<p style="color: red; text-align: center;">加载失败: ' + (err && err.message ? err.message : err) + '</p>';
                if (currentPath) {
                    saveGalleryLastPath('');
                    setTimeout(() => browse(''), 120);
                }
            });
        }

        function uploadImages() {
            const input = document.getElementById('uploadInput');
            const status = document.getElementById('upload-status');
            if (!input.files || input.files.length === 0) return showStatus(status, '请选择图片', 'error');
            const formData = new FormData();
            Array.from(input.files).forEach(file => formData.append('file', file));
            if (currentPath) formData.append('path', currentPath);
            showStatus(status, '上传中...', 'info');
            fetch('/api/upload', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (!data || data.status !== 'success') throw new Error((data && data.message) ? data.message : '上传失败');
                    showStatus(status, `上传完成：${Number(data.count || 0)} 张`, 'success');
                    input.value = '';
                    browse(currentPath);
                })
                .catch(err => showStatus(status, '上传失败: ' + (err && err.message ? err.message : err), 'error'));
        }

        function toggleSelection(path, type, checked) {
            if (checked) selectedItems.set(path, type);
            else selectedItems.delete(path);
            syncGalleryBatchBar();
        }

        function syncGalleryBatchBar() {
            const bar = document.getElementById('galleryBatchBar');
            const text = document.getElementById('galleryBatchCountText');
            if (!bar || !text) return;
            const n = selectedItems.size || 0;
            text.textContent = `已勾选 ${n} 项`;
            bar.classList.toggle('active', n > 0);
        }

        async function downloadSelected() {
            if (selectedItems.size === 0) {
                if (window.showAppToast) window.showAppToast('请先勾选要下载的内容', true, 4200);
                return;
            }
            const payload = [];
            selectedItems.forEach((type, path) => payload.push({ type, path }));
            try {
                const response = await fetch('/api/download-zip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: payload })
                });
                const contentType = response.headers.get('content-type') || '';
                if (!response.ok) throw new Error(await response.text() || `HTTP ${response.status}`);
                if (!contentType.includes('application/zip')) throw new Error('下载失败：返回不是 zip');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0];
                link.href = url;
                link.download = `sitjoy_download_${timestamp}.zip`;
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
            } catch (e) {
                window.showAppToast && window.showAppToast('下载失败：' + (e && e.message ? e.message : e), true, 10000);
            }
        }

        async function galleryBatchDelete() {
            if (selectedItems.size === 0) return window.showAppToast && window.showAppToast('请先勾选要删除的内容', true, 4200);
            const count = selectedItems.size;
            const firstOk = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({
                    title: '批量删除（第 1 步 / 2 步）',
                    description: `将把所选 ${count} 项移入“同目录/回收站”。确认继续？`,
                    confirmText: '继续',
                    cancelText: '取消',
                    danger: true
                })
                : window.confirm(`将把所选 ${count} 项移入“同目录/回收站”。确认继续？`);
            if (!firstOk) return;

            const secondOk = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({
                    title: '批量删除（第 2 步 / 2 步）',
                    description: '这是二次确认。确认执行批量删除？',
                    confirmText: '确认删除',
                    cancelText: '取消',
                    danger: true
                })
                : window.confirm('这是二次确认。确认执行批量删除？');
            if (!secondOk) return;

            const payload = [];
            selectedItems.forEach((type, path) => payload.push({ type, path }));
            try {
                window.showAppUploadProgress && window.showAppUploadProgress({ title: '批量删除', message: '移动到同目录回收站中…' });
                const resp = await fetch('/api/gallery-batch-delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: payload })
                });
                const data = await resp.json().catch(() => ({}));
                if (!resp.ok || !data || data.status !== 'success') throw new Error((data && data.message) ? data.message : `HTTP ${resp.status}`);
                selectedItems.clear();
                syncGalleryBatchBar();
                window.showAppToast && window.showAppToast(data.message || '批量删除完成', false, 10000);
                browse(currentPath || '');
            } catch (e) {
                window.showAppToast && window.showAppToast('批量删除失败：' + (e && e.message ? e.message : e), true, 10000);
            } finally {
                window.hideAppUploadProgress && window.hideAppUploadProgress();
            }
        }

        function displayItems(folders, images) {
            const grid = document.getElementById('browser-grid');
            if ((folders || []).length === 0 && (images || []).length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: white;">此文件夹为空</p>';
                return;
            }
            grid.innerHTML = '';

            (folders || []).forEach(folder => {
                const name = decodeB64Utf8(folder.name);
                const card = document.createElement('div');
                const isSelected = selectedItems.has(folder.path);
                card.className = 'item-card item-card--compact' + (isSelected ? ' item-card--selected' : '');
                card.onclick = () => browse(folder.path);
                card.innerHTML = `
                    <div class="item-select" onclick="event.stopPropagation();">
                        <input type="checkbox" data-path="${folder.path}" data-type="folder" ${isSelected ? 'checked' : ''}>
                    </div>
                    <div class="item-thumbnail folder"><div class="folder-icon">📁</div></div>
                    <div class="item-info"><div class="item-name">${name}</div><div class="item-type">文件夹</div></div>
                `;
                const checkbox = card.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('click', (e) => e.stopPropagation());
                checkbox.addEventListener('change', (e) => {
                    toggleSelection(folder.path, 'folder', e.target.checked);
                    card.classList.toggle('item-card--selected', e.target.checked);
                });
                grid.appendChild(card);
            });

            (images || []).forEach(image => {
                const name = decodeB64Utf8(image.name);
                const card = document.createElement('div');
                const isSelected = selectedItems.has(image.path);
                card.className = 'item-card item-card--compact' + (isSelected ? ' item-card--selected' : '');
                card.onclick = () => {
                    const nextChecked = !selectedItems.has(image.path);
                    toggleSelection(image.path, 'image', nextChecked);
                    card.classList.toggle('item-card--selected', nextChecked);
                    const checkbox = card.querySelector('input[type="checkbox"][data-path]');
                    if (checkbox) checkbox.checked = nextChecked;
                };
                card.ondblclick = (e) => {
                    e && e.preventDefault && e.preventDefault();
                    if (!selectedItems.has(image.path)) {
                        toggleSelection(image.path, 'image', true);
                        card.classList.add('item-card--selected');
                        const checkbox = card.querySelector('input[type="checkbox"][data-path]');
                        if (checkbox) checkbox.checked = true;
                    }
                    openRenameDialog(image.path, name);
                };
                const thumbnailUrl = `/api/image-preview?id=${encodeURIComponent(image.path)}`;
                card.innerHTML = `
                    <div class="item-select" onclick="event.stopPropagation();">
                        <input type="checkbox" data-path="${image.path}" data-type="image" ${isSelected ? 'checked' : ''}>
                    </div>
                    <div class="item-thumbnail"><img src="${thumbnailUrl}" alt="${name}" loading="lazy"></div>
                    <div class="item-info"><div class="item-name">${name}</div><div class="item-type">图片</div></div>
                `;
                const checkbox = card.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('click', (e) => e.stopPropagation());
                checkbox.addEventListener('change', (e) => {
                    toggleSelection(image.path, 'image', e.target.checked);
                    card.classList.toggle('item-card--selected', e.target.checked);
                });
                grid.appendChild(card);
            });
        }

        async function probeDuplicate(imagePathB64) {
            try {
                const resp = await fetch('/api/gallery-dup-check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: imagePathB64 })
                });
                const data = await resp.json().catch(() => ({}));
                if (!resp.ok || !data || data.status !== 'success') return null;
                return data;
            } catch (_) { return null; }
        }

        async function openRenameDialog(imagePath, imageName) {
            if (!window.PmImageEditModal || !window.PmImageEditModal.open) {
                return window.showAppToast && window.showAppToast('共享编辑弹窗未加载，请刷新页面后重试', true, 8000);
            }

            const dup = await probeDuplicate(imagePath);
            if (dup && dup.duplicate && !dup.same_folder && dup.canonical && dup.canonical.storage_path) {
                const canonRel = String(dup.canonical.storage_path || '').trim().replace(/\\/g, '/').replace(/^\/+/, '');
                const canonB64 = utf8ToB64(canonRel);
                const curRel = String(dup.current_path || '').trim();
                const msg = `检测到重复图片（SHA256 相同）。\n\n当前：${curRel}\n库中：${canonRel}\n\n请选择：\n- 取消：退出\n- 删除当前重复图片：把当前文件移入同目录回收站\n- 继续编辑已有图片：直接打开库中那张图片进行编辑（规格关联等将按数据库预填）`;

                if (!window.showAppConfirmAsync) {
                    window.showAppToast && window.showAppToast(msg, true, 12000);
                    return;
                }

                const choice = await window.showAppConfirmAsync({
                    title: '重复图片提示',
                    message: msg,
                    confirmText: '继续编辑已有图片',
                    cancelText: '取消',
                    extraButtons: [{ id: 'delete_dup', text: '删除当前重复图片', danger: true }]
                }).catch(() => false);

                if (choice && choice.id === 'delete_dup') {
                    const respDel = await fetch('/api/gallery-batch-delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ items: [{ type: 'image', path: imagePath }] })
                    });
                    const dataDel = await respDel.json().catch(() => ({}));
                    if (!respDel.ok || !dataDel || dataDel.status !== 'success') {
                        window.showAppToast && window.showAppToast('删除重复图片失败：' + ((dataDel && dataDel.message) ? dataDel.message : `HTTP ${respDel.status}`), true, 10000);
                        return;
                    }
                    window.showAppToast && window.showAppToast('已移入同目录回收站（原因：重复）', false, 8000);
                    browse(currentPath || '');
                    imagePath = canonB64;
                    imageName = canonRel.split('/').pop() || imageName;
                } else if (choice === true || (choice && choice.id === 'confirm')) {
                    imagePath = canonB64;
                    imageName = canonRel.split('/').pop() || imageName;
                } else {
                    return;
                }
            }

            const computeRenamedPathB64 = ({ oldPathB64, newFilename }) => {
                const oldRel = decodeB64Utf8(oldPathB64);
                const folder = oldRel.includes('/') ? oldRel.slice(0, oldRel.lastIndexOf('/')) : '';
                const newRel = folder ? `${folder}/${newFilename}` : newFilename;
                return utf8ToB64(newRel);
            };

            window.PmImageEditModal.init({
                mode: 'gallery',
                hooks: {
                    prefillVariantLinks: true,
                    onRenamed: computeRenamedPathB64,
                    onAfterSuccess: () => browse(currentPath || ''),
                    onReplaceSelected: ({ file, current }) => {
                        const fd = new FormData();
                        fd.append('id', current.pathB64);
                        fd.append('file', file);
                        window.showAppUploadProgress && window.showAppUploadProgress({ title: '替换图片', message: '上传并替换中…' });
                        fetch('/api/replace', { method: 'POST', body: fd })
                            .then(r => r.json())
                            .then(data => {
                                if (!data || data.status !== 'success') throw new Error((data && data.message) ? data.message : '替换失败');
                                window.showAppToast && window.showAppToast(data.message || '替换成功', false, 6000);
                                browse(currentPath || '');
                            })
                            .catch(err => window.showAppToast && window.showAppToast('替换失败：' + (err && err.message ? err.message : err), true, 10000))
                            .finally(() => window.hideAppUploadProgress && window.hideAppUploadProgress());
                    }
                }
            });

            window.PmImageEditModal.open({ pathB64: imagePath, name: imageName, defaultVariantIds: [] });
        }
    </script>
</body>
    <script src="/static/js/header.js"></script>
    <script src="/static/js/pm_image_edit_modal.js"></script>
</html>
