<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片管理 - 文件浏览器</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="site-header"></div>

    <div class="container container--wide">
        <section class="header header-row">
            <div>
                <h2>📁 文件浏览器</h2>
                <p>点击文件夹进入，点击图片重命名</p>
            </div>
        </section>

        <!-- 面包屑导航 -->
        <div class="breadcrumb-row">
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item" onclick="browse('')">🏠 根目录</span>
            </div>
            <div class="header-actions">
                <div class="upload-bar">
                    <div class="bar-body upload-left">
                        <input type="file" id="uploadInput" accept="image/*" multiple>
                        <button class="btn-accent" onclick="uploadImages()">上传</button>
                    </div>
                    <div id="upload-status" class="upload-status"></div>
                </div>

                <div class="download-bar">
                    <div class="bar-body download-left">
                        <button class="btn-primary" onclick="downloadSelected()">下载选中</button>
                    </div>
                    <div id="download-status" class="upload-status"></div>
                </div>
            </div>
        </div>



        <!-- 文件/文件夹网格 -->
        <div class="browser-grid" id="browser-grid">
            <div class="loading">加载中...</div>
        </div>

        <div class="debug-container" id="debug-container"></div>
    </div>

    <!-- 重命名对话框（统一 pm-modal 风格） -->
    <div class="pm-modal" id="rename-dialog">
        <div class="pm-modal-content pm-modal-content--wide gallery-rename-modal">
            <div class="pm-modal-scroll">
            <h3 style="margin-top: 0;">✏️ 编辑图片信息</h3>

            <div class="gallery-rename-preview">
                <img id="rename-preview-img" src="" alt="预览">
                <button class="btn-secondary gallery-preview-zoom" type="button" onclick="openPreviewZoom()" title="放大查看">🔍</button>
            </div>

            <div class="pm-form" style="grid-template-columns: 1fr;">
                <div class="form-group pm-form-full">
                    <label>文件名（无需扩展名）</label>
                    <input type="text" id="new-name" placeholder="输入新文件名">
                </div>
            </div>

            <div id="rename-status" class="status-message" style="display: none; margin-top: 0.65rem;"></div>

            <div class="pm-section" style="margin-top: 1rem;">
                <h4 class="pm-section-title">批量应用到规格</h4>
                <div class="pm-section-body pm-form" style="grid-template-columns: 1fr;">
                    <div class="form-group pm-form-full" style="margin:0;">
                        <label>已选规格</label>
                        <div class="pm-actions" style="justify-content:space-between; gap:0.6rem; flex-wrap:wrap;">
                            <div id="galleryApplySelectedText" class="helper-text" style="margin:0;">未选择</div>
                            <div class="pm-actions" style="margin:0;">
                                <button class="btn-secondary" type="button" onclick="openGalleryVariantPicker()">选择规格</button>
                                <button class="btn-secondary" type="button" onclick="clearGalleryVariantSelection()">清空</button>
                            </div>
                        </div>
                    </div>
                    <div class="form-group pm-form-full" style="margin:0;">
                        <label>目标文件夹（相对路径，可选）</label>
                        <input type="text" id="galleryApplyTargetFolder" placeholder="留空=默认放入『销售产品图片』/assets；例如：『销售产品图片』/assets/临时">
                        <div class="helper-text">说明：数据库以 sha256 去重，同一内容只会有一条 image_assets 记录；若该图片已存在于数据库，将仅建立关联，不再复制/移动出新的副本。</div>
                    </div>
                    <div class="form-group pm-form-full" style="margin:0;">
                        <label>复制/移动</label>
                        <div class="pm-actions" style="justify-content:flex-start; gap:1rem;">
                            <label style="display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;">
                                <input type="radio" name="galleryApplyAction" value="copy" checked>
                                <span>复制（源文件保留）</span>
                            </label>
                            <label style="display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;">
                                <input type="radio" name="galleryApplyAction" value="move">
                                <span>移动（源文件不在目标目录时将消失）</span>
                            </label>
                            <label style="display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;">
                                <input type="checkbox" id="galleryApplyPromptDuplicate" checked>
                                <span>提示已存在关联</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group pm-form-full" style="margin:0;">
                        <button class="btn-accent" type="button" onclick="applyImageToVariants()">一键应用图片到所选规格</button>
                        <div id="galleryApplyStatus" class="status-message" style="display:none; margin-top:0.65rem;"></div>
                    </div>
                </div>
            </div>
            </div>

            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeRenameDialog()">取消</button>
                <button class="btn-secondary gallery-preview-zoom" type="button" onclick="triggerReplaceImage()" title="替换图片" style="right: 54px;">⟳</button>
                <button class="btn-primary" type="button" onclick="confirmRename()">提交修改</button>
            </div>
        </div>
    </div>


    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        let currentPath = '';
        let currentRenameImage = null;
        let lastFolders = [];
        let lastImages = [];
        const DEBUG_MODE = true;
        const selectedItems = new Map();
        let galleryVariantOptions = [];
        let gallerySelectedVariantIds = new Set();

        function decodeB64Utf8(b64) {
            if (!b64) return '';
            try {
                const binary = atob(b64);
                if (typeof TextDecoder !== 'undefined') {
                    const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
                    return new TextDecoder('utf-8').decode(bytes);
                }
                return decodeURIComponent(escape(binary));
            } catch (e) {
                try {
                    return decodeURIComponent(escape(atob(b64)));
                } catch (err) {
                    console.warn('Base64 decode failed:', b64, e);
                    return '';
                }
            }
        }

        // 页面加载时浏览根目录
        window.addEventListener('load', function() {
            browse('');
        });

        // 浏览目录
        function browse(path) {
            currentPath = path;
            const grid = document.getElementById('browser-grid');
            grid.innerHTML = '<div class="loading">加载中...</div>';

            const debugParam = DEBUG_MODE ? '&debug=1' : '';
            const url = path ? `/api/browse?path=${encodeURIComponent(path)}${debugParam}` : `/api/browse?debug=1`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        updateBreadcrumb(data.breadcrumbs);
                        lastFolders = data.folders || [];
                        lastImages = data.images || [];
                        displayItems(lastFolders, lastImages);
                        if (DEBUG_MODE && data.debug_items) {
                            renderDebug(data.debug_items, data.total_folders || 0, data.total_images || 0);
                        } else {
                            renderDebug([], data.total_folders || 0, data.total_images || 0);
                        }
                    } else {
                        grid.innerHTML = '<p style="color: red; text-align: center;">加载失败: ' + data.message + '</p>';
                        renderDebug([], 0, 0);
                    }
                })
                .catch(error => {
                    console.error('错误:', error);
                    grid.innerHTML = '<p style="color: red; text-align: center;">加载错误: ' + error + '</p>';
                    renderDebug([], 0, 0);
                });
        }

        function uploadImages() {
            const input = document.getElementById('uploadInput');
            const status = document.getElementById('upload-status');
            if (!input.files || input.files.length === 0) {
                showStatus(status, '请选择图片', 'error');
                return;
            }

            const formData = new FormData();
            Array.from(input.files).forEach(file => formData.append('file', file));
            if (currentPath) {
                formData.append('path', currentPath);
            }

            showStatus(status, '上传中...', 'info');

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(async r => {
                const contentType = r.headers.get('content-type') || '';
                if (contentType.includes('application/json')) {
                    return r.json();
                }
                const text = await r.text();
                throw new Error(text || `HTTP ${r.status}`);
            })
            .then(data => {
                if (data.status === 'success') {
                    showStatus(status, `上传完成：${data.count} 张`, 'success');
                    input.value = '';
                    browse(currentPath);
                } else {
                    showStatus(status, '上传失败: ' + (data.message || '未知错误'), 'error');
                }
            })
            .catch(err => {
                showStatus(status, '上传失败: ' + err.message, 'error');
            });
        }

        function renderDebug(items, totalFolders = 0, totalImages = 0) {
            const container = document.getElementById('debug-container');
            const existing = document.getElementById('debug-info');
            if (existing) {
                existing.remove();
            }

            const wrapper = document.createElement('div');
            wrapper.id = 'debug-info';
            wrapper.style.padding = '0.75rem 1rem';
            wrapper.style.background = 'rgba(236, 231, 223, 0.08)';
            wrapper.style.borderRadius = '8px';
            wrapper.style.color = '#cfc7bd';
            wrapper.style.fontSize = '0.85rem';

            const statsLine = `统计：文件夹 ${totalFolders} 个，图片 ${totalImages} 张`;
            const lines = (items || []).slice(0, 50).map(item => {
                const name = item.name || '';
                const reason = item.skipped || 'unknown';
                return `${name}  [${reason}]`;
            });

            wrapper.innerHTML = `
                <div style="font-weight:600; margin-bottom:0.35rem;">${statsLine}</div>
                ${lines.length ? `<div style="margin-top:0.35rem; font-weight:600;">调试：被跳过的条目（最多50条）</div>
                <div style="white-space:pre-wrap; word-break:break-all;">${lines.join('\n')}</div>` : ''}
            `;

            container.appendChild(wrapper);
        }

        // 更新面包屑导航
        function updateBreadcrumb(breadcrumbs) {
            const breadcrumbEl = document.getElementById('breadcrumb');
            let html = '<span class="breadcrumb-item" onclick="browse(\'\')">🏠 根目录</span>';

            breadcrumbs.forEach(crumb => {
                const name = decodeB64Utf8(crumb.name);
                const path = crumb.path;
                html += '<span class="breadcrumb-separator">›</span>';
                html += `<span class="breadcrumb-item" onclick="browse('${path}')">${name}</span>`;
            });

            breadcrumbEl.innerHTML = html;
        }

        function setDownloadStatus(message, type) {
            const status = document.getElementById('download-status');
            showStatus(status, message || '', type || '');
        }

        function showStatus(el, message, type) {
            if (!el) return;
            if (!message) {
                el.textContent = '';
                el.className = 'upload-status';
                el.classList.remove('show');
                return;
            }
            el.textContent = message;
            el.className = 'upload-status ' + (type || '');
            el.classList.add('show');
            clearTimeout(el._hideTimer);
            el._hideTimer = setTimeout(() => {
                el.classList.remove('show');
            }, 2600);
        }

        function toggleSelection(path, type, checked) {
            if (checked) {
                selectedItems.set(path, type);
            } else {
                selectedItems.delete(path);
            }
        }

        async function downloadSelected() {
            if (selectedItems.size === 0) {
                setDownloadStatus('请先勾选要下载的内容', 'error');
                return;
            }

            setDownloadStatus('下载中...', 'info');
            const payload = [];
            selectedItems.forEach((type, path) => {
                payload.push({ type, path });
            });

            fetch('/api/download-zip', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: payload })
            })
            .then(async response => {
                const contentType = response.headers.get('content-type') || '';
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(text || `HTTP ${response.status}`);
                }
                if (!contentType.includes('application/zip')) {
                    const text = await response.text();
                    try {
                        const data = JSON.parse(text);
                        throw new Error(data.message || '下载失败');
                    } catch (e) {
                        throw new Error(text || '下载失败');
                    }
                }
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0];
                link.href = url;
                link.download = `sitjoy_download_${timestamp}.zip`;
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
                setDownloadStatus('下载已开始', 'success');
            })
            .catch(err => {
                setDownloadStatus('下载失败: ' + err.message, 'error');
            });
        }

        // 显示项目（文件夹和图片）
        function displayItems(folders, images) {
            const grid = document.getElementById('browser-grid');

            if (folders.length === 0 && images.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: white;">此文件夹为空</p>';
                return;
            }

            grid.innerHTML = '';

            // 显示文件夹
            folders.forEach(folder => {
                const name = decodeB64Utf8(folder.name);
                const card = document.createElement('div');
                const isSelected = selectedItems.has(folder.path);
                card.className = 'item-card item-card--compact' + (isSelected ? ' item-card--selected' : '');
                card.onclick = () => browse(folder.path);

                card.innerHTML = `
                    <div class="item-select" onclick="event.stopPropagation();">
                        <input type="checkbox" data-path="${folder.path}" data-type="folder" ${isSelected ? 'checked' : ''}>
                    </div>
                    <div class="item-thumbnail folder">
                        <div class="folder-icon">📁</div>
                    </div>
                    <div class="item-info">
                        <div class="item-name">${name}</div>
                        <div class="item-type">文件夹</div>
                    </div>
                `;

                const checkbox = card.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('click', (e) => e.stopPropagation());
                checkbox.addEventListener('change', (e) => {
                    toggleSelection(folder.path, 'folder', e.target.checked);
                    card.classList.toggle('item-card--selected', e.target.checked);
                });

                grid.appendChild(card);
            });

            // 显示图片（带缩略图）
            images.forEach(image => {
                const name = decodeB64Utf8(image.name);
                const card = document.createElement('div');
                const isSelected = selectedItems.has(image.path);
                card.className = 'item-card item-card--compact' + (isSelected ? ' item-card--selected' : '');
                card.onclick = () => openRenameDialog(image.path, name);

                const thumbnailUrl = `/api/image-preview?id=${encodeURIComponent(image.path)}`;

                card.innerHTML = `
                    <div class="item-select" onclick="event.stopPropagation();">
                        <input type="checkbox" data-path="${image.path}" data-type="image" ${isSelected ? 'checked' : ''}>
                    </div>
                    <div class="item-thumbnail">
                        <img src="${thumbnailUrl}" alt="${name}" loading="lazy">
                    </div>
                    <div class="item-info">
                        <div class="item-name">${name}</div>
                        <div class="item-type">图片</div>
                    </div>
                `;

                const checkbox = card.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('click', (e) => e.stopPropagation());
                checkbox.addEventListener('change', (e) => {
                    toggleSelection(image.path, 'image', e.target.checked);
                    card.classList.toggle('item-card--selected', e.target.checked);
                });

                grid.appendChild(card);
            });
        }

        // 打开重命名对话框
        function openRenameDialog(imagePath, imageName) {
            currentRenameImage = {
                path: imagePath,
                name: imageName
            };

            const currentNameInput = document.getElementById('current-name');
            if (currentNameInput) {
                currentNameInput.value = imageName;
            }
            
            // 提取文件名（无扩展名）
            const nameWithoutExt = imageName.substring(0, imageName.lastIndexOf('.')) || imageName;
            document.getElementById('new-name').value = nameWithoutExt;

            // 加载预览图
            const previewImg = document.getElementById('rename-preview-img');
            previewImg.src = `/api/image-preview?id=${encodeURIComponent(imagePath)}`;

        // 显示对话框
        document.getElementById('rename-dialog').classList.add('active');
            document.getElementById('new-name').focus();
            document.getElementById('rename-status').style.display = 'none';
        }

        function closeRenameDialog() {
            const dialog = document.getElementById('rename-dialog');
            if (dialog) dialog.classList.remove('active');
            const statusDiv = document.getElementById('rename-status');
            if (statusDiv) {
                statusDiv.style.display = 'none';
                statusDiv.textContent = '';
            }
            currentRenameImage = null;
        }

        function utf8ToB64(text) {
            try {
                if (typeof TextEncoder !== 'undefined') {
                    const bytes = new TextEncoder().encode(text);
                    let binary = '';
                    bytes.forEach(b => binary += String.fromCharCode(b));
                    return btoa(binary);
                }
                return btoa(unescape(encodeURIComponent(text)));
            } catch (e) {
                return '';
            }
        }

        function openPreviewZoom() {
            if (!currentRenameImage) return;
            window.open(`/api/image-preview?id=${encodeURIComponent(currentRenameImage.path)}`, '_blank');
        }

        function ensureReplaceInput() {
            let input = document.getElementById('replace-image-input');
            if (input) return input;
            input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.id = 'replace-image-input';
            input.style.display = 'none';
            input.addEventListener('change', function() {
                const file = this.files && this.files[0] ? this.files[0] : null;
                if (!file) return;
                replaceCurrentImageFile(file);
            });
            document.body.appendChild(input);
            return input;
        }

        function triggerReplaceImage() {
            if (!currentRenameImage) return;
            const input = ensureReplaceInput();
            input.value = '';
            input.click();
        }

        function replaceCurrentImageFile(file) {
            if (!currentRenameImage || !file) return;
            const statusDiv = document.getElementById('rename-status');
            statusDiv.textContent = '替换中...';
            statusDiv.className = 'status-message info';
            statusDiv.style.display = 'block';

            const fd = new FormData();
            fd.append('id', currentRenameImage.path);
            fd.append('file', file);

            fetch('/api/replace', { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        statusDiv.textContent = '✓ 替换成功！';
                        statusDiv.className = 'status-message success';
                        // refresh preview & current folder list
                        const previewImg = document.getElementById('rename-preview-img');
                        if (previewImg) {
                            const bust = Date.now();
                            previewImg.src = `/api/image-preview?id=${encodeURIComponent(currentRenameImage.path)}&bust=${bust}`;
                        }
                        browse(currentPath);
                    } else {
                        statusDiv.textContent = '✗ 替换失败: ' + (data.message || '未知错误');
                        statusDiv.className = 'status-message error';
                    }
                })
                .catch(err => {
                    statusDiv.textContent = '✗ 替换失败: ' + err;
                    statusDiv.className = 'status-message error';
                });
        }

        // 确认重命名
        function confirmRename() {
            if (!currentRenameImage) return;

            let newName = document.getElementById('new-name').value.trim();
            const statusDiv = document.getElementById('rename-status');

            const oldNameWithoutExt = currentRenameImage.name.substring(0, currentRenameImage.name.lastIndexOf('.')) || currentRenameImage.name;
            if (!newName) newName = oldNameWithoutExt;
            if (newName === oldNameWithoutExt) {
                statusDiv.textContent = '未做任何修改';
                statusDiv.className = 'status-message error';
                statusDiv.style.display = 'block';
                return;
            }

            statusDiv.textContent = '重命名中...';
            statusDiv.className = 'status-message info';
            statusDiv.style.display = 'block';

            // Base64编码新文件名
            const newNameB64 = utf8ToB64(newName);
            fetch('/api/rename', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    id: currentRenameImage.path,
                    new_name_b64: newNameB64
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    statusDiv.textContent = '✓ 重命名成功！';
                    statusDiv.className = 'status-message success';
                    setTimeout(() => {
                        closeRenameDialog();
                        browse(currentPath); // 刷新当前目录
                    }, 1000);
                } else {
                    statusDiv.textContent = '✗ 重命名失败: ' + data.message;
                    statusDiv.className = 'status-message error';
                }
            })
            .catch(error => {
                statusDiv.textContent = '✗ 错误: ' + error;
                statusDiv.className = 'status-message error';
            });
        }

        // 回车键提交
        document.getElementById('new-name').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                confirmRename();
            }
        });

        // 点击弹窗外部关闭：必须同时满足 mousedown + mouseup 都发生在遮罩层本体
        (function() {
            const overlay = document.getElementById('rename-dialog');
            if (!overlay) return;
            let downOnOverlay = false;
            overlay.addEventListener('mousedown', function(e) {
                downOnOverlay = (e.target === overlay);
            });
            overlay.addEventListener('mouseup', function(e) {
                const upOnOverlay = (e.target === overlay);
                if (downOnOverlay && upOnOverlay) {
                    closeRenameDialog();
                }
                downOnOverlay = false;
            });
        })();

        // ESC键关闭对话框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeRenameDialog();
            }
        });

        function showGalleryApplyStatus(text, isError) {
            const el = document.getElementById('galleryApplyStatus');
            if (!el) return;
            el.textContent = text || '';
            el.className = 'status-message ' + (isError ? 'error' : 'success');
            el.style.display = 'block';
        }

        function updateGalleryVariantSelectedText() {
            const el = document.getElementById('galleryApplySelectedText');
            if (!el) return;
            const n = (gallerySelectedVariantIds ? gallerySelectedVariantIds.size : 0) || 0;
            el.textContent = n ? `已选择 ${n} 个规格` : '未选择';
        }

        function clearGalleryVariantSelection() {
            gallerySelectedVariantIds = new Set();
            updateGalleryVariantSelectedText();
            const st = document.getElementById('galleryApplyStatus');
            if (st) st.style.display = 'none';
        }

        async function ensureGalleryVariantOptions() {
            if (Array.isArray(galleryVariantOptions) && galleryVariantOptions.length) return galleryVariantOptions;
            const resp = await fetch('/api/gallery-variant-picker');
            const data = await resp.json();
            if (!data || data.status !== 'success') {
                throw new Error((data && data.message) ? data.message : '无法加载规格列表');
            }
            galleryVariantOptions = data.items || [];
            return galleryVariantOptions;
        }

        function openGalleryVariantPicker() {
            if (!currentRenameImage) return;
            ensureGalleryVariantOptions().then(items => {
                // 简单弹窗：用原生 showDialog（header.js）风格不稳定，这里用 confirm/modal 内渲染
                const html = `
                    <div style="display:grid; gap:0.6rem;">
                        <div class="helper-text" style="margin:0;">可搜索后多选规格（货号/规格/面料）</div>
                        <input type="text" id="galleryVariantSearch" class="pm-select-search" placeholder="搜索：货号 / 规格 / 面料">
                        <div id="galleryVariantList" style="max-height:52vh; overflow:auto; border:1px solid rgba(207,199,189,0.7); border-radius:10px; background:#fff; padding:0.5rem;"></div>
                        <div class="pm-actions" style="justify-content:space-between;">
                            <label style="display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;">
                                <input type="checkbox" id="galleryVariantSelectAll">
                                <span>全选当前过滤结果</span>
                            </label>
                            <div class="pm-actions">
                                <button class="btn-secondary" type="button" id="galleryVariantCancelBtn">取消</button>
                                <button class="btn-primary" type="button" id="galleryVariantOkBtn">确定</button>
                            </div>
                        </div>
                    </div>
                `;
                const modal = document.createElement('div');
                modal.className = 'pm-modal active';
                modal.innerHTML = `
                    <div class="pm-modal-content" style="max-width:760px;">
                        <h3 style="margin-top:0;">选择规格</h3>
                        ${html}
                    </div>
                `;
                document.body.appendChild(modal);

                function close() {
                    modal.classList.remove('active');
                    modal.remove();
                }
                modal.addEventListener('click', e => { if (e.target === modal) close(); });

                const listEl = modal.querySelector('#galleryVariantList');
                const searchEl = modal.querySelector('#galleryVariantSearch');
                const selectAllEl = modal.querySelector('#galleryVariantSelectAll');

                function render() {
                    const kw = String(searchEl.value || '').trim().toLowerCase();
                    const filtered = (items || []).filter(it => {
                        const line = `${it.sku_family || ''} ${it.spec_name || ''} ${it.fabric_name_en || ''} ${it.fabric_code || ''}`.toLowerCase();
                        return !kw || line.includes(kw);
                    });
                    listEl.innerHTML = filtered.map(it => {
                        const vid = Number(it.variant_id || 0);
                        const checked = gallerySelectedVariantIds.has(vid) ? 'checked' : '';
                        const label = `${it.sku_family || '-'} / ${it.spec_name || '-'} / ${it.fabric_name_en || it.fabric_code || '-'}`;
                        return `<label style="display:flex; gap:0.5rem; align-items:center; padding:0.35rem 0.2rem; cursor:pointer; border-bottom:1px dashed rgba(207,199,189,0.45);">
                            <input type="checkbox" data-vid="${vid}" ${checked}>
                            <span style="color:var(--morandi-ink); font-size:0.92rem;">${label.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
                        </label>`;
                    }).join('') || `<div class="helper-text" style="padding:0.6rem;">无匹配结果</div>`;

                    // 全选状态
                    const vids = Array.from(listEl.querySelectorAll('input[type=\"checkbox\"][data-vid]')).map(x => Number(x.getAttribute('data-vid')||0)).filter(Boolean);
                    const checkedCount = vids.filter(v => gallerySelectedVariantIds.has(v)).length;
                    selectAllEl.checked = vids.length > 0 && checkedCount === vids.length;
                    selectAllEl.indeterminate = checkedCount > 0 && checkedCount < vids.length;
                }

                listEl.addEventListener('change', e => {
                    const box = e.target;
                    if (!box || box.tagName !== 'INPUT') return;
                    const vid = Number(box.getAttribute('data-vid') || 0);
                    if (!vid) return;
                    if (box.checked) gallerySelectedVariantIds.add(vid);
                    else gallerySelectedVariantIds.delete(vid);
                    render();
                });
                selectAllEl.addEventListener('change', () => {
                    const vids = Array.from(listEl.querySelectorAll('input[type=\"checkbox\"][data-vid]')).map(x => Number(x.getAttribute('data-vid')||0)).filter(Boolean);
                    if (selectAllEl.checked) vids.forEach(v => gallerySelectedVariantIds.add(v));
                    else vids.forEach(v => gallerySelectedVariantIds.delete(v));
                    render();
                });
                searchEl.addEventListener('input', render);

                modal.querySelector('#galleryVariantCancelBtn').addEventListener('click', close);
                modal.querySelector('#galleryVariantOkBtn').addEventListener('click', () => {
                    updateGalleryVariantSelectedText();
                    close();
                });

                render();
            }).catch(e => {
                showGalleryApplyStatus('加载规格列表失败: ' + e.message, true);
            });
        }

        function _textToB64Utf8(text) {
            const s = String(text || '').trim();
            if (!s) return '';
            try {
                if (typeof TextEncoder !== 'undefined') {
                    const bytes = new TextEncoder().encode(s);
                    let binary = '';
                    bytes.forEach(b => binary += String.fromCharCode(b));
                    return btoa(binary);
                }
                return btoa(unescape(encodeURIComponent(s)));
            } catch (e) {
                return '';
            }
        }

        async function applyImageToVariants() {
            if (!currentRenameImage) return;
            if (!gallerySelectedVariantIds || gallerySelectedVariantIds.size === 0) {
                showGalleryApplyStatus('请先选择规格', true);
                return;
            }
            const actionEl = document.querySelector('input[name=\"galleryApplyAction\"]:checked');
            const action = actionEl ? String(actionEl.value || 'copy') : 'copy';
            const targetFolderText = String((document.getElementById('galleryApplyTargetFolder') || {}).value || '').trim();
            const promptDup = !!(document.getElementById('galleryApplyPromptDuplicate') && document.getElementById('galleryApplyPromptDuplicate').checked);
            showGalleryApplyStatus('处理中...', false);
            try {
                const payload = {
                    image_path_b64: currentRenameImage.path,
                    variant_ids: Array.from(gallerySelectedVariantIds),
                    action,
                    target_folder_b64: targetFolderText ? _textToB64Utf8(targetFolderText) : '',
                    prompt_duplicate: promptDup ? 1 : 0
                };
                const resp = await fetch('/api/gallery-apply-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                if (!data || data.status !== 'success') {
                    showGalleryApplyStatus((data && data.message) ? data.message : '操作失败', true);
                    return;
                }
                showGalleryApplyStatus(data.message || '已完成', false);
            } catch (e) {
                showGalleryApplyStatus('操作失败: ' + e.message, true);
            }
        }
    </script>
</body>
    <script src="/static/js/header.js"></script>
</html>
