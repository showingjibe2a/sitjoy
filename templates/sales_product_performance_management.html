        function startImportProgressPolling(taskId) {
            if (!taskId) return;
            if (uploadProgressPollingTimer) {
                clearInterval(uploadProgressPollingTimer);
                uploadProgressPollingTimer = null;
            }
            let failCount = 0;
            let pollDelayMs = 700;
            let lastTs = '';
            let lastMessage = '';
            let sameTsCount = 0;
            let sameMessageCount = 0;
            let restartRequested = false;
            let consecutiveNoResponse = 0;
            let lastStuckReason = '';

            async function tryRestartImportIfStuck(reason) {
                if (restartRequested) return;
                restartRequested = true;
                const restartReason = String(reason || lastStuckReason || 'stale_progress').trim() || 'stale_progress';
                try {
                    const resp = await fetchJsonSafe(`/api/sales-product-performance-import?mode=restart&force=1&reason=${encodeURIComponent(restartReason)}&task_id=${encodeURIComponent(taskId)}`, {
                        method: 'GET',
                        credentials: 'include',
                        headers: {
                            'Accept': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    }, 9000);
                    const ok = String(resp.status || '').toLowerCase() === 'success';
                    if (ok) {
                        window.showAppToast && window.showAppToast(resp.message || '已触发后台重启导入任务', false, 3200);
                    } else {
                        window.showAppToast && window.showAppToast(resp.message || '触发重启失败', true, 4200);
                    }
                } catch (e) {
                    const msg = (e && e.message) ? String(e.message) : String(e);
                    window.showAppToast && window.showAppToast(`触发重启失败：${msg}`, true, 4200);
                } finally {
                    // 允许后续再次触发（比如又卡住了）
                    window.setTimeout(() => { restartRequested = false; }, 15000);
                }
            }

            async function pollOnce() {
                try {
                    const data = await fetchJsonSafe(`/api/sales-product-performance-import?mode=progress&task_id=${encodeURIComponent(taskId)}`, {
                        method: 'GET',
                        credentials: 'include',
                        headers: {
                            'Accept': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    }, 5500);
                    const total = Number(data.total_rows || 0);
                    const done = Number(data.processed_rows || 0);
                    const percent = total > 0 ? Math.floor((done / total) * 100) : 0;
                    const state = String(data.state || 'running');
                    const msg = String(data.message || '').trim();
                    const ts = String(data.ts || '').trim();

                    failCount = 0;
                    pollDelayMs = 700;

                    if (ts && ts === lastTs) sameTsCount += 1;
                    else sameTsCount = 0;
                    lastTs = ts || lastTs;

                    if (msg && msg === lastMessage) sameMessageCount += 1;
                    else sameMessageCount = 0;
                    lastMessage = msg || lastMessage;

                    const label = msg
                        ? msg
                        : (total > 0 ? `正在处理数据... ${done}/${total}` : `正在处理数据... 已处理 ${done} 行`);
                    showUploadProgress(ts ? `${label}（${ts}）` : label, Math.max(1, Math.min(99, percent)));

                    // 若长时间 ts 不变，主动提示但继续重试（有些阶段会很慢）
                    if (sameTsCount === 25) { // ~25*0.7s ≈ 17s
                        window.showAppToast && window.showAppToast('进度暂未刷新，正在自动重试…', true, 2200);
                    }
                    // 若 ts 超长时间不变（疑似写库卡死/连接挂起），自动触发后端“重启导入”
                    if (sameTsCount >= 90 || sameMessageCount >= 90) { // ~90*0.7s ≈ 1分钟
                        lastStuckReason = sameTsCount >= sameMessageCount ? 'stale_ts' : 'stale_message';
                        window.showAppToast && window.showAppToast('进度长时间无更新，尝试自动重启导入任务…', true, 3200);
                        tryRestartImportIfStuck(lastStuckReason);
                    }

                    if (state === 'success') {
                        hideUploadProgress();
                        return false;
                    }
                    if (state === 'error') {
                        return false;
                    }
                    return true;
                } catch (e) {
                    // 504/HTML 等“非正常响应”不终止：持续重试并做退避
                    failCount += 1;
                    consecutiveNoResponse += 1;
                    pollDelayMs = Math.min(6000, Math.floor(pollDelayMs * 1.6));
                    if (failCount === 3) {
                        window.showAppToast && window.showAppToast('网络/网关异常，正在自动重试获取进度…', true, 2600);
                    }
                    // 短时间连续无响应：直接触发恢复重启（从 checkpoint 继续）
                    if (consecutiveNoResponse >= 3) {
                        try {
                            lastStuckReason = 'no_response';
                            const r = await fetchJsonSafe(`/api/sales-product-performance-import?mode=restart&force=1&reason=${encodeURIComponent(lastStuckReason)}&task_id=${encodeURIComponent(taskId)}`, {
                                method: 'GET',
                                credentials: 'include',
                                headers: {
                                    'Accept': 'application/json',
                                    'X-Requested-With': 'XMLHttpRequest'
                                }
                            }, 9000);
                            window.showAppToast && window.showAppToast(r.message || '已触发恢复重启导入任务', false, 3200);
                        } catch (e2) {
                            // ignore
                        } finally {
                            consecutiveNoResponse = 0;
                        }
                    }
                    showUploadProgress(`进度获取失败，${Math.floor(pollDelayMs / 1000)}秒后重试…`, 8);
                    return true;
                }
            }

            async function loop() {
                while (true) {
                    const shouldContinue = await pollOnce();
                    if (!shouldContinue) break;
                    await new Promise(r => setTimeout(r, pollDelayMs));
                }
            }

            uploadProgressPollingTimer = setInterval(() => {}, 9999999);
            loop().finally(() => {
                if (uploadProgressPollingTimer) {
                    clearInterval(uploadProgressPollingTimer);
                    uploadProgressPollingTimer = null;
                }
            });
        }

        async function waitImportTaskDone(taskId) {
            let deadline = Date.now() + 1000 * 60 * 30;
            while (Date.now() < deadline) {
                let data = null;
                try {
                    data = await fetchJsonSafe(`/api/sales-product-performance-import?mode=progress&task_id=${encodeURIComponent(taskId)}`, {
                        method: 'GET',
                        credentials: 'include',
                        headers: {
                            'Accept': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    }, 6500);
                } catch (e) {
                    // 504/HTML 等情况：继续等待并重试，不把整个导入判失败
                    await new Promise(r => setTimeout(r, 1300));
                    continue;
                }
                const stateText = String(data.state || '').toLowerCase();
                if (stateText === 'success') return data;
                if (stateText === 'error') {
                    const err = new Error(data.message || '导入失败');
                    err.importData = data;
                    throw err;
                }
                // 周/月聚合可能远长于写明细；处于聚合阶段时放宽等待上限，避免误判超时
                const phase = String(data.phase || '');
                if (phase === 'agg_refresh' || phase === 'agg_refresh_done' || phase === 'agg_refresh_warn') {
                    deadline = Math.max(deadline, Date.now() + 1000 * 60 * 90);
                }
                await new Promise(r => setTimeout(r, 900));
            }
            throw new Error('导入超时，请稍后重试');
        }

        function startProcessingProgress() {
            if (uploadProcessingTimer) {
                clearInterval(uploadProcessingTimer);
                uploadProcessingTimer = null;
            }
            const fillEl = document.getElementById('uploadProgressFill');
            const textEl = document.getElementById('uploadProgressText');
            let percent = Math.max(35, parseInt(fillEl.style.width || '0', 10) || 0);
            uploadProcessingTimer = setInterval(() => {
                percent = Math.min(98, percent + 1);
                fillEl.style.width = `${percent}%`;
                textEl.textContent = `文件已上传，正在处理数据... ${percent}%`;

        async function fetchJsonSafe(url, options, timeoutMs) {
            const controller = new AbortController();
            const to = window.setTimeout(() => controller.abort(), Math.max(500, Number(timeoutMs || 0) || 0));
            let r;
            try {
                r = await fetch(url, { ...(options || {}), signal: controller.signal });
            } catch (e) {
                if (e && (e.name === 'AbortError' || String(e).includes('AbortError'))) {
                    throw new Error('请求超时（已中止）');
                }
                throw e;
            } finally {
                window.clearTimeout(to);
            }
            const text = await r.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                const sample = String(text || '').slice(0, 220).replace(/\s+/g, ' ').trim();
                throw new Error(`接口未返回JSON（HTTP ${r.status}）。响应片段: ${sample || '(empty)'}`);
            }
        }

        function getImportStopReasonText(data) {
            const payload = data && typeof data === 'object' ? data : {};
            const phase = String(payload.phase || '').trim();
            const retryReason = String(payload.retry_reason || '').trim();
            const checkpointRow = Number(payload.checkpoint_row || 0);
            const message = String(payload.message || '').trim();
            const reasonMap = {
                stale_ts: '进度时间戳长时间未更新',
                stale_message: '进度消息长时间未变化',
                no_response: '进度接口连续无响应/网关异常',
                retryable_db_error: '数据库写入出现可恢复异常并已触发重试',
            };
            const parts = [];
            if (retryReason) {
                parts.push(reasonMap[retryReason] || `重试原因：${retryReason}`);
            }
            if (phase) {
                const phaseMap = {
                    writing_error: '写库阶段失败',
                    restart_error: '重启导入失败',
                    restart: '已触发重启恢复',
                    writing_retry: '写库分片重试中',
                };
                parts.push(phaseMap[phase] || `阶段：${phase}`);
            }
            if (checkpointRow > 0) {
                parts.push(`断点行号：${checkpointRow}`);
            }
            if (!parts.length && message) {
                parts.push(message);
            }
            return parts.length ? parts.join('；') : '原因未知';
        }

        function showImportResultPanel(title, summary, data, isError) {
            const payload = data && typeof data === 'object' ? data : {};
            const details = [];
            const stopReason = getImportStopReasonText(payload);
            if (summary) details.push(summary);
            if (stopReason) details.push(`停止原因：${stopReason}`);
            if (String(payload.message || '').trim() && String(payload.message || '').trim() !== summary) {
                details.push(`消息：${String(payload.message || '').trim()}`);
            }
            if (Array.isArray(payload.errors) && payload.errors.length) {
                payload.errors.slice(0, 6).forEach(errItem => {
                    if (typeof errItem === 'string') {
                        details.push(errItem);
                    } else if (errItem && typeof errItem === 'object') {
                        details.push(`第${errItem.row || '-'}行：${errItem.error || errItem.warning || '处理失败'}`);
                    }
                });
            }
            // 统一：成功走 toast（绿色），失败才弹 result panel（若可用）
            if (!isError) {
                window.showAppToast && window.showAppToast(`${title || '导入完成'}：${summary || ''}`.trim(), false, 4200);
                return;
            }
            if (window.showAppResultPanel) {
                window.showAppResultPanel({
                    title: String(title || '导入失败'),
                    summary: String(summary || '').trim(),
                    details,
                    isError: true,
                });
            } else if (window.showAppToast) {
                window.showAppToast(`${title || '导入失败'}：${summary || stopReason}`, true, 5200);
            }
        }

        function getManagedToolbarForTable(table) {
            const wrap = table ? table.closest('.pm-table-wrap') : null;
            if (!wrap) return null;
            let prev = wrap.previousElementSibling;
            while (prev) {
                if (prev.classList && prev.classList.contains('pm-table-toolbar')) {
                    return prev;
                }
                prev = prev.previousElementSibling;
            }
            return null;
        }

        function bindAndSyncManagedTablePager() {
            const table = document.getElementById('salesProductPerformanceTable');
            if (!table) return;
            const toolbar = getManagedToolbarForTable(table);
            if (!toolbar) return;

            const pageSizeSelect = toolbar.querySelector('.pm-table-page-size');
            const info = toolbar.querySelector('.pm-table-info');
            const prevRaw = toolbar.querySelector('.pm-table-prev');
            const nextRaw = toolbar.querySelector('.pm-table-next');
            const current = toolbar.querySelector('.pm-table-pager-current');
            if (!pageSizeSelect || !info || !prevRaw || !nextRaw || !current) return;

            if (toolbar.dataset.serverPagerBound !== '1') {
                toolbar.dataset.serverPagerBound = '1';
                pageSizeSelect.dataset.disableSearchable = '1';
                const selectDropdown = pageSizeSelect.nextElementSibling;
                if (selectDropdown && selectDropdown.classList && selectDropdown.classList.contains('universal-select-dropdown')) {
                    selectDropdown.remove();
                }
                pageSizeSelect.classList.remove('universal-select-native');
                delete pageSizeSelect.dataset.searchableEnhanced;
                pageSizeSelect.style.display = '';
                const handlePageSizeChange = function(value) {
                    const selectedSize = Math.max(10, Number(value || 50));
                    state.performancePageSize = selectedSize;
                    savePerfPageSizeToStorage(selectedSize);
                    loadSalesProductPerformanceList(1, { pageSize: selectedSize });
                };
                pageSizeSelect.addEventListener('change', function() {
                    handlePageSizeChange(this.value);
                });
                pageSizeSelect.addEventListener('input', function() {
                    handlePageSizeChange(this.value);
                });
                toolbar.addEventListener('change', function(e) {
                    const target = e.target && e.target.closest ? e.target.closest('.pm-table-page-size') : null;
                    if (!target) return;
                    handlePageSizeChange(target.value);
                });
                toolbar.addEventListener('click', function(e) {
                    const optionBtn = e.target.closest('.feature-category-option.universal-select-option');
                    if (!optionBtn) return;
                    window.setTimeout(() => {
                        const sizeFromSelect = Math.max(10, Number(pageSizeSelect.value || 50));
                        if (sizeFromSelect !== Number(state.performancePageSize || 50)) {
                            state.performancePageSize = sizeFromSelect;
                            savePerfPageSizeToStorage(sizeFromSelect);
                            loadSalesProductPerformanceList(1, { pageSize: sizeFromSelect });
                        }
                    }, 0);
                });
                prevRaw.addEventListener('click', function() {
                    if (state.performancePage <= 1) return;
                    loadSalesProductPerformanceList(state.performancePage - 1);
                });
                nextRaw.addEventListener('click', function() {
                    if (state.performancePage >= state.performanceTotalPages) return;
                    loadSalesProductPerformanceList(state.performancePage + 1);
                });
            }

            const pageSizeSelect2 = toolbar.querySelector('.pm-table-page-size');
            const prev2 = toolbar.querySelector('.pm-table-prev');
            const next2 = toolbar.querySelector('.pm-table-next');
            if (!pageSizeSelect2 || !prev2 || !next2) return;

            pageSizeSelect2.dataset.disableSearchable = '1';
            const selectDropdown2 = pageSizeSelect2.nextElementSibling;
            if (selectDropdown2 && selectDropdown2.classList && selectDropdown2.classList.contains('universal-select-dropdown')) {
                selectDropdown2.remove();
            }
            pageSizeSelect2.classList.remove('universal-select-native');
            delete pageSizeSelect2.dataset.searchableEnhanced;
            pageSizeSelect2.style.display = '';

            if (!state.performancePageSize || Number(state.performancePageSize) <= 0) {
                state.performancePageSize = Math.max(10, Number(pageSizeSelect2.value || 50));
            }
            pageSizeSelect2.value = String(state.performancePageSize || 50);
            const total = Number(state.performanceTotal || 0);
            const page = Number(state.performancePage || 1);
            const totalPages = Math.max(1, Number(state.performanceTotalPages || 1));
            const start = total > 0 ? ((page - 1) * state.performancePageSize + 1) : 0;
            const end = total > 0 ? Math.min(page * state.performancePageSize, total) : 0;

            const applyUi = () => {
                info.textContent = `显示 ${start}-${end} / 共 ${total} 条`;
                current.textContent = `${page} / ${totalPages}`;
                prev2.disabled = page <= 1;
                next2.disabled = page >= totalPages;
            };
            applyUi();
            window.requestAnimationFrame(applyUi);
            window.setTimeout(applyUi, 80);
        }

        async function loadSalesProductSkuPool() {
            const r = await fetch('/api/sales-product', { credentials: 'include' });
            const d = await r.json();
            if (d.status === 'success') {
                state.performanceSkuPool = (d.items || []).map(x => String(x.platform_sku || '').trim()).filter(Boolean);
                renderPerformanceSkuSuggestions();

        function loadSalesProductPerformanceList(page, options) {
            const nextPage = Math.max(1, Number(page || state.performancePage || 1));
            state.performancePage = nextPage;
            const table = document.getElementById('salesProductPerformanceTable');
            const toolbar = getManagedToolbarForTable(table);
            const toolbarSelect = toolbar ? toolbar.querySelector('.pm-table-page-size') : null;
            const forcedPageSize = options && Number(options.pageSize) > 0
                ? Math.max(10, Number(options.pageSize))
                : null;
            if (forcedPageSize) {
                state.performancePageSize = forcedPageSize;
            } else {
                let effective = Math.max(10, Number(state.performancePageSize || 50));
                if (toolbarSelect && Number(toolbarSelect.value) > 0) {
                    effective = Math.max(10, Number(toolbarSelect.value));
                }
                state.performancePageSize = effective;
            }
            if (table) {
                table.dataset.serverPaginationMode = 'server';
                table.dataset.serverCurrentPage = String(nextPage);
                table.dataset.serverPageSize = String(state.performancePageSize);
            }
            const q = (document.getElementById('performanceSearchInput').value || '').trim();
            const base = q
                ? `/api/sales-product-performance?q=${encodeURIComponent(q)}`
                : '/api/sales-product-performance';
            const url = `${base}&page=${encodeURIComponent(String(nextPage))}&page_size=${encodeURIComponent(String(state.performancePageSize))}`
                .replace('/api/sales-product-performance&', '/api/sales-product-performance?');
            fetch(url, { credentials: 'include' }).then(r => r.json()).then(data => {
                const tbody = document.querySelector('#salesProductPerformanceTable tbody');
                if (data.status !== 'success') {
                    tbody.innerHTML = `<tr><td colspan="20" style="text-align:center; color:#a33;">${data.message || '加载失败'}</td></tr>`;
                    state.performanceTotal = 0;
                    state.performanceTotalPages = 1;
                    bindAndSyncManagedTablePager();
                    return;
                }
                state.performanceItems = data.items || [];
                state.performancePage = Number(data.page || nextPage || 1);
                state.performancePageSize = Number(data.page_size || state.performancePageSize || 50);
                state.performanceTotal = Number(data.total || 0);
                state.performanceTotalPages = Number(data.total_pages || 1);
                if (table) {
                    table.dataset.serverPaginationMode = 'server';
                    table.dataset.serverCurrentPage = String(state.performancePage || 1);
                    table.dataset.serverPageSize = String(state.performancePageSize || 50);
                    table.dataset.serverTotalRows = String(state.performanceTotal || 0);
                }
                renderSalesProductPerformanceTable(state.performanceItems);
                bindAndSyncManagedTablePager();
            }).catch(err => {
                const tbody = document.querySelector('#salesProductPerformanceTable tbody');
                tbody.innerHTML = `<tr><td colspan="20" style="text-align:center; color:#a33;">加载失败: ${err}</td></tr>`;
                state.performanceTotal = 0;
                state.performanceTotalPages = 1;
                if (table) {
                    table.dataset.serverPaginationMode = 'server';
                    table.dataset.serverCurrentPage = String(state.performancePage || 1);
                    table.dataset.serverPageSize = String(state.performancePageSize || 50);
                    table.dataset.serverTotalRows = '0';
                }
                bindAndSyncManagedTablePager();
            });
        }

        function fillPerformanceModal(item) {
            document.getElementById('performancePlatformSku').value = item.platform_sku || '';
            document.getElementById('performanceRecordDate').value = item.record_date || '';
            document.getElementById('performanceSalesQty').value = item.sales_qty ?? '';
            document.getElementById('performanceNetSales').value = item.net_sales_amount ?? '';
            document.getElementById('performanceOrderQty').value = item.order_qty ?? '';
            document.getElementById('performanceSessionTotal').value = item.session_total ?? '';
            document.getElementById('performanceAdImpressions').value = item.ad_impressions ?? '';
            document.getElementById('performanceAdClicks').value = item.ad_clicks ?? '';
            document.getElementById('performanceAdOrders').value = item.ad_orders ?? '';
            document.getElementById('performanceAdSpend').value = item.ad_spend ?? '';
            document.getElementById('performanceAdSales').value = item.ad_sales_amount ?? '';
            document.getElementById('performanceRefundAmount').value = item.refund_amount ?? '';
            document.getElementById('performanceSubCategoryRank').value = item.sub_category_rank ?? '';
        }

        function openCreatePerformanceModal() {
            state.performanceEditId = null;
            document.getElementById('performance-modal-title').innerText = '新增产品表现记录';
            fillPerformanceModal({});
            document.getElementById('performanceRecordDate').value = new Date().toISOString().slice(0, 10);
            resetPerformanceStatus();
            renderPerformanceSkuSuggestions();
            document.getElementById('performance-modal').classList.add('active');
        }

        function openEditPerformanceModal(id) {
            const item = (state.performanceItems || []).find(x => String(x.id) === String(id));
            if (!item) return;
            state.performanceEditId = id;
            document.getElementById('performance-modal-title').innerText = '编辑产品表现记录';
            fillPerformanceModal(item);
            resetPerformanceStatus();
            renderPerformanceSkuSuggestions();
            document.getElementById('performance-modal').classList.add('active');
        }

        function closePerformanceModal() {
            document.getElementById('performance-modal').classList.remove('active');
            state.performanceEditId = null;
        }

        function saveSalesProductPerformanceFromModal() {
            const payload = {
                platform_sku: document.getElementById('performancePlatformSku').value.trim(),
                record_date: document.getElementById('performanceRecordDate').value,
                sales_qty: document.getElementById('performanceSalesQty').value,
                net_sales_amount: document.getElementById('performanceNetSales').value,
                order_qty: document.getElementById('performanceOrderQty').value,
                session_total: document.getElementById('performanceSessionTotal').value,
                ad_impressions: document.getElementById('performanceAdImpressions').value,
                ad_clicks: document.getElementById('performanceAdClicks').value,
                ad_orders: document.getElementById('performanceAdOrders').value,
                ad_spend: document.getElementById('performanceAdSpend').value,
                ad_sales_amount: document.getElementById('performanceAdSales').value,
                refund_amount: document.getElementById('performanceRefundAmount').value,
                sub_category_rank: document.getElementById('performanceSubCategoryRank').value
            };
            if (!payload.platform_sku || !payload.record_date) {
                showPerformanceStatus('请填写销售平台SKU和日期', true);
                return;
            }
            if (state.performanceEditId) payload.id = state.performanceEditId;

            fetch('/api/sales-product-performance', {
                method: state.performanceEditId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                credentials: 'include'
            }).then(r => r.json()).then(data => {
                if (data.status !== 'success') {
                    showPerformanceStatus(data.message || '保存失败', true);
                    return;
                }
                closePerformanceModal();
                loadSalesProductPerformanceList();
                if (state.dashboardQueried) loadDashboard();
            }).catch(err => showPerformanceStatus('请求失败: ' + err, true));
        }

        async function deleteSalesProductPerformance(id) {
            const ok = await confirmPerfDialog('确认删除该产品表现记录？', '删除确认');
            if (!ok) return;
            fetch('/api/sales-product-performance', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id }),
                credentials: 'include'
            }).then(r => r.json()).then(data => {
                if (data.status !== 'success') {
                    alertPerfDialog(data.message || '删除失败', '删除失败');
                    return;
                }
                showPerfDialog({ title: '删除成功', message: '记录已删除。' });
                loadSalesProductPerformanceList(state.performancePage);
                if (state.dashboardQueried) loadDashboard();
            }).catch(err => alertPerfDialog('删除失败: ' + err, '删除失败'));
        }

        function uploadSalesProductPerformanceTemplate(file, reuseTaskId) {
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            const taskId = reuseTaskId || buildImportTaskId();
            showUploadProgress('正在上传模板...', 35);
            startImportProgressPolling(taskId);
            fetchJsonSafe(`/api/sales-product-performance-import?task_id=${encodeURIComponent(taskId)}&async=1`, {
                method: 'POST',
                body: formData,
                credentials: 'include',
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            }, 25000).then(data => {
                if (data.status !== 'success') {
                    hideUploadProgress();
                    const failMsg = data.message || '导入失败';
                    showImportResultPanel('导入失败', failMsg, data, true);
                    return;
                }
                if (data.async) {
                    showUploadProgress('上传完成，后台正在处理数据...', 8);
                    waitImportTaskDone(taskId).then(finalData => {
                        const upserted = Number(finalData.upserted || 0);
                        const skippedSku = Number(finalData.skipped_unmatched_sku || 0);
                        const skippedId = Number(finalData.skipped_empty_identifier || 0);
                        const skippedDate = Number(finalData.skipped_invalid_date || 0);
                        const skippedSample = Number(finalData.skipped_template_sample || 0);
                        const skippedZero = Number(finalData.skipped_all_zero || 0);
                        const aggWarn = String(finalData.agg_refresh_warning || '').trim();
                        const bgAgg = !!(finalData.agg_refresh_background || finalData.agg_refresh_status === 'running');
                        const errList = finalData.errors || [];
                        const stopReasonText = getImportStopReasonText(finalData);
                        hideUploadProgress();
                        const summaryLine = `匹配 ${Number(finalData.created || 0)} 条，写入 ${upserted} 条，未匹配SKU ${skippedSku} 条，空标识 ${skippedId} 条，日期无效 ${skippedDate} 条，示例行跳过 ${skippedSample} 条，全0行跳过 ${skippedZero} 条，失败 ${errList.length} 条`;
                        const okLine = aggWarn
                            ? `导入完成：${summaryLine}（周/月聚合未完全刷新）`
                            : (bgAgg
                                ? `导入完成：${summaryLine}（周/月聚合后台刷新中）`
                                : `导入完成：${summaryLine}`);
                        window.showAppToast && window.showAppToast(okLine, false, aggWarn ? 6200 : (bgAgg ? 5200 : 4200));
                        showImportResultPanel('导入完成', `${summaryLine}${aggWarn ? `；${aggWarn}` : ''}${stopReasonText ? `；${stopReasonText}` : ''}`, finalData, false);
                        loadSalesProductPerformanceList(1);
                        if (state.dashboardQueried) loadDashboard();
                    }).catch(err => {
                        hideUploadProgress();
                        const msg = (err && err.message) ? String(err.message) : String(err);
                        const payload = err && err.importData ? err.importData : {};
                        const summary = payload && payload.message ? String(payload.message) : msg;
                        showImportResultPanel('导入失败', summary, Object.assign({ message: msg }, payload || {}), true);
                    });
                    return;
                }
                hideUploadProgress();
            }).catch(err => {
                hideUploadProgress();
                const msg = (err && err.message) ? String(err.message) : String(err);
                showImportResultPanel('导入失败', msg, { message: msg }, true);
            });
        }

        function precheckAndUploadSalesProductPerformanceTemplate(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            const taskId = buildImportTaskId();
            showUploadProgress('正在上传模板并预检...', 20);
            startImportProgressPolling(taskId);
            fetchJsonSafe(`/api/sales-product-performance-import?check_only=1&task_id=${encodeURIComponent(taskId)}`, {
                method: 'POST',
                body: formData,
                credentials: 'include',
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            }, 25000).then(data => {
                hideUploadProgress();
                if (data.status !== 'success') {
                    const failMessage = data.message || '预检失败';
                    showImportResultPanel('预检失败', failMessage, data, true);
                    return;
                }
                const summaryText = `预检完成：可匹配 ${data.created || 0} 条，未匹配SKU ${data.skipped_unmatched_sku || 0} 条，空标识 ${data.skipped_empty_identifier || 0} 条，日期无效 ${data.skipped_invalid_date || 0} 条，示例行跳过 ${data.skipped_template_sample || 0} 条，全0行跳过 ${data.skipped_all_zero || 0} 条`;
                showImportResultPanel('预检通过', summaryText, {
                    message: summaryText,
                    created: data.created,
                    skipped_unmatched_sku: data.skipped_unmatched_sku,
                    skipped_empty_identifier: data.skipped_empty_identifier,
                    skipped_invalid_date: data.skipped_invalid_date,
                    skipped_template_sample: data.skipped_template_sample,
                    skipped_all_zero: data.skipped_all_zero,
                }, false);
                window.showAppToast && window.showAppToast(summaryText, false, 4200);
                uploadSalesProductPerformanceTemplate(file, taskId);
            }).catch(err => {
                hideUploadProgress();
                const msg = (err && err.message) ? String(err.message) : String(err);
                showImportResultPanel('预检失败', '预检失败: ' + msg, { message: msg }, true);
            });
        }

        function bindEvents() {
            document.addEventListener('click', e => {
                if (!e.target.closest('.check-select')) {
                    document.querySelectorAll('.check-select').forEach(x => x.classList.remove('open'));
                }
            });

            document.getElementById('btnQuery').addEventListener('click', loadDashboard);
            document.getElementById('btnReset').addEventListener('click', async () => {
                setTodayRange();
                Object.keys(state.filterDefs).forEach(name => {
                    state.filterDefs[name].selected = new Set();
                    renderFilterOptions(state.filterDefs[name]);
                    refreshFilterTrigger(state.filterDefs[name]);
                });
                state.metricOrder = getDefaultMetricOrder();
                renderMetricCheckboxBar();
                state.dashboardQueried = false;
                document.getElementById('dataStatus').textContent = '筛选已重置，请点击查询';
                document.getElementById('groupContainer').innerHTML = '<div class="perf-panel-caption">货号分组明细</div><p class="status-tip">请先设置条件后点击查询</p>';
                hideChartDetailPanel();
                renderChart([], []);
            });

            document.getElementById('toggleTodos').addEventListener('change', () => {
                if (state.dashboardQueried) loadDashboard();
            });
            document.getElementById('toggleAds').addEventListener('change', () => {
                if (state.dashboardQueried) loadDashboard();
            });
            const granSel = document.getElementById('chartGranularity');
            if (granSel) {
                granSel.addEventListener('change', function() {
                    state.chartGranularity = String(this.value || 'day');
                    saveChartGranularityToStorage(state.chartGranularity);
                    const titleEl = document.getElementById('chartTitle');
                    if (titleEl) titleEl.textContent = getChartTitleByGranularity(state.chartGranularity);
                    if (state.dashboardQueried) loadDashboard();
                });
            }

            document.getElementById('btnPerfSearch').addEventListener('click', () => loadSalesProductPerformanceList(1));
            document.getElementById('btnPerfReset').addEventListener('click', () => {
                document.getElementById('performanceSearchInput').value = '';
                loadSalesProductPerformanceList(1);
            });
            document.getElementById('btnPerfTemplate').addEventListener('click', () => {
                window.location.href = '/api/sales-product-performance-template';
            });
            document.getElementById('btnPerfImport').addEventListener('click', () => {
                document.getElementById('salesProductPerformanceUploadInput').click();
            });
            document.getElementById('salesProductPerformanceUploadInput').addEventListener('change', function() {
                const f = this.files && this.files[0];
                if (f) precheckAndUploadSalesProductPerformanceTemplate(f);
                this.value = '';
            });
            document.getElementById('btnPerfCreate').addEventListener('click', openCreatePerformanceModal);
            document.getElementById('btnPerfModalCancel').addEventListener('click', closePerformanceModal);
            document.getElementById('btnPerfModalSave').addEventListener('click', saveSalesProductPerformanceFromModal);
            document.getElementById('performanceSearchInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') loadSalesProductPerformanceList(1);
            });
            document.getElementById('performance-modal').addEventListener('click', function(e) {
                if (e.target === this) closePerformanceModal();
            });
            document.getElementById('perf-dialog-modal').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
        }

        async function initPage() {
            setTodayRange();
            bindChartInteractions();
            bindEvents();
            await Promise.all([loadFilters(), loadSalesProductSkuPool()]);
            state.performancePageSize = loadPerfPageSizeFromStorage();
            state.chartGranularity = loadChartGranularityFromStorage();
            const granSel = document.getElementById('chartGranularity');
            if (granSel) granSel.value = state.chartGranularity;
            const titleEl = document.getElementById('chartTitle');
            if (titleEl) titleEl.textContent = getChartTitleByGranularity(state.chartGranularity);
            document.getElementById('dataStatus').textContent = '请设置条件后点击查询';
            document.getElementById('groupContainer').innerHTML = '<div class="perf-panel-caption">货号分组明细</div><p class="status-tip">请先设置条件后点击查询</p>';
            renderChart([], []);
            await loadSalesProductPerformanceList(1);
        }

        window.openEditPerformanceModal = openEditPerformanceModal;
        window.deleteSalesProductPerformance = deleteSalesProductPerformance;

        window.addEventListener('resize', () => {
            if (!state.dashboardQueried || !state.lastDashboardPayload) return;
            if (state.resizeRenderTimer) {
                clearTimeout(state.resizeRenderTimer);
            }
            state.resizeRenderTimer = setTimeout(() => {
                const transformed = aggregateChartByGranularity(
                    state.lastDashboardPayload.chart_items || [],
                    state.lastDashboardPayload.events || [],
                    state.chartGranularity
                );
                renderChart(transformed.items || [], transformed.events || []);
                renderGroups(state.lastDashboardPayload.groups || []);
            }, 120);
        });
        window.addEventListener('load', initPage);
    </script>
    <script src="/static/js/header.js"></script>
</body>
</html>
