                        const mx = String(row.max_date || '').slice(0, 10);
                        const recordDates = [];
                        const rawDates = row.record_dates;
                        if (Array.isArray(rawDates)) rawDates.forEach(d => d && recordDates.push(String(d).slice(0, 10)));
                        tr.dataset.platformSku = String(row.platform_sku || '').trim();
                        tr.dataset.skuFamily = String(g.sku_family || '').trim();
                        tr.dataset.recordDates = recordDates.join('|');

            // 让全局 managed-table 机制接管：直接把 table 放入容器即可
            const dataRowCount = tbody.querySelectorAll('tr.perf-group-parent-row, tr.perf-group-child-item').length;

                    this.classList.toggle('open', willOpen);
                    rows.forEach(r => r.classList.toggle('open', willOpen));

            // 层级排序：绑定到 managed 生成的表头（显示箭头），并对子SKU应用同规则排序
            bindPerfGroupHierSort(table, headKeys, headColLabels);

        function bindPerfGroupHierSort(table, headKeys, headColLabels) {
            if (!table) return;
            const tbody = table.tBodies && table.tBodies[0];
            const parentRows = () => Array.from(tbody.querySelectorAll('tr.perf-group-parent-row'));
            const childRowsByKey = (key) => Array.from(tbody.querySelectorAll(`tr.perf-group-child-item[data-group-key="${key}"]`));
            const forceShowAllGroupColumns = () => {
                const tables = [table];
                tables.forEach(tb => {
                    (tb.querySelectorAll('th,td,col') || []).forEach(cell => {
                        if (!cell) return;
                        if (cell.style) {
                            cell.style.display = '';
                            cell.style.visibility = '';
                            if (cell.tagName === 'TH' || cell.tagName === 'TD') {
                                cell.style.width = '';
                                cell.style.minWidth = '';
                                cell.style.maxWidth = '';
                                cell.style.padding = '';
                                cell.style.borderWidth = '';
                            }
                        }
                        if (cell.classList) {
                            cell.classList.remove('is-hidden-col', 'pm-col-hidden', 'pm-hidden-col', 'pm-table-hide-col');
                        }
                        if (cell.dataset && (cell.tagName === 'TH' || cell.tagName === 'TD')) {
                            cell.dataset.pmColHiddenCell = '0';
                        }
                        if (cell.tagName === 'COL') {
                            cell.removeAttribute('data-pm-col-hidden');
                        }
                    });
                });
                const api = window.SitjoyManagedPmTable;
                if (api && typeof api.syncLayout === 'function') {
                    try { api.syncLayout(table); } catch (_e) {}
                }
            };

            const syncPerfGroupStickyHeadOffset = () => {
                const row1 = table.tHead && table.tHead.rows && table.tHead.rows[0];
                if (!row1) return;
                const h = Math.ceil(row1.getBoundingClientRect().height || 0);
                if (h > 0) {
                    table.style.setProperty('--perf-group-head-row1-h', `${h}px`);
                }
            };

            const syncPerfGroupManagedTable = () => {
                const wrap = table.closest('.perf-group-tree-wrap') || table.parentElement;
                const api = window.SitjoyManagedPmTable;
                if (api && typeof api.enhance === 'function' && wrap) {
                    try { api.enhance(wrap); } catch (_e) {}
                }
                if (api && typeof api.invalidateLayout === 'function') {
                    try { api.invalidateLayout(table); } catch (_e) {}
                }
                window.requestAnimationFrame(() => {
                    forceShowAllGroupColumns();
                    syncPerfGroupStickyHeadOffset();
                    if (table.tHead && table.tHead.rows && table.tHead.rows[0]) {
                        bindHeaderRow(table.tHead.rows[0]);
                    }
                    table.querySelectorAll('thead tr').forEach(r => refreshHeaderArrows(r));
                    applyHierSort();
                });
            };

            const readComparable = (tr, cellIndex) => {
                const cell = tr && tr.cells ? tr.cells[cellIndex] : null;
                const txt = String(cell ? cell.textContent : '').trim();
                if (!txt || txt === '-') return null;
                const n = Number(String(txt).replace(/[%,\s]/g, ''));
                if (Number.isFinite(n) && /[\d]/.test(txt)) return n;
                return txt;
            };

            const validSortKeys = (headKeys || []).filter(k => k && k !== '__toggle');
            const outerSortState = { key: '__rows', dir: 'desc' };
            const innerSortState = { key: '__rows', dir: 'desc' };
            const savedOuter = loadPerfGroupOuterSortFromStorage(validSortKeys);
            if (savedOuter) {
                outerSortState.key = savedOuter.key;
                outerSortState.dir = savedOuter.dir;
            }
            const savedInner = loadPerfGroupInnerSortFromStorage(validSortKeys);
            if (savedInner) {
                innerSortState.key = savedInner.key;
                innerSortState.dir = savedInner.dir;
            }

            const findBodyColIndexByKey = (manageKey) => {
                const head = table.tHead && table.tHead.rows && table.tHead.rows[0];
                if (!head) return -1;
                for (let i = 0; i < head.cells.length; i++) {
                    const k = String(head.cells[i].dataset.manageColKey || '').trim();
                    if (k && k === manageKey) return i;
                }
                return -1;
            };

            const refreshHeaderArrows = (headerRowEl) => {
                if (!headerRowEl) return;
                Array.from(headerRowEl.cells || []).forEach((th) => {
                    const k = String(th.dataset.manageColKey || '').trim();
                    th.classList.remove('pm-sortable', 'pm-sort-asc', 'pm-sort-desc');
                    if (!k || k === '__toggle') return;
                    th.classList.add('pm-sortable');
                    if (outerSortState.key !== k || !outerSortState.dir) return;
                    if (outerSortState.dir === 'asc') th.classList.add('pm-sort-asc');
                    if (outerSortState.dir === 'desc') th.classList.add('pm-sort-desc');
                });
            };

            const compareRows = (a, b, idx, dir, fallbackA, fallbackB) => {
                const av = readComparable(a, idx);
                const bv = readComparable(b, idx);
                if (av == null && bv == null) return fallbackA - fallbackB;
                if (av == null) return 1;
                if (bv == null) return -1;
                if (typeof av === 'number' && typeof bv === 'number') return dir === 'asc' ? (av - bv) : (bv - av);
                if (av === bv) return fallbackA - fallbackB;
                return dir === 'asc'
                    ? String(av).localeCompare(String(bv), 'zh-Hans-CN', { sensitivity: 'base' })
                    : String(bv).localeCompare(String(av), 'zh-Hans-CN', { sensitivity: 'base' });
            };

            const applyHierSort = () => {
                const outerIdx = findBodyColIndexByKey(outerSortState.key);
                const innerIdx = findBodyColIndexByKey(innerSortState.key);
                if (outerIdx < 0 || innerIdx < 0) return;

                const parents = parentRows();
                const origin = parents.map((tr, i) => [tr, i]);
                const mapOrigin = new Map(origin);

                const applyOrder = (orderedParents) => {
                    orderedParents.forEach(p => {
                        const key = String(p.dataset.groupKey || '');
                        tbody.appendChild(p);
                        const kids = childRowsByKey(key).slice();
                        const innerDir = innerSortState.dir === 'asc' ? 'asc' : 'desc';
                        kids.sort((a, b) => compareRows(
                            a, b, innerIdx, innerDir,
                            Number(a.dataset.sortOrigin || '0'),
                            Number(b.dataset.sortOrigin || '0')
                        ));
                        kids.forEach(k => tbody.appendChild(k));
                    });
                };

                const dir = outerSortState.dir === 'asc' ? 'asc' : 'desc';
                const sorted = parents.slice().sort((a, b) => {
                    return compareRows(a, b, outerIdx, dir, (mapOrigin.get(a) ?? 0), (mapOrigin.get(b) ?? 0));
                });
                applyOrder(sorted);
            };

            const bindSortToolbar = () => {
                const toolbar = document.getElementById('perfGroupSortToolbar');
                const outerKeyEl = document.getElementById('perfGroupOuterSortKey');
                const outerDirEl = document.getElementById('perfGroupOuterSortDir');
                const innerKeyEl = document.getElementById('perfGroupInnerSortKey');
                const innerDirEl = document.getElementById('perfGroupInnerSortDir');
                if (!toolbar || !outerKeyEl || !outerDirEl || !innerKeyEl || !innerDirEl) return;
                const optionsHtml = validSortKeys.map((k) => {
                    const idx = (headKeys || []).indexOf(k);
                    const label = (idx >= 0 && headColLabels && headColLabels[idx]) ? headColLabels[idx] : k;
                    return `<option value="${k}">${label}</option>`;
                }).join('');
                outerKeyEl.innerHTML = optionsHtml;
                innerKeyEl.innerHTML = optionsHtml;
                outerKeyEl.value = outerSortState.key;
                outerDirEl.value = outerSortState.dir;
                innerKeyEl.value = innerSortState.key;
                innerDirEl.value = innerSortState.dir;
                const onToolbarChange = () => {
                    outerSortState.key = validSortKeys.includes(outerKeyEl.value) ? outerKeyEl.value : '__rows';
                    outerSortState.dir = outerDirEl.value === 'asc' ? 'asc' : 'desc';
                    innerSortState.key = validSortKeys.includes(innerKeyEl.value) ? innerKeyEl.value : '__rows';
                    innerSortState.dir = innerDirEl.value === 'asc' ? 'asc' : 'desc';
                    savePerfGroupOuterSortToStorage(outerSortState.key, outerSortState.dir);
                    savePerfGroupInnerSortToStorage(innerSortState.key, innerSortState.dir);
                    table.querySelectorAll('thead tr').forEach(r => refreshHeaderArrows(r));
                    applyHierSort();
                };
                outerKeyEl.addEventListener('change', onToolbarChange);
                outerDirEl.addEventListener('change', onToolbarChange);
                innerKeyEl.addEventListener('change', onToolbarChange);
                innerDirEl.addEventListener('change', onToolbarChange);
            };

            const bindHeaderRow = (headerRowEl) => {
                if (!headerRowEl || headerRowEl.dataset.perfGroupSortBound === '1') return;
                headerRowEl.dataset.perfGroupSortBound = '1';
                refreshHeaderArrows(headerRowEl);
                Array.from(headerRowEl.cells || []).forEach((th) => {
                    const manageKey = String(th.dataset.manageColKey || '').trim();
                    if (!manageKey || manageKey === '__toggle') return;
                    th.style.cursor = 'pointer';
                    th.addEventListener('click', (e) => {
                    if (e.target && e.target.closest && e.target.closest('button,input,select,textarea,a,label')) return;
                    e.preventDefault();
                    e.stopPropagation();
                    if (outerSortState.key !== manageKey) {
                        outerSortState.key = manageKey;
                        outerSortState.dir = 'desc';
                    } else if (outerSortState.dir === 'desc') {
                        outerSortState.dir = 'asc';
                    } else {
                        outerSortState.dir = 'desc';
                    }
                    // 同步表头排序箭头
                    table.querySelectorAll('thead tr').forEach(r => refreshHeaderArrows(r));
                    const outerKeyEl = document.getElementById('perfGroupOuterSortKey');
                    const outerDirEl = document.getElementById('perfGroupOuterSortDir');
                    if (outerKeyEl) outerKeyEl.value = outerSortState.key;
                    if (outerDirEl) outerDirEl.value = outerSortState.dir;
                    savePerfGroupOuterSortToStorage(outerSortState.key, outerSortState.dir);
                    applyHierSort();
                    });
                });
            };

            // 表头绑定（供 managed 同步列序与层级排序）
            if (table.tHead && table.tHead.rows && table.tHead.rows[0]) {
                bindHeaderRow(table.tHead.rows[0]);
            }
            window.setTimeout(syncPerfGroupManagedTable, 0);
            bindSortToolbar();
            applyHierSort();
            forceShowAllGroupColumns();
        }

        function normalizePerfPageSize(rawValue, fallback) {
            const allowed = [20, 50, 100, 300, 500, 1000];
            const raw = String(rawValue == null ? '' : rawValue).trim();
            const parsed = Number(raw);
            if (allowed.includes(parsed)) return parsed;
            const fb = Number(fallback);
            if (allowed.includes(fb)) return fb;
            return 50;
        }

        // -------------------------------------------------------------------------
        // 看板数据加载与展示
        // -------------------------------------------------------------------------

        function renderDashboardPayload(data) {
            const payload = data || {};
            state.lastDashboardPayload = {
                chart_items: payload.chart_items || [],
                events: payload.events || [],
                groups: payload.groups || [],
                groups_by_bucket: payload.groups_by_bucket || {}
            };
            // 建立“桶 -> 真实范围”的映射（用于截断桶显示）
            state.bucketRangeByDate = {};
            (state.lastDashboardPayload.chart_items || []).forEach(it => {
                const k = String(it.record_date || '').slice(0, 10);
                const rs = String(it.range_start || '').slice(0, 10);
                const re = String(it.range_end || '').slice(0, 10);
                if (k && rs && re) state.bucketRangeByDate[k] = { start: rs, end: re };
            });

        /** 导入是否处于「明细已入库、后台周/月聚合」阶段（此阶段禁止自动重启导入） */
        function isSalesPerfAggRefreshPhase(data) {
            const payload = data && typeof data === 'object' ? data : {};
            const phase = String(payload.phase || '').toLowerCase();
            const aggStatus = String(payload.agg_refresh_status || '').toLowerCase();
            return aggStatus === 'running' || phase === 'agg_refresh' || phase === 'agg_refresh_pending';
        }

        /** 是否允许对当前任务触发「重启导入」（仅写库阶段卡死时） */
        function canRestartSalesPerfImportTask(data) {
            const payload = data && typeof data === 'object' ? data : {};
            if (isSalesPerfAggRefreshPhase(payload)) return false;
            const state = String(payload.state || '').toLowerCase();
            if (state === 'success' || state === 'error') return false;
            const phase = String(payload.phase || '').toLowerCase();
            const writable = ['writing', 'writing_retry', 'restart', 'iter_rows', 'loading_sku_map', 'start', 'running', ''];
            return writable.includes(phase);
        }

        function importProgressFreshnessKey(data) {
            const payload = data && typeof data === 'object' ? data : {};
            const aggStep = Number(payload.agg_refresh_step || 0);
            const aggTotal = Number(payload.agg_refresh_total || 0);
            const alive = String(payload.progress_alive_ts || payload.advance_ts || payload.hb_ts || payload.ts || '').trim();
            return `${alive}|${aggStep}/${aggTotal}|${String(payload.message || '').trim()}`;
        }

        function formatImportProgressLabel(data) {
            const payload = data && typeof data === 'object' ? data : {};
            const total = Number(payload.total_rows || 0);
            const done = Number(payload.processed_rows || 0);
            const msg = String(payload.message || '').trim();
            const state = String(payload.state || '').toLowerCase();
            const hbStage = String(payload.hb_stage || '').trim();
            const hbPhase = String(payload.hb_phase || '').trim();
            const aggStatus = String(payload.agg_refresh_status || '').toLowerCase();
            const aggStep = Number(payload.agg_refresh_step || 0);
            const aggTotal = Number(payload.agg_refresh_total || 0);
            if (aggStatus === 'running' && aggTotal > 0) {
                const pct = Math.min(99, Math.max(1, Math.floor((aggStep / aggTotal) * 100)));
                return msg || `周/月聚合刷新中 ${aggStep}/${aggTotal}（约 ${pct}%）`;
            }
            if (msg) return msg;
            if (state === 'pending' && (hbStage || hbPhase)) {
                const hint = hbStage || hbPhase;
                return `准备中（${hint}）…`;
            }
            if (total > 0) return `正在处理数据… ${done}/${total}`;
            return `正在处理数据… 已处理 ${done} 行`;
        }

        function applyImportProgressUi(data) {
            const payload = data && typeof data === 'object' ? data : {};
            const total = Number(payload.total_rows || 0);
            const done = Number(payload.processed_rows || 0);
            let percent = total > 0 ? Math.floor((done / total) * 100) : 0;
            const aggStatus = String(payload.agg_refresh_status || '').toLowerCase();
            const aggTotal = Number(payload.agg_refresh_total || 0);
            const aggStep = Number(payload.agg_refresh_step || 0);
            if (isSalesPerfAggRefreshPhase(payload) && aggTotal > 0) {
                percent = Math.min(99, Math.max(percent, Math.floor((aggStep / aggTotal) * 100)));
            } else if (String(payload.state || '').toLowerCase() === 'pending') {
                percent = Math.max(percent, 5);
            }
            const aliveTs = String(payload.progress_alive_ts || payload.advance_ts || payload.hb_ts || '').trim();
            const label = formatImportProgressLabel(payload);
            showUploadProgress(aliveTs ? `${label}（${aliveTs}）` : label, Math.max(1, Math.min(99, percent)));
        }

        async function tryRestartSalesPerfImport(taskId, reason) {
            const restartReason = String(reason || 'stale_progress').trim() || 'stale_progress';
            try {
                const resp = await fetchJsonSafe(
                    `/api/sales-product-performance-import?mode=restart&force=1&reason=${encodeURIComponent(restartReason)}&task_id=${encodeURIComponent(taskId)}`,
                    {
                        method: 'GET',
                        credentials: 'include',
                        headers: { 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest' }
                    },
                    12000
                );
                const ok = String(resp.status || '').toLowerCase() === 'success';
                if (ok && !resp.skip_restart) {
                    window.showAppToast && window.showAppToast(resp.message || '已触发后台恢复写入', false, 3200);
                }
            } catch (e) {
                const msg = (e && e.message) ? String(e.message) : String(e);
                window.showAppToast && window.showAppToast(`触发重启失败：${msg}`, true, 4200);
            }
        }

        /** SSE 推送导入进度（不支持时自动回退长轮询） */
        function watchSalesPerfImportTask(taskId) {
            return new Promise((resolve, reject) => {
                let restartRequested = false;
                let aggSlowWarned = false;
                let lastProgressPayload = null;
                let staleTimer = null;

                function armStaleCheck() {
                    if (staleTimer) window.clearTimeout(staleTimer);
                    staleTimer = window.setTimeout(() => {
                        if (restartRequested) return;
                        if (!lastProgressPayload || !canRestartSalesPerfImportTask(lastProgressPayload)) return;
                        restartRequested = true;
                        window.showAppToast && window.showAppToast('写库进度长时间无更新，尝试从断点恢复…', true, 3200);
                        tryRestartSalesPerfImport(taskId, 'stale_progress');
                        window.setTimeout(() => { restartRequested = false; }, 30000);
                    }, 110000);
                }

                const api = window.SitjoyTaskProgress;
                if (!api || typeof api.watch !== 'function') {
                    reject(new Error('进度组件未加载，请刷新页面'));
                    return;
                }

                api.watch({
                    url: '/api/sales-product-performance-import',
                    taskId,
                    timeoutMs: 1000 * 60 * 90,
                    waitTimeoutMs: 28000,
                    fetchJson: fetchJsonSafe,
                    onProgress(data) {
                        lastProgressPayload = data;
                        applyImportProgressUi(data);
                        armStaleCheck();
                        if (isSalesPerfAggRefreshPhase(data) && !aggSlowWarned) {
                            aggSlowWarned = true;
                            window.showAppToast && window.showAppToast('周/月聚合较慢，请耐心等待（明细已入库）', false, 4200);
                        }
                    },
                    onDone(data) {
                        if (staleTimer) window.clearTimeout(staleTimer);
                        resolve(data);
                    },
                    onError(err, data) {
                        if (staleTimer) window.clearTimeout(staleTimer);
                        if (data && String(data.state || '').toLowerCase() === 'error') {
                            const e = new Error(data.message || '导入失败');
                            e.importData = data;
                            reject(e);
                            return;
                        }
                        reject(err || new Error('导入失败'));
                    },
                });
                armStaleCheck();
            });
        }

        async function fetchJsonSafe(url, options, timeoutMs) {
            const controller = new AbortController();
            const to = window.setTimeout(() => controller.abort(), Math.max(500, Number(timeoutMs || 0) || 0));
            let r;
            try {
                r = await fetch(url, { ...(options || {}), signal: controller.signal });
            } catch (e) {
                if (e && (e.name === 'AbortError' || String(e).includes('AbortError'))) {
                    throw new Error('请求超时（已中止）');
                }
                throw e;
            } finally {
                window.clearTimeout(to);
            }
            const text = await r.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                const sample = String(text || '').slice(0, 220).replace(/\s+/g, ' ').trim();
                throw new Error(`接口未返回JSON（HTTP ${r.status}）。响应片段: ${sample || '(empty)'}`);
            }
        }

        function getImportStopReasonText(data) {
            const payload = data && typeof data === 'object' ? data : {};
            const phase = String(payload.phase || '').trim();
            const retryReason = String(payload.retry_reason || '').trim();
            const checkpointRow = Number(payload.checkpoint_row || 0);
            const message = String(payload.message || '').trim();
            const reasonMap = {
                stale_ts: '进度时间戳长时间未更新',
                stale_message: '进度消息长时间未变化',
                no_response: '进度接口连续无响应/网关异常',
                retryable_db_error: '数据库写入出现可恢复异常并已触发重试',
            };
            const parts = [];
            if (retryReason) {
                parts.push(reasonMap[retryReason] || `重试原因：${retryReason}`);
            }
            if (phase) {
                const phaseMap = {
                    writing_error: '写库阶段失败',
                    restart_error: '重启导入失败',
                    restart: '已触发重启恢复',
                    writing_retry: '写库分片重试中',
                    agg_refresh: '周/月聚合刷新中',
                };
                parts.push(phaseMap[phase] || `阶段：${phase}`);
            }
            if (checkpointRow > 0) {
                parts.push(`断点行号：${checkpointRow}`);
            }
            if (!parts.length && message) {
                parts.push(message);
            }
            return parts.length ? parts.join('；') : '原因未知';
        }

        function showImportResultPanel(title, summary, data, isError) {
            const payload = data && typeof data === 'object' ? data : {};
            const details = [];
            const stopReason = getImportStopReasonText(payload);
            if (summary) details.push(summary);
            if (stopReason) details.push(`停止原因：${stopReason}`);
            if (String(payload.message || '').trim() && String(payload.message || '').trim() !== summary) {
                details.push(`消息：${String(payload.message || '').trim()}`);
            }
            if (Array.isArray(payload.errors) && payload.errors.length) {
                payload.errors.slice(0, 6).forEach(errItem => {
                    if (typeof errItem === 'string') {
                        details.push(errItem);
                    } else if (errItem && typeof errItem === 'object') {
                        details.push(`第${errItem.row || '-'}行：${errItem.error || errItem.warning || '处理失败'}`);
                    }
                });
            }
            // 统一：成功走 toast（绿色），失败才弹 result panel（若可用）
            if (!isError) {
                window.showAppToast && window.showAppToast(`${title || '导入完成'}：${summary || ''}`.trim(), false, 4200);
                return;
            }
            if (window.showAppResultPanel) {
                window.showAppResultPanel({
                    title: String(title || '导入失败'),
                    summary: String(summary || '').trim(),
                    details,
                    isError: true,
                });
            } else if (window.showAppToast) {
                window.showAppToast(`${title || '导入失败'}：${summary || stopReason}`, true, 5200);
            }
        }

        function syncPerfSelectAllCheckbox() {
            const masters = getPerfSelectAllCheckboxes();

            if (!checkboxes.length) {
                masters.forEach(master => {
                    master.checked = false;
                    master.indeterminate = false;
                });
                return;
            }
            const checkedCount = checkboxes.filter(cb => cb.checked).length;
            const allChecked = checkedCount > 0 && checkedCount === checkboxes.length;
            const partial = checkedCount > 0 && checkedCount < checkboxes.length;
            masters.forEach(master => {
                master.checked = allChecked;
                master.indeterminate = partial;
            });
        }

        async function loadSalesProductSkuPool() {
            const r = await fetch('/api/sales-product', { credentials: 'include' });
            const d = await r.json();
            if (d.status === 'success') {
                state.performanceSkuPool = (d.items || []).map(x => String(x.platform_sku || '').trim()).filter(Boolean);
                renderPerformanceSkuSuggestions();
            }
        }

        function loadSalesProductPerformanceList(page, options) {
            initPerfManagedTable();
            const M = window.SitjoyManagedPmTable;
            const normPageSize = (v, fb) => (M && typeof M.normalizePageSize === 'function')
                ? M.normalizePageSize(v, fb, 10, 200)
                : normalizePerfPageSize(v, fb);
            const nextPage = Math.max(1, Number(page || state.performancePage || 1));
            state.performancePage = nextPage;
            const table = document.getElementById('salesProductPerformanceTable');
            const toolbar = M && typeof M.getToolbar === 'function' ? M.getToolbar(table) : null;
            const toolbarSelect = toolbar ? toolbar.querySelector('.pm-table-page-size') : null;
            const forcedPageSize = options && Number(options.pageSize) > 0
                ? Math.max(10, Number(options.pageSize))
                : null;
            if (forcedPageSize) {
                state.performancePageSize = normPageSize(forcedPageSize, state.performancePageSize || 50);
            } else {
                let effective = normPageSize(state.performancePageSize || 50, 50);
                if (toolbarSelect) {
                    effective = normPageSize(toolbarSelect.value, effective);
                }
                state.performancePageSize = effective;
            }
            if (table && M && typeof M.updateServerPagerDataset === 'function') {
                M.updateServerPagerDataset(table, { page: nextPage, pageSize: state.performancePageSize });
            }
            const q = (document.getElementById('performanceSearchInput').value || '').trim();
            const shopIds = getRecordManageShopIds();
            const params = new URLSearchParams();
            if (q) params.set('q', q);
            params.set('page', String(nextPage));
            params.set('page_size', String(state.performancePageSize));
            if (shopIds.length) params.set('shop_ids', shopIds.join(','));
            const url = `/api/sales-product-performance?${params.toString()}`;
            fetch(url, { credentials: 'include' }).then(r => r.json()).then(data => {
                const tbody = document.querySelector('#salesProductPerformanceTable tbody');
                if (data.status !== 'success') {
                    tbody.innerHTML = `<tr><td colspan="${PERF_TABLE_COLSPAN}" style="text-align:center; color:#a33;">${data.message || '加载失败'}</td></tr>`;
                    state.performanceTotal = 0;
                    state.performanceTotalPages = 1;
                    syncPerfManagedTablePager();
                    return;
                }
                state.performanceItems = data.items || [];
                state.performancePage = Number(data.page || nextPage || 1);
                state.performancePageSize = Number(data.page_size || state.performancePageSize || 50);
                state.performanceTotal = Number(data.total || 0);
                state.performanceTotalPages = Number(data.total_pages || 1);
                if (table) {
                    table.dataset.serverPaginationMode = 'server';
                    table.dataset.serverCurrentPage = String(state.performancePage || 1);
                    table.dataset.serverPageSize = String(state.performancePageSize || 50);
                    table.dataset.serverTotalRows = String(state.performanceTotal || 0);
                }
                renderSalesProductPerformanceTable(state.performanceItems);
                syncPerfManagedTablePager();
            }).catch(err => {
                const tbody = document.querySelector('#salesProductPerformanceTable tbody');
                tbody.innerHTML = `<tr><td colspan="${PERF_TABLE_COLSPAN}" style="text-align:center; color:#a33;">加载失败: ${err}</td></tr>`;
                state.performanceTotal = 0;
                state.performanceTotalPages = 1;
                if (table) {
                    table.dataset.serverPaginationMode = 'server';
                    table.dataset.serverCurrentPage = String(state.performancePage || 1);
                    table.dataset.serverPageSize = String(state.performancePageSize || 50);
                    table.dataset.serverTotalRows = '0';
                }
                syncPerfManagedTablePager();
            });
        }

        function saveSalesProductPerformanceFromModal() {
            const payload = {
                platform_sku: document.getElementById('performancePlatformSku').value.trim(),
                record_date: document.getElementById('performanceRecordDate').value,
                sales_qty: document.getElementById('performanceSalesQty').value,
                net_sales_amount: document.getElementById('performanceNetSales').value,
                order_qty: document.getElementById('performanceOrderQty').value,
                session_total: document.getElementById('performanceSessionTotal').value,
                ad_impressions: document.getElementById('performanceAdImpressions').value,
                ad_clicks: document.getElementById('performanceAdClicks').value,
                ad_orders: document.getElementById('performanceAdOrders').value,
                ad_spend: document.getElementById('performanceAdSpend').value,
                ad_sales_amount: document.getElementById('performanceAdSales').value,
                refund_amount: document.getElementById('performanceRefundAmount').value
            };
            if (!payload.platform_sku || !payload.record_date) {
                showPerformanceStatus('请填写销售平台SKU和日期', true);
                return;
            }
            if (state.performanceEditId) payload.id = state.performanceEditId;

            fetch('/api/sales-product-performance', {
                method: state.performanceEditId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                credentials: 'include'
            }).then(r => r.json()).then(data => {
                if (data.status !== 'success') {
                    showPerformanceStatus(data.message || '保存失败', true);
                    return;
                }
                closePerformanceModal();
                loadSalesProductPerformanceList();
                if (state.dashboardQueried) loadDashboard();
            }).catch(err => showPerformanceStatus('请求失败: ' + err, true));
        }

        async function deleteSalesProductPerformance(id) {
            const ok = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({ title: '删除确认', message: '确认删除该产品表现记录？', confirmText: '确认删除' })
                : await confirmPerfDialog('确认删除该产品表现记录？', '删除确认');
            if (!ok) return;
            fetch('/api/sales-product-performance', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id }),
                credentials: 'include'
            }).then(r => r.json()).then(data => {
                if (data.status !== 'success') {
                    if (window.showAppToast) window.showAppToast(data.message || '删除失败', true, 3200);
                    else alertPerfDialog(data.message || '删除失败', '删除失败');
                    return;
                }
                state.selectedPerformanceIds.delete(String(id));
                if (window.showAppToast) window.showAppToast('记录已删除', false, 2200);
                loadSalesProductPerformanceList(state.performancePage);
                if (state.dashboardQueried) loadDashboard();
            }).catch(err => {
                if (window.showAppToast) window.showAppToast('删除失败: ' + err, true, 3200);
                else alertPerfDialog('删除失败: ' + err, '删除失败');
            });
        }

        function handleSalesProductPerformanceBatchDelete(ids) {
            const payloadIds = Array.isArray(ids)
                ? ids.map(v => Number(v)).filter(v => Number.isFinite(v) && v > 0)
                : [];
            if (!payloadIds.length) {
                if (window.showAppToast) window.showAppToast('没有可删除的有效记录', true, 2400);
                return;
            }
            fetch('/api/sales-product-performance', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids: payloadIds }),
                credentials: 'include'
            }).then(r => r.json()).then(data => {
                if (data.status !== 'success') {
                    if (window.showAppToast) window.showAppToast(data.message || '批量删除失败', true, 3200);
                    return;
                }
                payloadIds.forEach(id => state.selectedPerformanceIds.delete(String(id)));
                const deleted = Number(data.deleted || payloadIds.length);
                if (window.showAppToast) window.showAppToast(`批量删除成功：${deleted} 条`, false, 2200);
                syncPerfSelectAllCheckbox();
                syncPerfManagedBatchBar();
                loadSalesProductPerformanceList(state.performancePage);
                if (state.dashboardQueried) loadDashboard();
            }).catch(err => {
                if (window.showAppToast) window.showAppToast('批量删除失败: ' + err, true, 3200);
            });
        }

        function uploadSalesProductPerformanceTemplate(file, reuseTaskId, shopId) {
            if (!file) return;
            const importShopId = String(shopId || state.pendingPerfImportShopId || '').trim();
            if (!importShopId) {
                openPerfImportShopModal(file);
                return;
            }
            const formData = new FormData();
            formData.append('file', file);
            formData.append('shop_id', importShopId);
            const taskId = reuseTaskId || buildImportTaskId();
            showUploadProgress('正在上传模板...', 35);
            fetchJsonSafe(`/api/sales-product-performance-import?task_id=${encodeURIComponent(taskId)}&async=1&shop_id=${encodeURIComponent(importShopId)}`, {
                method: 'POST',
                body: formData,
                credentials: 'include',
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            }, Math.max(60000, precheckImportTimeoutMs(file))).then(data => {
                if (data.status !== 'success') {
                    hideUploadProgress();
                    const failMsg = data.message || '导入失败';
                    showImportResultPanel('导入失败', failMsg, data, true);
                    return;
                }
                if (data.async) {
                    showUploadProgress('上传完成，等待后台处理…', 8);
                    watchSalesPerfImportTask(taskId).then(finalData => {
                        const upserted = Number(finalData.upserted || 0);
                        const skippedSku = Number(finalData.skipped_unmatched_sku || 0);
                        const skippedId = Number(finalData.skipped_empty_identifier || 0);
                        const skippedDate = Number(finalData.skipped_invalid_date || 0);
                        const skippedSample = Number(finalData.skipped_template_sample || 0);
                        const skippedZero = Number(finalData.skipped_all_zero || 0);
                        const aggWarn = String(finalData.agg_refresh_warning || '').trim();
                        const aggStatus = String(finalData.agg_refresh_status || '').toLowerCase();
                        const errList = finalData.errors || [];
                        const stopReasonText = getImportStopReasonText(finalData);
                        hideUploadProgress();
                        const summaryLine = `匹配 ${Number(finalData.created || 0)} 条，写入 ${upserted} 条，未匹配SKU ${skippedSku} 条，空标识 ${skippedId} 条，日期无效 ${skippedDate} 条，示例行跳过 ${skippedSample} 条，全0行跳过 ${skippedZero} 条，失败 ${errList.length} 条`;
                        const okLine = aggWarn
                            ? `导入完成：${summaryLine}（周/月聚合未完全刷新）`
                            : (aggStatus === 'error'
                                ? `导入完成：${summaryLine}（周/月聚合刷新异常，请看详情）`
                                : `导入完成：${summaryLine}（周/月聚合已刷新）`);
                        window.showAppToast && window.showAppToast(okLine, false, aggWarn ? 6200 : 4200);
                        showImportResultPanel('导入完成', `${summaryLine}${aggWarn ? `；${aggWarn}` : ''}${stopReasonText ? `；${stopReasonText}` : ''}`, finalData, false);
                        loadSalesProductPerformanceList(1);
                        if (state.dashboardQueried) loadDashboard();
                    }).catch(err => {
                        hideUploadProgress();
                        const msg = (err && err.message) ? String(err.message) : String(err);
                        const payload = err && err.importData ? err.importData : {};
                        const summary = payload && payload.message ? String(payload.message) : msg;
                        showImportResultPanel('导入失败', summary, Object.assign({ message: msg }, payload || {}), true);
                    });
                    return;
                }
                hideUploadProgress();
            }).catch(err => {
                hideUploadProgress();
                const msg = (err && err.message) ? String(err.message) : String(err);
                showImportResultPanel('导入失败', msg, { message: msg }, true);
            });
        }

        function precheckImportTimeoutMs(file) {
            const size = file && file.size ? Number(file.size) : 0;
            // 预检为同步请求：含上传、解析、SKU 映射；大文件在 NAS 上需更长时间
            return Math.min(600000, Math.max(120000, 120000 + Math.ceil(size / (512 * 1024)) * 20000));
        }

        function precheckAndUploadSalesProductPerformanceTemplate(file, shopId) {
            if (!file) return;
            const importShopId = String(shopId || state.pendingPerfImportShopId || '').trim();
            if (!importShopId) {
                openPerfImportShopModal(file);
                return;
            }
            const formData = new FormData();
            formData.append('file', file);
            formData.append('shop_id', importShopId);
            const taskId = buildImportTaskId();
            showUploadProgress('正在上传模板并预检（抽样前100行）...', 20);
            fetchJsonSafe(`/api/sales-product-performance-import?check_only=1&task_id=${encodeURIComponent(taskId)}&shop_id=${encodeURIComponent(importShopId)}`, {
                method: 'POST',
                body: formData,
                credentials: 'include',
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            }, precheckImportTimeoutMs(file)).then(data => {
                hideUploadProgress();
                if (data.status !== 'success') {
                    const failMessage = data.message || '预检失败';
                    showImportResultPanel('预检失败', failMessage, data, true);
                    return;
                }
                const summaryText = `预检完成：可匹配 ${data.created || 0} 条，未匹配SKU ${data.skipped_unmatched_sku || 0} 条，空标识 ${data.skipped_empty_identifier || 0} 条，日期无效 ${data.skipped_invalid_date || 0} 条，示例行跳过 ${data.skipped_template_sample || 0} 条，全0行跳过 ${data.skipped_all_zero || 0} 条`;
                showImportResultPanel('预检通过', summaryText, {
                    message: summaryText,
                    created: data.created,
                    skipped_unmatched_sku: data.skipped_unmatched_sku,
                    skipped_empty_identifier: data.skipped_empty_identifier,
                    skipped_invalid_date: data.skipped_invalid_date,
                    skipped_template_sample: data.skipped_template_sample,
                    skipped_all_zero: data.skipped_all_zero,
                }, false);
                window.showAppToast && window.showAppToast(summaryText, false, 4200);
                uploadSalesProductPerformanceTemplate(file, taskId, importShopId);
            }).catch(err => {
                hideUploadProgress();
                const msg = (err && err.message) ? String(err.message) : String(err);
                showImportResultPanel('预检失败', '预检失败: ' + msg, { message: msg }, true);
            });
        }

                && document.getElementById('btnReset')
                && document.getElementById('btnPerfSearch');

        function bindEl(id, type, handler) {
            const el = document.getElementById(id);
            if (!el) return false;
            el.addEventListener(type, handler);
            return true;

            const navEpoch = window.__sitjoyNavEpoch ?? '__initial__';
            if (window.__salesPerfBindEpoch === navEpoch) return;
            window.__salesPerfBindEpoch = navEpoch;

                    state.filterDefs[name].selected = new Set();
                    renderFilterOptions(state.filterDefs[name]);
                    refreshFilterTrigger(state.filterDefs[name]);
                });

            });

                    state.chartGranularity = String(this.value || 'day');

                    if (titleEl) titleEl.textContent = getChartTitleByGranularity(state.chartGranularity);
                    if (state.dashboardQueried) loadDashboard();

        async function initPage() {
            if (!pageDomReady()) return;
            const navEpoch = window.__sitjoyNavEpoch ?? '__initial__';
            setTodayRange();
            bindChartInteractions();
            bindEvents();
            await Promise.all([loadFilters(), loadSalesProductSkuPool()]);
            if ((window.__sitjoyNavEpoch ?? '__initial__') !== navEpoch || !pageDomReady()) return;
            state.performancePageSize = loadPerfPageSizeFromStorage();
            state.chartGranularity = loadChartGranularityFromStorage();
            const granSel = document.getElementById('chartGranularity');
            if (granSel) granSel.value = state.chartGranularity;
            const titleEl = document.getElementById('chartTitle');
            if (titleEl) titleEl.textContent = getChartTitleByGranularity(state.chartGranularity);
            const dataStatus = document.getElementById('dataStatus');
            const groupContainer = document.getElementById('groupContainer');
            if (dataStatus) dataStatus.textContent = '请设置条件后点击查询';
            if (groupContainer) groupContainer.innerHTML = '<div class="perf-panel-caption">货号分组明细</div><p class="status-tip">请先设置条件后点击查询</p>';
            renderChart([], []);
            await loadSalesProductPerformanceList(1);
        }

        window.openEditPerformanceModal = openEditPerformanceModal;
        window.deleteSalesProductPerformance = deleteSalesProductPerformance;
        window.handleSalesProductPerformanceBatchDelete = handleSalesProductPerformanceBatchDelete;

        window.addEventListener('resize', () => {
            if (!state.dashboardQueried || !state.lastDashboardPayload) return;
            if (state.resizeRenderTimer) {
                clearTimeout(state.resizeRenderTimer);
            }
            state.resizeRenderTimer = setTimeout(() => {
                const transformed = aggregateChartByGranularity(
                    state.lastDashboardPayload.chart_items || [],
                    state.lastDashboardPayload.events || [],
                    state.chartGranularity
                );
                renderChart(transformed.items || [], transformed.events || []);
                renderGroups(state.lastDashboardPayload.groups || []);
            }, 120);
        });
        window.addEventListener('load', initPage);
    </script>
    <script src="/static/js/header.js"></script>
</body>
</html>
