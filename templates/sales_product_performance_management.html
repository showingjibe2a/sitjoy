<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品表现看板</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .page-layout.single-column {
            display: grid;
            gap: 1rem;
            min-width: 0;
            max-width: 100%;
            overflow-x: hidden;
        }
        .sales-perf-card {
            color: var(--morandi-ink);
            min-width: 0;
            overflow: hidden;
        }
        .module-header {
            margin-bottom: 0.8rem;
        }
        .module-header h2 {
            margin: 0;
            color: var(--morandi-ink);
            font-size: 1.35rem;
        }
        .module-subtitle {
            margin-top: 0.28rem;
            color: var(--morandi-slate);
            font-size: 0.9rem;
        }

        .perf-filter-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.2rem;
        }
        .perf-filter-title {
            font-size: 1.08rem;
            font-weight: 800;
            color: var(--morandi-ink);
            letter-spacing: 0.02em;
        }
        .perf-filter-subtitle {
            margin-top: 0.18rem;
            color: var(--morandi-slate);
            font-size: 0.84rem;
        }

        .perf-toolbar {
            display: grid;
            gap: 0.4rem;
            padding: 0.56rem;
            border: 1px solid rgba(207, 199, 189, 0.75);
            background: #f7f4ef;
            border-radius: 10px;
        }
        .perf-toolbar-grid {
            display: grid;
            grid-template-columns: 1.45fr 1fr;
            gap: 0.42rem;
            align-items: start;
        }
        .perf-col {
            display: grid;
            gap: 0.36rem;
            min-width: 0;
        }
        .perf-col-left {
            grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
            gap: 0.4rem 0.52rem;
            align-items: center;
        }
        .perf-col-left > .perf-row {
            grid-column: 1 / -1;
        }
        .perf-col-left > .perf-filter-actions {
            grid-column: 1 / -1;
            margin-top: 0.12rem;
        }
        .perf-col + .perf-col {
            border-left: 1px dashed rgba(123, 128, 136, 0.35);
            padding-left: 0.56rem;
        }
        .perf-row {
            display: flex;
            align-items: center;
            gap: 0.24rem;
            flex-wrap: wrap;
        }
        .perf-filter-fields-row {
            display: contents;
        }
        .perf-col-left .perf-filter-label {
            color: var(--morandi-ink);
            font-weight: 700;
            font-size: 0.82rem;
            line-height: 1.2;
            width: auto;
            min-width: 0;
            flex: unset;
            white-space: nowrap;
        }
        .perf-col-left .perf-filter-fields-row .check-select,
        .perf-col-left > .check-select {
            width: 100%;
            max-width: none;
            min-width: 0;
        }
        .perf-filter-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.28rem;
        }
        .perf-row-tight {
            gap: 0.32rem;
        }
        .perf-row-title {
            color: var(--morandi-ink);
            font-weight: 700;
            width: 56px;
            min-width: 56px;
            flex: 0 0 56px;
            text-align: left;
        }
        .perf-row input[type="date"],
        .perf-row button,
        .perf-row select {
            min-height: 38px;
            border-radius: 8px;
            border: 1px solid var(--morandi-sand);
            background: #fff;
            color: var(--morandi-ink);
            padding: 0.42rem 0.62rem;
        }
        input[type="date"] {
            text-align: left;
        }
        .perf-row input[type="date"]:focus,
        .perf-row select:focus,
        .check-select-search:focus {
            outline: none;
            border-color: var(--morandi-ink);
            box-shadow: 0 0 0 3px rgba(74, 78, 87, 0.12);
        }
        .status-tip {
            color: var(--morandi-slate);
            font-size: 0.84rem;
        }
        .switch-row {
            gap: 0.75rem;
            color: var(--morandi-ink);
            font-size: 0.9rem;
        }
        .switch-row label {
            display: inline-flex;
            align-items: center;
            gap: 0.32rem;
        }
        .perf-inline-help {
            color: var(--morandi-slate);
            font-size: 0.82rem;
        }

        .check-select {
            position: relative;
            min-width: 145px;
            width: 180px;
            max-width: 210px;
        }
        .perf-col .check-select {
            min-width: 180px;
            width: 220px;
            max-width: 280px;
        }
        .perf-row-tight .check-select {
            width: 180px;
            min-width: 160px;
            max-width: 260px;
        }
        #selAdTypes.check-select {
            width: 260px;
            min-width: 240px;
            max-width: 340px;
        }
        .check-select-trigger {
            width: 100%;
            text-align: left;
            min-height: 32px;
            border-radius: 8px;
            border: 1px solid var(--morandi-sand);
            background: #fff;
            color: var(--morandi-slate);
            padding: 0.4rem 0.58rem;
            cursor: pointer;
            font-weight: 400;
        }
        .check-select.has-value .check-select-trigger {
            color: var(--morandi-ink);
        }
        .check-select-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            z-index: 45;
            min-width: 240px;
            border: 1px solid var(--morandi-sand);
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
            padding: 0.5rem;
            display: none;
        }
        /* -------------------------------------------------------------------------
         * 多选下拉（floating-dropdown-panel）
         * ------------------------------------------------------------------------- */
        .check-select.open .check-select-panel:not(.floating-dropdown-panel) {
            display: block;
        }
        .check-select-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.35rem;
            gap: 0.28rem;
        }
        .check-select-actions .btn-secondary {
            min-height: 0;
            padding: 0.2rem 0.48rem;
            font-size: 0.76rem;
            line-height: 1.25;
            border-radius: 6px;
        }
        .check-select-search {
            width: 100%;
            min-height: 30px;
            border-radius: 8px;
            border: 1px solid var(--morandi-sand);
            background: #fff;
            padding: 0.35rem 0.55rem;
            margin-bottom: 0.4rem;
        }
        .check-select-list {
            max-height: 220px;
            overflow-y: auto;
            display: grid;
            gap: 0.25rem;
        }
        #selAdTypes .check-select-list {
            max-height: 120px;
        }
        .check-select-item {
            display: flex;
            align-items: center;
            gap: 0.42rem;
            padding: 0.3rem 0.36rem;
            border-radius: 7px;
            cursor: pointer;
            color: var(--morandi-ink);
            font-size: 0.88rem;
        }
        .check-select-item span {
            white-space: normal;
            word-break: break-all;
        }
        .check-select-item:hover {
            background: #f7f4ef;
        }
        .check-select-empty {
            color: var(--morandi-slate);
            text-align: center;
            padding: 0.55rem 0.3rem;
        }

        .perf-metric-order {
            display: flex;
            flex-wrap: wrap;
            gap: 0.38rem;
        }
        .metric-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            border: 1px solid var(--morandi-sand);
            border-radius: 999px;
            padding: 0.22rem 0.44rem;
            background: #fff;
            font-size: 0.84rem;
            color: var(--morandi-ink);
        }
        .metric-chip button {
            min-height: 0;
            border-radius: 999px;
            border: 1px solid var(--morandi-sand);
            background: var(--morandi-mist);
            color: var(--morandi-ink);
            padding: 0.08rem 0.32rem;
            cursor: pointer;
        }

        .perf-panel {
            margin-top: 0.9rem;
            border: 1px solid rgba(207, 199, 189, 0.75);
            border-radius: 10px;
            background: #f7f4ef;
            padding: 0.82rem;
            color: var(--morandi-ink);
            min-width: 0;
        }
        .perf-panel-caption {
            color: var(--morandi-slate);
            font-size: 0.84rem;
            font-weight: 600;
            margin-bottom: 0.45rem;
        }
        .perf-chart-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.55rem;
            flex-wrap: wrap;
        }
        .perf-chart-granularity {
            display: inline-flex;
            align-items: center;
            gap: 0.36rem;
            color: var(--morandi-slate);
            font-size: 0.82rem;
        }
        .perf-chart-granularity select {
            min-height: 30px;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            background: #fff;
            color: var(--morandi-ink);
            font-size: 0.82rem;
            padding: 0.22rem 0.48rem;
        }
        .perf-chart-granularity .feature-category-dropdown.universal-select-dropdown {
            width: auto;
            min-width: 90px;
        }
        .perf-chart-granularity .universal-select-trigger {
            min-height: 30px;
            height: 30px;
            padding: 0.22rem 1.7rem 0.22rem 0.46rem !important;
            font-size: 0.82rem;
            border-radius: 8px;
        }
        .perf-panel h3 {
            margin: 0 0 0.5rem;
            font-size: 1.06rem;
            color: var(--morandi-ink);
        }
        .perf-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0 0 0.45rem;
            color: var(--morandi-slate);
            font-size: 0.84rem;
        }
        .perf-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .perf-legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .perf-chart-wrap {
            width: 100%;
            min-height: 308px;
            border: 1px solid rgba(207, 199, 189, 0.75);
            border-radius: 9px;
            background: #fff;
            padding: 0.5rem;
            position: relative;
            overflow: visible;
        }
        #perfChart {
            width: 100%;
            height: 300px;
            display: block;
        }
        .perf-chart-hover-line {
            position: absolute;
            top: 0.5rem;
            bottom: 0.5rem;
            width: 0;
            border-left: 1px dashed rgba(141, 106, 106, 0.95);
            pointer-events: none;
            display: none;
            z-index: 12;
        }
        .perf-event-tooltip {
            position: absolute;
            z-index: 120;
            min-width: 260px;
            max-width: 460px;
            background: #fff;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.14);
            padding: 0.58rem;
            font-size: 0.84rem;
            color: var(--morandi-ink);
            display: none;
            pointer-events: none;
            line-height: 1.42;
        }

        .perf-percent-bar {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            flex-wrap: wrap;
            justify-content: flex-end;
            color: var(--morandi-slate);
            font-size: 0.82rem;
        }
        .perf-percent-bar .perf-legend-item { color: var(--morandi-slate); }
        .perf-percent-bar .perf-legend-dot { opacity: 0.9; }
        .perf-legend-row {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            flex-wrap: wrap;
        }
        .perf-chart-detail {
            margin-top: 0.55rem;
            display: none;
            border: 1px solid rgba(207, 199, 189, 0.75);
            border-radius: 10px;
            background: #fff;
            padding: 0.72rem;
        }
        .perf-chart-detail.active {
            display: block;
        }
        .perf-chart-detail-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 0.6rem;
        }
        .perf-chart-detail-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--morandi-ink);
        }
        .perf-chart-detail-body {
            display: grid;
            gap: 0.7rem;
        }
        .perf-chart-detail-block {
            border: 1px solid rgba(207, 199, 189, 0.65);
            border-radius: 8px;
            padding: 0.62rem;
            background: #faf8f4;
        }
        .perf-chart-detail-block h4 {
            margin: 0 0 0.42rem;
            font-size: 0.92rem;
            color: var(--morandi-ink);
        }
        .perf-chart-detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
            gap: 0.42rem;
        }
        .perf-chart-detail-row {
            display: grid;
            gap: 0.08rem;
            border: 1px solid rgba(207, 199, 189, 0.62);
            border-radius: 8px;
            background: #fff;
            padding: 0.3rem 0.42rem;
            color: var(--morandi-ink);
        }
        .perf-chart-detail-row span {
            font-size: 0.76rem;
            color: var(--morandi-slate);
        }
        .perf-chart-detail-row strong {
            font-size: 0.9rem;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .perf-chart-detail-empty {
            color: var(--morandi-slate);
            font-size: 0.86rem;
        }
        .perf-chart-footer {
            margin-top: 0.45rem;
            display: flex;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 0.55rem;
            justify-content: flex-start;
        }
        .perf-chart-footer .check-select {
            width: 210px;
            max-width: 240px;
            min-width: 180px;
        }

        .perf-group details {
            border: 1px solid rgba(207, 199, 189, 0.76);
            border-radius: 8px;
            background: #fff;
            margin-bottom: 0.58rem;
            overflow: visible;
        }
        .perf-group summary {
            list-style: none;
            cursor: pointer;
            padding: 0.55rem 0.72rem;
            font-weight: 700;
            color: var(--morandi-ink);
            background: #f9f7f3;
            border-bottom: 1px solid rgba(207, 199, 189, 0.62);
        }
        .perf-group-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.35rem 0.55rem;
            align-items: center;
        }
        .perf-group-summary-item {
            display: grid;
            gap: 0.08rem;
            border: 1px solid rgba(207, 199, 189, 0.62);
            border-radius: 8px;
            background: #fff;
            padding: 0.3rem 0.45rem;
        }
        .perf-group-summary-item .label {
            font-size: 0.74rem;
            color: var(--morandi-slate);
            font-weight: 400;
        }
        .perf-group-summary-item .value {
            font-size: 0.9rem;
            color: var(--morandi-ink);
            font-weight: 700;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .perf-group-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.55rem;
        }
        .perf-group-title {
            margin: 0;
            font-size: 1.06rem;
            color: var(--morandi-ink);
            font-weight: 800;
        }
        .perf-group-meta {
            color: var(--morandi-slate);
            font-size: 0.84rem;
        }
        .perf-group-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0.15rem 0 0.55rem;
            padding: 0.22rem 0.35rem;
            border-radius: 8px;
            background: rgba(247, 244, 239, 0.42);
        }
        .perf-group-toolbar .perf-inline-help {
            font-size: 0.76rem;
            color: var(--morandi-slate);
        }
        /* -------------------------------------------------------------------------
         * 货号分组明细：内外层排序下拉
         * ------------------------------------------------------------------------- */
        #perfGroupSortToolbar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.24rem 0.4rem;
            margin: 0.32rem 0 0.48rem;
            padding: 0.18rem 0.32rem;
            border-radius: 6px;
            background: rgba(247, 244, 239, 0.55);
        }
        #perfGroupSortToolbar .perf-inline-help {
            font-size: 0.7rem;
            color: var(--morandi-slate);
            margin-right: 0.06rem;
        }
        #perfGroupSortToolbar select.perf-group-sort-select {
            font-size: 0.78rem;
            line-height: 1.35 !important;
            min-height: 34px !important;
            height: 34px !important;
            padding: 0.2rem 0.5rem !important;
            border-radius: 6px;
            border: 1px solid rgba(180, 172, 162, 0.88) !important;
            background: #fff !important;
            color: var(--morandi-ink) !important;
            box-sizing: border-box;
        }
        #perfGroupSortToolbar select.perf-group-sort-select.perf-group-sort-key {
            width: 142px;
            min-width: 120px;
            max-width: 200px;
        }
        #perfGroupSortToolbar select.perf-group-sort-select.perf-group-sort-dir {
            width: 72px;
            min-width: 72px;
        }
        .perf-group-toolbar .check-select {
            width: 120px;
            min-width: 120px;
            max-width: 150px;
        }
        .perf-group-toolbar .check-select-trigger {
            min-height: 26px;
            padding: 0.22rem 0.42rem;
            font-size: 0.8rem;
            color: var(--morandi-slate);
            background: #fffdf9;
        }
        .perf-group-toolbar .check-select-trigger.universal-select-trigger {
            padding-right: 1.35rem !important;
            text-align: left;
        }
        .perf-group-pager {
            display: inline-flex;
            align-items: center;
            gap: 0.28rem;
            flex-wrap: wrap;
        }
        .perf-group-pager .btn-secondary {
            min-height: 26px;
            padding: 0.16rem 0.38rem;
            font-size: 0.78rem;
            line-height: 1.1;
        }
        .perf-group-pager .perf-inline-help {
            font-size: 0.75rem;
        }
        .perf-group summary::-webkit-details-marker {
            display: none;
        }
        .perf-group-content {
            padding: 0.62rem;
        }
        .perf-group-header-wrap {
            margin-bottom: 0.46rem;
        }
        .perf-group-header-wrap .perf-table {
            min-width: 1180px;
        }
        .perf-group-tree-wrap {
            border: 1px solid rgba(207, 199, 189, 0.76);
            border-radius: 8px;
            background: #fff;
            max-width: 100%;
        }
        /* -------------------------------------------------------------------------
         * 分组明细托管表：工具栏与双行 sticky 表头
         * ------------------------------------------------------------------------- */
        .perf-group-tree-wrap > .pm-table-toolbar > .pm-table-toolbar-left,
        .perf-group-tree-wrap > .pm-table-toolbar .pm-table-pager {
            display: none !important;
        }
        .perf-group-tree-wrap .pm-managed-body-wrap > table#perfGroupTable > thead > tr:first-child > th {
            top: 0;
            z-index: 5;
        }
        .perf-group-tree-wrap .pm-managed-body-wrap > table#perfGroupTable > thead > tr.perf-group-grand-total-row > th {
            top: var(--perf-group-head-row1-h, 2.35rem);
            z-index: 4;
        }
        .perf-group-tree-wrap table#perfGroupTable thead tr.perf-group-grand-total-row th {
            font-size: 0.84rem;
            font-weight: 600;
            vertical-align: middle;
            background: linear-gradient(180deg, #f6faf6 0%, #edf5ee 100%);
            box-shadow: 0 1px 0 rgba(160, 175, 155, 0.45);
        }
        .perf-group-tree-wrap table#perfGroupTable thead tr.perf-group-grand-total-row .perf-group-grand-total-label {
            white-space: nowrap;
            color: var(--morandi-ink);
        }
        /* -------------------------------------------------------------------------
         * 分组明细：父行展开与 managed-table 列配置
         * ------------------------------------------------------------------------- */
        .perf-group-parent-row {
            background: #f7f4ef;
            cursor: pointer;
            font-weight: 700;
        }
        .perf-group-parent-row:hover {
            background: #f7f4ef;
        }
        .perf-group-toggle {
            border: none !important;
            border-radius: 0 !important;
            background: transparent !important;
            color: var(--morandi-slate);
            min-width: 12px !important;
            width: 12px !important;
            min-height: 12px !important;
            height: 12px !important;
            padding: 0 !important;
            margin: 0 !important;
            cursor: pointer;
            font-size: 0.72rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            outline: none;
            box-shadow: none !important;
            transform: none !important;
        }
        .perf-group-toggle:focus,
        .perf-group-toggle:focus-visible,
        .perf-group-toggle:active,
        .perf-group-toggle:hover {
            outline: none;
            box-shadow: none !important;
            border: none !important;
            background: transparent !important;
            transform: none !important;
        }
        .perf-group-toggle::before {
            content: '▸';
            font-size: 0.8rem;
            line-height: 1;
            transform: rotate(0deg);
            transition: transform 120ms ease;
            color: var(--morandi-slate);
        }
        .perf-group-toggle.open::before {
            transform: rotate(90deg);
        }
        .perf-group-parent-row td:first-child,
        .perf-group-child-item td:first-child {
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            line-height: 1 !important;
        }
        .perf-group-child-row,
        .perf-group-child-item {
            display: none;
            background: #fff;
        }
        .perf-group-child-row.open,
        .perf-group-child-item.open {
            display: table-row;
        }
        .perf-group-child-box {
            padding: 0.45rem 0.5rem;
            background: #fff;
        }
        .perf-group-child-title {
            color: var(--morandi-slate);
            font-size: 0.82rem;
            margin-bottom: 0.35rem;
        }
        .perf-group-child-box .perf-table {
            min-width: 1120px;
            font-size: 0.86rem;
        }

        .perf-table-wrap {
            overflow: auto;
            border: 1px solid rgba(207, 199, 189, 0.76);
            border-radius: 8px;
            background: #fff;
            max-width: 100%;
        }
        .perf-group-content .pm-managed-body-wrap {
            max-height: 420px;
            overflow: auto;
        }
        .perf-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 980px;
            color: var(--morandi-ink);
            font-size: 0.9rem;
        }
        .perf-table th,
        .perf-table td {
            padding: 0.42rem 0.5rem;
            border-bottom: 1px solid rgba(207, 199, 189, 0.55);
            text-align: left;
            white-space: nowrap;
        }
        .perf-table th {
            background: #f3efe9;
            color: var(--morandi-ink);
            font-weight: 700;
        }
        .perf-table th.perf-col-num,
        .perf-table td.perf-col-num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .perf-table th.perf-col-num .perf-th-head-metric {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.28rem;
            width: 100%;
        }
        /* -------------------------------------------------------------------------
         * 分组明细：单表 sticky 双行表头
         * ------------------------------------------------------------------------- */
        .perf-group-tree-wrap .pm-managed-body-wrap > table#perfGroupTable > thead > tr > th {
            background: #f3efe9;
        }
        .perf-table tr.row-focus {
            background: rgba(123, 154, 176, 0.18);
        }

        .perf-manage-toolbar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.36rem;
            margin-bottom: 0.58rem;
            font-size: 0.82rem;
            color: var(--morandi-slate);
        }
        .perf-pagination {
            margin-top: 0.5rem;
        }
        .perf-manage-toolbar input[type="text"] {
            min-height: 32px;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            background: #fff;
            color: var(--morandi-ink);
            min-width: 200px;
            padding: 0.28rem 0.48rem;
            font-size: 0.85rem;
        }
        .perf-manage-toolbar select {
            min-height: 32px;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            background: #fff;
            color: var(--morandi-ink);
            padding: 0.24rem 0.42rem;
            font-size: 0.82rem;
        }
        .perf-manage-toolbar .check-select {
            min-width: 160px;
            width: 180px;
            max-width: 220px;
        }
        .perf-manage-toolbar .check-select-trigger {
            min-height: 32px;
            padding: 0.28rem 0.48rem;
            font-size: 0.85rem;
        }
        .perf-manage-toolbar .btn-primary,
        .perf-manage-toolbar .btn-secondary,
        .perf-manage-toolbar .btn-accent {
            min-height: 32px;
            padding: 0.26rem 0.52rem;
            font-size: 0.82rem;
            line-height: 1.2;
        }
        .perf-manage-card {
            margin-top: 0.9rem;
        }
        .perf-manage-card .perf-filter-title {
            margin-bottom: 0.55rem;
        }

        @media (min-width: 1180px) {
            .perf-toolbar-grid {
                grid-template-columns: minmax(0, 1.7fr) minmax(0, 1fr);
            }
            .perf-col-left {
                grid-template-columns: repeat(6, minmax(0, 1fr));
            }
        }
        @media (min-width: 1500px) {
            .perf-col-left {
                grid-template-columns: repeat(12, minmax(0, 1fr));
            }
        }
        @media (max-width: 980px) {
            .module-card {
                padding: 0.78rem;
            }
            .perf-toolbar-grid {
                grid-template-columns: 1fr;
            }
            .perf-col + .perf-col {
                border-left: none;
                border-top: 1px dashed rgba(123, 128, 136, 0.35);
                padding-left: 0;
                padding-top: 0.6rem;
            }
            .perf-toolbar,
            .perf-panel {
                padding: 0.68rem;
            }
            .check-select {
                width: 100%;
                max-width: none;
            }
            .perf-col .check-select {
                width: 100%;
                max-width: none;
            }
            .perf-row-title {
                width: 58px;
                min-width: 58px;
                flex: 0 0 58px;
            }
            .perf-col-left {
                grid-template-columns: 1fr;
            }
            .perf-filter-fields-row {
                display: grid;
                grid-template-columns: 1fr;
                gap: 0.36rem;
            }
            .perf-col-left .perf-filter-label {
                white-space: normal;
            }
            .perf-manage-toolbar input[type="text"] {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <div class="container">
        <div class="page-layout single-column pm-layout">
            <div class="card pm-card sales-perf-card">
                <div class="perf-filter-header">
                    <div>
                        <div class="perf-filter-title">筛选看板数据</div>
                        <div class="perf-filter-subtitle">按日期、货号、面料、规格和广告类型筛选图表、分组与明细</div>
                    </div>
                </div>
                <div class="perf-toolbar">
                    <div class="perf-toolbar-grid">
                        <div class="perf-col perf-col-left">
                            <div class="perf-row">
                                <span class="perf-row-title">日期</span>
                                <input type="date" id="filterStartDate">
                                <span>至</span>
                                <input type="date" id="filterEndDate">
                                <span class="status-tip" id="dataStatus"></span>
                            </div>

                            <div class="perf-filter-fields-row">
                                <span class="perf-filter-label">平台</span>
                                <div class="check-select" id="selPlatforms"></div>
                                <span class="perf-filter-label">店铺</span>
                                <div class="check-select" id="selShops"></div>
                                <span class="perf-filter-label">货号</span>
                                <div class="check-select" id="selSkuFamilies"></div>
                            </div>

                            <div class="perf-filter-fields-row">
                                <span class="perf-filter-label">SKU</span>
                                <div class="check-select" id="selPlatformSkus"></div>
                                <span class="perf-filter-label">面料</span>
                                <div class="check-select" id="selFabrics"></div>
                                <span class="perf-filter-label">规格</span>
                                <div class="check-select" id="selSpecs"></div>
                            </div>
                            <div class="perf-filter-actions">
                                <button type="button" class="btn-primary" id="btnQuery">查询</button>
                                <button type="button" class="btn-secondary" id="btnReset">重置</button>
                            </div>
                        </div>

                        <div class="perf-col perf-col-right">
                            <div class="perf-row perf-row-tight">
                                <span class="perf-row-title" style="min-width:70px;">显示字段</span>
                                <div class="perf-metric-order" id="metricCheckboxBar"></div>
                            </div>
                            <div class="perf-row perf-row-tight switch-row">
                                <span class="perf-row-title" style="min-width:96px;">图表事件标注</span>
                                <label><input type="checkbox" id="toggleTodos" checked> 显示待办完成事件</label>
                                <label><input type="checkbox" id="toggleAds" checked> 显示广告调整事件</label>
                                <span class="perf-row-title" style="min-width:58px;">广告类型</span>
                                <div class="check-select" id="selAdTypes"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="perf-panel">
                    <div class="perf-chart-head">
                        <div style="display:flex; align-items:center; gap:0.6rem;">
                            <div class="perf-panel-caption" id="chartTitle">按日趋势</div>
                            <span class="help-dot" data-tip="鼠标移动会自动吸附到最近日期，点击可展开或收起图表明细。"></span>
                        </div>
                        <div class="perf-chart-granularity">
                            <span>周期</span>
                            <select id="chartGranularity" data-universal-no-search="1">
                                <option value="day">按日</option>
                                <option value="week">按周</option>
                                <option value="month">按月</option>
                            </select>
                        </div>
                    </div>
                    <div class="perf-legend-row">
                        <div class="perf-legend" id="chartLegend"></div>
                        <div class="perf-percent-bar" id="percentMetricBar" title="当前图表选择的百分比字段（右轴）"></div>
                    </div>
                    <div class="perf-chart-wrap" id="chartWrap">
                        <canvas id="perfChart"></canvas>
                        <div class="perf-chart-hover-line" id="chartHoverLine"></div>
                        <div class="perf-event-tooltip" id="eventTooltip"></div>
                    </div>
                    <div class="perf-chart-detail" id="chartDetailPanel"></div>
                    <div class="perf-panel perf-group" id="groupContainer"></div>
                </div>

            </div>

            <div class="card pm-card sales-perf-card perf-manage-card">
                <div class="perf-filter-title">记录管理</div>

                <div class="perf-panel">
                    <div class="perf-manage-toolbar">
                        <div class="check-select perf-manage-shop-filter" id="selPerfManageShops"></div>
                        <input type="text" id="performanceSearchInput" placeholder="搜索销售平台SKU">
                        <button class="btn-primary" id="btnPerfSearch" type="button">搜索</button>
                        <button class="btn-secondary" id="btnPerfReset" type="button">清空</button>
                        <button class="btn-secondary" id="btnPerfTemplate" type="button">下载模板</button>
                        <button class="btn-secondary" id="btnPerfImport" type="button">批量上传</button>
                        <input type="file" id="salesProductPerformanceUploadInput" accept=".xlsx" style="display:none;">
                        <button class="btn-accent" id="btnPerfCreate" type="button">新增记录</button>
                    </div>
                    <div class="perf-table-wrap">
                        <table class="perf-table" id="salesProductPerformanceTable" data-server-pagination-mode="server" data-batch-delete-handler="handleSalesProductPerformanceBatchDelete">
                            <thead>
                                <tr>
                                    <th style="width:54px; text-align:center;" data-manage-col-key="__perf_chk__" data-disable-sort="1"><input type="checkbox" id="perfSelectAll" aria-label="全选当前页"></th>
                                    <th data-manage-col-key="record_date">日期</th>
                                    <th data-manage-col-key="shop_name">店铺</th>
                                    <th data-manage-col-key="platform_sku">销售平台SKU</th>
                                    <th class="perf-col-num" data-manage-col-key="sales_qty">销量</th>
                                    <th class="perf-col-num" data-manage-col-key="net_sales_amount">净销售额</th>
                                    <th class="perf-col-num" data-manage-col-key="order_qty">订单量</th>
                                    <th class="perf-col-num" data-manage-col-key="session_total">Sessions-Total</th>
                                    <th class="perf-col-num" data-manage-col-key="ad_impressions">广告展示</th>
                                    <th class="perf-col-num" data-manage-col-key="ad_clicks">广告点击</th>
                                    <th class="perf-col-num" data-manage-col-key="ad_orders">广告订单量</th>
                                    <th class="perf-col-num" data-manage-col-key="ad_spend">广告花费</th>
                                    <th class="perf-col-num" data-manage-col-key="ad_sales_amount">广告销售额</th>
                                    <th class="perf-col-num" data-manage-col-key="refund_amount">退款金额</th>
                                    <th class="perf-col-num" data-manage-col-key="acos">ACOS</th>
                                    <th class="perf-col-num" data-manage-col-key="acoas">ACOAS</th>
                                    <th class="perf-col-num" data-manage-col-key="rois">ROIS</th>
                                    <th class="perf-col-num" data-manage-col-key="ctr">CTR</th>
                                    <th class="perf-col-num" data-manage-col-key="cvr">CVR</th>
                                    <th class="perf-col-num" data-manage-col-key="cpc">CPC</th>
                                    <th style="width:160px;" data-manage-col-key="__perf_op__" data-disable-sort="1">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="21" style="text-align:center;">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="performance-modal">
        <div class="pm-modal-content pm-modal-content--wide">
            <div class="pm-modal-scroll">
            <h3 id="performance-modal-title" style="margin-top:0;">新增产品表现记录</h3>
            <div class="pm-form">
                <div class="pm-section pm-form-full">
                    <div class="pm-section-body pm-form">
                        <div class="form-group pm-form-full">
                            <label for="performancePlatformSku">销售平台SKU<span class="required-asterisk">*</span></label>
                            <input type="text" id="performancePlatformSku" class="required-field" list="performanceSkuSuggestions" placeholder="输入或选择销售平台SKU">
                            <datalist id="performanceSkuSuggestions"></datalist>
                        </div>
                        <div class="form-group">
                            <label for="performanceRecordDate">日期<span class="required-asterisk">*</span></label>
                            <input type="date" id="performanceRecordDate" class="required-field">
                        </div>
                        <div class="form-group"><label for="performanceSalesQty">销量</label><input type="number" step="1" id="performanceSalesQty" class="optional-field"></div>
                        <div class="form-group"><label for="performanceNetSales">净销售额(USD)</label><input type="number" step="0.01" id="performanceNetSales" class="optional-field"></div>
                        <div class="form-group"><label for="performanceOrderQty">订单量</label><input type="number" step="1" id="performanceOrderQty" class="optional-field"></div>
                        <div class="form-group"><label for="performanceSessionTotal">Sessions-Total</label><input type="number" step="1" id="performanceSessionTotal" class="optional-field"></div>
                        <div class="form-group"><label for="performanceAdImpressions">广告展示</label><input type="number" step="1" id="performanceAdImpressions" class="optional-field"></div>
                        <div class="form-group"><label for="performanceAdClicks">广告点击</label><input type="number" step="1" id="performanceAdClicks" class="optional-field"></div>
                        <div class="form-group"><label for="performanceAdOrders">广告订单量</label><input type="number" step="1" id="performanceAdOrders" class="optional-field"></div>
                        <div class="form-group"><label for="performanceAdSpend">广告花费(USD)</label><input type="number" step="0.01" id="performanceAdSpend" class="optional-field"></div>
                        <div class="form-group"><label for="performanceAdSales">广告销售额(USD)</label><input type="number" step="0.01" id="performanceAdSales" class="optional-field"></div>
                        <div class="form-group"><label for="performanceRefundAmount">退款金额(USD)</label><input type="number" step="0.01" id="performanceRefundAmount" class="optional-field"></div>
                    </div>
                </div>
            </div>
            <!-- 统一使用全局 showAppToast / showAppResultPanel；移除旧的预检/导入专用状态条 -->
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" id="btnPerfModalCancel" type="button">取消</button>
                <button class="btn-primary" id="btnPerfModalSave" type="button">保存</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="perf-import-shop-modal">
        <div class="pm-modal-content" style="max-width:520px;">
            <h3 style="margin-top:0;" class="label-help">选择上传店铺<span class="help-dot" data-tip="不同平台店铺可能有相同的 SKU。请先选择本次数据所属店铺，系统将仅匹配该店铺下的 SKU，避免误上传到其他店铺。"></span></h3>
            <div class="form-group pm-form-full" style="margin-top:0.8rem;">
                <label for="perfImportShopSelect">店铺<span class="required-asterisk">*</span></label>
                <select id="perfImportShopSelect" class="required-field">
                    <option value="">请选择店铺</option>
                </select>
            </div>
            <div class="pm-modal-actions" style="margin-top:0.8rem;">
                <button class="btn-secondary" id="btnPerfImportShopCancel" type="button">取消</button>
                <button class="btn-primary" id="btnPerfImportShopConfirm" type="button">开始上传</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="perf-dialog-modal">
        <div class="pm-modal-content" style="max-width:560px;">
            <h3 id="perf-dialog-title" style="margin-top:0;">提示</h3>
            <div id="perf-dialog-message" class="dialog-message" style="color:var(--morandi-ink); white-space:pre-wrap; line-height:1.5;"></div>
            <div id="perf-dialog-errors" style="margin-top:0.6rem; max-height:220px; overflow:auto; border:1px solid var(--morandi-sand); border-radius:8px; background:#fff; display:none;"></div>
            <div class="pm-modal-actions" style="margin-top:0.8rem;">
                <button class="btn-secondary" id="perf-dialog-cancel" type="button" style="display:none;">取消</button>
                <button class="btn-primary" id="perf-dialog-ok" type="button">确定</button>
            </div>
        </div>
    </div>

    <div id="uploadProgress" class="upload-progress" aria-live="polite">
        <div id="uploadProgressText" class="upload-progress-title">准备处理...</div>
        <div class="upload-progress-bar"><span id="uploadProgressFill"></span></div>
    </div>

        function accumulatePerfGroupItemIntoSum(sum, it) {
            sum.rows += Number(it.rows || 0);
            if (it.commission_status && it.commission_status !== 'ok') {
                sum._commission_unavailable = (sum._commission_unavailable || 0) + 1;
            }

                sum[k] += Number(it[k] || 0);
            });

        function finalizePerfGroupAggregateSum(sum) {
            const gn = Number(sum.net_sales_amount || 0);
            const gg = Number(sum.gross_sales_amount || 0);
            const grf = Number(sum.refund_amount || 0);
            sum.discount_rate = (gg > 0) ? (gg - gn) / gg : 0;
            sum.refund_rate = (gn > 0) ? grf / gn : 0;
            if ((sum._commission_unavailable || 0) > 0) {
                sum.est_referral_commission_usd = null;
                sum.commission_rate = null;
                sum.estimated_net_profit_usd = null;
                sum.net_margin_rate = null;
                sum.commission_status = 'unavailable';
            } else {
                const gcomm = Number(sum.est_referral_commission_usd || 0);
                sum.commission_rate = (gn > 0) ? gcomm / gn : 0;
                sum.estimated_total_cost_usd = Math.round(Number(sum.estimated_total_cost_usd || 0) * 100) / 100;
                sum.estimated_net_profit_usd = Math.round(Number(sum.estimated_net_profit_usd || 0) * 100) / 100;
                const gprofit = Number(sum.estimated_net_profit_usd || 0);
                sum.net_margin_rate = (gg > 0) ? Math.round((gprofit / gg) * 1e6) / 1e6 : 0;
                sum.commission_status = 'ok';
            }
            return sum;
        }

        function toYmd(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function parseYmd(text) {
            const t = String(text || '').slice(0, 10);
            if (!/^\d{4}-\d{2}-\d{2}$/.test(t)) return null;
            const dt = new Date(`${t}T00:00:00`);
            if (Number.isNaN(dt.getTime())) return null;
            return dt;
        }

        function getBucketKeyByGranularity(dateText, granularity) {
            const g = String(granularity || 'day').toLowerCase();
            const dt = parseYmd(dateText);
            if (!dt) return String(dateText || '').slice(0, 10);
            if (g === 'month') {
                return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-01`;
            }
            if (g === 'week') {
                const day = dt.getDay();
                const diff = day === 0 ? -6 : (1 - day);
                const monday = new Date(dt);
                monday.setDate(dt.getDate() + diff);
                return toYmd(monday);
            }
            return toYmd(dt);
        }

        function aggregateChartByGranularity(chartItems, events, granularity) {
            const g = String(granularity || 'day').toLowerCase();
            if (g === 'day') {
                return { items: chartItems || [], events: events || [] };
            }
            const bucketMap = {};
            (chartItems || []).forEach(row => {
                const key = getBucketKeyByGranularity(row.record_date, g);
                const b = bucketMap[key] || (bucketMap[key] = { record_date: key });
                Object.keys(row || {}).forEach(k => {
                    if (k === 'record_date') return;
                    const num = Number(row[k]);
                    if (!Number.isFinite(num)) return;
                    b[k] = Number(b[k] || 0) + num;
                });
            });

            const items = Object.keys(bucketMap).sort().map(key => {
                const b = bucketMap[key];
                const out = { record_date: b.record_date };
                Object.keys(b).forEach(k => {
                    if (k === 'record_date') return;
                    out[k] = Math.round(Number(b[k] || 0) * 100) / 100;
                });
                return out;
            });

            const remappedEvents = (events || []).map(ev => {
                const oldDate = String(ev.event_date || '').slice(0, 10);
                return Object.assign({}, ev, { event_date: getBucketKeyByGranularity(oldDate, g) });
            });
            return { items, events: remappedEvents };
        }

        function getChartTitleByGranularity(granularity) {
            const g = String(granularity || 'day').toLowerCase();
            if (g === 'month') return '按月趋势';
            if (g === 'week') return '按周趋势';
            return '按日趋势';
        }

        function formatBucketRangeLabel(bucketDate, granularity) {
            const g = String(granularity || 'day').toLowerCase();
            const dt = parseYmd(bucketDate);
            if (!dt) return String(bucketDate || '').slice(0, 10);
            if (g === 'month') {
                const first = new Date(dt.getFullYear(), dt.getMonth(), 1);
                const last = new Date(dt.getFullYear(), dt.getMonth() + 1, 0);
                return `${toYmd(first)} ~ ${toYmd(last)}`;
            }
            if (g === 'week') {
                const first = new Date(dt);
                const last = new Date(dt);
                last.setDate(first.getDate() + 6);
                return `${toYmd(first)} ~ ${toYmd(last)}`;
            }
            return toYmd(dt);
        }

        function formatBucketShortLabel(bucketDate, granularity) {
            const g = String(granularity || 'day').toLowerCase();
            const dt = parseYmd(bucketDate);
            if (!dt) return String(bucketDate || '').slice(0, 10);
            if (g === 'month') {
                return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
            }
            if (g === 'week') {
                const first = new Date(dt);
                const last = new Date(dt);
                last.setDate(first.getDate() + 6);
                return `${String(first.getMonth() + 1).padStart(2, '0')}-${String(first.getDate()).padStart(2, '0')}~${String(last.getMonth() + 1).padStart(2, '0')}-${String(last.getDate()).padStart(2, '0')}`;

        function niceNumber(range, round) {
            const safeRange = Math.max(1e-9, Number(range) || 0);
            const exponent = Math.floor(Math.log10(safeRange));
            const fraction = safeRange / Math.pow(10, exponent);
            let niceFraction;
            if (round) {
                if (fraction < 1.5) niceFraction = 1;
                else if (fraction < 3) niceFraction = 2;
                else if (fraction < 7) niceFraction = 5;
                else niceFraction = 10;
            } else {
                if (fraction <= 1) niceFraction = 1;
                else if (fraction <= 2) niceFraction = 2;
                else if (fraction <= 5) niceFraction = 5;
                else niceFraction = 10;
            }
            return niceFraction * Math.pow(10, exponent);
        }

        function buildNiceScale(minValue, maxValue, tickCount) {
            let minV = Number(minValue || 0);
            let maxV = Number(maxValue || 0);
            if (!Number.isFinite(minV)) minV = 0;
            if (!Number.isFinite(maxV)) maxV = 1;
            if (minV === maxV) {
                const pad = Math.abs(minV || 1) * 0.1;
                minV -= pad;
                maxV += pad;
            }
            const ticks = Math.max(2, Number(tickCount || 5));
            const range = niceNumber(maxV - minV, false);
            const step = niceNumber(range / (ticks - 1), true);
            const niceMin = Math.floor(minV / step) * step;
            const niceMax = Math.ceil(maxV / step) * step;
            return { min: niceMin, max: niceMax, step };
        }

        }

        function filterSelectPanel(host) {
            if (!host) return null;
            if (typeof window.floatingOverlayPanel === 'function') return window.floatingOverlayPanel(host);
            return host.querySelector('.check-select-panel');
        }

        function getFilteredFilterOptions(def) {
            const host = document.getElementById(def.host);
            if (!host) return def.options || [];
            const panel = filterSelectPanel(host);
            const keyword = String(panel?.querySelector('.check-select-search')?.value || '').trim().toLowerCase();
            return (def.options || []).filter(x => !keyword || String(x.label || '').toLowerCase().includes(keyword));
        }

        function createFilterSelect(def) {
            const host = document.getElementById(def.host);
            if (!host) return;
            host.innerHTML = `
                <button type="button" class="check-select-trigger universal-select-trigger">${def.title}</button>
                <div class="check-select-panel">
                    <div class="check-select-actions">
                        <button type="button" class="btn-secondary" data-action="all">全选</button>
                        <button type="button" class="btn-secondary" data-action="none">清空</button>
                    </div>
                    <input type="text" class="check-select-search" placeholder="搜索">
                    <div class="check-select-list"></div>
                </div>
            `;
            host._floatPanel = host.querySelector('.check-select-panel');

            const panel = filterSelectPanel(host);
            const search = panel?.querySelector('.check-select-search');
            const btnAll = panel?.querySelector('button[data-action="all"]');
            const btnNone = panel?.querySelector('button[data-action="none"]');

            if (search) search.addEventListener('input', () => renderFilterOptions(def));
            if (btnAll) btnAll.addEventListener('click', () => {
                const visible = getFilteredFilterOptions(def);
                const visibleValues = visible.map(x => String(x.value));
                if (!visibleValues.length) return;
                const allVisibleSelected = visibleValues.every(v => def.selected.has(v));
                if (allVisibleSelected) {
                    visibleValues.forEach(v => def.selected.delete(v));
                } else {
                    visibleValues.forEach(v => def.selected.add(v));
                }
                renderFilterOptions(def);
                refreshFilterTrigger(def);
            });
            if (btnNone) btnNone.addEventListener('click', () => {
                def.selected = new Set();
                renderFilterOptions(def);
                refreshFilterTrigger(def);
            });

            renderFilterOptions(def);
            refreshFilterTrigger(def);
        }

        function renderFilterOptions(def) {
            const host = document.getElementById(def.host);
            if (!host) return;
            const list = filterSelectPanel(host)?.querySelector('.check-select-list');
            if (!list) return;
            const rows = getFilteredFilterOptions(def);
            if (!rows.length) {
                list.innerHTML = '<div class="check-select-empty">无匹配项</div>';
                return;
            }
            list.innerHTML = rows.map(x => {
                const checked = def.selected.has(String(x.value)) ? 'checked' : '';
                return `<label class="check-select-item"><input type="checkbox" value="${String(x.value).replace(/"/g, '&quot;')}" ${checked}><span>${x.label}</span></label>`;
            }).join('');
            list.querySelectorAll('input[type="checkbox"]').forEach(box => {
                box.addEventListener('change', function() {
                    const val = String(this.value);
                    if (this.checked) def.selected.add(val);
                    else def.selected.delete(val);
                    refreshFilterTrigger(def);
                });
            });
        }

        function refreshFilterTrigger(def) {
            const host = document.getElementById(def.host);
            if (!host) return;
            const trigger = host.querySelector('.check-select-trigger, .universal-select-trigger');
            const count = def.selected.size;
            if (!count) {
                trigger.textContent = def.title;
                host.classList.remove('has-value');
                trigger.classList.remove('has-value');
                return;
            }
            if (count === 1) {
                const one = def.options.find(x => def.selected.has(String(x.value)));
                trigger.textContent = one ? one.label : `${count}项`;
                host.classList.add('has-value');
                trigger.classList.add('has-value');
                return;
            }
            trigger.textContent = `已选${count}项`;
            host.classList.add('has-value');
            trigger.classList.add('has-value');

        function safeDiv(a, b) {
            const x = Number(a || 0);
            const y = Number(b || 0);
            if (!Number.isFinite(x) || !Number.isFinite(y) || y === 0) return 0;
            return x / y;
        }

        function resolveMetricValue(row, key) {
            if (key === 'acos') return safeDiv(row.ad_spend, row.ad_sales_amount);
            if (key === 'acoas') return safeDiv(row.ad_spend, row.net_sales_amount);
            if (key === 'rois') return safeDiv(row.net_sales_amount, row.ad_spend);
            if (key === 'ctr') return safeDiv(row.ad_clicks, row.ad_impressions);
            if (key === 'cvr') return safeDiv(row.ad_orders, row.ad_clicks);
            if (key === 'cpc') return safeDiv(row.ad_spend, row.ad_clicks);
            if (COMMISSION_DERIVED_KEYS.has(String(key || ''))
                && row && row.commission_status && row.commission_status !== 'ok') {
                return null;
            }
            const n = Number(row[key]);
            return Number.isFinite(n) ? n : 0;

        function buildDashboardQuery() {
            const q = new URLSearchParams();
            const gran = String(state.chartGranularity || 'day').toLowerCase();
            q.set('granularity', gran);

            const startEl = document.getElementById('filterStartDate');
            const endEl = document.getElementById('filterEndDate');
            let start = (startEl && startEl.value) ? String(startEl.value) : '';
            let end = (endEl && endEl.value) ? String(endEl.value) : '';

            const maxDaysByGran = (g) => {
                if (g === 'day') return 31;
                if (g === 'week') return 183;
                return null; // month 不限制
            };

            const parseDate = (s) => {
                const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s || '').trim());
                if (!m) return null;
                const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
                if (Number.isNaN(d.getTime())) return null;
                d.setHours(0,0,0,0);
                return d;
            };

            const fmtDate = (d) => {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${dd}`;
            };

            const sd = parseDate(start);
            const ed = parseDate(end);
            const maxDays = maxDaysByGran(gran);
            if (maxDays && sd && ed) {
                let a = sd, b = ed;
                if (b.getTime() < a.getTime()) { const t = a; a = b; b = t; }
                const diffDays = Math.floor((b.getTime() - a.getTime()) / (24 * 3600 * 1000)) + 1;
                if (diffDays > maxDays) {
                    // 自动裁剪 end，避免用户误操作导致超慢
                    const clipped = new Date(a.getTime() + (maxDays - 1) * 24 * 3600 * 1000);
                    end = fmtDate(clipped);
                    if (endEl) endEl.value = end;
                    window.showAppToast && window.showAppToast(`已按粒度限制自动裁剪日期范围：${gran} 最多 ${maxDays} 天`, true, 6000);
                }
                start = fmtDate(a);
                if (startEl) startEl.value = start;
            }

            q.set('start_date', start || '');
            q.set('end_date', end || '');
            const groupOnlyKeys = new Set((GROUP_DETAIL_METRICS || []).filter(m => m.isGroupOnly).map(m => m.key));
            q.set('metric_keys', (state.metrics || []).map(m => m.key).filter(k => !groupOnlyKeys.has(k)).join(','));
            q.set('include_todos', document.getElementById('toggleTodos').checked ? '1' : '0');
            q.set('include_ads', document.getElementById('toggleAds').checked ? '1' : '0');

            const setIf = (k, arr) => { if (arr.length) q.set(k, arr.join(',')); };
            setIf('platform_type_ids', getFilterValues('platforms'));
            setIf('shop_ids', getFilterValues('shops'));
            setIf('sku_family_ids', getFilterValues('skuFamilies'));
            setIf('platform_skus', getFilterValues('platformSkus'));
            setIf('fabrics', getFilterValues('fabrics'));
            setIf('spec_names', getFilterValues('specs'));
            setIf('ad_operation_type_ids', getFilterValues('adTypes'));
            return q.toString();
        }

        function renderChart(chartItems, events) {
            const canvas = document.getElementById('perfChart');
            const wrap = document.getElementById('chartWrap');
            const hoverLine = document.getElementById('chartHoverLine');
            const dpr = window.devicePixelRatio || 1;
            const width = Math.max(820, wrap.clientWidth - 16);
            const height = 300;

            canvas.width = Math.floor(width * dpr);
            canvas.height = Math.floor(height * dpr);
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, width, height);

            const chartKeys = (state.chartMetricOrder || state.metricOrder || []).filter(Boolean);
            if (!chartItems || !chartItems.length || !chartKeys.length) {
                ctx.fillStyle = '#7f7a73';
                ctx.font = '14px sans-serif';
                ctx.fillText('暂无趋势数据', 24, 42);
                state.chartGeom = null;
                state.chartDataByDate = {}
                mapEvents([]);
                hideChartDetailPanel();
                if (hoverLine) hoverLine.style.display = 'none';
                return;
            }

            const valueKeys = chartKeys.filter(k => !isPercentMetricKey(k));
            const percentKeys = chartKeys.filter(k => isPercentMetricKey(k));
            const hasRightAxis = percentKeys.length > 0;
            const pad = { left: 56, right: hasRightAxis ? 66 : 24, top: 18, bottom: 36 };
            const innerW = width - pad.left - pad.right;
            const innerH = height - pad.top - pad.bottom;
            const dates = chartItems.map(x => String(x.record_date || '').slice(0, 10));

            const yTick = 5;
            // left(value) axis scale
            let vMin = Infinity, vMax = -Infinity;
            (valueKeys.length ? valueKeys : percentKeys).forEach(k => {
                chartItems.forEach(row => {
                    const v = resolveMetricValue(row, k);
                    if (!Number.isFinite(v)) return;
                    if (v < vMin) vMin = v;
                    if (v > vMax) vMax = v;
                });
            });
            if (!Number.isFinite(vMin) || !Number.isFinite(vMax)) { vMin = 0; vMax = 1; }
            const leftAsPercent = valueKeys.length === 0 && percentKeys.length > 0;
            if (leftAsPercent) {
                vMin = Math.max(0, vMin);
                vMax = Math.max(vMax, 0.01);
            }
            const leftScale = buildNiceScale(vMin, vMax, yTick + 1);
            vMin = leftScale.min; vMax = leftScale.max;

            // right(percent) axis scale
            let pMin = 0, pMax = 0.01;
            if (percentKeys.length) {
                pMin = Infinity; pMax = -Infinity;
                percentKeys.forEach(k => {
                    chartItems.forEach(row => {
                        const v = resolveMetricValue(row, k);
                        if (!Number.isFinite(v)) return;
                        if (v < pMin) pMin = v;
                        if (v > pMax) pMax = v;
                    });
                });
                if (!Number.isFinite(pMin) || !Number.isFinite(pMax)) { pMin = 0; pMax = 0.01; }
                pMin = Math.max(0, pMin);
                pMax = Math.max(pMax, 0.01);
            }
            const rightScale = percentKeys.length ? buildNiceScale(pMin, pMax, yTick + 1) : null;
            if (rightScale) { pMin = rightScale.min; pMax = rightScale.max; }

            ctx.strokeStyle = 'rgba(128, 128, 128, 0.22)';
            ctx.fillStyle = '#746d64';
            ctx.font = '12px sans-serif';
            for (let i = 0; i <= yTick; i += 1) {
                const y = pad.top + (innerH * i / yTick);
                const val = vMax - ((vMax - vMin) * i / yTick);
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(width - pad.right, y);
                ctx.stroke();
                ctx.fillText(formatAxisTickValue(val, leftAsPercent), 8, y + 4);
                if (rightScale) {
                    const pVal = pMax - ((pMax - pMin) * i / yTick);
                    const label = formatAxisTickValue(pVal, true);
                    const textW = ctx.measureText(label).width;
                    ctx.fillText(label, width - pad.right + Math.max(0, (pad.right - textW - 6)), y + 4);
                }
            }

            const xAt = idx => pad.left + (innerW * (dates.length <= 1 ? 0 : idx / (dates.length - 1)));
            const yAtValue = v => pad.top + (innerH * (vMax - v) / (vMax - vMin));
            const yAtPercent = v => pad.top + (innerH * (pMax - v) / (pMax - pMin));
            const rowByDate = {};
            chartItems.forEach(row => {
                const d = String(row.record_date || '').slice(0, 10);
                if (d && !rowByDate[d]) rowByDate[d] = row;
            });

            state.metricOrder.forEach(k => {
                const m = state.metricMap[k];
                if (!m) return;
                ctx.lineWidth = 2;
                ctx.strokeStyle = m.color || '#5b6aa8';
                ctx.beginPath();
                chartItems.forEach((row, idx) => {
                    const v = resolveMetricValue(row, k);
                    if (!Number.isFinite(v)) return;
                    const x = xAt(idx);
                    const y = isPercentMetricKey(k) && rightScale ? yAtPercent(v) : yAtValue(v);
                    if (idx === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();
            });

            ctx.fillStyle = '#7f786f';
            for (let i = 0; i < dates.length; i += Math.max(1, Math.floor(dates.length / 6))) {
                const x = xAt(i);
                const label = formatBucketShortLabel(dates[i], state.chartGranularity);
                ctx.fillText(label, x - 16, height - 10);
            }

            mapEvents(events || []);
            const eventLines = {};
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = '#8f8f8f';
            Object.keys(state.eventByDate).forEach(d => {
                const idx = dates.indexOf(d);
                if (idx < 0) return;
                const x = xAt(idx);
                eventLines[d] = x;
                ctx.beginPath();
                ctx.moveTo(x, pad.top);
                ctx.lineTo(x, height - pad.bottom);
                ctx.stroke();
            });
            ctx.setLineDash([]);

            state.chartGeom = { dates, xAt, width, height, pad, innerW, rowByDate, eventLines };
            state.chartDataByDate = rowByDate;
        }

        function formatEventBlock(ev) {
            const sku = (ev.platform_skus || []).join('、') || '-';

        function toggleChartDetailPanel(dateText) {
            if (!dateText) return;
            if (state.selectedChartDate === dateText && state.selectedChartDateOpen) {
                hideChartDetailPanel();
                return;
            }
            state.selectedChartDate = dateText;
            state.selectedChartDateOpen = true;
            renderChartDetailPanel(dateText);
            // 单击图表时：仅更新下方明细（不修改顶部筛选；不重绘图表）
            try {
                const prevStart = (document.getElementById('filterStartDate') || {}).value || '';
                const prevEnd = (document.getElementById('filterEndDate') || {}).value || '';
                const rng = getBucketStartEnd(dateText, state.chartGranularity);
                if (rng && rng.start && rng.end) {
                    state._chartDrillRange = { active: true, prevStart, prevEnd, drillStart: rng.start, drillEnd: rng.end, bucketKey: dateText };
                    // 不再二次请求：使用首次查询返回的 groups_by_bucket
                    const base = state.lastDashboardPayload || {};
                    const byBucket = base.groups_by_bucket || {};
                    renderGroups(byBucket[dateText] || []);
                }
            } catch (e) {}
        }

        function getBucketStartEnd(dateText, granularity) {
            const dt = String(dateText || '').slice(0, 10);
            if (!dt) return null;
            const pad2 = n => String(n).padStart(2, '0');
            const addDays = (yyyyMMdd, days) => {
                const d = new Date(yyyyMMdd + 'T00:00:00');
                d.setDate(d.getDate() + (Number(days) || 0));
                const y = d.getFullYear();
                const m = pad2(d.getMonth() + 1);
                const dd = pad2(d.getDate());
                return `${y}-${m}-${dd}`;
            };
            if (granularity === 'week') {
                return { start: dt, end: addDays(dt, 6) };
            }
            if (granularity === 'month') {
                const d = new Date(dt + 'T00:00:00');
                const y = d.getFullYear();
                const m = d.getMonth(); // 0-based
                const last = new Date(y, m + 1, 0);
                return { start: `${y}-${pad2(m + 1)}-01`, end: `${y}-${pad2(m + 1)}-${pad2(last.getDate())}` };
            }
            return { start: dt, end: dt };
        }

        function getBucketRangeLabel(dateText, granularity) {
            const key = String(dateText || '').slice(0, 10);
            const map = state.bucketRangeByDate || {};
            const r = map[key];
            if (r && r.start && r.end) return `${r.start} ~ ${r.end}`;
            return formatBucketRangeLabel(dateText, granularity);
        }

        // -------------------------------------------------------------------------
        // 图表交互与货号分组明细渲染
        // -------------------------------------------------------------------------

        function getNearestDateByChartX(x) {
            const geom = state.chartGeom;
            if (!geom || !Array.isArray(geom.dates) || !geom.dates.length) return '';
            const minX = geom.pad.left;
            const maxX = geom.width - geom.pad.right;
            if (x < minX || x > maxX) return '';
            if (geom.dates.length === 1) return geom.dates[0] || '';
            const ratio = Math.max(0, Math.min(1, (x - minX) / Math.max(1, geom.innerW || 1)));
            const idx = Math.round(ratio * (geom.dates.length - 1));
            return geom.dates[idx] || '';
        }

        function getNearestChartPointByX(x) {
            const geom = state.chartGeom;
            if (!geom || !Array.isArray(geom.dates) || !geom.dates.length) return null;
            const minX = geom.pad.left;
            const maxX = geom.width - geom.pad.right;
            if (x < minX || x > maxX) return null;
            const ratio = Math.max(0, Math.min(1, (x - minX) / Math.max(1, geom.innerW || 1)));
            const idx = Math.round(ratio * (geom.dates.length - 1));
            const date = geom.dates[idx] || '';
            if (!date) return null;
            const snappedX = typeof geom.xAt === 'function' ? geom.xAt(idx) : x;
            return { date, idx, x: snappedX };
        }

        function focusEventsByDate(dateText) {
            const rows = state.eventByDate[dateText] || [];
            if (!rows.length) return;
            const skuSet = new Set();
            const sfSet = new Set();
            rows.forEach(r => {
                (r.platform_skus || []).forEach(x => x && skuSet.add(String(x).trim()));
                (r.sku_families || []).forEach(x => x && sfSet.add(String(x).trim()));
            });

            document.querySelectorAll('#groupContainer details').forEach(d => {
                const sf = String(d.dataset.skuFamily || '').trim();
                if (!sfSet.size || sfSet.has(sf)) d.open = true;
            });

            const hitRows = [];
            document.querySelectorAll('#groupContainer tbody tr').forEach(tr => {
                const sku = String(tr.dataset.platformSku || '').trim();
                const sf = String(tr.dataset.skuFamily || '').trim();
                if ((skuSet.size && skuSet.has(sku)) || (sfSet.size && sfSet.has(sf))) {
                    hitRows.push(tr);
                }
            });

            document.querySelectorAll('#groupContainer tbody tr.row-focus').forEach(tr => tr.classList.remove('row-focus'));
            hitRows.forEach(tr => tr.classList.add('row-focus'));
            if (hitRows.length) {
                hitRows[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            window.setTimeout(() => {
                document.querySelectorAll('#groupContainer tbody tr.row-focus').forEach(tr => tr.classList.remove('row-focus'));
            }, 2400);

            focusGroupRowsByDate(dateText);
        }

        function focusGroupRowsByDate(dateText) {
            if (!dateText) return;
            const hitRows = [];
            document.querySelectorAll('#groupContainer tbody tr').forEach(tr => {
                const recordDates = String(tr.dataset.recordDates || '').split('|').filter(Boolean);
                if (recordDates.includes(dateText)) { hitRows.push(tr); return; }
                const minDate = String(tr.dataset.minDate || '').slice(0, 10);
                const maxDate = String(tr.dataset.maxDate || '').slice(0, 10);
                if (minDate && maxDate && dateText >= minDate && dateText <= maxDate) hitRows.push(tr);
            });
            document.querySelectorAll('#groupContainer tbody tr.row-focus').forEach(tr => tr.classList.remove('row-focus'));
            hitRows.forEach(tr => tr.classList.add('row-focus'));
            if (hitRows.length) {
                hitRows[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            window.setTimeout(() => {
                document.querySelectorAll('#groupContainer tbody tr.row-focus').forEach(tr => tr.classList.remove('row-focus'));
            }, 2600);
        }

        function bindChartInteractions() {
            const canvas = document.getElementById('perfChart');
            const tip = document.getElementById('eventTooltip');
            const hoverLine = document.getElementById('chartHoverLine');

            canvas.addEventListener('mousemove', e => {
                if (!state.chartGeom) {
                    tip.style.display = 'none';
                    hoverLine.style.display = 'none';
                    return;
                }
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const point = getNearestChartPointByX(x);
                if (!point || !point.date) {
                    tip.style.display = 'none';
                    hoverLine.style.display = 'none';
                    return;
                }
                tip.innerHTML = buildDateColumnTooltipHtml(point.date);
                tip.style.display = 'block';
                // 右侧防遮挡：优先显示在点的右侧，若超出 viewport / wrap 则自动翻转到左侧并 clamp
                const wrapRect = canvas.parentElement.getBoundingClientRect();
                const viewportW = window.innerWidth || document.documentElement.clientWidth || (wrapRect.right + 1);
                const margin = 10;
                const tipW = Math.max(260, tip.offsetWidth || 0);
                let leftPx = point.x + 14;
                // overflow to viewport right -> flip
                if ((wrapRect.left + leftPx + tipW + margin) > viewportW) {
                    leftPx = point.x - tipW - 14;
                }
                // clamp within wrap
                leftPx = Math.max(8, Math.min(wrapRect.width - tipW - 8, leftPx));
                tip.style.left = `${leftPx}px`;
                const tipHeight = Math.max(140, tip.offsetHeight || 0);
                let top = Math.max(8, e.clientY - wrapRect.top + 10);
                if (top + tipHeight > wrapRect.height - 8) {
                    top = Math.max(8, wrapRect.height - tipHeight - 8);
                }
                tip.style.top = `${top}px`;
                hoverLine.style.left = `${Math.max(0, (rect.left - wrapRect.left) + point.x)}px`;
                hoverLine.style.display = 'block';
            });

            canvas.addEventListener('mouseleave', () => {
                tip.style.display = 'none';
                hoverLine.style.display = 'none';
            });

            canvas.addEventListener('click', e => {
                if (!state.chartGeom) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const point = getNearestChartPointByX(x);
                if (point && point.date) {
                    toggleChartDetailPanel(point.date);
                }
            });
        }

            const grandSum = emptyPerfGroupSum();

                    const mx = String(it.max_date || '').slice(0, 10);
                    if (mn && (!minDate || mn < minDate)) minDate = mn;
                    if (mx && (!maxDate || mx > maxDate)) maxDate = mx;

                finalizePerfGroupAggregateSum(sum);
                const childRows = items.slice().sort((a, b) => String(a.platform_sku || '').localeCompare(String(b.platform_sku || '')));

                const parentTr = document.createElement('tr');

                parentTr.dataset.maxDate = maxDate || '';
                parentTr.innerHTML = `
                    <td data-manage-col-key="__toggle"><button type="button" class="perf-group-toggle" data-group-key="${groupKey}" aria-label="展开/收起"></button></td>
