<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售管理 - 产品表现看板</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .page-layout.single-column {
            display: grid;
            gap: 1rem;
            min-width: 0;
            max-width: 100%;
            overflow-x: hidden;
        }
        .sales-perf-card {
            color: var(--morandi-ink);
            min-width: 0;
            overflow: hidden;
        }
        .module-header {
            margin-bottom: 0.8rem;
        }
        .module-header h2 {
            margin: 0;
            color: var(--morandi-ink);
            font-size: 1.35rem;
        }
        .module-subtitle {
            margin-top: 0.28rem;
            color: var(--morandi-slate);
            font-size: 0.9rem;
        }

        .perf-filter-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.2rem;
        }
        .perf-filter-title {
            font-size: 1.08rem;
            font-weight: 800;
            color: var(--morandi-ink);
            letter-spacing: 0.02em;
        }
        .perf-filter-subtitle {
            margin-top: 0.18rem;
            color: var(--morandi-slate);
            font-size: 0.84rem;
        }

        .perf-toolbar {
            display: grid;
            gap: 0.4rem;
            padding: 0.56rem;
            border: 1px solid rgba(207, 199, 189, 0.75);
            background: #f7f4ef;
            border-radius: 10px;
        }
        .perf-toolbar-grid {
            display: grid;
            grid-template-columns: 1.45fr 1fr;
            gap: 0.42rem;
            align-items: start;
        }
        .perf-col {
            display: grid;
            gap: 0.36rem;
            min-width: 0;
        }
        .perf-col + .perf-col {
            border-left: 1px dashed rgba(123, 128, 136, 0.35);
            padding-left: 0.56rem;
        }
        .perf-row {
            display: flex;
            align-items: center;
            gap: 0.24rem;
            flex-wrap: wrap;
        }
        .perf-filter-pair-row,
        .perf-filter-triple-row {
            display: grid;
            grid-template-columns: 56px minmax(140px, 1fr) 56px minmax(140px, 1fr) 56px minmax(140px, 1fr);
            gap: 0.36rem 0.64rem;
            align-items: center;
        }
        .perf-filter-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.22rem;
            padding-left: 56px;
        }
        .perf-row-tight {
            gap: 0.32rem;
        }
        .perf-row-title {
            color: var(--morandi-ink);
            font-weight: 700;
            width: 56px;
            min-width: 56px;
            flex: 0 0 56px;
            text-align: left;
        }
        .perf-row input[type="date"],
        .perf-row button,
        .perf-row select {
            min-height: 38px;
            border-radius: 8px;
            border: 1px solid var(--morandi-sand);
            background: #fff;
            color: var(--morandi-ink);
            padding: 0.42rem 0.62rem;
        }
        input[type="date"] {
            text-align: left;
        }
        .perf-row input[type="date"]:focus,
        .perf-row select:focus,
        .check-select-search:focus {
            outline: none;
            border-color: var(--morandi-ink);
            box-shadow: 0 0 0 3px rgba(74, 78, 87, 0.12);
        }
        .status-tip {
            color: var(--morandi-slate);
            font-size: 0.84rem;
        }
        .switch-row {
            gap: 0.75rem;
            color: var(--morandi-ink);
            font-size: 0.9rem;
        }
        .switch-row label {
            display: inline-flex;
            align-items: center;
            gap: 0.32rem;
        }
        .perf-inline-help {
            color: var(--morandi-slate);
            font-size: 0.82rem;
        }

        .check-select {
            position: relative;
            min-width: 145px;
            width: 180px;
            max-width: 210px;
        }
        .perf-col .check-select {
            min-width: 180px;
            width: 220px;
            max-width: 280px;
        }
        .perf-row-tight .check-select {
            width: 180px;
            min-width: 160px;
            max-width: 260px;
        }
        #selAdTypes.check-select {
            width: 260px;
            min-width: 240px;
            max-width: 340px;
        }
        .check-select-trigger {
            width: 100%;
            text-align: left;
            min-height: 32px;
            border-radius: 8px;
            border: 1px solid var(--morandi-sand);
            background: #fff;
            color: var(--morandi-slate);
            padding: 0.4rem 0.58rem;
            cursor: pointer;
            font-weight: 400;
        }
        .check-select.has-value .check-select-trigger {
            color: var(--morandi-ink);
        }
        .check-select-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            z-index: 45;
            min-width: 240px;
            border: 1px solid var(--morandi-sand);
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
            padding: 0.5rem;
            display: none;
        }
        .check-select.open .check-select-panel {
            display: block;
        }
        .check-select-actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
            gap: 0.35rem;
        }
        .check-select-actions button {
            min-height: 28px;
            border-radius: 999px;
            border: 1px solid var(--morandi-sand);
            background: var(--morandi-mist);
            color: var(--morandi-ink);
            padding: 0.18rem 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .check-select-search {
            width: 100%;
            min-height: 30px;
            border-radius: 8px;
            border: 1px solid var(--morandi-sand);
            background: #fff;
            padding: 0.35rem 0.55rem;
            margin-bottom: 0.4rem;
        }
        .check-select-list {
            max-height: 220px;
            overflow-y: auto;
            display: grid;
            gap: 0.25rem;
        }
        #selAdTypes .check-select-list {
            max-height: 120px;
        }
        .check-select-item {
            display: flex;
            align-items: center;
            gap: 0.42rem;
            padding: 0.3rem 0.36rem;
            border-radius: 7px;
            cursor: pointer;
            color: var(--morandi-ink);
            font-size: 0.88rem;
        }
        .check-select-item span {
            white-space: normal;
            word-break: break-all;
        }
        .check-select-item:hover {
            background: #f7f4ef;
        }
        .check-select-empty {
            color: var(--morandi-slate);
            text-align: center;
            padding: 0.55rem 0.3rem;
        }

        .perf-metric-order {
            display: flex;
            flex-wrap: wrap;
            gap: 0.38rem;
        }
        .metric-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            border: 1px solid var(--morandi-sand);
            border-radius: 999px;
            padding: 0.22rem 0.44rem;
            background: #fff;
            font-size: 0.84rem;
            color: var(--morandi-ink);
        }
        .metric-chip button {
            min-height: 0;
            border-radius: 999px;
            border: 1px solid var(--morandi-sand);
            background: var(--morandi-mist);
            color: var(--morandi-ink);
            padding: 0.08rem 0.32rem;
            cursor: pointer;
        }

        .perf-panel {
            margin-top: 0.9rem;
            border: 1px solid rgba(207, 199, 189, 0.75);
            border-radius: 10px;
            background: #f7f4ef;
            padding: 0.82rem;
            color: var(--morandi-ink);
            min-width: 0;
        }
        .perf-panel-caption {
            color: var(--morandi-slate);
            font-size: 0.84rem;
            font-weight: 600;
            margin-bottom: 0.45rem;
        }
        .perf-chart-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.55rem;
            flex-wrap: wrap;
        }
        .perf-chart-granularity {
            display: inline-flex;
            align-items: center;
            gap: 0.36rem;
            color: var(--morandi-slate);
            font-size: 0.82rem;
        }
        .perf-chart-granularity select {
            min-height: 30px;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            background: #fff;
            color: var(--morandi-ink);
            font-size: 0.82rem;
            padding: 0.22rem 0.48rem;
        }
        .perf-chart-granularity .feature-category-dropdown.universal-select-dropdown {
            width: auto;
            min-width: 90px;
        }
        .perf-chart-granularity .universal-select-trigger {
            min-height: 30px;
            height: 30px;
            padding: 0.22rem 1.7rem 0.22rem 0.46rem !important;
            font-size: 0.82rem;
            border-radius: 8px;
        }
        .perf-panel h3 {
            margin: 0 0 0.5rem;
            font-size: 1.06rem;
            color: var(--morandi-ink);
        }
        .perf-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0 0 0.45rem;
            color: var(--morandi-slate);
            font-size: 0.84rem;
        }
        .perf-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .perf-legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .perf-chart-wrap {
            width: 100%;
            min-height: 308px;
            border: 1px solid rgba(207, 199, 189, 0.75);
            border-radius: 9px;
            background: #fff;
            padding: 0.5rem;
            position: relative;
            overflow: visible;
        }
        #perfChart {
            width: 100%;
            height: 300px;
            display: block;
        }
        .perf-chart-hover-line {
            position: absolute;
            top: 0.5rem;
            bottom: 0.5rem;
            width: 0;
            border-left: 1px dashed rgba(141, 106, 106, 0.95);
            pointer-events: none;
            display: none;
            z-index: 12;
        }
        .perf-event-tooltip {
            position: absolute;
            z-index: 120;
            min-width: 260px;
            max-width: 460px;
            background: #fff;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.14);
            padding: 0.58rem;
            font-size: 0.84rem;
            color: var(--morandi-ink);
            display: none;
            pointer-events: none;
            line-height: 1.42;
        }

        .perf-percent-bar {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            flex-wrap: wrap;
            justify-content: flex-end;
            color: var(--morandi-slate);
            font-size: 0.82rem;
        }
        .perf-percent-bar .perf-legend-item { color: var(--morandi-slate); }
        .perf-percent-bar .perf-legend-dot { opacity: 0.9; }
        .perf-legend-row {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            flex-wrap: wrap;
        }
        .perf-chart-detail {
            margin-top: 0.55rem;
            display: none;
            border: 1px solid rgba(207, 199, 189, 0.75);
            border-radius: 10px;
            background: #fff;
            padding: 0.72rem;
        }
        .perf-chart-detail.active {
            display: block;
        }
        .perf-chart-detail-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 0.6rem;
        }
        .perf-chart-detail-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--morandi-ink);
        }
        .perf-chart-detail-body {
            display: grid;
            gap: 0.7rem;
        }
        .perf-chart-detail-block {
            border: 1px solid rgba(207, 199, 189, 0.65);
            border-radius: 8px;
            padding: 0.62rem;
            background: #faf8f4;
        }
        .perf-chart-detail-block h4 {
            margin: 0 0 0.42rem;
            font-size: 0.92rem;
            color: var(--morandi-ink);
        }
        .perf-chart-detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
            gap: 0.42rem;
        }
        .perf-chart-detail-row {
            display: grid;
            gap: 0.08rem;
            border: 1px solid rgba(207, 199, 189, 0.62);
            border-radius: 8px;
            background: #fff;
            padding: 0.3rem 0.42rem;
            color: var(--morandi-ink);
        }
        .perf-chart-detail-row span {
            font-size: 0.76rem;
            color: var(--morandi-slate);
        }
        .perf-chart-detail-row strong {
            font-size: 0.9rem;
        }
        .perf-chart-detail-empty {
            color: var(--morandi-slate);
            font-size: 0.86rem;
        }
        .perf-chart-footer {
            margin-top: 0.45rem;
            display: flex;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 0.55rem;
            justify-content: flex-start;
        }
        .perf-chart-footer .check-select {
            width: 210px;
            max-width: 240px;
            min-width: 180px;
        }

        .perf-group details {
            border: 1px solid rgba(207, 199, 189, 0.76);
            border-radius: 8px;
            background: #fff;
            margin-bottom: 0.58rem;
            overflow: visible;
        }
        .perf-group summary {
            list-style: none;
            cursor: pointer;
            padding: 0.55rem 0.72rem;
            font-weight: 700;
            color: var(--morandi-ink);
            background: #f9f7f3;
            border-bottom: 1px solid rgba(207, 199, 189, 0.62);
        }
        .perf-group-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.35rem 0.55rem;
            align-items: center;
        }
        .perf-group-summary-item {
            display: grid;
            gap: 0.08rem;
            border: 1px solid rgba(207, 199, 189, 0.62);
            border-radius: 8px;
            background: #fff;
            padding: 0.3rem 0.45rem;
        }
        .perf-group-summary-item .label {
            font-size: 0.74rem;
            color: var(--morandi-slate);
            font-weight: 400;
        }
        .perf-group-summary-item .value {
            font-size: 0.9rem;
            color: var(--morandi-ink);
            font-weight: 700;
        }
        .perf-group-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.55rem;
        }
        .perf-group-title {
            margin: 0;
            font-size: 1.06rem;
            color: var(--morandi-ink);
            font-weight: 800;
        }
        .perf-group-meta {
            color: var(--morandi-slate);
            font-size: 0.84rem;
        }
        .perf-group-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0.15rem 0 0.55rem;
            padding: 0.22rem 0.35rem;
            border-radius: 8px;
            background: rgba(247, 244, 239, 0.42);
        }
        .perf-group-toolbar .perf-inline-help {
            font-size: 0.76rem;
            color: var(--morandi-slate);
        }
        .perf-group-toolbar .check-select {
            width: 120px;
            min-width: 120px;
            max-width: 150px;
        }
        .perf-group-toolbar .check-select-trigger {
            min-height: 26px;
            padding: 0.22rem 0.42rem;
            font-size: 0.8rem;
            color: var(--morandi-slate);
            background: #fffdf9;
        }
        .perf-group-toolbar .check-select-trigger.universal-select-trigger {
            padding-right: 1.35rem !important;
            text-align: left;
        }
        .perf-group-pager {
            display: inline-flex;
            align-items: center;
            gap: 0.28rem;
            flex-wrap: wrap;
        }
        .perf-group-pager .btn-secondary {
            min-height: 26px;
            padding: 0.16rem 0.38rem;
            font-size: 0.78rem;
            line-height: 1.1;
        }
        .perf-group-pager .perf-inline-help {
            font-size: 0.75rem;
        }
        .perf-group summary::-webkit-details-marker {
            display: none;
        }
        .perf-group-content {
            padding: 0.62rem;
        }
        .perf-group-header-wrap {
            margin-bottom: 0.46rem;
        }
        .perf-group-header-wrap .perf-table {
            min-width: 1180px;
        }
        .perf-group-tree-wrap {
            border: 1px solid rgba(207, 199, 189, 0.76);
            border-radius: 8px;
            background: #fff;
            max-width: 100%;
        }
        /* 分组明细：交给全局 managed-table 接管（列筛选/字段排序/字段显示） */
        .perf-group-parent-row {
            background: #f7f4ef;
            cursor: pointer;
            font-weight: 700;
        }
        .perf-group-parent-row:hover {
            background: #f1ece4;
        }
        .perf-group-toggle {
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--morandi-slate);
            min-width: 18px;
            height: 18px;
            padding: 0 4px;
            cursor: pointer;
            font-size: 0.78rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            outline: none;
            box-shadow: none;
        }
        .perf-group-toggle:focus,
        .perf-group-toggle:focus-visible,
        .perf-group-toggle:active {
            outline: none;
            box-shadow: none;
            border: none;
        }
        .perf-group-toggle::before {
            content: '▸';
            font-size: 0.95rem;
            line-height: 1;
            transform: rotate(0deg);
            transition: transform 120ms ease;
            color: var(--morandi-slate);
        }
        .perf-group-toggle.open::before {
            transform: rotate(90deg);
        }
        .perf-group-child-row,
        .perf-group-child-item {
            display: none;
            background: #fff;
        }
        .perf-group-child-row.open,
        .perf-group-child-item.open {
            display: table-row;
        }
        .perf-group-child-box {
            padding: 0.45rem 0.5rem;
            background: #fff;
        }
        .perf-group-child-title {
            color: var(--morandi-slate);
            font-size: 0.82rem;
            margin-bottom: 0.35rem;
        }
        .perf-group-child-box .perf-table {
            min-width: 1120px;
            font-size: 0.86rem;
        }

        .perf-table-wrap {
            overflow: auto;
            border: 1px solid rgba(207, 199, 189, 0.76);
            border-radius: 8px;
            background: #fff;
            max-width: 100%;
        }
        .perf-group-content .pm-managed-body-wrap {
            max-height: 420px;
            overflow: auto;
        }
        .perf-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 980px;
            color: var(--morandi-ink);
            font-size: 0.9rem;
        }
        .perf-table th,
        .perf-table td {
            padding: 0.42rem 0.5rem;
            border-bottom: 1px solid rgba(207, 199, 189, 0.55);
            text-align: left;
            white-space: nowrap;
        }
        .perf-table th {
            background: #f3efe9;
            color: var(--morandi-ink);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .perf-table tr.row-focus {
            background: rgba(123, 154, 176, 0.18);
        }

        .perf-manage-toolbar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.36rem;
            margin-bottom: 0.58rem;
            font-size: 0.82rem;
            color: var(--morandi-slate);
        }
        .perf-pagination {
            margin-top: 0.5rem;
        }
        .perf-manage-toolbar input[type="text"] {
            min-height: 32px;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            background: #fff;
            color: var(--morandi-ink);
            min-width: 200px;
            padding: 0.28rem 0.48rem;
            font-size: 0.85rem;
        }
        .perf-manage-toolbar select {
            min-height: 32px;
            border: 1px solid var(--morandi-sand);
            border-radius: 8px;
            background: #fff;
            color: var(--morandi-ink);
            padding: 0.24rem 0.42rem;
            font-size: 0.82rem;
        }
        .perf-manage-toolbar .btn-primary,
        .perf-manage-toolbar .btn-secondary,
        .perf-manage-toolbar .btn-accent {
            min-height: 32px;
            padding: 0.26rem 0.52rem;
            font-size: 0.82rem;
            line-height: 1.2;
        }
        .perf-manage-card {
            margin-top: 0.9rem;
        }
        .perf-manage-card .perf-filter-title {
            margin-bottom: 0.55rem;
        }

        .upload-progress {
            position: fixed;
            right: 18px;
            bottom: 18px;
            width: 280px;
            padding: 0.75rem 0.8rem;
            background: #fff;
            border: 1px solid var(--morandi-sand);
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
            z-index: 60;
            display: none;
        }
        .upload-progress-title {
            font-size: 0.9rem;
            color: var(--morandi-ink);
            margin-bottom: 0.45rem;
        }
        .upload-progress-bar {
            width: 100%;
            height: 8px;
            background: var(--morandi-mist);
            border-radius: 99px;
            overflow: hidden;
        }
        .upload-progress-bar > span {
            display: block;
            height: 100%;
            width: 0%;
            background: var(--morandi-sand);
        }

        @media (max-width: 980px) {
            .module-card {
                padding: 0.78rem;
            }
            .perf-toolbar-grid {
                grid-template-columns: 1fr;
            }
            .perf-col + .perf-col {
                border-left: none;
                border-top: 1px dashed rgba(123, 128, 136, 0.35);
                padding-left: 0;
                padding-top: 0.6rem;
            }
            .perf-toolbar,
            .perf-panel {
                padding: 0.68rem;
            }
            .check-select {
                width: 100%;
                max-width: none;
            }
            .perf-col .check-select {
                width: 100%;
                max-width: none;
            }
            .perf-row-title {
                width: 58px;
                min-width: 58px;
                flex: 0 0 58px;
            }
            .perf-filter-pair-row {
                grid-template-columns: 58px 1fr;

    </style>
</head>
<body>

    <div id="uploadProgress" class="upload-progress" aria-live="polite">

        <div class="upload-progress-bar"><span id="uploadProgressFill"></span></div>
    </div>

    <script>
        let uploadProcessingTimer = null;
        let uploadProgressPollingTimer = null;
        const PERF_PAGE_SIZE_KEY = 'sales_perf_list_page_size_v1';
        const PERF_METRIC_ORDER_KEY = 'sales_perf_dashboard_metric_order_v1';
        const PERF_CHART_GRANULARITY_KEY = 'sales_perf_chart_granularity_v1';
        const DERIVED_METRICS = [
            { key: 'acos', label: 'ACOS', color: '#7c9d74', isComputed: true },
            { key: 'acoas', label: 'ACOAS', color: '#6b8f7e', isComputed: true },
            { key: 'rois', label: 'ROIS', color: '#5c7ea3', isComputed: true },
            { key: 'ctr', label: 'CTR', color: '#9d7f5c', isComputed: true },
            { key: 'cvr', label: 'CVR', color: '#8d6d92', isComputed: true },
            { key: 'cpc', label: 'CPC', color: '#a36f6f', isComputed: true }
        ];
        const PERCENT_METRIC_KEYS = new Set(['acos', 'acoas', 'ctr', 'cvr']);
        const state = {
            metrics: [],
            metricOrder: [],
            chartMetricOrder: [],
            groupMetricOrder: [],
            metricMap: {},
            chartGranularity: 'day',
            dashboardQueried: false,
            filterDefs: {
                platforms: { key: 'platform_type_ids', host: 'selPlatforms', title: '全部平台', options: [], selected: new Set() },
                shops: { key: 'shop_ids', host: 'selShops', title: '全部店铺', options: [], selected: new Set() },
                skuFamilies: { key: 'sku_family_ids', host: 'selSkuFamilies', title: '全部货号', options: [], selected: new Set() },
                platformSkus: { key: 'platform_skus', host: 'selPlatformSkus', title: '全部SKU', options: [], selected: new Set() },
                fabrics: { key: 'fabrics', host: 'selFabrics', title: '全部面料', options: [], selected: new Set() },
                specs: { key: 'spec_names', host: 'selSpecs', title: '全部规格', options: [], selected: new Set() },
                adTypes: { key: 'ad_operation_type_ids', host: 'selAdTypes', title: '全部类型', options: [], selected: new Set() }
            },
            eventByDate: {},
            chartGeom: null,
            chartDataByDate: {},
            selectedChartDate: '',
            selectedChartDateOpen: false,
            lastDashboardPayload: null,
            resizeRenderTimer: null,
            lastGroups: [],
            groupSkuRowLimit: 20,
            groupPaging: {},
            performanceItems: [],
            performanceEditId: null,
            performanceSkuPool: [],
            performancePage: 1,
            performancePageSize: 50,
            performanceTotal: 0,
            performanceTotalPages: 1
        };

        function loadPerfPageSizeFromStorage() {
            try {
                const n = Number(localStorage.getItem(PERF_PAGE_SIZE_KEY) || '50');
                if ([20, 50, 100, 300, 500, 1000].includes(n)) return n;
            } catch (e) {}
            return 50;
        }

        function savePerfPageSizeToStorage(size) {
            try { localStorage.setItem(PERF_PAGE_SIZE_KEY, String(size)); } catch (e) {}
        }

        function loadChartGranularityFromStorage() {
            try {
                const v = String(localStorage.getItem(PERF_CHART_GRANULARITY_KEY) || 'day').toLowerCase();
                if (['day', 'week', 'month'].includes(v)) return v;
            } catch (e) {}
            return 'day';
        }

        function saveChartGranularityToStorage(v) {
            try { localStorage.setItem(PERF_CHART_GRANULARITY_KEY, String(v || 'day')); } catch (e) {}
        }

        function loadMetricOrderFromStorage() {
            try {
                const raw = localStorage.getItem(PERF_METRIC_ORDER_KEY) || '[]';
                const arr = JSON.parse(raw);
                if (Array.isArray(arr)) return arr.map(x => String(x || '').trim()).filter(Boolean);
            } catch (e) {}
            return [];
        }

        function saveMetricOrderToStorage() {
            try { localStorage.setItem(PERF_METRIC_ORDER_KEY, JSON.stringify(state.metricOrder || [])); } catch (e) {}
        }

        function toYmd(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function parseYmd(text) {
            const t = String(text || '').slice(0, 10);
            if (!/^\d{4}-\d{2}-\d{2}$/.test(t)) return null;
            const dt = new Date(`${t}T00:00:00`);
            if (Number.isNaN(dt.getTime())) return null;
            return dt;
        }

        function getBucketKeyByGranularity(dateText, granularity) {
            const g = String(granularity || 'day').toLowerCase();
            const dt = parseYmd(dateText);
            if (!dt) return String(dateText || '').slice(0, 10);
            if (g === 'month') {
                return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-01`;
            }
            if (g === 'week') {
                const day = dt.getDay();
                const diff = day === 0 ? -6 : (1 - day);
                const monday = new Date(dt);
                monday.setDate(dt.getDate() + diff);
                return toYmd(monday);
            }
            return toYmd(dt);
        }

        function aggregateChartByGranularity(chartItems, events, granularity) {
            const g = String(granularity || 'day').toLowerCase();
            if (g === 'day') {
                return { items: chartItems || [], events: events || [] };
            }
            const bucketMap = {};
            (chartItems || []).forEach(row => {
                const key = getBucketKeyByGranularity(row.record_date, g);
                const b = bucketMap[key] || (bucketMap[key] = { record_date: key, __sub_rank_sum: 0, __sub_rank_cnt: 0 });
                Object.keys(row || {}).forEach(k => {
                    if (k === 'record_date') return;
                    const num = Number(row[k]);
                    if (!Number.isFinite(num)) return;
                    if (k === 'sub_category_rank') {
                        b.__sub_rank_sum += num;
                        b.__sub_rank_cnt += 1;
                    } else {
                        b[k] = Number(b[k] || 0) + num;
                    }
                });
            });

            const items = Object.keys(bucketMap).sort().map(key => {
                const b = bucketMap[key];
                const out = { record_date: b.record_date };
                Object.keys(b).forEach(k => {
                    if (k === 'record_date' || k.startsWith('__')) return;
                    out[k] = Math.round(Number(b[k] || 0) * 100) / 100;
                });
                if (b.__sub_rank_cnt > 0) {
                    out.sub_category_rank = Math.round((b.__sub_rank_sum / b.__sub_rank_cnt) * 100) / 100;
                }
                return out;
            });

            const remappedEvents = (events || []).map(ev => {
                const oldDate = String(ev.event_date || '').slice(0, 10);
                return Object.assign({}, ev, { event_date: getBucketKeyByGranularity(oldDate, g) });
            });
            return { items, events: remappedEvents };
        }

        function getChartTitleByGranularity(granularity) {
            const g = String(granularity || 'day').toLowerCase();
            if (g === 'month') return '按月趋势';
            if (g === 'week') return '按周趋势';
            return '按日趋势';
        }

        function formatBucketRangeLabel(bucketDate, granularity) {
            const g = String(granularity || 'day').toLowerCase();
            const dt = parseYmd(bucketDate);
            if (!dt) return String(bucketDate || '').slice(0, 10);
            if (g === 'month') {
                const first = new Date(dt.getFullYear(), dt.getMonth(), 1);
                const last = new Date(dt.getFullYear(), dt.getMonth() + 1, 0);
                return `${toYmd(first)} ~ ${toYmd(last)}`;
            }
            if (g === 'week') {
                const first = new Date(dt);
                const last = new Date(dt);
                last.setDate(first.getDate() + 6);
                return `${toYmd(first)} ~ ${toYmd(last)}`;
            }
            return toYmd(dt);
        }

        function formatBucketShortLabel(bucketDate, granularity) {
            const g = String(granularity || 'day').toLowerCase();
            const dt = parseYmd(bucketDate);
            if (!dt) return String(bucketDate || '').slice(0, 10);
            if (g === 'month') {
                return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
            }
            if (g === 'week') {
                const first = new Date(dt);
                const last = new Date(dt);
                last.setDate(first.getDate() + 6);
                return `${String(first.getMonth() + 1).padStart(2, '0')}-${String(first.getDate()).padStart(2, '0')}~${String(last.getMonth() + 1).padStart(2, '0')}-${String(last.getDate()).padStart(2, '0')}`;
            }
            return String(bucketDate || '').slice(5, 10);
        }

        function toDateStr(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function setTodayRange() {
            const end = new Date();
            const start = new Date();
            start.setDate(end.getDate() - 30);
            document.getElementById('filterStartDate').value = toDateStr(start);
            document.getElementById('filterEndDate').value = toDateStr(end);
        }

        function formatNumber(v) {
            const n = Number(v || 0);
            if (!Number.isFinite(n)) return '-';
            if (Math.abs(n) >= 1000) return n.toLocaleString('zh-CN', { maximumFractionDigits: 2 });
            return n.toFixed(2).replace(/\.00$/, '');
        }

        function isPercentMetricKey(key) {
            return PERCENT_METRIC_KEYS.has(String(key || '').toLowerCase());
        }

        function formatMetricValue(v, key) {
            const n = Number(v || 0);
            if (!Number.isFinite(n)) return '-';
            if (isPercentMetricKey(key)) {
                return `${(n * 100).toFixed(2).replace(/\.00$/, '')}%`;
            }
            return formatNumber(n);
        }

        function niceNumber(range, round) {
            const safeRange = Math.max(1e-9, Number(range) || 0);
            const exponent = Math.floor(Math.log10(safeRange));
            const fraction = safeRange / Math.pow(10, exponent);
            let niceFraction;
            if (round) {
                if (fraction < 1.5) niceFraction = 1;
                else if (fraction < 3) niceFraction = 2;
                else if (fraction < 7) niceFraction = 5;
                else niceFraction = 10;
            } else {
                if (fraction <= 1) niceFraction = 1;
                else if (fraction <= 2) niceFraction = 2;
                else if (fraction <= 5) niceFraction = 5;
                else niceFraction = 10;
            }
            return niceFraction * Math.pow(10, exponent);
        }

        function buildNiceScale(minValue, maxValue, tickCount) {
            let minV = Number(minValue || 0);
            let maxV = Number(maxValue || 0);
            if (!Number.isFinite(minV)) minV = 0;
            if (!Number.isFinite(maxV)) maxV = 1;
            if (minV === maxV) {
                const pad = Math.abs(minV || 1) * 0.1;
                minV -= pad;
                maxV += pad;
            }
            const ticks = Math.max(2, Number(tickCount || 5));
            const range = niceNumber(maxV - minV, false);
            const step = niceNumber(range / (ticks - 1), true);
            const niceMin = Math.floor(minV / step) * step;
            const niceMax = Math.ceil(maxV / step) * step;
            return { min: niceMin, max: niceMax, step };
        }

        function formatAxisTickValue(v, asPercent) {
            const n = Number(v || 0);
            if (!Number.isFinite(n)) return '-';
            if (asPercent) {
                const p = n * 100;
                if (Math.abs(p) >= 100) return `${Math.round(p)}%`;
                return `${p.toFixed(1).replace(/\.0$/, '')}%`;
            }
            return formatNumber(n);
        }

        function getAllMetricKeysForTooltip() {
            const keys = [];
            (state.metrics || []).forEach(m => {
                if (m && m.key) keys.push(String(m.key));
            });
            DERIVED_METRICS.forEach(m => {
                if (m && m.key) keys.push(String(m.key));
            });
            return Array.from(new Set(keys));
        }

        function createFilterSelect(def) {
            const host = document.getElementById(def.host);
            if (!host) return;
            host.innerHTML = `
                <button type="button" class="check-select-trigger universal-select-trigger">${def.title}</button>
                <div class="check-select-panel">
                    <div class="check-select-actions">
                        <button type="button" data-action="all">全选</button>
                        <button type="button" data-action="none">清空</button>
                    </div>
                    <input type="text" class="check-select-search" placeholder="搜索">
                    <div class="check-select-list"></div>
                </div>
            `;

            const trigger = host.querySelector('.check-select-trigger, .universal-select-trigger');
            const search = host.querySelector('.check-select-search');
            const list = host.querySelector('.check-select-list');
            const btnAll = host.querySelector('button[data-action="all"]');
            const btnNone = host.querySelector('button[data-action="none"]');

            trigger.addEventListener('click', e => {
                e.stopPropagation();
                document.querySelectorAll('.check-select').forEach(x => {
                    if (x !== host) x.classList.remove('open');
                });
                host.classList.toggle('open');
                if (host.classList.contains('open')) search.focus();
            });
            search.addEventListener('input', () => renderFilterOptions(def));
            btnAll.addEventListener('click', () => {
                const allValues = (def.options || []).map(x => String(x.value));
                if (def.selected.size === allValues.length && allValues.length > 0) {
                    def.selected = new Set();
                } else {
                    def.selected = new Set(allValues);
                }
                renderFilterOptions(def);
                refreshFilterTrigger(def);
            });
            btnNone.addEventListener('click', () => {
                def.selected = new Set();
                renderFilterOptions(def);
                refreshFilterTrigger(def);
            });

            renderFilterOptions(def);
            refreshFilterTrigger(def);
        }

        function renderFilterOptions(def) {
            const host = document.getElementById(def.host);
            if (!host) return;
            const keyword = String(host.querySelector('.check-select-search').value || '').trim().toLowerCase();
            const list = host.querySelector('.check-select-list');
            const rows = (def.options || []).filter(x => !keyword || String(x.label || '').toLowerCase().includes(keyword));
            if (!rows.length) {
                list.innerHTML = '<div class="check-select-empty">无匹配项</div>';
                return;
            }
            list.innerHTML = rows.map(x => {
                const checked = def.selected.has(String(x.value)) ? 'checked' : '';
                return `<label class="check-select-item"><input type="checkbox" value="${String(x.value).replace(/"/g, '&quot;')}" ${checked}><span>${x.label}</span></label>`;
            }).join('');
            list.querySelectorAll('input[type="checkbox"]').forEach(box => {
                box.addEventListener('change', function() {
                    const val = String(this.value);
                    if (this.checked) def.selected.add(val);
                    else def.selected.delete(val);
                    refreshFilterTrigger(def);
                });
            });
        }

        function refreshFilterTrigger(def) {
            const host = document.getElementById(def.host);
            if (!host) return;
            const trigger = host.querySelector('.check-select-trigger, .universal-select-trigger');
            const count = def.selected.size;
            if (!count) {
                trigger.textContent = def.title;
                host.classList.remove('has-value');
                trigger.classList.remove('has-value');
                return;
            }
            if (count === 1) {
                const one = def.options.find(x => def.selected.has(String(x.value)));
                trigger.textContent = one ? one.label : `${count}项`;
                host.classList.add('has-value');
                trigger.classList.add('has-value');
                return;
            }
            trigger.textContent = `已选${count}项`;
            host.classList.add('has-value');
            trigger.classList.add('has-value');
        }

        function getFilterValues(defName) {
            const def = state.filterDefs[defName];
            if (!def) return [];
            return Array.from(def.selected.values());
        }

        function rebuildMetricMap() {
            state.metricMap = {};
            (state.metrics || []).forEach(m => {
                state.metricMap[m.key] = m;
            });
            DERIVED_METRICS.forEach(m => {
                state.metricMap[m.key] = m;
            });
        }

        function safeDiv(a, b) {
            const x = Number(a || 0);
            const y = Number(b || 0);
            if (!Number.isFinite(x) || !Number.isFinite(y) || y === 0) return 0;
            return x / y;
        }

        function resolveMetricValue(row, key) {
            if (key === 'acos') return safeDiv(row.ad_spend, row.ad_sales_amount);
            if (key === 'acoas') return safeDiv(row.ad_spend, row.net_sales_amount);
            if (key === 'rois') return safeDiv(row.net_sales_amount, row.ad_spend);
            if (key === 'ctr') return safeDiv(row.ad_clicks, row.ad_impressions);
            if (key === 'cvr') return safeDiv(row.ad_orders, row.ad_clicks);
            if (key === 'cpc') return safeDiv(row.ad_spend, row.ad_clicks);
            const n = Number(row[key]);
            return Number.isFinite(n) ? n : 0;
        }

        function getDefaultMetricOrder() {
            return [
                'sales_qty', 'net_sales_amount', 'order_qty', 'ad_spend', 'ad_sales_amount',
                'acos', 'acoas', 'rois', 'ctr', 'cvr', 'cpc'
            ].filter(k => state.metricMap[k]);
        }

        function renderMetricCheckboxBar() {
            const host = document.getElementById('metricCheckboxBar');
            if (!host) return;
            const rows = Object.values(state.metricMap || {});
            host.innerHTML = rows.map(m => {
                const checked = state.metricOrder.includes(m.key) ? 'checked' : '';
                return `<label class="metric-chip"><input type="checkbox" data-metric-key="${m.key}" ${checked}><span>${m.label}</span></label>`;
            }).join('');

            host.querySelectorAll('input[type="checkbox"][data-metric-key]').forEach(box => {
                box.addEventListener('change', function() {
                    const key = String(this.getAttribute('data-metric-key') || '');
                    if (!key) return;
                    if (this.checked) {
                        if (!state.metricOrder.includes(key)) state.metricOrder.push(key);
                    } else {
                        state.metricOrder = state.metricOrder.filter(x => x !== key);
                    }
                    if (!state.metricOrder.length) {
                        state.metricOrder = getDefaultMetricOrder();
                        renderMetricCheckboxBar();
                    }
                    // 分组明细字段仅受“字段显示”影响；图表可单独演进（目前默认保持一致）
                    state.groupMetricOrder = state.metricOrder.slice();
                    state.chartMetricOrder = state.metricOrder.slice();
                    saveMetricOrderToStorage();
                    renderPercentMetricBar();
                    if (state.dashboardQueried) loadDashboard();
                });
            });
        }

        async function loadFilters() {
            const resp = await fetch('/api/sales-product-performance-dashboard?mode=filters', { credentials: 'include' });
            const data = await resp.json();
            if (!resp.ok || data.status !== 'success') {
                throw new Error(data.message || '加载筛选项失败');
            }
            const f = data.filters || {};
            state.metrics = f.metrics || [];

            state.filterDefs.platforms.options = (f.platform_types || []).map(x => ({ value: String(x.id), label: x.name || String(x.id) }));
            state.filterDefs.shops.options = (f.shops || []).map(x => ({ value: String(x.id), label: x.name || String(x.id) }));

            state.filterDefs.skuFamilies.options = (f.sku_families || []).map(x => ({ value: String(x.id), label: x.name || String(x.id) }));
            state.filterDefs.platformSkus.options = (f.platform_skus || []).map(x => ({ value: x.name || '', label: x.name || '' })).filter(x => x.value);
            state.filterDefs.fabrics.options = (f.fabrics || []).map(x => ({ value: String(x), label: String(x) }));
            state.filterDefs.specs.options = (f.spec_names || []).map(x => ({ value: String(x), label: String(x) }));
            state.filterDefs.adTypes.options = (f.ad_operation_types || []).map(x => ({ value: String(x.id), label: x.name || String(x.id) }));

            createFilterSelect(state.filterDefs.platforms);
            createFilterSelect(state.filterDefs.shops);
            createFilterSelect(state.filterDefs.skuFamilies);
            createFilterSelect(state.filterDefs.platformSkus);
            createFilterSelect(state.filterDefs.fabrics);
            createFilterSelect(state.filterDefs.specs);
            createFilterSelect(state.filterDefs.adTypes);

            rebuildMetricMap();
            const storedOrder = loadMetricOrderFromStorage();
            const allowed = new Set(Object.keys(state.metricMap || {}));
            state.metricOrder = storedOrder.filter(k => allowed.has(k));
            if (!state.metricOrder.length) {
                state.metricOrder = getDefaultMetricOrder();
            }
            state.groupMetricOrder = state.metricOrder.slice();
            state.chartMetricOrder = state.metricOrder.slice();
            renderMetricCheckboxBar();
            renderPercentMetricBar();
        }

        function buildDashboardQuery() {
            const q = new URLSearchParams();
            const gran = String(state.chartGranularity || 'day').toLowerCase();
            q.set('granularity', gran);

            const startEl = document.getElementById('filterStartDate');
            const endEl = document.getElementById('filterEndDate');
            let start = (startEl && startEl.value) ? String(startEl.value) : '';
            let end = (endEl && endEl.value) ? String(endEl.value) : '';

            const maxDaysByGran = (g) => {
                if (g === 'day') return 31;
                if (g === 'week') return 183;
                return null; // month 不限制
            };

            const parseDate = (s) => {
                const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s || '').trim());
                if (!m) return null;
                const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
                if (Number.isNaN(d.getTime())) return null;
                d.setHours(0,0,0,0);
                return d;
            };

            const fmtDate = (d) => {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${dd}`;
            };

            const sd = parseDate(start);
            const ed = parseDate(end);
            const maxDays = maxDaysByGran(gran);
            if (maxDays && sd && ed) {
                let a = sd, b = ed;
                if (b.getTime() < a.getTime()) { const t = a; a = b; b = t; }
                const diffDays = Math.floor((b.getTime() - a.getTime()) / (24 * 3600 * 1000)) + 1;
                if (diffDays > maxDays) {
                    // 自动裁剪 end，避免用户误操作导致超慢
                    const clipped = new Date(a.getTime() + (maxDays - 1) * 24 * 3600 * 1000);
                    end = fmtDate(clipped);
                    if (endEl) endEl.value = end;
                    window.showAppToast && window.showAppToast(`已按粒度限制自动裁剪日期范围：${gran} 最多 ${maxDays} 天`, true, 6000);
                }
                start = fmtDate(a);
                if (startEl) startEl.value = start;
            }

            q.set('start_date', start || '');
            q.set('end_date', end || '');
            q.set('metric_keys', (state.metrics || []).map(m => m.key).join(','));
            q.set('include_todos', document.getElementById('toggleTodos').checked ? '1' : '0');
            q.set('include_ads', document.getElementById('toggleAds').checked ? '1' : '0');

            const setIf = (k, arr) => { if (arr.length) q.set(k, arr.join(',')); };
            setIf('platform_type_ids', getFilterValues('platforms'));
            setIf('shop_ids', getFilterValues('shops'));
            setIf('sku_family_ids', getFilterValues('skuFamilies'));
            setIf('platform_skus', getFilterValues('platformSkus'));
            setIf('fabrics', getFilterValues('fabrics'));
            setIf('spec_names', getFilterValues('specs'));
            setIf('ad_operation_type_ids', getFilterValues('adTypes'));
            return q.toString();
        }

        function mapEvents(events) {
            state.eventByDate = {};
            (events || []).forEach(e => {

                if (!d) return;

        function renderPercentMetricBar() {

        function renderChart(chartItems, events) {
            const canvas = document.getElementById('perfChart');
            const wrap = document.getElementById('chartWrap');
            const hoverLine = document.getElementById('chartHoverLine');
            const dpr = window.devicePixelRatio || 1;
            const width = Math.max(820, wrap.clientWidth - 16);
            const height = 300;

            canvas.width = Math.floor(width * dpr);
            canvas.height = Math.floor(height * dpr);
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, width, height);

            const chartKeys = (state.chartMetricOrder || state.metricOrder || []).filter(Boolean);
            if (!chartItems || !chartItems.length || !chartKeys.length) {
                ctx.fillStyle = '#7f7a73';
                ctx.font = '14px sans-serif';
                ctx.fillText('暂无趋势数据', 24, 42);
                state.chartGeom = null;
                state.chartDataByDate = {}
                mapEvents([]);
                hideChartDetailPanel();
                if (hoverLine) hoverLine.style.display = 'none';
                return;
            }

            const valueKeys = chartKeys.filter(k => !isPercentMetricKey(k));
            const percentKeys = chartKeys.filter(k => isPercentMetricKey(k));
            const hasRightAxis = percentKeys.length > 0;
            const pad = { left: 56, right: hasRightAxis ? 66 : 24, top: 18, bottom: 36 };
            const innerW = width - pad.left - pad.right;
            const innerH = height - pad.top - pad.bottom;
            const dates = chartItems.map(x => String(x.record_date || '').slice(0, 10));

            const yTick = 5;
            // left(value) axis scale
            let vMin = Infinity, vMax = -Infinity;
            (valueKeys.length ? valueKeys : percentKeys).forEach(k => {
                chartItems.forEach(row => {
                    const v = resolveMetricValue(row, k);
                    if (!Number.isFinite(v)) return;
                    if (v < vMin) vMin = v;
                    if (v > vMax) vMax = v;
                });
            });
            if (!Number.isFinite(vMin) || !Number.isFinite(vMax)) { vMin = 0; vMax = 1; }
            const leftAsPercent = valueKeys.length === 0 && percentKeys.length > 0;
            if (leftAsPercent) {
                vMin = Math.max(0, vMin);
                vMax = Math.max(vMax, 0.01);
            }
            const leftScale = buildNiceScale(vMin, vMax, yTick + 1);
            vMin = leftScale.min; vMax = leftScale.max;

            // right(percent) axis scale
            let pMin = 0, pMax = 0.01;
            if (percentKeys.length) {
                pMin = Infinity; pMax = -Infinity;
                percentKeys.forEach(k => {
                    chartItems.forEach(row => {
                        const v = resolveMetricValue(row, k);
                        if (!Number.isFinite(v)) return;
                        if (v < pMin) pMin = v;
                        if (v > pMax) pMax = v;
                    });
                });
                if (!Number.isFinite(pMin) || !Number.isFinite(pMax)) { pMin = 0; pMax = 0.01; }
                pMin = Math.max(0, pMin);
                pMax = Math.max(pMax, 0.01);
            }
            const rightScale = percentKeys.length ? buildNiceScale(pMin, pMax, yTick + 1) : null;
            if (rightScale) { pMin = rightScale.min; pMax = rightScale.max; }

            ctx.strokeStyle = 'rgba(128, 128, 128, 0.22)';
            ctx.fillStyle = '#746d64';
            ctx.font = '12px sans-serif';
            for (let i = 0; i <= yTick; i += 1) {
                const y = pad.top + (innerH * i / yTick);
                const val = vMax - ((vMax - vMin) * i / yTick);
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(width - pad.right, y);
                ctx.stroke();
                ctx.fillText(formatAxisTickValue(val, leftAsPercent), 8, y + 4);
                if (rightScale) {
                    const pVal = pMax - ((pMax - pMin) * i / yTick);
                    const label = formatAxisTickValue(pVal, true);
                    const textW = ctx.measureText(label).width;
                    ctx.fillText(label, width - pad.right + Math.max(0, (pad.right - textW - 6)), y + 4);
                }
            }

            const xAt = idx => pad.left + (innerW * (dates.length <= 1 ? 0 : idx / (dates.length - 1)));
            const yAtValue = v => pad.top + (innerH * (vMax - v) / (vMax - vMin));
            const yAtPercent = v => pad.top + (innerH * (pMax - v) / (pMax - pMin));
            const rowByDate = {};
            chartItems.forEach(row => {
                const d = String(row.record_date || '').slice(0, 10);
                if (d && !rowByDate[d]) rowByDate[d] = row;
            });

            state.metricOrder.forEach(k => {
                const m = state.metricMap[k];
                if (!m) return;
                ctx.lineWidth = 2;
                ctx.strokeStyle = m.color || '#5b6aa8';
                ctx.beginPath();
                chartItems.forEach((row, idx) => {
                    const v = resolveMetricValue(row, k);
                    if (!Number.isFinite(v)) return;
                    const x = xAt(idx);
                    const y = isPercentMetricKey(k) && rightScale ? yAtPercent(v) : yAtValue(v);
                    if (idx === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();
            });

            ctx.fillStyle = '#7f786f';
            for (let i = 0; i < dates.length; i += Math.max(1, Math.floor(dates.length / 6))) {
                const x = xAt(i);
                const label = formatBucketShortLabel(dates[i], state.chartGranularity);
                ctx.fillText(label, x - 16, height - 10);
            }

            mapEvents(events || []);
            const eventLines = {};
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = '#8f8f8f';
            Object.keys(state.eventByDate).forEach(d => {
                const idx = dates.indexOf(d);
                if (idx < 0) return;
                const x = xAt(idx);
                eventLines[d] = x;
                ctx.beginPath();
                ctx.moveTo(x, pad.top);
                ctx.lineTo(x, height - pad.bottom);
                ctx.stroke();
            });
            ctx.setLineDash([]);

            state.chartGeom = { dates, xAt, width, height, pad, innerW, rowByDate, eventLines };
            state.chartDataByDate = rowByDate;
        }

        function formatEventBlock(ev) {
            const sku = (ev.platform_skus || []).join('、') || '-';
            const sf = (ev.sku_families || []).join('、') || '-';
            if (ev.event_type === 'todo') {
                return `<div style="margin-top:0.32rem;"><strong>[待办完成]</strong> ${ev.title || ''}<br>创建人: ${ev.creator || '-'}<br>SKU: ${sku}<br>货号: ${sf}<br>${ev.detail || ''}</div>`;
            }
            return `<div style="margin-top:0.32rem;"><strong>[广告调整]</strong> ${ev.operation_type_name || ''}<br>目标: ${ev.target_object || '-'}<br>SKU: ${sku}<br>货号: ${sf}<br>${ev.detail || ''}</div>`;
        }

        function hideChartDetailPanel() {
            const panel = document.getElementById('chartDetailPanel');
            if (!panel) return;
            panel.classList.remove('active');
            panel.innerHTML = '';
            state.selectedChartDate = '';
            state.selectedChartDateOpen = false;
            // 收起图表明细时：恢复“汇总”分组明细（不修改顶部筛选；只刷新分组）
            if (state._chartDrillRange && state._chartDrillRange.active) {
                state._chartDrillRange.active = false;
                // 不再二次请求：直接恢复首次查询返回的汇总 groups
                const base = state.lastDashboardPayload || {};
                renderGroups(base.groups || []);
            }
        }

        function renderChartDetailPanel(dateText) {
            const panel = document.getElementById('chartDetailPanel');
            if (!panel) return;
            const row = state.chartDataByDate[dateText] || {};
            const keys = (state.chartMetricOrder || state.metricOrder || []).filter(Boolean);
            const events = state.eventByDate[dateText] || [];
            const displayRange = getBucketRangeLabel(dateText, state.chartGranularity);
            const metricHtml = keys.map(k => {
                const m = (state.metricMap || {})[k] || { label: k };
                return `<div class="perf-chart-detail-row"><span>${m.label || k}</span><strong>${formatMetricValue(resolveMetricValue(row, k), k)}</strong></div>`;
            }).join('');
            const eventHtml = events.length
                ? events.map(formatEventBlock).join('')
                : '<div class="perf-chart-detail-empty">当日无待办或广告事件</div>';
            panel.innerHTML = `
                <div class="perf-chart-detail-head">
                    <div class="perf-chart-detail-title">${displayRange} · 图表明细</div>
                    <button type="button" class="btn-secondary" id="btnToggleChartDetail">收起</button>
                </div>
                <div class="perf-chart-detail-body">
                    <div class="perf-chart-detail-block">
                        <h4>当日字段数据</h4>
                        <div class="perf-chart-detail-grid">${metricHtml}</div>
                    </div>
                    <div class="perf-chart-detail-block">
                        <h4>图表事件标注</h4>
                        <div class="perf-chart-detail-events">${eventHtml}</div>
                    </div>
                </div>
            `;
            panel.classList.add('active');
            const btn = document.getElementById('btnToggleChartDetail');
            if (btn) btn.onclick = hideChartDetailPanel;
        }

        function toggleChartDetailPanel(dateText) {
            if (!dateText) return;
            if (state.selectedChartDate === dateText && state.selectedChartDateOpen) {
                hideChartDetailPanel();
                return;
            }
            state.selectedChartDate = dateText;
            state.selectedChartDateOpen = true;
            renderChartDetailPanel(dateText);
            // 单击图表时：仅更新下方明细（不修改顶部筛选；不重绘图表）
            try {
                const prevStart = (document.getElementById('filterStartDate') || {}).value || '';
                const prevEnd = (document.getElementById('filterEndDate') || {}).value || '';
                const rng = getBucketStartEnd(dateText, state.chartGranularity);
                if (rng && rng.start && rng.end) {
                    state._chartDrillRange = { active: true, prevStart, prevEnd, drillStart: rng.start, drillEnd: rng.end, bucketKey: dateText };
                    // 不再二次请求：使用首次查询返回的 groups_by_bucket
                    const base = state.lastDashboardPayload || {};
                    const byBucket = base.groups_by_bucket || {};
                    renderGroups(byBucket[dateText] || []);
                }
            } catch (e) { /* ignore */ }
        }

        function getBucketStartEnd(dateText, granularity) {
            const dt = String(dateText || '').slice(0, 10);
            if (!dt) return null;
            const pad2 = n => String(n).padStart(2, '0');
            const addDays = (yyyyMMdd, days) => {
                const d = new Date(yyyyMMdd + 'T00:00:00');
                d.setDate(d.getDate() + (Number(days) || 0));
                const y = d.getFullYear();
                const m = pad2(d.getMonth() + 1);
                const dd = pad2(d.getDate());
                return `${y}-${m}-${dd}`;
            };
            if (granularity === 'week') {
                return { start: dt, end: addDays(dt, 6) };
            }
            if (granularity === 'month') {
                const d = new Date(dt + 'T00:00:00');
                const y = d.getFullYear();
                const m = d.getMonth(); // 0-based
                const last = new Date(y, m + 1, 0);
                return { start: `${y}-${pad2(m + 1)}-01`, end: `${y}-${pad2(m + 1)}-${pad2(last.getDate())}` };
            }
            return { start: dt, end: dt };
        }

        function getBucketRangeLabel(dateText, granularity) {
            const key = String(dateText || '').slice(0, 10);
            const map = state.bucketRangeByDate || {};
            const r = map[key];
            if (r && r.start && r.end) return `${r.start} ~ ${r.end}`;
            return formatBucketRangeLabel(dateText, granularity);
        }

        function getNearestDateByChartX(x) {
            const geom = state.chartGeom;
            if (!geom || !Array.isArray(geom.dates) || !geom.dates.length) return '';
            const minX = geom.pad.left;
            const maxX = geom.width - geom.pad.right;
            if (x < minX || x > maxX) return '';
            if (geom.dates.length === 1) return geom.dates[0] || '';
            const ratio = Math.max(0, Math.min(1, (x - minX) / Math.max(1, geom.innerW || 1)));
            const idx = Math.round(ratio * (geom.dates.length - 1));
            return geom.dates[idx] || '';
        }

        function getNearestChartPointByX(x) {
            const geom = state.chartGeom;
            if (!geom || !Array.isArray(geom.dates) || !geom.dates.length) return null;
            const minX = geom.pad.left;
            const maxX = geom.width - geom.pad.right;
            if (x < minX || x > maxX) return null;
            const ratio = Math.max(0, Math.min(1, (x - minX) / Math.max(1, geom.innerW || 1)));
            const idx = Math.round(ratio * (geom.dates.length - 1));
            const date = geom.dates[idx] || '';
            if (!date) return null;
            const snappedX = typeof geom.xAt === 'function' ? geom.xAt(idx) : x;
            return { date, idx, x: snappedX };
        }

        function focusEventsByDate(dateText) {
            const rows = state.eventByDate[dateText] || [];
            if (!rows.length) return;

        function focusGroupRowsByDate(dateText) {

        function bindChartInteractions() {
            const canvas = document.getElementById('perfChart');
            const tip = document.getElementById('eventTooltip');
            const hoverLine = document.getElementById('chartHoverLine');

            canvas.addEventListener('mousemove', e => {
                if (!state.chartGeom) {
                    tip.style.display = 'none';
                    hoverLine.style.display = 'none';
                    return;
                }
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const point = getNearestChartPointByX(x);
                if (!point || !point.date) {
                    tip.style.display = 'none';
                    hoverLine.style.display = 'none';
                    return;
                }
                tip.innerHTML = buildDateColumnTooltipHtml(point.date);
                tip.style.display = 'block';
                // 右侧防遮挡：优先显示在点的右侧，若超出 viewport / wrap 则自动翻转到左侧并 clamp
                const wrapRect = canvas.parentElement.getBoundingClientRect();
                const viewportW = window.innerWidth || document.documentElement.clientWidth || (wrapRect.right + 1);
                const margin = 10;
                const tipW = Math.max(260, tip.offsetWidth || 0);
                let leftPx = point.x + 14;
                // overflow to viewport right -> flip
                if ((wrapRect.left + leftPx + tipW + margin) > viewportW) {
                    leftPx = point.x - tipW - 14;
                }
                // clamp within wrap
                leftPx = Math.max(8, Math.min(wrapRect.width - tipW - 8, leftPx));
                tip.style.left = `${leftPx}px`;
                const tipHeight = Math.max(140, tip.offsetHeight || 0);
                let top = Math.max(8, e.clientY - wrapRect.top + 10);
                if (top + tipHeight > wrapRect.height - 8) {
                    top = Math.max(8, wrapRect.height - tipHeight - 8);
                }
                tip.style.top = `${top}px`;
                hoverLine.style.left = `${Math.max(0, (rect.left - wrapRect.left) + point.x)}px`;
                hoverLine.style.display = 'block';
            });

            canvas.addEventListener('mouseleave', () => {
                tip.style.display = 'none';
                hoverLine.style.display = 'none';
            });

            canvas.addEventListener('click', e => {
                if (!state.chartGeom) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const point = getNearestChartPointByX(x);
                if (point && point.date) {
                    toggleChartDetailPanel(point.date);
                }
            });
        }

            // 层级排序：绑定到 managed 生成的表头（显示箭头），并对子SKU应用同规则排序

        function bindPerfGroupHierSort(table) {
            if (!table) return;
            const tbody = table.tBodies && table.tBodies[0];
            const parentRows = () => Array.from(tbody.querySelectorAll('tr.perf-group-parent-row'));
            const childRowsByKey = (key) => Array.from(tbody.querySelectorAll(`tr.perf-group-child-item[data-group-key="${key}"]`));

            const readComparable = (tr, cellIndex) => {
                const cell = tr && tr.cells ? tr.cells[cellIndex] : null;
                const txt = String(cell ? cell.textContent : '').trim();
                if (!txt || txt === '-') return null;
                const n = Number(String(txt).replace(/[%,\s]/g, ''));
                if (Number.isFinite(n) && /[\d]/.test(txt)) return n;
                return txt;
            };

            const sortState = { key: '', dir: null }; // dir: 'asc'|'desc'|null

            const findBodyColIndexByKey = (manageKey) => {
                const head = table.tHead && table.tHead.rows && table.tHead.rows[0];
                if (!head) return -1;
                for (let i = 0; i < head.cells.length; i++) {
                    const k = String(head.cells[i].dataset.manageColKey || '').trim();
                    if (k && k === manageKey) return i;
                }
                return -1;
            };

            const refreshHeaderArrows = (headerRowEl) => {
                if (!headerRowEl) return;
                Array.from(headerRowEl.cells || []).forEach((th) => {
                    const k = String(th.dataset.manageColKey || '').trim();
                    th.classList.remove('pm-sortable', 'pm-sort-asc', 'pm-sort-desc');
                    if (!k || k === '__toggle') return;
                    th.classList.add('pm-sortable');
                    if (sortState.key !== k || !sortState.dir) return;
                    if (sortState.dir === 'asc') th.classList.add('pm-sort-asc');
                    if (sortState.dir === 'desc') th.classList.add('pm-sort-desc');
                });
            };

            const applyHierSort = (manageKey) => {
                const idx = findBodyColIndexByKey(manageKey);
                if (idx < 0) return;

                const parents = parentRows();
                const origin = parents.map((tr, i) => [tr, i]);
                const mapOrigin = new Map(origin);

                const applyOrder = (orderedParents) => {
                    orderedParents.forEach(p => {
                        const key = String(p.dataset.groupKey || '');
                        tbody.appendChild(p);
                        const kids = childRowsByKey(key).slice();
                        if (!sortState.dir) {
                            kids.sort((a, b) => Number(a.dataset.sortOrigin || '0') - Number(b.dataset.sortOrigin || '0'));
                        } else {
                            const dir = sortState.dir;
                            kids.sort((a, b) => {
                                const av = readComparable(a, idx);
                                const bv = readComparable(b, idx);
                                if (av == null && bv == null) return Number(a.dataset.sortOrigin || '0') - Number(b.dataset.sortOrigin || '0');
                                if (av == null) return 1;
                                if (bv == null) return -1;
                                if (typeof av === 'number' && typeof bv === 'number') return dir === 'asc' ? (av - bv) : (bv - av);
                                if (av === bv) return Number(a.dataset.sortOrigin || '0') - Number(b.dataset.sortOrigin || '0');
                                return dir === 'asc'
                                    ? String(av).localeCompare(String(bv), 'zh-Hans-CN', { sensitivity: 'base' })
                                    : String(bv).localeCompare(String(av), 'zh-Hans-CN', { sensitivity: 'base' });
                            });
                        }
                        kids.forEach(k => tbody.appendChild(k));
                    });
                };

                if (!sortState.dir) {
                    const restored = parents.slice().sort((a, b) => (Number(a.dataset.sortOrigin || '0') - Number(b.dataset.sortOrigin || '0')));
                    applyOrder(restored);
                    return;
                }
                const dir = sortState.dir;
                const sorted = parents.slice().sort((a, b) => {
                    const av = readComparable(a, idx);
                    const bv = readComparable(b, idx);
                    if (av == null && bv == null) return (mapOrigin.get(a) ?? 0) - (mapOrigin.get(b) ?? 0);
                    if (av == null) return 1;
                    if (bv == null) return -1;
                    if (typeof av === 'number' && typeof bv === 'number') return dir === 'asc' ? (av - bv) : (bv - av);
                    if (av === bv) return (mapOrigin.get(a) ?? 0) - (mapOrigin.get(b) ?? 0);
                    return dir === 'asc'
                        ? String(av).localeCompare(String(bv), 'zh-Hans-CN', { sensitivity: 'base' })
                        : String(bv).localeCompare(String(av), 'zh-Hans-CN', { sensitivity: 'base' });
                });
                applyOrder(sorted);
            };

            const bindHeaderRow = (headerRowEl) => {
                if (!headerRowEl || headerRowEl.dataset.perfGroupSortBound === '1') return;
                headerRowEl.dataset.perfGroupSortBound = '1';
                refreshHeaderArrows(headerRowEl);
                Array.from(headerRowEl.cells || []).forEach((th) => {
                    const manageKey = String(th.dataset.manageColKey || '').trim();
                    if (!manageKey || manageKey === '__toggle') return;
                    th.style.cursor = 'pointer';
                    th.addEventListener('click', (e) => {
                    if (e.target && e.target.closest && e.target.closest('button,input,select,textarea,a,label')) return;
                    if (sortState.key !== manageKey) {
                        sortState.key = manageKey;
                        sortState.dir = 'desc';
                    } else if (sortState.dir === 'desc') {
                        sortState.dir = 'asc';
                    } else if (sortState.dir === 'asc') {
                        sortState.dir = null;
                    } else {
                        sortState.dir = 'desc';
                    }
                    // 同步所有表头（原表头 + detached 表头）
                    const root = table.parentElement ? table.parentElement.parentElement : document;
                    root.querySelectorAll('table.pm-managed-head-table thead tr, table#perfGroupTable thead tr').forEach(r => refreshHeaderArrows(r));
                    applyHierSort(manageKey);
                    });
                });
            };

            // 原表头绑定（有时用户仍会点到）
            if (table.tHead && table.tHead.rows && table.tHead.rows[0]) {
                bindHeaderRow(table.tHead.rows[0]);
            }
            // managed 会生成 detached header：延迟绑定
            window.setTimeout(() => {
                const bodyWrap = table.closest('.pm-managed-body-wrap');
                const host = bodyWrap && bodyWrap.parentElement ? bodyWrap.parentElement : document;
                const headTable = host.querySelector('.pm-managed-head-wrap table.pm-managed-head-table');
                const r = headTable && headTable.tHead && headTable.tHead.rows && headTable.tHead.rows[0];
                if (r) bindHeaderRow(r);
            }, 60);
        }

        function renderDashboardPayload(data) {
            const payload = data || {};
            state.lastDashboardPayload = {
                chart_items: payload.chart_items || [],
                events: payload.events || [],
                groups: payload.groups || [],
                groups_by_bucket: payload.groups_by_bucket || {}
            };
            // 建立“桶 -> 真实范围”的映射（用于截断桶显示）
            state.bucketRangeByDate = {};
            (state.lastDashboardPayload.chart_items || []).forEach(it => {
                const k = String(it.record_date || '').slice(0, 10);
                const rs = String(it.range_start || '').slice(0, 10);
                const re = String(it.range_end || '').slice(0, 10);
                if (k && rs && re) state.bucketRangeByDate[k] = { start: rs, end: re };
            });
            const transformed = aggregateChartByGranularity(state.lastDashboardPayload.chart_items, state.lastDashboardPayload.events, state.chartGranularity);
            const titleEl = document.getElementById('chartTitle');
            if (titleEl) titleEl.textContent = getChartTitleByGranularity(state.chartGranularity);
            renderLegend();
            renderChart(transformed.items || [], transformed.events || []);
            renderGroups(state.lastDashboardPayload.groups || []);
            const status = document.getElementById('dataStatus');
            if (status) {
                const groupCount = Number(payload.total_groups || (state.lastDashboardPayload.groups || []).length || 0);
                const itemCount = Number(payload.total_items || 0);
                const eventCount = Number((state.lastDashboardPayload.events || []).length || 0);
                status.textContent = itemCount > 0
                    ? `货号组: ${groupCount}，平台SKU: ${itemCount}，事件: ${eventCount}`
                    : `货号组: ${groupCount}，事件: ${eventCount}`;
            }
        }

        async function loadDashboard() {
            state.dashboardQueried = true;
            const status = document.getElementById('dataStatus');
            status.textContent = '加载中...';
            try {
                const query = buildDashboardQuery();
                const resp = await fetch(`/api/sales-product-performance-dashboard?${query}`, { credentials: 'include' });
                const data = await resp.json();
                if (!resp.ok || data.status !== 'success') {
                    throw new Error(data.message || '加载看板失败');

        function showPerfDialog(opts) {

        function buildImportTaskId() {
