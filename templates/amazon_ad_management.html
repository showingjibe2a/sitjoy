<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广告信息管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>广告信息管理</h2>
            <p>维护广告组合（Portfolio）/广告活动（Campaign）/广告组（Group）三层基础信息</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin: 0;">
                            <span class="pm-search-title">搜索</span>
                            <input type="text" id="searchInput" placeholder="搜索广告名称/货号/细分类">
                            <button class="btn-primary" onclick="loadAdList()">搜索</button>
                            <button class="btn-secondary" onclick="resetSearch()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-secondary" onclick="downloadAdTemplate()">下载模板</button>
                        <button class="btn-secondary" onclick="triggerAdUpload()">批量上传</button>
                        <input type="file" id="adUploadInput" accept=".xlsx" style="display:none;">
                        <button class="btn-accent" onclick="openCreateModal()">新增</button>
                    </div>
                </div>
            </div>

            <div>
                <table class="pm-table" id="adTable">
                    <thead>
                        <tr>
                            <th style="width:220px;">状态</th>
                            <th>广告组合</th>
                            <th>广告活动</th>
                            <th>广告组</th>
                            <th>细分类</th>
                            <th style="width:140px;">亚马逊ID</th>
                            <th>最后修改时间</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="8" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        // -------------------------------------------------------------------------
        // 广告信息（组合/活动/组）列表：搜索、内联状态、AmazonAdFormModal 新建编辑
        // -------------------------------------------------------------------------

        // -------------------------------------------------------------------------
        // 模块级状态
        // -------------------------------------------------------------------------
        let adItemsCache = [];
        let adItemsById = {};

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            loadAdList();
        }

        function formatDateTime(value) {
            return value ? new Date(value).toLocaleString('zh-CN') : '';
        }

        function levelLabel(level) {
            if (level === 'portfolio') return '广告组合';
            if (level === 'campaign') return '广告活动';
            if (level === 'group') return '广告组';
            return '';
        }

        function formatSubtypeText(item) {
            if (!item) return '';
            if (item.ad_class && item.subtype_code) {
                return `${item.ad_class}-${item.subtype_code}`;
            }
            return item.subtype_description || '';
        }

        // -------------------------------------------------------------------------
        // 表格渲染 / 内联状态
        // -------------------------------------------------------------------------

        function renderInlineAdStatus(item) {
            const current = item?.status || '启动';
            const id = item?.id;
            return `
                <div class="status-segment status-segment--inline">
                    <button type="button" class="status-pill status-pill--enabled ${current === '启动' ? 'is-active' : ''}" onclick="quickUpdateAdStatus(${id}, '启动')">启动</button>
                    <button type="button" class="status-pill status-pill--paused ${current === '暂停' ? 'is-active' : ''}" onclick="quickUpdateAdStatus(${id}, '暂停')">暂停</button>
                    <button type="button" class="status-pill status-pill--archived ${current === '存档' ? 'is-active' : ''}" onclick="quickUpdateAdStatus(${id}, '存档')">存档</button>
                </div>
            `;
        }

        function quickUpdateAdStatus(id, status) {
            const target = (adItemsCache || []).find(x => String(x.id) === String(id));
            if (!id || !status || !target) return;
            if ((target.status || '启动') === status) return;

            fetch('/api/amazon-ad', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status })
            }).then(r => r.json()).then(data => {
                if (data.status !== 'success') {
                    if (window.showAppSaveResult) window.showAppSaveResult({ action: 'update', isError: true, message: data.message || '状态更新失败' });
                    return;
                }
                target.status = status;
                if (adItemsById[String(id)]) adItemsById[String(id)].status = status;
                renderAdTable(adItemsCache || []);
                if (window.showAppSaveResult) window.showAppSaveResult({ action: 'update', message: `状态已更新为：${status}` });
            }).catch(err => {
                if (window.showAppSaveResult) window.showAppSaveResult({ action: 'update', isError: true, message: String(err) });
            });
        }

        function renderAdTable(items) {
            const tbody = document.querySelector('#adTable tbody');
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">暂无数据</td></tr>';
                return;
            }

            const campaignMap = new Map();
            (items || []).forEach(item => {
                if (item.ad_level === 'campaign') {
                    campaignMap.set(String(item.id), item);
                }
            });

            tbody.innerHTML = (items || []).map(item => renderAdRow(item, campaignMap)).join('');
        }

        function renderAdRow(item, campaignMap) {
            let portfolioText = '';
            let campaignText = '';
            let groupText = '';
            let subtypeText = '';

            if (item.ad_level === 'portfolio') {
                portfolioText = item.name || '';
            } else if (item.ad_level === 'campaign') {
                portfolioText = item.portfolio_name || '';
                campaignText = item.name || '';
                subtypeText = formatSubtypeText(item);
            } else {
                const parentCampaign = campaignMap.get(String(item.campaign_id || ''));
                portfolioText = item.portfolio_name || parentCampaign?.portfolio_name || '';
                campaignText = item.campaign_name || parentCampaign?.name || '';
                groupText = item.name || '';
                subtypeText = formatSubtypeText(parentCampaign || item);
            }

            return `
                <tr data-id="${item.id}">
                    <td>${renderInlineAdStatus(item)}</td>
                    <td>${portfolioText}</td>
                    <td>${campaignText}</td>
                    <td>${groupText}</td>
                    <td>${subtypeText}</td>
                    <td>${item.amazon_id || ''}</td>
                    <td>${formatDateTime(item.updated_at)}</td>
                    <td>
                        <div class="pm-actions">
                            <button class="btn-secondary" onclick="openEditModal(${item.id})">编辑</button>
                            <button class="btn-danger" onclick="deleteAd(${item.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `;
        }

        // -------------------------------------------------------------------------
        // Excel 模板下载与批量导入
        // -------------------------------------------------------------------------
        function downloadAdTemplate() {
            window.location.href = '/api/amazon-ad-template';
        }

        function triggerAdUpload() {
            const input = document.getElementById('adUploadInput');
            if (!input) return;
            input.value = '';
            input.click();
        }

        function uploadAdTemplate(file) {
            if (!file) return;
            const doUpload = window.uploadBatchImportFile
                ? window.uploadBatchImportFile({
                    file,
                    url: '/api/amazon-ad-import',
                    title: '广告信息批量上传',
                    uploadSummary: '正在上传模板文件...',
                    processSummary: '正在解析并写入广告数据...',
                })
                : (() => {
                    const formData = new FormData();
                    formData.append('file', file);
                    return fetch('/api/amazon-ad-import', { method: 'POST', body: formData }).then(r => r.json());
                })();
            doUpload
                .then(data => {
                    const handled = window.handleBatchImportResponse
                        ? window.handleBatchImportResponse(data, {
                            title: '广告信息导入',
                            onSuccess: () => Promise.all([
                                loadAdList(),
                                window.AmazonAdFormModal ? window.AmazonAdFormModal.refreshReferenceOptions() : Promise.resolve(),
                            ]),
                        })
                        : false;
                    if (!handled && data.status === 'success') {
                        Promise.all([
                            loadAdList(),
                            window.AmazonAdFormModal ? window.AmazonAdFormModal.refreshReferenceOptions() : Promise.resolve(),
                        ]);
                    }
                })
                .catch(err => {
                    window.showAppSaveResult({ action: 'import', isError: true, message: '导入失败: ' + err });
                });
        }

        async function deleteAd(id) {
            const ok = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({ title: '删除确认', message: '确认删除该广告记录？', confirmText: '确认删除' })
                : false;
            if (!ok) return;
            fetch('/api/amazon-ad', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    Promise.all([
                        loadAdList(),
                        window.AmazonAdFormModal ? window.AmazonAdFormModal.refreshReferenceOptions() : Promise.resolve(),
                    ]);
                    window.showAppSaveResult({ action: 'delete' });
                } else {
                    window.showAppSaveResult({ action: 'delete', isError: true, message: data.message || '删除失败' });
                }
            })
            .catch(err => window.showAppSaveResult({ action: 'delete', isError: true, message: '请求失败: ' + err }));
        }

        // -------------------------------------------------------------------------
        // 列表加载 / 页面初始化
        // -------------------------------------------------------------------------

        function loadAdList() {
            const q = document.getElementById('searchInput').value.trim();
            const url = q ? `/api/amazon-ad?q=${encodeURIComponent(q)}` : '/api/amazon-ad';
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.querySelector('#adTable tbody');
                    if (data.status !== 'success') {
                        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#a33;">${data.message || '加载失败'}</td></tr>`;
                        return;
                    }
                    adItemsCache = data.items || [];
                    adItemsById = {};
                    adItemsCache.forEach(item => { adItemsById[item.id] = item; });
                    renderAdTable(adItemsCache);
                })
                .catch(err => {
                    const tbody = document.querySelector('#adTable tbody');
                    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#a33;">加载失败: ${err}</td></tr>`;
                });
        }

        function initData() {
            const modalInit = window.AmazonAdFormModal
                ? window.AmazonAdFormModal.init({
                    getEditItem: (id) => adItemsById[id],
                    getReferenceItems: () => adItemsCache,
                    onSaveSuccess: () => loadAdList(),
                    showSuccessToast: (msg) => {
                        if (window.showAppSaveResult) window.showAppSaveResult({ action: 'save', message: msg || '' });
                    },
                })
                : Promise.resolve();
            return Promise.all([modalInit, loadAdList()]);
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadAdList();
        });
        document.getElementById('adUploadInput').addEventListener('change', function(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            uploadAdTemplate(file);
        });

        window.addEventListener('load', function() {
            initData().then(() => {
                const params = new URLSearchParams(window.location.search || '');
                if (params.get('openCreate') === '1') {
                    setTimeout(() => openCreateModal(), 120);
                }
            });
        });
    </script>
    <script src="/static/js/header.js"></script>
    <script src="/static/js/amazon_ad_form_modal.js"></script>
</body>
</html>
