<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统审计日志</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .audit-log-hint {
            margin: 0.45rem 0 0;
            font-size: 0.78rem;
            color: var(--morandi-slate);
        }
        .audit-log-summary-cell {
            min-width: 280px;
            max-width: 520px;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 12px;
            color: #4a4a4a;
        }
        .audit-log-change-head {
            font-weight: 700;
            color: #2f2f33;
            margin-bottom: 0.35rem;
        }
        .audit-log-change-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .audit-log-change-table th,
        .audit-log-change-table td {
            border: 1px solid rgba(207, 199, 189, 0.55);
            padding: 0.28rem 0.42rem;
            text-align: left;
            vertical-align: top;
        }
        .audit-log-change-table th {
            background: rgba(243, 240, 236, 0.9);
            color: #5a534c;
            white-space: nowrap;
        }
        .audit-log-pager-card {
            padding-top: 0.55rem;
            padding-bottom: 0.55rem;
        }
        .audit-log-pager-card .pm-table-toolbar {
            margin: 0;
            padding: 0.45rem 0.65rem;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>系统审计日志</h2>
            <p>记录员工页面访问与数据库写操作；支持结构化字段变更摘要（按需接入）。</p>
        </section>

        <section class="pm-layout" id="auditLogLayout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <span class="pm-search-title">日志类型</span>
                        <div class="status-segment status-segment--inline" id="auditLogTypeSegment" data-value="access" role="tablist" aria-label="日志类型">
                            <button type="button" class="status-pill is-active" data-value="access" id="auditTabAccess" role="tab" aria-selected="true">页面访问</button>
                            <button type="button" class="status-pill" data-value="operation" id="auditTabOperation" role="tab" aria-selected="false">操作记录</button>
                        </div>
                        <span class="pm-divider"></span>
                        <div class="form-group pm-search" style="margin:0;">
                            <span class="pm-search-title">关键词</span>
                            <input type="text" id="auditSearchQ" placeholder="账号、路径、摘要…">
                        </div>
                        <div class="form-group" style="margin:0;">
                            <label for="auditDateFrom" class="pm-search-title">开始日期</label>
                            <input type="date" id="auditDateFrom">
                        </div>
                        <div class="form-group" style="margin:0;">
                            <label for="auditDateTo" class="pm-search-title">结束日期</label>
                            <input type="date" id="auditDateTo">
                        </div>
                        <button type="button" class="btn-secondary" id="auditSearchBtn">搜索</button>
                        <button type="button" class="btn-accent" id="auditCleanupBtn">清理旧日志</button>
                    </div>
                </div>
                <p id="auditLogHint" class="audit-log-hint"></p>
            </div>

            <div class="sj-table-fill-host" id="auditLogTableHost">
                <table class="pm-table" id="auditLogTable" data-disable-table-manage="1">
                    <thead id="auditLogTableHead"></thead>
                    <tbody>
                        <tr><td colspan="8" style="text-align:center;">加载中…</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card pm-card audit-log-pager-card">
                <div class="pm-table-toolbar">
                    <div class="pm-table-toolbar-left">
                        <span class="pm-table-info" id="auditPageInfo">第 1 页</span>
                    </div>
                    <div class="pm-table-toolbar-right">
                        <button type="button" class="btn-secondary btn-small" id="auditPrevBtn" disabled>上一页</button>
                        <button type="button" class="btn-secondary btn-small" id="auditNextBtn" disabled>下一页</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    {# 逻辑见 /static/js/system_audit_log_management.js #}
    <script src="/static/js/system_audit_log_management.js"></script>
    <script src="/static/js/header.js"></script>
</body>
</html>
