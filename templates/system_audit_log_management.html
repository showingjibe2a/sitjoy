<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统审计日志</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .audit-log-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .audit-log-tab {
            border: 1px solid #e5dccf; background: #fff; color: #5a534c;
            border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .audit-log-tab.is-active { background: #d4a574; border-color: #c49563; color: #fff; }
        .audit-log-filters { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 14px; }
        .audit-log-filters .form-group { margin: 0; min-width: 140px; }
        .audit-log-summary-cell {
            min-width: 280px;
            max-width: 520px;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 12px;
            color: #4a4a4a;
        }
        .audit-log-change-head {
            font-weight: 700;
            color: #2f2f33;
            margin-bottom: 0.35rem;
        }
        .audit-log-change-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .audit-log-change-table th,
        .audit-log-change-table td {
            border: 1px solid rgba(207, 199, 189, 0.55);
            padding: 0.28rem 0.42rem;
            text-align: left;
            vertical-align: top;
        }
        .audit-log-change-table th {
            background: rgba(243, 240, 236, 0.9);
            color: #5a534c;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>系统审计日志</h2>
            <p>记录员工页面访问与数据库写操作；支持结构化字段变更摘要（按需接入）。</p>
        </section>

        <section class="card pm-card" id="auditLogSection" aria-label="系统审计日志">
            <div class="audit-log-tabs" role="tablist">
                <button type="button" class="audit-log-tab is-active" data-audit-type="access" id="auditTabAccess">页面访问</button>
                <button type="button" class="audit-log-tab" data-audit-type="operation" id="auditTabOperation">操作记录</button>
            </div>
            <div class="audit-log-filters">
                <div class="form-group">
                    <label for="auditSearchQ">关键词</label>
                    <input type="text" id="auditSearchQ" placeholder="账号、路径、摘要…">
                </div>
                <div class="form-group">
                    <label for="auditDateFrom">开始日期</label>
                    <input type="date" id="auditDateFrom">
                </div>
                <div class="form-group">
                    <label for="auditDateTo">结束日期</label>
                    <input type="date" id="auditDateTo">
                </div>
                <button type="button" class="btn-secondary" id="auditSearchBtn">搜索</button>
                <button type="button" class="btn-accent" id="auditCleanupBtn">清理旧日志</button>
            </div>
            <p id="auditLogHint" style="margin:0 0 10px;font-size:12px;color:#6b5e4d;"></p>
            <div style="overflow-x:auto;">
                <table class="pm-table" id="auditLogTable">
                    <thead id="auditLogTableHead"></thead>
                    <tbody>
                        <tr><td colspan="7" style="text-align:center;">加载中…</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pm-toolbar" style="margin-top:12px;justify-content:space-between;">
                <button type="button" class="btn-secondary" id="auditPrevBtn" disabled>上一页</button>
                <span id="auditPageInfo" style="font-size:13px;color:#666;">第 1 页</span>
                <button type="button" class="btn-secondary" id="auditNextBtn" disabled>下一页</button>
            </div>
        </section>
    </div>

    <script src="/static/js/system_audit_log_management.js"></script>
    <script src="/static/js/header.js"></script>
</body>
</html>
