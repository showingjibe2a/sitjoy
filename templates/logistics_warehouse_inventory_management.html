<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外仓库存管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .inv-import-status {
            display:none;
            font-size:0.82rem;
            color:var(--morandi-ink);
            padding:0.25rem 0.55rem;
            border-radius:999px;
            border:1px solid rgba(74, 78, 87, 0.2);
            background:rgba(236,231,223,0.65);
        }
        .inv-import-status.show { display:inline-flex; align-items:center; }
        .preview-savebar {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 5300;
            display: none;
            align-items: center;
            gap: 0.6rem;
            padding: 0.75rem 0.9rem;
            border: 1px solid rgba(207, 199, 189, 0.9);
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
            min-width: min(520px, calc(100vw - 24px));
        }
        .preview-savebar.active { display: flex; }
        .preview-savebar span { flex: 1; color: var(--morandi-ink); font-weight: 700; }
        .preview-savebar .btn-primary,
        .preview-savebar .btn-secondary { padding: 0.65rem 1rem; }
        .preview-edit-input { width: 100%; min-width: 4.5rem; }
        .preview-edit-cell { padding-left: 0.35rem !important; padding-right: 0.35rem !important; }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <div class="container">
        <section class="hero" style="margin-bottom:1.5rem;">
            <h2>海外仓库存管理</h2>
            <p>维护仓库与下单SKU库存（支持模板导入）</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin:0;">
                            <span class="pm-search-title">搜索</span>
                            <input type="text" id="searchInput" placeholder="搜索 SKU / 仓库 / Wayfair ID">
                            <button class="btn-primary" onclick="loadList()">搜索</button>
                            <button class="btn-secondary" onclick="resetSearch()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-secondary" onclick="downloadTemplate()">下载模板</button>
                        <button class="btn-secondary" onclick="downloadStockSummaryBySku()">导出在库数据</button>
                        <button class="btn-secondary" onclick="triggerUpload('replace_all')">批量上传-覆盖全部</button>
                        <button class="btn-secondary" onclick="triggerUpload('partial')">批量上传-部分更新</button>
                        <span class="help-dot" data-tip="覆盖全部：先将全部库存可用量清零，再按模板写入；部分更新：仅更新模板中出现的SKU+仓库组合。">?</span>
                        <input type="file" id="uploadInput" accept=".xlsx" style="display:none;">
                        <span id="importStatus" class="inv-import-status"></span>
                        <button class="btn-accent" onclick="openCreateModal()">新增</button>
                    </div>
                </div>
            </div>

            <div>
                <table class="pm-table" id="mainTable">
                    <thead>
                        <tr>
                            <th style="width:54px; text-align:center;"><input type="checkbox" id="inventorySelectAll"></th>
                            <th>仓库</th>
                            <th>Wayfair ID</th>
                            <th>SKU</th>
                            <th>在库数量</th>
                            <th style="width:170px;">更新时间</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody><tr><td colspan="7" style="text-align:center;">加载中...</td></tr></tbody>
                </table>
            </div>
        </section>
    </div>

    <div class="pm-modal" id="pm-modal">
        <div class="pm-modal-content pm-modal-content--wide">
            <div class="pm-modal-scroll">
            <h3 id="pm-modal-title" style="margin-top:0;">新增库存记录</h3>
            <div class="pm-form">
                <div class="form-group">
                    <label for="warehouseId" class="label-help">海外仓<span class="help-dot" data-tip="仅能关联海外仓仓库管理模块已创建的仓库，建议名称设置与领星相同，可以直接使用领星库存模版上传。">?</span><span class="required-asterisk">*</span></label>
                    <select id="warehouseId" class="required-field"></select>
                </div>
                <div class="form-group">
                    <label for="orderProductId" class="label-help">下单SKU<span class="help-dot" data-tip="仅能关联下单产品管理模块已创建的SKU，建议SKU设置与领星相同，可以直接使用领星库存模版上传。">?</span><span class="required-asterisk">*</span></label>
                    <select id="orderProductId" class="required-field"></select>
                </div>
                <div class="form-group">
                    <label for="availableQty">在库数量<span class="required-asterisk">*</span></label>
                    <input type="number" id="availableQty" class="required-field" step="1" min="0">
                </div>
            </div>
            <div id="modalStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="saveFromModal()">保存</button>
            </div>
        </div>
    </div>

    <footer><p>&copy; 2026 SITJOY | 内部使用</p></footer>

    <div id="inventoryPreviewSaveBar" class="preview-savebar" aria-live="polite">
        <span id="inventoryPreviewSaveText">已修改 0 条预览数据</span>
        <button type="button" class="btn-secondary" onclick="cancelInventoryPreviewEdits()">取消修改</button>
        <button type="button" class="btn-primary" onclick="saveInventoryPreviewEdits()">统一保存</button>
    </div>

    <script>
        let editId = null;
        let warehouses = [];
        let orderProducts = [];
        let currentUploadMode = 'partial';
        let selectedInventoryIds = new Set();
        let listCache = [];
        let inventoryEditDraft = {};
        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
        function formatWayfairId(value) {
            const text = String(value || '').trim();
            return text || '-';
        }
        function resetStatus(){ const el=document.getElementById('modalStatus'); el.style.display='none'; el.innerText=''; }
        function showImportStatus(msg, err){ const el=document.getElementById('importStatus'); el.textContent=msg||''; el.classList.add('show'); el.style.color=err?'#9b2226':'var(--morandi-ink)'; }
        function showStatus(msg, err){ const el=document.getElementById('modalStatus'); el.style.display='block'; el.innerText=msg||''; el.style.color=err?'#9b2226':'#2f6b3f'; }
        function handleInventoryNotifyAfterSave(data){
            const payload = data && typeof data === 'object' ? data : {};
            const stockout = Array.isArray(payload.stockout_items) ? payload.stockout_items : [];
            const restock = Array.isArray(payload.restock_items) ? payload.restock_items : [];
            if(!stockout.length && !restock.length) return;
            if(typeof window.dispatchAppDingtalkOverseasInventoryChanges === 'function'){
                window.dispatchAppDingtalkOverseasInventoryChanges(stockout, restock);
                return;
            }
            if(stockout.length && typeof window.promptAppDingtalkOverseasStockout === 'function'){
                window.promptAppDingtalkOverseasStockout(stockout);
            }
        }
        function resetSearch(){ document.getElementById('searchInput').value=''; loadList(); }
        function getInventorySelectAllCheckboxes(){ return Array.from(document.querySelectorAll('input#inventorySelectAll')); }
        function syncInventorySelectAll(){
            const masters = getInventorySelectAllCheckboxes();
            const rows = Array.from(document.querySelectorAll('.inventory-row-checkbox'));
            if(!masters.length) return;
            if(!rows.length){
                masters.forEach(master => { master.checked = false; master.indeterminate = false; });
                return;
            }
            const checkedCount = rows.filter(r => r.checked).length;
            const allChecked = checkedCount === rows.length;
            const partial = checkedCount > 0 && checkedCount < rows.length;
            masters.forEach(master => {
                master.checked = allChecked;
                master.indeterminate = partial;
            });
        }
        function toggleInventorySelectAll(checked){
            document.querySelectorAll('.inventory-row-checkbox').forEach(el => {
                const id = Number(el.getAttribute('data-id') || 0);
                el.checked = !!checked;
                if(!id) return;
                if(checked) selectedInventoryIds.add(id);
                else selectedInventoryIds.delete(id);
            });
            syncInventorySelectAll();
        }
        function bindInventoryRowSelectionEvents(){
            document.querySelectorAll('.inventory-row-checkbox').forEach(el => {
                el.addEventListener('change', function(){
                    const id = Number(this.getAttribute('data-id') || 0);
                    if(!id) return;
                    if(this.checked) selectedInventoryIds.add(id);
                    else selectedInventoryIds.delete(id);
                    syncInventorySelectAll();
                });
            });
        }
        function normalizeInventoryDraftQty(rawValue){
            const num = parseInt(String(rawValue || '').trim(), 10);
            return Number.isFinite(num) ? Math.max(0, num) : 0;
        }
        function getInventoryDraft(itemId){
            return inventoryEditDraft[String(itemId)] || null;
        }
        function updateInventoryDraft(itemId, rawValue){
            const item = listCache.find(x => String(x.id) === String(itemId));
            if(!item) return;
            const key = String(itemId);
            const draftQty = normalizeInventoryDraftQty(rawValue);
            const originalQty = normalizeInventoryDraftQty(item.available_qty);
            if(draftQty === originalQty){
                delete inventoryEditDraft[key];
            } else {
                inventoryEditDraft[key] = { available_qty: draftQty };
            }
            syncInventoryPreviewSaveBar();
        }
        function bindInventoryPreviewEditEvents(){
            document.querySelectorAll('.inventory-qty-edit-field').forEach(el => {
                el.addEventListener('change', function(){
                    updateInventoryDraft(this.getAttribute('data-id'), this.value);
                });
            });
        }
        function countInventoryPreviewEditedRows(){
            return Object.keys(inventoryEditDraft).length;
        }
        function syncInventoryPreviewSaveBar(){
            const bar = document.getElementById('inventoryPreviewSaveBar');
            const text = document.getElementById('inventoryPreviewSaveText');
            if(!bar || !text) return;
            const count = countInventoryPreviewEditedRows();
            text.textContent = `已修改 ${count} 条预览数据`;
            bar.classList.toggle('active', count > 0);
        }
        function cancelInventoryPreviewEdits(){
            inventoryEditDraft = {};
            renderInventoryTable(listCache);
            syncInventoryPreviewSaveBar();
        }
        function collectInventoryPreviewUpdateItems(){
            return Object.keys(inventoryEditDraft).map(id => ({
                id: Number(id),
                available_qty: normalizeInventoryDraftQty(inventoryEditDraft[id].available_qty),
            }));
        }
        function saveInventoryPreviewEdits(){
            const items = collectInventoryPreviewUpdateItems();
            if(!items.length){
                syncInventoryPreviewSaveBar();
                return;
            }
            const bar = document.getElementById('inventoryPreviewSaveBar');
            const saveBtn = bar ? bar.querySelector('.btn-primary') : null;
            if(saveBtn){
                saveBtn.disabled = true;
                saveBtn.textContent = '保存中...';
            }
            fetch('/api/logistics-warehouse-inventory?action=bulk_update', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items }),
            })
                .then(r => r.json())
                .then(data => {
                    if(data.status !== 'success'){
                        if(window.showAppToast){ window.showAppToast(data.message || '批量更新失败', true, 3200); }
                        return;
                    }
                    inventoryEditDraft = {};
                    if(window.showAppToast){
                        window.showAppToast(`批量更新成功：${Number(data.updated || items.length)} 条`, false, 2200);
                    }
                    handleInventoryNotifyAfterSave(data);
                    loadList();
                })
                .catch(err => {
                    if(window.showAppToast){ window.showAppToast('批量更新失败: ' + err, true, 3200); }
                })
                .finally(() => {
                    syncInventoryPreviewSaveBar();
                    if(saveBtn){
                        saveBtn.disabled = false;
                        saveBtn.textContent = '统一保存';
                    }
                });
        }
        function renderInventoryTable(items){
            const tbody = document.querySelector('#mainTable tbody');
            const rows = Array.isArray(items) ? items : [];
            if(!tbody) return;
            if(!rows.length){
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">暂无数据</td></tr>';
                syncInventorySelectAll();
                return;
            }
            tbody.innerHTML = rows.map(item => {
                const draft = getInventoryDraft(item.id) || { available_qty: normalizeInventoryDraftQty(item.available_qty) };
                const qtyValue = Number(draft.available_qty || 0);
                return `<tr>
                    <td style="text-align:center;"><input type="checkbox" class="inventory-row-checkbox row-check" data-id="${item.id}" ${selectedInventoryIds.has(Number(item.id)) ? 'checked' : ''}></td>
                    <td>${escapeHtml(item.warehouse_name || '')}</td>
                    <td>${escapeHtml(formatWayfairId(item.wayfair_id))}</td>
                    <td>${escapeHtml(item.sku || '')}</td>
                    <td class="preview-edit-cell"><input type="number" min="0" step="1" class="inline-input preview-edit-input inventory-qty-edit-field" data-id="${item.id}" value="${qtyValue}"></td>
                    <td>${item.updated_at ? new Date(item.updated_at).toLocaleString('zh-CN') : ''}</td>
                    <td><div class="pm-actions"><button class="btn-secondary" onclick='openEditModal(${JSON.stringify(item)})'>编辑</button><button class="btn-danger" onclick='removeItem(${item.id})'>删除</button></div></td>
                </tr>`;
            }).join('');
            bindInventoryRowSelectionEvents();
            bindInventoryPreviewEditEvents();
            syncInventorySelectAll();
        }
        function renderOptions(){
            const wh = document.getElementById('warehouseId');
            const op = document.getElementById('orderProductId');
            wh.innerHTML = '<option value="">请选择海外仓</option>' + warehouses.map(x=>`<option value="${x.id}">${x.warehouse_name||''}</option>`).join('');
            op.innerHTML = '<option value="">请选择下单SKU</option>' + orderProducts.map(x=>`<option value="${x.id}">${x.sku||''}</option>`).join('');
            if(window.refreshUniversalSingleSelect){ window.refreshUniversalSingleSelect(wh); window.refreshUniversalSingleSelect(op); }
        }
        function loadOptions(){
                return fetch('/api/logistics-warehouse-inventory?action=options&include_order_products=1&order_product_limit=800').then(r=>r.json()).then(data=>{
                if(data.status==='success'){
                    warehouses = data.warehouses || [];
                    orderProducts = data.order_products || [];
                    renderOptions();
                }
            });
        }
        function openCreateModal(){
            editId = null;
            document.getElementById('pm-modal-title').innerText = '新增库存记录';
            document.getElementById('warehouseId').value = '';
            document.getElementById('orderProductId').value = '';
            document.getElementById('availableQty').value = '';
            if(window.refreshUniversalSingleSelect){ window.refreshUniversalSingleSelect('warehouseId'); window.refreshUniversalSingleSelect('orderProductId'); }
            resetStatus();
            document.getElementById('pm-modal').classList.add('active');
        }
        function openEditModal(item){
            editId = item.id;
            document.getElementById('pm-modal-title').innerText = '编辑库存记录';
            document.getElementById('warehouseId').value = item.warehouse_id || '';
            document.getElementById('orderProductId').value = item.order_product_id || '';
            document.getElementById('availableQty').value = item.available_qty ?? 0;
            if(window.refreshUniversalSingleSelect){ window.refreshUniversalSingleSelect('warehouseId'); window.refreshUniversalSingleSelect('orderProductId'); }
            resetStatus();
            document.getElementById('pm-modal').classList.add('active');
        }
        function closeModal(){ document.getElementById('pm-modal').classList.remove('active'); editId = null; }
        function saveFromModal(){
            const payload = {
                warehouse_id: document.getElementById('warehouseId').value,
                order_product_id: document.getElementById('orderProductId').value,
                available_qty: document.getElementById('availableQty').value
            };
            if(!payload.warehouse_id || !payload.order_product_id || payload.available_qty===''){ showStatus('请填写必填字段', true); return; }
            let method = 'POST';
            if(editId){ payload.id = editId; method = 'PUT'; }
            fetch('/api/logistics-warehouse-inventory', { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
                .then(r=>r.json()).then(data=>{
                    if(data.status==='success'){
                        window.showAppSaveResult({ action: editId ? 'save' : 'create' });
                        handleInventoryNotifyAfterSave(data);
                        setTimeout(()=>{ closeModal(); loadList(); }, 300);
                    } else {
                        showStatus(data.message||'操作失败', true);
                    }
                })
                .catch(err=>showStatus('请求失败: '+err, true));
        }
        async function removeItem(id){
            const ok = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({ title:'删除确认', message:'确认删除该库存记录？', confirmText:'确认删除' })
                : false;
            if(!ok) return;
            fetch('/api/logistics-warehouse-inventory', { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id}) })
                .then(r=>r.json()).then(data=>{
                    if(data.status==='success'){
                        loadList();
                        window.showAppSaveResult({ action: 'delete' });
                    } else {
                        window.showAppSaveResult({ action: 'delete', isError: true, message: data.message || '删除失败' });
                    }
                })
                .catch(err=>window.showAppSaveResult({ action: 'delete', isError: true, message: '删除失败: '+err }));
        }
        function loadList(){
            const q = document.getElementById('searchInput').value.trim();
            const url = q ? `/api/logistics-warehouse-inventory?q=${encodeURIComponent(q)}` : '/api/logistics-warehouse-inventory';
            fetch(url).then(r=>r.json()).then(data=>{
                const tbody = document.querySelector('#mainTable tbody');
                if(data.status!=='success'){ tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#a33;">${data.message||'加载失败'}</td></tr>`; return; }
                const items = data.items || [];
                listCache = items;
                const availableIds = new Set(items.map(item => Number(item.id || 0)).filter(v => v > 0));
                selectedInventoryIds = new Set(Array.from(selectedInventoryIds).filter(id => availableIds.has(id)));
                Object.keys(inventoryEditDraft).forEach(id => {
                    if(!availableIds.has(Number(id))) delete inventoryEditDraft[id];
                });
                renderInventoryTable(items);
                syncInventoryPreviewSaveBar();
            }).catch(err=>{ document.querySelector('#mainTable tbody').innerHTML = `<tr><td colspan="7" style="text-align:center;color:#a33;">加载失败: ${err}</td></tr>`; syncInventorySelectAll(); });
        }
        function downloadTemplate(){ window.location.href = '/api/logistics-warehouse-inventory-template'; }
        function downloadStockSummaryBySku(){ window.location.href = '/api/logistics-warehouse-inventory?action=download_stock_summary'; }
        function triggerUpload(mode){
            currentUploadMode = mode === 'replace_all' ? 'replace_all' : 'partial';
            const input = document.getElementById('uploadInput');
            input.value='';
            input.click();
        }
        function uploadTemplate(file, mode){
            const safeMode = mode === 'replace_all' ? 'replace_all' : 'partial';
            const fd = new FormData(); fd.append('file', file);
            showImportStatus(safeMode === 'replace_all' ? '导入处理中（覆盖全部）...' : '导入处理中（部分更新）...', false);
            fetch(`/api/logistics-warehouse-inventory-import?mode=${encodeURIComponent(safeMode)}`, { method:'POST', body: fd })
                .then(r=>r.json()).then(data=>{
                    if(data.status!=='success'){
                        showImportStatus(data.message || '导入失败', true);
                        if (window.showAppResultPanel) {
                            window.showAppResultPanel({
                                title: '海外仓库存导入失败',
                                summary: data.message || '导入失败',
                                details: [],
                                isError: true
                            });
                        }
                        return;
                    }
                    const errCount = Array.isArray(data.errors) ? data.errors.length : 0;
                    const modeText = (data.mode || safeMode) === 'replace_all' ? '覆盖全部' : '部分更新';
                    showImportStatus(`导入完成（${modeText}）：新增 ${data.created||0}，更新 ${data.updated||0}，未变更 ${data.unchanged||0}${errCount?`，失败 ${errCount}`:''}`, errCount>0);
                    if (window.showAppResultPanel) {
                        const details = (data.errors || []).map(err => {
                            const rowText = (err && err.row !== undefined && err.row !== null) ? `第 ${err.row} 行` : '未知行';
                            return `${rowText}：${err && err.error ? err.error : '未知错误'}`;
                        });
                        window.showAppResultPanel({
                            title: `海外仓库存导入完成（${modeText}）`,
                            summary: `新增 ${data.created||0}，更新 ${data.updated||0}，未变更 ${data.unchanged||0}，失败 ${errCount}`,
                            details,
                            isError: errCount > 0
                        });
                    }
                    loadList();
                    handleInventoryNotifyAfterSave(data);
                }).catch(err=>showImportStatus('导入失败: '+err, true));
        }
        document.getElementById('searchInput').addEventListener('keydown', function(e){ if(e.key==='Enter') loadList(); });
        window.setTimeout(function(){ var el=document.getElementById('pm-modal'); if(el&&typeof window.bindPmModalBackdropClose==='function')window.bindPmModalBackdropClose(el,closeModal); },0);
        document.getElementById('uploadInput').addEventListener('change', function(e){
            const file=e.target.files&&e.target.files[0];
            if(file) uploadTemplate(file, currentUploadMode);
        });
        document.addEventListener('change', function(e){
            const target = e.target;
            if(target && target.id === 'inventorySelectAll'){
                toggleInventorySelectAll(!!target.checked);
            }
        });
        window.addEventListener('load', function(){ loadOptions().then(loadList); });
    </script>
</body>
<script src="/static/js/header.js"></script>
</html>
