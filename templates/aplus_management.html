<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A+管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .ap-grid {
            display: grid;
            grid-template-columns: max-content minmax(280px, 340px) minmax(640px, 2fr);
            gap: 1rem;
            align-items: start;
            width: 100%;
            min-width: 0;
            justify-content: start;
        }
        body.sitjoy-has-shell .sitjoy-page-body:has(.pm-layout--aplus) > .container {
            overflow: visible;
            display: block;
            flex: none;
            min-height: auto;
        }
        body.sitjoy-has-shell .sitjoy-page-body:has(.pm-layout--aplus) {
            overflow: auto;
        }
        body.sitjoy-has-shell .sitjoy-page-body .pm-layout.pm-layout--aplus,
        body.sitjoy-has-shell .sitjoy-page-body.sj-page-fill-scroll .pm-layout.pm-layout--aplus {
            display: block;
            flex: none;
            overflow: visible;
            min-height: auto;
        }
        .pm-layout.pm-layout--aplus > .ap-grid {
            min-width: 0;
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            overflow-y: visible;
        }
        .pm-layout.pm-layout--aplus .ap-left-col {
            min-width: 0;
            width: max-content;
            max-width: 100%;
            justify-self: start;
            overflow: hidden;
        }
        .pm-layout.pm-layout--aplus .ap-mid-col,
        .pm-layout.pm-layout--aplus .ap-right-col {
            min-width: 0;
        }
        .ap-left-col {
            width: max-content;
            max-width: 100%;
            overflow-x: visible;
            overflow-y: visible;
        }
        .ap-left-stack {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            width: fit-content;
            max-width: 100%;
            box-sizing: border-box;
        }
        .ap-search-card, .ap-version-card {
            width: 100%;
            box-sizing: border-box;
        }
        .ap-version-card {
            flex: 0 0 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .ap-version-table-host {
            flex: 0 0 auto;
            min-height: 0;
            width: fit-content;
            max-width: 100%;
            box-sizing: border-box;
            overflow-x: auto;
            overflow-y: visible;
        }
        .ap-version-table-host .pm-table-toolbar {
            max-width: 100%;
            box-sizing: border-box;
        }
        .ap-version-table-host .pm-managed-body-wrap {
            width: fit-content;
            max-width: 100%;
            overflow-x: auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .ap-version-table-host .pm-table {
            width: max-content;
            min-width: 100%;
            margin: 0;
            color: var(--morandi-ink);
        }
        .ap-field-row { display: flex; flex-direction: column; gap: 0.2rem; }
        .ap-field-row label { font-size: 0.78rem; color: var(--morandi-slate); font-weight: 600; }
        .ap-field-row select, .ap-field-row input[type="text"] {
            font-size: 0.82rem; padding: 0.32rem 0.45rem; border-radius: 6px;
            border: 1px solid var(--morandi-sand); box-sizing: border-box; width: 100%;
        }
        .ap-filter-grid { display: grid; grid-template-columns: repeat(2, minmax(120px, 1fr)); gap: 0.45rem; }
        .ap-filter-grid .ap-field-row--wide { grid-column: 1 / -1; }
        .ap-version-table-host .pm-table th,
        .ap-version-table-host .pm-table td { color: var(--morandi-ink); }
        .ap-version-table-host .pm-table tbody tr { cursor: pointer; }
        .ap-version-table-host .pm-table tbody tr.is-active { background: rgba(155, 74, 74, 0.12); }
        .ap-mid-col, .ap-right-col { padding: 0.75rem 0.85rem; min-width: 0; }
        .ap-mid-col { display: flex; flex-direction: column; gap: 0.55rem; min-height: 420px; }
        .ap-mid-body { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
        .ap-mid-footer {
            flex: 0 0 auto; display: flex; gap: 0.45rem; align-items: center;
            padding-top: 0.55rem; border-top: 1px solid rgba(207, 199, 189, 0.35);
        }
        .ap-mid-footer .ap-type-select {
            flex: 1 1 auto; min-width: 7.5rem !important; max-width: 14rem !important; width: auto !important;
        }
        .ap-right-col { display: flex; flex-direction: column; gap: 0.65rem; min-height: 420px; }
        .ap-module-list { display: flex; flex-direction: column; gap: 0.4rem; max-height: calc(100vh - 320px); overflow: auto; }
        .ap-module-item {
            display: flex; align-items: center; gap: 0.45rem; padding: 0.45rem 0.5rem;
            border: 1px solid var(--morandi-sand); border-radius: 8px; background: #fff; cursor: pointer;
        }
        .ap-module-item.is-active { border-color: var(--morandi-ink); box-shadow: 0 0 0 2px rgba(42,36,32,0.08); }
        .ap-module-item__main { flex: 1; min-width: 0; }
        .ap-module-item__title { font-weight: 700; font-size: 0.86rem; }
        .ap-module-item__meta { font-size: 0.78rem; color: var(--morandi-slate); }
        .ap-preview-box {
            border: 1px solid var(--morandi-sand); border-radius: 10px; background: #fff;
            padding: 0.75rem; min-height: 200px; overflow: auto;
        }
        .ap-preview-box img { max-width: 100%; border-radius: 8px; display: block; }
        .ap-preview-stack { display: flex; flex-direction: column; gap: 1rem; }
        .ap-preview-group-block { margin-bottom: 0.65rem; }
        .ap-preview-group-block:last-child { margin-bottom: 0; }
        .ap-preview-group-label { font-size: 0.78rem; font-weight: 600; color: var(--morandi-slate); margin-bottom: 0.35rem; }
        .ap-edit-dual {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            min-width: 0;
        }
        .ap-device-col {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            min-width: 0;
        }
        .ap-device-col__title {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--morandi-slate);
        }
        .ap-slot-label {
            font-size: 0.72rem;
            color: var(--morandi-slate);
            margin-bottom: 0.15rem;
        }
        .ap-shared-images { margin-top: 0.55rem; }
        @media (max-width: 1100px) {
            .ap-edit-dual { grid-template-columns: 1fr; }
        }
        .ap-edit-block { display: flex; flex-direction: column; gap: 0.45rem; }
        .ap-edit-block__head { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 0.45rem; }
        .ap-edit-type-label { font-size: 0.84rem; font-weight: 600; color: var(--morandi-ink); }
        .ap-device-flags { display: flex; flex-wrap: wrap; gap: 0.65rem; align-items: center; font-size: 0.8rem; color: var(--morandi-ink); }
        .ap-device-flags label { display: inline-flex; align-items: center; gap: 0.3rem; margin: 0; cursor: pointer; }
        .ap-toolbar-row { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
        .ap-section-title { margin: 0; font-size: 0.92rem; font-weight: 700; color: var(--morandi-ink); }
        @media (max-width: 1100px) {
            .ap-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <div class="container">
        <section class="hero" style="margin-bottom: 1rem;">
            <h2>A+管理</h2>
            <p class="pm-page-lead">版本目录 · 栏目布局与排序 · 模块图片编辑与预览</p>
        </section>

        <section class="pm-layout pm-layout--aplus">
            <div class="ap-grid">
                <div class="ap-left-col">
                    <div class="ap-left-stack">
                        <div class="card pm-card ap-search-card">
                            <div class="ap-filter-grid">
                                <div class="ap-field-row">
                                    <label for="platformSelect">平台</label>
                                    <select id="platformSelect"></select>
                                </div>
                                <div class="ap-field-row">
                                    <label for="skuFamilySelect">货号</label>
                                    <select id="skuFamilySelect"></select>
                                </div>
                                <div class="ap-field-row ap-field-row--wide">
                                    <label for="qInput">版本名</label>
                                    <input id="qInput" type="text" placeholder="关键词">
                                </div>
                            </div>
                            <div class="ap-toolbar-row" style="margin-top:0.55rem;">
                                <button class="btn-secondary btn-small" type="button" onclick="loadVersions()">刷新</button>
                                <button class="btn-accent btn-small" type="button" onclick="openCreateVersionModal()">新增版本</button>
                            </div>
                        </div>
                        <div class="card pm-card ap-version-card">
                            <h3 class="ap-section-title label-help" style="margin-bottom:0.5rem;">
                                版本列表
                                <span class="help-dot" data-tip="点击行选择版本；支持列筛选、排序与分页。"></span>
                            </h3>
                            <div class="ap-version-table-host" id="versionListHost">
                                <div class="pm-muted pm-text-center">加载中…</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card pm-card ap-mid-col">
                    <h3 class="ap-section-title label-help">
                        布局与排序
                        <span class="help-dot" data-tip="选择版本后可拖拽排序栏目；底部选择图片类型并新增栏目。"></span>
                    </h3>
                    <div id="modulePanel" class="ap-mid-body pm-u-hidden">
                        <div id="moduleList" class="ap-module-list"></div>
                    </div>
                    <div id="midAddFooter" class="ap-mid-footer pm-u-hidden">
                        <select id="newImageTypeSelect" class="pm-inline-compact-select ap-type-select" data-universal-compact="1" data-universal-no-search="1" aria-label="图片类型"></select>
                        <button class="btn-accent btn-small" type="button" onclick="addGroup()">新增</button>
                    </div>
                </div>

                <div class="card pm-card ap-right-col">
                    <h3 class="ap-section-title label-help">
                        栏目编辑与预览
                        <span class="help-dot" data-tip="未选栏目时按顺序预览全部模块（电脑与手机）；选中栏目后可编辑布局 JSON 与图片。"></span>
                    </h3>
                    <div id="rightEmpty" class="pm-muted-block pm-text-center">请先选择版本</div>
                    <div id="fullPreviewPanel" class="ap-preview-stack pm-u-hidden">
                        <section class="ap-preview-section">
                            <h4 class="ap-section-title label-help" style="font-size:0.84rem;">
                                电脑预览
                                <span class="help-dot" data-tip="按栏目顺序上下衔接展示（仅含适用电脑的图片）。"></span>
                            </h4>
                            <div id="fullPreviewDesktop"></div>
                        </section>
                        <section class="ap-preview-section">
                            <h4 class="ap-section-title label-help" style="font-size:0.84rem;">
                                手机预览
                                <span class="help-dot" data-tip="按栏目顺序上下衔接展示（仅含适用手机的图片）。"></span>
                            </h4>
                            <div id="fullPreviewMobile"></div>
                        </section>
                    </div>
                    <div id="editorPanel" class="pm-u-hidden">
                        <div class="ap-edit-block">
                            <div class="ap-edit-block__head">
                                <span class="ap-edit-type-label" id="editorTypeLabel"></span>
                            </div>
                            <div class="ap-edit-dual">
                                <div class="ap-device-col" data-device="desktop">
                                    <div class="ap-device-col__title">电脑端</div>
                                    <div id="previewDesktopCol" class="ap-preview-box pm-muted">暂无预览</div>
                                    <button class="btn-secondary btn-small" type="button" onclick="openLayoutJsonModal('desktop')">编辑布局 JSON</button>
                                    <div id="imageGridDesktop" class="sj-thumb-grid pm-u-hidden"></div>
                                </div>
                                <div class="ap-device-col" data-device="mobile">
                                    <div class="ap-device-col__title">手机端</div>
                                    <div id="previewMobileCol" class="ap-preview-box pm-muted">暂无预览</div>
                                    <button class="btn-secondary btn-small" type="button" onclick="openLayoutJsonModal('mobile')">编辑布局 JSON</button>
                                    <div id="imageGridMobile" class="sj-thumb-grid pm-u-hidden"></div>
                                </div>
                            </div>
                            <div id="sharedImageSection" class="ap-shared-images pm-u-hidden">
                                <h4 class="ap-section-title label-help" style="font-size:0.84rem;">
                                    图片（手机/电脑共用）
                                    <span class="help-dot" data-tip="根据布局 JSON 中的图片位数量显示上传框；上传一张两端预览同步。"></span>
                                </h4>
                                <div id="imageGridShared" class="sj-thumb-grid"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div class="pm-modal" id="layoutJsonModal">
        <div class="pm-modal-content" style="max-width: 760px;">
            <h3 id="layoutJsonModalTitle" style="margin-top:0;">编辑布局 JSON</h3>
            <div class="pm-section-body">
                <textarea id="layoutJsonModalTextarea" class="optional-field" rows="14" spellcheck="false"
                    style="width:100%;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:0.86rem;box-sizing:border-box;padding:0.65rem 0.8rem;"></textarea>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeLayoutJsonModal()">取消</button>
                <button class="btn-primary" type="button" onclick="saveLayoutJsonModal()">保存</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="createVersionModal">
        <div class="pm-modal-content" style="max-width: 640px;">
            <h3 style="margin-top:0;">新增A+版本</h3>
            <div class="pm-section-body pm-form">
                <div class="form-group pm-form-full">
                    <label for="newVersionName">版本名称<span class="required-asterisk">*</span></label>
                    <input type="text" id="newVersionName" class="required-field" maxlength="128">
                </div>
                <div class="form-group">
                    <label for="newPlatformSelect">平台<span class="required-asterisk">*</span></label>
                    <select id="newPlatformSelect"></select>
                </div>
                <div class="form-group">
                    <label for="newSkuFamilySelect">货号<span class="required-asterisk">*</span></label>
                    <select id="newSkuFamilySelect"></select>
                </div>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeCreateVersionModal()">取消</button>
                <button class="btn-primary" type="button" onclick="createVersion()">创建</button>
            </div>
        </div>
    </div>

    <footer><p>&copy; 2026 SITJOY | 内部使用</p></footer>
    <script src="/static/js/header.js"></script>
    <script>
        let platformTypes = [], skuFamilies = [];
        let currentVersion = null;
        let currentGroups = [];
        let pendingGroups = [];
        let currentAssets = [];
        let aplusImageTypes = [];
        let selectedSortOrder = null;
        let layoutJsonEditDevice = 'desktop';

        function esc(s) {
            return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
        function toast(msg, err) { if (window.showAppToast) window.showAppToast(msg, !!err); }
        function pageStatus(msg, err) { if (window.showPageStatus) window.showPageStatus(msg, !!err); }

        function layoutJsonField(dev) {
            return dev === 'mobile' ? 'aplus_layout_json_mobile' : 'aplus_layout_json_desktop';
        }

        function isTypeShareImages(typeObj) {
            if (!typeObj) return true;
            if (typeObj.aplus_share_images != null) return Number(typeObj.aplus_share_images) === 1;
            return true;
        }

        function countAplusImageSlots(raw) {
            const text = String(raw || '').trim();
            if (!text) return 0;
            try {
                const data = JSON.parse(text);
                if (Number(data.image_slots) > 0) return Number(data.image_slots);
            } catch (_e) {}
            const modules = parseLayoutModules(raw);
            let n = 0;
            modules.forEach((m) => {
                const type = String((m || {}).type || '');
                const props = (m && m.props) || {};
                if (type === 'Carousel') {
                    if (Array.isArray(props.image_urls) && props.image_urls.length) n += props.image_urls.length;
                    else if (Number(props.image_slot_count) > 0) n += Number(props.image_slot_count);
                    else n += 1;
                } else if (type === 'Image' || type === 'Hero' || type === 'TwoColumnImageText') {
                    n += 1;
                } else if (Number(props.image_slot_count) > 0) {
                    n += Number(props.image_slot_count);
                } else if (props.image_url !== undefined || props.left_image_url !== undefined) {
                    n += 1;
                }
            });
            return n;
        }

        function assetMapBySlot(assets) {
            const map = new Map();
            (assets || []).forEach((a) => {
                const slot = Number(a.item_sort_order) || 0;
                if (slot && !map.has(slot)) map.set(slot, a);
            });
            return map;
        }

        function assetsForDevice(sortOrder, device, shared) {
            const list = currentAssets.filter((a) => Number(a.sort_order) === Number(sortOrder));
            if (shared) return list.filter((a) => Number(a.apply_mobile) === 1 && Number(a.apply_desktop) === 1);
            if (device === 'mobile') return list.filter((a) => Number(a.apply_mobile) === 1);
            return list.filter((a) => Number(a.apply_desktop) === 1);
        }

        function fillSelect(el, items, idKey, nameKey, includeAll) {
            if (!el) return;
            let html = includeAll ? '<option value="">全部</option>' : '';
            html += (items || []).map(it => `<option value="${Number(it[idKey] || 0)}">${esc(it[nameKey] || '')}</option>`).join('');
            el.innerHTML = html;
        }

        function loadInitOptions() {
            return Promise.all([
                fetch('/api/platform-type').then(r => r.json()).catch(() => ({})),
                fetch('/api/sku?per_page=500').then(r => r.json()).catch(() => ({}))
            ]).then(([p, s]) => {
                platformTypes = (p && p.status === 'success' && Array.isArray(p.items)) ? p.items : [];
                skuFamilies = (s && s.status === 'success' && Array.isArray(s.items)) ? s.items : [];
                fillSelect(document.getElementById('platformSelect'), platformTypes, 'id', 'name', true);
                fillSelect(document.getElementById('newPlatformSelect'), platformTypes, 'id', 'name', false);
                fillSelect(document.getElementById('skuFamilySelect'), skuFamilies, 'id', 'sku_family', true);
                fillSelect(document.getElementById('newSkuFamilySelect'), skuFamilies, 'id', 'sku_family', false);
            });
        }

        function loadAplusImageTypes() {
            if (!currentVersion) {
                aplusImageTypes = [];
                fillSelect(document.getElementById('newImageTypeSelect'), [], 'id', 'name', false);
                refreshCompactSelect(document.getElementById('newImageTypeSelect'));
                return Promise.resolve();
            }
            const url = '/api/image-type?usage=aplus&include_disabled=0'
                + '&platform_type_id=' + encodeURIComponent(currentVersion.platform_type_id);
            return fetch(url).then(r => r.json()).then(data => {
                aplusImageTypes = (data && data.status === 'success' && Array.isArray(data.items)) ? data.items : [];
                fillSelect(document.getElementById('newImageTypeSelect'), aplusImageTypes, 'id', 'name', false);
                refreshCompactSelect(document.getElementById('newImageTypeSelect'));
            });
        }

        function refreshCompactSelect(el) {
            if (!el) return;
            if (window.initUniversalSingleSelects) initUniversalSingleSelects(el.parentElement || el);
        }

        function buildGroups() {
            const map = new Map();
            pendingGroups.forEach(g => map.set(Number(g.sort_order), { ...g }));
            currentAssets.forEach(a => {
                const so = Number(a.sort_order);
                if (!map.has(so)) {
                    map.set(so, {
                        sort_order: so,
                        image_type_id: Number(a.image_type_id || 0),
                        image_type_name: String(a.image_type_name || ''),
                    });
                } else {
                    const g = map.get(so);
                    if (!g.image_type_id && a.image_type_id) {
                        g.image_type_id = Number(a.image_type_id);
                        g.image_type_name = String(a.image_type_name || '');
                    }
                }
            });
            return Array.from(map.values()).sort((a, b) => a.sort_order - b.sort_order);
        }

        function getSelectedGroup() {
            return currentGroups.find(g => Number(g.sort_order) === Number(selectedSortOrder)) || null;
        }

        function resolveImageTypeForGroup(sortOrder) {
            const g = currentGroups.find(x => Number(x.sort_order) === Number(sortOrder));
            if (g && g.image_type_id) return aplusImageTypes.find(t => Number(t.id) === Number(g.image_type_id)) || null;
            const hit = currentAssets.find(a => Number(a.sort_order) === Number(sortOrder) && a.image_type_id);
            if (!hit) return null;
            return aplusImageTypes.find(t => Number(t.id) === Number(hit.image_type_id)) || {
                id: hit.image_type_id,
                name: hit.image_type_name || '',
                aplus_layout_json_mobile: hit.aplus_layout_json_mobile,
                aplus_layout_json_desktop: hit.aplus_layout_json_desktop,
                aplus_share_images: hit.aplus_share_images,
            };
        }

        function loadVersions() {
            const platform_type_id = document.getElementById('platformSelect').value || '';
            const sku_family_id = document.getElementById('skuFamilySelect').value || '';
            const q = encodeURIComponent(String(document.getElementById('qInput').value || '').trim());
            const qs = [];
            if (platform_type_id) qs.push('platform_type_id=' + encodeURIComponent(platform_type_id));
            if (sku_family_id) qs.push('sku_family_id=' + encodeURIComponent(sku_family_id));
            if (q) qs.push('q=' + q);
            const url = '/api/aplus-version' + (qs.length ? '?' + qs.join('&') : '');
            fetch(url).then(r => r.json()).then(data => {
                if (!data || data.status !== 'success') throw new Error(data.message || '加载失败');
                renderVersionTable(data.items || []);
            }).catch(err => {
                document.getElementById('versionListHost').innerHTML = `<div class="sj-text-negative">${esc(err)}</div>`;
            });
        }

        function enhanceVersionTable() {
            const table = document.getElementById('apVersionTable');
            if (!table) return;
            const hostRoot = table.closest('.ap-version-table-host') || document;
            const M = window.SitjoyManagedPmTable;
            if (M && typeof M.enhance === 'function') M.enhance(hostRoot);
            if (window.bindFloatingHelpDots) bindFloatingHelpDots(hostRoot);
            bindApVersionTableResizeObserver();
            const runSync = () => scheduleSyncApLeftStackWidth();
            runSync();
            if (M && typeof M.whenReady === 'function') {
                M.whenReady(table, () => {
                    runSync();
                    requestAnimationFrame(() => requestAnimationFrame(runSync));
                });
            } else {
                requestAnimationFrame(() => requestAnimationFrame(runSync));
            }
        }

        function apVersionTableContentWidth(table) {
            const el = table || document.getElementById('apVersionTable');
            if (!el) return 0;
            const cssW = el.style.getPropertyValue('--pm-managed-table-width');
            if (cssW) {
                const n = parseFloat(cssW);
                if (Number.isFinite(n) && n > 0) return Math.ceil(n);
            }
            if (el.getAttribute('data-pm-col-width-sum') === '1') {
                const measured = el.offsetWidth || el.scrollWidth;
                if (measured > 0) return Math.ceil(measured);
            }
            const listWrap = el.closest('.pm-managed-body-wrap');
            if (listWrap) {
                const wrapW = listWrap.scrollWidth || listWrap.offsetWidth;
                if (wrapW > 0) return Math.ceil(wrapW);
            }
            return Math.ceil(el.scrollWidth || el.offsetWidth || 0);
        }

        function apCardPaddingX(card) {
            if (!card) return 0;
            const cs = getComputedStyle(card);
            return (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0);
        }

        function resetApLeftStackWidth() {
            const stack = document.querySelector('.ap-left-stack');
            const leftCol = document.querySelector('.ap-left-col');
            const host = document.getElementById('versionListHost');
            if (stack) stack.style.width = '';
            if (leftCol) {
                leftCol.style.width = '';
                leftCol.style.maxWidth = '';
            }
            if (host) {
                host.style.width = '';
                host.style.maxWidth = '';
            }
            const listWrap = host ? host.querySelector('.pm-managed-body-wrap') : null;
            if (listWrap) {
                listWrap.style.width = '';
                listWrap.style.maxWidth = '';
            }
        }

        function syncApLeftStackWidth() {
            const stack = document.querySelector('.ap-left-stack');
            const leftCol = document.querySelector('.ap-left-col');
            const versionCard = document.querySelector('.ap-version-card');
            const searchCard = document.querySelector('.ap-search-card');
            const host = document.getElementById('versionListHost');
            const table = document.getElementById('apVersionTable');
            if (!stack) return;
            if (!table || !host) {
                resetApLeftStackWidth();
                return;
            }
            const listWrap = host.querySelector('.pm-managed-body-wrap') || host;
            const listBorderX = (parseFloat(getComputedStyle(listWrap).borderLeftWidth) || 0)
                + (parseFloat(getComputedStyle(listWrap).borderRightWidth) || 0);
            const contentW = apVersionTableContentWidth(table);
            if (!contentW) return;
            const bodyW = Math.ceil(contentW + listBorderX);
            const versionPadX = apCardPaddingX(versionCard);
            const searchPadX = apCardPaddingX(searchCard);
            const searchMinInner = 248;
            const outerW = Math.ceil(bodyW + versionPadX);
            const stackW = Math.max(outerW, searchMinInner + searchPadX);
            stack.style.width = `${stackW}px`;
            if (leftCol) {
                leftCol.style.width = `${stackW}px`;
                leftCol.style.maxWidth = `${stackW}px`;
            }
            host.style.width = `${bodyW}px`;
            host.style.maxWidth = `${bodyW}px`;
            listWrap.style.width = `${bodyW}px`;
            listWrap.style.maxWidth = `${bodyW}px`;
        }

        let _apStackWidthRaf = null;
        function scheduleSyncApLeftStackWidth() {
            if (_apStackWidthRaf) return;
            _apStackWidthRaf = requestAnimationFrame(() => {
                _apStackWidthRaf = null;
                syncApLeftStackWidth();
            });
        }

        function bindApVersionTableResizeObserver() {
            const host = document.getElementById('versionListHost');
            if (!host || typeof ResizeObserver === 'undefined') return;
            if (window._apVersionTableRo) {
                try { window._apVersionTableRo.disconnect(); } catch (_e) {}
            }
            window._apVersionTableRo = new ResizeObserver(() => scheduleSyncApLeftStackWidth());
            window._apVersionTableRo.observe(host);
            const table = document.getElementById('apVersionTable');
            if (table) window._apVersionTableRo.observe(table);
            const listWrap = host.querySelector('.pm-managed-body-wrap');
            if (listWrap) window._apVersionTableRo.observe(listWrap);
        }

        function renderVersionTable(items) {
            const host = document.getElementById('versionListHost');
            const list = Array.isArray(items) ? items : [];
            if (!list.length) {
                host.innerHTML = '<div class="pm-muted-block pm-text-center">暂无版本</div>';
                resetApLeftStackWidth();
                return;
            }
            host.innerHTML = `<table class="pm-table pm-table--compact" id="apVersionTable"><thead><tr>
                <th>版本</th><th>平台</th><th>货号</th><th>更新</th>
            </tr></thead><tbody>${list.map(v => {
                const active = currentVersion && Number(currentVersion.id) === Number(v.id) ? 'is-active' : '';
                const updated = String(v.updated_at || '').replace('T', ' ').slice(0, 16);
                return `<tr class="${active}" tabindex="0" data-vid="${Number(v.id)}" onclick="selectVersion(${Number(v.id)})" onkeydown="if(event.key==='Enter')selectVersion(${Number(v.id)})">
                    <td>${esc(v.version_name)}</td>
                    <td>${esc(v.platform_type_name || '')}</td>
                    <td>${esc(v.sku_family || '')}</td>
                    <td>${esc(updated)}</td>
                </tr>`;
            }).join('')}</tbody></table>`;
            enhanceVersionTable();
        }

        function selectVersion(id) {
            const vid = Number(id || 0);
            if (!vid) return;
            fetch('/api/aplus-version?id=' + encodeURIComponent(vid)).then(r => r.json()).then(data => {
                if (!data || data.status !== 'success' || !data.item) throw new Error(data.message || '加载失败');
                currentVersion = data.item;
                selectedSortOrder = null;
                pendingGroups = [];
                return loadAplusImageTypes().then(() => loadAssets());
            }).then(() => {
                currentGroups = buildGroups();
                loadVersions();
                renderMiddle();
                renderRight();
            }).catch(err => toast(String(err), true));
        }

        function loadAssets() {
            if (!currentVersion) return Promise.resolve();
            return fetch('/api/aplus-version-assets?aplus_version_id=' + encodeURIComponent(currentVersion.id))
                .then(r => r.json())
                .then(data => {
                    if (!data || data.status !== 'success') throw new Error(data.message || '素材加载失败');
                    currentAssets = Array.isArray(data.items) ? data.items : [];
                    currentGroups = buildGroups();
                });
        }

        function renderMiddle() {
            const panel = document.getElementById('modulePanel');
            const footer = document.getElementById('midAddFooter');
            if (!currentVersion) {
                panel.classList.add('pm-u-hidden');
                footer.classList.add('pm-u-hidden');
                return;
            }
            panel.classList.remove('pm-u-hidden');
            footer.classList.remove('pm-u-hidden');
            const list = document.getElementById('moduleList');
            if (!currentGroups.length) {
                list.innerHTML = '<div class="pm-muted-block pm-text-center" style="padding:0.65rem;font-size:0.82rem;">暂无栏目</div>';
                return;
            }
            list.innerHTML = currentGroups.map((g, idx) => {
                const active = Number(selectedSortOrder) === Number(g.sort_order) ? 'is-active' : '';
                const imgCount = currentAssets.filter(a => Number(a.sort_order) === Number(g.sort_order)).length;
                const typeLabel = g.image_type_name || (g.image_type_id ? ('类型#' + g.image_type_id) : '未绑定类型');
                const atFirst = idx === 0;
                const atLast = idx === currentGroups.length - 1;
                return `<div class="ap-module-item ${active}" onclick="selectGroup(${Number(g.sort_order)})">
                    <div class="ap-module-item__main">
                        <div class="ap-module-item__title">${esc(typeLabel)}</div>
                        <div class="ap-module-item__meta">组序 ${g.sort_order} · 图片 ${imgCount} 张</div>
                    </div>
                    <div class="sj-row-reorder-actions ap-module-actions" onclick="event.stopPropagation()">
                        <button type="button" class="btn-capsule-sm" title="上移" ${atFirst ? 'disabled' : ''} onclick="moveGroup(${Number(g.sort_order)},-1)">↑</button>
                        <button type="button" class="btn-capsule-sm" title="下移" ${atLast ? 'disabled' : ''} onclick="moveGroup(${Number(g.sort_order)},1)">↓</button>
                        <button type="button" class="btn-capsule-sm sj-row-remove-btn" title="删除栏目" onclick="removeGroup(${Number(g.sort_order)})">×</button>
                    </div>
                </div>`;
            }).join('');
        }

        function selectGroup(sortOrder) {
            const so = Number(sortOrder || 0);
            selectedSortOrder = (selectedSortOrder === so) ? null : so;
            renderMiddle();
            renderRight();
        }

        function renderRight() {
            const fullPanel = document.getElementById('fullPreviewPanel');
            const editorPanel = document.getElementById('editorPanel');
            const rightEmpty = document.getElementById('rightEmpty');
            if (!currentVersion) {
                fullPanel.classList.add('pm-u-hidden');
                editorPanel.classList.add('pm-u-hidden');
                rightEmpty.classList.remove('pm-u-hidden');
                return;
            }
            rightEmpty.classList.add('pm-u-hidden');
            const grp = getSelectedGroup();
            if (!grp) {
                fullPanel.classList.remove('pm-u-hidden');
                editorPanel.classList.add('pm-u-hidden');
                renderFullPreview();
                if (window.bindFloatingHelpDots) bindFloatingHelpDots(fullPanel);
                return;
            }
            fullPanel.classList.add('pm-u-hidden');
            editorPanel.classList.remove('pm-u-hidden');
            const typeLabel = grp.image_type_name || (grp.image_type_id ? ('类型#' + grp.image_type_id) : '未绑定类型');
            document.getElementById('editorTypeLabel').textContent = typeLabel;
            const typeObj = resolveImageTypeForGroup(grp.sort_order);
            const shared = isTypeShareImages(typeObj);
            renderDeviceColumnPreview('desktop', 'previewDesktopCol', typeObj);
            renderDeviceColumnPreview('mobile', 'previewMobileCol', typeObj);
            const sharedSec = document.getElementById('sharedImageSection');
            const gridDesk = document.getElementById('imageGridDesktop');
            const gridMob = document.getElementById('imageGridMobile');
            if (shared) {
                if (sharedSec) sharedSec.classList.remove('pm-u-hidden');
                if (gridDesk) gridDesk.classList.add('pm-u-hidden');
                if (gridMob) gridMob.classList.add('pm-u-hidden');
                renderSlotImageGrid('shared', 'imageGridShared', typeObj);
            } else {
                if (sharedSec) sharedSec.classList.add('pm-u-hidden');
                if (gridDesk) gridDesk.classList.remove('pm-u-hidden');
                if (gridMob) gridMob.classList.remove('pm-u-hidden');
                renderSlotImageGrid('desktop', 'imageGridDesktop', typeObj);
                renderSlotImageGrid('mobile', 'imageGridMobile', typeObj);
            }
            if (window.bindFloatingHelpDots) bindFloatingHelpDots(editorPanel);
        }

        function renderDeviceColumnPreview(device, hostId, typeObj) {
            const host = document.getElementById(hostId);
            const grp = getSelectedGroup();
            if (!host || !grp) return;
            const field = layoutJsonField(device);
            const modules = parseLayoutModules(typeObj && typeObj[field]);
            const imgs = assetsForDevice(grp.sort_order, device, isTypeShareImages(typeObj));
            const slotMap = assetMapBySlot(imgs);
            const orderedImgs = imgs.slice().sort((a, b) => Number(a.item_sort_order) - Number(b.item_sort_order));
            if (!modules.length) {
                if (!orderedImgs.length) {
                    host.innerHTML = '暂无布局 JSON 或图片';
                    host.classList.add('pm-muted');
                    return;
                }
                host.classList.remove('pm-muted');
                host.innerHTML = orderedImgs.map((it) => {
                    const src = storagePathToPreviewUrl(it.storage_path);
                    return src ? `<img src="${src}" style="margin-bottom:0.5rem;" alt="">` : '';
                }).join('');
                return;
            }
            host.classList.remove('pm-muted');
            host.innerHTML = modules.map((m) => renderModuleHtml(m, orderedImgs, slotMap)).join('');
        }

        function renderFullPreviewForDevice(hostId, device) {
            const host = document.getElementById(hostId);
            if (!host) return;
            if (!currentGroups.length) {
                host.innerHTML = '<div class="ap-preview-box pm-muted">暂无栏目</div>';
                return;
            }
            host.innerHTML = currentGroups.map(g => {
                const typeLabel = g.image_type_name || (g.image_type_id ? ('类型#' + g.image_type_id) : '未绑定类型');
                const typeObj = resolveImageTypeForGroup(g.sort_order);
                const field = layoutJsonField(device);
                const modules = parseLayoutModules(typeObj && typeObj[field]);
                const shared = isTypeShareImages(typeObj);
                const imgs = assetsForDevice(g.sort_order, device, shared);
                const slotMap = assetMapBySlot(imgs);
                const orderedImgs = imgs.slice().sort((a, b) => Number(a.item_sort_order) - Number(b.item_sort_order));
                let inner = '';
                if (modules.length) {
                    inner = modules.map(m => renderModuleHtml(m, orderedImgs, slotMap)).join('');
                } else if (orderedImgs.length) {
                    inner = orderedImgs.map(it => {
                        const src = storagePathToPreviewUrl(it.storage_path);
                        return src ? `<img src="${src}" style="margin-bottom:0.5rem;" alt="">` : '';
                    }).join('');
                } else {
                    inner = '<div class="pm-muted" style="font-size:0.8rem;">暂无图片</div>';
                }
                return `<div class="ap-preview-group-block"><div class="ap-preview-group-label">${esc(typeLabel)}</div><div class="ap-preview-box">${inner}</div></div>`;
            }).join('');
        }

        function renderFullPreview() {
            renderFullPreviewForDevice('fullPreviewDesktop', 'desktop');
            renderFullPreviewForDevice('fullPreviewMobile', 'mobile');
        }

        function storagePathToPreviewUrl(storagePath) {
            const p = String(storagePath || '').trim();
            if (!p) return '';
            try {
                const b64 = btoa(unescape(encodeURIComponent(p)));
                return '/api/image-preview?id=' + encodeURIComponent(b64) + '&mode=thumb&w=480&q=78';
            } catch { return ''; }
        }

        function renderSlotImageGrid(mode, hostId, typeObj) {
            const host = document.getElementById(hostId);
            const grp = getSelectedGroup();
            if (!host || !grp) return;
            const shared = isTypeShareImages(typeObj);
            const device = mode === 'mobile' ? 'mobile' : (mode === 'desktop' ? 'desktop' : 'shared');
            const jsonDevice = device === 'shared' ? 'desktop' : device;
            const field = layoutJsonField(jsonDevice);
            let slotCount = countAplusImageSlots(typeObj && typeObj[field]);
            if (device === 'shared' && typeObj) {
                slotCount = Math.max(
                    slotCount,
                    countAplusImageSlots(typeObj.aplus_layout_json_mobile),
                    countAplusImageSlots(typeObj.aplus_layout_json_desktop)
                );
            }
            const assets = assetsForDevice(grp.sort_order, device === 'shared' ? 'desktop' : device, shared);
            const slotMap = assetMapBySlot(assets);
            if (!slotCount) {
                host.innerHTML = '<div class="pm-muted-block" style="font-size:0.8rem;padding:0.35rem 0;">布局 JSON 未定义图片位（可在根级设置 image_slots，或在模块 props 中设置 image_slot_count）</div>';
                return;
            }
            let html = '';
            for (let slot = 1; slot <= slotCount; slot += 1) {
                const it = slotMap.get(slot);
                if (it) {
                    const src = it.storage_path ? storagePathToPreviewUrl(it.storage_path) : '';
                    html += `<div class="sj-thumb-tile" title="图片位 ${slot}">
                        <div class="ap-slot-label">位 ${slot}</div>
                        <img src="${src}" alt="" onerror="this.style.display='none'">
                        <button type="button" class="sj-thumb-tile__remove" aria-label="删除" onclick="event.stopPropagation();removeImage(${it.id})">×</button>
                    </div>`;
                } else {
                    html += `<label class="sj-file-drop ap-slot-drop" data-slot="${slot}" data-device="${device}" title="图片位 ${slot}">
                        <input type="file" class="sj-file-drop__input" accept="image/*">
                        <span class="sj-file-drop__icon" aria-hidden="true">+</span>
                        <span class="sj-file-drop__text">位 ${slot}</span>
                    </label>`;
                }
            }
            host.innerHTML = html;
            host.querySelectorAll('.sj-file-drop__input').forEach((inp) => {
                inp.addEventListener('change', function() {
                    const file = inp.files && inp.files[0];
                    inp.value = '';
                    const wrap = inp.closest('.ap-slot-drop');
                    const slot = Number(wrap && wrap.getAttribute('data-slot'));
                    const dev = String(wrap && wrap.getAttribute('data-device') || 'shared');
                    if (file && slot) uploadFileToSlot(dev, slot, file);
                });
            });
        }

        function uploadFileToSlot(deviceMode, slotIndex, file) {
            if (!currentVersion || !selectedSortOrder || !file) return;
            const grp = getSelectedGroup();
            if (!grp || !grp.image_type_id) return toast('请为栏目选择图片类型', true);
            const typeObj = resolveImageTypeForGroup(grp.sort_order);
            const shared = isTypeShareImages(typeObj);
            const fd = new FormData();
            fd.append('aplus_version_id', String(currentVersion.id));
            fd.append('sort_order', String(selectedSortOrder));
            fd.append('image_type_id', String(grp.image_type_id));
            fd.append('item_sort_order', String(slotIndex));
            if (shared || deviceMode === 'shared') {
                fd.append('apply_mobile', '1');
                fd.append('apply_desktop', '1');
            } else if (deviceMode === 'mobile') {
                fd.append('apply_mobile', '1');
                fd.append('apply_desktop', '0');
            } else {
                fd.append('apply_mobile', '0');
                fd.append('apply_desktop', '1');
            }
            fd.append('file', file, file.name);
            fetch('/api/aplus-upload', { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => {
                    if (!data || data.status !== 'success') throw new Error(data.message || '上传失败');
                    return refreshAfterAssetChange();
                })
                .then(() => toast('上传成功', false))
                .catch(err => toast(String(err), true));
        }

        function openLayoutJsonModal(device) {
            const grp = getSelectedGroup();
            if (!grp) return;
            layoutJsonEditDevice = device === 'mobile' ? 'mobile' : 'desktop';
            const typeObj = resolveImageTypeForGroup(grp.sort_order);
            const field = layoutJsonField(layoutJsonEditDevice);
            const title = document.getElementById('layoutJsonModalTitle');
            if (title) title.textContent = layoutJsonEditDevice === 'mobile' ? '编辑手机端布局 JSON' : '编辑电脑端布局 JSON';
            document.getElementById('layoutJsonModalTextarea').value = String((typeObj && typeObj[field]) || '');
            document.getElementById('layoutJsonModal').classList.add('active');
        }

        function closeLayoutJsonModal() {
            document.getElementById('layoutJsonModal').classList.remove('active');
        }

        function saveLayoutJsonModal() {
            const grp = getSelectedGroup();
            if (!grp || !grp.image_type_id) return toast('当前栏目未绑定图片类型', true);
            const field = layoutJsonField(layoutJsonEditDevice);
            const jsonText = String(document.getElementById('layoutJsonModalTextarea').value || '');
            const payload = { id: grp.image_type_id };
            payload[field] = jsonText;
            fetch('/api/image-type', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(data => {
                if (!data || data.status !== 'success') throw new Error(data.message || '保存失败');
                const hit = aplusImageTypes.find(t => Number(t.id) === Number(grp.image_type_id));
                if (hit) hit[field] = jsonText;
                closeLayoutJsonModal();
                pageStatus('布局 JSON 已保存', false);
                renderRight();
            }).catch(err => pageStatus(String(err), true));
        }

        function addGroup() {
            const typeId = Number(document.getElementById('newImageTypeSelect').value || 0);
            if (!typeId) return toast('请选择图片类型', true);
            const typeObj = aplusImageTypes.find(t => Number(t.id) === typeId);
            const maxSort = currentGroups.reduce((mx, g) => Math.max(mx, Number(g.sort_order || 0)), 0);
            const g = {
                sort_order: maxSort + 1,
                image_type_id: typeId,
                image_type_name: typeObj ? typeObj.name : '',
            };
            pendingGroups.push(g);
            currentGroups = buildGroups();
            selectedSortOrder = g.sort_order;
            renderMiddle();
            renderRight();
        }

        function removeGroup(sortOrder) {
            if (!confirm('删除栏目将同时移除其下图片绑定，确定？')) return;
            const so = Number(sortOrder);
            pendingGroups = pendingGroups.filter(g => Number(g.sort_order) !== so);
            const toRemove = currentAssets.filter(a => Number(a.sort_order) === so);
            Promise.all(toRemove.map(it => fetch('/api/aplus-version-assets', {
                method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: it.id })
            }))).then(() => loadAssets()).then(() => {
                if (Number(selectedSortOrder) === so) selectedSortOrder = null;
                currentGroups = buildGroups();
                renderMiddle();
                renderRight();
            });
        }

        function moveGroup(sortOrder, delta) {
            const ordered = currentGroups.slice().sort((a, b) => a.sort_order - b.sort_order);
            const idx = ordered.findIndex(g => Number(g.sort_order) === Number(sortOrder));
            const j = idx + Number(delta || 0);
            if (idx < 0 || j < 0 || j >= ordered.length) return;
            [ordered[idx], ordered[j]] = [ordered[j], ordered[idx]];
            const assetUpdates = [];
            ordered.forEach((g, i) => {
                const newSo = i + 1;
                const oldSo = Number(g.sort_order);
                if (newSo !== oldSo) {
                    pendingGroups.filter(pg => Number(pg.sort_order) === oldSo).forEach(pg => { pg.sort_order = newSo; });
                    currentAssets.filter(a => Number(a.sort_order) === oldSo).forEach(a => {
                        assetUpdates.push({ id: a.id, sort_order: newSo });
                    });
                }
                g.sort_order = newSo;
            });
            currentGroups = ordered;
            selectedSortOrder = j + 1;
            const persist = assetUpdates.length
                ? fetch('/api/aplus-version-assets', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: assetUpdates })
                }).then(() => loadAssets())
                : Promise.resolve();
            persist.then(() => { currentGroups = buildGroups(); renderMiddle(); renderRight(); });
        }

        function refreshAfterAssetChange() {
            return loadAssets().then(() => {
                renderMiddle();
                renderRight();
                if (!getSelectedGroup()) renderFullPreview();
            });
        }

        function removeImage(linkId) {
            fetch('/api/aplus-version-assets', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: Number(linkId) })
            }).then(r => r.json()).then(data => {
                if (!data || data.status !== 'success') throw new Error(data.message || '移除失败');
                return refreshAfterAssetChange();
            }).catch(err => toast(String(err), true));
        }

        function parseLayoutModules(raw) {
            const text = String(raw || '').trim();
            if (!text) return [];
            try {
                const data = JSON.parse(text);
                return Array.isArray(data) ? data : (Array.isArray(data.modules) ? data.modules : [data]);
            } catch { return []; }
        }

        function renderModuleHtml(m, imgs, slotMap) {
            const type = String((m || {}).type || 'TextBlock');
            const props = Object.assign({}, (m && m.props) || {});
            const map = slotMap || assetMapBySlot(imgs);
            const urlAt = (slot) => {
                const it = map.get(Number(slot) || 0);
                return it ? storagePathToPreviewUrl(it.storage_path) : '';
            };
            let slotCursor = 0;
            const nextUrl = () => {
                slotCursor += 1;
                return urlAt(slotCursor) || (imgs[slotCursor - 1] ? storagePathToPreviewUrl(imgs[slotCursor - 1].storage_path) : '');
            };
            if (!props.image_url && type !== 'TextBlock') props.image_url = nextUrl();
            if (type === 'Carousel' && !props.image_urls) {
                const cnt = Number(props.image_slot_count) > 0 ? Number(props.image_slot_count) : (Array.isArray(props.image_urls) ? props.image_urls.length : 1);
                props.image_urls = [];
                for (let i = 0; i < cnt; i += 1) {
                    const u = urlAt(slotCursor + 1) || nextUrl();
                    if (u) props.image_urls.push(u);
                }
            }
            if (type === 'Hero') {
                const img = esc(props.image_url || '');
                return `<div><strong>${esc(props.title || '')}</strong>${img ? `<img src="${img}" alt="">` : ''}<div class="pm-sub">${esc(props.text || '')}</div></div>`;
            }
            if (type === 'Image') {
                const img = esc(props.image_url || '');
                return img ? `<img src="${img}" alt="">` : '<div class="pm-muted">无图</div>';
            }
            if (type === 'Carousel') {
                const urls = Array.isArray(props.image_urls) ? props.image_urls : [];
                return urls.length ? urls.map(u => `<img src="${esc(u)}" style="margin-bottom:0.5rem;" alt="">`).join('') : '<div class="pm-muted">轮播无图</div>';
            }
            if (type === 'TwoColumnImageText') {
                const img = esc(props.image_url || props.left_image_url || '');
                return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
                    <div>${img ? `<img src="${img}" alt="">` : ''}</div>
                    <div><strong>${esc(props.right_title || '')}</strong><div class="pm-sub">${esc(props.right_text || props.text || '')}</div></div>
                </div>`;
            }
            return `<div><strong>${esc(props.title || '')}</strong><div class="pm-sub" style="white-space:pre-wrap;">${esc(props.text || '')}</div></div>`;
        }

        function openCreateVersionModal() {
            document.getElementById('newVersionName').value = '';
            document.getElementById('createVersionModal').classList.add('active');
            const p = document.getElementById('platformSelect').value;
            const s = document.getElementById('skuFamilySelect').value;
            if (p) document.getElementById('newPlatformSelect').value = p;
            if (s) document.getElementById('newSkuFamilySelect').value = s;
        }
        function closeCreateVersionModal() { document.getElementById('createVersionModal').classList.remove('active'); }

        function createVersion() {
            const name = String(document.getElementById('newVersionName').value || '').trim();
            const platform_type_id = Number(document.getElementById('newPlatformSelect').value || 0);
            const sku_family_id = Number(document.getElementById('newSkuFamilySelect').value || 0);
            if (!name || !platform_type_id || !sku_family_id) return toast('请填写完整', true);
            fetch('/api/aplus-version', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ version_name: name, platform_type_id, sku_family_id })
            }).then(r => r.json()).then(data => {
                if (!data || data.status !== 'success') throw new Error(data.message || '创建失败');
                closeCreateVersionModal();
                loadVersions();
                toast('已创建', false);
            }).catch(err => toast(String(err), true));
        }

        function bindPageEvents() {
            document.getElementById('platformSelect').addEventListener('change', loadVersions);
            document.getElementById('skuFamilySelect').addEventListener('change', loadVersions);
            document.getElementById('qInput').addEventListener('keydown', e => { if (e.key === 'Enter') loadVersions(); });
        }

        function boot() {
            bindPageEvents();
            loadInitOptions().finally(loadVersions);
            if (window.bindFloatingHelpDots) bindFloatingHelpDots(document);
            window.addEventListener('resize', () => scheduleSyncApLeftStackWidth());
        }

        window.addEventListener('load', () => {
            if (window.SitjoyPageUI) {
                SitjoyPageUI.init({
                    selects: true,
                    modals: [
                        { el: '#createVersionModal', onClose: closeCreateVersionModal },
                        { el: '#layoutJsonModal', onClose: closeLayoutJsonModal }
                    ],
                    onReady: boot
                });
            } else boot();
        });
        window.setTimeout(() => {
            const el = document.getElementById('createVersionModal');
            if (el && window.bindPmModalBackdropClose) window.bindPmModalBackdropClose(el, closeCreateVersionModal);
            const lj = document.getElementById('layoutJsonModal');
            if (lj && window.bindPmModalBackdropClose) window.bindPmModalBackdropClose(lj, closeLayoutJsonModal);
        }, 0);
    </script>
</body>
</html>
