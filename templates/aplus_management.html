<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A+管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .aplus-shell { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        .aplus-toolbar { display:flex; align-items:flex-end; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
        .aplus-toolbar .pm-form { margin:0; }
        .aplus-grid { display:grid; grid-template-columns: 320px 1fr 480px; gap: 1rem; margin-top: 1rem; }
        .aplus-panel { background: rgba(255,255,255,0.72); border: 1px solid var(--morandi-sand); border-radius: 12px; overflow:hidden; }
        .aplus-panel h3 { margin:0; padding: 0.75rem 0.9rem; border-bottom:1px solid var(--morandi-sand); font-size: 1rem; background: rgba(255,255,255,0.65); }
        .aplus-panel-body { padding: 0.85rem; }
        .aplus-list { display:flex; flex-direction:column; gap:0.45rem; }
        .aplus-item { padding:0.6rem 0.65rem; border:1px solid var(--morandi-sand); border-radius:10px; background:#fff; cursor:pointer; }
        .aplus-item.is-active { border-color: var(--morandi-ink); box-shadow: 0 0 0 3px rgba(42,36,32,0.08); }
        .aplus-item-title { font-weight: 700; color: var(--morandi-ink); }
        .aplus-item-meta { font-size: 0.85rem; color: rgba(42,36,32,0.72); margin-top:0.2rem; }
        .aplus-split { display:grid; grid-template-columns: 1fr; gap: 0.75rem; }
        .aplus-mod-row { border:1px solid var(--morandi-sand); border-radius:12px; background:#fff; padding:0.75rem; }
        .aplus-mod-row-head { display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
        .aplus-mod-row-head .left { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
        .aplus-mod-row textarea { width:100%; min-height:120px; border:1px solid var(--morandi-sand); border-radius:10px; padding:0.6rem 0.7rem; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 0.88rem; }
        .aplus-preview { background:#fff; border:1px solid var(--morandi-sand); border-radius:12px; padding:0.85rem; min-height: 560px; }
        .aplus-preview .m { border:1px dashed rgba(42,36,32,0.18); border-radius:12px; padding:0.8rem; margin-bottom:0.75rem; }
        .aplus-preview .m:last-child { margin-bottom:0; }
        .aplus-preview img { max-width:100%; border-radius:12px; display:block; }
        .aplus-two-col { display:grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; align-items:start; }
        .aplus-bad { color:#a33; }
        .aplus-assets { display:flex; flex-direction:column; gap:0.55rem; }
        .asset-row { display:flex; gap:0.6rem; align-items:center; border:1px solid var(--morandi-sand); border-radius:12px; padding:0.6rem; background:#fff; }
        .asset-row img { width:60px; height:60px; object-fit:cover; border-radius:10px; border:1px solid rgba(42,36,32,0.12); }
        .asset-row .meta { flex:1; min-width:0; }
        .asset-row .meta .path { font-size:0.85rem; color: rgba(42,36,32,0.72); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .asset-row .meta .sub { font-size:0.85rem; margin-top:0.25rem; color: rgba(42,36,32,0.72); }
        @media (max-width: 1200px) {
            .aplus-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <div class="aplus-shell">
        <div class="aplus-toolbar">
            <div class="pm-form" style="display:flex; gap:0.75rem; flex-wrap:wrap;">
                <div class="form-group" style="margin:0;">
                    <label>平台</label>
                    <select id="platformSelect"></select>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>货号</label>
                    <select id="skuFamilySelect"></select>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>搜索版本</label>
                    <input id="qInput" type="text" placeholder="版本名关键词">
                </div>
                <div class="form-group" style="margin:0;">
                    <button class="btn-secondary" type="button" onclick="loadVersions()">刷新</button>
                </div>
            </div>
            <div style="display:flex; gap:0.6rem; align-items:center;">
                <button class="btn-accent" type="button" onclick="openCreateVersionModal()">新增版本</button>
            </div>
        </div>

        <div class="aplus-grid">
            <section class="aplus-panel">
                <h3>版本列表</h3>
                <div class="aplus-panel-body">
                    <div id="versionList" class="aplus-list"></div>
                </div>
            </section>

            <section class="aplus-panel">
                <h3>布局（按图片类型维护）</h3>
                <div class="aplus-panel-body">
                    <div class="pm-form" style="margin:0 0 0.75rem 0; display:flex; gap:0.6rem; flex-wrap:wrap; align-items:flex-end;">
                        <div class="form-group" style="margin:0; min-width: 220px;">
                            <label>图片类型（A+可用）</label>
                            <select id="layoutImageTypeSelect"></select>
                        </div>
                        <div class="form-group" style="margin:0;">
                            <label>端</label>
                            <select id="layoutDeviceSelect">
                                <option value="desktop">电脑端</option>
                                <option value="mobile">手机端</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin:0;">
                            <button class="btn-secondary" type="button" onclick="loadImageTypeLayouts()">刷新</button>
                        </div>
                        <div class="form-group" style="margin:0;">
                            <button class="btn-primary" type="button" onclick="saveImageTypeLayout()">保存布局</button>
                        </div>
                    </div>
                    <div style="color:rgba(42,36,32,0.7); font-size:0.88rem; margin-bottom:0.45rem;">
                        这里维护的是“图片类型的通用布局 JSON”（手机/电脑各一份）。版本只负责选图与排序。
                    </div>
                    <textarea id="layoutJsonTextarea" style="width:100%; min-height:420px; border:1px solid var(--morandi-sand); border-radius:12px; padding:0.7rem; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size:0.88rem;"></textarea>
                    <div id="layoutStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
                </div>
            </section>

            <section class="aplus-panel">
                <h3>预览 & 素材</h3>
                <div class="aplus-panel-body">
                    <div class="pm-form" style="margin:0 0 0.75rem 0; display:flex; gap:0.6rem; flex-wrap:wrap; align-items:flex-end;">
                        <div class="form-group" style="margin:0; min-width: 180px;">
                            <label>图片类型（A+可用）</label>
                            <select id="aplusImageTypeSelect"></select>
                        </div>
                        <div class="form-group" style="margin:0;">
                            <label>端</label>
                            <select id="assetDeviceSelect">
                                <option value="desktop">电脑端</option>
                                <option value="mobile">手机端</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin:0;">
                            <label>上传文件</label>
                            <input id="aplusUploadInput" type="file" multiple accept="image/*">
                        </div>
                        <div class="form-group" style="margin:0;">
                            <button class="btn-accent" type="button" onclick="uploadAplusFiles()">上传到该版本</button>
                        </div>
                    </div>

                    <div class="aplus-preview" id="preview"></div>
                    <div style="margin-top:0.85rem;">
                        <div style="font-weight:700; margin-bottom:0.55rem;">版本素材</div>
                        <div id="assetList" class="aplus-assets"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div class="pm-modal" id="createVersionModal">
        <div class="pm-modal-content" style="max-width: 640px;">
            <h3 style="margin-top:0;">新增A+版本</h3>
            <div class="pm-section-body pm-form">
                <div class="form-group pm-form-full" style="margin:0;">
                    <label>版本名称<span class="required-asterisk">*</span></label>
                    <input type="text" id="newVersionName" class="required-field" maxlength="128" placeholder="例如：V1 / 2026-春季 / 主推版">
                </div>
                <div class="form-group" style="margin:0;">
                    <label>平台<span class="required-asterisk">*</span></label>
                    <select id="newPlatformSelect"></select>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>货号<span class="required-asterisk">*</span></label>
                    <select id="newSkuFamilySelect"></select>
                </div>
            </div>
            <div id="createStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeCreateVersionModal()">取消</button>
                <button class="btn-primary" type="button" onclick="createVersion()">创建</button>
            </div>
        </div>
    </div>

    <script src="/static/js/header.js"></script>
    <script>
        let platformTypes = [];
        let skuFamilies = [];
        let currentVersion = null; // {id, version_name, platform_type_id, sku_family_id, ...}
        let currentAssets = [];
        let currentImageTypes = [];

        function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        function toast(msg, isError){
            if (window.showAppToast) window.showAppToast(msg, !!isError);
        }

        function showEditorStatus(msg, isError){
            const el = document.getElementById('layoutStatus');
            el.style.display = 'block';
            el.style.background = isError ? '#ffecec' : '#eaf6ef';
            el.style.color = isError ? '#a33' : '#1f5132';
            el.textContent = msg || '';
        }

        function fillSelect(selectEl, items, idKey, nameKey, includeAll){
            if (!selectEl) return;
            let html = '';
            if (includeAll) html += `<option value="">全部</option>`;
            html += (items||[]).map(it => `<option value="${Number(it[idKey]||0)}">${esc(it[nameKey]||'')}</option>`).join('');
            selectEl.innerHTML = html;
        }

        function loadInitOptions(){
            return Promise.all([
                fetch('/api/platform-type').then(r=>r.json()).catch(()=>({})),
                fetch('/api/sku?per_page=500').then(r=>r.json()).catch(()=>({}))
            ]).then(([p, s]) => {
                platformTypes = (p && p.status==='success' && Array.isArray(p.items)) ? p.items : [];
                skuFamilies = (s && s.status==='success' && Array.isArray(s.items)) ? s.items : [];
                fillSelect(document.getElementById('platformSelect'), platformTypes, 'id', 'name', true);
                fillSelect(document.getElementById('newPlatformSelect'), platformTypes, 'id', 'name', false);
                fillSelect(document.getElementById('skuFamilySelect'), skuFamilies, 'id', 'sku_family', true);
                fillSelect(document.getElementById('newSkuFamilySelect'), skuFamilies, 'id', 'sku_family', false);
            });
        }

        function loadVersions(){
            const platform_type_id = document.getElementById('platformSelect').value || '';
            const sku_family_id = document.getElementById('skuFamilySelect').value || '';
            const q = encodeURIComponent(String(document.getElementById('qInput').value||'').trim());
            const qs = [];
            if (platform_type_id) qs.push('platform_type_id=' + encodeURIComponent(platform_type_id));
            if (sku_family_id) qs.push('sku_family_id=' + encodeURIComponent(sku_family_id));
            if (q) qs.push('q=' + q);
            const url = '/api/aplus-version' + (qs.length ? ('?' + qs.join('&')) : '');
            fetch(url).then(r=>r.json()).then(data => {
                if (!data || data.status!=='success') throw new Error(data.message||'加载失败');
                renderVersionList(data.items||[]);
            }).catch(err => {
                document.getElementById('versionList').innerHTML = `<div class="aplus-bad">加载失败：${esc(err)}</div>`;
            });
        }

        function renderVersionList(items){
            const list = Array.isArray(items) ? items : [];
            if (!list.length){
                document.getElementById('versionList').innerHTML = '<div style="color:rgba(42,36,32,0.72);">暂无版本</div>';
                return;
            }
            document.getElementById('versionList').innerHTML = list.map(v => {
                const active = currentVersion && Number(currentVersion.id)===Number(v.id) ? 'is-active' : '';
                return `<div class="aplus-item ${active}" onclick="selectVersion(${Number(v.id)})">
                    <div class="aplus-item-title">${esc(v.version_name||'')}</div>
                    <div class="aplus-item-meta">${esc(v.platform_type_name||'')} · ${esc(v.sku_family||'')}</div>
                </div>`;
            }).join('');
        }

        function selectVersion(id){
            const vid = Number(id||0);
            if (!vid) return;
            fetch('/api/aplus-version?q=&platform_type_id=&sku_family_id=').then(()=>{}); // keepalive noop
            // Load version detail list again to find item
            fetch('/api/aplus-version?').then(r=>r.json()).then(() => {}); // noop; version list already holds all needed fields
            // In practice we can re-fetch single by filtering current list; simpler: load list again and then set by id
            fetch('/api/aplus-version?').then(r=>r.json()).catch(()=>({})); // noop
            // Find in DOM by request fresh list with current filters to keep consistent
            const platform_type_id = document.getElementById('platformSelect').value || '';
            const sku_family_id = document.getElementById('skuFamilySelect').value || '';
            const q = encodeURIComponent(String(document.getElementById('qInput').value||'').trim());
            const qs = [];
            if (platform_type_id) qs.push('platform_type_id=' + encodeURIComponent(platform_type_id));
            if (sku_family_id) qs.push('sku_family_id=' + encodeURIComponent(sku_family_id));
            if (q) qs.push('q=' + q);
            const url = '/api/aplus-version' + (qs.length ? ('?' + qs.join('&')) : '');
            fetch(url).then(r=>r.json()).then(data => {
                const item = (data.items||[]).find(x => Number(x.id)===vid);
                if (!item) throw new Error('版本不存在');
                currentVersion = item;
                renderVersionList(data.items||[]);
                return Promise.all([loadAssets(), loadAplusImageTypes()]);
            }).then(() => {
                renderPreview();
                loadImageTypeLayouts();
            }).catch(err => toast(String(err||'选择失败'), true));
        }

        function loadImageTypeLayouts(){
            if (!currentVersion) return;
            const id = Number(document.getElementById('layoutImageTypeSelect').value||0);
            const device = String(document.getElementById('layoutDeviceSelect').value||'desktop');
            const hit = (currentImageTypes||[]).find(x => Number(x.id||0) === id);
            const txt = document.getElementById('layoutJsonTextarea');
            if (!txt) return;
            if (!hit) { txt.value = ''; return; }
            txt.value = device === 'mobile' ? (hit.aplus_layout_json_mobile || '') : (hit.aplus_layout_json_desktop || '');
        }

        function saveImageTypeLayout(){
            if (!currentVersion) return toast('请先选择版本', true);
            const id = Number(document.getElementById('layoutImageTypeSelect').value||0);
            const device = String(document.getElementById('layoutDeviceSelect').value||'desktop');
            const jsonText = String(document.getElementById('layoutJsonTextarea').value||'');
            if (!id) return showEditorStatus('请选择图片类型', true);
            const payload = { id };
            if (device === 'mobile') payload.aplus_layout_json_mobile = jsonText;
            else payload.aplus_layout_json_desktop = jsonText;
            fetch('/api/image-type', {
                method:'PATCH',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify(payload)
            }).then(r=>r.json()).then(data => {
                if (!data || data.status!=='success') throw new Error(data.message||'保存失败');
                const hit = (currentImageTypes||[]).find(x => Number(x.id||0) === id);
                if (hit) {
                    if (device === 'mobile') hit.aplus_layout_json_mobile = jsonText;
                    else hit.aplus_layout_json_desktop = jsonText;
                }
                showEditorStatus('已保存布局', false);
            }).catch(err => showEditorStatus('保存失败：' + err, true));
        }

        // (旧的“模板/模块编辑器”逻辑已移除：布局 JSON 现在存到 image_types 的 mobile/desktop 字段中)

        function loadAssets(){
            if (!currentVersion) return Promise.resolve();
            const device = String(document.getElementById('assetDeviceSelect').value||'desktop');
            const typeName = String(document.getElementById('aplusImageTypeSelect').value||'').trim();
            const typeObj = (currentImageTypes||[]).find(x => String(x.name||'') === typeName);
            const typeId = typeObj ? Number(typeObj.id||0) : 0;
            const qs = ['aplus_version_id=' + encodeURIComponent(currentVersion.id), 'device=' + encodeURIComponent(device)];
            if (typeId) qs.push('image_type_id=' + encodeURIComponent(typeId));
            return fetch('/api/aplus-version-assets?' + qs.join('&'))
                .then(r=>r.json())
                .then(data => {
                    if (!data || data.status!=='success') throw new Error(data.message||'加载素材失败');
                    currentAssets = Array.isArray(data.items) ? data.items : [];
                    renderAssets(data.items||[]);
                });
        }

        function renderAssets(items){
            const list = Array.isArray(items) ? items : [];
            if (!list.length){
                document.getElementById('assetList').innerHTML = '<div style="color:rgba(42,36,32,0.72);">暂无素材</div>';
                return;
            }
            document.getElementById('assetList').innerHTML = list.map(it => {
                const imgSrc = it.storage_path ? storagePathToPreviewUrl(it.storage_path) : '';
                return `<div class="asset-row">
                    <img src="${imgSrc}" onerror="this.style.display='none'">
                    <div class="meta">
                        <div class="path">${esc(it.storage_path||'')}</div>
                        <div class="sub">asset_id: ${Number(it.image_asset_id||0)} · image_type_id: ${Number(it.image_type_id||0)} · device: ${esc(it.device||'')}</div>
                    </div>
                    <button class="btn-secondary" type="button" onclick="removeAsset(${Number(it.id||0)})">移除</button>
                </div>`;
            }).join('');
        }

        function removeAsset(itemId){
            const id = Number(itemId||0);
            if (!id) return;
            fetch('/api/aplus-version-assets', {
                method:'DELETE',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ id })
            }).then(r=>r.json()).then(data => {
                if (!data || data.status!=='success') throw new Error(data.message||'移除失败');
                loadAssets().then(()=>renderPreview());
            }).catch(err => toast('移除失败：' + err, true));
        }

        function loadAplusImageTypes(){
            if (!currentVersion) {
                document.getElementById('aplusImageTypeSelect').innerHTML = '';
                return Promise.resolve();
            }
            const url = '/api/image-type?usage=aplus&include_disabled=0&platform_type_id=' + encodeURIComponent(currentVersion.platform_type_id);
            return fetch(url).then(r=>r.json()).then(data => {
                const items = (data && data.status==='success' && Array.isArray(data.items)) ? data.items : [];
                currentImageTypes = items;
                const sel = document.getElementById('aplusImageTypeSelect');
                sel.innerHTML = items.map(it => `<option value="${esc(it.name||'')}">${esc(it.name||'')}</option>`).join('');

                const sel2 = document.getElementById('layoutImageTypeSelect');
                if (sel2) sel2.innerHTML = items.map(it => `<option value="${Number(it.id||0)}">${esc(it.name||'')}</option>`).join('');
                loadImageTypeLayouts();
            });
        }

        function uploadAplusFiles(){
            if (!currentVersion) return toast('请先选择版本', true);
            const typeName = String(document.getElementById('aplusImageTypeSelect').value||'').trim();
            const input = document.getElementById('aplusUploadInput');
            const files = input.files ? Array.from(input.files) : [];
            const device = String(document.getElementById('assetDeviceSelect').value||'desktop');
            if (!typeName) return toast('请选择图片类型', true);
            if (!files.length) return toast('请选择文件', true);
            const fd = new FormData();
            fd.append('aplus_version_id', String(currentVersion.id));
            fd.append('image_type_name', typeName);
            fd.append('device', device);
            files.forEach(f => fd.append('file', f, f.name));
            fetch('/api/aplus-upload', { method:'POST', body: fd })
                .then(r=>r.json())
                .then(data => {
                    if (!data || data.status!=='success') throw new Error(data.message||'上传失败');
                    toast('上传成功：新增 ' + Number(data.created||0) + ' 张', false);
                    input.value = '';
                    return loadAssets().then(()=>renderPreview());
                })
                .catch(err => toast('上传失败：' + err, true));
        }

        function storagePathToPreviewUrl(storagePath){
            const p = String(storagePath||'').trim();
            if (!p) return '';
            try {
                const b64 = btoa(unescape(encodeURIComponent(p)));
                return '/api/image-preview?id=' + encodeURIComponent(b64);
            } catch {
                return '';
            }
        }

        function renderPreview(){
            const el = document.getElementById('preview');
            if (!currentVersion){
                el.innerHTML = '<div style="color:rgba(42,36,32,0.72);">请选择左侧版本以开始编辑与预览。</div>';
                return;
            }
            if (!currentAssets.length){
                el.innerHTML = '<div style="color:rgba(42,36,32,0.72);">当前筛选下暂无素材。</div>';
                return;
            }
            el.innerHTML = currentAssets.map(it => {
                const src = it.storage_path ? storagePathToPreviewUrl(it.storage_path) : '';
                return `<div class="m">
                    ${src ? `<img src="${src}" alt="">` : ''}
                    <div style="margin-top:0.45rem; color:rgba(42,36,32,0.72); font-size:0.9rem;">
                        sort: ${Number(it.sort_order||0)} · type_id: ${Number(it.image_type_id||0)} · device: ${esc(it.device||'')}
                    </div>
                </div>`;
            }).join('');
        }

        function renderModule(m){
            const type = String((m||{}).type||'TextBlock');
            const props = (m && typeof m.props==='object' && m.props) ? m.props : {};

            function firstAssetPreviewByTypeId(typeId){
                const tid = Number(typeId||0);
                if (!tid) return '';
                const hit = (currentAssets||[]).find(x => Number(x.image_type_id||0) === tid && x.storage_path);
                return hit ? storagePathToPreviewUrl(hit.storage_path) : '';
            }

            function allAssetPreviewsByTypeId(typeId){
                const tid = Number(typeId||0);
                if (!tid) return [];
                return (currentAssets||[])
                    .filter(x => Number(x.image_type_id||0) === tid && x.storage_path)
                    .map(x => storagePathToPreviewUrl(x.storage_path));
            }

            if (type === 'Hero'){
                const title = esc(props.title||'');
                const text = esc(props.text||'');
                const auto = firstAssetPreviewByTypeId(props.image_type_id);
                const img = esc(props.image_url||'') || esc(storagePathToPreviewUrl(props.storage_path||'')) || esc(auto);
                return `<div class="m"><div style="font-weight:800; font-size:1.1rem; margin-bottom:0.4rem;">${title}</div>
                    ${img ? `<img src="${img}" alt="">` : `<div style="color:rgba(42,36,32,0.6);">Hero: 请在 props 中提供 image_url</div>`}
                    <div style="margin-top:0.5rem; color:rgba(42,36,32,0.78);">${text}</div></div>`;
            }
            if (type === 'Image'){
                const auto = firstAssetPreviewByTypeId(props.image_type_id);
                const img = esc(props.image_url||'') || esc(storagePathToPreviewUrl(props.storage_path||'')) || esc(auto);
                const cap = esc(props.caption||'');
                return `<div class="m">${img ? `<img src="${img}" alt="">` : `<div style="color:rgba(42,36,32,0.6);">Image: 请在 props 中提供 image_url</div>`}
                    ${cap ? `<div style="margin-top:0.45rem; color:rgba(42,36,32,0.72); font-size:0.9rem;">${cap}</div>` : ''}</div>`;
            }
            if (type === 'Carousel'){
                const title = esc(props.title||'');
                const urls = Array.isArray(props.image_urls) ? props.image_urls : [];
                const paths = Array.isArray(props.storage_paths) ? props.storage_paths : [];
                const auto = allAssetPreviewsByTypeId(props.image_type_id);
                const all = urls.length ? urls : (paths.length ? paths.map(storagePathToPreviewUrl) : auto);
                return `<div class="m">
                    ${title ? `<div style="font-weight:800; margin-bottom:0.45rem;">${title}</div>` : ''}
                    ${all.length ? all.map(u => `<img style="margin-bottom:0.55rem;" src="${esc(u)}" alt="">`).join('') :
                        `<div style="color:rgba(42,36,32,0.6);">Carousel: props.image_urls 或 props.storage_paths</div>`}
                </div>`;
            }
            if (type === 'TwoColumnImageText'){
                const auto = firstAssetPreviewByTypeId(props.left_image_type_id || props.image_type_id);
                const img = esc(props.left_image_url||'') || esc(storagePathToPreviewUrl(props.left_storage_path||'')) || esc(auto);
                const rt = esc(props.right_title||'');
                const tx = esc(props.right_text||'');
                return `<div class="m">
                    <div class="aplus-two-col">
                        <div>${img ? `<img src="${img}" alt="">` : `<div style="color:rgba(42,36,32,0.6);">left_image_url</div>`}</div>
                        <div>
                            ${rt ? `<div style="font-weight:800; margin-bottom:0.35rem;">${rt}</div>` : ''}
                            <div style="color:rgba(42,36,32,0.78); white-space:pre-wrap;">${tx}</div>
                        </div>
                    </div>
                </div>`;
            }
            // TextBlock
            const title = esc(props.title||'');
            const text = esc(props.text||'');
            return `<div class="m">
                ${title ? `<div style="font-weight:800; margin-bottom:0.35rem;">${title}</div>` : ''}
                <div style="color:rgba(42,36,32,0.78); white-space:pre-wrap;">${text}</div>
            </div>`;
        }

        function openCreateVersionModal(){
            document.getElementById('createStatus').style.display = 'none';
            document.getElementById('createStatus').textContent = '';
            document.getElementById('newVersionName').value = '';
            document.getElementById('createVersionModal').classList.add('active');
            // default selects follow toolbar selects if any
            const p = document.getElementById('platformSelect').value;
            const s = document.getElementById('skuFamilySelect').value;
            if (p) document.getElementById('newPlatformSelect').value = p;
            if (s) document.getElementById('newSkuFamilySelect').value = s;
        }
        function closeCreateVersionModal(){ document.getElementById('createVersionModal').classList.remove('active'); }
        document.getElementById('createVersionModal').addEventListener('click', function(e){ if (e.target===this) closeCreateVersionModal(); });

        function createVersion(){
            const name = String(document.getElementById('newVersionName').value||'').trim();
            const platform_type_id = Number(document.getElementById('newPlatformSelect').value||0);
            const sku_family_id = Number(document.getElementById('newSkuFamilySelect').value||0);
            if (!name || !platform_type_id || !sku_family_id){
                const el = document.getElementById('createStatus');
                el.style.display = 'block';
                el.style.background = '#ffecec';
                el.style.color = '#a33';
                el.textContent = '请填写版本名称、平台、货号';
                return;
            }
            fetch('/api/aplus-version', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ version_name: name, platform_type_id, sku_family_id })
            }).then(r=>r.json()).then(data => {
                if (!data || data.status!=='success') throw new Error(data.message||'创建失败');
                closeCreateVersionModal();
                loadVersions();
                toast('已创建版本', false);
            }).catch(err => {
                const el = document.getElementById('createStatus');
                el.style.display = 'block';
                el.style.background = '#ffecec';
                el.style.color = '#a33';
                el.textContent = '创建失败：' + err;
            });
        }

        // auto load
        window.addEventListener('load', function(){
            loadInitOptions().finally(() => {
                loadVersions();
            });
            document.getElementById('platformSelect').addEventListener('change', () => loadVersions());
            document.getElementById('skuFamilySelect').addEventListener('change', () => loadVersions());
            document.getElementById('layoutImageTypeSelect').addEventListener('change', () => loadImageTypeLayouts());
            document.getElementById('layoutDeviceSelect').addEventListener('change', () => loadImageTypeLayouts());
            document.getElementById('assetDeviceSelect').addEventListener('change', () => loadAssets().then(()=>renderPreview()));
            document.getElementById('aplusImageTypeSelect').addEventListener('change', () => loadAssets().then(()=>renderPreview()));
        });
    </script>
</body>
</html>
