<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仓储看板</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .board-tools { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
    .board-tools .board-search { min-width: 260px; }
    .col-toggle-panel { display: flex; gap: .6rem; flex-wrap: wrap; padding: .55rem .65rem; border: 1px dashed rgba(207,199,189,.85); border-radius: 10px; margin-top: .55rem; }
    .col-toggle-panel label { display: inline-flex; gap: .25rem; align-items: center; font-size: .86rem; color: var(--morandi-slate); }
    .col-toggle-panel input[type="checkbox"] { width: 16px; min-width: 16px; height: 16px; flex: 0 0 16px; }
    .board-wrap { overflow: auto; text-align: left; }
    .board-table {
      width: max-content;
      min-width: 0;
      table-layout: auto;
      margin-right: auto;
    }
    .sku-cell { position: relative; }
    .wh-cell { position: relative; }
    .badge-tip {
      position: absolute;
      top: 2px;
      right: 6px;
      font-size: .74rem;
      line-height: 1;
      padding: .2rem .36rem;
      border-radius: 999px;
      background: rgba(173,111,111,.92);
      color: #fff;
      cursor: help;
    }
    .group-row td {
      cursor: pointer;
      font-weight: 700;
      border-top: 1px solid rgba(207,199,189,.85);
    }
    .group-row .group-toggle {
      display: inline-flex;
      width: 18px;
      justify-content: center;
      margin-right: .35rem;
      color: #7a7269;
    }
    .group-row.group-bg-0 td,
    .sku-row.group-bg-0 td { background: rgba(255, 255, 255, .78); }
    .group-row.group-bg-1 td,
    .sku-row.group-bg-1 td { background: rgba(244, 241, 236, .92); }
    .sku-row.hidden-row { display: none; }
    .sku-submeta {
      margin-top: .28rem;
      display: grid;
      gap: .12rem;
      font-size: .72rem;
      line-height: 1.3;
      color: rgba(92, 86, 79, .78);
    }
    .sku-submeta-line {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .inv-submeta {
      margin-top: .28rem;
      display: grid;
      gap: .12rem;
      font-size: .72rem;
      line-height: 1.3;
      color: rgba(92, 86, 79, .72);
    }
    .inv-submeta-line {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .inv-main-slot {
      min-height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 区域分组看板筛选 */
    .col-toggle-region-group { display: flex; flex-wrap: wrap; align-items: center; gap: .4rem; padding: .35rem .55rem; border: 1px dashed rgba(207,199,189,.7); border-radius: 8px; }
    .col-toggle-region-header { display: flex; align-items: center; gap: .4rem; }
    .col-toggle-region-name { font-size: .82rem; font-weight: 700; color: var(--morandi-slate); white-space: nowrap; }
    .col-toggle-select-all {
      padding: 0 .42rem !important;
      font-size: .72rem !important;
      border-radius: 999px;
      border: 1px solid var(--morandi-sand) !important;
      background: var(--morandi-mist) !important;
      color: var(--morandi-ink) !important;
      cursor: pointer;
      width: 56px !important;
      min-width: 56px !important;
      min-height: 24px !important;
      height: 24px !important;
      line-height: 1 !important;
      box-shadow: none !important;
    }
    .col-toggle-select-all:hover {
      background: rgba(207, 199, 189, 0.55) !important;
      color: var(--morandi-ink) !important;
      transform: none !important;
    }
    .col-toggle-divider { width: 1px; height: 18px; background: rgba(207,199,199,.7); align-self: center; }
    .wh-group-toggle {
      display: flex;
      align-items: center;
      gap: .42rem;
      width: 100%;
      cursor: pointer;
      user-select: none;
    }
    .wh-group-toggle.is-static {
      cursor: default;
    }
    .wh-group-label {
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .wh-group-line {
      flex: 1 1 auto;
      min-width: 14px;
      border-bottom: 1px dashed rgba(143,134,126,.78);
      transform: translateY(1px);
      opacity: .95;
    }
    .wh-group-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid rgba(143,134,126,.75);
      background: rgba(255,255,255,.82);
      color: var(--morandi-ink);
      font-size: .82rem;
      line-height: 1;
      box-shadow: 0 2px 8px rgba(15, 23, 42, .08);
    }
    .wh-group-toggle:hover .wh-group-circle {
      background: rgba(255,255,255,.96);
    }
    .wh-group-toggle.is-static .wh-group-circle {
      opacity: .45;
      box-shadow: none;
    }
    .wh-group-toggle.is-static .wh-group-line {
      opacity: .55;
    }
    .wh-th-region,
    .wh-th-supplier {
      padding-top: .36rem !important;
      padding-bottom: .36rem !important;
    }
    .wh-th-region .wh-group-label {
      font-size: .94rem;
      font-weight: 600;
      color: var(--morandi-ink);
    }
    .wh-th-supplier .wh-group-label {
      font-size: .84rem;
      color: var(--morandi-ink);
    }
    .wh-th-region,
    .wh-th-supplier,
    .wh-th-short { text-align: center; }
    .wh-th-region { font-size: .94rem; font-weight: 600; color: var(--morandi-ink); }
    .wh-th-supplier { font-size: .84rem; }
    .wh-th-short {
      font-size: .72rem;
      color: rgba(92, 86, 79, .74);
      white-space: nowrap;
      line-height: 1.2;
      overflow: hidden;
    }
    .wh-short-text {
      display: inline-block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: bottom;
    }
    .wh-th-region { background: rgba(236, 231, 223, 0.78) !important; }
    .wh-head-band-a { background: rgba(255, 255, 255, .72) !important; }
    .wh-head-band-b { background: rgba(244, 241, 236, .92) !important; }
    #boardTable th.wh-col,
    #boardTable td.wh-cell {
      min-width: 68px;
      width: 68px;
      max-width: 68px;
      text-align: center;
      padding-left: .45rem;
      padding-right: .45rem;
      box-sizing: border-box;
      overflow: hidden;
    }
    .wh-th-supplier .wh-group-toggle {
      justify-content: center;
    }
    .wh-supplier-summary {
      text-align: center;
      font-size: .84rem;
      font-weight: 600;
      color: var(--morandi-ink);
    }
    #boardTable th.inv-col,
    #boardTable td.inv-col {
      min-width: 80px;
      width: 80px;
      text-align: center;
      vertical-align: top;
    }
    #boardTable td.wh-cell {
      vertical-align: top;
    }
    .wh-region-sep {
      border-right: 2px solid rgba(143,134,126,.38) !important;
    }
    .region-total-cell {
      font-weight: 700;
    }
    .section-th {
      text-align: center !important;
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      background: rgba(236, 231, 223, 0.78) !important;
      border-left: 2px solid rgba(143,134,126,.38);
      white-space: nowrap;
    }
    .section-th:hover { background: rgba(225, 219, 210, 0.9) !important; }
    .section-th .section-toggle-arrow { margin-left: .3rem; font-size: .78rem; }
    .section-td {
      text-align: center;
      vertical-align: top;
      border-left: 2px solid rgba(143,134,126,.38);
    }
    #boardTable th.factory-col,
    #boardTable td.factory-col {
      min-width: 72px;
      width: 72px;
      text-align: center;
      vertical-align: top;
      font-size: .82rem;
    }
    .factory-name-th {
      font-size: .78rem;
      color: rgba(92, 86, 79, .85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 88px;
    }
    .transit-region-th {
      font-size: .82rem;
      font-weight: 600;
      min-width: 60px;
      width: 60px;
      text-align: center;
      vertical-align: top;
    }
  </style>
</head>
<body>
<div id="site-header"></div>
<div class="container">
  <section class="hero" style="margin-bottom:1.2rem;">
    <h2>仓储看板</h2>
    <p>SKU 维度库存概览，在途/工厂在库/工厂在制可收起展开</p>
  </section>

  <section class="pm-layout">
    <div class="card pm-card">
      <div class="board-tools">
        <input id="boardSearchInput" class="board-search" type="text" placeholder="搜索货号/SKU" />
        <button class="btn-primary" onclick="loadBoard()">刷新</button>
        <button class="btn-secondary" onclick="expandAllGroups()">展开列表</button>
        <button class="btn-secondary" onclick="collapseAllGroups()">收起列表</button>
        <button class="btn-secondary" onclick="downloadBoard()">下载库存数据</button>
      </div>
      <div class="col-toggle-panel" id="warehouseTogglePanel"></div>
      <div id="status" class="response" style="display:none; margin-top:.65rem;"></div>
    </div>

    <div class="board-wrap">
      <table class="pm-table board-table" id="boardTable" data-disable-table-manage="1">
        <thead></thead>
        <tbody><tr><td colspan="5" style="text-align:center;">加载中...</td></tr></tbody>
      </table>
    </div>
  </section>
</div>

<script>
let boardWarehouses = [];
let boardFactories = [];
let boardRows = [];
let visibleWarehouseIds = new Set();
let collapsedFamilies = new Set();
let activeSearchText = '';
let collapsedRegionKeys = new Set();
let transitExpanded = true;
let factoryStockExpanded = false;
let factoryWipExpanded = false;

const REGION_ORDER = ['美西', '美中', '美东南', '美东'];

function $(s){ return document.querySelector(s); }
function showStatus(msg, isErr){ const el = $('#status'); el.style.display='block'; el.style.background=isErr?'#ffecec':'#f0fff0'; el.style.color=isErr?'#a33':'#2f6f2f'; el.textContent=msg; }

function regionRank(regionText){
  const text = String(regionText || '');
  for(let idx = 0; idx < REGION_ORDER.length; idx += 1){
    if(text.includes(REGION_ORDER[idx])) return idx;
  }
  return 99;
}

function supplierBandClass(index){
  return index % 2 === 0 ? 'wh-head-band-a' : 'wh-head-band-b';
}

function supplierGroupKey(regionName, supplierName){
  return `${regionName}__${supplierName}`;
}

function getOrderedVisibleWarehouses(){
  return boardWarehouses
    .filter(wh => visibleWarehouseIds.has(String(wh.id)))
    .slice()
    .sort((a, b) => {
      const rankDelta = regionRank(a.region) - regionRank(b.region);
      if(rankDelta !== 0) return rankDelta;
      const as = String(a.supplier_name || '');
      const bs = String(b.supplier_name || '');
      if(as !== bs) return as.localeCompare(bs, 'zh');
      const an = String(a.warehouse_short_name || a.warehouse_name || '');
      const bn = String(b.warehouse_short_name || b.warehouse_name || '');
      return an.localeCompare(bn, 'zh');
    });
}

function buildColumnGroups(visibleWh){
  const regions = [];
  visibleWh.forEach(wh => {
    const regionName = String(wh.region || '-');
    const supplierName = String(wh.supplier_name || '-');
    let region = regions[regions.length - 1];
    if(!region || region.name !== regionName){
      region = { name: regionName, suppliers: [], warehouses: [] };
      regions.push(region);
    }
    region.warehouses.push(wh);
    let supplier = region.suppliers[region.suppliers.length - 1];
    if(!supplier || supplier.name !== supplierName){
      supplier = {
        name: supplierName,
        key: supplierGroupKey(regionName, supplierName),
        warehouses: [],
        band: supplierBandClass(region.suppliers.length)
      };
      region.suppliers.push(supplier);
    }
    supplier.warehouses.push(wh);
  });
  return regions;
}

function buildLeafColumns(regionGroups){
  const leaves = [];
  regionGroups.forEach(region => {
    const regionCollapsed = region.warehouses.length > 1 && collapsedRegionKeys.has(region.name);
    if(regionCollapsed){
      leaves.push({ type: 'region', regionName: region.name, warehouses: region.warehouses.slice(), band: region.suppliers[0] ? region.suppliers[0].band : 'wh-head-band-a' });
      return;
    }
    region.suppliers.forEach(supplier => {
      supplier.warehouses.forEach(wh => {
        leaves.push({ type: 'warehouse', regionName: region.name, supplierKey: supplier.key, supplierName: supplier.name, warehouse: wh, warehouses: [wh], band: supplier.band });
      });
    });
  });
  leaves.forEach((leaf, idx) => {
    const next = leaves[idx + 1];
    leaf.regionBoundary = Boolean(next && next.regionName !== leaf.regionName);
  });
  return leaves;
}

function sumForWarehouses(row, warehouses, field){
  return warehouses.reduce((total, wh) => total + (Number((row[field] || {})[String(wh.id)] || 0) || 0), 0);
}

function toggleTransit(){ transitExpanded = !transitExpanded; renderBoard(); }
function toggleFactoryStock(){ factoryStockExpanded = !factoryStockExpanded; renderBoard(); }
function toggleFactoryWip(){ factoryWipExpanded = !factoryWipExpanded; renderBoard(); }

function toggleRegionColumnGroup(regionName){
  if(collapsedRegionKeys.has(regionName)) collapsedRegionKeys.delete(regionName);
  else collapsedRegionKeys.add(regionName);
  renderBoard();
}

function buildTogglePanel(){
  const wrap = $('#warehouseTogglePanel');
  wrap.innerHTML = '';
  const regionGroups = {};
  boardWarehouses.forEach(wh => {
    const r = String(wh.region || '');
    let rKey = '-';
    for (const k of REGION_ORDER) { if (r.includes(k)) { rKey = k; break; } }
    (regionGroups[rKey] = regionGroups[rKey] || []).push(wh);
  });
  const regions = [...REGION_ORDER, '-'].filter(k => regionGroups[k]);
  regions.forEach((rKey, rIdx) => {
    if (rIdx > 0) {
      const div = document.createElement('span');
      div.className = 'col-toggle-divider';
      wrap.appendChild(div);
    }
    const group = document.createElement('div');
    group.className = 'col-toggle-region-group';
    const header = document.createElement('div');
    header.className = 'col-toggle-region-header';
    const nameEl = document.createElement('span');
    nameEl.className = 'col-toggle-region-name';
    nameEl.textContent = rKey;
    const allBtn = document.createElement('button');
    allBtn.type = 'button';
    allBtn.className = 'col-toggle-select-all';
    const whs = regionGroups[rKey];
    const allChecked = whs.every(wh => visibleWarehouseIds.has(String(wh.id)));
    allBtn.textContent = allChecked ? '全取消' : '全选';
    allBtn.addEventListener('click', () => {
      if (allChecked) whs.forEach(wh => visibleWarehouseIds.delete(String(wh.id)));
      else whs.forEach(wh => visibleWarehouseIds.add(String(wh.id)));
      buildTogglePanel();
      renderBoard();
    });
    header.appendChild(nameEl);
    header.appendChild(allBtn);
    group.appendChild(header);
    whs.forEach(wh => {
      const id = String(wh.id);
      const label = document.createElement('label');
      label.innerHTML = `<input type="checkbox" data-wh="${id}" ${visibleWarehouseIds.has(id) ? 'checked' : ''
        }>${wh.warehouse_short_name || wh.warehouse_name}`;
      label.querySelector('input').addEventListener('change', function(){
        if (this.checked) visibleWarehouseIds.add(id); else visibleWarehouseIds.delete(id);
        buildTogglePanel();
        renderBoard();
      });
      group.appendChild(label);
    });
    wrap.appendChild(group);
  });
}

function renderBoard(){
  const thead = $('#boardTable thead');
  const tbody = $('#boardTable tbody');
  const visibleWh = getOrderedVisibleWarehouses();
  const keyword = activeSearchText.trim().toLowerCase();
  const allVisible = visibleWh.length === boardWarehouses.length;
  const regionGroups = buildColumnGroups(visibleWh);
  const leafColumns = buildLeafColumns(regionGroups);

  // Section column counts
  const transitActiveRegions = REGION_ORDER.filter(r =>
    boardRows.some(row => ((row.in_transit_by_region || {})[r] || 0) > 0)
  );
  const effectiveTransitRegions = transitActiveRegions.length > 0 ? transitActiveRegions : REGION_ORDER.slice(0, 4);
  const transitColspan = transitExpanded ? effectiveTransitRegions.length : 1;
  const stockColspan = factoryStockExpanded ? Math.max(1, boardFactories.length) : 1;
  const wipColspan = factoryWipExpanded ? Math.max(1, boardFactories.length) : 1;
  const fixedCols = 3;
  const totalCols = fixedCols + transitColspan + stockColspan + wipColspan + leafColumns.length;

  // Build 3-row thead
  let row1 = '';
  let row2 = '';
  let row3 = '';

  row1 += `<th rowspan="3">货号</th>`;
  row1 += `<th rowspan="3">SKU</th>`;
  row1 += `<th rowspan="3" class="inv-col">现货库存</th>`;

  row1 += `<th colspan="${transitColspan}" class="section-th" data-toggle="transit">在途<span class="section-toggle-arrow">${transitExpanded ? '▾' : '▸'}</span></th>`;
  if (transitExpanded) {
    effectiveTransitRegions.forEach(r => {
      row2 += `<th rowspan="2" class="transit-region-th">${r}</th>`;
    });
  } else {
    row2 += `<th rowspan="2" class="transit-region-th">合计</th>`;
  }

  row1 += `<th colspan="${stockColspan}" class="section-th" data-toggle="factory-stock">工厂在库<span class="section-toggle-arrow">${factoryStockExpanded ? '▾' : '▸'}</span></th>`;
  if (factoryStockExpanded && boardFactories.length > 0) {
    boardFactories.forEach(f => {
      row2 += `<th rowspan="2" class="factory-col factory-name-th" title="${String(f.factory_name || '').replace(/"/g,'&quot;')}">${f.factory_name || ''}</th>`;
    });
  } else {
    row2 += `<th rowspan="2" class="factory-col">合计</th>`;
  }

  row1 += `<th colspan="${wipColspan}" class="section-th" data-toggle="factory-wip">工厂在制<span class="section-toggle-arrow">${factoryWipExpanded ? '▾' : '▸'}</span></th>`;
  if (factoryWipExpanded && boardFactories.length > 0) {
    boardFactories.forEach(f => {
      row2 += `<th rowspan="2" class="factory-col factory-name-th" title="${String(f.factory_name || '').replace(/"/g,'&quot;')}">${f.factory_name || ''}</th>`;
    });
  } else {
    row2 += `<th rowspan="2" class="factory-col">合计</th>`;
  }

  regionGroups.forEach((region, regionIndex) => {
    const leafCount = leafColumns.filter(col => col.regionName === region.name).length;
    const canFold = region.warehouses.length > 1;
    const folded = canFold && collapsedRegionKeys.has(region.name);
    const sepClass = regionIndex < regionGroups.length - 1 ? 'wh-region-sep' : '';
    row1 += `<th colspan="${leafCount}" class="wh-th-region ${region.suppliers[0] ? region.suppliers[0].band : 'wh-head-band-a'} ${sepClass}" ${canFold ? `data-toggle-kind="region" data-region-name="${String(region.name).replace(/"/g,'&quot;')}"` : ''}><div class="wh-group-toggle ${canFold ? '' : 'is-static'}"><span class="wh-group-label">${region.name}</span><span class="wh-group-line"></span><span class="wh-group-circle">${canFold ? (folded ? '+' : '-') : ''}</span></div></th>`;
  });
  regionGroups.forEach((region, regionIndex) => {
    const regionFolded = region.warehouses.length > 1 && collapsedRegionKeys.has(region.name);
    const sepClass = regionIndex < regionGroups.length - 1 ? 'wh-region-sep' : '';
    if(regionFolded){
      row2 += `<th colspan="1" class="wh-th-supplier ${region.suppliers[0] ? region.suppliers[0].band : 'wh-head-band-a'} ${sepClass}"><div class="wh-supplier-summary">合计</div></th>`;
    } else {
      row2 += region.suppliers.map((supplier, supplierIndex) => {
        const supplierSepClass = supplierIndex === region.suppliers.length - 1 ? sepClass : '';
        return `<th colspan="${supplier.warehouses.length}" class="wh-th-supplier ${supplier.band} ${supplierSepClass}"><div class="wh-group-toggle is-static"><span class="wh-group-label">${supplier.name}</span></div></th>`;
      }).join('');
    }
  });
  leafColumns.forEach(col => {
    const sepClass = col.regionBoundary ? 'wh-region-sep' : '';
    if(col.type === 'region'){
      row3 += `<th class="wh-th-short wh-col ${col.band} ${sepClass}">合计</th>`;
    } else {
      const shortName = String(col.warehouse.warehouse_short_name || col.warehouse.warehouse_name || '');
      const fullName = String(col.warehouse.warehouse_name || shortName);
      row3 += `<th data-wh="${col.warehouse.id}" class="wh-th-short wh-col ${col.band} ${sepClass}"><span class="wh-short-text" title="${fullName.replace(/"/g,'&quot;')}">${shortName}</span></th>`;
    }
  });

  thead.innerHTML = `<tr>${row1}</tr><tr>${row2}</tr><tr>${row3}</tr>`;

  thead.querySelectorAll('th[data-toggle]').forEach(cell => {
    cell.addEventListener('click', function(){
      const t = this.getAttribute('data-toggle');
      if(t === 'transit') toggleTransit();
      else if(t === 'factory-stock') toggleFactoryStock();
      else if(t === 'factory-wip') toggleFactoryWip();
    });
  });
  thead.querySelectorAll('th[data-toggle-kind]').forEach(cell => {
    cell.addEventListener('click', function(){
      const kind = String(this.getAttribute('data-toggle-kind') || '');
      if(kind === 'region') toggleRegionColumnGroup(String(this.getAttribute('data-region-name') || ''));
    });
  });

  // Build filtered group rows
  const grouped = [];
  const groupMap = new Map();
  boardRows.forEach(row => {
    const famName = String(row.sku_family || '-').trim() || '-';
    if (!groupMap.has(famName)) {
      const node = { family: famName, rows: [] };
      groupMap.set(famName, node);
      grouped.push(node);
    }
    groupMap.get(famName).rows.push(row);
  });

  const filteredGroups = grouped
    .map(group => {
      const rows = keyword
        ? group.rows.filter(row => {
            const skuText = String(row.sku || '').toLowerCase();
            const famText = String(group.family || '').toLowerCase();
            const childSkuText = (row.iteration_children || []).map(item => String(item.sku || '')).join(' ').toLowerCase();
            return skuText.includes(keyword) || famText.includes(keyword) || childSkuText.includes(keyword);
          })
        : group.rows;
      const whFilteredRows = allVisible
        ? rows
        : rows.filter(row => visibleWh.some(wh => ((row.warehouse_qty || {})[String(wh.id)] || 0) > 0));
      return { family: group.family, rows: whFilteredRows };
    })
    .filter(group => group.rows.length > 0);

  if (!filteredGroups.length){
    tbody.innerHTML = `<tr><td colspan="${totalCols}" style="text-align:center;">暂无数据</td></tr>`;
    return;
  }

  let html = '';
  filteredGroups.forEach((group, groupIndex) => {
    const familyKey = String(group.family || '-');
    const isCollapsed = keyword ? false : collapsedFamilies.has(familyKey);
    const groupClass = `group-bg-${groupIndex % 2}`;
    html += `<tr class="group-row ${groupClass}" data-family="${familyKey.replace(/"/g,'&quot;')}">`;
    html += `<td colspan="${totalCols}"><span class="group-toggle">${isCollapsed ? '▸' : '▾'}</span>${group.family || '-'}（${group.rows.length}）</td>`;
    html += `</tr>`;

    group.rows.forEach(row => {
      const esc = (v) => String(v == null ? '' : v).replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const childRows = (row.iteration_children || []);
      const badge = Number(row.in_transit_total || 0) > 0
        ? `<span class="badge-tip" title="${(row.in_transit_tip || '').replace(/"/g,'&quot;')}">${row.in_transit_total}</span>`
        : '';
      const childMeta = childRows.length
        ? `<div class="sku-submeta">${childRows.map(child => `<div class="sku-submeta-line">${esc(child.sku || '')}</div>`).join('')}</div>`
        : '';
      const childAvailableMeta = childRows.length
        ? `<div class="inv-submeta">${childRows.map(child => `<div class="inv-submeta-line">${Number(child.available_total || 0) || 0}</div>`).join('')}</div>`
        : '';

      // In-transit cells
      let transitCells = '';
      if (transitExpanded) {
        effectiveTransitRegions.forEach(r => {
          const qty = Number((row.in_transit_by_region || {})[r] || 0);
          const childTransitRegionMeta = childRows.length
            ? `<div class="inv-submeta">${childRows.map(child => `<div class="inv-submeta-line">${Number(((child.in_transit_by_region || {})[r]) || 0)}</div>`).join('')}</div>`
            : '';
          transitCells += `<td class="inv-col section-td"><div class="inv-main-slot">${qty}</div>${childTransitRegionMeta}</td>`;
        });
      } else {
        const qty = Number(row.in_transit_total || 0);
        const childTransitMeta = childRows.length
          ? `<div class="inv-submeta">${childRows.map(child => `<div class="inv-submeta-line">${Number(child.in_transit_total || 0)}</div>`).join('')}</div>`
          : '';
        transitCells = `<td class="inv-col section-td"><div class="inv-main-slot">${qty}${badge}</div>${childTransitMeta}</td>`;
      }

      // Factory stock cells
      let stockCells = '';
      if (factoryStockExpanded && boardFactories.length > 0) {
        const fstockMap = row.factory_stock_by_factory || {};
        boardFactories.forEach(f => {
          const qty = Number(fstockMap[String(f.id)] || 0);
          const childMeta2 = childRows.length
            ? `<div class="inv-submeta">${childRows.map(child => `<div class="inv-submeta-line">${Number(((child.factory_stock_by_factory || {})[String(f.id)]) || 0)}</div>`).join('')}</div>`
            : '';
          stockCells += `<td class="factory-col section-td"><div class="inv-main-slot">${qty}</div>${childMeta2}</td>`;
        });
      } else {
        const qty = Number(row.factory_stock_total || 0);
        const childStockMeta = childRows.length
          ? `<div class="inv-submeta">${childRows.map(child => `<div class="inv-submeta-line">${Number(child.factory_stock_total || 0)}</div>`).join('')}</div>`
          : '';
        stockCells = `<td class="factory-col section-td"><div class="inv-main-slot">${qty}</div>${childStockMeta}</td>`;
      }

      // Factory wip cells
      let wipCells = '';
      if (factoryWipExpanded && boardFactories.length > 0) {
        const fwipMap = row.factory_wip_by_factory || {};
        boardFactories.forEach(f => {
          const wipVal = fwipMap[String(f.id)] || {};
          const qty = Number(wipVal.quantity || 0);
          const dateStr = wipVal.earliest_date ? `<div style="font-size:.7rem;color:#7a7269;margin-top:.15rem;">${wipVal.earliest_date}</div>` : '';
          const childMeta2 = childRows.length
            ? `<div class="inv-submeta">${childRows.map(child => `<div class="inv-submeta-line">${Number(((child.factory_wip_by_factory || {})[String(f.id)] || {}).quantity || 0)}</div>`).join('')}</div>`
            : '';
          wipCells += `<td class="factory-col section-td"><div class="inv-main-slot">${qty}</div>${dateStr}${childMeta2}</td>`;
        });
      } else {
        const qty = Number(row.factory_wip_total || 0);
        const childWipMeta = childRows.length
          ? `<div class="inv-submeta">${childRows.map(child => `<div class="inv-submeta-line">${Number(child.factory_wip_total || 0)}</div>`).join('')}</div>`
          : '';
        wipCells = `<td class="factory-col section-td"><div class="inv-main-slot">${qty}</div>${childWipMeta}</td>`;
      }

      // Warehouse columns
      const whCols = leafColumns.map(col => {
        const totalQty = col.type === 'warehouse'
          ? ((row.warehouse_qty || {})[String(col.warehouse.id)] || 0)
          : sumForWarehouses(row, col.warehouses, 'warehouse_qty');
        const totalTransit = col.type === 'warehouse'
          ? ((row.in_transit_by_warehouse || {})[String(col.warehouse.id)] || 0)
          : sumForWarehouses(row, col.warehouses, 'in_transit_by_warehouse');
        const whBadge = totalTransit > 0 ? `<span class="badge-tip" title="在途中：${totalTransit}">${totalTransit}</span>` : '';
        const childWhMeta = childRows.length
          ? `<div class="inv-submeta">${childRows.map(child => {
              const qty = col.type === 'warehouse'
                ? Number(((child.warehouse_qty || {})[String(col.warehouse.id)] || 0) || 0)
                : Number((col.warehouses || []).reduce((sum, wh) => sum + (Number(((child.warehouse_qty || {})[String(wh.id)] || 0) || 0)), 0) || 0);
              return `<div class="inv-submeta-line">${esc(qty)}</div>`;
            }).join('')}</div>`
          : '';
        const sepClass = col.regionBoundary ? 'wh-region-sep' : '';
        const regionTotalClass = col.type === 'region' ? 'region-total-cell' : '';
        return `<td class="wh-cell wh-col ${col.band} ${sepClass} ${regionTotalClass}"><div class="inv-main-slot">${totalQty}${whBadge}</div>${childWhMeta}</td>`;
      }).join('');

      html += `<tr class="sku-row ${groupClass} ${isCollapsed ? 'hidden-row' : ''}" data-family="${familyKey.replace(/"/g,'&quot;')}">`;
      html += `<td>${group.family || '-'}</td>`;
      html += `<td class="sku-cell">${row.sku || ''}${childMeta}</td>`;
      html += `<td class="inv-col"><div class="inv-main-slot">${row.available_total || 0}</div>${childAvailableMeta}</td>`;
      html += transitCells;
      html += stockCells;
      html += wipCells;
      html += whCols;
      html += `</tr>`;
    });
  });

  tbody.innerHTML = html;
  document.querySelectorAll('.group-row').forEach(row => {
    row.addEventListener('click', function(){
      const family = String(this.getAttribute('data-family') || '');
      if (!family) return;
      if (collapsedFamilies.has(family)) collapsedFamilies.delete(family);
      else collapsedFamilies.add(family);
      renderBoard();
    });
  });
}

function loadBoard(){
  fetch('/api/logistics-warehouse-dashboard')
    .then(r => r.json())
    .then(d => {
      if (d.status !== 'success'){
        showStatus(d.message || '加载失败', true);
        return;
      }
      boardWarehouses = d.warehouses || [];
      boardFactories = d.factories || [];
      boardRows = d.items || [];
      if (!visibleWarehouseIds.size){
        boardWarehouses.forEach(wh => visibleWarehouseIds.add(String(wh.id)));
      }
      collapsedFamilies.clear();
      collapsedRegionKeys.clear();
      buildTogglePanel();
      renderBoard();
      showStatus('看板已刷新', false);
    })
    .catch(err => showStatus('加载失败: ' + err, true));
}

function downloadBoard(){
  window.location.href = '/api/logistics-warehouse-dashboard?action=export';
}

function expandAllGroups(){
  collapsedFamilies.clear();
  renderBoard();
}

function collapseAllGroups(){
  const grouped = new Set();
  boardRows.forEach(row => grouped.add(String(row.sku_family || '-').trim() || '-'));
  collapsedFamilies = grouped;
  renderBoard();
}

window.addEventListener('load', function(){
  const searchInput = $('#boardSearchInput');
  searchInput.addEventListener('input', function(){
    activeSearchText = String(this.value || '');
    renderBoard();
  });
  searchInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter') {
      activeSearchText = String(this.value || '');
      renderBoard();
    }
  });
  loadBoard();
});
</script>
</body>
<script src="/static/js/header.js"></script>
</html>
