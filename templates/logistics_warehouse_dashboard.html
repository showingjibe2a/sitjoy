<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仓储看板</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .board-tools { display: flex; gap: .45rem; flex-wrap: wrap; align-items: center; }
    .board-tools .board-search { min-width: 260px; }
    .board-tools .btn-secondary,
    .board-tools .btn-primary {
      font-size: .82rem;
      padding: .32rem .58rem;
      min-height: 28px;
    }
    .board-switch {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .82rem;
      color: var(--morandi-ink);
      padding: .24rem .5rem;
      border: 1px solid rgba(207,199,189,.85);
      border-radius: 8px;
      background: rgba(255,255,255,.68);
    }
    .col-toggle-panel { display: flex; gap: .6rem; flex-wrap: wrap; padding: .55rem .65rem; border: 1px dashed rgba(207,199,189,.85); border-radius: 10px; margin-top: .55rem; }
    .col-toggle-panel.is-collapsed { display: none; }
    .col-toggle-panel label { display: inline-flex; gap: .25rem; align-items: center; font-size: .86rem; color: var(--morandi-slate); }
    .col-toggle-panel input[type="checkbox"] { width: 16px; min-width: 16px; height: 16px; flex: 0 0 16px; }
    .board-header-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      box-sizing: border-box;
      background: var(--morandi-cream);
      border-radius: 12px 12px 0 0;
    }
    .board-header-wrap::-webkit-scrollbar { display: none; height: 0; }
    .board-top-scroll {
      display: none;
      height: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      background: rgba(255,255,255,.88);
      border-top: 1px solid rgba(207,199,189,.55);
      border-bottom: 1px solid rgba(207,199,189,.7);
      box-sizing: border-box;
    }
    .board-top-scroll-inner { height: 1px; }
    .board-body-wrap {
      overflow-x: auto;
      overflow-y: auto;
      text-align: left;
      height: calc(100vh - 250px);
      max-height: calc(100vh - 250px);
      background: var(--morandi-cream);
      border-radius: 0 0 12px 12px;
    }
    .board-table {
      width: max-content;
      min-width: 0;
      table-layout: fixed;
      margin-right: 0;
    }
    #boardHeadTable,
    #boardBodyTable {
      border-collapse: collapse;
      border-spacing: 0;
    }
    .sku-cell { position: relative; }
    .wh-cell { position: relative; }
    .badge-tip {
      position: absolute;
      top: -7px;
      right: 6px;
      font-size: .7rem;
      line-height: 1;
      padding: .14rem .34rem;
      border-radius: 999px;
      background: rgba(173,111,111,.92);
      color: #fff;
      cursor: help;
      pointer-events: auto;
      white-space: nowrap;
      z-index: 1;
    }
    .group-row td {
      cursor: pointer;
      font-weight: 700;
      border-top: 1px solid rgba(207,199,189,.85);
    }
    .group-row .group-toggle {
      display: inline-flex;
      width: 18px;
      justify-content: center;
      margin-right: .35rem;
      color: #7a7269;
    }
    .group-row.group-bg-0 td,
    .sku-row.group-bg-0 td { background: rgba(255, 255, 255, .78); }
    .group-row.group-bg-1 td,
    .sku-row.group-bg-1 td { background: rgba(244, 241, 236, .92); }
    .sku-row.hidden-row { display: none; }
    .sku-submeta {
      margin-top: .28rem;
      display: grid;
      gap: .12rem;
      font-size: .72rem;
      line-height: 1.3;
      color: rgba(92, 86, 79, .78);
    }
    .sku-submeta-line {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .inv-submeta {
      margin-top: .28rem;
      display: grid;
      gap: .12rem;
      font-size: .72rem;
      line-height: 1.3;
      color: rgba(92, 86, 79, .72);
    }
    .inv-submeta-line {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .inv-main-slot {
      min-height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
    }
    .inv-main-slot.has-badge { padding-top: 7px; }
    .inv-main-text {
      position: relative;
      z-index: 2;
    }
    .inv-main-slot.has-badge .inv-main-text {
      text-shadow: 0 0 1px rgba(255,255,255,.95), 0 0 2px rgba(255,255,255,.95), 0 0 3px rgba(255,255,255,.95);
    }
    .fabric-dot-cell {
      text-align: center;
      vertical-align: middle !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }
    .fabric-dot-wrap {
      width: 100%;
      min-height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .fabric-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(42, 36, 32, 0.25);
    }
    .sortable-th { cursor: pointer; user-select: none; }

    /* 区域分组看板筛选 */
    .col-toggle-region-group { display: flex; flex-wrap: wrap; align-items: center; gap: .4rem; padding: .35rem .55rem; border: 1px dashed rgba(207,199,189,.7); border-radius: 8px; }
    .col-toggle-region-header { display: flex; align-items: center; gap: .4rem; }
    .col-toggle-region-name { font-size: .82rem; font-weight: 700; color: var(--morandi-slate); white-space: nowrap; }
    .col-toggle-select-all {
      padding: 0 .42rem !important;
      font-size: .72rem !important;
      border-radius: 999px;
      border: 1px solid var(--morandi-sand) !important;
      background: var(--morandi-mist) !important;
      color: var(--morandi-ink) !important;
      cursor: pointer;
      width: 56px !important;
      min-width: 56px !important;
      min-height: 24px !important;
      height: 24px !important;
      line-height: 1 !important;
      box-shadow: none !important;
    }
    .col-toggle-select-all:hover {
      background: rgba(207, 199, 189, 0.55) !important;
      color: var(--morandi-ink) !important;
      transform: none !important;
    }
    .col-toggle-divider { width: 1px; height: 18px; background: rgba(207,199,199,.7); align-self: center; }
    .wh-group-toggle {
      display: flex;
      align-items: center;
      gap: .42rem;
      width: 100%;
      cursor: pointer;
      user-select: none;
    }
    .wh-group-toggle.is-static {
      cursor: default;
    }
    .wh-group-label {
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .wh-group-line {
      flex: 1 1 auto;
      min-width: 14px;
      border-bottom: 1px dashed rgba(143,134,126,.78);
      transform: translateY(1px);
      opacity: .95;
    }
    .wh-group-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      min-width: 22px;
      flex: 0 0 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid rgba(143,134,126,.75);
      background: rgba(255,255,255,.82);
      color: var(--morandi-ink);
      font-size: .82rem;
      line-height: 1;
      box-shadow: 0 2px 8px rgba(15, 23, 42, .08);
    }
    .wh-group-toggle:hover .wh-group-circle {
      background: rgba(255,255,255,.96);
    }
    .wh-group-toggle.is-static .wh-group-circle {
      display: none;
    }
    .wh-group-toggle.is-static .wh-group-line {
      display: none;
    }
    .wh-th-region,
    .wh-th-supplier {
      padding-top: .36rem !important;
      padding-bottom: .36rem !important;
      overflow: visible !important;
      text-overflow: clip !important;
    }
    .wh-th-region .wh-group-label {
      font-size: .94rem;
      font-weight: 600;
      color: var(--morandi-ink);
    }
    .wh-th-supplier .wh-group-label {
      font-size: .84rem;
      color: var(--morandi-ink);
    }
    .wh-th-region,
    .wh-th-supplier,
    .wh-th-short { text-align: center; }
    .wh-th-region { font-size: .94rem; font-weight: 600; color: var(--morandi-ink); }
    .wh-th-supplier { font-size: .84rem; }
    .wh-th-short {
      font-size: .68rem;
      color: rgba(92, 86, 79, .74);
      white-space: nowrap;
      line-height: 1.2;
      overflow: hidden;
    }
    .wh-th-short.wrap-enabled .wh-short-text {
      white-space: normal;
      word-break: break-all;
      line-height: 1.05;
      text-align: center;
      max-height: 2.2em;
      overflow: hidden;
    }
    .wh-short-text {
      display: inline-block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: bottom;
    }
    .wh-th-region { background: rgba(236, 231, 223, 0.78) !important; }
    .wh-head-band-a { background: rgba(255, 255, 255, .72) !important; }
    .wh-head-band-b { background: rgba(244, 241, 236, .92) !important; }
    #boardHeadTable th.wh-col,
    #boardBodyTable td.wh-cell {
      min-width: 60px;
      width: 60px;
      max-width: 60px;
      text-align: center;
      padding-left: .28rem;
      padding-right: .28rem;
      box-sizing: border-box;
      overflow: hidden;
    }
    .wh-th-supplier .wh-group-toggle {
      justify-content: center;
    }
    .wh-supplier-summary {
      text-align: center;
      font-size: .84rem;
      font-weight: 600;
      color: var(--morandi-ink);
    }
    #boardHeadTable th.inv-col,
    #boardBodyTable td.inv-col {
      min-width: 60px;
      width: 60px;
      text-align: center;
      vertical-align: top;
      position: relative;
    }
    #boardBodyTable td.wh-cell {
      vertical-align: top;
    }
    .wh-region-sep {
      border-right: 2px solid rgba(143,134,126,.38) !important;
    }
    .region-total-cell {
      font-weight: 700;
    }
    .section-th {
      text-align: center !important;
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      background: rgba(236, 231, 223, 0.78) !important;
      border-left: 2px solid rgba(143,134,126,.38);
      white-space: nowrap;
      overflow: visible !important;
      text-overflow: clip !important;
    }
    .section-th:hover { background: rgba(225, 219, 210, 0.9) !important; }
    .section-th .section-toggle-arrow { margin-left: .3rem; font-size: .78rem; }
    .section-td {
      text-align: center;
      vertical-align: top;
      border-left: 2px solid rgba(143,134,126,.38);
    }
    #boardHeadTable th.factory-col,
    #boardBodyTable td.factory-col { font-size: .82rem; }
    .factory-col .badge-tip { background: rgba(106, 132, 176, .9); }
    .factory-name-th {
      font-size: .78rem;
      color: rgba(92, 86, 79, .85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 88px;
    }
    .transit-region-th {
      font-size: .82rem;
      font-weight: 600;
      min-width: 60px;
      width: 60px;
      text-align: center;
      vertical-align: top;
    }
    .header-title-with-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      padding-right: 34px;
      min-height: 22px;
    }
    #boardHeadTable th.inv-col { padding-right: .45rem !important; }
    .family-row-arrow {
      display: inline-block;
      width: 14px;
      text-align: center;
      color: #7a7269;
      font-size: .82rem;
      margin-right: .24rem;
    }
    #boardBodyTable .group-row > td { font-size: .84rem; font-weight: 700; }
    #boardBodyTable .sku-row > td { font-size: .84rem; font-weight: 400; }
    .source-toggle {
      display: inline-flex;
      align-items: center;
      gap: .2rem;
      cursor: pointer;
      user-select: none;
      color: rgba(92, 86, 79, .78);
      font-size: .8rem;
      margin-left: .35rem;
    }
    .source-toggle:hover {
      color: rgba(92, 86, 79, .96);
    }
    .derived-sku {
      display: inline-block;
      padding-left: 1.2rem;
      color: rgba(92, 86, 79, .72);
    }
    .col-resize-handle {
      position: absolute;
      top: 0;
      right: -3px;
      width: 8px;
      height: 100%;
      cursor: col-resize;
      z-index: 6;
      user-select: none;
    }
    .col-resize-handle::after {
      content: '';
      position: absolute;
      top: 16%;
      bottom: 16%;
      right: 3px;
      width: 2px;
      background: rgba(123,128,136,.55);
      opacity: .28;
    }
    td:hover .col-resize-handle::after,
    th:hover .col-resize-handle::after { opacity: .95; }
    .child-row.hidden-row { display: none; }
    .section-th .wh-group-toggle { justify-content: center; gap: .6rem; }
    .section-th .wh-group-label,
    .wh-th-region .wh-group-label,
    .wh-th-supplier .wh-group-label {
      overflow: visible;
      text-overflow: clip;
      white-space: nowrap;
    }
    #boardBodyTable tbody tr.sku-row > td {
      transition: background-color .12s ease, box-shadow .12s ease;
    }
    #boardBodyTable tbody tr.sku-row:hover > td {
      background: rgba(154, 163, 168, .22) !important;
    }
    #boardBodyTable td.board-hover-col {
      background: rgba(154, 163, 168, .16) !important;
    }
    #boardBodyTable tbody tr.sku-row:hover > td.board-hover-col {
      background: rgba(154, 163, 168, .26) !important;
    }
    #boardBodyTable td.board-selectable-cell {
      cursor: cell;
      user-select: none;
    }
    #boardBodyTable tr.board-hover-row > td,
    #boardBodyTable tr.board-fixed-row > td {
      background: rgba(154, 163, 168, .18) !important;
    }
    #boardBodyTable tr.board-fixed-row > td {
      background: rgba(154, 163, 168, .24) !important;
    }
    #boardBodyTable td.board-hover-col,
    #boardHeadTable th.board-hover-head {
      background: rgba(154, 163, 168, .20) !important;
    }
    #boardBodyTable td.board-fixed-col,
    #boardHeadTable th.board-fixed-head {
      background: rgba(154, 163, 168, .28) !important;
    }
    #boardBodyTable td.board-hover-anchor {
      background: rgba(154, 163, 168, .30) !important;
      box-shadow: inset 0 0 0 2px rgba(95, 90, 83, .24);
    }
    #boardBodyTable td.board-fixed-anchor {
      background: rgba(154, 163, 168, .38) !important;
      box-shadow: inset 0 0 0 2px rgba(82, 78, 72, .48);
    }
    #boardBodyTable td.board-cell-selected {
      background: rgba(154, 163, 168, .22) !important;
      box-shadow: inset 0 0 0 1px rgba(95, 90, 83, .22);
    }
    #boardBodyTable td.board-cell-anchor {
      background: rgba(154, 163, 168, .30) !important;
      box-shadow: inset 0 0 0 2px rgba(82, 78, 72, .42);
    }
  </style>
</head>
<body>
<div id="site-header"></div>
<div class="container">
  <section class="hero" style="margin-bottom:1.2rem;">
    <h2>仓储看板</h2>
    <p>SKU 维度库存概览，在途以角标显示，工厂在制并入工厂在库角标显示</p>
  </section>

  <section class="pm-layout">
    <div class="card pm-card">
      <div class="board-tools">
        <input id="boardSearchInput" class="board-search" type="text" placeholder="搜索货号/SKU" />
        <button class="btn-primary" onclick="loadBoard()">刷新</button>
        <button class="btn-secondary" onclick="expandAllGroups()">展开列表</button>
        <button class="btn-secondary" onclick="collapseAllGroups()">收起列表</button>
        <button class="btn-secondary" id="toggleFilterBtn" onclick="toggleFilterPanel()">展开筛选</button>
        <span class="board-switch">仓库编号换行展示
          <div class="status-segment status-segment--inline" id="whWrapSegment" data-value="0">
            <button type="button" class="status-pill status-pill--yes" data-value="1">启用</button>
            <button type="button" class="status-pill status-pill--no is-active" data-value="0">关闭</button>
          </div>
        </span>
        <button class="btn-secondary" onclick="downloadBoard()">下载库存数据</button>
      </div>
      <div class="col-toggle-panel is-collapsed" id="warehouseTogglePanel"></div>
      <div id="status" class="response" style="display:none; margin-top:.65rem;"></div>
    </div>

    <div class="board-header-wrap" id="boardHeaderWrap">
      <table class="pm-table board-table" id="boardHeadTable" data-disable-table-manage="1">
        <colgroup id="boardHeadColgroup"></colgroup>
        <thead></thead>
      </table>
    </div>
    <div class="board-top-scroll" id="boardTopScroll"><div class="board-top-scroll-inner" id="boardTopScrollInner"></div></div>
    <div class="board-body-wrap" id="boardBodyWrap">
      <table class="pm-table board-table" id="boardBodyTable" data-disable-table-manage="1">
        <colgroup id="boardBodyColgroup"></colgroup>
        <tbody><tr><td colspan="5" style="text-align:center;">加载中...</td></tr></tbody>
      </table>
    </div>
  </section>
</div>

<script>
let boardWarehouses = [];
let boardFactories = [];
let boardRows = [];
let visibleWarehouseIds = new Set();
let collapsedFamilies = new Set();
let collapsedSourceSku = new Set();
let activeSearchText = '';
let collapsedRegionKeys = new Set();
let overseasExpanded = false;
let overseasRegionInitCollapsed = false;
let factoryStockExpanded = false;
let syncingScroll = false;
let fabricSortOrder = '';
let filterPanelCollapsed = true;
let wrapWarehouseShortName = false;
const WRAP_SHORT_NAME_KEY = 'sitjoy:warehouse-short-wrap-enabled';
let boardColWidths = [];
let suppressHeaderToggleUntil = 0;
let boardCellUiBound = false;
let boardCellMouseDown = false;
let boardHoverRow = -1;
let boardHoverCol = -1;
let boardSelectionAnchor = null;
let boardSelectionFocus = null;
let boardSelectionBounds = null;
let boardSelectionMode = 'cell';
let boardSelectionLocked = false;

let REGION_ORDER = ['美西', '美中', '美东南', '美东'];

function $(s){ return document.querySelector(s); }

function getVisibleSkuRows(){
  return Array.from(document.querySelectorAll('#boardBodyTable tbody tr.sku-row'))
    .filter(tr => !tr.classList.contains('hidden-row'));
}

function refreshSelectableCellMeta(){
  const rows = getVisibleSkuRows();
  rows.forEach((tr, rowIndex) => {
    tr.dataset.boardRowIndex = String(rowIndex);
    Array.from(tr.children).forEach((td, colIndex) => {
      td.dataset.boardColIndex = String(colIndex);
      td.classList.add('board-selectable-cell');
    });
  });
}

function clearHoverColumn(){
  if(boardHoverCol < 0) return;
  getVisibleSkuRows().forEach(tr => {
    const td = tr.querySelector(`td[data-board-col-index="${boardHoverCol}"]`);
    if(td) td.classList.remove('board-hover-col');
  });
  document.querySelectorAll('#boardHeadTable th.board-hover-head').forEach(th => th.classList.remove('board-hover-head'));
  boardHoverCol = -1;
}

function getHeaderCellsForColumns(columns){
  const headerCells = Array.from(document.querySelectorAll('#boardHeadTable th[data-col-start]'));
  const colSet = new Set((columns || []).map(value => Number(value)).filter(value => Number.isFinite(value)));
  return headerCells.filter(cell => {
    const start = Number(cell.dataset.colStart);
    const end = Number(cell.dataset.colEnd);
    if(!Number.isFinite(start) || !Number.isFinite(end)) return false;
    for(let col = start; col <= end; col += 1){
      if(colSet.has(col)) return true;
    }
    return;
  }
  );
}

function clearHoverRow(){
  if(boardHoverRow < 0) return;
  const row = document.querySelector(`#boardBodyTable tbody tr.sku-row[data-board-row-index="${boardHoverRow}"]`);
  if(row) row.classList.remove('board-hover-row');
  boardHoverRow = -1;
}

function clearHoverState(){
  clearHoverColumn();
  clearHoverRow();
  document.querySelectorAll('#boardBodyTable td.board-hover-anchor, #boardHeadTable th.board-hover-head').forEach(el => el.classList.remove('board-hover-anchor', 'board-hover-head'));
}

function setHoverForCell(pos){
  if(boardSelectionLocked || !pos) return;
  clearHoverState();
  const row = document.querySelector(`#boardBodyTable tbody tr.sku-row[data-board-row-index="${pos.row}"]`);
  if(row) row.classList.add('board-hover-row');
  const rowCell = row ? row.querySelector(`td[data-board-col-index="${pos.col}"]`) : null;
  if(rowCell) rowCell.classList.add('board-hover-anchor');
  getVisibleSkuRows().forEach(tr => {
    const td = tr.querySelector(`td[data-board-col-index="${pos.col}"]`);
    if(td) td.classList.add('board-hover-col');
  });
  getHeaderCellsForColumns([pos.col]).forEach(th => th.classList.add('board-hover-head'));
  boardHoverRow = pos.row;
  clearHoverColumn();
  boardHoverCol = pos.col;
}

function applyHoverColumn(colIndex){
  const targetCol = Number(colIndex);
  if(!Number.isFinite(targetCol) || targetCol < 0){
    clearHoverState();
    return;
  }
  clearHoverState();
  getVisibleSkuRows().forEach(tr => {
    const td = tr.querySelector(`td[data-board-col-index="${targetCol}"]`);
    if(td) td.classList.add('board-hover-col');
  });
  getHeaderCellsForColumns([targetCol]).forEach(th => th.classList.add('board-hover-head'));
  boardHoverCol = targetCol;
}

function clearSelectionVisual(){
  document.querySelectorAll(
    '#boardBodyTable tr.board-fixed-row, #boardBodyTable td.board-fixed-col, #boardBodyTable td.board-fixed-anchor, #boardBodyTable td.board-cell-selected, #boardBodyTable td.board-cell-anchor, #boardHeadTable th.board-fixed-head'
  ).forEach(el => {
    el.classList.remove('board-fixed-row', 'board-fixed-col', 'board-fixed-anchor', 'board-cell-selected', 'board-cell-anchor', 'board-fixed-head');
  });
}

function clearBoardSelectionVisual(){
  clearSelectionVisual();
}

function clearBoardSelection(){
  clearBoardSelectionVisual();
  boardSelectionAnchor = null;
  boardSelectionFocus = null;
  boardSelectionBounds = null;
  boardSelectionMode = 'cell';
  boardSelectionLocked = false;
}

function getCellPos(td){
  if(!td) return null;
  const tr = td.closest('tr.sku-row');
  if(!tr) return null;
  const row = Number(tr.dataset.boardRowIndex);
  const col = Number(td.dataset.boardColIndex);
  if(!Number.isFinite(row) || !Number.isFinite(col)) return null;
  return { row, col };
}

function getCellByPos(row, col){
  const tr = document.querySelector(`#boardBodyTable tbody tr.sku-row[data-board-row-index="${row}"]`);
  if(!tr) return null;
  return tr.querySelector(`td[data-board-col-index="${col}"]`);
}

function applyBoardSelectionUi(){
  clearBoardSelectionVisual();
  clearHoverState();
  if(!boardSelectionBounds) return;
  const minRow = Number(boardSelectionBounds.minRow);
  const maxRow = Number(boardSelectionBounds.maxRow);
  const minCol = Number(boardSelectionBounds.minCol);
  const maxCol = Number(boardSelectionBounds.maxCol);
  if(boardSelectionMode === 'range'){
    for(let row = minRow; row <= maxRow; row += 1){
      const tr = document.querySelector(`#boardBodyTable tbody tr.sku-row[data-board-row-index="${row}"]`);
      if(tr) tr.classList.add('board-fixed-row');
      for(let col = minCol; col <= maxCol; col += 1){
        const td = getCellByPos(row, col);
        if(td) td.classList.add('board-cell-selected');
      }
    }
    getHeaderCellsForColumns(Array.from({ length: maxCol - minCol + 1 }, (_, idx) => minCol + idx)).forEach(th => th.classList.add('board-fixed-head'));
    const anchorCell = getCellByPos(minRow, minCol);
    if(anchorCell) anchorCell.classList.add('board-cell-anchor');
    return;
  }

  const row = document.querySelector(`#boardBodyTable tbody tr.sku-row[data-board-row-index="${minRow}"]`);
  if(row) row.classList.add('board-fixed-row');
  getVisibleSkuRows().forEach(tr => {
    const td = tr.querySelector(`td[data-board-col-index="${minCol}"]`);
    if(td) td.classList.add('board-fixed-col');
  });
  getHeaderCellsForColumns([minCol]).forEach(th => th.classList.add('board-fixed-head'));
  const anchorCell = getCellByPos(minRow, minCol);
  if(anchorCell) anchorCell.classList.add('board-fixed-anchor', 'board-cell-anchor');
}

function selectBoardCellRange(anchor, focus){
  if(!anchor || !focus) return;
  boardSelectionMode = 'range';
  boardSelectionLocked = true;
  const minRow = Math.min(anchor.row, focus.row);
  const maxRow = Math.max(anchor.row, focus.row);
  const minCol = Math.min(anchor.col, focus.col);
  const maxCol = Math.max(anchor.col, focus.col);
  boardSelectionBounds = { minRow, maxRow, minCol, maxCol };
  applyBoardSelectionUi();
}

function selectBoardSingleCell(pos){
  if(!pos) return;
  boardSelectionMode = 'cell';
  boardSelectionLocked = true;
  boardSelectionAnchor = pos;
  boardSelectionFocus = pos;
  boardSelectionBounds = { minRow: pos.row, maxRow: pos.row, minCol: pos.col, maxCol: pos.col };
  applyBoardSelectionUi();
}

function getBoardCellCopyText(td){
  if(!td) return '';
  const mainText = td.querySelector('.inv-main-text');
  if(mainText) return String(mainText.textContent || '').trim();
  const clone = td.cloneNode(true);
  clone.querySelectorAll('.badge-tip, .source-toggle, .group-toggle').forEach(el => el.remove());
  return String(clone.textContent || '').replace(/\s+/g, ' ').trim();
}

function copyTextToClipboard(text){
  if(!text) return Promise.resolve(false);
  if(navigator.clipboard && navigator.clipboard.writeText){
    return navigator.clipboard.writeText(text).then(() => true).catch(() => false);
  }
  return new Promise(resolve => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch(_) { ok = false; }
    document.body.removeChild(ta);
    resolve(ok);
  });
}

function copyBoardSelection(){
  if(!boardSelectionBounds) return;
  const lines = [];
  for(let row = boardSelectionBounds.minRow; row <= boardSelectionBounds.maxRow; row += 1){
    const cols = [];
    for(let col = boardSelectionBounds.minCol; col <= boardSelectionBounds.maxCol; col += 1){
      const td = getCellByPos(row, col);
      cols.push(getBoardCellCopyText(td));
    }
    lines.push(cols.join('\t'));
  }
  const payload = lines.join('\n');
  copyTextToClipboard(payload).then(ok => {
    if(window.showAppToast){
      window.showAppToast(ok ? '已复制选中单元格' : '复制失败，请重试', !ok);
    }
  });
}

function bindBoardCellUiEvents(){
  if(boardCellUiBound) return;
  boardCellUiBound = true;
  const tbody = document.querySelector('#boardBodyTable tbody');
  if(!tbody) return;

  tbody.addEventListener('mousedown', function(event){
    if(event.button !== 0) return;
    const td = event.target.closest('td.board-selectable-cell');
    if(!td || !tbody.contains(td)) return;
    if(event.target.closest('.source-toggle, .badge-tip')) return;
    const pos = getCellPos(td);
    if(!pos) return;
    event.preventDefault();
    boardCellMouseDown = true;
    if(boardSelectionLocked && boardSelectionMode === 'cell' && boardSelectionBounds && boardSelectionBounds.minRow === pos.row && boardSelectionBounds.minCol === pos.col && boardSelectionBounds.maxRow === pos.row && boardSelectionBounds.maxCol === pos.col){
      clearBoardSelection();
      setHoverForCell(pos);
      return;
    }
    if(event.shiftKey && boardSelectionAnchor){
      boardSelectionFocus = pos;
      selectBoardCellRange(boardSelectionAnchor, boardSelectionFocus);
      return;
    }
    selectBoardSingleCell(pos);
  });

  tbody.addEventListener('mouseover', function(event){
    const td = event.target.closest('td.board-selectable-cell');
    if(!td || !tbody.contains(td)) return;
    const col = Number(td.dataset.boardColIndex);
    const pos = getCellPos(td);
    if(boardSelectionLocked){
      if(boardCellMouseDown && boardSelectionMode === 'range' && boardSelectionAnchor && pos){
        boardSelectionFocus = pos;
        selectBoardCellRange(boardSelectionAnchor, boardSelectionFocus);
      }
      return;
    }
    if(pos){
      setHoverForCell(pos);
    } else if(Number.isFinite(col)) {
      applyHoverColumn(col);
    }
    if(boardCellMouseDown && boardSelectionAnchor){
      const pos = getCellPos(td);
      if(!pos) return;
      boardSelectionFocus = pos;
      selectBoardCellRange(boardSelectionAnchor, boardSelectionFocus);
    }
  });

  tbody.addEventListener('mouseleave', function(){
    if(!boardSelectionLocked) clearHoverState();
  });

  document.addEventListener('mouseup', function(){
    boardCellMouseDown = false;
  });

  document.addEventListener('keydown', function(event){
    const key = String(event.key || '').toLowerCase();
    if(!(event.ctrlKey || event.metaKey) || key !== 'c') return;
    const active = document.activeElement;
    if(active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) return;
    if(!boardSelectionBounds) return;
    event.preventDefault();
    copyBoardSelection();
  });
}

function setupBoardCellUi(){
  refreshSelectableCellMeta();
  if(boardSelectionLocked && boardSelectionBounds){
    applyBoardSelectionUi();
  } else {
    clearHoverState();
    clearSelectionVisual();

function initColumnWidths(totalCols){
  if(Array.isArray(boardColWidths) && boardColWidths.length === totalCols) return;
  boardColWidths = [];
  for(let idx = 0; idx < totalCols; idx += 1){
    if(idx === 0) boardColWidths.push(92);
    else if(idx === 1) boardColWidths.push(132);
    else if(idx === 2) boardColWidths.push(56);
    else boardColWidths.push(60);
  }
}

function ensureCollapsedSectionTitleWidth(fixedCols, overseasColspan, stockColspan, overseasExpanded, factoryStockExpanded, totalCols){
  const overseasIndex = fixedCols;
  const factoryIndex = fixedCols + overseasColspan;

  const applyRangeMinTotal = (startIdx, span, minTotal) => {
    if(span <= 0 || startIdx >= totalCols) return;
    const endIdx = Math.min(totalCols - 1, startIdx + span - 1);
    let currentTotal = 0;
    for(let idx = startIdx; idx <= endIdx; idx += 1){
      currentTotal += Math.max(46, Number(boardColWidths[idx] || 60));
    }
    if(currentTotal >= minTotal) return;
    const delta = minTotal - currentTotal;
    const count = (endIdx - startIdx + 1);
    const per = Math.floor(delta / count);
    const rem = delta % count;
    for(let idx = startIdx; idx <= endIdx; idx += 1){
      const add = per + ((idx - startIdx) < rem ? 1 : 0);
      boardColWidths[idx] = Math.max(46, Number(boardColWidths[idx] || 60) + add);
    }
  };

  applyRangeMinTotal(overseasIndex, overseasColspan, overseasExpanded ? 260 : 240);
  applyRangeMinTotal(factoryIndex, stockColspan, factoryStockExpanded ? 200 : 180);

  if(!overseasExpanded && overseasColspan === 1 && overseasIndex < totalCols){
    boardColWidths[overseasIndex] = Math.max(Number(boardColWidths[overseasIndex] || 0), 240);
  }
  if(!factoryStockExpanded && stockColspan === 1 && factoryIndex < totalCols){
    boardColWidths[factoryIndex] = Math.max(Number(boardColWidths[factoryIndex] || 0), 180);
  }
}

function applyColWidths(){
  const normalized = boardColWidths.map(w => Math.max(46, Number(w || 60)));
  const html = normalized.map(w => `<col style="width:${w}px;">`).join('');
  const totalWidth = normalized.reduce((sum, width) => sum + width, 0);
  const headColgroup = document.getElementById('boardHeadColgroup');
  const bodyColgroup = document.getElementById('boardBodyColgroup');
  const headTable = document.getElementById('boardHeadTable');
  const bodyTable = document.getElementById('boardBodyTable');
  if(headColgroup) headColgroup.innerHTML = html;
  if(bodyColgroup) bodyColgroup.innerHTML = html;
  if(headTable){
    headTable.style.width = `${totalWidth}px`;
    headTable.style.minWidth = `${totalWidth}px`;
  }
  if(bodyTable){
    bodyTable.style.width = `${totalWidth}px`;
    bodyTable.style.minWidth = `${totalWidth}px`;
  }
}

function annotateHeaderColumns(){
  const rows = Array.from(document.querySelectorAll('#boardHeadTable thead tr'));
  const occupied = [];
  rows.forEach((row, rowIndex) => {
    occupied[rowIndex] = occupied[rowIndex] || [];
    let colIndex = 0;
    Array.from(row.children).forEach(cell => {
      while(occupied[rowIndex][colIndex]) colIndex += 1;
      const colspan = Number(cell.getAttribute('colspan') || 1) || 1;
      const rowspan = Number(cell.getAttribute('rowspan') || 1) || 1;
      const start = colIndex;
      const end = colIndex + colspan - 1;
      cell.dataset.colStart = String(start);
      cell.dataset.colEnd = String(end);
      for(let r = rowIndex; r < rowIndex + rowspan; r += 1){
        occupied[r] = occupied[r] || [];
        for(let c = start; c <= end; c += 1){
          occupied[r][c] = true;
        }
      }
      colIndex = end + 1;
    });
  });
}

function attachColumnResizeHandles(totalCols){
  const thead = document.querySelector('#boardHeadTable thead');
  if(!thead) return;
  thead.querySelectorAll('.col-resize-handle').forEach(el => el.remove());
  thead.querySelectorAll('th').forEach((cell) => {
    const colStart = Number(cell.dataset.colStart);
    const colEnd = Number(cell.dataset.colEnd);
    if(!Number.isFinite(colStart) || !Number.isFinite(colEnd) || colStart < 0 || colEnd < colStart || colEnd >= totalCols) return;
    const spanCount = (colEnd - colStart + 1);
    cell.style.position = 'relative';
    const handle = document.createElement('span');
    handle.className = 'col-resize-handle';
    handle.addEventListener('click', (event) => {
      event.preventDefault();
      event.stopPropagation();
    });
    handle.addEventListener('mousedown', (event) => {
      event.preventDefault();
      event.stopPropagation();
      suppressHeaderToggleUntil = Date.now() + 1200;
      const startX = event.clientX;
      const startWidths = boardColWidths.slice();
      const minTotal = 46 * spanCount;
      const startTotal = startWidths.slice(colStart, colEnd + 1).reduce((sum, width) => sum + Math.max(46, Number(width || 60)), 0);
      let moved = false;
      const onMove = (moveEvent) => {
        const delta = moveEvent.clientX - startX;
        if(Math.abs(delta) > 2) moved = true;
        if(spanCount <= 1){
          boardColWidths[colEnd] = Math.max(46, Number(startWidths[colEnd] || 60) + delta);
        } else {
          const targetTotal = Math.max(minTotal, startTotal + delta);
          const factor = targetTotal / Math.max(1, startTotal);
          let allocated = 0;
          for(let idx = colStart; idx <= colEnd; idx += 1){
            const base = Math.max(46, Number(startWidths[idx] || 60));
            const scaled = Math.max(46, Math.round(base * factor));
            boardColWidths[idx] = scaled;
            allocated += scaled;
          }
          const remainder = Math.round(targetTotal - allocated);
          boardColWidths[colEnd] = Math.max(46, Number(boardColWidths[colEnd] || 60) + remainder);
        }
        applyColWidths();
        syncTopScrollbar();
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        suppressHeaderToggleUntil = Date.now() + (moved ? 320 : 160);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    cell.appendChild(handle);
  });
}

function regionRank(regionText){
  const text = String(regionText || '').trim();
  if(!text) return 99;
  const exactIdx = REGION_ORDER.findIndex(x => String(x || '').trim() === text);
  if(exactIdx >= 0) return exactIdx;
  for(let idx = 0; idx < REGION_ORDER.length; idx += 1){
    if(text.includes(REGION_ORDER[idx])) return idx;
  }
  return 99;
}

function supplierBandClass(index){
  return index % 2 === 0 ? 'wh-head-band-a' : 'wh-head-band-b';
}

function supplierGroupKey(regionName, supplierName){
  return `${regionName}__${supplierName}`;
}

function getOrderedVisibleWarehouses(){
  return boardWarehouses
    .filter(wh => visibleWarehouseIds.has(String(wh.id)))
    .slice()
    .sort((a, b) => {
      const rankDelta = regionRank(a.region) - regionRank(b.region);
      if(rankDelta !== 0) return rankDelta;
      const as = String(a.supplier_name || '');
      const bs = String(b.supplier_name || '');
      if(as !== bs) return as.localeCompare(bs, 'zh');
      const an = String(a.warehouse_short_name || a.warehouse_name || '');
      const bn = String(b.warehouse_short_name || b.warehouse_name || '');
      return an.localeCompare(bn, 'zh');
    });
}

function buildColumnGroups(visibleWh){
  const regions = [];
  visibleWh.forEach(wh => {
    const regionName = String(wh.region || '-');
    const supplierName = String(wh.supplier_name || '-');
    let region = regions[regions.length - 1];
    if(!region || region.name !== regionName){
      region = { name: regionName, suppliers: [], warehouses: [] };
      regions.push(region);
    }
    region.warehouses.push(wh);
    let supplier = region.suppliers[region.suppliers.length - 1];
    if(!supplier || supplier.name !== supplierName){
      supplier = {
        name: supplierName,
        key: supplierGroupKey(regionName, supplierName),
        warehouses: [],
        band: supplierBandClass(region.suppliers.length)
      };
      region.suppliers.push(supplier);
    }
    supplier.warehouses.push(wh);
  });
  return regions;
}

function buildLeafColumns(regionGroups){
  const leaves = [];
  regionGroups.forEach(region => {
    const regionCollapsed = region.warehouses.length > 1 && collapsedRegionKeys.has(region.name);
    if(regionCollapsed){
      leaves.push({ type: 'region', regionName: region.name, warehouses: region.warehouses.slice(), band: region.suppliers[0] ? region.suppliers[0].band : 'wh-head-band-a' });
      return;
    }
    region.suppliers.forEach(supplier => {
      supplier.warehouses.forEach(wh => {
        leaves.push({ type: 'warehouse', regionName: region.name, supplierKey: supplier.key, supplierName: supplier.name, warehouse: wh, warehouses: [wh], band: supplier.band });
      });
    });
  });
  leaves.forEach((leaf, idx) => {
    const next = leaves[idx + 1];
    leaf.regionBoundary = Boolean(next && next.regionName !== leaf.regionName);
  });
  return leaves;
}

function sumForWarehouses(row, warehouses, field){
  return warehouses.reduce((total, wh) => total + (Number((row[field] || {})[String(wh.id)] || 0) || 0), 0);
}

function toBadgeTitle(text, fallback){

function renderMainSlot(value, badgeNumber, badgeTitle){

}

function normalizeColorHex(value){

}

function buildTogglePanel(){
  const wrap = $('#warehouseTogglePanel');
  wrap.innerHTML = '';
  const regionGroups = {};
  boardWarehouses.forEach(wh => {
    const r = String(wh.region || '');
    let rKey = '-';
    for (const k of REGION_ORDER) { if (r.includes(k)) { rKey = k; break; } }
    (regionGroups[rKey] = regionGroups[rKey] || []).push(wh);
  });
  const regions = [...REGION_ORDER, '-'].filter(k => regionGroups[k]);
  regions.forEach((rKey, rIdx) => {
    if (rIdx > 0) {
      const div = document.createElement('span');
      div.className = 'col-toggle-divider';
      wrap.appendChild(div);
    }
    const group = document.createElement('div');
    group.className = 'col-toggle-region-group';
    const header = document.createElement('div');
    header.className = 'col-toggle-region-header';
    const nameEl = document.createElement('span');
    nameEl.className = 'col-toggle-region-name';
    nameEl.textContent = rKey;
    const allBtn = document.createElement('button');
    allBtn.type = 'button';
    allBtn.className = 'col-toggle-select-all';
    const whs = regionGroups[rKey];
    const allChecked = whs.every(wh => visibleWarehouseIds.has(String(wh.id)));
    allBtn.textContent = allChecked ? '全取消' : '全选';
    allBtn.addEventListener('click', () => {
      if (allChecked) whs.forEach(wh => visibleWarehouseIds.delete(String(wh.id)));
      else whs.forEach(wh => visibleWarehouseIds.add(String(wh.id)));
      buildTogglePanel();
      renderBoard();
    });

    header.appendChild(allBtn);
    group.appendChild(header);
    whs.forEach(wh => {
      const id = String(wh.id);
      const label = document.createElement('label');
      label.innerHTML = `<input type="checkbox" data-wh="${id}" ${visibleWarehouseIds.has(id) ? 'checked' : ''
        }>${wh.warehouse_short_name || wh.warehouse_name}`;
      label.querySelector('input').addEventListener('change', function(){
        if (this.checked) visibleWarehouseIds.add(id); else visibleWarehouseIds.delete(id);
        buildTogglePanel();
        renderBoard();
      });
      group.appendChild(label);
    });
    wrap.appendChild(group);
  });
}

function renderBoard(){
  const thead = $('#boardHeadTable thead');
  const tbody = $('#boardBodyTable tbody');
  const visibleWh = getOrderedVisibleWarehouses();
  const keyword = activeSearchText.trim().toLowerCase();
  const allVisible = visibleWh.length === boardWarehouses.length;
  const regionGroups = buildColumnGroups(visibleWh);
  const leafColumns = buildLeafColumns(regionGroups);

  const overseasColspan = overseasExpanded ? Math.max(1, leafColumns.length) : 1;
  const stockColspan = factoryStockExpanded ? Math.max(1, boardFactories.length) : 1;
  const fixedCols = 3;
  const totalCols = fixedCols + overseasColspan + stockColspan;
  initColumnWidths(totalCols);
  ensureCollapsedSectionTitleWidth(fixedCols, overseasColspan, stockColspan, overseasExpanded, factoryStockExpanded, totalCols);
  applyColWidths();

  const overseasSubRows = overseasExpanded ? 3 : 0;
  const factorySubRows = factoryStockExpanded ? 1 : 0;
  const headerSubRows = Math.max(overseasSubRows, factorySubRows, 0);
  const headerRowsCount = 1 + headerSubRows;

  let row1 = '';
  let row2 = '';
  let row3 = '';
  let row4 = '';

  row1 += `<th rowspan="${headerRowsCount}">货号</th>`;
  row1 += `<th rowspan="${headerRowsCount}">SKU</th>`;
  row1 += `<th rowspan="${headerRowsCount}" class="sortable-th" data-sort-key="fabric">面料${fabricSortOrder === 'asc' ? ' ↑' : (fabricSortOrder === 'desc' ? ' ↓' : '')}</th>`;
  row1 += `<th colspan="${overseasColspan}" class="section-th" data-toggle="overseas"><div class="wh-group-toggle"><span class="wh-group-label">海外仓在库在途</span><span class="wh-group-line"></span><span class="wh-group-circle">${overseasExpanded ? '\u2212' : '+'}</span></div></th>`;
  row1 += `<th colspan="${stockColspan}" class="section-th" data-toggle="factory-stock"><div class="wh-group-toggle"><span class="wh-group-label">工厂在库</span><span class="wh-group-line"></span><span class="wh-group-circle">${factoryStockExpanded ? '\u2212' : '+'}</span></div></th>`;

  if (overseasExpanded) {
    regionGroups.forEach((region, regionIndex) => {
      const leafCount = leafColumns.filter(col => col.regionName === region.name).length;
      const canFold = region.warehouses.length > 1;
      const folded = canFold && collapsedRegionKeys.has(region.name);
      const sepClass = regionIndex < regionGroups.length - 1 ? 'wh-region-sep' : '';
      row2 += `<th colspan="${leafCount}" class="wh-th-region ${region.suppliers[0] ? region.suppliers[0].band : 'wh-head-band-a'} ${sepClass}" ${canFold ? `data-toggle-kind="region" data-region-name="${String(region.name).replace(/"/g,'&quot;')}"` : ''}><div class="wh-group-toggle ${canFold ? '' : 'is-static'}"><span class="wh-group-label">${region.name}</span><span class="wh-group-line"></span><span class="wh-group-circle">${canFold ? (folded ? '+' : '-') : ''}</span></div></th>`;
    });
    regionGroups.forEach((region, regionIndex) => {
      const regionFolded = region.warehouses.length > 1 && collapsedRegionKeys.has(region.name);
      const sepClass = regionIndex < regionGroups.length - 1 ? 'wh-region-sep' : '';
      if(regionFolded){
        row3 += `<th colspan="1" class="wh-th-supplier ${region.suppliers[0] ? region.suppliers[0].band : 'wh-head-band-a'} ${sepClass}"><div class="wh-supplier-summary"></div></th>`;
      } else {
        row3 += region.suppliers.map((supplier, supplierIndex) => {
          const supplierSepClass = supplierIndex === region.suppliers.length - 1 ? sepClass : '';
          return `<th colspan="${supplier.warehouses.length}" class="wh-th-supplier ${supplier.band} ${supplierSepClass}"><div class="wh-group-toggle is-static"><span class="wh-group-label">${supplier.name}</span></div></th>`;
        }).join('');
      }
    });
    leafColumns.forEach(col => {
      const sepClass = col.regionBoundary ? 'wh-region-sep' : '';
      if(col.type === 'region'){
        row4 += `<th class="wh-th-short wh-col ${col.band} ${sepClass} ${wrapWarehouseShortName ? 'wrap-enabled' : ''}"></th>`;
      } else {
        const shortName = String(col.warehouse.warehouse_short_name || col.warehouse.warehouse_name || '');
        const fullName = String(col.warehouse.warehouse_name || shortName);
        row4 += `<th data-wh="${col.warehouse.id}" class="wh-th-short wh-col ${col.band} ${sepClass} ${wrapWarehouseShortName ? 'wrap-enabled' : ''}"><span class="wh-short-text" title="${fullName.replace(/"/g,'&quot;')}">${shortName}</span></th>`;
      }
    });
  } else {
    if(headerSubRows > 0) row2 += `<th rowspan="${headerSubRows}" class="inv-col"></th>`;
  }

  if (factoryStockExpanded && boardFactories.length > 0) {
    const factoryRowspan = Math.max(1, headerSubRows);
    boardFactories.forEach(f => {
      row2 += `<th class="inv-col factory-col factory-name-th" rowspan="${factoryRowspan}" title="${String(f.factory_name || '').replace(/"/g,'&quot;')}">${f.factory_name || ''}</th>`;
    });
  } else {
    if(headerSubRows > 0) row2 += `<th rowspan="${headerSubRows}" class="inv-col factory-col"></th>`;
  }

  row1 = row1.replace(
    '海外仓在库在途',
    '海外仓在库<span class="header-title-with-badge">&nbsp;<span class="badge-tip" title="在途批次（悬浮查看预计到货日期）">在途</span></span>'
  );
  row1 = row1.replace(
    '工厂在库',
    '工厂在库<span class="header-title-with-badge">&nbsp;<span class="badge-tip" title="在制批次（悬浮查看预计完工日期）">在制</span></span>'
  );

  const headRows = [`<tr>${row1}</tr>`];
  if(headerSubRows >= 1) headRows.push(`<tr>${row2}</tr>`);
  if(headerSubRows >= 2) headRows.push(`<tr>${row3}</tr>`);
  if(headerSubRows >= 3) headRows.push(`<tr>${row4}</tr>`);
  thead.innerHTML = headRows.join('');
  annotateHeaderColumns();

  thead.querySelectorAll('th[data-toggle]').forEach(cell => {
    cell.addEventListener('click', function(){
      if(Date.now() < suppressHeaderToggleUntil) return;
      const t = this.getAttribute('data-toggle');
      if(t === 'overseas') toggleOverseas();
      else if(t === 'factory-stock') toggleFactoryStock();
    });
  });
  thead.querySelectorAll('th[data-toggle-kind]').forEach(cell => {
    cell.addEventListener('click', function(){
      if(Date.now() < suppressHeaderToggleUntil) return;
      const kind = String(this.getAttribute('data-toggle-kind') || '');
      if(kind === 'region') toggleRegionColumnGroup(String(this.getAttribute('data-region-name') || ''));
    });
  });
  thead.querySelectorAll('th[data-sort-key="fabric"]').forEach(cell => {
    cell.addEventListener('click', function(){
      if(Date.now() < suppressHeaderToggleUntil) return;
      if(fabricSortOrder === '') fabricSortOrder = 'asc';
      else if(fabricSortOrder === 'asc') fabricSortOrder = 'desc';
      else fabricSortOrder = '';
      renderBoard();
    });
  });

  const shouldHideZeroOffMarket = (item) => {
    const offMarket = Number(item && item.is_on_market != null ? item.is_on_market : 1) === 0;
    if(!offMarket) return false;
    const total = Number(item.available_total || 0)
      + Number(item.in_transit_total || 0)
      + Number(item.factory_stock_total || 0)
      + Number(item.factory_wip_total || 0);
    return total <= 0;
  };

  let filteredRows = (boardRows || []).map(row => {
    const children = (row.iteration_children || []).filter(child => !shouldHideZeroOffMarket(child));
    return { ...row, iteration_children: children };
  }).filter(row => !shouldHideZeroOffMarket(row));

  if (keyword) {
    filteredRows = filteredRows.filter(row => {
      const skuText = String(row.sku || '').toLowerCase();
      const famText = String(row.sku_family || '').toLowerCase();
      const childSkuText = (row.iteration_children || []).map(item => String(item.sku || '')).join(' ').toLowerCase();
      return skuText.includes(keyword) || famText.includes(keyword) || childSkuText.includes(keyword);
    });
  }

  if (fabricSortOrder) {
    filteredRows.sort((a, b) => {
      const af = String(a.fabric_name_en || '').toLowerCase();
      const bf = String(b.fabric_name_en || '').toLowerCase();
      if (af === bf) return String(a.sku || '').localeCompare(String(b.sku || ''), 'zh');
      const base = af.localeCompare(bf, 'zh');
      return fabricSortOrder === 'asc' ? base : -base;
    });
  }

  if (!allVisible) {
    filteredRows = filteredRows.filter(row => {
      const hasParentVisibleQty = visibleWh.some(wh => ((row.warehouse_qty || {})[String(wh.id)] || 0) > 0);
      if (hasParentVisibleQty) return true;
      return (row.iteration_children || []).some(child => visibleWh.some(wh => ((child.warehouse_qty || {})[String(wh.id)] || 0) > 0));
    });
  }

  if (!filteredRows.length){
    tbody.innerHTML = `<tr><td colspan="${totalCols}" style="text-align:center;">暂无数据</td></tr>`;
    return;
  }

  const buildCellsForRow = (row, isChildRow) => {
    let overseasCell = '';
    if (overseasExpanded) {
      overseasCell = leafColumns.map(col => {
        const totalQty = col.type === 'warehouse'
          ? ((row.warehouse_qty || {})[String(col.warehouse.id)] || 0)
          : sumForWarehouses(row, col.warehouses, 'warehouse_qty');
        const totalTransit = col.type === 'warehouse'
          ? ((row.in_transit_by_warehouse || {})[String(col.warehouse.id)] || 0)
          : Number((row.in_transit_by_region || {})[String(col.regionName)] || 0);
        const whTransitTipMap = row.in_transit_tip_by_warehouse || {};
        const regionTransitTipMap = row.in_transit_tip_by_region || {};
        const whTransitTip = col.type === 'warehouse'
          ? (whTransitTipMap[String(col.warehouse.id)] || '')
          : (regionTransitTipMap[String(col.regionName)] || '');
        const transitTitle = whTransitTip || `在途中：${totalTransit}`;
        const sepClass = col.regionBoundary ? 'wh-region-sep' : '';
        const regionTotalClass = col.type === 'region' ? 'region-total-cell' : '';
        return `<td class="inv-col wh-cell wh-col ${col.band} ${sepClass} ${regionTotalClass}">${renderMainSlot(totalQty, totalTransit, transitTitle)}</td>`;
      }).join('');
    } else {
      overseasCell = `<td class="inv-col wh-cell wh-col wh-head-band-a wh-region-sep region-total-cell">${renderMainSlot(row.available_total || 0, row.in_transit_total || 0, row.in_transit_tip || '')}</td>`;
    }

    let stockCells = '';
    if (factoryStockExpanded && boardFactories.length > 0) {
      const fstockMap = row.factory_stock_by_factory || {};
      const fwipMap = row.factory_wip_by_factory || {};
      const fwipTipMap = row.factory_wip_tip_by_factory || {};
      boardFactories.forEach(f => {
        const stockQty = Number(fstockMap[String(f.id)] || 0);
        const wipQty = Number((fwipMap[String(f.id)] || {}).quantity || 0);
        const wipTip = String(fwipTipMap[String(f.id)] || '').trim();
        stockCells += `<td class="inv-col wh-cell wh-col wh-head-band-a region-total-cell factory-col section-td">${renderMainSlot(stockQty, wipQty, wipTip || `在制：${wipQty}`)}</td>`;
      });
    } else {
      const stockQty = Number(row.factory_stock_total || 0);
      const wipQty = Number(row.factory_wip_total || 0);
      const summaryWipTip = boardFactories.map(f => {
        const txt = String(((row.factory_wip_tip_by_factory || {})[String(f.id)] || '')).trim();
        return txt ? `${f.factory_name}：${txt}` : '';
      }).filter(Boolean).join('\n');
      stockCells = `<td class="inv-col wh-cell wh-col wh-head-band-a wh-region-sep region-total-cell factory-col section-td">${renderMainSlot(stockQty, wipQty, summaryWipTip || `在制：${wipQty}`)}</td>`;
    }
    return overseasCell + stockCells;
  };

  const familyMap = new Map();
  filteredRows.forEach(row => {
    const familyKey = String(row.sku_family || '-').trim() || '-';
    if(!familyMap.has(familyKey)) familyMap.set(familyKey, []);
    familyMap.get(familyKey).push(row);
  });

  let html = '';
  let groupIndex = 0;
  familyMap.forEach((rows, familyKey) => {
      const familyCollapsed = keyword ? false : collapsedFamilies.has(familyKey);
      html += `<tr class="group-row group-bg-${groupIndex % 2}" data-family="${familyKey.replace(/"/g,'&quot;')}">`;
      html += `<td colspan="${totalCols}"><span class="group-toggle">${familyCollapsed ? '▶' : '▼'}</span>${familyKey}</td>`;
      html += `</tr>`;
      rows.forEach((row) => {
      const esc = (v) => String(v == null ? '' : v).replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const childRows = row.iteration_children || [];
      const sourceKey = String(row.sku || '');
      const isCollapsed = keyword ? false : collapsedSourceSku.has(sourceKey);
      const groupClass = `group-bg-${groupIndex % 2}`;
      const toggleText = childRows.length ? `<span class="source-toggle" data-source="${sourceKey.replace(/"/g,'&quot;')}">(+迭代${childRows.length}款)</span>` : '';

      html += `<tr class="sku-row parent-row ${groupClass} ${familyCollapsed ? 'hidden-row' : ''}" data-family="${familyKey.replace(/"/g,'&quot;')}" data-source="${sourceKey.replace(/"/g,'&quot;')}">`;
      html += `<td>${familyKey}</td>`;
      html += `<td class="sku-cell">${row.sku || ''}${toggleText}</td>`;
      const mainColor = normalizeColorHex(row.representative_color);
      const mainDot = mainColor ? `<span class="fabric-dot" style="background:${mainColor};" title="${esc(row.fabric_name_en || '')}"></span>` : '';
      html += `<td class="fabric-dot-cell"><span class="fabric-dot-wrap">${mainDot}</span></td>`;
      html += buildCellsForRow(row, false);
      html += `</tr>`;

      childRows.forEach(child => {
        const childColor = normalizeColorHex(child.representative_color);
        const childDot = childColor ? `<span class="fabric-dot" style="background:${childColor};" title="${esc(child.fabric_name_en || '')}"></span>` : '';
        html += `<tr class="sku-row child-row ${groupClass} ${(isCollapsed || familyCollapsed) ? 'hidden-row' : ''}" data-family="${familyKey.replace(/"/g,'&quot;')}" data-parent-source="${sourceKey.replace(/"/g,'&quot;')}">`;
        html += `<td>${familyKey}</td>`;
        html += `<td class="sku-cell"><span class="derived-sku">${child.sku || ''}</span></td>`;
        html += `<td class="fabric-dot-cell"><span class="fabric-dot-wrap">${childDot}</span></td>`;
        html += buildCellsForRow(child, true);
        html += `</tr>`;
      });
      });
      groupIndex += 1;
  });

  tbody.innerHTML = html;
  document.querySelectorAll('.group-row').forEach(el => {
    el.addEventListener('click', function(){
      const family = String(this.getAttribute('data-family') || '');
      if(!family) return;
      if(collapsedFamilies.has(family)) collapsedFamilies.delete(family);
      else collapsedFamilies.add(family);
      renderBoard();
    });
  });
  document.querySelectorAll('.source-toggle').forEach(el => {
    el.addEventListener('click', function(e){
      e.stopPropagation();
      const source = String(this.getAttribute('data-source') || '');
      if(!source) return;
      if(collapsedSourceSku.has(source)) collapsedSourceSku.delete(source);
      else collapsedSourceSku.add(source);
      renderBoard();
    });
  });
  setupBoardCellUi();
  attachColumnResizeHandles(totalCols);
  syncTopScrollbar();
}

function syncTopScrollbar(){
  const wrap = document.getElementById('boardBodyWrap');
  const head = document.getElementById('boardHeaderWrap');
  const top = document.getElementById('boardTopScroll');
  const inner = document.getElementById('boardTopScrollInner');
  if(!wrap || !head || !top || !inner) return;
  const table = document.getElementById('boardBodyTable');
  const tableWidth = table ? Math.max(table.scrollWidth, wrap.scrollWidth) : wrap.scrollWidth;
  const needHorizontal = tableWidth > (wrap.clientWidth + 1);
  const scrollbarWidth = Math.max(0, wrap.offsetWidth - wrap.clientWidth);
  head.style.paddingRight = `${scrollbarWidth}px`;
  top.style.paddingRight = `${scrollbarWidth}px`;
  head.style.width = `${wrap.clientWidth + scrollbarWidth}px`;
  top.style.width = `${wrap.clientWidth + scrollbarWidth}px`;
  top.style.display = needHorizontal ? 'block' : 'none';
  inner.style.width = `${tableWidth}px`;
  if(Math.abs(head.scrollLeft - wrap.scrollLeft) > 1){
    head.scrollLeft = wrap.scrollLeft;
  }
  if(Math.abs(top.scrollLeft - wrap.scrollLeft) > 1){
    top.scrollLeft = wrap.scrollLeft;
  }
}

function loadBoard(){
  fetch('/api/logistics-warehouse-dashboard')
    .then(r => r.json())
    .then(d => {
      if (d.status !== 'success'){
        window.showAppToast && window.showAppToast(d.message || '加载失败', true);
        return;
      }
      boardWarehouses = d.warehouses || [];
      boardFactories = d.factories || [];
      boardRows = d.items || [];
      const dynamicRegionOrder = Array.isArray(d.region_order) ? d.region_order.map(x => String(x || '').trim()).filter(Boolean) : [];
      if(dynamicRegionOrder.length){
        REGION_ORDER = dynamicRegionOrder;
      }
      if (!visibleWarehouseIds.size){
        boardWarehouses.forEach(wh => visibleWarehouseIds.add(String(wh.id)));
      }
      collapsedFamilies = new Set((boardRows || []).map(row => String(row.sku_family || '-').trim() || '-'));
      collapsedRegionKeys.clear();
      collapsedSourceSku = new Set((boardRows || []).filter(row => (row.iteration_children || []).length > 0).map(row => String(row.sku || '')));
      buildTogglePanel();
      const panel = $('#warehouseTogglePanel');
      const btn = $('#toggleFilterBtn');
      if(panel) panel.classList.toggle('is-collapsed', filterPanelCollapsed);
      if(btn) btn.textContent = filterPanelCollapsed ? '展开筛选' : '收起筛选';
      renderBoard();
      window.showAppToast && window.showAppToast('看板已刷新', false);
    })
    .catch(err => { window.showAppToast && window.showAppToast('加载失败: ' + err, true); });
}

function downloadBoard(){
  window.location.href = '/api/logistics-warehouse-dashboard?action=export';
}

function expandAllGroups(){
  collapsedFamilies.clear();
  collapsedSourceSku.clear();
  renderBoard();
}

function collapseAllGroups(){
  collapsedFamilies = new Set((boardRows || []).map(row => String(row.sku_family || '-').trim() || '-'));
  const grouped = new Set();
  boardRows.forEach(row => {
    const children = row.iteration_children || [];
    if(children.length > 0) grouped.add(String(row.sku || ''));
  });
  collapsedSourceSku = grouped;
  renderBoard();
}

window.addEventListener('load', function(){
  const wrap = document.getElementById('boardBodyWrap');
  const head = document.getElementById('boardHeaderWrap');
  const top = document.getElementById('boardTopScroll');
  if(wrap && head && top){
    wrap.addEventListener('scroll', function(){
      if(syncingScroll) return;
      syncingScroll = true;
      head.scrollLeft = wrap.scrollLeft;
      top.scrollLeft = wrap.scrollLeft;
      syncingScroll = false;
    });
    head.addEventListener('scroll', function(){
      if(syncingScroll) return;
      syncingScroll = true;
      wrap.scrollLeft = head.scrollLeft;
      top.scrollLeft = head.scrollLeft;
      syncingScroll = false;
    });
    top.addEventListener('scroll', function(){
      if(syncingScroll) return;
      syncingScroll = true;
      wrap.scrollLeft = top.scrollLeft;
      head.scrollLeft = top.scrollLeft;
      syncingScroll = false;
    });
    window.addEventListener('resize', syncTopScrollbar);
  }
  try {
    const savedWrap = localStorage.getItem(WRAP_SHORT_NAME_KEY);
    wrapWarehouseShortName = savedWrap === '1';
  } catch(_) {}
  const wrapSeg = document.getElementById('whWrapSegment');
  setSegmentValue(wrapSeg, wrapWarehouseShortName ? '1' : '0');
  if(wrapSeg){
    wrapSeg.querySelectorAll('.status-pill').forEach(btn => {
      btn.addEventListener('click', function(){
        const val = String(this.dataset.value || '0');
        setSegmentValue(wrapSeg, val);
        wrapWarehouseShortName = val === '1';
        try { localStorage.setItem(WRAP_SHORT_NAME_KEY, wrapWarehouseShortName ? '1' : '0'); } catch(_) {}
        renderBoard();
      });
    });
  }
  const panel = $('#warehouseTogglePanel');
  const btn = $('#toggleFilterBtn');
  if(panel) panel.classList.toggle('is-collapsed', filterPanelCollapsed);
  if(btn) btn.textContent = filterPanelCollapsed ? '展开筛选' : '收起筛选';
  const searchInput = $('#boardSearchInput');
  searchInput.addEventListener('input', function(){
    activeSearchText = String(this.value || '');
    renderBoard();
  });
  searchInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter') {
      activeSearchText = String(this.value || '');
      renderBoard();
    }
  });
  loadBoard();
});
</script>
