<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在途资料文件管理</title>
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <meta http-equiv="refresh" content="0;url=/logistics-in-transit-management">
  <script>
    // -------------------------------------------------------------------------
    // 旧路由重定向
    // -------------------------------------------------------------------------
    (function () {
      const params = new URLSearchParams(window.location.search || '');
      const transitId = Number(params.get('transit_id') || 0);
      const docType = String(params.get('doc_type') || '').trim().toLowerCase();
      const target = new URL('/logistics-in-transit-management', window.location.origin);
      if (transitId) target.searchParams.set('transit_id', String(transitId));
      if (docType) target.searchParams.set('open_doc', docType);
      window.location.replace(target.pathname + target.search);
    })();
  </script>
</head>
<body>
  <p style="font-family:sans-serif;padding:1rem;">正在跳转到在途物流管理页… <a href="/logistics-in-transit-management">点此进入</a></p>
</body>
</html>
