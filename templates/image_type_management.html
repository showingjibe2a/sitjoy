<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片类型管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* -------------------------------------------------------------------------
         * 图片类型表：开关列（switch）
         * ------------------------------------------------------------------------- */
        .switch-wrap {
            position: relative;
            display: inline-flex;
            width: 44px;
            height: 24px;
            vertical-align: middle;
        }
        .switch-wrap input { opacity: 0; width: 0; height: 0; }
        .switch-slider {
            position: absolute;
            inset: 0;
            background: #d9d2c8;
            border-radius: 999px;
            cursor: pointer;
            transition: .2s;
        }
        .switch-slider:before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: #fff;
            border-radius: 50%;
            transition: .2s;
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }
        .switch-wrap input:checked + .switch-slider { background: #6ba86b; }
        .switch-wrap input:checked + .switch-slider:before { transform: translateX(20px); }
        .switch-cell {
            text-align: center;
        }
        .switch-cell .switch-wrap { margin: 0 auto; }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>图片类型管理</h2>
            <p>维护图片类型，并设置适用范围（面料/销售产品/A+）</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin: 0;">
                            <span class="pm-search-title">搜索</span>
                            <input type="text" id="searchInput" placeholder="搜索图片类型名称">
                            <button class="btn-primary" onclick="loadImageTypeList()">搜索</button>
                            <button class="btn-secondary" onclick="resetSearch()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-accent" onclick="openCreateModal()">新增</button>
                    </div>
                </div>
            </div>

            <div>
                <table class="pm-table" id="imageTypeTable">
                    <thead>
                        <tr>
                            <th>类型名称</th>
                            <th style="width:120px;">电脑端需求宽(px)</th>
                            <th style="width:120px;">电脑端需求高(px)</th>
                            <th style="width:120px;">手机端需求宽(px)</th>
                            <th style="width:120px;">手机端需求高(px)</th>
                            <th style="min-width:160px;">适用平台</th>
                            <th style="width:120px;" class="switch-cell">适用面料</th>
                            <th style="width:140px;" class="switch-cell">适用销售产品</th>
                            <th style="width:140px;" class="switch-cell">适用下单产品</th>
                            <th style="width:120px;" class="switch-cell">适用A+</th>
                            <th style="width:100px;" class="switch-cell">启用</th>
                            <th style="width:180px;">最后修改时间</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="13" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <div class="pm-modal" id="create-modal">
        <div class="pm-modal-content pm-modal-content--wide">
            <div class="pm-modal-scroll">
            <h3 style="margin-top:0;">新增图片类型</h3>
            <div class="pm-section">
                <h4 class="pm-section-title">基础信息</h4>
                <div class="pm-section-body pm-form">
                    <div class="form-group pm-form-full" style="margin:0;">
                        <label for="modalTypeName">类型名称<span class="required-asterisk">*</span></label>
                        <input type="text" id="modalTypeName" class="required-field" maxlength="64" placeholder="例如：白底图 / 场景图 / A+电脑端">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label for="modalRequiredWidth">电脑端需求宽(px)</label>
                        <input type="number" id="modalRequiredWidth" class="optional-field" min="0" step="1" placeholder="可为空">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label for="modalRequiredHeight">电脑端需求高(px)</label>
                        <input type="number" id="modalRequiredHeight" class="optional-field" min="0" step="1" placeholder="可为空">
                    </div>
                    <div class="form-group pm-form-full" style="margin:0;">
                        <label>关联平台（不选=通用）</label>
                        <div id="modalPlatformTypeWrap" class="pm-inline-panel" style="padding:0.55rem 0.65rem;">
                            <div id="modalPlatformTypeList" class="pm-select-empty">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="pm-section">
                <h4 class="pm-section-title">适用范围</h4>
                <div class="pm-section-body pm-form">
                    <div class="form-group" style="margin:0;">
                        <label>适用面料</label>
                        <label class="switch-wrap" aria-label="适用面料">
                            <input type="checkbox" id="modalApplyFabric" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label>适用销售产品</label>
                        <label class="switch-wrap" aria-label="适用销售产品">
                            <input type="checkbox" id="modalApplySales" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label>适用下单产品</label>
                        <label class="switch-wrap" aria-label="适用下单产品">
                            <input type="checkbox" id="modalApplyOrderProduct" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label>适用A+</label>
                        <label class="switch-wrap" aria-label="适用A+">
                            <input type="checkbox" id="modalApplyAplus" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </div>
            </div>
            <div id="modalStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeCreateModal()">取消</button>
                <button class="btn-primary" type="button" onclick="saveImageType()">保存</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="edit-modal">
        <div class="pm-modal-content pm-modal-content--wide">
            <div class="pm-modal-scroll">
            <h3 style="margin-top:0;">编辑图片类型</h3>
            <div class="pm-section">
                <h4 class="pm-section-title">基础信息</h4>
                <div class="pm-section-body pm-form">
                    <div class="form-group" style="margin:0;">
                        <label for="editEnabled">启用</label>
                        <label class="switch-wrap" aria-label="启用">
                            <input type="checkbox" id="editEnabled">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group pm-form-full" style="margin:0;">
                        <label for="editTypeName">类型名称<span class="required-asterisk">*</span></label>
                        <input type="text" id="editTypeName" class="required-field" maxlength="64">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label for="editRequiredWidth">电脑端需求宽(px)</label>
                        <input type="number" id="editRequiredWidth" class="optional-field" min="0" step="1" placeholder="可为空">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label for="editRequiredHeight">电脑端需求高(px)</label>
                        <input type="number" id="editRequiredHeight" class="optional-field" min="0" step="1" placeholder="可为空">
                    </div>
                    <div class="form-group pm-form-full" style="margin:0;">
                        <label>关联平台（不选=通用）</label>
                        <div class="pm-inline-panel" style="padding:0.55rem 0.65rem;">
                            <div id="editPlatformTypeList" class="pm-select-empty">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pm-section">
                <h4 class="pm-section-title">适用范围</h4>
                <div class="pm-section-body pm-form">
                    <div class="form-group" style="margin:0;">
                        <label>适用面料</label>
                        <label class="switch-wrap" aria-label="适用面料">
                            <input type="checkbox" id="editApplyFabric">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label>适用销售产品</label>
                        <label class="switch-wrap" aria-label="适用销售产品">
                            <input type="checkbox" id="editApplySales">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label>适用下单产品</label>
                        <label class="switch-wrap" aria-label="适用下单产品">
                            <input type="checkbox" id="editApplyOrderProduct">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label>适用A+</label>
                        <label class="switch-wrap" aria-label="适用A+">
                            <input type="checkbox" id="editApplyAplus" onchange="toggleEditAplusSections()">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div id="editAplusExtrasSection" class="pm-section pm-u-hidden">
                <h4 class="pm-section-title label-help">A+ 模块自定义<span class="help-dot" data-tip="布局 JSON 修改后约 0.4 秒自动刷新下方预览；虚线框为 A+ 管理中上传图片后将出现的区域。"></span></h4>
                <div class="pm-section-body pm-form" style="grid-template-columns: 1fr;">
                    <div class="form-group pm-form-full" style="margin:0;">
                        <label for="editAplusShareImages">手机/电脑端共用图片</label>
                        <label class="switch-wrap" aria-label="手机/电脑端共用图片">
                            <input type="checkbox" id="editAplusShareImages" checked onchange="onEditAplusShareImagesChange()">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div id="editAplusMobileSizeSection" class="pm-section-body pm-form pm-form-full pm-u-hidden" style="margin:0; padding:0;">
                        <div class="form-group" style="margin:0;">
                            <label for="editRequiredWidthMobile">手机端需求宽(px)</label>
                            <input type="number" id="editRequiredWidthMobile" class="optional-field" min="0" step="1" placeholder="可为空">
                        </div>
                        <div class="form-group" style="margin:0;">
                            <label for="editRequiredHeightMobile">手机端需求高(px)</label>
                            <input type="number" id="editRequiredHeightMobile" class="optional-field" min="0" step="1" placeholder="可为空">
                        </div>
                    </div>
                    <div class="pm-section-body pm-form pm-form-full" style="grid-template-columns: 1fr 1fr; align-items: start; margin:0; padding:0;">
                        <div class="form-group pm-form-full" style="margin:0; display:flex; flex-direction:column; gap:0.4rem;">
                            <label style="margin:0; font-weight:700;">手机端</label>
                            <label for="editAplusJsonMobile">布局 JSON</label>
                            <textarea id="editAplusJsonMobile" class="optional-field" spellcheck="false" placeholder='{"modules":[...]}' style="min-height:132px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.82rem; width:100%; box-sizing:border-box;"></textarea>
                            <label>布局预览</label>
                            <div id="editAplusPreviewMobile" class="pm-inline-panel pm-muted" style="min-height:88px; max-height:200px; overflow:auto; font-size:0.8rem;">暂无内容</div>
                            <div id="editAplusSlotsMobileWrap" class="pm-u-hidden">
                                <label>图片位示意</label>
                                <div id="editAplusSlotsMobile" class="pm-inline-panel" style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.35rem;"></div>
                            </div>
                        </div>
                        <div class="form-group pm-form-full" style="margin:0; display:flex; flex-direction:column; gap:0.4rem;">
                            <label style="margin:0; font-weight:700;">电脑端</label>
                            <label for="editAplusJsonDesktop">布局 JSON</label>
                            <textarea id="editAplusJsonDesktop" class="optional-field" spellcheck="false" placeholder='{"modules":[...]}' style="min-height:132px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.82rem; width:100%; box-sizing:border-box;"></textarea>
                            <label>布局预览</label>
                            <div id="editAplusPreviewDesktop" class="pm-inline-panel pm-muted" style="min-height:88px; max-height:200px; overflow:auto; font-size:0.8rem;">暂无内容</div>
                            <div id="editAplusSlotsDesktopWrap" class="pm-u-hidden">
                                <label>图片位示意</label>
                                <div id="editAplusSlotsDesktop" class="pm-inline-panel" style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.35rem;"></div>
                            </div>
                        </div>
                    </div>
                    <div id="editAplusSlotsSharedWrap" class="form-group pm-form-full pm-u-hidden" style="margin:0;">
                        <label>共用图片位示意（上传后手机/电脑端共用）</label>
                        <div id="editAplusSlotsShared" class="pm-inline-panel" style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.35rem;"></div>
                    </div>
                </div>
            </div>
            <div id="editStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeEditModal()">取消</button>
                <button class="btn-primary" type="button" onclick="saveEditImageType()">保存</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script src="/static/js/header.js"></script>
    <script>
        // -------------------------------------------------------------------------
        // 图片类型：平台适用范围、A+ 布局 JSON、列表开关与 CRUD
        // -------------------------------------------------------------------------

        // -------------------------------------------------------------------------
        // 模块级状态
        // -------------------------------------------------------------------------
        let platformTypeOptions = [];
        let currentEditItem = null;
        let aplusPreviewTimer = null;
        const APLUS_PREVIEW_DELAY_MS = 400;

        // -------------------------------------------------------------------------
        // 通用工具与状态提示
        // -------------------------------------------------------------------------
        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showStatus(message, isError) {
            const text = String(message || '').trim();
            if (!text) return;
            if (window.showPageStatus) window.showPageStatus(text, isError);
        }

        function resetStatus() {
            const el = document.getElementById('modalStatus');
            el.style.display = 'none';
            el.textContent = '';
        }

        function formatTime(value) {
            const text = String(value || '').trim();
            if (!text) return '-';
            return text.replace('T', ' ').slice(0, 19);
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            loadImageTypeList();
        }

        // -------------------------------------------------------------------------
        // 列表渲染与内联开关
        // -------------------------------------------------------------------------
        function buildSwitchCell(item, field, label) {
            const checked = Number(item[field] || 0) === 1 ? 'checked' : '';
            return `
                <label class="switch-wrap" aria-label="${escapeHtml(label)}">
                    <input type="checkbox" ${checked} onchange="updateFlag(${Number(item.id || 0)}, '${field}', this.checked)">
                    <span class="switch-slider"></span>
                </label>
            `;
        }

        function renderImageTypeList(items) {
            const tbody = document.querySelector('#imageTypeTable tbody');
            const list = Array.isArray(items) ? items : [];
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = list.map(item => `
                <tr>
                    <td>${escapeHtml(item.name || '')}</td>
                    <td>${item.required_width_px == null ? '-' : Number(item.required_width_px || 0)}</td>
                    <td>${item.required_height_px == null ? '-' : Number(item.required_height_px || 0)}</td>
                    <td>${formatMobileRequiredDimCell(item, 'required_width_px_mobile')}</td>
                    <td>${formatMobileRequiredDimCell(item, 'required_height_px_mobile')}</td>
                    <td>${escapeHtml(formatPlatformLabel(item.platform_type_ids || []))}</td>
                    <td class="switch-cell">${buildSwitchCell(item, 'applies_fabric', '适用面料')}</td>
                    <td class="switch-cell">${buildSwitchCell(item, 'applies_sales', '适用销售产品')}</td>
                    <td class="switch-cell">${buildSwitchCell(item, 'applies_order_product', '适用下单产品')}</td>
                    <td class="switch-cell">${buildSwitchCell(item, 'applies_aplus', '适用A+')}</td>
                    <td class="switch-cell">${buildSwitchCell(item, 'is_enabled', '启用')}</td>
                    <td>${escapeHtml(formatTime(item.updated_at || item.created_at))}</td>
                    <td><div class="pm-actions"><button class="btn-secondary" type="button" onclick='openEditModal(${JSON.stringify(item)})'>编辑</button><button class="btn-danger" type="button" onclick="deleteImageType(${Number(item.id || 0)})">删除</button></div></td>
                </tr>
            `).join('');
        }

        function formatMobileRequiredDimCell(item, field) {
            const shareImages = Number(item.aplus_share_images != null ? item.aplus_share_images : 1) === 1;
            const appliesAplus = Number(item.applies_aplus || 0) === 1;
            if (appliesAplus && shareImages) return '同电脑端';
            const val = item[field];
            return val == null ? '-' : Number(val || 0);
        }

        function formatPlatformLabel(platformTypeIds) {
            const ids = Array.isArray(platformTypeIds) ? platformTypeIds.map(x => Number(x)).filter(x => x) : [];
            if (!ids.length) return '通用';
            const names = ids.map(id => {
                const it = (platformTypeOptions || []).find(x => Number(x.id) === Number(id));
                return it ? (it.name || '') : String(id);
            }).filter(Boolean);
            return names.length ? names.join('、') : '通用';
        }

        function renderPlatformTypeCheckboxes(containerEl, selectedIds) {
            if (!containerEl) return;
            const ids = new Set((Array.isArray(selectedIds) ? selectedIds : []).map(x => Number(x)).filter(x => x));
            const list = Array.isArray(platformTypeOptions) ? platformTypeOptions : [];
            if (!list.length) {
                containerEl.innerHTML = '<div class="pm-select-empty">暂无平台类型</div>';
                return;
            }
            containerEl.innerHTML = list.map(p => {
                const checked = ids.has(Number(p.id)) ? 'checked' : '';
                return `<label style="display:inline-flex; align-items:center; gap:0.45rem; margin-right:0.85rem; margin-bottom:0.35rem; user-select:none;">
                    <input type="checkbox" data-platform-type-id="${Number(p.id)}" ${checked}>
                    <span>${escapeHtml(p.name || '')}</span>
                </label>`;
            }).join('');
        }

        function readPlatformTypeIds(containerEl) {
            if (!containerEl) return [];
            const boxes = Array.from(containerEl.querySelectorAll('input[type="checkbox"][data-platform-type-id]'));
            return boxes.filter(b => b.checked).map(b => Number(b.getAttribute('data-platform-type-id') || 0)).filter(x => x);
        }

        function loadPlatformTypes() {
            return fetch('/api/platform-type')
                .then(r => r.json())
                .then(data => {
                    platformTypeOptions = (data && data.status === 'success' && Array.isArray(data.items)) ? data.items : [];
                })
                .catch(() => { platformTypeOptions = []; });
        }

        function loadImageTypeList() {
            const q = encodeURIComponent(String(document.getElementById('searchInput').value || '').trim());
            const url = `/api/image-type?include_disabled=1&include_platforms=1&q=${q}`;
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        const tbody = document.querySelector('#imageTypeTable tbody');
                        tbody.innerHTML = `<tr><td colspan="13" style="text-align:center;color:#a33;">${escapeHtml(data.message || '加载失败')}</td></tr>`;
                        return;
                    }
                    renderImageTypeList(data.items || []);
                })
                .catch(err => {
                    const tbody = document.querySelector('#imageTypeTable tbody');
                    tbody.innerHTML = `<tr><td colspan="13" style="text-align:center;color:#a33;">加载失败: ${escapeHtml(String(err || ''))}</td></tr>`;
                });
        }

        function updateFlag(id, field, checked) {
            fetch('/api/image-type', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, [field]: !!checked })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    if (window.showAppToast) window.showAppToast(data.message || '保存失败', true);
                    loadImageTypeList();
                    return;
                }
                if (window.showAppToast) window.showAppToast('已保存', false, 1000);
            })
            .catch(err => {
                if (window.showAppToast) window.showAppToast('保存失败: ' + err, true);
                loadImageTypeList();
            });
        }

        // -------------------------------------------------------------------------
        // 新建/编辑模态 CRUD
        // -------------------------------------------------------------------------
        function openCreateModal() {
            document.getElementById('modalTypeName').value = '';
            document.getElementById('modalApplyFabric').checked = true;
            document.getElementById('modalApplySales').checked = true;
            document.getElementById('modalApplyOrderProduct').checked = true;
            document.getElementById('modalApplyAplus').checked = true;
            document.getElementById('modalRequiredWidth').value = '';
            document.getElementById('modalRequiredHeight').value = '';
            renderPlatformTypeCheckboxes(document.getElementById('modalPlatformTypeList'), []);
            resetStatus();
            document.getElementById('create-modal').classList.add('active');
            document.getElementById('modalTypeName').focus();
        }

        function closeCreateModal() {
            document.getElementById('create-modal').classList.remove('active');
        }

        function saveImageType() {
            const name = String(document.getElementById('modalTypeName').value || '').trim();
            if (!name) {
                showStatus('请输入类型名称', true);
                return;
            }
            const required_width_px = document.getElementById('modalRequiredWidth').value === '' ? null : Number(document.getElementById('modalRequiredWidth').value || 0);
            const required_height_px = document.getElementById('modalRequiredHeight').value === '' ? null : Number(document.getElementById('modalRequiredHeight').value || 0);
            const platform_type_ids = readPlatformTypeIds(document.getElementById('modalPlatformTypeList'));
            fetch('/api/image-type', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name,
                    required_width_px,
                    required_height_px,
                    platform_type_ids,
                    applies_fabric: document.getElementById('modalApplyFabric').checked,
                    applies_sales: document.getElementById('modalApplySales').checked,
                    applies_order_product: document.getElementById('modalApplyOrderProduct').checked,
                    applies_aplus: document.getElementById('modalApplyAplus').checked
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    showStatus(data.message || '保存失败', true);
                    return;
                }
                closeCreateModal();
                loadImageTypeList();
                if (window.showAppToast) window.showAppToast('图片类型已保存', false);
            })
            .catch(err => showStatus('保存失败: ' + err, true));
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadImageTypeList();
        });

        window.setTimeout(function() {
            var el = document.getElementById('create-modal');
            if (el && typeof window.bindPmModalBackdropClose === 'function') window.bindPmModalBackdropClose(el, closeCreateModal);
        }, 0);

        function toggleEditAplusSections() {
            const on = document.getElementById('editApplyAplus').checked;
            const sec = document.getElementById('editAplusExtrasSection');
            if (sec) sec.classList.toggle('pm-u-hidden', !on);
            onEditAplusShareImagesChange();
            if (on) scheduleEditAplusInlinePreview();
        }

        function onEditAplusShareImagesChange() {
            toggleEditAplusMobileSizeFields();
            refreshEditAplusSlotVisibility();
            scheduleEditAplusInlinePreview();
        }

        function toggleEditAplusMobileSizeFields() {
            const sec = document.getElementById('editAplusMobileSizeSection');
            if (!sec) return;
            const appliesAplus = document.getElementById('editApplyAplus').checked;
            const shareImages = document.getElementById('editAplusShareImages').checked;
            sec.classList.toggle('pm-u-hidden', !appliesAplus || shareImages);
        }

        function readEditAplusJsonText(device) {
            const id = device === 'mobile' ? 'editAplusJsonMobile' : 'editAplusJsonDesktop';
            const el = document.getElementById(id);
            return el ? String(el.value || '') : '';
        }

        function parseAplusLayoutModules(raw) {
            const text = String(raw || '').trim();
            if (!text) return [];
            try {
                const data = JSON.parse(text);
                if (Array.isArray(data)) return data;
                if (data && Array.isArray(data.modules)) return data.modules;
                if (data && typeof data === 'object') return [data];
            } catch (_e) {}
            return null;
        }

        function countAplusImageSlots(raw) {
            const text = String(raw || '').trim();
            if (!text) return 0;
            try {
                const data = JSON.parse(text);
                if (Number(data.image_slots) > 0) return Number(data.image_slots);
            } catch (_e) {}
            const modules = parseAplusLayoutModules(raw);
            if (!modules) return 0;
            let n = 0;
            modules.forEach((m) => {
                const type = String((m || {}).type || '');
                const props = (m && m.props) || {};
                if (type === 'Carousel') {
                    if (Array.isArray(props.image_urls) && props.image_urls.length) n += props.image_urls.length;
                    else if (Number(props.image_slot_count) > 0) n += Number(props.image_slot_count);
                    else n += 1;
                } else if (type === 'Image' || type === 'Hero' || type === 'TwoColumnImageText') {
                    n += 1;
                } else if (Number(props.image_slot_count) > 0) {
                    n += Number(props.image_slot_count);
                } else if (props.image_url !== undefined || props.left_image_url !== undefined) {
                    n += 1;
                }
            });
            return n;
        }

        function renderAplusSlotPlaceholders(hostEl, slotCount) {
            if (!hostEl) return;
            const n = Math.max(0, Number(slotCount) || 0);
            if (!n) {
                hostEl.innerHTML = '<span class="pm-muted" style="font-size:0.78rem;">布局 JSON 未定义图片位</span>';
                return;
            }
            hostEl.innerHTML = '';
            for (let slot = 1; slot <= n; slot += 1) {
                const ph = document.createElement('div');
                ph.className = 'sj-file-drop';
                ph.title = '图片位 ' + slot;
                ph.style.pointerEvents = 'none';
                ph.style.cursor = 'default';
                ph.style.minHeight = '68px';
                ph.style.minWidth = '68px';
                ph.innerHTML = '<span class="sj-file-drop__icon">+</span><span class="sj-file-drop__text">位 ' + slot + '</span>';
                hostEl.appendChild(ph);
            }
        }

        function renderAplusLayoutPreviewBox(hostEl, raw) {
            if (!hostEl) return;
            const text = String(raw || '').trim();
            if (!text) {
                hostEl.innerHTML = '暂无内容';
                hostEl.classList.add('pm-muted');
                return;
            }
            const modules = parseAplusLayoutModules(raw);
            if (modules === null) {
                hostEl.innerHTML = '<span class="pm-table-cell-error">JSON 格式无效</span>';
                hostEl.classList.remove('pm-muted');
                return;
            }
            if (!modules.length) {
                hostEl.innerHTML = '<span class="pm-muted">未检测到 modules[]</span>';
                hostEl.classList.add('pm-muted');
                return;
            }
            hostEl.classList.remove('pm-muted');
            hostEl.innerHTML = modules.map((m, idx) => {
                const type = escapeHtml((m && m.type) ? String(m.type) : '');
                const props = m && typeof m.props === 'object' ? m.props : {};
                const propsText = escapeHtml(JSON.stringify(props, null, 2));
                return `<div class="pm-inline-panel" style="margin-bottom:0.45rem;"><div style="font-weight:700;margin-bottom:0.2rem;">模块 ${idx + 1}: ${type || '-'}</div><pre style="margin:0;white-space:pre-wrap;font-size:0.76rem;font-family:ui-monospace,Menlo,Consolas,monospace;color:rgba(42,36,32,0.75);">${propsText}</pre></div>`;
            }).join('');
        }

        function refreshEditAplusSlotVisibility() {
            const appliesAplus = document.getElementById('editApplyAplus').checked;
            const shareImages = document.getElementById('editAplusShareImages').checked;
            const mobWrap = document.getElementById('editAplusSlotsMobileWrap');
            const deskWrap = document.getElementById('editAplusSlotsDesktopWrap');
            const sharedWrap = document.getElementById('editAplusSlotsSharedWrap');
            if (!appliesAplus) {
                if (mobWrap) mobWrap.classList.add('pm-u-hidden');
                if (deskWrap) deskWrap.classList.add('pm-u-hidden');
                if (sharedWrap) sharedWrap.classList.add('pm-u-hidden');
                return;
            }
            if (shareImages) {
                if (mobWrap) mobWrap.classList.add('pm-u-hidden');
                if (deskWrap) deskWrap.classList.add('pm-u-hidden');
                if (sharedWrap) sharedWrap.classList.remove('pm-u-hidden');
            } else {
                if (mobWrap) mobWrap.classList.remove('pm-u-hidden');
                if (deskWrap) deskWrap.classList.remove('pm-u-hidden');
                if (sharedWrap) sharedWrap.classList.add('pm-u-hidden');
            }
        }

        function refreshEditAplusInlinePreview() {
            if (!document.getElementById('editApplyAplus').checked) return;
            const mobileText = readEditAplusJsonText('mobile');
            const desktopText = readEditAplusJsonText('desktop');
            const shareImages = document.getElementById('editAplusShareImages').checked;
            renderAplusLayoutPreviewBox(document.getElementById('editAplusPreviewMobile'), mobileText);
            renderAplusLayoutPreviewBox(document.getElementById('editAplusPreviewDesktop'), desktopText);
            refreshEditAplusSlotVisibility();
            if (shareImages) {
                const slotCount = Math.max(countAplusImageSlots(mobileText), countAplusImageSlots(desktopText));
                renderAplusSlotPlaceholders(document.getElementById('editAplusSlotsShared'), slotCount);
            } else {
                renderAplusSlotPlaceholders(document.getElementById('editAplusSlotsMobile'), countAplusImageSlots(mobileText));
                renderAplusSlotPlaceholders(document.getElementById('editAplusSlotsDesktop'), countAplusImageSlots(desktopText));
            }
        }

        function scheduleEditAplusInlinePreview() {
            if (aplusPreviewTimer) window.clearTimeout(aplusPreviewTimer);
            aplusPreviewTimer = window.setTimeout(refreshEditAplusInlinePreview, APLUS_PREVIEW_DELAY_MS);
        }

        function bindEditAplusJsonInputs() {
            ['editAplusJsonMobile', 'editAplusJsonDesktop'].forEach((id) => {
                const el = document.getElementById(id);
                if (!el || el.dataset.aplusBound === '1') return;
                el.dataset.aplusBound = '1';
                el.addEventListener('input', scheduleEditAplusInlinePreview);
            });
        }

        function openEditModal(item) {
            currentEditItem = item || null;
            document.getElementById('editTypeName').value = String(item.name || '');
            document.getElementById('editRequiredWidth').value = item.required_width_px == null ? '' : String(item.required_width_px);
            document.getElementById('editRequiredHeight').value = item.required_height_px == null ? '' : String(item.required_height_px);
            document.getElementById('editRequiredWidthMobile').value = item.required_width_px_mobile == null ? '' : String(item.required_width_px_mobile);
            document.getElementById('editRequiredHeightMobile').value = item.required_height_px_mobile == null ? '' : String(item.required_height_px_mobile);
            document.getElementById('editApplyFabric').checked = Number(item.applies_fabric || 0) === 1;
            document.getElementById('editApplySales').checked = Number(item.applies_sales || 0) === 1;
            document.getElementById('editApplyOrderProduct').checked = Number(item.applies_order_product || 0) === 1;
            document.getElementById('editApplyAplus').checked = Number(item.applies_aplus || 0) === 1;
            document.getElementById('editAplusShareImages').checked = Number(item.aplus_share_images != null ? item.aplus_share_images : 1) === 1;
            document.getElementById('editEnabled').checked = Number(item.is_enabled || 0) === 1;
            document.getElementById('editAplusJsonMobile').value = String(item.aplus_layout_json_mobile || '');
            document.getElementById('editAplusJsonDesktop').value = String(item.aplus_layout_json_desktop || '');
            renderPlatformTypeCheckboxes(document.getElementById('editPlatformTypeList'), item.platform_type_ids || []);
            bindEditAplusJsonInputs();
            toggleEditAplusSections();
            refreshEditAplusInlinePreview();
            document.getElementById('editStatus').style.display = 'none';
            document.getElementById('editStatus').textContent = '';
            document.getElementById('edit-modal').classList.add('active');
            if (window.bindFloatingHelpDots) {
                const sec = document.getElementById('editAplusExtrasSection');
                if (sec) window.bindFloatingHelpDots(sec);
            }
        }

        function closeEditModal() {
            if (aplusPreviewTimer) {
                window.clearTimeout(aplusPreviewTimer);
                aplusPreviewTimer = null;
            }
            document.getElementById('edit-modal').classList.remove('active');
            currentEditItem = null;
        }

        function saveEditImageType() {
            if (!currentEditItem || !currentEditItem.id) return;
            const id = Number(currentEditItem.id || 0);
            const name = String(document.getElementById('editTypeName').value || '').trim();
            if (!name) {
                showStatus('请输入类型名称', true);
                return;
            }
            const required_width_px = document.getElementById('editRequiredWidth').value === '' ? null : Number(document.getElementById('editRequiredWidth').value || 0);
            const required_height_px = document.getElementById('editRequiredHeight').value === '' ? null : Number(document.getElementById('editRequiredHeight').value || 0);
            const platform_type_ids = readPlatformTypeIds(document.getElementById('editPlatformTypeList'));
            const applies_aplus = document.getElementById('editApplyAplus').checked;
            const aplus_share_images = document.getElementById('editAplusShareImages').checked;
            const payload = {
                    id,
                    name,
                    required_width_px,
                    required_height_px,
                    platform_type_ids,
                    applies_fabric: document.getElementById('editApplyFabric').checked,
                    applies_sales: document.getElementById('editApplySales').checked,
                    applies_order_product: document.getElementById('editApplyOrderProduct').checked,
                    applies_aplus,
                    is_enabled: document.getElementById('editEnabled').checked
                };
            if (applies_aplus) {
                payload.aplus_share_images = aplus_share_images;
                payload.aplus_layout_json_mobile = readEditAplusJsonText('mobile');
                payload.aplus_layout_json_desktop = readEditAplusJsonText('desktop');
                if (aplus_share_images) {
                    payload.required_width_px_mobile = required_width_px;
                    payload.required_height_px_mobile = required_height_px;
                } else {
                    payload.required_width_px_mobile = document.getElementById('editRequiredWidthMobile').value === '' ? null : Number(document.getElementById('editRequiredWidthMobile').value || 0);
                    payload.required_height_px_mobile = document.getElementById('editRequiredHeightMobile').value === '' ? null : Number(document.getElementById('editRequiredHeightMobile').value || 0);
                }
            }
            fetch('/api/image-type', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    showStatus(data.message || '保存失败', true);
                    return;
                }
                closeEditModal();
                loadImageTypeList();
                if (window.showAppToast) window.showAppToast('已保存', false);
            })
            .catch(err => {
                showStatus('保存失败: ' + err, true);
            });
        }

        async function deleteImageType(id) {
            const itemId = Number(id || 0);
            if (!itemId) return;
            const ok = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync({ title: '删除确认', message: '确认删除该图片类型？若仍被图片或 A+ 引用将无法删除。', confirmText: '确认删除' })
                : confirm('确认删除该图片类型？');
            if (!ok) return;
            fetch('/api/image-type', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: itemId })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    if (window.showAppToast) window.showAppToast(data.message || '删除失败', true);
                    else showStatus(data.message || '删除失败', true);
                    return;
                }
                if (currentEditItem && Number(currentEditItem.id) === itemId) {
                    closeEditModal();
                }
                loadImageTypeList();
                if (window.showAppSaveResult) {
                    window.showAppSaveResult({ action: 'delete' });
                } else if (window.showAppToast) {
                    window.showAppToast('已删除', false);
                }
            })
            .catch(err => {
                if (window.showAppToast) window.showAppToast('删除失败: ' + err, true);
                else showStatus('删除失败: ' + err, true);
            });
        }

        window.setTimeout(function() {
            var b = window.bindPmModalBackdropClose;
            if (typeof b !== 'function') return;
            var em = document.getElementById('edit-modal');
            if (em) b(em, closeEditModal);
            var cm = document.getElementById('create-modal');
            if (cm) b(cm, closeCreateModal);
        }, 0);

        window.addEventListener('load', function() {
            bindEditAplusJsonInputs();
            loadPlatformTypes().finally(() => loadImageTypeList());
        });
    </script>
</body>
</html>
