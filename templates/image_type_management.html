<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片类型管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .switch-wrap {
            position: relative;
            display: inline-flex;
            width: 44px;
            height: 24px;
            vertical-align: middle;
        }
        .switch-wrap input { opacity: 0; width: 0; height: 0; }
        .switch-slider {
            position: absolute;
            inset: 0;
            background: #d9d2c8;
            border-radius: 999px;
            cursor: pointer;
            transition: .2s;
        }
        .switch-slider:before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: #fff;
            border-radius: 50%;
            transition: .2s;
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }
        .switch-wrap input:checked + .switch-slider { background: #6ba86b; }
        .switch-wrap input:checked + .switch-slider:before { transform: translateX(20px); }
        .switch-cell {
            text-align: center;
        }
        .switch-cell .switch-wrap { margin: 0 auto; }
        .required-field, .optional-field {
            padding: 0.65rem 0.8rem !important;
            border-radius: 6px !important;
            border: 2px solid var(--morandi-sand) !important;
            font-size: 0.95rem !important;
            width: 100%;
            box-sizing: border-box;
        }
        .required-field { background: #fff !important; }
        .optional-field { background: transparent !important; }
        .required-field:focus, .optional-field:focus {
            outline: none !important;
            border-color: var(--morandi-ink) !important;
            box-shadow: 0 0 0 3px rgba(42, 36, 32, 0.1) !important;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>图片类型管理</h2>
            <p>维护图片类型，并设置适用范围（面料/销售产品/A+）</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin: 0;">
                            <span class="pm-search-title">搜索</span>
                            <input type="text" id="searchInput" placeholder="搜索图片类型名称">
                            <button class="btn-primary" onclick="loadImageTypeList()">搜索</button>
                            <button class="btn-secondary" onclick="resetSearch()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-accent" onclick="openCreateModal()">新增</button>
                    </div>
                </div>
            </div>

            <div>
                <table class="pm-table" id="imageTypeTable">
                    <thead>
                        <tr>
                            <th>类型名称</th>
                            <th style="width:120px;">需求宽(px)</th>
                            <th style="width:120px;">需求高(px)</th>
                            <th style="min-width:160px;">适用平台</th>
                            <th style="width:120px;" class="switch-cell">适用面料</th>
                            <th style="width:140px;" class="switch-cell">适用销售产品</th>
                            <th style="width:120px;" class="switch-cell">适用A+</th>
                            <th style="width:100px;" class="switch-cell">启用</th>
                            <th style="width:180px;">最后修改时间</th>
                            <th style="width:120px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="10" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <div class="pm-modal" id="create-modal">
        <div class="pm-modal-content" style="max-width: 620px;">
            <h3 style="margin-top:0;">新增图片类型</h3>
            <div class="pm-section-body pm-form">
                <div class="form-group pm-form-full" style="margin:0;">
                    <label for="modalTypeName">类型名称<span class="required-asterisk">*</span></label>
                    <input type="text" id="modalTypeName" class="required-field" maxlength="64" placeholder="例如：白底图 / 场景图 / A+电脑端">
                </div>
                <div class="form-group" style="margin:0;">
                    <label for="modalRequiredWidth">需求宽(px)</label>
                    <input type="number" id="modalRequiredWidth" class="optional-field" min="0" step="1" placeholder="可为空">
                </div>
                <div class="form-group" style="margin:0;">
                    <label for="modalRequiredHeight">需求高(px)</label>
                    <input type="number" id="modalRequiredHeight" class="optional-field" min="0" step="1" placeholder="可为空">
                </div>
                <div class="form-group pm-form-full" style="margin:0;">
                    <label>关联平台（不选=通用）</label>
                    <div id="modalPlatformTypeWrap" class="pm-inline-panel" style="padding:0.55rem 0.65rem;">
                        <div id="modalPlatformTypeList" class="pm-select-empty">加载中...</div>
                    </div>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>适用面料</label>
                    <label class="switch-wrap" aria-label="适用面料">
                        <input type="checkbox" id="modalApplyFabric" checked>
                        <span class="switch-slider"></span>
                    </label>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>适用销售产品</label>
                    <label class="switch-wrap" aria-label="适用销售产品">
                        <input type="checkbox" id="modalApplySales" checked>
                        <span class="switch-slider"></span>
                    </label>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>适用A+</label>
                    <label class="switch-wrap" aria-label="适用A+">
                        <input type="checkbox" id="modalApplyAplus" checked>
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>
            <div id="modalStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeCreateModal()">取消</button>
                <button class="btn-primary" type="button" onclick="saveImageType()">保存</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="edit-modal">
        <div class="pm-modal-content" style="max-width: 720px;">
            <h3 style="margin-top:0;">编辑图片类型</h3>
            <div class="pm-section-body pm-form">
                <div class="form-group pm-form-full" style="margin:0;">
                    <label for="editTypeName">类型名称<span class="required-asterisk">*</span></label>
                    <input type="text" id="editTypeName" class="required-field" maxlength="64">
                </div>
                <div class="form-group" style="margin:0;">
                    <label for="editRequiredWidth">需求宽(px)</label>
                    <input type="number" id="editRequiredWidth" class="optional-field" min="0" step="1" placeholder="可为空">
                </div>
                <div class="form-group" style="margin:0;">
                    <label for="editRequiredHeight">需求高(px)</label>
                    <input type="number" id="editRequiredHeight" class="optional-field" min="0" step="1" placeholder="可为空">
                </div>
                <div class="form-group pm-form-full" style="margin:0;">
                    <label>关联平台（不选=通用）</label>
                    <div class="pm-inline-panel" style="padding:0.55rem 0.65rem;">
                        <div id="editPlatformTypeList" class="pm-select-empty">加载中...</div>
                    </div>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>适用面料</label>
                    <label class="switch-wrap" aria-label="适用面料">
                        <input type="checkbox" id="editApplyFabric">
                        <span class="switch-slider"></span>
                    </label>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>适用销售产品</label>
                    <label class="switch-wrap" aria-label="适用销售产品">
                        <input type="checkbox" id="editApplySales">
                        <span class="switch-slider"></span>
                    </label>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>适用A+</label>
                    <label class="switch-wrap" aria-label="适用A+">
                        <input type="checkbox" id="editApplyAplus">
                        <span class="switch-slider"></span>
                    </label>
                </div>
                <div class="form-group" style="margin:0;">
                    <label>启用</label>
                    <label class="switch-wrap" aria-label="启用">
                        <input type="checkbox" id="editEnabled">
                        <span class="switch-slider"></span>
                    </label>
                </div>

                <div class="form-group pm-form-full" style="margin:0;">
                    <label>A+布局JSON（手机端）</label>
                    <textarea id="editAplusLayoutMobile" class="optional-field" style="min-height:140px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size:0.88rem; padding:0.65rem 0.8rem;"></textarea>
                    <div style="display:flex; gap:0.5rem; margin-top:0.5rem; flex-wrap:wrap;">
                        <button class="btn-secondary" type="button" onclick="formatAplusJson('mobile')">格式化</button>
                        <button class="btn-secondary" type="button" onclick="previewAplusJson('mobile')">预览</button>
                    </div>
                </div>
                <div class="form-group pm-form-full" style="margin:0;">
                    <label>A+布局JSON（电脑端）</label>
                    <textarea id="editAplusLayoutDesktop" class="optional-field" style="min-height:140px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size:0.88rem; padding:0.65rem 0.8rem;"></textarea>
                    <div style="display:flex; gap:0.5rem; margin-top:0.5rem; flex-wrap:wrap;">
                        <button class="btn-secondary" type="button" onclick="formatAplusJson('desktop')">格式化</button>
                        <button class="btn-secondary" type="button" onclick="previewAplusJson('desktop')">预览</button>
                    </div>
                </div>
            </div>
            <div id="editStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeEditModal()">取消</button>
                <button class="btn-primary" type="button" onclick="saveEditImageType()">保存</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="aplus-json-preview-modal">
        <div class="pm-modal-content" style="max-width: 760px;">
            <h3 style="margin-top:0;">A+布局预览（结构）</h3>
            <div class="pm-section-body">
                <div id="aplusJsonPreviewMeta" style="color:rgba(42,36,32,0.72); font-size:0.9rem; margin-bottom:0.55rem;"></div>
                <div id="aplusJsonPreviewBox" style="border:1px solid var(--morandi-sand); border-radius:12px; background:#fff; padding:0.75rem; max-height:520px; overflow:auto;"></div>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeAplusJsonPreview()">关闭</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script src="/static/js/header.js"></script>
    <script>
        let platformTypeOptions = [];
        let currentEditItem = null;

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showStatus(message, isError) {
            const el = document.getElementById('modalStatus');
            el.style.display = 'block';
            el.style.background = isError ? '#ffecec' : '#f0fff0';
            el.style.color = isError ? '#a33' : '#2f6f2f';
            el.textContent = String(message || '');
        }

        function resetStatus() {
            const el = document.getElementById('modalStatus');
            el.style.display = 'none';
            el.textContent = '';
        }

        function formatTime(value) {
            const text = String(value || '').trim();
            if (!text) return '-';
            return text.replace('T', ' ').slice(0, 19);
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            loadImageTypeList();
        }

        function buildSwitchCell(item, field, label) {
            const checked = Number(item[field] || 0) === 1 ? 'checked' : '';
            return `
                <label class="switch-wrap" aria-label="${escapeHtml(label)}">
                    <input type="checkbox" ${checked} onchange="updateFlag(${Number(item.id || 0)}, '${field}', this.checked)">
                    <span class="switch-slider"></span>
                </label>
            `;
        }

        function renderImageTypeList(items) {
            const tbody = document.querySelector('#imageTypeTable tbody');
            const list = Array.isArray(items) ? items : [];
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = list.map(item => `
                <tr>
                    <td>${escapeHtml(item.name || '')}</td>
                    <td>${item.required_width_px == null ? '-' : Number(item.required_width_px || 0)}</td>
                    <td>${item.required_height_px == null ? '-' : Number(item.required_height_px || 0)}</td>
                    <td>${escapeHtml(formatPlatformLabel(item.platform_type_ids || []))}</td>
                    <td class="switch-cell">${buildSwitchCell(item, 'applies_fabric', '适用面料')}</td>
                    <td class="switch-cell">${buildSwitchCell(item, 'applies_sales', '适用销售产品')}</td>
                    <td class="switch-cell">${buildSwitchCell(item, 'applies_aplus', '适用A+')}</td>
                    <td class="switch-cell">${buildSwitchCell(item, 'is_enabled', '启用')}</td>
                    <td>${escapeHtml(formatTime(item.updated_at || item.created_at))}</td>
                    <td><button class="btn-secondary" type="button" onclick='openEditModal(${JSON.stringify(item)})'>编辑</button></td>
                </tr>
            `).join('');
        }

        function formatPlatformLabel(platformTypeIds) {
            const ids = Array.isArray(platformTypeIds) ? platformTypeIds.map(x => Number(x)).filter(x => x) : [];
            if (!ids.length) return '通用';
            const names = ids.map(id => {
                const it = (platformTypeOptions || []).find(x => Number(x.id) === Number(id));
                return it ? (it.name || '') : String(id);
            }).filter(Boolean);
            return names.length ? names.join('、') : '通用';
        }

        function renderPlatformTypeCheckboxes(containerEl, selectedIds) {
            if (!containerEl) return;
            const ids = new Set((Array.isArray(selectedIds) ? selectedIds : []).map(x => Number(x)).filter(x => x));
            const list = Array.isArray(platformTypeOptions) ? platformTypeOptions : [];
            if (!list.length) {
                containerEl.innerHTML = '<div class="pm-select-empty">暂无平台类型</div>';
                return;
            }
            containerEl.innerHTML = list.map(p => {
                const checked = ids.has(Number(p.id)) ? 'checked' : '';
                return `<label style="display:inline-flex; align-items:center; gap:0.45rem; margin-right:0.85rem; margin-bottom:0.35rem; user-select:none;">
                    <input type="checkbox" data-platform-type-id="${Number(p.id)}" ${checked}>
                    <span>${escapeHtml(p.name || '')}</span>
                </label>`;
            }).join('');
        }

        function readPlatformTypeIds(containerEl) {
            if (!containerEl) return [];
            const boxes = Array.from(containerEl.querySelectorAll('input[type="checkbox"][data-platform-type-id]'));
            return boxes.filter(b => b.checked).map(b => Number(b.getAttribute('data-platform-type-id') || 0)).filter(x => x);
        }

        function loadPlatformTypes() {
            return fetch('/api/platform-type')
                .then(r => r.json())
                .then(data => {
                    platformTypeOptions = (data && data.status === 'success' && Array.isArray(data.items)) ? data.items : [];
                })
                .catch(() => { platformTypeOptions = []; });
        }

        function loadImageTypeList() {
            const q = encodeURIComponent(String(document.getElementById('searchInput').value || '').trim());
            const url = `/api/image-type?include_disabled=1&include_platforms=1&q=${q}`;
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        const tbody = document.querySelector('#imageTypeTable tbody');
                        tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:#a33;">${escapeHtml(data.message || '加载失败')}</td></tr>`;
                        return;
                    }
                    renderImageTypeList(data.items || []);
                })
                .catch(err => {
                    const tbody = document.querySelector('#imageTypeTable tbody');
                    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:#a33;">加载失败: ${escapeHtml(String(err || ''))}</td></tr>`;
                });
        }

        function updateFlag(id, field, checked) {
            fetch('/api/image-type', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, [field]: !!checked })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    if (window.showAppToast) window.showAppToast(data.message || '保存失败', true);
                    loadImageTypeList();
                    return;
                }
                if (window.showAppToast) window.showAppToast('已保存', false, 1000);
            })
            .catch(err => {
                if (window.showAppToast) window.showAppToast('保存失败: ' + err, true);
                loadImageTypeList();
            });
        }

        function openCreateModal() {
            document.getElementById('modalTypeName').value = '';
            document.getElementById('modalApplyFabric').checked = true;
            document.getElementById('modalApplySales').checked = true;
            document.getElementById('modalApplyAplus').checked = true;
            document.getElementById('modalRequiredWidth').value = '';
            document.getElementById('modalRequiredHeight').value = '';
            renderPlatformTypeCheckboxes(document.getElementById('modalPlatformTypeList'), []);
            resetStatus();
            document.getElementById('create-modal').classList.add('active');
            document.getElementById('modalTypeName').focus();
        }

        function closeCreateModal() {
            document.getElementById('create-modal').classList.remove('active');
        }

        function saveImageType() {
            const name = String(document.getElementById('modalTypeName').value || '').trim();
            if (!name) {
                showStatus('请输入类型名称', true);
                return;
            }
            const required_width_px = document.getElementById('modalRequiredWidth').value === '' ? null : Number(document.getElementById('modalRequiredWidth').value || 0);
            const required_height_px = document.getElementById('modalRequiredHeight').value === '' ? null : Number(document.getElementById('modalRequiredHeight').value || 0);
            const platform_type_ids = readPlatformTypeIds(document.getElementById('modalPlatformTypeList'));
            fetch('/api/image-type', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name,
                    required_width_px,
                    required_height_px,
                    platform_type_ids,
                    applies_fabric: document.getElementById('modalApplyFabric').checked,
                    applies_sales: document.getElementById('modalApplySales').checked,
                    applies_aplus: document.getElementById('modalApplyAplus').checked
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status !== 'success') {
                    showStatus(data.message || '保存失败', true);
                    return;
                }
                closeCreateModal();
                loadImageTypeList();
                if (window.showAppToast) window.showAppToast('图片类型已保存', false);
            })
            .catch(err => showStatus('保存失败: ' + err, true));
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadImageTypeList();
        });

        document.getElementById('create-modal').addEventListener('click', function(e) {
            if (e.target === this) closeCreateModal();
        });

        function openEditModal(item) {
            currentEditItem = item || null;
            document.getElementById('editTypeName').value = String(item.name || '');
            document.getElementById('editRequiredWidth').value = item.required_width_px == null ? '' : String(item.required_width_px);
            document.getElementById('editRequiredHeight').value = item.required_height_px == null ? '' : String(item.required_height_px);
            document.getElementById('editApplyFabric').checked = Number(item.applies_fabric || 0) === 1;
            document.getElementById('editApplySales').checked = Number(item.applies_sales || 0) === 1;
            document.getElementById('editApplyAplus').checked = Number(item.applies_aplus || 0) === 1;
            document.getElementById('editEnabled').checked = Number(item.is_enabled || 0) === 1;
            document.getElementById('editAplusLayoutMobile').value = String(item.aplus_layout_json_mobile || '');
            document.getElementById('editAplusLayoutDesktop').value = String(item.aplus_layout_json_desktop || '');
            renderPlatformTypeCheckboxes(document.getElementById('editPlatformTypeList'), item.platform_type_ids || []);
            document.getElementById('editStatus').style.display = 'none';
            document.getElementById('editStatus').textContent = '';
            document.getElementById('edit-modal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
            currentEditItem = null;
        }

        function saveEditImageType() {
            if (!currentEditItem || !currentEditItem.id) return;
            const id = Number(currentEditItem.id || 0);
            const name = String(document.getElementById('editTypeName').value || '').trim();
            if (!name) {
                const el = document.getElementById('editStatus');
                el.style.display = 'block';
                el.style.background = '#ffecec';
                el.style.color = '#a33';
                el.textContent = '请输入类型名称';
                return;
            }
            const required_width_px = document.getElementById('editRequiredWidth').value === '' ? null : Number(document.getElementById('editRequiredWidth').value || 0);
            const required_height_px = document.getElementById('editRequiredHeight').value === '' ? null : Number(document.getElementById('editRequiredHeight').value || 0);
            const platform_type_ids = readPlatformTypeIds(document.getElementById('editPlatformTypeList'));
            const aplus_layout_json_mobile = String(document.getElementById('editAplusLayoutMobile').value || '');
            const aplus_layout_json_desktop = String(document.getElementById('editAplusLayoutDesktop').value || '');
            fetch('/api/image-type', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id,
                    name,
                    required_width_px,
                    required_height_px,
                    platform_type_ids,
                    aplus_layout_json_mobile,
                    aplus_layout_json_desktop,
                    applies_fabric: document.getElementById('editApplyFabric').checked,
                    applies_sales: document.getElementById('editApplySales').checked,
                    applies_aplus: document.getElementById('editApplyAplus').checked,
                    is_enabled: document.getElementById('editEnabled').checked
                })
            })
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById('editStatus');
                if (data.status !== 'success') {
                    el.style.display = 'block';
                    el.style.background = '#ffecec';
                    el.style.color = '#a33';
                    el.textContent = data.message || '保存失败';
                    return;
                }
                closeEditModal();
                loadImageTypeList();
                if (window.showAppToast) window.showAppToast('已保存', false);
            })
            .catch(err => {
                const el = document.getElementById('editStatus');
                el.style.display = 'block';
                el.style.background = '#ffecec';
                el.style.color = '#a33';
                el.textContent = '保存失败: ' + err;
            });
        }

        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });

        document.getElementById('aplus-json-preview-modal').addEventListener('click', function(e) {
            if (e.target === this) closeAplusJsonPreview();
        });

        function closeAplusJsonPreview() {
            document.getElementById('aplus-json-preview-modal').classList.remove('active');
            document.getElementById('aplusJsonPreviewBox').innerHTML = '';
            document.getElementById('aplusJsonPreviewMeta').textContent = '';
        }

        function formatAplusJson(device) {
            const key = device === 'mobile' ? 'editAplusLayoutMobile' : 'editAplusLayoutDesktop';
            const box = document.getElementById(key);
            const text = String(box.value || '').trim();
            if (!text) return;
            try {
                const obj = JSON.parse(text);
                box.value = JSON.stringify(obj, null, 2);
            } catch (e) {
                const el = document.getElementById('editStatus');
                el.style.display = 'block';
                el.style.background = '#ffecec';
                el.style.color = '#a33';
                el.textContent = 'JSON格式错误：' + e;
            }
        }

        function previewAplusJson(device) {
            const key = device === 'mobile' ? 'editAplusLayoutMobile' : 'editAplusLayoutDesktop';
            const text = String((document.getElementById(key).value || '')).trim();
            const meta = document.getElementById('aplusJsonPreviewMeta');
            const box = document.getElementById('aplusJsonPreviewBox');
            meta.textContent = `${device === 'mobile' ? '手机端' : '电脑端'} · ${String(document.getElementById('editTypeName').value || '').trim() || '-'}`;
            box.innerHTML = '';
            if (!text) {
                box.innerHTML = '<div style="color:rgba(42,36,32,0.72);">空</div>';
                document.getElementById('aplus-json-preview-modal').classList.add('active');
                return;
            }
            try {
                const obj = JSON.parse(text);
                // 结构预览：列出 modules[] 的 type + 关键字段（不做真实渲染，避免绑定业务过深）
                const modules = (obj && obj.modules && Array.isArray(obj.modules)) ? obj.modules : [];
                if (!modules.length) {
                    box.innerHTML = '<div style="color:rgba(42,36,32,0.72);">未检测到 modules[]</div>';
                } else {
                    box.innerHTML = modules.map((m, idx) => {
                        const type = escapeHtml((m && m.type) ? String(m.type) : '');
                        const props = m && typeof m.props === 'object' ? m.props : {};
                        const propsText = escapeHtml(JSON.stringify(props, null, 2));
                        return `<div style="border:1px solid var(--morandi-sand); border-radius:12px; padding:0.65rem; margin-bottom:0.6rem;">
                            <div style="font-weight:700; margin-bottom:0.35rem;">模块 ${idx+1}: ${type || '-'}</div>
                            <pre style="margin:0; white-space:pre-wrap; color:rgba(42,36,32,0.78); font-size:0.88rem;">${propsText}</pre>
                        </div>`;
                    }).join('');
                }
                document.getElementById('aplus-json-preview-modal').classList.add('active');
            } catch (e) {
                const el = document.getElementById('editStatus');
                el.style.display = 'block';
                el.style.background = '#ffecec';
                el.style.color = '#a33';
                el.textContent = 'JSON格式错误：' + e;
            }
        }

        window.addEventListener('load', function() {
            loadPlatformTypes().finally(() => loadImageTypeList());
        });
    </script>
</body>
</html>
