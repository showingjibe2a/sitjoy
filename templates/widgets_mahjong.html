<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将 - SITJOY</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/widgets.css">
</head>
<body data-mj-play-mode="main">
    <div id="site-header"></div>
    <div class="container">
        <section class="hero" style="margin-bottom: 1rem;">
            <h2>麻将</h2>
            <p>至少 <strong>2 人</strong> 在座且全部准备后可开局（最多 4 人）。创建房间后在侧栏选择规则；首局投骰定庄，之后由上局胡牌者坐庄。昵称来自员工账号。</p>
        </section>

        <section class="pm-layout mj-layout-root">
            <!-- ------------------------------------------------------------------------- -->
            <!-- 工具栏：创建 / 加入 / 独立窗口 -->
            <!-- ------------------------------------------------------------------------- -->
            <div class="card pm-card mj-toolbar-card">
                <div class="pm-toolbar mj-toolbar">
                    <button type="button" class="btn-accent" id="mjCreateBtn">创建房间</button>
                    <div class="go-play-join-group widget-room-join-group">
                        <span class="pm-search-title">加入房间</span>
                        <div class="go-play-join-row">
                            <input type="text" id="mjJoinInput" class="inline-input widget-room-join-input" maxlength="8" placeholder="6 位房间号" autocomplete="off">
                            <button type="button" class="btn-secondary" id="mjJoinBtn">加入</button>
                        </div>
                    </div>
                    <button type="button" class="btn-secondary" id="mjPopoutBtn" title="在新窗口打开牌桌（需允许弹出窗口）">牌桌独立窗口</button>
                </div>
            </div>

            <!-- ------------------------------------------------------------------------- -->
            <!-- 牌桌与房间侧栏 -->
            <!-- ------------------------------------------------------------------------- -->
            <div class="card pm-card mj-board-card" id="mjBoardCard">
                <div class="widget-room-stage widget-room-stage--inline mj-board-stage">
                    <div class="widget-room-board-cluster">
                        <div class="mj-table-wrap" id="mjTableWrap">
                            <p class="mj-table-placeholder pm-u-hidden" id="mjTablePlaceholder">创建或加入房间后在此显示牌桌</p>
                            <div class="mj-table-layout pm-u-hidden" id="mjTableLayout">
                                <div class="mj-player-rail mj-player-rail--top">
                                    <div class="mj-player-badge" id="mjPlayerBadge1" data-dom="1" role="button" tabindex="-1" aria-disabled="true" aria-label="对家">
                                        <div class="mj-player-avatar" id="mjPlayerAvatar1">
                                            <img class="mj-player-avatar-img" id="mjPlayerAvatarImg1" alt="" hidden>
                                            <span class="mj-player-avatar-fallback pm-u-hidden" id="mjPlayerAvatarFallback1"></span>
                                            <span class="mj-player-avatar-plus pm-u-hidden" id="mjPlayerAvatarPlus1">+</span>
                                        </div>
                                        <div class="mj-player-side">
                                            <div class="mj-player-caption">
                                            <div class="mj-player-identity">
                                                <span class="mj-role-tag pm-u-hidden" id="mjSeatRole1" aria-hidden="true"></span>
                                                <div class="mj-player-text">
                                                    <span class="mj-player-score" id="mjSeatScore1"></span>
                                                    <span class="mj-player-name" id="mjSeatName1">—</span>
                                                </div>
                                            </div>
                                            <div class="mj-player-subline">
                                                <span class="mj-wind-tag pm-u-hidden" id="mjSeatWind1" aria-hidden="true"></span>
                                                <span class="mj-seat-meta" id="mjSeatMeta1"></span>
                                            </div>
                                            <div class="mj-seat-reveal pm-u-hidden" id="mjSeatReveal1" hidden aria-label="本局手牌"></div>
                                            </div>
                                            <div class="mj-badge-melds" id="mjBadgeMelds1" aria-label="副露"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="mj-table-row">
                                    <div class="mj-player-rail mj-player-rail--left">
                                        <div class="mj-player-badge" id="mjPlayerBadge2" data-dom="2" role="button" tabindex="-1" aria-disabled="true" aria-label="上家">
                                            <div class="mj-player-avatar" id="mjPlayerAvatar2">
                                                <img class="mj-player-avatar-img" id="mjPlayerAvatarImg2" alt="" hidden>
                                                <span class="mj-player-avatar-fallback pm-u-hidden" id="mjPlayerAvatarFallback2"></span>
                                                <span class="mj-player-avatar-plus pm-u-hidden" id="mjPlayerAvatarPlus2">+</span>
                                            </div>
                                            <div class="mj-player-side">
                                            <div class="mj-player-caption">
                                                <div class="mj-player-identity">
                                                    <span class="mj-role-tag pm-u-hidden" id="mjSeatRole2" aria-hidden="true"></span>
                                                    <div class="mj-player-text">
                                                        <span class="mj-player-score" id="mjSeatScore2"></span>
                                                        <span class="mj-player-name" id="mjSeatName2">—</span>
                                                    </div>
                                                </div>
                                                <div class="mj-player-subline">
                                                    <span class="mj-wind-tag pm-u-hidden" id="mjSeatWind2" aria-hidden="true"></span>
                                                    <span class="mj-seat-meta" id="mjSeatMeta2"></span>
                                                </div>
                                                <div class="mj-seat-reveal pm-u-hidden" id="mjSeatReveal2" hidden aria-label="本局手牌"></div>
                                            </div>
                                            <div class="mj-badge-melds" id="mjBadgeMelds2" aria-label="副露"></div>
                                        </div>
                                        </div>
                                    </div>
                                    <div class="mj-table-felt">
                                        <div class="mj-felt-stack">
                                        <div class="mj-table" id="mjTable">
                                            <div class="mj-seat mj-seat--top" data-dom="1"><div class="mj-river" id="mjRiver1"></div></div>
                                            <div class="mj-seat mj-seat--left" data-dom="2"><div class="mj-river" id="mjRiver2"></div></div>
                                            <div class="mj-seat mj-seat--right" data-dom="3"><div class="mj-river" id="mjRiver3"></div></div>
                                            <div class="mj-center" id="mjCenterInfo">—</div>
                                            <div class="mj-dice-roll pm-u-hidden" id="mjDiceRoll" aria-live="polite">
                                                <div class="mj-dice-pair">
                                                    <span class="mj-die" id="mjDie1">—</span>
                                                    <span class="mj-die" id="mjDie2">—</span>
                                                </div>
                                                <p class="mj-dice-result" id="mjDiceResult"></p>
                                            </div>
                                            <div class="mj-seat mj-seat--bottom" data-dom="0"><div class="mj-river" id="mjRiver0"></div></div>
                                            <div class="widget-board-overlay pm-u-hidden" id="mjBoardOverlay" hidden aria-live="polite">
                                                <div class="widget-board-dialog" role="dialog" aria-modal="true" aria-labelledby="mjOverlayTitle">
                                                    <p class="widget-board-dialog-title" id="mjOverlayTitle"></p>
                                                    <p class="widget-board-dialog-msg" id="mjOverlayMsg"></p>
                                                    <div class="widget-board-dialog-actions" id="mjOverlayActions"></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="mj-hand-strip pm-u-hidden" id="mjHandStrip" aria-label="我的手牌">
                                            <div class="mj-hand-actions pm-u-hidden" id="mjHandActions" aria-label="牌桌操作">
                                                <div class="mj-hand-actions-inner" id="mjHandActionBtns"></div>
                                            </div>
                                            <div class="mj-hand" id="mjMyHand"></div>
                                        </div>
                                        </div>
                                    </div>
                                    <div class="mj-player-rail mj-player-rail--right">
                                        <div class="mj-player-badge" id="mjPlayerBadge3" data-dom="3" role="button" tabindex="-1" aria-disabled="true" aria-label="下家">
                                            <div class="mj-player-avatar" id="mjPlayerAvatar3">
                                                <img class="mj-player-avatar-img" id="mjPlayerAvatarImg3" alt="" hidden>
                                                <span class="mj-player-avatar-fallback pm-u-hidden" id="mjPlayerAvatarFallback3"></span>
                                                <span class="mj-player-avatar-plus pm-u-hidden" id="mjPlayerAvatarPlus3">+</span>
                                            </div>
                                            <div class="mj-player-side">
                                            <div class="mj-player-caption">
                                                <div class="mj-player-identity">
                                                    <span class="mj-role-tag pm-u-hidden" id="mjSeatRole3" aria-hidden="true"></span>
                                                        <div class="mj-player-text">
                                                            <span class="mj-player-score" id="mjSeatScore3"></span>
                                                            <span class="mj-player-name" id="mjSeatName3">—</span>
                                                        </div>
                                                </div>
                                                <div class="mj-player-subline">
                                                    <span class="mj-wind-tag pm-u-hidden" id="mjSeatWind3" aria-hidden="true"></span>
                                                    <span class="mj-seat-meta" id="mjSeatMeta3"></span>
                                                </div>
                                                <div class="mj-seat-reveal pm-u-hidden" id="mjSeatReveal3" hidden aria-label="本局手牌"></div>
                                            </div>
                                            <div class="mj-badge-melds" id="mjBadgeMelds3" aria-label="副露"></div>
                                        </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="mj-player-rail mj-player-rail--bottom">
                                    <div class="mj-player-badge" id="mjPlayerBadge0" data-dom="0" role="button" tabindex="-1" aria-disabled="true" aria-label="本家">
                                        <div class="mj-player-avatar" id="mjPlayerAvatar0">
                                            <img class="mj-player-avatar-img" id="mjPlayerAvatarImg0" alt="" hidden>
                                            <span class="mj-player-avatar-fallback pm-u-hidden" id="mjPlayerAvatarFallback0"></span>
                                            <span class="mj-player-avatar-plus pm-u-hidden" id="mjPlayerAvatarPlus0">+</span>
                                        </div>
                                        <div class="mj-player-side">
                                            <div class="mj-player-caption">
                                            <div class="mj-player-identity">
                                                <span class="mj-role-tag pm-u-hidden" id="mjSeatRole0" aria-hidden="true"></span>
                                                <div class="mj-player-text">
                                                    <span class="mj-player-score" id="mjSeatScore0"></span>
                                                    <span class="mj-player-name" id="mjSeatName0">—</span>
                                                </div>
                                            </div>
                                            <div class="mj-player-subline">
                                                <span class="mj-wind-tag pm-u-hidden" id="mjSeatWind0" aria-hidden="true"></span>
                                                <span class="mj-seat-meta" id="mjSeatMeta0"></span>
                                            </div>
                                            <div class="mj-seat-reveal pm-u-hidden" id="mjSeatReveal0" hidden aria-label="本局手牌"></div>
                                            </div>
                                            <div class="mj-badge-melds" id="mjBadgeMelds0" aria-label="副露"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <aside class="widget-room-side-panel go-play-side-panel" id="mjSidePanel" aria-label="房间信息与操作">
                            <p class="go-play-side-notice pm-u-hidden" id="mjWindowPlaceholder">牌桌已在独立窗口中打开，请保持本页开启以同步对局。</p>

                            <div id="mjRoomPanel" class="go-play-side-section pm-u-hidden">
                                <div class="go-play-side-meta">
                                    <div class="go-play-side-meta-row">
                                        <span class="go-play-side-label">房间</span>
                                        <span class="go-play-room-code-group">
                                            <strong class="go-play-room-code" id="mjRoomCode">------</strong>
                                            <button type="button" class="btn-secondary btn-small go-play-room-copy-btn pm-u-hidden" id="mjRoomCopyBtn" title="复制加入链接与房间号" aria-label="复制加入链接与房间号">复制</button>
                                        </span>
                                    </div>
                                    <p class="go-play-side-meta-line go-play-side-meta-line--muted pm-u-hidden" id="mjSideRuleLine"></p>
                                    <p class="go-play-side-meta-line go-play-side-meta-line--muted pm-u-hidden" id="mjSideStreakLine"></p>
                                </div>

                                <div id="mjRuleNotice" class="go-play-side-notice go-play-side-notice--practice pm-u-hidden" aria-label="牌局规则">
                                    <span class="label-help" style="display:inline-flex;align-items:center;gap:0.35rem;">
                                        <select id="mjRulePreset" class="inline-input mj-rule-preset-select mj-rule-preset-select--compact" data-universal-compact="1" data-universal-no-search="1" aria-label="规则预设">
                                            <option value="standard">标准（当前）</option>
                                            <option value="hangzhou">杭麻</option>
                                        </select>
                                        <span class="help-dot" id="mjRulePresetHint" data-tip="136 张；可点炮/自摸；仅平胡；庄闲双倍，无连庄加倍。" tabindex="0" role="button" aria-label="规则说明"></span>
                                    </span>
                                </div>

                                <div class="go-play-side-actions">
                                    <button type="button" class="go-play-side-btn btn-secondary btn-small pm-u-hidden" id="mjLeaveBtn">离开房间</button>
                                </div>
                            </div>

                            <p class="go-play-side-foot" id="mjSideFoot">在牌桌区域操作出牌；在线对局时请保持<strong>主页面</strong>开启以同步，或使用牌桌独立窗口。</p>
                        </aside>
                    </div>

                    <div class="mj-actions" id="mjActions" hidden>
                        <span class="mj-actions-label">操作：</span>
                        <div class="mj-actions-btns" id="mjActionBtns"></div>
                    </div>

                    <div class="widget-room-chat widget-room-chat--below pm-u-hidden" id="mjRoomChat" hidden aria-label="房间对话"></div>
                </div>
            </div>
        </section>
    </div>
    <footer><p>&copy; 2026 SITJOY | 内部使用</p></footer>
    <script src="/static/js/header.js"></script>
    <script src="/static/js/widget-popup-window.js"></script>
    <script src="/static/js/widget-board-overlay.js"></script>
    <script src="/static/js/widget-room.js"></script>
    <script src="/static/js/mahjong-play.js"></script>
</body>
</html>
