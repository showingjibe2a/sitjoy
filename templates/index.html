<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITJOY 工作台</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* 待办弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #d4a574;
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            justify-content: flex-end;
        }

        .btn-modal-submit {
            flex: 1;
            padding: 12px 24px;
            background: #d4a574;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-modal-submit:hover {
            background: #c49563;
            box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3);
        }

        .btn-modal-cancel {
            padding: 12px 24px;
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-modal-cancel:hover {
            background: #e8e8e8;
        }

        /* 多选标签 */
        .checkbox-list {
            margin: 0;
            padding: 0;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 8px;
            background: white;
            max-height: 150px;
            overflow-y: auto;
        }

        .checkbox-list li {
            list-style: none;
            padding: 8px 0;
            margin: 0;
        }

        .checkbox-list label {
            display: flex;
            align-items: center;
            margin: 0;
            font-weight: normal;
        }

        .checkbox-list input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            margin-bottom: 0;
        }
        #assigneePicker {
            min-height: 40px;
        }
        #assigneePicker .feature-category-chips {
            min-height: 34px;
            align-items: center;
        }
        #assigneePicker .feature-category-dropdown {
            z-index: 3800;
        }
        #assigneePicker .feature-category-menu {
            z-index: 3900;
            min-width: 260px;
            max-height: 280px;
        }
        .assignee-empty {
            font-size: 12px;
            color: #8a7d6b;
        }
        .assignee-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
            font-size: 13px;
            font-weight: 600;
            color: #3a3a3a;
        }
        .assignee-option:hover {
            background: rgba(207, 199, 189, 0.4);
        }
        .assignee-option input {
            accent-color: #b94b4b;
            width: 16px;
            min-width: 16px;
        }

        .admin-module {
            margin-top: 32px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
            color: #3a3a3a;
        }

        .admin-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }

        .admin-header h3 {
            font-size: 20px;
            margin: 0;
        }

        .admin-header p {
            margin: 0;
            font-size: 12px;
            color: #7b7b7b;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .admin-card {
            background: #fff;
            border: 1px solid #efe7dc;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        .admin-card h4 {
            margin: 0 0 12px;
            font-size: 16px;
            color: #3a3a3a;
        }

        .admin-card label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        .admin-card input,
        .admin-card select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5dccf;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .admin-card input:focus,
        .admin-card select:focus {
            outline: none;
            border-color: #d4a574;
            box-shadow: 0 0 0 2px rgba(212, 165, 116, 0.2);
        }

        .admin-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .admin-btn {
            flex: 1;
            min-width: 120px;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .admin-btn.primary {
            background: #d4a574;
            color: #fff;
        }

        .admin-btn.secondary {
            background: #f2ece3;
            color: #6b5e4d;
        }

        .admin-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .admin-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #f8f4ee;
        }

        .admin-item small {
            color: #8a7d6b;
        }

        .home-topbar {
            margin-bottom: 1.25rem;
        }

        /* Home - Todo rail enhancements */
        .todo-type-bar-title {
            font-size: 13px;
            color: #444;
            margin: 0.6rem 0 0.35rem 0;
            font-weight: 600;
        }
        .todo-table-wrap {
            width: 100%;
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(207, 199, 189, 0.6);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.86);
        }
        .todo-rail .rail-card > :not(.todo-table-wrap) {
            flex-shrink: 0;
        }
        .todo-table-wrap .pm-table-toolbar,
        .todo-table-wrap .pm-managed-head-wrap,
        .todo-table-wrap .pm-table-top-scroll {
            flex-shrink: 0;
        }
        .todo-table-wrap .pm-managed-head-wrap {
            border-radius: 10px 10px 0 0;
        }
        .todo-table-wrap .pm-managed-body-wrap {
            flex: 1 1 auto;
            min-height: 0;
            max-height: 520px;
            overflow-x: auto;
            overflow-y: auto;
            border-radius: 0 0 10px 10px;
        }
        .todo-table-wrap .pm-managed-head-wrap.is-managed-wrap,
        .todo-table-wrap .pm-managed-body-wrap.is-managed-wrap {
            box-shadow: none;
        }
        /* 托管表尚未初始化时的兜底：整表滚动 + 粘性表头 */
        .todo-table-wrap:not(:has(.pm-managed-body-wrap)) {
            display: block;
            overflow: auto;
            max-height: 520px;
        }
        #todoTable th, #todoTable td { font-size: 13px; }
        #todoTable thead th { position: sticky; top: 0; z-index: 2; background: #f5efe5; }
        .todo-table-wrap:has(.pm-managed-body-wrap) #todoTable thead.pm-managed-hidden-head {
            display: none;
        }
        #todoTable .pm-actions { display: inline-flex; gap: 0.35rem; }
        #todoTable tbody tr.todo-overdue td { background: rgba(179, 83, 83, 0.1) !important; }
        .todo-title-cell { min-width: 140px; word-break: break-word; }
        .todo-mini-sub { font-size: 12px; color: #888; margin-top: 2px; }
        .todo-other-assignees { display: flex; flex-direction: column; gap: 4px; min-width: 120px; }
        .todo-other-assignee { display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 6px; font-size: 12px; line-height: 1.35; }
        .todo-other-name { font-weight: 600; color: #4a4e57; }
        .todo-other-status { color: #888; }
        .todo-other-assignee--done .todo-other-status { color: #2d7d4a; }
        .todo-other-assignee--open .todo-other-status { color: #a66; }
        /* 完成时间：高度由全站 .app-datetime-text-input / .pm-table 表内控件规则统一 */
        .todo-completed-at-input,
        .todo-completed-at-compact {
            max-width: 100%;
            box-sizing: border-box;
        }
        .todo-completed-at-compact {
            background: #fff;
            cursor: pointer;
        }
        .todo-completed-at-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.45rem;
            align-items: center;
        }
        /* todo-complete-pop removed */
        /* Todo modal - yellow priority pill */
        .status-pill--warning.is-active { background: #d2bf82 !important; } /* lighter yellow */
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container home-container">
        <div class="home-topbar">
            <section class="home-profile-card" id="homeProfileCard" aria-label="个人信息">
                <div class="home-profile-main">
                    <div class="home-profile-avatar-wrap">
                        <img id="homeProfileAvatar" class="home-profile-avatar" alt="" hidden>
                        <div id="homeProfileAvatarFallback" class="home-profile-avatar home-profile-avatar--fallback" aria-hidden="true">?</div>
                    </div>
                    <div class="home-profile-text">
                        <div class="home-profile-greeting">
                            <span class="home-profile-kicker" id="homeProfileGreeting">加载中…</span>
                            <div class="home-profile-name-row">
                                <h2 id="homeProfileDisplayName">加载中…</h2>
                                <div class="home-profile-inline-actions">
                                    <button type="button" class="btn-secondary btn-small" id="homeProfileEditBtn">编辑资料</button>
                                    <button type="button" class="btn-danger btn-small" onclick="handleLogout()">登出</button>
                                </div>
                            </div>
                        </div>
                        <div class="home-profile-meta">
                            <div class="home-profile-meta-primary">
                                <span class="home-profile-badge home-profile-badge--admin" id="homeProfileRole" hidden>管理员</span>
                                <span class="home-profile-badge home-profile-badge--job" id="homeProfileJobTitle">职位</span>
                            </div>
                            <span class="home-profile-tenure" id="homeProfileTenure" hidden></span>
                        </div>
                    </div>
                </div>
                <div class="home-profile-launcher" id="homeProfileLauncher" aria-label="桌面美化">
                    <div class="home-profile-folder">
                        <div class="home-profile-folder-head">
                            <span class="home-profile-folder-icon" aria-hidden="true">
                                <svg width="22" height="18" viewBox="0 0 22 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M1 5.5V15.5C1 16.3284 1.67157 17 2.5 17H19.5C20.3284 17 21 16.3284 21 15.5V5.5C21 4.67157 20.3284 4 19.5 4H11.5L9.5 1.5H2.5C1.67157 1.5 1 2.17157 1 3V5.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                                </svg>
                            </span>
                            <span class="home-profile-folder-title">桌面美化</span>
                        </div>
                        <div class="home-profile-folder-apps">
                            <button type="button" class="home-profile-app" id="homeProfileThemeToggle" data-sitjoy-theme-toggle title="组件样式">
                                <span class="home-profile-app-icon" aria-hidden="true">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 3L4 8V16L12 21L20 16V8L12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                        <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
                                    </svg>
                                </span>
                                <span class="home-profile-app-label">组件样式</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        <section class="home-layout">
            <aside class="todo-rail">
                <div class="rail-card">
                    <div style="display:flex; align-items:center; justify-content:space-between; gap:0.6rem;">
                        <h3>待办</h3>
                        <button class="btn-add" onclick="showTodoModal('create')">+ 新增待办</button>
                    </div>
                    <div class="todo-type-bar-title">待办类型管理</div>
                    <div class="material-type-bar" id="todoTypeBar" style="margin-bottom: 0.7rem;">
                        <button class="material-type-add" type="button" aria-label="新增类型" onclick="openTodoTypeModal('create')">+</button>
                    </div>
                    <div class="todo-table-wrap">
                        <table class="pm-table" id="todoTable">
                            <thead>
                                <tr>
                                    <th style="width:120px;">类型</th>
                                    <th style="width:100px;">优先级</th>
                                    <th style="min-width:120px;">关联平台</th>
                                    <th style="min-width:180px;">事项</th>
                                    <th style="min-width:180px;">详情/备注</th>
                                    <th style="width:120px;">开始日期</th>
                                    <th style="width:120px;">截止日期</th>
                                    <th style="width:120px;">完成状态</th>
                                    <th style="width:190px;">完成时间</th>
                                    <th style="min-width:140px;">他人完成情况</th>
                                    <th style="width:120px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="todoTableBody">
                                <tr><td colspan="11" style="text-align:center;">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </aside>

            <div class="calendar-panel">
                <div class="calendar-toolbar">
                    <div class="calendar-title">
                        <h3>日历</h3>
                        <p>悬浮查看详情，点击固定当天</p>
                    </div>
                    <div class="calendar-controls">
                        <button class="btn-ghost" id="prevMonthBtn" type="button">&#8249;</button>
                        <input type="hidden" id="calendarYear">
                        <input type="hidden" id="calendarMonth">
                        <div class="cal-picker-wrap">
                            <button type="button" class="cal-picker-btn" id="calPickerBtn">加载中</button>
                            <div class="cal-picker-panel" id="calPickerPanel">
                                <div class="cal-picker-year-row">
                                    <button type="button" class="cal-picker-yr-btn" id="calPickerPrevYear">&#9664;</button>
                                    <span id="calPickerYearLabel">2026</span>
                                    <button type="button" class="cal-picker-yr-btn" id="calPickerNextYear">&#9654;</button>
                                </div>
                                <div class="cal-picker-months" id="calPickerMonths"></div>
                            </div>
                        </div>
                        <button class="btn-secondary calendar-today-btn" id="calendarTodayBtn" type="button">本月</button>
                        <button class="btn-ghost" id="nextMonthBtn" type="button">&#8250;</button>
                    </div>
                </div>

                <div class="calendar-grid" id="calendarGrid"></div>

                <!-- 日历详情已改为悬浮 tooltip，底部详情区移除 -->
            </div>
        </section>

    </div>

    <footer>
        <p>&copy; 2026 SITJOY 内部工作台</p>
    </footer>

    <!-- 待办弹窗（使用产品管理风格的 pm-modal 布局） -->
    <div id="todoModal" class="pm-modal">
        <div class="pm-modal-content pm-modal-content--wide">
            <div class="pm-modal-scroll">
            <h3 id="todoModalTitle" style="margin-top:0;">新增待办</h3>
            <div class="pm-form">
                <div class="pm-section">
                    <h4>基础信息</h4>
                    <div class="pm-section-body">
                        <input type="hidden" id="todoModalId" value="">
                        <div class="form-group pm-form-full">
                            <label>待办类型 <span class="required-asterisk">*</span></label>
                            <input type="hidden" id="todoModalTypeId" value="">
                            <div class="status-segment status-segment--inline" id="todoModalTypeSegment" data-value="">
                                <button type="button" class="status-pill status-pill--enabled" data-value="">加载中</button>
                            </div>
                        </div>
                        <div class="form-group pm-form-full">
                            <label>优先级</label>
                            <input type="hidden" id="todoModalPriorityVal" value="2">
                            <div class="status-segment status-segment--inline" id="todoModalPrioritySegment" data-value="2">
                                <button type="button" class="status-pill status-pill--paused" data-value="3">高</button>
                                <button type="button" class="status-pill status-pill--warning is-active" data-value="2">中</button>
                                <button type="button" class="status-pill status-pill--enabled" data-value="1">低</button>
                            </div>
                        </div>
                        <div class="form-group pm-form-full">
                            <label>事项标题 <span class="required-asterisk">*</span></label>
                            <input type="text" id="todoModalTitle_input" placeholder="事项" required>
                        </div>
                        <div class="form-group pm-form-full">
                            <label>详情/备注</label>
                            <textarea id="todoModalDetail" rows="4" placeholder="可选的任务详情"></textarea>
                        </div>
                        <div class="form-group">
                            <label>开始日期 <span class="required-asterisk">*</span></label>
                            <input type="date" id="todoModalStartDate" required>
                        </div>
                        <div class="form-group">
                            <label>是否为循环任务</label>
                            <input type="hidden" id="todoModalIsRecurringVal" value="0">
                            <div class="status-segment status-segment--inline" id="todoModalRecurringSegment" data-value="0">
                                <button type="button" class="status-pill status-pill--enabled" data-value="1">循环任务</button>
                                <button type="button" class="status-pill status-pill--paused is-active" data-value="0">不循环</button>
                            </div>
                        </div>
                        <div class="form-group" id="todoModalReminderWrap" style="display:none;">
                            <label>提醒间隔（天，循环任务必填）</label>
                            <input type="number" id="todoModalReminderInterval" value="1" min="1" max="365">
                        </div>
                        <div class="form-group" id="todoModalDueDateWrap">
                            <label>截止日期（非循环任务必填）</label>
                            <input type="date" id="todoModalDueDate">
                        </div>
                        <div class="form-group" id="todoModalCompleteStatusWrap">
                            <label>完成状态</label>
                            <input type="hidden" id="todoModalCompleteStatusVal" value="0">
                            <div class="status-segment status-segment--inline" id="todoModalCompleteStatusSegment" data-value="0">
                                <button type="button" class="status-pill status-pill--enabled" data-value="1">已完成</button>
                                <button type="button" class="status-pill status-pill--paused is-active" data-value="0">未完成</button>
                            </div>
                        </div>
                        <div class="form-group" id="todoModalCompletedAtWrap" style="display:none;">
                            <label>完成时间</label>
                            <div class="todo-completed-at-row">
                                <input type="text" id="todoModalCompletedAtInput" class="optional-field todo-completed-at-compact app-datetime-text-input" placeholder="YYYY-MM-DD HH:MM">
                                <button type="button" class="btn-secondary" id="todoModalCompletedAtPickBtn">选择</button>
                            </div>
                        </div>
                        <div class="form-group pm-form-full">
                            <label>关联货号（可多选）</label>
                            <div class="feature-category-picker is-multi-check" id="todoSkuFamilyPicker">
                                <div class="feature-category-chips" id="todoSkuFamilySelected"></div>
                                <div class="feature-category-dropdown" id="todoSkuFamilyDropdown">
                                    <button type="button" class="feature-category-add" id="todoSkuFamilyToggle">
                                        <span class="feature-category-add-icon">+</span>
                                        <span class="feature-category-add-text">添加货号</span>
                                    </button>
                                    <div class="feature-category-menu" id="todoSkuFamilyMenu">
                                        <input type="text" id="todoSkuFamilySearch" class="universal-select-search" placeholder="搜索货号/类目">
                                        <div class="feature-category-list" id="todoSkuFamilyList"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="form-group pm-form-full">
                            <label>关联销售SKU（可多选，选择SKU会同步关联其货号）</label>

    <script>
        let currentUser = null;
        let isAdmin = false;
        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDateKey(year, month, day) {
            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function setHint(elementId, text, isError) {
            const el = document.getElementById(elementId);
            if (el) {
                el.textContent = text;
                el.style.color = isError ? '#c91d1d' : '#2d7d4a';
            }
        }

        function showModalHint(elementId, text, isError) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.style.display = 'block';
            el.style.background = isError ? '#ffecec' : '#f0fff0';
            el.style.color = isError ? '#a33' : '#2f6f2f';
            el.textContent = text;
        }

        function resetModalHint(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.style.display = 'none';
            el.textContent = '';
        }

        function fetchCurrentAuthState(forceRefresh = false) {
            if (forceRefresh || !window.__sitjoyAuthStatePromise) {
                window.__sitjoyAuthStatePromise = fetch('/api/auth?action=current', {
                    method: 'GET',
                    credentials: 'include'
                }).then(resp => resp.json());
            }
            return window.__sitjoyAuthStatePromise;
        }

        async function checkAuth() {
            try {
                const data = await fetchCurrentAuthState();
                if (data.status === 'success') {
                    currentUser = data;
                    isAdmin = isProfileAdmin(data);
                    const indicator = document.getElementById('adminOnlyIndicator');
                    if (indicator) {
                        indicator.style.display = isAdmin ? 'flex' : 'none';
                    }
                    renderHomeProfile();
                } else {
                    window.location.href = '/login';
                }
            } catch (err) {
                window.location.href = '/login';
            }
        }

        function profileDisplayInitial(name) {
            const text = String(name || '').trim();
            if (!text) return '?';
            return text.slice(0, 1).toUpperCase();
        }

        function applyProfileAvatarToElements(avatarUrl, displayName) {
            const imgIds = ['homeProfileAvatar', 'profileModalAvatar'];
            const fallbackIds = ['homeProfileAvatarFallback', 'profileModalAvatarFallback'];
            const initial = profileDisplayInitial(displayName);
            imgIds.forEach(id => {
                const img = document.getElementById(id);
                if (!img) return;
                if (avatarUrl) {
                    img.src = `${avatarUrl}&_=${Date.now()}`;
                    img.alt = displayName || '头像';
                    img.hidden = false;
                } else {
                    img.removeAttribute('src');
                    img.hidden = true;
                }
            });
            fallbackIds.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.textContent = initial;
                el.style.display = avatarUrl ? 'none' : 'flex';
            });
        }

        const HOME_PROFILE_WEEKDAYS = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

        function homeProfileTimeGreeting(hour) {
            const h = Number(hour);
            if (h < 5) return '夜深了';
            if (h < 11) return '早上好';
            if (h < 13) return '中午好';
            if (h < 18) return '下午好';
            if (h < 22) return '晚上好';
            return '夜深了';
        }

        function formatHomeProfileGreeting(date) {
            const now = date instanceof Date ? date : new Date();
            const y = now.getFullYear();
            const m = now.getMonth() + 1;
            const d = now.getDate();
            const wd = HOME_PROFILE_WEEKDAYS[now.getDay()] || '';
            return `${homeProfileTimeGreeting(now.getHours())} · ${y}年${m}月${d}日 ${wd}`;
        }

        function renderHomeProfileGreeting() {
            const el = document.getElementById('homeProfileGreeting');
            if (el) el.textContent = formatHomeProfileGreeting();
        }

        function isProfileAdmin(user) {
            const value = user && user.is_admin;
            if (value === true || value === 1) return true;
            if (value === false || value === 0 || value == null) return false;
            const num = Number(value);
            if (!Number.isNaN(num)) return num === 1;
            return String(value).trim() === '1';
        }

        function calcProfileTenureDays(hireDate) {
            const text = String(hireDate || '').trim().slice(0, 10);
            if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) return null;
            const parts = text.split('-').map(n => parseInt(n, 10));
            const start = new Date(parts[0], parts[1] - 1, parts[2]);
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const diff = Math.round((today - start) / 86400000);
            return diff >= 0 ? diff : null;
        }

        function renderHomeProfile() {
            renderHomeProfileGreeting();
            if (!currentUser) return;
            const displayName = currentUser.display_name || currentUser.name || currentUser.username || '用户';
            const nameEl = document.getElementById('homeProfileDisplayName');
            if (nameEl) nameEl.textContent = displayName;
            const isAdmin = isProfileAdmin(currentUser);
            const roleEl = document.getElementById('homeProfileRole');
            if (roleEl) {
                roleEl.textContent = '管理员';
                roleEl.classList.toggle('is-admin', isAdmin);
                roleEl.hidden = !isAdmin;
                roleEl.style.display = isAdmin ? 'inline-flex' : 'none';
            }
            const jobEl = document.getElementById('homeProfileJobTitle');
            if (jobEl) {
                const job = String(currentUser.job_title || '').trim();
                jobEl.textContent = job || '未设置岗位';
                jobEl.classList.toggle('is-empty', !job);
            }
            const tenureEl = document.getElementById('homeProfileTenure');
            if (tenureEl) {
                const days = calcProfileTenureDays(currentUser.hire_date);
                if (days === null) {
                    tenureEl.hidden = true;
                    tenureEl.style.display = 'none';
                    tenureEl.textContent = '';
                } else {
                    tenureEl.hidden = false;
                    tenureEl.style.display = '';
                    tenureEl.textContent = `已入职：${days}天`;
                }
            }
            applyProfileAvatarToElements(currentUser.avatar_url || null, displayName);
        }

        function formatProfileSystemPermission(profile) {
            if (!profile) return '';
            if (profile.system_permission_label) return profile.system_permission_label;
            if (!profile.is_admin) return '';
            if (profile.can_grant_admin) return '管理员（可授权管理员）';
            return '管理员';
        }

        function fillProfileSupervisorSelect(candidates, selectedId) {
            const el = document.getElementById('profileDirectSupervisor');
            if (!el) return;
            const selected = selectedId ? String(selectedId) : '';
            let label = '无';
            (candidates || []).some(item => {
                const id = String(item.id || '');
                if (!id || id !== selected) return false;
                label = item.label || id;
                return true;
            });
            el.textContent = label;
        }

        function fillProfileModalForm(profile, supervisorCandidates) {
            if (!profile) return;
            const nameEl = document.getElementById('profileName');
            if (nameEl) nameEl.textContent = (profile.name || profile.display_name || '').trim() || '—';
            const phoneEl = document.getElementById('profilePhone');
            if (phoneEl) phoneEl.value = profile.phone || '';
            const birthdayEl = document.getElementById('profileBirthday');
            if (birthdayEl) birthdayEl.value = (profile.birthday || '').toString().slice(0, 10);
            const jobEl = document.getElementById('profileJobTitle');
            if (jobEl) jobEl.textContent = (profile.job_title || '').trim() || '—';
            const supervisorEl = document.getElementById('profileDirectSupervisor');
            if (supervisorEl) {
                const supervisorLabel = (profile.direct_supervisor_label || '').trim();
                if (supervisorLabel) {
                    supervisorEl.textContent = supervisorLabel;
                } else if (profile.direct_supervisor_id) {
                    fillProfileSupervisorSelect(supervisorCandidates, profile.direct_supervisor_id);
                } else {
                    supervisorEl.textContent = '无';
                }
            }
            const hireEl = document.getElementById('profileHireDate');
            if (hireEl) {
                const hire = profile.hire_date ? String(profile.hire_date).slice(0, 10) : '';
                hireEl.textContent = hire || '—';
            }
            const usernameEl = document.getElementById('profileUsername');
            if (usernameEl) usernameEl.value = profile.username || '';
            const permGroup = document.getElementById('profileSystemPermissionGroup');
            const permEl = document.getElementById('profileSystemPermission');
            const permLabel = formatProfileSystemPermission(profile);
            if (permGroup) permGroup.hidden = !permLabel;
            if (permEl) permEl.textContent = permLabel || '—';
            const createdEl = document.getElementById('profileCreatedAt');
            if (createdEl) createdEl.textContent = profile.created_at || '—';
            const displayName = profile.display_name || profile.name || profile.username || '用户';
            applyProfileAvatarToElements(profile.avatar_url || null, displayName);
        }

        async function openProfileModal() {
            if (!currentUser) return;
            const modal = document.getElementById('profileModal');
            if (!modal) return;
            const hint = document.getElementById('profileModalHint');
            if (hint) {
                hint.style.display = 'none';
                hint.textContent = '';
            }
            clearProfilePasswordFields();
            fillProfileModalForm(currentUser, []);
            modal.classList.add('active');
            try {
                const resp = await fetch('/api/profile', { credentials: 'include' });
                const data = await resp.json();
                if (data.status === 'success' && data.profile) {
                    fillProfileModalForm(data.profile, data.supervisor_candidates || []);
                }
            } catch (err) {
                /* 使用 currentUser 已填写的表单 */
            }
        }

        function clearProfilePasswordFields() {
            const a = document.getElementById('profileNewPassword');
            const b = document.getElementById('profileNewPasswordConfirm');
            if (a) a.value = '';
            if (b) b.value = '';
        }

        function closeProfileModal() {
            const modal = document.getElementById('profileModal');
            if (modal) modal.classList.remove('active');
            const input = document.getElementById('profileAvatarInput');
            if (input) input.value = '';
            clearProfilePasswordFields();
        }

        function showProfileHint(message, isError) {
            const hint = document.getElementById('profileModalHint');
            if (!hint) return;
            hint.textContent = message || '';
            hint.style.display = message ? 'block' : 'none';
            hint.classList.toggle('error', !!isError);
            hint.classList.toggle('success', !isError && !!message);
        }

        function mergeCurrentUserProfile(profile) {
            if (!profile || !currentUser) return;
            Object.assign(currentUser, profile);
            currentUser.display_name = profile.display_name || profile.name || currentUser.username;
            currentUser.name = profile.name || currentUser.name;
            renderHomeProfile();
        }

        async function saveProfile() {
            const payload = {
                username: (document.getElementById('profileUsername').value || '').trim(),
                phone: (document.getElementById('profilePhone').value || '').trim(),
                birthday: (document.getElementById('profileBirthday').value || '').trim()
            };
            if (!payload.username) {
                showProfileHint('登录账号不能为空', true);
                return;
            }
            const btn = document.getElementById('profileSaveBtn');
            if (btn) btn.disabled = true;
            try {
                const resp = await fetch('/api/profile', {
                    method: 'PUT',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                if (data.status === 'success' && data.profile) {
                    mergeCurrentUserProfile(data.profile);
                    window.__sitjoyAuthStatePromise = null;
                    showProfileHint(data.message || '已保存', false);
                    setTimeout(() => closeProfileModal(), 500);
                } else {
                    showProfileHint(data.message || '保存失败', true);
                }
            } catch (err) {
                showProfileHint('保存失败，请稍后重试', true);
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        async function uploadProfileAvatar(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('avatar', file);
            showProfileHint('正在上传头像…', false);
            try {
                const resp = await fetch('/api/profile?action=upload_avatar', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });
                const data = await resp.json();
                if (data.status === 'success' && data.profile) {
                    mergeCurrentUserProfile(data.profile);
                    window.__sitjoyAuthStatePromise = null;
                    showProfileHint(data.message || '头像已更新', false);
                } else {
                    showProfileHint(data.message || '上传失败', true);
                }
            } catch (err) {
                showProfileHint('上传失败，请稍后重试', true);
            }
        }

        async function changeProfilePassword() {
            const password = (document.getElementById('profileNewPassword') || {}).value || '';
            const passwordConfirm = (document.getElementById('profileNewPasswordConfirm') || {}).value || '';
            if (password.length < 6) {
                showProfileHint('新密码至少 6 位', true);
                return;
            }
            if (password !== passwordConfirm) {
                showProfileHint('两次输入的密码不一致', true);
                return;
            }
            const btn = document.getElementById('profileChangePasswordBtn');
            if (btn) btn.disabled = true;
            try {
                const resp = await fetch('/api/profile?action=change_password', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, password_confirm: passwordConfirm })
                });
                const data = await resp.json();
                if (data.status === 'success') {
                    clearProfilePasswordFields();
                    showProfileHint(data.message || '密码已修改', false);
                } else {
                    showProfileHint(data.message || '修改失败', true);

        function syncTodoCompletionUi() {
            const seg = document.getElementById('todoModalCompleteStatusSegment');
            const completedWrap = document.getElementById('todoModalCompletedAtWrap');
            const completedInput = document.getElementById('todoModalCompletedAtInput');
            const isDone = !!(seg && String(seg.dataset.value || '0') === '1');
            if (completedWrap) completedWrap.style.display = isDone ? '' : 'none';
            if (!isDone) {
                window.todoModalCurrentCompletedAt = '';

            } else if (completedInput && !completedInput.value) {
                const now = new Date();
                const y = String(now.getFullYear()).padStart(4, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                completedInput.value = `${y}-${m}-${d} ${hh}:${mm}`;
                window.todoModalCurrentCompletedAt = `${y}-${m}-${d} ${hh}:${mm}:00`;
            }

        function formatTodoDateTimeTextFromServer(text) {
            const v = String(text || '').trim().replace('T', ' ');
            const m = v.match(/^(\d{4}-\d{2}-\d{2})[ ](\d{2}):(\d{2})/);
            if (!m) return '';
            return `${m[1]} ${m[2]}:${m[3]}`;
        }

        function normalizeTodoCompletedAtInputValue(raw) {
            const v0 = String(raw || '').trim().replace('T', ' ');
            if (!v0) return '';

            // Flexible accept:
            // - separators: "-", "/", ".", whitespace
            // - month/day/hour/minute allow 1-2 digits (auto pad to 2)
            // Examples: "2026-4-3 6:1" -> "2026-04-03 06:01"
            const m = v0.match(/^(\d{4})\D*(\d{1,2})\D*(\d{1,2})\D+(\d{1,2})\D*(\d{1,2})$/);
            if (!m) return '';
            const y = parseInt(m[1], 10), mo = parseInt(m[2], 10), d = parseInt(m[3], 10);
            const hh = parseInt(m[4], 10), mm = parseInt(m[5], 10);
            if (!Number.isFinite(y) || !Number.isFinite(mo) || !Number.isFinite(d) || !Number.isFinite(hh) || !Number.isFinite(mm)) return '';
            if (mo < 1 || mo > 12 || d < 1 || d > 31 || hh < 0 || hh > 23 || mm < 0 || mm > 59) return '';
            const dt = new Date(y, mo - 1, d, hh, mm, 0, 0);
            if (dt.getFullYear() !== y || (dt.getMonth() + 1) !== mo || dt.getDate() !== d) return '';
            return `${String(y).padStart(4, '0')}-${String(mo).padStart(2, '0')}-${String(d).padStart(2, '0')} ${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
        }

        function toCompletedAtSeconds(text) {
            const norm = normalizeTodoCompletedAtInputValue(text);
            return norm ? (norm + ':00') : '';
        }

        function guardTodoCompletedAtInput(el, opts) {
            if (!el) return true;
            const conf = opts || {};
            const raw = String(el.value || '').trim();
            if (!raw) {
                if (el.classList) el.classList.remove('app-date-invalid');
                el.dataset.lastValid = '';
                return true;
            }
            const norm = normalizeTodoCompletedAtInputValue(raw);
            if (norm) {
                if (el.classList) el.classList.remove('app-date-invalid');
                // normalize to padded form for better UX
                el.value = norm;
                el.dataset.lastValid = norm;
                return true;
            }
            if (conf.soft) {
                // during typing: do not interrupt, only mark invalid
                if (el.classList) el.classList.add('app-date-invalid');
                return false;
            }
            if (el.classList) el.classList.add('app-date-invalid');
            const fallback = String(el.dataset.lastValid || '').trim();
            el.value = fallback;
            return false;
        }

        function parseDateInputValue(value) {
            const s = String(value || '').trim();
            const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!m) return null;
            const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
            if (Number.isNaN(d.getTime())) return null;
            return d;
        }

        function formatDateInputValue(dt) {
            if (!dt || Number.isNaN(dt.getTime())) return '';
            return String(dt.getFullYear()).padStart(4, '0')
                + '-' + String(dt.getMonth() + 1).padStart(2, '0')
                + '-' + String(dt.getDate()).padStart(2, '0');
        }

        function syncRecurringDueDate() {
            const seg = document.getElementById('todoModalRecurringSegment');
            const isRecurring = !!(seg && String(seg.dataset.value || '0') === '1');
            if (!isRecurring) return;
            const startEl = document.getElementById('todoModalStartDate');
            const dueEl = document.getElementById('todoModalDueDate');
            const intervalEl = document.getElementById('todoModalReminderInterval');
            if (!startEl || !dueEl) return;
            const intervalDays = Math.max(1, parseInt((intervalEl && intervalEl.value) || '1', 10) || 1);
            const completedAtText = String(window.todoModalCurrentCompletedAt || '').trim();
            let baseDate = null;
            if (completedAtText) {
                baseDate = parseDateInputValue(completedAtText.slice(0, 10));
            }
            if (!baseDate) {
                baseDate = parseDateInputValue(startEl.value);
            }
            if (!baseDate) return;
            const nextDate = new Date(baseDate.getTime());
            nextDate.setDate(nextDate.getDate() + intervalDays);
            dueEl.value = formatDateInputValue(nextDate);
        }

        async function handleTodoModalSubmit(event) {
            event.preventDefault();
            
            const title = document.getElementById('todoModalTitle_input').value.trim();
            const todo_type_id = parseInt((document.getElementById('todoModalTypeSegment') || {}).dataset.value || '0', 10) || 0;
            const start_date = document.getElementById('todoModalStartDate').value;
            const due_date = (document.getElementById('todoModalDueDate') || {}).value || '';
            const reminder_interval_days = parseInt(document.getElementById('todoModalReminderInterval').value, 10) || 1;
            const is_recurring = String((document.getElementById('todoModalRecurringSegment') || {}).dataset.value || '0') === '1' ? 1 : 0;
            const is_completed = String((document.getElementById('todoModalCompleteStatusSegment') || {}).dataset.value || '0') === '1' ? 1 : 0;
            const completed_at_local = (document.getElementById('todoModalCompletedAtInput') || {}).value || '';
            const completed_at = toCompletedAtSeconds(completed_at_local);
            const detail = document.getElementById('todoModalDetail').value.trim();
            const priority = parseInt((document.getElementById('todoModalPrioritySegment') || {}).dataset.value || '2', 10) || 2;
            const recurringDueDate = (() => {
                if (!is_recurring) return due_date;
                const completedAtText = String(window.todoModalCurrentCompletedAt || '').trim();
                let baseDate = null;
                if (completedAtText) baseDate = parseDateInputValue(completedAtText.slice(0, 10));
                if (!baseDate) baseDate = parseDateInputValue(start_date);
                if (!baseDate) return '';
                const d = new Date(baseDate.getTime());
                d.setDate(d.getDate() + Math.max(1, reminder_interval_days));
                return formatDateInputValue(d);
            })();
            
            // 收集选中的分配人
            const assignee_ids = getTodoSelectedAssigneeIds();
            const related_sku_family_ids = getTodoSelectedSkuFamilyIds();
            const related_sales_product_ids = getTodoSelectedSalesProductIds();
            const related_platform_type_ids = getTodoSelectedPlatformTypeIds();
            
            if (!title || !start_date || !todo_type_id) {
                if (window.showAppToast) window.showAppToast('请填写事项标题、开始日期，并选择待办类型', true, 0);
                else alert('请填写事项标题、开始日期，并选择待办类型');
                return;
            }
            if (!is_recurring && !due_date) {
                if (window.showAppToast) window.showAppToast('非循环任务必须填写截止日期', true, 0);
                else alert('非循环任务必须填写截止日期');
                return;
            }
            if (is_recurring && (!reminder_interval_days || reminder_interval_days <= 0)) {
                if (window.showAppToast) window.showAppToast('循环任务必须填写提醒间隔（天）', true, 0);
                else alert('循环任务必须填写提醒间隔（天）');
                return;
            }
            if (is_completed && String(completed_at_local || '').trim() && !completed_at) {
                if (window.showAppToast) window.showAppToast('完成时间无效，请重新选择或清空', true, 0);
                else alert('完成时间无效，请重新选择或清空');
                return;
            }
            
            const payload = {
                title,
                todo_type_id,
                start_date,
                due_date: is_recurring ? recurringDueDate : (due_date || start_date),
                reminder_interval_days,
                is_recurring,
                detail,
                priority,
                is_completed,
                completed_at: is_completed ? (completed_at || null) : null,
                assignee_ids,
                related_sku_family_ids,
                related_sales_product_ids,
                related_platform_type_ids
            };
            
            try {
                const todoId = (document.getElementById('todoModalId') || {}).value || '';
                const isEdit = !!todoId;
                if (isEdit) payload.id = parseInt(todoId, 10);
                const resp = await fetch('/api/todo', {
                    method: isEdit ? 'PUT' : 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await resp.json();
                if (data.status === 'success') {
                    if (window.showAppToast) window.showAppToast('保存成功', false, 1800);
                    closeTodoModal();
                    if (data.item) {
                        mergeTodoIntoCaches(data.item);
                        renderTodoTable(window.homeTodosCache || []);
                        refreshCalendarFromCache();
                    } else {
                        loadTodos().then(() => refreshCalendarFromCache());
                    }
                } else {
                    const msg = data.message || '保存失败';
                    if (window.showAppToast) window.showAppToast(msg, true, 0);
                    else alert(msg);
                }
            } catch (err) {
                const msg = '请求失败：' + (err && err.message ? err.message : '');
                if (window.showAppToast) window.showAppToast(msg, true, 0);
                else alert(msg);
            }
        }

        function mergeTodoIntoCaches(item) {
            if (!item || item.id == null) return;
            const id = parseInt(item.id, 10) || 0;
            if (!id) return;
            const patchList = (list) => {
                const arr = Array.isArray(list) ? list.slice() : [];
                const idx = arr.findIndex(t => (parseInt(t.id, 10) || 0) === id);
                const prev = idx >= 0 ? arr[idx] : {};
                const merged = { ...prev, ...item };
                if (idx >= 0) arr[idx] = merged;
                else arr.push(merged);
                return arr;
            };
            window.homeTodosCache = patchList(window.homeTodosCache);
            window.calendarTodosCache = patchList(window.calendarTodosCache);
        }

        function refreshCalendarFromCache() {
            return loadCalendar({ useCacheOnly: true });
        }

        function loadTodos(options = {}) {
            const opts = options || {};
            const params = new URLSearchParams();
            if (opts.withLinks !== false) params.set('with_links', '1');
            if (opts.skipRecurringReset) params.set('skip_recurring_reset', '1');
            if (window.todoSelectedTypeId && parseInt(window.todoSelectedTypeId, 10) > 0) {
                params.set('todo_type_id', String(parseInt(window.todoSelectedTypeId, 10)));
            }
            const url = '/api/todo' + (params.toString() ? ('?' + params.toString()) : '');
            return fetch(url, { credentials: 'include' })
                .then(r => r.json())
                .then(data => {
                    const items = (data && data.items) ? data.items : [];
                    window.calendarTodosCache = items;
                    window.homeTodosCache = items;
                    renderTodoTable(items);
                    return items;
                });
        }

        function renderTodoTable(items) {
            const tbody = document.getElementById('todoTableBody');
            if (!tbody) return;
            const list = Array.isArray(items) ? items.slice() : [];
            list.sort((a, b) => {
                const ad = (Number(a.my_is_completed || 0) === 1) ? 1 : 0;
                const bd = (Number(b.my_is_completed || 0) === 1) ? 1 : 0;
                if (ad !== bd) return ad - bd;
                // 已完成：按完成时间倒序（最近完成排在更靠上）
                if (ad === 1 && bd === 1) {
                    const at = String(a.my_completed_at || '');
                    const bt = String(b.my_completed_at || '');
                    if (at !== bt) return bt.localeCompare(at);
                }
                const adue = String(a.due_date || a.start_date || '');
                const bdue = String(b.due_date || b.start_date || '');
                if (adue !== bdue) return adue.localeCompare(bdue);
                return (parseInt(b.id, 10) || 0) - (parseInt(a.id, 10) || 0);
            });
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;">暂无待办</td></tr>';
                return;
            }
            const todayStr = formatDateInputValue(new Date());
            tbody.innerHTML = list.map(todo => {
                const status = (Number(todo.my_is_completed || 0) === 1) ? 'done' : 'open';
                const typeName = todo.todo_type_name || '-';
                const start = todo.start_date || '';
                const due = todo.due_date || '';
                const detailText = todo.detail ? String(todo.detail).slice(0, 80) : '-';
                const platformNames = Array.isArray(todo.platform_type_names) ? todo.platform_type_names : [];
                const platformCell = platformNames.length
                    ? platformNames.map(n => escapeHtml(String(n))).join('、')
                    : '<span style="color:#999;">—</span>';
                const completedAt = todo.my_completed_at ? String(todo.my_completed_at) : '';
                const dueForCompare = String(due || start || '').slice(0, 10);
                const isOverdue = status !== 'done' && !!dueForCompare && dueForCompare <= todayStr;
                return `
                    <tr data-todo-id="${todo.id}" class="${isOverdue ? 'todo-overdue' : ''}">
                        <td>${escapeHtml(typeName)}</td>
                        <td>${prioritySegmentHtml(todo.priority)}</td>
                        <td class="todo-mini-sub">${platformCell}</td>
                        <td class="todo-title-cell">
                            <div style="font-weight:600;">${escapeHtml(todo.title || '')}</div>
                        </td>
                        <td class="todo-mini-sub">${escapeHtml(detailText)}</td>
                        <td>${escapeHtml(start || '-')}</td>
                        <td>${escapeHtml(due || '-')}</td>
                        <td>${todoStatusSegmentHtml(status, todo.id, completedAt)}</td>
                        <td>
                            ${
                                status === 'done'
                                    ? `<input type="text" class="optional-field todo-completed-at-input app-datetime-text-input" data-todo-id="${todo.id}" value="${formatTodoDateTimeTextFromServer(completedAt)}" placeholder="YYYY-MM-DD HH:MM" title="编辑完成时间（自动保存）">`
                                    : `<span style="color:#999;">—</span>`
                            }
                        </td>
                        <td>${todoOtherAssigneesCellHtml(todo)}</td>
                        <td>
                            <div class="pm-actions">
                                <button class="btn-secondary" type="button" data-todo-action="edit" data-id="${todo.id}">编辑</button>
                                <button class="btn-danger" type="button" data-todo-action="delete" data-id="${todo.id}">删除</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function toDatetimeLocalValue(text) {
            if (!text) return '';
            const s = String(text).trim();
            const t = s.replace('T', ' ').slice(0, 19);
            const m = t.match(/^(\d{4}-\d{2}-\d{2})[ ](\d{2}:\d{2})/);
            if (!m) return '';
            return `${m[1]}T${m[2]}`;
        }

        function priorityLabel(v) {
            const n = parseInt(v || '0', 10) || 0;
            if (n === 3) return '高';
            if (n === 2) return '中';
            if (n === 1) return '低';
            return '-';
        }

        function escapeHtml(text) {
            const s = String(text == null ? '' : text);
            return s
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

            const host = document.getElementById('todoTypeBar');
            if (!host) return;
            const addBtn = host.querySelector('.material-type-add');
            host.innerHTML = '';
            if (addBtn) host.appendChild(addBtn);

            const selected = parseInt(window.todoSelectedTypeId || '0', 10) || 0;
            const makeBtn = (id, name) => {
                const label = document.createElement('label');
                label.className = 'material-type-option material-type-radio';
                label.dataset.typeId = String(id);
                label.innerHTML = `<input type="radio" name="todoTypeFilter" value="${id}"><span>${escapeHtml(name)}</span>`;
                const input = label.querySelector('input');
                if (input) {
                    input.checked = (selected === id);
                    input.addEventListener('click', () => {
                        window.todoSelectedTypeId = id;
                        renderTodoTypeBar();
                        loadTodos();
                    });
                }
                label.addEventListener('dblclick', () => {
                    if (id > 0) openTodoTypeModal('edit', id);
                });
                return label;
            };

            host.appendChild(makeBtn(0, '全部'));
            (window.todoTypesCache || []).forEach(t => {
                const id = parseInt(t.id, 10) || 0;
                if (!id) return;
                host.appendChild(makeBtn(id, t.type_name || ('类型#' + id)));

        function ensureTodoTypeOptions(preferId) {
            const types = window.todoTypesCache || [];
            const seg = document.getElementById('todoModalTypeSegment');
            if (!seg) return;
            const prefer = parseInt(preferId || '0', 10) || 0;
            seg.innerHTML = '';
            (types || []).forEach(t => {
                const id = parseInt(t.id, 10) || 0;
                if (!id) return;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'status-pill status-pill--enabled';
                btn.dataset.value = String(id);
                btn.textContent = t.type_name || ('类型#' + id);
                seg.appendChild(btn);
            });
            bindSegmentButtons(seg);
            let target = prefer;
            if (!target) {
                const def = (types || []).find(x => String(x.type_name || '').trim() === '默认');
                target = def ? (parseInt(def.id, 10) || 0) : 0;
            }
            if (target) setSegmentValue(seg, String(target));
        }

        function bindSegmentButtons(seg) {
            if (!seg || seg.dataset.bound === '1') return;
            seg.dataset.bound = '1';
            seg.addEventListener('click', (e) => {
                const btn = e.target && e.target.closest ? e.target.closest('.status-pill[data-value]') : null;
                if (!btn) return;
                setSegmentValue(seg, String(btn.dataset.value || ''));
            });
        }

        function setSegmentValue(seg, value) {
            if (!seg) return;
            const v = String(value == null ? '' : value);
            seg.dataset.value = v;
            seg.querySelectorAll('.status-pill').forEach(btn => {
                btn.classList.toggle('is-active', String(btn.dataset.value || '') === v);
            });
            if (seg.id === 'todoModalPrioritySegment') {
                const hid = document.getElementById('todoModalPriorityVal');
                if (hid) hid.value = v;
            }
            if (seg.id === 'todoModalRecurringSegment') {
                const hid = document.getElementById('todoModalIsRecurringVal');
                if (hid) hid.value = v;
                syncTodoRecurringUi();
            }
            if (seg.id === 'todoModalCompleteStatusSegment') {
                const hid = document.getElementById('todoModalCompleteStatusVal');
                if (hid) hid.value = v;
                syncTodoCompletionUi();
            }
            if (seg.id === 'todoModalTypeSegment') {
                const hid = document.getElementById('todoModalTypeId');
                if (hid) hid.value = v;
            }
        }

        function openTodoTypeModal(mode, typeId) {
            const modal = document.getElementById('todoTypeModal');
            if (!modal) return;
            const titleEl = document.getElementById('todoTypeModalTitle');
            const idEl = document.getElementById('todoTypeModalId');
            const nameEl = document.getElementById('todoTypeModalName');
            const sortEl = document.getElementById('todoTypeModalSort');
            const delBtn = document.getElementById('todoTypeModalDeleteBtn');
            resetModalHint('todoTypeModalHint');
            if (mode === 'edit' && typeId) {
                const idNum = parseInt(typeId, 10) || 0;
                const row = (window.todoTypesCache || []).find(x => parseInt(x.id, 10) === idNum) || {};
                if (titleEl) titleEl.textContent = '编辑待办类型';
                if (idEl) idEl.value = String(idNum);
                if (nameEl) nameEl.value = row.type_name || '';
                if (sortEl) sortEl.value = String(row.sort_order || 0);
                if (delBtn) delBtn.style.display = '';
            } else {
                if (titleEl) titleEl.textContent = '新增待办类型';
                if (idEl) idEl.value = '';
                if (nameEl) nameEl.value = '';
                if (sortEl) sortEl.value = '0';
                if (delBtn) delBtn.style.display = 'none';

        function closeTodoTypeModal() {
            const modal = document.getElementById('todoTypeModal');
            if (modal) modal.classList.remove('active');

        async function submitTodoType() {
            const id = parseInt((document.getElementById('todoTypeModalId') || {}).value || '0', 10) || 0;
            const type_name = (document.getElementById('todoTypeModalName') || {}).value
                ? document.getElementById('todoTypeModalName').value.trim()
                : '';
            const sort_order = parseInt((document.getElementById('todoTypeModalSort') || {}).value || '0', 10) || 0;
            if (!type_name) {
                showModalHint('todoTypeModalHint', '请填写类型名称', true);
                return;
            }
            try {
                const resp = await fetch('/api/todo-type', {
                    method: id ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(id ? { id, type_name, sort_order } : { type_name, sort_order })
                });
                const data = await resp.json();
                if (!data || data.status !== 'success') throw new Error((data && data.message) || '保存失败');
                await loadTodoTypes();
                showModalHint('todoTypeModalHint', '保存成功', false);
                setTimeout(() => closeTodoTypeModal(), 400);
            } catch (err) {
                showModalHint('todoTypeModalHint', err && err.message ? err.message : '保存失败', true);
            }
        }

        async function deleteTodoType() {
            const id = parseInt((document.getElementById('todoTypeModalId') || {}).value || '0', 10) || 0;
            if (!id) return;
            const ok = window.showAppConfirmAsync
                ? await window.showAppConfirmAsync('确认删除该待办类型？')
                : confirm('确认删除该待办类型？');
            if (!ok) return;
            try {
                const resp = await fetch('/api/todo-type', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ id })
                });
                const data = await resp.json();
                if (!data || data.status !== 'success') throw new Error((data && data.message) || '删除失败');
                await loadTodoTypes();
                closeTodoTypeModal();
                if (parseInt(window.todoSelectedTypeId || '0', 10) === id) {
                    window.todoSelectedTypeId = 0;
                    renderTodoTypeBar();
                    loadTodos();
                }

                showModalHint('todoTypeModalHint', err && err.message ? err.message : '删除失败', true);

        async function setTodoCompletedNow(todoId) {
            const id = parseInt(todoId || '0', 10) || 0;
            if (!id) return;
            const prev = (window.homeTodosCache || []).find(t => (parseInt(t.id, 10) || 0) === id);
            const optimisticAt = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const optimisticAtText = `${optimisticAt.getFullYear()}-${pad(optimisticAt.getMonth() + 1)}-${pad(optimisticAt.getDate())} ${pad(optimisticAt.getHours())}:${pad(optimisticAt.getMinutes())}:${pad(optimisticAt.getSeconds())}`;
            if (prev) {
                mergeTodoIntoCaches({
                    ...prev,
                    my_is_completed: 1,
                    my_completed_at: optimisticAtText
                });
                renderTodoTable(window.homeTodosCache || []);
            }
            try {
                const resp = await fetch('/api/todo', {
                    method: 'PUT',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, is_completed: 1 })
                });
                const data = await resp.json();
                if (!data || data.status !== 'success') throw new Error((data && data.message) || '更新失败');
                if (data.item) {
                    mergeTodoIntoCaches(data.item);
                    renderTodoTable(window.homeTodosCache || []);
                    refreshCalendarFromCache();
                } else {
                    await loadTodos({ skipRecurringReset: true });
                    refreshCalendarFromCache();
                }
                if (window.showAppToast) window.showAppToast('已标记为已完成', false, 1600);
            } catch (err) {
                if (prev) {
                    mergeTodoIntoCaches(prev);
                    renderTodoTable(window.homeTodosCache || []);
                }
                if (window.showAppToast) window.showAppToast(err && err.message ? err.message : '更新失败', true, 0);
            }
        }

        async function updateTodoCompletedAtAuto(todoId, datetimeLocalValue) {
            const id = parseInt(todoId || '0', 10) || 0;
            if (!id) return;
            const v = String(datetimeLocalValue || '').trim();
            const completed_at = toCompletedAtSeconds(v);
            if (!completed_at) return;
            try {

                    method: 'PUT',
                    credentials: 'include',

                });

                if (!data || data.status !== 'success') throw new Error((data && data.message) || '保存失败');

                    mergeTodoIntoCaches(data.item);
                    renderTodoTable(window.homeTodosCache || []);
                    refreshCalendarFromCache();

                    await loadTodos({ skipRecurringReset: true });
                    refreshCalendarFromCache();
                }
                if (window.showAppToast) window.showAppToast('完成时间已保存', false, 1400);
            } catch (err) {
                if (window.showAppToast) window.showAppToast(err && err.message ? err.message : '保存失败', true, 0);
