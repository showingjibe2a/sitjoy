        async function confirmTodoDelete(todoItem) {
            const isCreator = Number(todoItem && todoItem.created_by || 0) > 0
                && Number(todoItem.created_by || 0) === Number(window.currentUserId || 0);
            const title = todoItem && todoItem.title ? String(todoItem.title) : '该任务';
            const ask = async (message, confirmText) => {
                if (window.showAppConfirmAsync) {
                    return !!(await window.showAppConfirmAsync({
                        title: '删除确认',
                        message,
                        confirmText: confirmText || '确认删除'
                    }));
                }
                return confirm(message);
            };
            if (!isCreator) {
                const okSelf = await ask(`确认删除「${title}」吗？\n\n此操作只会删除你自己的任务记录，不会影响其他被指派人。`, '删除我的任务');
                return { ok: okSelf, delete_scope: 'self' };
            }

            const removeAll = await ask(
                `你是该任务的指派人。\n\n是否删除整个任务（包含所有被指派人的任务）？\n\n任务：${title}`,
                '删除整个任务'
            );
            if (removeAll) return { ok: true, delete_scope: 'all' };

            const removeSelf = await ask(
                `是否仅删除你自己的任务记录？\n\n其他被指派人的任务会保留。`,
                '仅删除我的任务'
            );
            return { ok: removeSelf, delete_scope: 'self' };
        }

        function loadEmployeesForCalendar() {
            return fetch('/api/employee', { credentials: 'include' })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        window.calendarEmployeesCache = data.items || [];
                    } else {
                        window.calendarEmployeesCache = [];
                    }
                    return window.calendarEmployeesCache;
                })
                .catch(() => {
                    window.calendarEmployeesCache = [];
                    return [];
                });
        }

        async function loadCalendar(options = {}) {
            const yearValue = parseInt(document.getElementById('calendarYear').value, 10);
            const monthValue = parseInt(document.getElementById('calendarMonth').value, 10);
            const today = new Date();
            const year = Number.isNaN(yearValue) ? today.getFullYear() : yearValue;
            const month = Number.isNaN(monthValue) ? today.getMonth() + 1 : monthValue;
            const grid = document.getElementById('calendarGrid');
            if (!grid) return;
            grid.innerHTML = '';

            const forceReload = !!options.forceReload;
            const useCacheOnly = !!options.useCacheOnly;
            let todos = Array.isArray(window.calendarTodosCache) ? window.calendarTodosCache : null;
            let employees = Array.isArray(window.calendarEmployeesCache) ? window.calendarEmployeesCache : null;

            if (useCacheOnly && todos && employees) {
                // 使用内存缓存重绘，避免重复请求
            } else if (forceReload || !todos || !employees) {
                const loaders = [];
                if (forceReload || !todos) loaders.push(loadTodos().catch(() => []));
                else loaders.push(Promise.resolve(todos));
                if (forceReload || !employees) loaders.push(loadEmployeesForCalendar().catch(() => []));
                else loaders.push(Promise.resolve(employees));
                const [todoItems, employeeItems] = await Promise.all(loaders);
                todos = Array.isArray(todoItems) ? todoItems : [];
                employees = Array.isArray(employeeItems) ? employeeItems : [];
            }

            const firstDay = new Date(year, month - 1, 1).getDay();
            const daysInMonth = new Date(year, month, 0).getDate();
            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];

            const header = document.createElement('div');
            header.style.cssText = 'grid-column: 1/-1; display:grid;grid-template-columns:repeat(7,1fr);gap:0;margin-bottom:10px;text-align:center;font-weight:600;font-size:12px;';
            dayNames.forEach(d => {
                const span = document.createElement('span');
                span.textContent = d;
                span.style.padding = '8px';
                header.appendChild(span);
            });
            grid.appendChild(header);

            for (let i = 0; i < firstDay; i++) {
                const blank = document.createElement('div');
                blank.className = 'calendar-day is-empty';
                grid.appendChild(blank);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = formatDateKey(year, month, day);
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                dayEl.dataset.date = dateStr;

                const label = document.createElement('div');
                label.className = 'calendar-day-header';
                label.textContent = day;
                dayEl.appendChild(label);

                const todayCheck = new Date();
                const isToday = day === todayCheck.getDate() && month === todayCheck.getMonth() + 1 && year === todayCheck.getFullYear();
                if (isToday) {
                    dayEl.classList.add('is-today');
                }

                dayEl.addEventListener('mouseenter', (e) => showCalendarTooltip(dateStr, e.pageX, e.pageY));
                dayEl.addEventListener('mouseleave', () => hideCalendarTooltip());
                dayEl.addEventListener('click', () => {
                    document.querySelectorAll('.calendar-day.is-selected').forEach(n => n.classList.remove('is-selected'));
                    dayEl.classList.add('is-selected');
                });

                const indicators = document.createElement('div');
                indicators.className = 'day-indicators';
                const todoCount = todos.filter(t => (t.effective_date || t.due_date || t.start_date) === dateStr).length;
                const bdayCount = employees.filter(emp => emp.birthday && emp.birthday.slice(5) === dateStr.slice(5)).length;
                if (todoCount > 0) {
                    const s = document.createElement('span');
                    s.className = 'indicator todo';
                    s.textContent = todoCount > 9 ? '9+' : todoCount;
                    indicators.appendChild(s);
                }
                if (bdayCount > 0) {
                    const s2 = document.createElement('span');
                    s2.className = 'indicator bday';
                    s2.textContent = bdayCount > 9 ? '9+' : bdayCount;
                    indicators.appendChild(s2);
                }
                dayEl.appendChild(indicators);

                grid.appendChild(dayEl);
            }
        }

        function showCalendarTooltip(dateStr, x, y) {
            let tip = document.getElementById('calendarTooltip');
            if (!tip) {
                tip = document.createElement('div');
                tip.id = 'calendarTooltip';
                document.body.appendChild(tip);
            }
            tip.className = 'calendar-tooltip';
            tip.style.left = (x + 12) + 'px';
            tip.style.top = (y + 12) + 'px';
            tip.style.display = 'block';

            const todos = (window.calendarTodosCache || []);
            const employees = (window.calendarEmployeesCache || []);
            const todoItems = todos.filter(t => (t.effective_date || t.due_date || t.start_date) === dateStr);
            const bdays = employees.filter(emp => emp.birthday && emp.birthday.slice(5) === dateStr.slice(5));

            let html = '';
            if (todoItems.length === 0 && bdays.length === 0) {
                html = '<div style="min-width:160px;padding:6px 8px;color:#cfc7bd">当日无待办或生日</div>';
            } else {
                if (todoItems.length > 0) {
                    html += '<div style="padding:6px 8px"><strong>待办</strong><ul style="margin:6px 0 0;padding-left:16px;">';
                    todoItems.slice(0, 6).forEach(t => {
                        const pt = (Array.isArray(t.platform_type_names) && t.platform_type_names.length)
                            ? `<div style="font-size:12px;color:#b8a990;margin-top:2px;">平台：${t.platform_type_names.map(x => escapeHtml(String(x || ''))).join('、')}</div>`
                            : '';
                        html += `<li style="font-size:13px;line-height:1.3;color:#ece7df">${t.title}${t.detail ? '<div style="font-size:12px;color:#cfc7bd">'+(t.detail||'')+'</div>' : ''}${pt}</li>`;
                    });
                    if (todoItems.length > 6) html += `<li style="font-size:12px;color:#cfc7bd">等 ${todoItems.length - 6} 项...</li>`;
                    html += '</ul></div>';
                }
                if (bdays.length > 0) {
                    html += '<div style="padding:6px 8px;margin-top:6px"><strong>生日</strong><ul style="margin:6px 0 0;padding-left:16px;">';
                    bdays.slice(0, 6).forEach(b => {
                        html += `<li style="font-size:13px;line-height:1.3;color:#f3f0ec">${b.name || b.username || '用户'} (${(b.birthday||'').slice(5)})</li>`;
                    });
                    if (bdays.length > 6) html += `<li style="font-size:12px;color:#cfc7bd">等 ${bdays.length - 6} 人...</li>`;
                    html += '</ul></div>';
                }
            }

            tip.innerHTML = html;
            const margin = 10;
            const viewportW = window.innerWidth || document.documentElement.clientWidth || 0;
            const viewportH = window.innerHeight || document.documentElement.clientHeight || 0;
            const rect = tip.getBoundingClientRect();
            let left = x + 12;
            let top = y + 12;
            if (viewportW > 0 && rect.right > viewportW - margin) {
                left = Math.max(margin, x - rect.width - 12);
            }
            if (viewportH > 0 && rect.bottom > viewportH - margin) {
                top = Math.max(margin, y - rect.height - 12);
            }
            tip.style.left = left + 'px';
            tip.style.top = top + 'px';
        }

        function hideCalendarTooltip() {
            const tip = document.getElementById('calendarTooltip');
            if (tip) tip.style.display = 'none';
        }

        const _calMonthNames = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
        let _calPickerTempYear = new Date().getFullYear();

        function _updateCalPickerUI(year, month) {
            document.getElementById('calendarYear').value = year;
            document.getElementById('calendarMonth').value = month;
            const btn = document.getElementById('calPickerBtn');
            if (btn) btn.textContent = year + '年 ' + _calMonthNames[month - 1] + ' ▾';
            const lbl = document.getElementById('calPickerYearLabel');
            if (lbl) lbl.textContent = _calPickerTempYear;
            document.querySelectorAll('#calPickerMonths .cal-picker-m').forEach(el => {
                const m = parseInt(el.dataset.month, 10);
                const thisYear = parseInt(el.dataset.year, 10);
                el.classList.toggle('is-active', thisYear === year && m === month);
            });
        }

        function buildCalendarControls() {
            const today = new Date();
            _calPickerTempYear = today.getFullYear();
            const monthsEl = document.getElementById('calPickerMonths');
            if (monthsEl) {
                monthsEl.innerHTML = _calMonthNames.map((name, idx) =>
                    `<button type="button" class="cal-picker-m" data-month="${idx + 1}" data-year="${_calPickerTempYear}">${name}</button>`
                ).join('');
            }
            _updateCalPickerUI(today.getFullYear(), today.getMonth() + 1);
            const todayLabel = document.getElementById('todayLabel');
            if (todayLabel) {
                todayLabel.textContent = `${today.getMonth() + 1}月${today.getDate()}日`;
            }
        }

        function bindEvents() {
            const prevMonthBtn = document.getElementById('prevMonthBtn');
            if (prevMonthBtn) {
                prevMonthBtn.addEventListener('click', () => {
                const year = parseInt(document.getElementById('calendarYear').value, 10);
                let month = parseInt(document.getElementById('calendarMonth').value, 10);
                month--;
                if (month < 1) {
                    month = 12;
                    _calPickerTempYear = year - 1;
                    _updateCalPickerUI(year - 1, month);
                } else {
                    _updateCalPickerUI(year, month);
                }
                loadCalendar();
                });
            }
            
            const nextMonthBtn = document.getElementById('nextMonthBtn');
            if (nextMonthBtn) {
                nextMonthBtn.addEventListener('click', () => {
                const year = parseInt(document.getElementById('calendarYear').value, 10);
                let month = parseInt(document.getElementById('calendarMonth').value, 10);
                month++;
                if (month > 12) {
                    month = 1;
                    _calPickerTempYear = year + 1;
                    _updateCalPickerUI(year + 1, month);
                } else {
                    _updateCalPickerUI(year, month);
                }
                loadCalendar();
                });
            }

            const calendarTodayBtn = document.getElementById('calendarTodayBtn');
            if (calendarTodayBtn) {
                calendarTodayBtn.addEventListener('click', () => {
                    const today = new Date();
                    _calPickerTempYear = today.getFullYear();
                    _updateCalPickerUI(today.getFullYear(), today.getMonth() + 1);
                    loadCalendar();
                });
            }

            // 日历年月弹出选择器
            const calPickerBtn = document.getElementById('calPickerBtn');
            const calPickerPanel = document.getElementById('calPickerPanel');
            if (calPickerBtn && calPickerPanel) {
                calPickerBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    const open = calPickerPanel.classList.toggle('is-open');
                    if (open) {
                        const curYear = parseInt(document.getElementById('calendarYear').value, 10);
                        _calPickerTempYear = curYear;
                        // 重新生成月份按钮并更新年分 label
                        const monthsEl = document.getElementById('calPickerMonths');
                        if (monthsEl) {
                            monthsEl.innerHTML = _calMonthNames.map((name, idx) =>
                                `<button type="button" class="cal-picker-m" data-month="${idx + 1}" data-year="${_calPickerTempYear}">${name}</button>`
                            ).join('');
                        }
                        const curMonth = parseInt(document.getElementById('calendarMonth').value, 10);
                        _updateCalPickerUI(curYear, curMonth);
                    }
                });
            }

            const calPickerPrevYear = document.getElementById('calPickerPrevYear');
            if (calPickerPrevYear) {
                calPickerPrevYear.addEventListener('click', e => {
                    e.stopPropagation();
                    _calPickerTempYear--;
                    const monthsEl = document.getElementById('calPickerMonths');
                    if (monthsEl) {
                        monthsEl.innerHTML = _calMonthNames.map((name, idx) =>
                            `<button type="button" class="cal-picker-m" data-month="${idx + 1}" data-year="${_calPickerTempYear}">${name}</button>`
                        ).join('');
                    }
                    const lbl = document.getElementById('calPickerYearLabel');
                    if (lbl) lbl.textContent = _calPickerTempYear;
                    const curYear = parseInt(document.getElementById('calendarYear').value, 10);
                    const curMonth = parseInt(document.getElementById('calendarMonth').value, 10);
                    // 重新标记活跃月分
                    document.querySelectorAll('#calPickerMonths .cal-picker-m').forEach(el => {
                        el.classList.toggle('is-active',
                            parseInt(el.dataset.year, 10) === curYear &&
                            parseInt(el.dataset.month, 10) === curMonth);
                    });
                });
            }

            const calPickerNextYear = document.getElementById('calPickerNextYear');
            if (calPickerNextYear) {
                calPickerNextYear.addEventListener('click', e => {
                    e.stopPropagation();
                    _calPickerTempYear++;
                    const monthsEl = document.getElementById('calPickerMonths');
                    if (monthsEl) {
                        monthsEl.innerHTML = _calMonthNames.map((name, idx) =>
                            `<button type="button" class="cal-picker-m" data-month="${idx + 1}" data-year="${_calPickerTempYear}">${name}</button>`
                        ).join('');
                    }
                    const lbl = document.getElementById('calPickerYearLabel');
                    if (lbl) lbl.textContent = _calPickerTempYear;
                    const curYear = parseInt(document.getElementById('calendarYear').value, 10);
                    const curMonth = parseInt(document.getElementById('calendarMonth').value, 10);
                    document.querySelectorAll('#calPickerMonths .cal-picker-m').forEach(el => {
                        el.classList.toggle('is-active',
                            parseInt(el.dataset.year, 10) === curYear &&
                            parseInt(el.dataset.month, 10) === curMonth);
                    });
                });
            }

            const calPickerMonths = document.getElementById('calPickerMonths');
            if (calPickerMonths) {
                calPickerMonths.addEventListener('click', e => {
                    e.stopPropagation();
                    const btn = e.target.closest('.cal-picker-m');
                    if (!btn) return;
                    const m = parseInt(btn.dataset.month, 10);
                    const y = parseInt(btn.dataset.year, 10);
                    _updateCalPickerUI(y, m);
                    if (calPickerPanel) calPickerPanel.classList.remove('is-open');
                    loadCalendar();
                });
            }

            document.addEventListener('click', e => {
                const panel = document.getElementById('calPickerPanel');
                const wrapEl = panel && panel.closest('.cal-picker-wrap');
                if (panel && wrapEl && !wrapEl.contains(e.target)) {
                    panel.classList.remove('is-open');
                }
            }, true);

            const assigneeToggle = document.getElementById('assigneeToggle');
            if (assigneeToggle) {
                assigneeToggle.addEventListener('click', e => {
                    e.stopPropagation();
                    toggleAssigneeDropdown();
                });
            }

            const assigneeSearch = document.getElementById('todoModalAssigneeSearch');
            if (assigneeSearch) {
                assigneeSearch.addEventListener('input', () => {
                    renderAssigneeOptions(assigneeSearch.value);
                });
            }

            const assigneeList = document.getElementById('todoModalAssigneeList');
            if (assigneeList) {
                assigneeList.addEventListener('click', e => {
                    const option = e.target.closest('[data-assignee-id]');
                    if (!option) return;
                    selectAssigneeById(option.dataset.assigneeId);
                });
            }

            const assigneeSelected = document.getElementById('assigneeSelected');
            if (assigneeSelected) {
                assigneeSelected.addEventListener('click', e => {
                    const removeId = e.target.dataset.removeId;
                    if (!removeId) return;
                    removeAssigneeById(removeId);
                });
            }

            const todoSkuFamilySelected = document.getElementById('todoSkuFamilySelected');
            if (todoSkuFamilySelected) {
                todoSkuFamilySelected.addEventListener('click', e => {
                    const rid = parseInt(e.target.dataset.removeSf || '0', 10) || 0;
                    if (!rid) return;
                    setTodoSelectedSkuFamilyIds(getTodoSelectedSkuFamilyIds().filter(v => v !== rid));
                    updateTodoSkuFamilySelected();
                    renderTodoSkuFamilyOptions((document.getElementById('todoSkuFamilySearch') || {}).value || '');
                });
            }

            const todoSalesSkuSelected = document.getElementById('todoSalesSkuSelected');
            if (todoSalesSkuSelected) {
                todoSalesSkuSelected.addEventListener('click', e => {
                    const rid = parseInt(e.target.dataset.removeSp || '0', 10) || 0;
                    if (!rid) return;
                    setTodoSelectedSalesProductIds(getTodoSelectedSalesProductIds().filter(v => v !== rid));
                    updateTodoSalesSkuSelected();
                    renderTodoSalesSkuOptions((document.getElementById('todoSalesSkuSearch') || {}).value || '');
                });
            }

            const todoPlatformTypeSelected = document.getElementById('todoPlatformTypeSelected');
            if (todoPlatformTypeSelected) {
                todoPlatformTypeSelected.addEventListener('click', e => {
                    const rid = parseInt(e.target.dataset.removePt || '0', 10) || 0;
                    if (!rid) return;
                    setTodoSelectedPlatformTypeIds(getTodoSelectedPlatformTypeIds().filter(v => v !== rid));
                    updateTodoPlatformTypeSelected();
                    renderTodoPlatformTypeOptions((document.getElementById('todoPlatformTypeSearch') || {}).value || '');
                });
            }

            const todoTable = document.getElementById('todoTable');
            if (todoTable) {
                todoTable.addEventListener('click', e => {
                    const actionEl = e.target.closest('[data-todo-action]');
                    if (!actionEl) return;
                    const action = actionEl.dataset.todoAction;
                    const id = parseInt(actionEl.dataset.id || '0', 10) || 0;
                    if (!action || !id) return;
                    if (action === 'delete') {
                        const todoItem = (window.homeTodosCache || []).find(x => (parseInt(x.id, 10) || 0) === id) || { id: id };
                        confirmTodoDelete(todoItem).then(choice => {
                            if (!choice || !choice.ok) return;
                            return fetch('/api/todo', {
                                method: 'DELETE',
                                credentials: 'include',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ id: id, delete_scope: choice.delete_scope || 'self' })
                            })
                                .then(r => r.json())
                                .then(data => {
                                    if (!data || data.status !== 'success') {
                                        throw new Error((data && data.message) || '删除失败');
                                    }
                                    if (window.showAppToast) {
                                        const msg = String(data.delete_scope || choice.delete_scope) === 'all'
                                            ? '任务已删除（含所有被指派人）'
                                            : '已删除你自己的任务';
                                        window.showAppToast(msg, false, 1800);
                                    }
                                    loadTodos().then(() => refreshCalendarFromCache());
                                })
                                .catch(err => {
                                    if (window.showAppToast) window.showAppToast(err && err.message ? err.message : '删除失败', true, 0);
                                });
                        });
                        return;
                    }
                    if (action === 'edit') {
                        showTodoModal('edit', id);
                        return;
                    }
                    if (action === 'set-open') {
                        fetch('/api/todo', {
                            method: 'PUT',
                            credentials: 'include',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id: id, is_completed: 0 })
                        })
                            .then(r => r.json())
                            .then(data => {
                                if (!data || data.status !== 'success') throw new Error((data && data.message) || '更新失败');
                                if (data.item) {
                                    mergeTodoIntoCaches(data.item);
                                    renderTodoTable(window.homeTodosCache || []);
                                    refreshCalendarFromCache();
                                } else {
                                    loadTodos({ skipRecurringReset: true }).then(() => refreshCalendarFromCache());
                                }
                                if (window.showAppToast) window.showAppToast('已更新为未完成', false, 1800);
                            })
                            .catch(err => {
                                if (window.showAppToast) window.showAppToast(err && err.message ? err.message : '更新失败', true, 0);
                            });
                        return;
                    }
                    if (action === 'set-done') {
                        setTodoCompletedNow(id);
                        return;
                    }
                });
            }

            if (todoTable) {
                todoTable.addEventListener('change', (e) => {
                    const input = e.target && e.target.classList && e.target.classList.contains('todo-completed-at-input') ? e.target : null;
                    if (!input) return;
                    const id = parseInt(input.dataset.todoId || '0', 10) || 0;
                    if (!id) return;
                    if (!guardTodoCompletedAtInput(input)) {
                        window.showAppToast && window.showAppToast('无效完成时间，已回退', true, 3200);
                        return;
                    }
                    updateTodoCompletedAtAuto(id, input.value || '');
                });
            }

            // recurring now uses segment

            // bind segments
            bindSegmentButtons(document.getElementById('todoModalPrioritySegment'));
            bindSegmentButtons(document.getElementById('todoModalRecurringSegment'));
            bindSegmentButtons(document.getElementById('todoModalCompleteStatusSegment'));
            const todoModalStartDate = document.getElementById('todoModalStartDate');
            if (todoModalStartDate) {
                todoModalStartDate.addEventListener('change', syncRecurringDueDate);
            }
            const todoModalReminderInterval = document.getElementById('todoModalReminderInterval');
            if (todoModalReminderInterval) {
                todoModalReminderInterval.addEventListener('input', syncRecurringDueDate);
                todoModalReminderInterval.addEventListener('change', syncRecurringDueDate);
            }
            const todoModalCompletedAtInput = document.getElementById('todoModalCompletedAtInput');
            if (todoModalCompletedAtInput) {
                // Initialize last valid value
                todoModalCompletedAtInput.dataset.lastValid = String(todoModalCompletedAtInput.value || '').trim();
                const onCompletedAtChange = () => {
                    // soft validation while typing: allow partial input without bouncing cursor
                    guardTodoCompletedAtInput(todoModalCompletedAtInput, { soft: true });
                    const v = String(todoModalCompletedAtInput.value || '').trim();
                    const completedAt = toCompletedAtSeconds(v);
                    if (completedAt) {
                        window.todoModalCurrentCompletedAt = completedAt;
                        syncRecurringDueDate();
                    }
                };
                todoModalCompletedAtInput.addEventListener('input', onCompletedAtChange);
                todoModalCompletedAtInput.addEventListener('change', onCompletedAtChange);
            }
            const todoModalCompletedAtPickBtn = document.getElementById('todoModalCompletedAtPickBtn');
            if (todoModalCompletedAtPickBtn) {
                todoModalCompletedAtPickBtn.addEventListener('click', openTodoDateTimePickerModal);
            }

            const bindBackdrop = window.bindPmModalBackdropClose;
            if (typeof bindBackdrop === 'function') {
                const todoModalEl = document.getElementById('todoModal');
                if (todoModalEl) bindBackdrop(todoModalEl, closeTodoModal);
                const todoTypeModalEl = document.getElementById('todoTypeModal');
                if (todoTypeModalEl) bindBackdrop(todoTypeModalEl, closeTodoTypeModal);
            }

            document.addEventListener('click', e => {
                const dropdown = document.getElementById('assigneeDropdown');
                if (dropdown && !dropdown.contains(e.target)) {
                    closeAssigneeDropdown();
                }
            });

            const profileEditBtn = document.getElementById('homeProfileEditBtn');
            if (profileEditBtn) profileEditBtn.addEventListener('click', openProfileModal);
            const profileSaveBtn = document.getElementById('profileSaveBtn');
            if (profileSaveBtn) profileSaveBtn.addEventListener('click', saveProfile);
            const profileAvatarInput = document.getElementById('profileAvatarInput');
            if (profileAvatarInput) {
                profileAvatarInput.addEventListener('change', e => {
                    const file = e.target.files && e.target.files[0];
                    if (file) uploadProfileAvatar(file);
                    e.target.value = '';
                });
            }
            const profileAvatarRemoveBtn = document.getElementById('profileAvatarRemoveBtn');
            if (profileAvatarRemoveBtn) profileAvatarRemoveBtn.addEventListener('click', removeProfileAvatar);
            const profileChangePasswordBtn = document.getElementById('profileChangePasswordBtn');
            if (profileChangePasswordBtn) profileChangePasswordBtn.addEventListener('click', changeProfilePassword);
        }

        window.addEventListener('load', () => {
            renderHomeProfileGreeting();
            if (window.SitjoyTheme && typeof window.SitjoyTheme.mountHomeLauncher === 'function') {
                window.SitjoyTheme.mountHomeLauncher();
            }
            checkAuth().then(() => {
                buildCalendarControls();
                bindEvents();
                const extraLoads = [loadTodoTypes(), loadTodos(), loadEmployeesForCalendar()];
                Promise.all(extraLoads)
                    .then(() => loadCalendar())
                    .catch(() => loadCalendar());
            });
        });
    </script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/header.js"></script>
</body>
</html>
