<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面料管理</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/main-image-manager.css">
    <style>
        .multi-select-box {
            border: 1px solid var(--morandi-sand);
            border-radius: 10px;
            padding: 0.75rem;
            background: #fff;
        }
        .multi-select-filter {
            width: 100%;
            padding: 0.55rem 0.7rem;
            border-radius: 6px;
            border: 1px solid var(--morandi-sand);
            margin-bottom: 0.6rem;
        }
        .multi-select-options {
            max-height: 200px;
            overflow-y: auto;
            display: grid;
            gap: 0.4rem;
            margin-bottom: 0.6rem;
        }
        .multi-select-option {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.35rem 0.4rem;
            border-radius: 6px;
            background: var(--morandi-mist);
        }
        .multi-select-selected {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .multi-select-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            background: var(--morandi-sand);
            color: var(--morandi-ink);
            font-size: 0.85rem;
        }
        .multi-select-chip button {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
        }
        .pm-form-full {
            grid-column: 1 / -1;
        }
        .pm-modal-content.pm-modal-content--wide {
            max-width: min(1100px, calc(100vw - 40px));
            max-height: calc(100vh - 64px);
            display: flex;
            flex-direction: column;
        }
        .pm-modal-content.pm-modal-content--wide .pm-modal-body {
            overflow-y: auto;
            min-height: 0;
            padding-right: 0.25rem;
            margin-right: -0.25rem;
        }
        .fabric-color-cell {
            text-align: center !important;
            vertical-align: middle;
        }
        .fabric-color-dot {
            display: block;
            width: 14px;
            height: 14px;
            border-radius: 999px;
            border: 1px solid rgba(42, 36, 32, 0.25);
            margin: 0 auto;
        }
        .fabric-color-picker-row {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <div class="container">
        <section class="hero" style="margin-bottom: 1.5rem;">
            <h2>面料管理</h2>
            <p>维护面料编号、英文名称、面料类型与关联图片</p>
        </section>

        <section class="pm-layout">
            <div class="card pm-card">
                <div class="pm-toolbar">
                    <div class="pm-toolbar-actions">
                        <div class="form-group pm-search" style="margin: 0;">
                            <span class="pm-search-title">搜索</span>
                            <input type="text" id="searchInput" placeholder="搜索面料编号/英文名">
                            <button class="btn-primary" onclick="loadFabricList()">搜索</button>
                            <button class="btn-secondary" onclick="resetSearch()">清空</button>
                        </div>
                        <span class="pm-divider" aria-hidden="true"></span>
                        <button class="btn-accent" onclick="openCreateModal()">新增</button>
                    </div>
                </div>
            </div>

            <div>
                <table class="pm-table" id="fabricTable">
                    <thead>
                        <tr>
                            <th style="width:80px;" class="cell-center sj-th-thumb">图片</th>
                            <th>面料编号</th>
                            <th>面料英文名称</th>
                            <th style="width:90px;" class="cell-center">代表色</th>
                            <th>面料类型</th>
                            <th style="width:180px;">创建时间</th>
                            <th style="width:160px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="7" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <div class="pm-modal" id="pm-modal">
        <div class="pm-modal-content pm-modal-content--wide">
            <h3 id="pm-modal-title" style="margin-top:0;">新增面料</h3>
            <div class="pm-modal-body">
                <div class="pm-form">
                    <div class="form-group">
                        <label for="modalFabricCode">面料编号<span class="required-asterisk">*</span></label>
                        <input type="text" id="modalFabricCode" class="required-field" placeholder="例如：Beige">
                    </div>
                    <div class="form-group">
                        <label for="modalFabricNameEn">面料英文名称<span class="required-asterisk">*</span></label>
                        <input type="text" id="modalFabricNameEn" class="required-field" placeholder="例如：Greige">
                    </div>
                    <div class="form-group">
                        <label for="modalFabricMaterial">面料类型<span class="required-asterisk">*</span></label>
                        <select id="modalFabricMaterial" class="required-field"></select>
                    </div>
                    <div class="form-group">
                        <label for="modalRepresentativeColor">代表色（RGB）</label>
                        <div class="fabric-color-picker-row">
                            <span class="sj-color-swatch-picker">
                                <span class="sj-color-swatch-picker__disk"></span>
                                <span class="sj-color-swatch-picker__wand" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="m7 21 3-3m3.5-12.5a2.12 2.12 0 0 1 3 0l2.5 2.5a2.12 2.12 0 0 1 0 3L9 17"/>
                                    </svg>
                                </span>
                                <input type="color" id="modalRepresentativeColor" class="sj-color-swatch-picker__input" value="#CFC7BD">
                            </span>
                        </div>
                    </div>
                    <div class="form-group pm-form-full">
                        <label>关联货号（可多选）</label>
                        <div class="feature-category-picker" id="skuPicker">
                            <div class="feature-category-chips" id="skuChips"></div>
                            <div class="feature-category-dropdown" id="skuDropdown">
                                <button type="button" class="feature-category-add" id="skuAdd">
                                    <span class="feature-category-add-icon">+</span>
                                    <span class="feature-category-add-text">添加货号</span>
                                </button>
                                <div class="feature-category-menu" id="skuMenu">
                                    <input type="text" id="modalSkuFilter" placeholder="搜索货号" style="width:100%;padding:0.4rem;border:1px solid #ccc;border-radius:4px;margin-bottom:0.4rem;">
                                    <div class="feature-category-list" id="skuList"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="pm-section pm-form-full">
                        <h4>面料图片</h4>
                        <div class="pm-section-body pm-form">
                            <input type="file" id="modalImageUpload" accept="image/*,image/tiff,.tif,.tiff" multiple style="display:none;">
                            <div class="form-group pm-form-full">
                                <div class="mim-toolbar-row">
                                    <label class="mim-toolbar-label">图片管理</label>
                                    <div class="mim-toolbar-actions">
                                        <div class="status-segment status-segment--inline mim-status-segment-spaced">
                                            <button type="button" class="status-pill status-pill--no" id="fabricDupOff" onclick="setFabricImagePromptDuplicate(false)">重复提示：关</button>
                                            <button type="button" class="status-pill status-pill--yes is-active" id="fabricDupOn" onclick="setFabricImagePromptDuplicate(true)">重复提示：开</button>
                                        </div>
                                        <div class="status-segment status-segment--inline mim-status-segment-spaced">
                                            <button type="button" class="status-pill status-pill--no" id="fabricFabOff" onclick="setFabricImageShowFabric(false)">面料图：关</button>
                                            <button type="button" class="status-pill status-pill--yes is-active" id="fabricFabOn" onclick="setFabricImageShowFabric(true)">面料图：开</button>
                                        </div>
                                        <button type="button" class="btn-accent" id="fabricImageUploadBtn" onclick="triggerFabricImageUpload()">新增图片</button>
                                        <button type="button" class="btn-secondary" onclick="openFabricPickExistingImages()">选择已有图片</button>
                                        <button type="button" class="btn-secondary" onclick="openFabricNasImportModal()">从NAS选择并移动</button>
                                    </div>
                                </div>
                                <div class="main-images-manager main-images-manager--mt-sm">
                                    <div class="main-images-toolbar">
                                        <div class="image-type-bar" id="fabricImageTypeBar"></div>
                                    </div>
                                    <div id="fabricImageFolderTip" class="main-images-folder-tip">图片保存在「『面料』」目录；先在类型栏选择具体类型再新增（不要选「全部」）。双击卡片可编辑类型与备注，拖动可调整顺序。</div>
                                    <div id="selectedImagesGrid" class="sj-media-image-grid sj-media-image-grid--tight">
                                        <div class="sj-media-image-empty">未选择图片（可为空），可点击「新增图片」上传或「选择已有图片」从库中绑定</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="modalStatus" class="response" style="display:none; margin-top:0.75rem;"></div>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-primary" id="modalSaveBtn" onclick="saveFabricFromModal()">保存</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="fabric-image-edit-modal">
        <div class="pm-modal-content" style="max-width: 620px;">
            <h3 style="margin-top:0;" class="label-help">编辑图片类型/备注<span class="help-dot" data-tip="仅用于尚未保存到服务器的新上传图片；已入库图片请使用共享编辑弹窗。"></span></h3>
            <div class="form-group pm-form-full" style="margin-top:0.55rem;">
                <label>图片类型</label>
                <div class="image-type-bar" id="fabricImageEditTypeBar"></div>
            </div>
            <div class="form-group pm-form-full" style="margin-top:0.55rem;">
                <label for="fabricImageRemarkInput">图片备注</label>
                <textarea id="fabricImageRemarkInput" class="optional-field" placeholder="请输入图片备注（可为空）" style="min-height: 160px;"></textarea>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" onclick="closeFabricImageEditModal()">取消</button>
                <button class="btn-primary" type="button" onclick="saveFabricImageEditFromModal()">保存</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="imageDeleteConfirmModal">
        <div class="pm-modal-content" style="max-width:520px;">
            <h3 style="margin-top:0;">确认永久删除</h3>
            <div class="pm-modal-body">
                <p id="imageDeleteConfirmText" style="margin:0; color:#4a4e57; line-height:1.5;"></p>
            </div>
            <div class="pm-modal-actions">
                <button class="btn-secondary" type="button" id="imageDeleteCancelBtn">取消</button>
                <button class="btn-primary" type="button" id="imageDeleteOkBtn" style="background:#b94b4b;">确定永久删除</button>
            </div>
        </div>
    </div>

    <div class="pm-modal nas-main-image-import-modal" id="fabric-nas-import-modal">
        <div class="pm-modal-content pm-modal-content--wide">
            <div class="pm-modal-scroll">
                <div class="nas-main-image-header">
                    <div class="nas-main-image-title">
                        <h3 style="margin:0;">从NAS选择并移动（面料库）</h3>
                        <span class="help-dot" data-tip="服务器侧 NAS 浏览：移动文件到「『面料』」目录。文件夹请双击进入；多选模式下勾选后批量导入。"></span>
                    </div>
                    <div class="nas-main-image-header-actions">
                        <div class="nas-header-control">
                            <span class="nas-header-control-label">新增方式</span>
                            <div class="status-segment status-segment--inline" id="fabricNasActionModeSegment" data-value="multi">
                                <button type="button" class="status-pill" data-value="double" title="双击图片立即导入">双击</button>
                                <button type="button" class="status-pill is-active" data-value="multi" title="多选后点击批量导入">多选</button>
                            </div>
                        </div>
                        <div class="nas-header-control">
                            <span class="nas-header-control-label">图标尺寸</span>
                            <div class="status-segment status-segment--inline nas-thumb-segment" id="fabricNasThumbSizeSegment" data-value="lg">
                                <button type="button" class="status-pill status-pill--shipped is-active" data-value="lg" title="大图标">大</button>
                                <button type="button" class="status-pill status-pill--pending" data-value="sm" title="更小缩略图">小</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="pm-form">
                    <div class="form-group pm-form-full">
                        <label>图片类型</label>
                        <div class="pm-inline-panel">
                            <div id="fabricNasImageTypeBar" class="status-segment status-segment--inline"></div>
                        </div>
                    </div>
                    <div class="form-group pm-form-full">
                        <label>当前位置</label>
                        <div class="pm-inline-panel">
                            <nav id="fabricNasBreadcrumbs" class="nas-main-image-breadcrumb" aria-label="NAS 路径"></nav>
                        </div>
                    </div>
                    <div class="form-group pm-form-full">
                        <div class="nas-main-image-grid-meta" id="fabricNasGridMeta">
                            <label class="nas-grid-select-all" id="fabricNasSelectAllLabel">
                                <input type="checkbox" id="fabricNasSelectAllBox">
                                <span>全选</span>
                            </label>
                            <div class="nas-grid-count" id="fabricNasCountText">共 0 张图片</div>
                        </div>
                    </div>
                    <div class="form-group pm-form-full">
                        <div id="fabricNasList" class="browser-grid nas-main-image-browser-grid"></div>
                    </div>
                </div>
                <div id="fabricNasStatus" class="nas-main-image-status status-message" style="display:none; margin-top:0.75rem;" role="status"></div>
            </div>
            <div class="pm-modal-actions nas-main-image-modal-actions">
                <button type="button" class="btn-small" onclick="closeFabricNasImportModal()">关闭</button>
                <button type="button" class="btn-accent" onclick="fabricNasImportSelectedClick()">批量导入所选</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SITJOY | 内部使用</p>
    </footer>

    <script>
        let editId = null;
        let fabricImages = [];
        let fabricMaterialOptions = [];
        let skuFamilyOptions = [];
        let usedFabricImages = new Set();
        let excludeUsedImages = false;
        let selectedImageObjects = []; // [{image_name, remark(类型), description(备注), sort_order}]
        let selectedSkuFamilyIds = [];
        let currentEditingImageIndex = null;
        let fabricImageTypeOptions = [];
        let selectedFabricImageType = '';
        let selectedFabricImageFilterType = '全部';
        let fabricImagePromptDuplicate = true;
        let fabricImageShowFabric = true;
        const FABRIC_DUP_LS = 'sj.fabricImage.promptDup.v1';
        const FABRIC_FAB_LS = 'sj.fabricImage.showFabric.v1';

        function readFabricBoolLs(key, def) {
            try {
                const v = localStorage.getItem(key);
                if (v === null) return def;
                return v === '1';
            } catch (e) { return def; }
        }
        function writeFabricBoolLs(key, val) {
            try { localStorage.setItem(key, val ? '1' : '0'); } catch (e) {}
        }
        function syncFabricImageToolbarToggles() {
            document.getElementById('fabricDupOn')?.classList.toggle('is-active', !!fabricImagePromptDuplicate);
            document.getElementById('fabricDupOff')?.classList.toggle('is-active', !fabricImagePromptDuplicate);
            document.getElementById('fabricFabOn')?.classList.toggle('is-active', !!fabricImageShowFabric);
            document.getElementById('fabricFabOff')?.classList.toggle('is-active', !fabricImageShowFabric);
        }
        function setFabricImagePromptDuplicate(on) {
            fabricImagePromptDuplicate = !!on;
            writeFabricBoolLs(FABRIC_DUP_LS, fabricImagePromptDuplicate);
            syncFabricImageToolbarToggles();
        }
        function setFabricImageShowFabric(on) {
            fabricImageShowFabric = !!on;
            writeFabricBoolLs(FABRIC_FAB_LS, fabricImageShowFabric);
            syncFabricImageToolbarToggles();
            renderSelectedImagesGrid();
        }

        async function openFabricPickExistingImages() {
            const fabricCode = (document.getElementById('modalFabricCode')?.value || '').trim();
            if (!fabricCode) {
                showModalStatus('请先填写面料编号', true);
                return;
            }
            if (!window.SjPickExistingImages || typeof window.SjPickExistingImages.open !== 'function') {
                showModalStatus('选择已有图片组件未加载，请刷新页面后重试', true);
                return;
            }
            if (!window.FabricImageFlow) {
                showModalStatus('面料图片绑定组件未加载，请刷新页面后重试', true);
                return;
            }
            await window.SjPickExistingImages.open({
                context: 'fabric',
                fabricId: editId,
                fabricCode,
                getImageTypeOptions: () => fabricImageTypeOptions || [],
                getImportImageType: () => {
                    const bar = document.getElementById('fabricNasImageTypeBar');
                    const active = bar && bar.querySelector('button.status-pill.is-active');
                    const v = active ? String(active.getAttribute('data-value') || '').trim() : '';
                    return v || getDefaultFabricImageTypeForAdd();
                },
                title: '选择已有图片（面料库 · 未绑定）',
                onConfirm: (imageNames, imageType, data) => {
                    fabricNasOnAfterImport(imageNames, imageType, data);
                    loadFabricImages();
                    if (editId && data && data.bound) {
                        showModalStatus(data.message || `已绑定 ${data.bound} 张`, false);
                        loadFabricList();
                    } else if (data && data.message) {
                        showModalStatus(data.message, false);
                    }
                }
            });
        }

        function fabricNasOnAfterImport(imageNames, imageType, attachData) {
            const typeName = imageType || getDefaultFabricImageTypeForAdd();
            const itemsMap = new Map();
            ((attachData && attachData.items) || []).forEach(it => {
                const name = String(it.new_name || '').trim();
                if (name) itemsMap.set(name, it);
            });
            (imageNames || []).forEach(name => {
                if ((selectedImageObjects || []).some(x => (x.image_name || '') === name)) return;
                const meta = itemsMap.get(name) || {};
                selectedImageObjects.push({
                    image_name: name,
                    preview_b64: String(meta.preview_b64 || '').trim(),
                    remark: typeName,
                    description: '',
                    sort_order: selectedImageObjects.length,
                    is_enabled: 1,
                    is_deprecated: 0,
                });
            });
            renderSelectedImagesGrid();
            loadFabricImages();
        }
        function initFabricNasImportUi() {
            if (!window.FabricNasImportUi) return;
            window.FabricNasImportUi.configure({
                getFabricCode: () => (document.getElementById('modalFabricCode')?.value || '').trim(),
                getFabricId: () => editId || null,
                getImageTypeOptions: () => fabricImageTypeOptions || [],
                getImportImageType: () => {
                    const bar = document.getElementById('fabricNasImageTypeBar');
                    const active = bar && bar.querySelector('button.status-pill.is-active');
                    const v = active ? String(active.getAttribute('data-value') || '').trim() : '';
                    return v || getDefaultFabricImageTypeForAdd();
                },
                onAfterImport: fabricNasOnAfterImport
            });
            window.FabricNasImportUi.bindModalBackdrop();
        }
        function openFabricNasImportModal() {
            if (!window.FabricNasImportUi) {
                showModalStatus('NAS 浏览组件未加载，请刷新页面后重试', true);
                return;
            }
            initFabricNasImportUi();
            window.FabricNasImportUi.open();
        }
        function closeFabricNasImportModal() {
            window.FabricNasImportUi?.close();
        }
        function fabricNasImportSelectedClick() {
            window.FabricNasImportUi?.importSelected();
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeFabricImageTypeName(value) {
            const text = String(value || '').trim();
            if (!text) return '文字卖点图';
            if (text === '主图·Swatch') return 'Swatch';
            if (text === '主图·卖点') return '文字卖点图';
            return text;
        }

        function normalizeImageRemark(value) {
            const text = String(value || '').trim();
            const names = (fabricImageTypeOptions || []).map(x => String(x.name || '').trim()).filter(Boolean);
            if (text && names.includes(text)) return text;
            // legacy mappings
            if (text === '卖点图' || text.includes('卖点')) return '文字卖点图';
            if (text.toLowerCase().includes('swatch')) return 'Swatch';
            if (text.includes('A+')) {
                if (text.includes('电脑')) return 'A+·电脑端';
                if (text.includes('手机')) return 'A+·手机端';
                return 'A+·通用';
            }
            // default: prefer first enabled type if available
            if (names.length) return names[0];
            return '文字卖点图';
        }

        function loadFabricImageTypes() {
            return fetch('/api/sales-image-type?usage=fabric').then(r => r.json()).then(data => {
                if (data.status !== 'success') {
                    fabricImageTypeOptions = [];
                    renderFabricImageTypeBar();
                    return;
                }
                fabricImageTypeOptions = Array.isArray(data.items) ? data.items : [];
                renderFabricImageTypeBar();
            }).catch(() => {
                fabricImageTypeOptions = [];
                renderFabricImageTypeBar();
            });
        }

        function renderFabricImageTypeBar() {
            const bar = document.getElementById('fabricImageTypeBar');
            if (!bar) return;
            const list = (fabricImageTypeOptions || []).filter(x => String(x.name || '').trim());
            if (!list.length) {
                bar.innerHTML = '<span class="pm-select-empty" style="padding:0 .4rem;">暂无类型</span>';
                return;
            }
            if (!selectedFabricImageFilterType) selectedFabricImageFilterType = '全部';
            if (!selectedFabricImageType || !list.some(x => String(x.name || '').trim() === selectedFabricImageType)) {
                selectedFabricImageType = String(list[0].name || '').trim();
            }
            const radios = [{ name: '全部' }].concat(list).map(item => {
                const name = String(item.name || '').trim();
                const checked = (name === '全部'
                    ? selectedFabricImageFilterType === '全部'
                    : name === selectedFabricImageFilterType) ? 'checked' : '';
                return `
                    <label class="image-type-radio">
                        <input type="radio" name="fabricImageType" value="${escapeHtml(name)}" ${checked}>
                        <span>${escapeHtml(name)}</span>
                    </label>
                `;
            }).join('');
            bar.innerHTML = radios;
            bar.querySelectorAll('input[name="fabricImageType"]').forEach(el => {
                el.addEventListener('change', function() {
                    if (!this.checked) return;
                    const v = normalizeFabricImageTypeName(this.value);
                    if (v === '全部') {

        function getRemarkCategoryClass(remark) {

            if (normalized === '原图') return 'remark-original';

            if (normalized.startsWith('A+·')) return 'remark-aplus';

        function getImageItemByName(imageName) {
            const arr = (fabricImages || []);
            for (let it of arr) {
                if (!it) continue;
                if (it.name === imageName) return it;
                try {
                    const dec = tryDecodeNameFromB64(it.rawB64) || '';
                    if (dec === imageName) return it;
                } catch (e) {}
                if (it.rawB64 === imageName) return it;
            }
            return null;
        }

        function resolveFabricImagePathB64(img) {
            if (!img) return '';
            const stored = String(img.preview_b64 || '').trim();
            if (stored) return stored;
            const found = getImageItemByName(img.image_name);
            if (found && found.b64) return found.b64;
            if (img.image_name_raw_b64) {
                const nameDec = tryDecodeNameFromB64(img.image_name_raw_b64) || img.image_name || '';
                if (nameDec) return utf8ToB64(`『面料』/${nameDec}`);
            }
            return utf8ToB64(`『面料』/${img.image_name || ''}`);
        }

        function enrichSelectedImagesPreviewB64() {
            (selectedImageObjects || []).forEach(img => {
                if (!img || img._isNewUpload || String(img.preview_b64 || '').trim()) return;
                const found = getImageItemByName(img.image_name);
                if (found && found.b64) img.preview_b64 = found.b64;
            });
        }

        function getFabricImagePreviewSrc(imageName, width = 520, quality = 72) {
            const found = getImageItemByName(imageName);
            const fallbackPath = `『面料』/${imageName || ''}`;
            const fallbackB64 = utf8ToB64(fallbackPath);
            const imageB64 = found && found.b64 ? found.b64 : fallbackB64;
            return `/api/image-preview?id=${encodeURIComponent(imageB64)}&mode=thumb&w=${width}&q=${quality}`;
        }

        function getSelectedImagePreviewSrc(img, width = 520, quality = 72) {
            if (img && img._isNewUpload && img._fileObject instanceof File) {
                if (!img._localPreviewUrl) {
                    try {
                        img._localPreviewUrl = URL.createObjectURL(img._fileObject);
                    } catch (e) {
                        img._localPreviewUrl = '';
                    }
                }
                if (img._localPreviewUrl) return img._localPreviewUrl;
            }
            if (img && img.preview_b64) {
                return `/api/image-preview?id=${encodeURIComponent(img.preview_b64)}&mode=thumb&w=${width}&q=${quality}`;
            }
            return getFabricImagePreviewSrc(img ? img.image_name : '', width, quality);
        }

        function tryDecodeNameFromB64(rawB64) {
            if (window.SitjoyFsName && typeof window.SitjoyFsName.decodeFsNameFromB64 === 'function') {
                return window.SitjoyFsName.decodeFsNameFromB64(rawB64) || null;
            }
            if (!rawB64) return null;
            try {
                const binary = atob(rawB64);
                const bytes = new Uint8Array(binary.split('').map(c => c.charCodeAt(0)));
                const encs = ['utf-8', 'utf-8', 'gb18030', 'gbk', 'iso-8859-1'];
                for (let enc of encs) {
                    try {
                        if (window.TextDecoder) {
                            const dec = new TextDecoder(enc, { fatal: false }).decode(bytes);
                            if (dec && dec.indexOf('\uFFFD') === -1) return dec;
                        }
                    } catch (e) {
                        continue;
                    }
                }
                let s = '';
                for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
                return s;
            } catch (e) {
                return null;
            }
        }

        

        function utf8ToB64(text) {
            try {
                if (typeof TextEncoder !== 'undefined') {
                    const bytes = new TextEncoder().encode(text);
                    let binary = '';
                    bytes.forEach(b => binary += String.fromCharCode(b));
                    return btoa(binary);
                }
                return btoa(unescape(encodeURIComponent(text)));
            } catch (e) {
                return '';
            }
        }

        function enforceMutualExclusive(source) {
            const upload = document.getElementById('modalImageUpload');

            } else {

            }
        }

        function attachSelectedImages(fabricCode, selectedNames) {

            const items = [];
            (selectedNames || []).forEach(name => {

                    const decoded = tryDecodeNameFromB64(it.rawB64) || it.name || '';
                    return decoded === name;
                });
                if (found && found.rawB64) items.push(found.rawB64);
            });
            if (!items.length) return Promise.resolve({status: 'success', items: []});

            return fetch('/api/fabric-attach', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },

            }).then(r => r.json());

        function saveFabricFromModal() {
            const fabricCode = document.getElementById('modalFabricCode').value.trim();
            const fabricNameEn = document.getElementById('modalFabricNameEn').value.trim();
            const fabricMaterialId = document.getElementById('modalFabricMaterial').value;
            const representativeColor = (document.getElementById('modalRepresentativeColor').value || '').trim();

            if (!fabricCode || !fabricNameEn || !fabricMaterialId) {
                showModalStatus('请填写面料编号、英文名称并选择面料类型', true);
                return;
            }
            
            // 检查是否有新上传的文件
            const newUploads = selectedImageObjects.filter(img => img._isNewUpload);
            
            if (newUploads.length > 0) {
                // 需要先上传新图片
                const formData = new FormData();
                newUploads.forEach(img => {
                    if (img._fileObject) {
                        formData.append('file', img._fileObject);
                    }
                });
                formData.append('fabric_code', fabricCode);

                showModalStatus('上传中...', false);
                fetch('/api/fabric-upload', {
                    method: 'POST',
                    body: formData
                })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        // 上传成功，更新 selectedImageObjects 中的文件名
                        const uploadedNames = data.image_names || [];
                        let uploadIndex = 0;
                        selectedImageObjects.forEach(img => {
                            if (img._isNewUpload && uploadIndex < uploadedNames.length) {
                                if (img._localPreviewUrl) {
                                    try {
                                        URL.revokeObjectURL(img._localPreviewUrl);
                                    } catch (e) {}
                                }
                                img.image_name = uploadedNames[uploadIndex];
                                delete img._isNewUpload;
                                delete img._fileObject;
                                delete img._localPreviewUrl;
                                uploadIndex++;
                            }
                        });
                        // 继续保存
                        doFinalSave(fabricCode, fabricNameEn, fabricMaterialId, representativeColor);
                    } else {
                        showModalStatus(data.message || '上传失败', true);
                    }
                })
                .catch(err => showModalStatus('上传失败: ' + err, true));
            } else {
                // 没有新上传，直接保存
                doFinalSave(fabricCode, fabricNameEn, fabricMaterialId, representativeColor);
            }
        }
        
        function doFinalSave(fabricCode, fabricNameEn, fabricMaterialId, representativeColor) {
            // 使用新格式：images 数组包含 remark
            const payload = {
                fabric_code: fabricCode,
                fabric_name_en: fabricNameEn,
                material_id: fabricMaterialId,
                representative_color: representativeColor,
                images: selectedImageObjects.map((img, idx) => ({
                    image_name: img.image_name,
                    image_name_raw_b64: img.image_name_raw_b64 || '',
                    remark: img.remark || '',
                    description: String(img.description != null ? img.description : '').trim(),
                    sort_order: idx
                })),
                sku_family_ids: selectedSkuFamilyIds
            };
            
            let method = 'POST';
            if (editId) {
                payload.id = editId;
                method = 'PUT';
            }

            fetch('/api/fabric', {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    const isCreate = !editId;
                    showModalStatus(editId ? '更新成功' : '新增成功', false);
                    if (isCreate && window.opener && !window.opener.closed) {
                        try {
                            window.opener.postMessage({
                                type: 'fabric-created',
                                fabric: {
                                    id: data.id || null,
                                    fabric_code: fabricCode,
                                    fabric_name_en: fabricNameEn
                                }
                            }, '*');
                        } catch (e) {}
                    }
                    closeModal();
                    loadFabricList();
                    loadFabricImages();
                } else {
                    showModalStatus(data.message || '操作失败', true);
                }
            })
            .catch(err => showModalStatus('请求失败: ' + err, true));
        }

        function loadFabricList() {
            const q = document.getElementById('searchInput').value.trim();
            const url = q ? `/api/fabric?q=${encodeURIComponent(q)}` : '/api/fabric';
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.querySelector('#fabricTable tbody');
                    if (data.status !== 'success') {
                        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#a33;">${data.message || '加载失败'}</td></tr>`;
                        return;
                    }
                    if (data.warning) {
                        console.warn(data.warning);
                    }
                    const items = data.items || [];
                    usedFabricImages = new Set(
                        items
                            .flatMap(item => Array.isArray(item.image_names) ? item.image_names : [])
                    );
                    if (items.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">暂无数据</td></tr>';
                        return;
                    }
                    window._fabric_items = items;
                    tbody.innerHTML = items.map(item => {
                        const dateText = item.created_at ? new Date(item.created_at).toLocaleString('zh-CN') : '';
                        const imageNames = Array.isArray(item.image_names) ? item.image_names : [];
                        const imageName = imageNames.length ? imageNames[0] : (item.image_name || '');
                        const imagePath = imageName ? `『面料』/${imageName}` : '';
                        const imageB64 = imagePath ? utf8ToB64(imagePath) : '';
                        const imageThumb = imageB64
                            ? `<img class="sj-table-thumb-img" src="/api/image-preview?id=${encodeURIComponent(imageB64)}&mode=thumb&w=120&q=60" alt="${imageName}">`
                            : '';
                        const imageCount = imageNames.length > 1 ? `<div class="fabric-image-count">${imageNames.length}</div>` : '';
                        const thumbWrap = imageThumb
                            ? `<div class="fabric-thumb-wrap">${imageThumb}${imageCount}</div>`
                            : '<span class="sj-table-thumb-empty">暂无</span>';
                        const materialText = item.material_name ? `${item.material_name} / ${item.material_name_en || ''}` : '';
                        const colorText = String(item.representative_color || '').trim();
                        const colorDot = colorText
                            ? `<span class="fabric-color-dot" style="background:${colorText};" title="${(item.fabric_name_en || '').replace(/"/g, '&quot;')}"></span>`
                            : '';
                        return `
                            <tr data-sj-row-entity-id="${item.id}">
                                <td class="fabric-image-cell cell-center sj-cell-thumb" data-sj-preview="1">${thumbWrap}</td>
                                <td>${item.fabric_code}</td>
                                <td>${item.fabric_name_en}</td>
                                <td class="fabric-color-cell">${colorDot}</td>
                                <td>${materialText}</td>
                                <td>${dateText}</td>
                                <td>
                                    <div class="pm-actions">
                                        <button class="btn-secondary edit-btn" data-id="${item.id}">编辑</button>
                                        <button class="btn-danger" onclick='deleteFabric(${item.id})'>删除</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('');

                    // attach edit handlers safely
                    document.querySelectorAll('.edit-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const id = this.dataset.id;
                            const item = (window._fabric_items || []).find(it => String(it.id) === String(id));
                            if (item) openEditModal(item);
                        });
                    });
                    if (window.SitjoyRowImageRefresh) {
                        window.SitjoyRowImageRefresh.bustImagesIn(document.querySelector('#fabricTable tbody'));
                    }
                })
                .catch(err => {
                    const tbody = document.querySelector('#fabricTable tbody');
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#a33;">加载失败: ${err}</td></tr>`;
                });
        }

        let fabricMainImageGrid = null;

        function fabricImagePathB64(img) {
            return resolveFabricImagePathB64(img) || String(img.preview_b64 || '').trim();
        }

        function fabricImageToCardItem(img) {
            const normalizedRemark = normalizeImageRemark(img.remark);
            img.remark = normalizedRemark;
            if (img.description == null) img.description = '';
            const dep = Number(img.is_deprecated || 0);
            return {
                image_name: img.image_name,
                image_type_name: normalizeFabricImageTypeName(normalizedRemark),
                description: String(img.description || '').trim(),
                image_b64: fabricImagePathB64(img),
                is_deprecated: dep,
                is_enabled: typeof img.is_enabled !== 'undefined' ? Number(img.is_enabled) : (dep ? 0 : 1),
            };
        }

        function getFabricVisibleImages() {
            let visible = filterFabricImagesForDisplay(selectedImageObjects);
            if (!fabricImageShowFabric) {
                visible = visible.filter(img => normalizeImageRemark(img.remark) !== '原图');
            }
            const C = window.SjMediaImageCard;
            const cmp = (a, b) => Number(a.sort_order || 0) - Number(b.sort_order || 0);
            if (C && typeof C.sortItemsByEnabled === 'function') {
                return C.sortItemsByEnabled(visible, cmp);
            }
            return visible.slice().sort(cmp);
        }

        function ensureFabricMainImageGrid() {
            if (fabricMainImageGrid) return fabricMainImageGrid;
            if (!window.SitjoyMainImageGrid) return null;
            fabricMainImageGrid = window.SitjoyMainImageGrid.create({
                gridId: 'selectedImagesGrid',
                dragReorder: true,
                reorderMode: 'sourceArray',
                skipEntityCheck: true,
                getEntityId: () => true,
                getItems: () => selectedImageObjects,
                getTotalCount: () => selectedImageObjects.length,
                getViewList: getFabricVisibleImages,
                bindInnerDragTargets: true,
                dragPlaceholderVerticalFallback: true,
                cardClassExtra: (img) => {
                    fabricImageToCardItem(img);
                    const categoryClass = getRemarkCategoryClass(normalizeImageRemark(img.remark));
                    return `sj-media-image-card--fabric ${categoryClass}`.trim();
                },
                mapInfoItem: fabricImageToCardItem,
                previewUrl: (img) => getSelectedImagePreviewSrc(img, 520, 72),
                messages: {
                    empty: '未选择图片（可为空），可点击「新增图片」上传或「选择已有图片」从库中绑定',
                    filteredEmpty: '当前类型筛选下暂无图片，请切换类型或新增图片',
                },
                onDelete: (item) => {
                    const idx = selectedImageObjects.indexOf(item);
                    if (idx >= 0) removeImageCard(idx);
                },
                onEdit: (item) => {
                    const idx = selectedImageObjects.indexOf(item);
                    if (idx >= 0) openFabricImageEditModal(idx);
                },
                onDragStart: () => showModalStatus('拖动图片，放手即可调整顺序', false),
                onDragEnd: () => resetModalStatus(),
                onReorder: () => autosaveImageOrder(),
                updateItemEnabled: (pathB64, enabled) => {
                    selectedImageObjects.forEach(it => {
                        const b64 = fabricImagePathB64(it);
                        if (b64 === pathB64) {
                            it.is_enabled = enabled ? 1 : 0;
                            it.is_deprecated = enabled ? 0 : 1;
                        }
                    });
                },
                onEnabledSuccess: (enabled) => {
                    if (window.showPageStatus) window.showPageStatus(enabled ? '已启用' : '已弃用', false);
                    else if (window.showAppToast) window.showAppToast(enabled ? '已启用' : '已弃用', false, 3000);
                },
            });
            return fabricMainImageGrid;
        }

        function renderSelectedImagesGrid() {
            const grid = ensureFabricMainImageGrid();
            if (grid) grid.render();
        }

        function removeImageCard(index) {
            const removed = selectedImageObjects[index];
            if (!removed) return;

            const doLocalRemove = () => {
                if (removed && removed._localPreviewUrl) {
                    try {
                        URL.revokeObjectURL(removed._localPreviewUrl);
                    } catch (e) {}
                }
                selectedImageObjects.splice(index, 1);
                selectedImageObjects.forEach((img, idx) => img.sort_order = idx);
                renderSelectedImagesGrid();
            };

            if (removed._isNewUpload) {
                doLocalRemove();
                return;
            }

            const displayName = removed.image_name || '该图片';
            const modalText = `是否永久删除图片：${displayName} ？点击“确定永久删除”会从服务器永久删除文件。`;
            showImageDeleteConfirm(modalText).then(ok => {
                if (!ok) return;

                fetch('/api/fabric-image-delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image_name: removed.image_name || '',
                        image_name_raw_b64: removed.image_name_raw_b64 || '',
                        fabric_id: editId || null
                    })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.status !== 'success') {
                        showModalStatus(data.message || '删除图片失败', true);
                        return;
                    }
                    doLocalRemove();
                    showModalStatus(data.message || '图片删除完成', false);
                    loadFabricImages();
                })
                .catch(err => showModalStatus('删除图片失败: ' + err, true));
            })
        }

        function showImageDeleteConfirm(message) {
            if (window.showAppConfirmAsync) {
                return window.showAppConfirmAsync({
                    title: '删除确认',
                    message: (message || '确认删除？') + '\n若图片仍被其他面料或规格引用，本次仅解除当前关联。',
                    confirmText: '确认删除',
                    requireConfirmCheck: true,
                    confirmCheckText: '我已知晓：仅在无任何面料/规格关联时，图片才会被彻底删除且不可恢复'
                });
            }
            return Promise.resolve(false);
        }

        function autosaveImageOrder() {
            // only auto-save when editing an existing fabric (editId present)
            if (!editId) return;
            showModalStatus('正在保存图片顺序...', false);
            const payload = {
                id: editId,
                images: selectedImageObjects.map((img, idx) => ({
                    image_name: img.image_name,
                    remark: img.remark || '',
                    description: String(img.description != null ? img.description : '').trim(),
                    sort_order: idx
                }))
            };
            fetch('/api/fabric', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    showModalStatus('图片顺序已保存', false);
                    setTimeout(resetModalStatus, 900);
                } else {
                    showModalStatus(data.message || '保存失败', true);
                }
            })
            .catch(err => showModalStatus('保存失败: ' + err, true));
        }
        
        async function syncFabricImageFromGalleryMeta(index) {
            const img = selectedImageObjects[index];
            if (!img || img._isNewUpload) return;
            const pathB64 = resolveFabricImagePathB64(img);
            try {
                const resp = await fetch('/api/gallery-image-meta?id=' + encodeURIComponent(pathB64), { credentials: 'include' });
                const data = await resp.json();
                if (data.status !== 'success') return;
                if (data.storage_path) {
                    img.preview_b64 = utf8ToB64(String(data.storage_path).replace(/\\/g, '/'));
                }
                if (data.image_type_name) {
                    img.remark = normalizeImageRemark(data.image_type_name || img.remark);
                }
                if (data.description != null) {
                    img.description = String(data.description).trim();
                }
                renderSelectedImagesGrid();
            } catch (e) {}
        }

        function openFabricImageEditModalLocal(index) {
            currentEditingImageIndex = index;
            const img = selectedImageObjects[index];
            if (!img) return;
            document.getElementById('fabricImageRemarkInput').value = String(img.description != null ? img.description : '');
            const bar = document.getElementById('fabricImageEditTypeBar');
            if (bar) {
                const list = (fabricImageTypeOptions || []).filter(x => String(x.name || '').trim());
                const currentType = normalizeFabricImageTypeName(normalizeImageRemark(img.remark || ''));
                if (!list.length) {
                    bar.innerHTML = '<span class="pm-select-empty" style="padding:0 .4rem;">暂无类型</span>';
                } else {
                    bar.innerHTML = list.map(item => {
                        const name = String(item.name || '').trim();
                        const checked = name === currentType ? 'checked' : '';
                        return `
                            <label class="image-type-radio">
                                <input type="radio" name="fabricImageEditType" value="${escapeHtml(name)}" ${checked}>
                                <span>${escapeHtml(name)}</span>
                            </label>
                        `;
                    }).join('');
                }
            }
            document.getElementById('fabric-image-edit-modal').classList.add('active');
            document.getElementById('fabricImageRemarkInput').focus();
        }

        function openFabricImageEditModal(index) {
            const img = selectedImageObjects[index];
            if (!img) return;
            if (img._isNewUpload) {
                openFabricImageEditModalLocal(index);
                return;
            }
            if (!window.PmImageEditModal || !window.PmImageEditModal.open) {
                openFabricImageEditModalLocal(index);
                return;
            }
            currentEditingImageIndex = index;
            const pathB64 = resolveFabricImagePathB64(img);
            window.PmImageEditModal.init({
                mode: 'gallery',
                hooks: {
                    prefillVariantLinks: true,
                    resolveRecommendFabricName: () => (document.getElementById('modalFabricCode')?.value || '').trim(),
                    onRenamed: ({ oldPathB64, newFilename }) => {
                        const oldRel = tryDecodeNameFromB64(oldPathB64) || '';
                        const folder = oldRel.includes('/') ? oldRel.slice(0, oldRel.lastIndexOf('/')) : '';
                        const newRel = folder ? `${folder}/${newFilename}` : newFilename;
                        const newPathB64 = utf8ToB64(newRel);
                        const edited = selectedImageObjects[currentEditingImageIndex];
                        if (edited) {
                            edited.image_name = newFilename;
                            edited.preview_b64 = newPathB64;
                        }
                        return newPathB64;
                    },
                    onAfterSuccess: async () => {
                        await loadFabricImages();
                        await syncFabricImageFromGalleryMeta(index);
                        if (editId) loadFabricList();
                    }
                }
            });
            window.PmImageEditModal.open({
                pathB64,
                name: img.image_name || '',
                defaultVariantIds: []
            });
        }

        function closeFabricImageEditModal() {
            document.getElementById('fabric-image-edit-modal').classList.remove('active');
            currentEditingImageIndex = null;
        }

        function saveFabricImageEditFromModal() {
            if (currentEditingImageIndex === null || currentEditingImageIndex === undefined) return;
            const idx = currentEditingImageIndex;
            const img = selectedImageObjects[idx];
            if (!img) return;
            let image_type_name = '';
            try {
                const checked = document.querySelector('input[name="fabricImageEditType"]:checked');
                image_type_name = checked ? normalizeFabricImageTypeName(checked.value) : '';
            } catch (e) {}
            if (image_type_name) {
                img.remark = normalizeImageRemark(image_type_name);
            }
            img.description = document.getElementById('fabricImageRemarkInput').value.trim();
            renderSelectedImagesGrid();
            closeFabricImageEditModal();
        }

        // ========== 修改原有函数以支持新格式 ==========

        window.addEventListener('load', loadFabricList);
        window.addEventListener('load', loadFabricImages);
        window.addEventListener('load', loadFabricMaterials);
        window.addEventListener('load', loadSkuFamilies);
        window.addEventListener('load', () => { loadFabricImageTypes(); });
        window.addEventListener('load', function() {
            fabricImagePromptDuplicate = readFabricBoolLs(FABRIC_DUP_LS, true);
            fabricImageShowFabric = readFabricBoolLs(FABRIC_FAB_LS, true);
            syncFabricImageToolbarToggles();
            const params = new URLSearchParams(window.location.search || '');
            if (params.get('openCreate') === '1') {
                setTimeout(() => openCreateModal(), 120);
            }
        });
        window.setTimeout(function() {
            var el = document.getElementById('pm-modal');
            if (el && typeof window.bindPmModalBackdropClose === 'function') window.bindPmModalBackdropClose(el, closeModal);
        }, 0);
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loadFabricList();
            }
        });
        document.getElementById('modalImageUpload').addEventListener('change', handleImageUpload);
        document.getElementById('modalSkuFilter').addEventListener('input', renderSkuFamilyPicker);
        document.getElementById('skuAdd').addEventListener('click', toggleSkuMenu);
        window.setTimeout(function() {
            var el = document.getElementById('fabric-image-edit-modal');
            if (el && typeof window.bindPmModalBackdropClose === 'function') window.bindPmModalBackdropClose(el, closeFabricImageEditModal);
        }, 0);
        
        function handleImageUpload() {
            const files = document.getElementById('modalImageUpload').files;
            if (!files || !files.length) return;
            const defaultType = getDefaultFabricImageTypeForAdd();
            Array.from(files).forEach(file => {
                selectedImageObjects.push({
                    image_name: file.name,
                    remark: defaultType,
                    description: '',
                    sort_order: selectedImageObjects.length,
                    is_enabled: 1,
                    is_deprecated: 0,
                    _isNewUpload: true,
                    _fileObject: file
                });
            });
            document.getElementById('modalImageUpload').value = '';
            renderSelectedImagesGrid();
        }

        window.addEventListener('load', function () {
            initFabricNasImportUi();
        });
    </script>
    <script src="/static/js/header.js"></script>
    <script src="/static/js/nas_main_image_browser_ui.js"></script>
    <script src="/static/js/sitjoy_fs_name.js"></script>
    <script src="/static/js/fabric_image_flow.js"></script>
    <script src="/static/js/fabric_nas_import.js"></script>
    <script src="/static/js/sj_pick_existing_images.js"></script>
    <script src="/static/js/pm_image_edit_modal.js"></script>
    <script src="/static/js/sj_media_image_card.js"></script>
    <script src="/static/js/sitjoy_main_image_grid.js"></script>
    <script src="/static/js/sitjoy_row_image_refresh.js"></script>
</body>
